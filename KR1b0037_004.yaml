body:
  text: 書經大全卷四明胡廣等撰商書契始封商湯因以為有天下之號書凡十七篇史記湯黄帝後帝嚳生契為唐虞司徒封於商賜姓子氏十三世生湯名天乙都亳今濟隂亳縣鄭氏曰商在太華之陽湯在位十三年崩壽百歲國號商盤庚遷殷以後號殷吉豐彭氏曰商書舊凡四十篇二十三篇亡湯誓湯號也或曰諡湯名履姓子氏夏桀暴虐湯往征之亳衆憚於征役故湯諭以弔伐之意葢師興之時而誓于亳都者也今文古文皆有朱子曰湯武固是反之但細觀其書湯反之之功恐是精密如湯誓與牧誓數桀紂之罪辭氣亦不同史記但書湯放桀而死書武王則曰遂斬紂頭懸之白旗又曰湯有慙徳如武王恐未必有此意王曰格爾衆庶悉聽朕言非台音怡後並同小子敢行稱亂有夏多罪天命殛之王曰者史臣追述之稱也格至台我稱舉也以人事言之則臣伐君可謂亂矣以天命言之則所謂天吏非稱亂也張氏曰天命殛之豈諄諄然命之乎葢天以天下之心為心古之論天者多以民心卜之也林氏曰非天吏而伐有罪猶不為士師而擅殺人為天吏而不伐有罪猶為士師而故縱罪人也今爾有衆汝曰我后不恤我衆舍音捨我穡事而割正夏予惟聞汝衆言夏氏有罪予畏上帝不敢不正穡刈穫也割斷音短也亳邑之民安於湯之徳政桀之虐燄所不及故不知夏氏之罪而憚伐桀之勞反謂湯不恤亳邑之衆舍我刈穫之事而斷正有夏湯言我亦聞汝衆論如此然夏桀暴虐天命殛之我畏上帝不敢不往正其罪也吕氏曰舍我穡事然則湯之伐桀不因民願乎曰亳民之不願而夏民之願也見新安陳氏曰湯之興順乎天而應乎人此一節可商民以一己為心湯則以上天為心葢是時夏之天命已絶湯所以順乎天也今汝其曰夏罪其如台夏王率遏衆力率割夏邑有衆率怠弗協曰時日曷喪去聲予及汝偕亡夏徳若兹今朕必往遏絶也割劓割夏邑之割時是也湯又舉商衆言桀雖暴虐其如我何湯又應之曰夏王率為重役以窮民力嚴刑以殘民生民厭夏徳亦率皆怠於奉上不和於國疾視其君指日而曰是日何日而亡乎若亡則吾寧與之俱亡葢苦桀之虐而欲其亡之甚也桀之惡徳如此今我之所以必往也桀嘗自言吾有天下如天之有日日亡吾乃亡平故民因以日目之吕氏曰夏罪其如台是夏民在塗炭而商民自在春風和氣中也新安陳氏曰此一節見商民以一國為心湯則以天下為心葢是時夏之人心已離湯所以應乎人也爾尚輔予一人致天之罰予其大賚來去聲汝爾無不信朕不食言爾不從誓言予則孥戮汝罔有攸赦賚與也食言言已出而反吞之也禹之征苗止曰爾尚一乃心力其克有勲至啓則曰用命賞于祖不用命戮于社予則孥戮汝此又益以朕不食言罔有攸赦亦可以觀世變矣新安陳氏曰天生民而立之君使司牧之今桀虐其民民欲其速亡如此人心之所歸即天命之所在人心之所離即天命之所棄也天命湯伐之湯敢違天乎湯之誓師拳拳惟以天言曰天命殛之曰予畏上帝曰致天之罰非湯伐之天伐之也湯曰予畏上帝不敢不正武王曰予弗順天厥罪惟鈞其心一也堯舜之授受禹啓之𫝊繼湯武之征伐事雖不同其順乎天適乎時合乎義一而已矣又董氏鼎曰禹征苗有誓啓征扈有誓𦙍侯征羲和有誓皆征所當征名正而言順若湯之伐夏而亦有誓何歟葢誓者臨衆𤼵命述其興師之意故禹也啓也𦙍侯也猶可無誓惟湯則不可無誓湯無誓則稱兵之意不明而稱亂之罪滋大茍可明目張膽言之而不怍則順天應人行之而無疑矣今觀一書之㫖首以非予小子敢行稱亂有夏多罪天命殛之夫莫大於天莫尊於君君承天而臣承君則為治君逆天而臣逆君則為亂湯初不敢逆君而為亂而桀則不能承天以為治彼既多罪天命殛之則我非敢稱亂而迫於天命有不獲已湯何以知其然哉天之聰明自民天之明畏亦自民始於匹夫匹婦之復讎而終於西夷北狄之怨望吾非彼君也而曰徯我后我何以得此於民哉殆天啓之也天之所啓我固違之是逆天矣有如此意天下皆知惟亳之民不知故有議湯之稱亂者有咎湯之不恤我衆者有止湯以夏罪其如台者而湯則曰予畏上帝不敢不正是非敢於稱亂也將以止天下之亂也非不恤我衆也將以恤天下之衆也雖以夏罪無如我何而不止者將以救彼之願與偕亡而不得者之苦也此湯之誓所以専為亳民而𤼵也其示之以賞罰者誓師之體不得不勵士氣而一人心非誘以利怵以禍而强其從我也吁湯之不幸乃天下之大幸也仲虺之誥仲虺許偉反臣名奚仲左傳註奚仲為夏禹掌車服大夫之後為湯左相去聲誥告也周禮士師以五戒先後刑罰一曰誓用之於軍旅二曰誥用之於㑹同以喻衆也此但告湯而亦謂之誥者唐孔氏謂仲虺亦必對衆而言葢非特釋湯之慙而且以曉其臣民衆庶也古文有今文無問仲虺之誥似未見其釋湯慙徳處朱子曰正是解他云若苗之有莠若粟之有秕他縁何道這幾句葢謂湯若不除桀則桀必殺湯如説推亡固存處自是説伐桀至徳日新以下乃是勉湯又如天乃錫王勇智他特地説他勇智兩字便可見尚書多不可曉固難理㑹然這般處古人如何説得恁地好成湯放桀于南巢惟有慙徳曰予恐來世以台為口實武功成故曰成湯南巢地名廬江六縣有居巢城桀奔于此因以放之也湯之伐桀雖順天應人然承堯舜禹授受之後於心終有所不安故愧其徳之不古若而又恐天下後世藉慈夜反以為口實也陳氏曰堯舜以天下讓後世好去聲名之士猶有不知而慕之者湯武征伐而得天下後世嗜利之人安得不以為口實哉此湯之所以恐也歟新安陳氏曰觀湯之慙湯本心始見矣以居萬世君臣之始變也仲虺釋其慙始則美之又慮其愧心既釋驕心或生故終復警之大臣之引君當道者如此世鄭氏曰必往之師以救生人口實之慙以慮後吕氏曰此心之慙此誥之釋皆不可少仲虺乃作誥曰嗚呼惟天生民有欲無主乃亂惟天生聰明時乂有夏昏徳民墜塗炭天乃錫王勇智表正萬邦纘作管反禹舊服兹率厥典奉若天命仲虺恐湯憂愧不已乃作誥以解釋其意歎息言民生有耳目口鼻愛惡去聲之欲無主則爭且亂矣天生聰明所以為之主而治其爭亂者也墜陷也塗泥也炭火也桀為民主而反行昏亂陷民於塗炭既失其所以為主矣然民不可以無主也故天錫湯以勇智之徳勇足以有為智足以有謀非勇智則不能成天下之大業也表正者表正於此而影直於彼也天錫湯以勇智者所以使其表正萬邦而繼禹舊所服行也此但率循其典常以奉順乎天而已天者典常之理所自出而典常者禹之所服行者也湯革夏而纘舊服武革商而政由舊孔子所謂百世可知者正以是也林氏曰齊宣王問孟子曰湯放桀武王伐紂有諸孟子曰賊仁者謂之賊賊義者謂之殘殘賊之人謂之一夫聞誅一夫紂矣未聞弑君也夫音扶立之君者懼民之殘賊而無以主之為之主而自殘賊焉則君之實喪矣非一夫而何孟子之言則仲虺之意也陳氏𫝊良曰仲虺之誥非但釋湯之慙亦進徳戒滿之書也吕氏曰以湯勇智如此惟循常行之理而已徳西山真氏曰湯之伐桀自謂不幸而處變故有慙以為不獨愧於人亦愧於天仲虺解之曰此特循其常道以順天命而已葢變而不失其正即所謂常也新安陳氏曰凡湯之表正纘率乃所以奉若天命也何慙之有此以天之生湯者釋之以見湯之順乎天也禹有典則貽子孫纉禹舊服即云兹率厥典典指為禹之典章亦通孔氏云循其典法祖宗之服行典章不肖之子孫失墜之而異代之聖賢興復之往往而然哉陳氏雅言曰天錫湯以勇智之徳者天豈私於湯欲其表正萬邦之民纉禹之所舊服而已湯惟率其典常之道葢典常之理即禹之所服行而其原出於天者也天命湯以正萬邦而湯能為之表正天命湯以纉禹服而湯能纉之天可謂厚於湯湯可謂能奉若天命矣此仲虺推天為民立君之意以釋湯慙見湯之順乎天也夏王有罪矯誣上天以布命于下帝用不臧式商受命用爽厥師矯與矯制之矯同誣罔臧善式用爽明師衆也天以形體言帝以主宰言桀知民心不從矯詐誣罔託天以惑其衆天用不善其所為用使有商受命用使昭明其衆庶也王氏曰夏有昏徳則衆從而昏商有明徳則衆從而明吳氏曰用爽厥師續下文簡賢附勢意不相貫疑有脫誤簡賢附勢寔繁有徒肇我邦于有夏若苗之有莠以九反若粟之有秕卑履反小大戰戰罔不懼于非辜矧予之徳言足聽聞簡略繁多肇始也戰戰恐懼貌言簡賢附勢之人同惡相濟寔多徒衆肇我邦於有夏為桀所惡去聲下同欲見剪除如苗之有莠如粟之有秕鋤治簸揚有必不相容之勢商衆小大震恐無不懼陷于非罪况湯之徳言則足人之聽聞尤桀所忌疾者乎以苗粟喻桀以莠秕喻湯特言其不容於桀而迹之危如此史記言桀囚湯於夏臺獄名皇甫謐云地名在陽翟湯之危屢矣無道而惡有道勢之必至也問矧予之徳言足聴聞據古註云道徳善言某切意言足聴聞自當作一句言吾之徳言之足使人聴聞彼安得不忌之未知是否朱子曰是林氏曰桀召湯而囚之夏臺以戰戰懼非辜之言觀之史不虚矣惟王不邇聲色不殖貨利徳懋懋官功懋懋賞用人惟已改過不吝克寛克仁彰信兆民邇近殖聚也不近聲色不聚貨利若未足以盡湯之徳然此本原之地非純乎天徳而無一毫人欲之私者不能也本原澄澈然後用人處上聲下同已而莫不各得其當去聲懋茂也繁多之意與時乃功懋哉之義同言人之懋於徳者則懋之以官人之懋於功者則懋之以賞用人惟己而人之有善者無不容改過不吝而己之不善者無不改不忌能於人不吝過於己合併為公私意不立非聖人其孰能之湯之用人處己者如此而於臨民之際是以能寛能仁謂之能者寛而不失於縱仁而不失於柔易曰寛以居之仁以行之君徳也君徳昭著而孚信於天下矣湯之徳足人聽聞者如此葛氏曰君子小人之進退係於人君心術之正邪心術一正則君子進否則小人進矣君之惑於聲色則便辟之臣得志貪於貨利則聚斂之臣得志有功徳者官賞何由及之不邇不殖乃懋徳懋功之根本也己孔氏曰勉於徳者則勉之以官林氏曰用人惟如自己出若所謂善與人同舍己從人樂取諸人以為善也萬新安陳氏曰六經言仁自克寛克仁一言始遂開世言仁之端仁者心之徳愛之理以心徳之體言則仁為體寛為用以愛之用言則寛以容人仁以愛人皆用也徳莫大於仁湯所以克仁者實自不邇不殖之無私欲始徳懋懋官至彰信兆民根本皆自不邇不殖中來陳氏雅言曰不邇聲色不殖貨利此君徳本原之地徳懋懋官至改過不吝此言湯用人處己之際兩盡其道也克寛克仁彰信兆民此言湯臨民之徳昭著孚信於天下也使湯之心有一毫聲色貨利之私則用人處己之間必有不盡其道臨民之際亦豈能無愧哉以見人君一心政事之根本孟子謂惟大人為能格君心之非此之謂也乃葛伯仇餉初征自葛漢志葛伯在陳留寧陵縣葛鄉東征西夷怨南征北狄怨曰奚獨後予攸徂之民室家相慶曰徯予后后來其蘇民之戴商厥惟舊哉葛國名伯爵也餉饋也仇餉者與餉者為仇也葛伯不祀湯使問之曰無以供粢盛音咨成湯使亳衆往耕老弱饋餉葛伯殺其童子湯遂征之湯征自葛始也奚何徯待也蘇復扶又反生也西夷北狄言逺者如此則近者可知也湯師之未加者則怨望其來曰何獨後予其所往伐者則妻孥相慶曰待我后久矣后來我其復生乎他國之民皆以湯為我君而望其來者如此天下之愛戴歸往於商者非一日矣商業之興葢不在於鳴條之役也吕氏曰夏商之際君臣易位天下之大變然觀其征伐之時唐虞都俞揖遜氣象依然若存葢堯舜禹湯以道相𫝊世雖降而道不降也新安陳氏曰民之戴商如此何慙之有此以民之歸湯者釋之以見湯之應乎人也吕氏曰後世師之所至荆棘生焉湯師所至民皆欣欣葢弔民伐罪布其寛仁如旱餘時雨所至則蘇也佑賢輔徳顯忠遂良兼弱攻昧取亂侮亡推通回反亡固存邦乃其昌前既釋湯之慙此下因以勸勉之也諸侯之賢徳者佑之輔之忠良者顯之遂之所以善善也侮説文曰傷也諸侯之弱者兼之昧者攻之亂者取之亡者傷之所以惡去聲惡也言善則由大以及小言惡則由小以及大推亡者兼攻取侮也固存者佑輔顯遂也推彼之所以亡固我之所以存邦國乃其昌矣林氏曰天之生物必因其材而篤焉故栽者培之傾者覆之天道之自然也佑輔顯遂為善者必為人所助也兼攻取侮為不善者必為人所侵也聖人因其常理以應世有亡之道則推而亡之有存之道則輔而固之桀有亡道湯因其將亡而推之果何容心哉意復齋董氏曰推亡固存一句乃總結上徳日新萬邦惟懷志自滿九族乃離王懋昭大徳建中于民以義制事以禮制心垂裕後昆予聞曰能自得師者王謂人莫己若者亡好去聲問則裕自用則小徳日新者日新其徳而不自己也志自滿者反是湯之盤銘曰茍日新日日新又日新其廣日新之義歟徳日新則萬邦雖廣而無不懷志自滿則九族雖親而亦離萬邦舉逺以見近也九族舉親以見疎也王其勉明大徳立中道於天下中者天下之所同有也然非君建之則民不能以自中而禮義者所以建中者也義者心之裁制禮者理之節文以義制事則事得其宜以禮制心則心得其正内外合徳而中道立矣如此則非特有以建中於民而垂諸後世者亦綽乎有餘裕矣然是道也必學焉而後至故又舉古人之言以為隆師好問則徳尊而業廣自賢自用者反是謂之自得師者真知己之不足人之有餘委心聽順而無拂逆之謂也孟子曰湯之於伊尹學焉而後臣之故不勞而王其湯之所以自得者歟仲虺言懷諸侯之道推而至於修徳撿身又推而至於能自得師夫自天子至於庶人未有捨師而能成者雖生知之聖亦必有師焉後世之不如古非特世道之降抑亦師道之不明也仲虺之論去聲遡流而源要去聲其極而歸諸能自得師之一語其可為帝王之大法也歟問禮義本諸人心惟中人以下為氣禀物欲所拘蔽所以反著求禮義自治若成湯尚何須以義制事以禮制心朱子曰湯武反之也便也是有些子不那底了但他能恁地所以為湯若不恁地便是惟聖罔念作狂聖人雖則説是生知安行便只是常常恁地不已所以不可及若有一息不恁地便也是凡人了以義制事以禮制心此自是内外交相養之法事在外義由内制心在内禮由外作問禮莫是攝心之規矩否曰只是箇禮如顔子非禮勿視之類皆是也又曰今學者別無事只是要以心觀理理是心中所有常存此心以觀衆理只此兩事耳得新安陳氏曰徳與中皆當兼體用而言徳即人所於天以具衆理而應萬事者也大徳云者全體大用無非大也懋勉以昭明之則全體呈露妙用顯行矣由是而建中道之標準使民之罔中者皆惟我之中則不偏不倚無過不及是中之體用亦無不備矣然禮義徳也即昭徳建中之要也動而以義制事即義以方外之謂能以義方外則此徳應萬事之大用以行而此中無過不及之用在是矣靜而以禮制心即敬以直内之謂能敬以直内則此徳具衆理之全體以立而此中不偏不倚之體在是矣所謂垂裕固禮義之餘用也亦即昭徳建中之餘用也非昭徳専以建中于民而禮義専以垂裕於後也偏陳氏大猷曰徳不大則梏於偏如夷清惠和各有之弊何以建中湯徳本大又欲其懋昭之然後能建中以範斯民所謂皇建其有極也以義制事則行於外者合宜乃大徳之所自行中之用也以禮制心則存於内者合理乃大徳之所自出中之本也禮義之澤𫝊之無窮所以垂裕於後嗣也又曰能自得師則天下之善皆歸於己故可以王謂人莫己若則驕矜侮慢善日消惡日長亡之道也好問則衆善集故優裕自用則能有限故狹小道陳氏經曰自得師如自明自强不因乎人尊徳樂出於中心之自然也當味自字謂人莫己若與自用則小承志自滿而言以為戒也嗚呼慎厥終惟其始殖有禮覆昏暴欽崇天道永保天命上文既勸勉之於是歎息言謹其終之道惟於其始圖之始之不謹而能謹終者未之有也伊尹亦言謹終于始事雖不同而理則一也欽崇者敬畏尊奉之意有禮者封殖之昏暴者覆亡之天之道也欽崇乎天道則永保其天命矣按仲虺之誥其大意有三先言天立君之意桀逆天命而天之命湯者不可辭次言湯徳足以得民而民之歸湯者非一日末言為君艱難之道人心離合之機天道福善禍淫之可畏以明今之受夏非以利己乃有無窮之恤以深慰湯而釋其慙仲虺之忠愛可謂至矣然湯之所慙恐來世以為口實者仲虺終不可謂無也君臣之分去聲其可畏如此哉王氏十朋曰殖禮覆暴即上文佑輔取侮之事董氏鼎曰君臣人倫之大經也帝王綱紀天下先謹乎此而後人得安焉世故無盡人欲無涯不忠之臣何代無之所以畏縮而不敢肆者猶以古無是事前無是人無以藉口耳茍一為之則後有潜蓄不軌之心而囂然以逞者其不借以為資乎故湯以自慙曰予恐來世以台為口實然湯豈至是而後知哉葢謂非台小子敢行稱亂則顔忸怩而心不寧已久矣天人交迫但知為民除害而非以為己利也及桀已放夏已亡而天下之不吾釋然後慙於逐君而代立聖人之本心於是愈不自安矣不有仲氏之誥以明其不得不為之意與不可妄為之理則何以暴白成湯之心事而隂折來者之奸謀自是而後昏徳不如桀勇智不如湯皆未可以藉口也新安陳氏曰推亡固存與殖禮覆暴同一栽培傾覆之理特有人己之分推亡固存欲湯審此理以施之人殖禮覆暴欲湯審此理而謹諸己也湯誥湯伐夏歸亳諸侯率職來朝音潮湯作誥以與天下更音庚始今文無古文有王歸自克夏至于亳誕告萬方誕大也亳湯所都在宋州榖熟縣王曰嗟爾萬方有衆明聽予一人誥惟皇上帝降𠂻于下民若有恒胡登反性克綏厥猷惟后皇大𠂻中若順也天之降命而具仁義禮智信之理無所偏倚所謂𠂻也人之禀命而得仁義禮智信之理與心俱生所謂性也猷道也由其理之自然而有仁義禮智信之行所謂道也以降𠂻而言則無有偏倚順其自然固有常性矣以禀受而言則不無清濁純雜之異故必待君師之職而後能使之安於其道也故曰克綏厥猷惟后夫天生民有欲以情言也上帝降𠂻于下民以性言也仲虺即情以言人之欲成湯原性以明人之善聖賢之論去聲互相𤼵明然其意則皆言君道之係於天下者如此之重也問書所謂降𠂻朱子曰古之聖賢纔説出便是這般話成湯當放桀之初便説惟皇上帝降𠂻于下民若有恒性克綏厥猷惟后武王伐紂時便説惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母傅説告髙宗便説明王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民惟天聰明惟聖時憲見古聖賢朝夕只見那天在眼前𠂻問降𠂻于下民曰何故不説降善却説降𠂻看得字是箇無過不及恰好的道理天之生物箇箇有一副當恰好底道理此與程子所謂天然自有之中劉子所謂民受天地之中相似與詩所謂秉彜張子所謂萬物一原又自不同彜是常道有物有則則字却似𠂻字天之生物必有箇當然之則葢君有君之則臣有臣之則耳有耳之則目有目之則止於仁君之則也止於敬臣之則也視曰明目之則也聴曰聰耳之則也故民執以為常道也若説降𠂻便是秉彜則不可若説便是萬物一原亦不可萬物一原自説萬物皆出此也若統論道理固是一般然其中名字位分又自不同若只一般聖賢何故説許多名字若曉得名字訓義之不同方見其所謂同𠂻只是中今人言折𠂻者葢以是為準則而取正也怒詩書所説便是有箇人在上恁地分付如帝乃震之類然這箇亦只是理如此天下莫尊於理故以帝名之降𠂻便是有主宰意物天地自有箇無心之復卦一陽生於下這便是生之心如惟皇上帝降𠂻于下民天道福善禍淫便自分明有箇人在裏主宰相似問降𠂻與受小之中二字義同異曰左氏云始終𠂻皆舉之又云𠂻甲以見看此𠂻字義本是𠂻甲以見之義為其在𠂻而當中也然中字大槩因無過不及而立名如六藝折𠂻於夫子葢是折兩頭而取其中之義後人以𠂻為善却説得未親切日又曰此葢指大本之中也此處中庸説得甚明他考之自見自天而言則謂之降𠂻自人受此中而言則謂之性猷即道也道者性之𤼵用處能安其道者惟后也西山真氏曰成湯有天下之初即以此自任可謂知君師之職矣厥後秉彜受中之言相繼而𤼵至于孔孟性善之理益明而開萬世性學之原則自成湯始失林氏曰天能降𠂻于民不能使民保其常性而勿故立之君而付以立教之任師曠曰天生民而立之君使司牧之勿使失性謂不使失其所降之𠂻也民既有降𠂻之性至于順其固有之性以安其所謂道者是乃君之事教新安陳氏曰六經言性實始于此中庸言命性道其淵源葢出於此諸家解若有恒性一句皆屬下文以為皆君之事蔡氏獨屬之上文以為人性本然之天降𠂻之初順其自然本有此恒性也特氣禀不齊率性而行之或不能安於其道耳若字本輕説克字方重説天賦人受順其自然本有恒性此時君不必容力於其間也至於脩道之教使人各安其道方有賴於君焉諸解以惟后對惟皇上帝作兩般説蔡氏以帝𠂻民性后綏作三般説豈民本無恒性必待君順其恒性而後方有此性耶此章蔡説最優非可易及朱子誠不輕付矣夏王滅徳作威以敷虐于爾萬方百姓爾萬方百姓罹音離其凶害弗忍荼音徒毒並告無辜于上下神祗音其天道福善禍淫降災于夏以彰厥罪言桀無有仁愛但為殺戮天下被其凶害如荼之苦如毒之螫施隻反不可堪忍稱寃于天地鬼神以冀其拯己屈原曰人窮則反本故勞苦倦極未嘗不呼天也天之道善者福之淫者禍之桀既淫虐故天降災以明其罪意當時必有災異之事如周語所謂伊洛竭而夏亡之類問天道福善禍淫此理定否朱子曰如何不定自是道理當如此問或有不如此者何也曰福善禍淫其常理也不如此便是失常理天莫之為而為天亦何常有意只是理自是如此且如冬寒夏熱此是常理當如此若冬熱夏寒便是失其常理肆台小子將天命明威不敢赦敢用𤣥牡敢昭告于上天神后請罪有夏聿求元聖與之戮力以與爾有衆請命肆故也故我小子奉將天命明威不敢赦桀之罪也𤣥牡夏尚黑未變其禮也神后后土也聿遂也元聖伊尹也上天孚佑下民罪人黜伏天命弗僭賁若草木兆民允殖孚允皆信也僭差也賁文之著也殖生也上天信佑下民故夏傑竄亡而屈服天命無所僭差燦然若草木之敷榮兆民信乎其生殖矣朱子曰賁若言草木之美允殖言兆民信安其生罪人既黜伏天命既弗差故草木華美百姓豐殖謂人物皆遂問賁若草木兆民允殖諸家説多不同未知當如何看曰連上句天命不僭明白易見故人得遂其生也新安陳氏曰天命弗僭賁若草木如語譬諸草木區以別矣之意兆民允殖與罪人黜伏相應罪人黜伏則兆民信生殖可見天命之弗僣差如草木之粲然栽培傾覆皆其自取也俾予一人輯寧爾邦家兹朕未知獲戾音吏于上下慄慄危懼若將隕音尹于深淵輯和戾罪隕墜也天使我輯寧爾邦家其付予上聲之重恐不足以當之未知已得罪於天地與否驚恐憂畏若將墜於深淵葢責愈重則憂愈大也凡我造邦無從匪彜無即慆音叨淫各守爾典以承天休夏命已黜湯命惟新侯邦雖舊悉與更始故曰造邦彜法即就慆慢也匪彜指法度言慆淫指逸樂言典常也各守其典常之道以承天之休命也爾有善朕弗敢蔽罪當朕躬弗敢自赦惟簡在上帝之心其爾萬方有罪在予一人予一人有罪無以爾萬方簡閱也人有善不敢以不達己有罪不敢以自恕簡閱一聽於天然天以天下付之我則民之有罪實君所為君之有罪非民所致非特聖人厚於責己而薄於責人是乃理之所在君道當然也問簡在帝心註簡閲也如何朱子曰善與罪天皆知之如天檢㸃數過相似爾之有善也在帝心我之有惡也在帝心林氏曰所謂罪在朕躬非必己身有可指之罪然後為罪也葢天降𠂻於民而以克綏厥猷者付之一人為君者必使天下之人皆不失其降𠂻之性以安厥猷方無負於天之所付若民有罪是為君者敎之不至所以自棄於愚不肖之地而莫能返非民之罪乃君之罪也所以曰罪在朕躬也民有罪則君致之君有罪乃其自取夫以一人之身臨莅四海而天下人之罪皆歸其身必使天下之人皆無罪然後為能盡君之職而無負於天之所任論至此則獲戾于上下亦豈難哉此所以危懼若將隕也湯誥一書多兢業之意新安陳氏曰此所以繳結篇首降𠂻有性綏猷之言深味之成湯可謂知君師之職矣嗚呼尚克時忱乃亦有終忱時任反忱信也歎息言庶幾能於是而忱信焉乃亦有終也吳氏曰此兼人己而言新安陳氏曰歎息言尚克相與於是盡其忱誠則乃亦有終焉否則未保其所終也曰尚曰亦皆不敢必之辭葢兢兢不忽之意實兼人己而言不特湯自謂當如此亦欲萬方諸侯皆勉於此也此篇見成湯明命性之理知君師之道監夏之所以亡而凛凛於今之所以興且戒諸侯以相與盡守邦圖終之道真帝王之格言聖學之淵源也論語摘其要語曰予小子履敢用𤣥牡敢昭告于皇皇后帝有罪不敢赦帝臣不蔽簡在帝心朕躬有罪無以萬方萬方有罪罪在朕躬但書詳而語略耳伊訓訓導也太甲嗣位伊尹作書訓導之史録為篇今文無古文有朱子曰商書幾篇最分曉可玩伊訓太甲等篇又好看似説命葢髙宗資質髙傅説所以説底細了難看若是伊尹與太甲説雖是粗却切於學者之身太甲也不是箇昏愚底人但欲敗度縱敗禮耳看伊尹書及説命大抵分明易曉今人觀書且他那分明底其難曉者且置之即使曉得也不濟事吉豐彭氏曰伊訓之書大抵主於勸戒首引夏之所以興亡中言商之所以開業慮後末陳天命人事禍福無非致其勸戒之意而已太甲三篇意亦類此惟元祀十有二月乙丑伊尹祠于先王奉嗣王祗見音現厥祖侯甸羣后咸在百官總己以聽冢宰伊尹乃明言烈祖之成徳以訓于王夏曰歲商曰祀周曰年一也元祀者太甲即位之元年十二月者商以建丑為正故以十二月為正也乙丑日也不繫以朔者非朔日也三代雖正朔不同然皆以寅月起數葢朝覲㑹同頒厯授時則以正朔行事至於紀月之數則皆以寅為首也伊姓尹字也伊尹名摯音至祠者告祭於廟也先王湯也冢長上聲也禮有冢子冢婦之名周人亦謂之冢宰古者王宅憂祠祭則冢宰攝而告廟又攝而臨羣臣太甲服仲壬之喪伊尹祠于先王奉太甲以即位改元之事祗見厥祖則攝而告廟也侯服甸服之羣后咸在百官總己之職以聴冢宰則攝而臨羣臣也烈功也商頌曰衎空旱反我烈祖太甲即位改元伊尹於祠告先王之際明言湯之成徳以訓太甲此史官叙事之始辭也或曰孔氏言湯崩踰月太甲即位則十二月者湯崩之年建子之月也豈改正朔而不改月數乎曰此孔氏惑於序書之文也太甲繼仲壬之後服仲壬之喪而孔氏曰湯崩奠殯而告固已誤矣至於改正朔而不改月數則於經史尤可考周建子矣而詩言四月維夏六月徂暑則寅月起數周未嘗改也秦建亥矣而史記始皇三十一年十二月更音庚名臘曰嘉平夫臘必建丑月也秦以亥正則臘為三月云十二月者則寅月起數秦未嘗改也至三十七年書十月癸丑始皇出遊十一月行至雲夢繼書七月丙寅始皇崩九月𦵏酈音驪山先書十月十一月而繼書七月九月者知其以十月為正朔而寅月起數未嘗改也且秦史制書謂改年始朝賀皆自十月朔夫秦繼周者也若改月數則周之十月為建酉月矣安在其為建亥乎漢初史氏所書舊例也漢仍秦正亦書曰元年冬十月則正朔改而月數不改亦已明矣且經曰元祀十有二月乙丑則以十二月為正朔而改元何疑乎惟其以正朔行事也故後乎此者復政厥辟亦以十二月朔奉嗣王歸于亳葢祠告復政皆重事也故皆以正朔行之孔氏不得其説而意湯崩踰月太甲即位奠殯而告是以崩年改元矣蘇氏曰崩年改元亂世事也不容在伊尹而有之不可以不辨又按孔氏以為湯崩吳氏曰殯有朝夕之奠何為而致祠主喪者不離去聲於殯側何待於祗見葢太甲之為嗣王嗣仲壬而王也太甲太丁之子仲壬其叔父也嗣叔父而王而為去聲之服三年之喪為之後者為之子也太甲既即位於仲壬之柩前方居憂於仲壬之殯側伊尹乃至商之祖廟徧祠商之先王而以立太甲告之不言太甲祠而言伊尹喪三年不祭也奉太甲徧見商之先王而獨言祗見厥祖者雖徧見先王而尤致意於湯也亦猶周公金縢之冊雖徧告三王而獨眷眷於文王也湯既已祔于廟則是此書初不廢外丙仲壬之事但此書本為去聲伊尹稱湯以訓太甲故不及外丙仲壬之事爾餘見書序朱子曰春秋書元年春王正月這如何要窮曉得設使聖人復出也便未易理會在丙問孟子集註趙氏曰太丁湯之太子未立而死外立二年仲壬立四年皆太丁弟也徽庵程氏曰古人謂歲為年湯崩時外丙方二歲仲壬方四歲惟太甲差長故立之也先生兩存趙氏程民之説則康節之説亦未可據耶曰也怎生便信得他又問如此則堯即位於申辰年亦未可據也曰此却據諸厯書如此説恐或有之然亦未可必曰若如此則二年四年亦可推矣曰却為中間年代不可紀自共和以後方可紀則湯時自無由可推此類且當缺之不可深究問伊尹祠于先王奉嗣王祗見厥祖是時湯方在殯宫太甲於朝夕奠常在如何伊尹因祠而見之曰此與顧命康王之誥所載免服之事同意古人自有一件人君居喪之禮但今不存無以考據葢天子諸侯既有天下國家事體恐難與常人一般行喪禮伊尹祠于先王若有服不可入廟必有外丙二年仲壬四年新安陳氏曰序言太甲元年序周人所作故稱年書言惟元祀書商史所作故稱祀此元非即位之元年乃即位之次年先王崩崩年即位踰年改元以崩年之十二月為後王元年之首月葢以正朔行事也胡氏安國春秋傳曰國君嗣世定於初喪必踰年然後改元書即位者縁始終之義一年不二君縁臣民之心曠年不可無君也類陳氏大猷曰祠祭也先王商先祖如詩言𤣥王之也喪三年不祭不以凶服入宗廟故太甲不親祠而尹攝祠侯甸舉五服之近者以見其餘胡氏春秋傳謂即位者告廟臨羣臣是也明言烈祖成徳以訓猶五子述禹之戒周召陳文武之業以祖宗艱難起家之事告子孫則莫不信守之也吕氏曰當太甲居喪之始而訓之乘其初心之虚也後雖昏迷而終克終允徳訓之之早故爾曰嗚呼古有夏先后方懋厥徳罔有天災山川鬼神亦莫不寧暨鳥獸魚鼈咸若于其子孫弗率皇天降災假手于我有命造攻自鳴條朕哉自亳詩曰殷監不逺在夏后之世商之所宜監者莫近於夏故首以夏事告之也率循也假借也有命有天命者謂湯也桀不率循先王之道故天降災借手于我成湯以誅之夏之先后方其懋徳則天之眷命如此及其子孫弗率而覆亡之禍又如此太甲不知率循成湯之徳則夏桀覆亡之禍亦可監矣哉始也鳴條夏所宅也亳湯所宅也言造可攻之釁者由桀積惡於鳴條而湯徳之修則始於亳都也陳氏大猷曰方者方見其進而未見其止之意日新而未可量也人君為天地鬼神萬物之主而徳者天地鬼神萬物之理所謂致中和天地位萬物育焉者也即吕氏曰夏先后懋徳如此宜可憑藉桀纔弗率天降災感應之速反覆手爾懋徳而罔災感應之理存於懋徳之中也弗循而降災災咎之理存於弗率之中也造釁雖鳴條一日之間而基本則兆於亳邑之素也之孫氏曰造為攻伐自於鳴條國必自伐然後人伐意陳民雅言曰人君者天地鬼神萬物之主也古有夏先后懋敬其徳謂之方者日新不己之意所謂致中和也於是天道順山川寧而鬼神安所謂天地位也微而羽毛鱗甲之生亦莫不各遂其性所謂萬物育也古有夏先后懋徳之效至於如此惟我商王布昭聖武代虐以寛兆民允懷布昭敷著也聖武猶易所謂神武而不殺者湯之徳威敷著于天下代桀之虐以吾之寛故天下之民信而懷之也陳氏稚言曰不徒謂之武而必謂之聖武以見其出於徳義之勇故能除暴故民以安天下此聖武之實也至於天下之民莫不信而懷之此聖武之效也今王嗣厥徳罔不在初立愛惟親立敬惟長上聲下並同始于家邦終于四海初即位之初言始不可以不謹也謹始之道孝悌而已孝悌者人心之所同非必人人教詔之立植也立愛敬於此而行愛敬於彼親吾親以及人之親長吾長以及人之長始于家達于國終而措之天下矣孔子曰立愛自親始敎民睦也立敬自長始敎民順也吕氏曰告以嗣徳在初欲乘其天理正𤼵之初而開導之也新安陳氏曰此一節言湯以徳得人心今王繼先王之徳當以孝悌之順徳而通乎千萬人之心也陳氏雅言曰即位者嗣徳之始親長者愛敬之始孝悌之道達諸天下而謂之立者盡吾愛親之道於此使天下之愛其親者莫不視我以為法盡吾敬長之道於此使天下之敬其長者莫不視我以為準此即謂之建中建極也愛敬之道既立於此則必形於彼始而一家次而一國終而四海之人莫不各有親也莫不各有長也亦莫不各有愛敬之心也觀感興起孝悌之心油然而生則各親其親各長其長而天下平矣此即大學所謂絜矩之道也嗚呼先王肇修人紀從諌弗咈先民時若居上克明為下克忠與人不求備檢身若不及以至于有萬邦兹惟艱哉人紀三綱五常孝敬之實也上文欲太甲立其愛敬故此言成湯之所修人紀者如下文所云也綱常之理未嘗泯沒桀廢棄之而湯始修復之也咈逆也先民猶前輩舊徳也從諌不逆先民是順非誠於樂音洛善者不能也居上克明言能盡臨下之道為下克忠言能盡事上之心吕氏曰湯之克忠最為難看湯放桀以臣易君豈可為忠不知湯之心最忠者也天命未去人心未離事桀之心曷嘗斯須替哉與人之善不求其備檢身之誠有若不及其處上聲上下人己之間又如此是以徳日以盛業日以廣天命歸之人心戴之由七十里而至於有萬邦也積累上聲之勤兹亦難矣伊尹前既言夏失天下之易音異此又言湯得天下之難太甲可不思所以繼之哉朱子曰湯工夫全在敬字上看得來大段是一箇修飭底人故當時人説他做工夫處亦是説得大段地著如禹克勤于邦克儉于家之類却是大綱説到湯便説檢身若不及利或問如云以義制事以禮制心不邇聲色不殖貨等説可見日新之功曰固是某於或問中所以特地詳載者非説道人不知亦欲學者經心耳與人不求備檢身若不及大槩是湯急已緩人所以引為日新之實相張氏曰君臣父子兄弟夫婦長幼朋友有禮義以維謂之人紀𫝊曰禮義以為紀毫陳氏經曰湯以肇修人紀為一身之任吾身有一之不盡則於人紀必有一毫之虧於是不自足其足從諫求之今未已也又求之古又欲兼天下之善修人己之道不得不然也綱新安陳氏曰人綱與人紀對莫大於三綱故曰人小者為紀綱之紀也修如修道之謂敎之修品節修理之也欲太甲立愛立敬厚於人倫故以湯之修人紀繼之湯以修人紀自任於身吾身有未盡則於人紀必有虧凡於今古之善與處上下人己之間各盡其當然者皆修人紀之實也陳氏推言曰蔡𫝊謂徳日以盛業日以廣此八字是一章闗鍵湯之處上下人己之間各盡其道此徳之盛也由七十里而有天下此業之廣也伊尹告太甲以此意溢言表謂成湯反之之聖也徳之修者尚如此其至而况太甲困知之資可不思所以勉進其徳乎成湯創業之君也業之積者如此甚難而况太甲守成之君可不思所以保守其業乎此伊尹進言之㫖也敷求哲人俾輔于爾後嗣敷廣也廣求賢哲使輔爾後嗣也孫氏曰敷求求之非一方也如立賢無方天陳氏經曰湯得天下也甚難故其慮下也甚逺宜求賢以遺後人也制官刑儆于有位曰敢有恆舞于宫酣歌于室時謂巫風敢有殉松潤反于貨色恒于遊畋時謂淫風敢有侮聖言逆忠直逺于願反耆徳比音被頑童時謂亂風惟兹三風十愆卿士有一于身家必喪去聲邦君有一于身國必亡臣下不匡其刑墨具訓于蒙士官刑官府之刑也巫風者常歌常舞若巫覡形狄反男曰巫女曰覡然也淫過也過而無度也比昵也倒置悖理曰亂好去聲人之所惡去聲惡人之所好也風風化也三風愆之綱也十愆風之目也卿士諸侯十有其一已喪其家亡其國矣墨墨刑也臣下而不能匡正其君則以墨刑加之具詳悉也童蒙始學之士則詳悉以是訓之欲其入官而知所以正諫也異時太甲欲敗度縱敗禮伊尹先見其微故拳拳及此劉侍講曰墨即叔向所謂夏書昏墨賊殺皋陶之刑貪以敗官為墨朱子曰臣下不匡之刑葢施於邦君大夫之喪國亡家者君臣一體不得不然如漢廢昌邑王賀則誅其羣臣而本朝太祖下嶺南亦誅其亂臣龔澄樞李托之類是也又如文定論楚子納孔儀處事雖不同意亦類此試參攷之則知成湯之制官刑正是奉行天討毫髪不差處何疑之有哉吕氏曰古成童習舞恒舞則為愆歌以永言酣歌則為愆前六愆因後四愆而生史氏仲午曰意當時太甲左右必有以歌舞貨色等惑其君者尹未指其人明言姑曰先王之制官刑如此而徐為之謀後遂營桐宫不使狎于弗順焉之西山真氏曰殉如殉𦵏之殉葢以其身陷于貨色中死而不顧也臣下所以不匡以其貪官固位故也不諫之罪與貪墨同使人知不獨貪賄之有罪而貪官不諫亦有刑也薛氏曰善不必小故一日克己天下歸仁惡不必多故有一於身家國必喪虞公以垂棘之璧亡其國吳太宰以越之女色覆其宗先王之戒豈誣也或曰臣下不匡而遽入墨之罪辟無乃過乎曰置臣所以正主也視主入喪亡而不之救其可貸乎重其刑使之進而諫未必死退而不諫必受刑則雖中不欲諫亦不得不諫也唐孔氏曰巫風二淫風四亂風四為愆十風新安陳氏曰湯儆有位之官刑為後嗣慮至矣三十愆以戒卿士邦君而舉以訓太甲者意謂卿士諸侯犯此已足喪家亡國况天子乎微意見矣况不匡刑墨儆臣下者欲其以是儆天子也太甲他時之欲縱尹於此時已窺見其幾微故預為之戒前章述湯徳以勉其善此述湯刑以防其失勉其善在啟𤼵其愛敬之良心防其失在禁遏其欲縱之私心也嗚呼嗣王祗厥身念哉聖謨洋洋嘉言孔彰惟上帝不常作善降之百祥作不善降之百殃爾惟徳罔小萬邦惟慶爾惟不徳罔大墜厥宗歎息言太甲當以三風十愆之訓敬之於身念而忽忘也謨謂其謀言謂其訓洋大孔甚也言其謀訓大明不可忽也不常者去就無定也為善則降之百祥為惡則降之百殃各以類應也勿以小善而不為萬邦之慶積於小勿以小惡而為之厥宗之墜不在大葢善必積而後成惡雖小而可懼此總結上文而又以天命人事禍福申戒之也陳氏大猷曰祗厥身乃指太甲下手用功處一篇之綱領也至孫氏曰以其謀之出於聖人故曰聖謨以其言之美故曰嘉言即指三風十愆之戒也則張氏曰不敬其身必納此身於風愆矣能敬其身能知夏后之懋徳繼先王以嗣徳立愛立敬作善之祥惟徳之慶皆自敬其身出敬立則百善從也惟陳氏經曰既戒以祖訓又戒以天君所當畏惟天祖宗也西王氏十朋曰善祥惡殃天之不常乃所以為常也山真氏曰愆雖有十茍能敬則十者俱泯一不敬則十者俱生故敬之一辭乃治三風砭十愆之藥石也篇將終又深歎聖言之彰明與天命之難保以警動太甲之心冀其必聴真所謂社稷之臣歟新安陳氏曰此篇尹訓太甲於即位之初始終以興亡寓勸戒夏以懋徳興桀以弗率亡初意明矣繼言湯以聖武興而欲太甲以愛敬之良心嗣厥徳勸之也繼言湯以艱難興而防太甲以欲縱之私心敗厥徳戒之也末章作善之降祥爾徳之惟慶勸之保其所以興作不善之降殃不徳之墜宗戒之陷於所以亡而提綱挈領則在祗厥身之一言能祗敬其身則嗣祖徳而興不祗敬其身則背祖徳而亡言言忠愛葢以豫為太甲憂矣但猶包涵未明言之未至如太甲三篇之痛切耳太甲上商史録伊尹告戒節次及太甲往復之辭故三篇相屬成文其間或附史臣之語以貫篇意若史家紀𫝊去聲之所載也唐孔氏曰伊訓肆命徂后太甲咸有一徳皆是告戒太甲不可皆名伊訓故隨事立稱也林氏曰此篇亦訓體今文無古文有朱子曰伊尹之言極痛切遂感𤼵得太甲如此君陳後亦好然皆寛了多是代言如今代王言者做耳伊尹之志公天下以為心而無一毫之私者也新安陳氏曰前一篇作於未遷桐宫之先後二篇作於自桐宫歸亳之後問伊尹放太甲周公攝政事亦相類當時不疑伊尹而疑周公豈世變耶潜室陳氏曰伊尹以義正君其義光明人人信得及周公以恩睦親其心忠愛懇惻間隙易開兼伊尹聖之任視世間一切難事一擔擔了不管人言周公思兼三王百事周密詳細須盡物情所以人或不敢言或敢言要之伊尹如秋冬肅殺周公則太和元氣人之疑不疑聖賢所不計惟嗣王不惠于阿衡阿於何反惠順也阿倚衡平也阿衡商之官名言天下之所倚平也亦曰保衡或曰伊尹之號史氏録伊尹之書先此以𤼵之葉氏曰阿保通阿亦保之意平王氏曰阿大陵之有助者保其君如阿其國如衡猶蘇氏曰阿衡尹之號太公尚父其號也伊尹作書曰先王顧諟天之明命以承上下神祗社稷宗廟罔不祗肅天監厥徳用集大命撫綏萬方惟尹躬克左去聲右厥辟音璧下並同宅師肆嗣王丕承基緒顧常目在之也諟古是字明命者上天顯然之理而命之我者在天為明命在人為明徳伊尹言成湯常目在是天之明命以奉天地神祗社稷宗廟無不敬肅故天視其徳用集大命以有天下撫安萬邦我又身能左右成湯以居民衆故嗣王得以大承其基業也朱子曰古註云顧謂常目在之也此語最好非謂有一物常在目前可見也只是常存此心知得有這道理光明不昧方其靜坐未接物也此理固湛然清明及其遇事而應接也此理亦隨處𤼵見只要人常提撕省察念念不忘存養久之則是理益明雖欲忘之而不可得矣西山真氏曰湯惟顧天之明命故天監湯之厥徳曰顧曰監可見天人之交至近而非逺也新安陳氏曰此言太甲今日之有天下由於先王之明徳以得天下與伊尹之出身以輔先王也有先王創業之祖與伊尹開國之大臣是以嗣王得以承此大業今日豈可忘先王而不念忽尹而不從哉陳氏雅言曰顧諟者即敬也推此心以奉天地神祗社稷宗廟罔不祗肅即所謂顧諟明命也上天監觀聖人之徳故集大命於其身而付以治民之責葢治民事神初無二理誠敬足以事神則未有不能治民者也夫在天為明命在人為明徳聖人於天之明命而曰顧上天與聖人之徳而曰監見天人之交至近而非逺非特聖人之心未嘗少忽乎天而上天之心未嘗或忘乎聖人也太甲今日之有天下由於先王之明徳以得天下其可有一念之不敬哉曰顧諟者如立則見其參於前在輿則見倚於衡之意曰監者昊天曰明及爾出王昊天曰旦及爾游衍之意惟尹躬先見于西邑夏自周有終相去聲亦惟終其後嗣王罔克有終相亦罔終嗣王戒哉祗爾厥辟辟不辟忝厥祖夏都安邑在亳之西故曰西邑夏周忠信也國語曰忠信為周施氏曰作偽心勞日拙則缺露而不周忠信則無偽故能周而無缺夏之先王以忠信有終故其輔相者亦能有終其後夏桀不能有終故其輔相者亦不能有終嗣王其以夏桀為戒哉當敬爾所以為君之道君而不君則忝辱成湯矣太甲之意必謂伊尹足以任天下之重我雖縱欲未必遽至危亡故伊尹以相亦罔終之言深折其私而破其所恃也問古註及諸家皆以周訓忠信切謂以忠信自周則可以忠信訓周恐未安未知如何朱子曰自周二字本不可曉禍蘇氏曰自由也由忠信之道則有終言君臣一體福同也新安陳氏曰既以桀之無終戒之又以不敬而不君者戒之無終則累於相臣不君則辱於乃祖仍是以先王與尹躬儆之也王惟庸罔念聞庸常也太甲惟若尋常於伊尹之言無所念聽此史氏之言問諸家皆以庸字絶句竊謂只作一句讀以庸訓用如説命中王庸作書以告之庸未知是否朱子曰六字一句不西山真氏曰辟不辟之言殆甚於漢人之所謂帝帝也然漢君怒而誅之太甲雖以為常無所念聽然不聞其怒也此所以卒至於思庸歟伊尹乃言曰先王昧爽丕顯坐以待旦旁求俊彦啓迪後人無越厥命以自覆昧晦爽明也昧爽云者欲明未明之時也丕大也顯亦明也先王於昧爽之時洗濯澡雪大明其徳坐以待旦而行之也旁求者求之非一方也彦美士也言湯孜孜為善不遑寧處上聲如此而又旁求俊彦之士以開導子孫太甲毋顛越其命以自取覆亡也陳氏雅言曰聖人之心惟恐脩於己有未至而施於事者有未及故既昧爽而丕顯坐待旦而行之然猶不止此也誠以吾身之徳能脩於吾身而不能使吾之子孫常脩其徳吾之政能行於吾身而不能使吾之子孫常行是政則吾之仁為有限而吾之心為有歉矣乂廣求賢才求之一鄉而不足又求之一國焉求之一國而不足又求之於天下焉夫求之所以如是其廣者誠使吾之子孫得以有所依據欲有為焉則有開而𤼵之者有順而導之者於是吾之子孫可保其徳無不脩政無不行矣此聖人之心也慎乃儉徳惟懷永圖太甲欲敗度縱敗禮葢奢侈失之而無長逺之慮者伊尹言當謹其儉約之徳惟懷永久之謀以約失之者鮮上聲矣此太甲受病之處故伊尹特言之新安陳氏曰永圖即前所謂有終也訓西山真氏曰此太甲不惠于阿衡之時也故伊尹之者如此夫儉則心小而為慮者逺侈則心大而為謀者踈方是時太甲方以欲敗度縱敗禮心為二者所蔽若浮雲之翳日月未知斯言之為忠也一旦處仁遷義而本心復明然後知受病之源端在於此克終之美光昭簡冊伊尹訓戒之功夫豈小哉之陳氏雅言曰𫝊云此太甲受病之處故伊尹特言夫儉者非節儉之儉乃儉約之儉不侈然以自放之謂太甲之病在於欲縱與此相反人能收歛此心使常存於内則精神聚會志慮精明義理昭著言必稽其所從行必稽其所蔽所懐者孰非永圖哉茍此心放辟則昏於欲失於縱宴安鴆毒安其危而利其災樂其所以亡者皆不知永圖矣慎儉徳懷永圖此正太甲對病之藥然古昔聖賢所以進徳之方實不外此臯陶告舜亦曰慎厥身修思永慎厥身修者即慎乃儉徳之謂思永者即懷永圖之謂但臯陶之言渾然不若伊尹嚴切舜與太甲之不同也若虞機張往省息井反括于度則釋欽厥止率乃祖攸行惟朕以懌萬世有辭虞虞人也機弩牙也括矢括説文云矢括築絃處程泰之云矢之尾末岐而銜弦處也也度法度射者之所準望者也釋𤼵也言若虞人之射弩機既張必往察其括之合於法度然後𤼵之則𤼵無不中去聲矣欽者肅恭收歛止見音現虞書率循也欽厥止者所以立本率乃祖者所以致用所謂省括于度則釋也王能如是則動無過舉近可以慰悦尹心逺可以有譽於後世矣安汝止者聖君之事生而知者也欽厥止者賢君之事學而知者也問諸家多訓虞為度切謂只作虞人説如何朱子曰作虞人説為是陳氏大猷曰言欲永終當謹始𤼵也萬事莫不有度君所以為度在敬汝所當止如君止於仁子止於孝之類王氏曰語靜之道則曰慎乃儉徳欽厥止語動之道則曰若虞機張率乃祖攸行世陳氏大猷曰萬世有辭所謂永圖也林氏曰萬有辭所謂相亦惟終也祖新安陳氏曰罔不祗肅言湯之敬也欽厥止率乃攸行勉太甲盡敬以法先王也曰有終曰永圖曰萬世有辭勸之也曰罔克有終曰自覆戒之也此章仍是以先王始之以尹躬結之玊能欽敬而有終先王之望尹之幸也王不能欽敬而自覆非先王之望尹之不能盡其責也尹本自任以天下之重又受先王託孤之重任故告戒之辭節節提起先王而以與尹躬相闗繫收結之陳氏雅言曰此章上兩句設譬以起下兩句若詩之比也射有似乎君子虞人之射既張其機矣然猶必省其括之合于度然後釋之則𤼵無不中矣君子之處事亦猶是也天下之事莫不各有其度人君惟當欽其義理之所止率夫乃祖之所行曰止曰祖即事之度也能欽其止則率其祖之所行祖之所行亦即其所當止也伊尹於此特恐其察之不精止而或非所當止故繼之以率乃祖攸行者所以驗其所止之道地也王未克變不能變其舊習也此亦史氏之言伊尹曰兹乃不義習與性成予弗狎于弗順營于桐宫密邇先王其訓無俾世迷狎習也弗順者不順義理之人也桐成湯墓陵之地伊尹指太甲所為乃不義之事習惡而性成者也我不可使其狎習不順義理之人於是營宫于桐使親近成湯之墓朝夕哀思興起其善以是訓之無使終身迷惑而不悟也陳氏經曰習為不義若與性俱成賈誼曰少成若天性習慣如自然王徂桐宫居憂克終允徳徂往也允信也有諸己之謂信實有其徳於身也凡人之不善必有從臾並上聲序書作慫慂勸也以導其為非者太甲桐宫之居伊尹既使其密邇先王陵墓以興𤼵其善心又絶其比昵音被溺之黨而革其汚染此其所以克終允徳也次篇伊尹言嗣王克終厥徳人曰允徳協于下故史氏言克終允徳結此篇以𤼵次篇之義董氏鼎曰太甲嗣位伊尹已述侮聖言逆忠直逺耆徳比頑童之戒太甲乃不惠阿衡庸罔念聞而狎于不順非亂風之猶存乎茍非伊尹超然深識通權達變為遷桐之舉有以動心忍性増益其所不能其不危乎王新安陳氏曰伊尹此舉葢處君臣之變者身任先託孤之重深軫宗廟顛覆之憂知太甲之性不過中人平日誘以為惡之近習必多而輔以善之大臣尹之外無聞焉孤忠不能勝引誘之衆徒言不能開迷惑之久遂營桐宫以居之如見先王之在前而無羣小之在側善心油然以生而汙習脱然以除此不言之敎達變之權惟自任以天下之重如尹之開國元老大忠至公者能之而非泛然之大臣敢為也又按千古性學開端於若有恒性之一言其次則習與性成之言也恒性以天地之性言孟子性善之論本恒性而言也孔子性近習逺之論自習與性成而發也若有恒性本有善而無惡惟習於惡而後性流於惡其既流也性若成矣然能謹所習而習於善則善反之而天地之性存焉此太甲所以終允徳也天地之性氣質之性雖至橫渠張氏始剖判言之已肇端於湯尹言性之初矣太甲中惟三祀十有二月朔伊尹以冕服奉嗣王歸于亳太甲終喪明年之正朔也冕冠也唐孔氏曰周禮天子六冕備物盡文惟袞冕耳此葢袞冕之服義或然也奉迎也喪既除以袞冕吉服奉迎以歸也作書曰民非后罔克胥匡以生后非民罔以辟四方皇天眷佑有商俾嗣王克終厥徳實萬世無疆之休辟音璧民非君則不能相正以生君非民則誰與為君者言民固不可無君而君尤不可失民也太甲改過之初伊尹首發此義其喜懼之意深矣夫音扶太甲不義有若性成一旦翻然改悟是豈人力所至葢天命眷商隂誘其𠂻故嗣王能終其徳也向也湯緒幾平聲墜今其自是有永豈不為萬世無疆之休乎林氏曰太甲克終厥徳伊尹力也而歸之天者君子能致人於悔過遷善之地不能必其人有悔過遷善之心尹嘗五就桀矣事雖不可見即其感悟太甲者觀之於桀必盡其忠誠矣而桀終不改則太甲悔過庸非天乎湯宜有餘慶故太甲為之孫始皇宜有餘殃故扶蘇為之子天也不陳氏經曰若人事不盡而一切諉於天太甲之書作桐宫之居不營而謂太甲不明天實為之則非聖賢以人合天以義合命之道矣吕氏曰使太甲不改事將若何今既克終喜慰何如哉玩味實字可見新安陳氏曰克終厥徳即前篇所望其有終者也此所謂萬世無疆之休即前篇所望其萬世有辭者也前願之而未得今得遂其所願向也湯緒幾覆今也自是可久先王之望遂矣伊尹之責塞矣其欣幸為何如烏得不因其遷善之一初而許與期望之於悠久也哉王拜手稽首曰予小子不明于徳自底不類欲敗北邁反度縱敗禮以速戾于厥躬天作孽魚列反猶可違自作孽不可逭胡玩反既往背音佩師保之訓弗克于厥初尚賴匡救之徳圖惟厥終拜手首至手也稽首首至地也太甲致敬于師保其禮如此不類猶不肖也多欲則興作而亂法度縱肆則放蕩而隳禮儀度就事言之也禮就身言之也速召之急也戾罪孽災逭逃也既往已往也已往既不信伊尹之言不能謹之於始庶幾正救之力以圖惟其終也當太甲不惠阿衡之時伊尹之言惟恐太甲不聴及太甲改過之後太甲之心惟恐伊尹不言夫太甲固困而知之者然昔之迷今之復昔之晦今之明如日月昏蝕音食一復其舊而光采炫耀萬景俱新湯武不可及已豈居成王之下乎朱子曰古者天子尊師重傅太甲拜手稽首成王拜手稽首疏言稽首稽留之意是首至地之久也西山真氏曰徳者得之於天者也不類猶不肖也天性本善人自昧之則反善而為惡與天不相似矣欲者嗜好也縱者放肆也奉身當有法度嗜好無節則敗度修身當有禮縱肆不恭則敗禮二字乃太甲前日受病之源故至此首以自責新安陳氏曰伊尹雖謂太甲克終厥徳太甲不敢自保方賴伊尹正救以圖惟厥終伊尹拜手稽首曰修厥身先徳協于下惟明后伊尹致敬以復太甲也脩身則無敗度敗禮之事允徳則有誠身誠意之實徳誠于上協和于下惟明后然也新安陳氏曰惟明后與不明于徳相應太甲自謂不明于徳尹遂以脩身協下而為明后者許與期望之脩身本諸身也允徳協下徵諸庶民也誠實之徳孚契人心其身修之驗歟陳氏雅言曰太甲自謂不明于徳故尹隨迎其端而以修身允徳協下者勸勉之復以為明后期望之益能修身而使誠實之徳孚契于人心此惟明后能之非明后不足以及此也惟允徳故能協下徳協下故稱為明后此修身之效驗也先王子惠困窮民服厥命罔有不恱並其有邦厥鄰乃曰徯我后后來無罰此言湯徳所以協下者困窮之民若己子而惠愛之惠之若子則心之愛者誠矣未有誠而不動者也故民服其命無有不得其懽心當時諸侯並湯而有國者其隣國之民乃以湯為我君曰待我君我君來其無罰乎言除其邪虐湯之得民心也如此即仲虺后來其蘇之事朱子曰並其有邦至后來無罰言湯與彼皆有土諸侯而隣國之人乃曰徯我后后來無罰此可見得民心處王懋乃徳視乃烈祖無時豫怠湯之盤銘曰苟日新日日新又日新湯之所以懋其徳者如此太甲亦當勉於其徳視烈祖之所為不可頃刻而逸豫怠惰也張氏曰人志必有所凖的然後能有所立舜不以堯為的則不能重華孔子不以周公為的則不能大成顔孟不以孔子為的則不能𫝊道綂視乃厥祖欲太甲以成湯為的也奉先思孝接下思恭視逺惟明聴徳惟聰朕承王之休無斁音亦思孝則不敢違其祖思恭則不敢忽其臣惟亦思也思明則所視者逺而不蔽於淺近思聰則所聴者徳而不惑於憸思廉反邪此懋徳之所從事者太甲能是則我承王之美而無所厭斁也朱子曰能視逺謂之明所視不逺不謂之明能聴徳謂之聰所聴非徳不謂之聰視聴是物聰明是則視不為惡色所蔽為明聴不為姦人所欺為聰受陳氏大猷曰孝恭聰明懋徳之目人君修徳須就病處藥之太甲前日覆湯典刑不惠阿衡由不思孝思恭也既立不明背棄師訓由視溺於近聴惑於邪也今既盡此四者則病根去而徳成矣尹恥其君不及堯舜太甲徳成尹責始盡是承王之美於無窮也新安陳氏曰伊尹提起先王子惠而勉以視乃厥祖然後以朕承王之休結之仍是以先王尹躬對言以警動期望之也董氏鼎曰太甲之心前日隂霾昏蝕一旦天日開明迪哲之資誠不可及矣孝恭明聰四者修身之要允徳之日也太甲下陳氏大猷曰伊訓作於太甲朱有過之先尹欲預防其縱故其辭嚴太甲上篇作於太甲有過之時尹不欲激之而微轉其機故其辭婉中篇作於悔過之初尹深自喜慰故其辭温下篇作於改過之後尹慮其或不克終故其辭深以厲大臣格言淺深有序葢如此伊尹申誥于王曰嗚呼惟天無親克敬惟親民罔常懷懷于有仁鬼神無常享享于克誠天位艱哉申誥重誥也天之所親民之所懷鬼神之所享皆不常也惟克敬有仁克誠而後天親之民懷之鬼神享之也曰敬曰仁曰誠者各因所主而言天謂之敬者天者理之所在動靜語黙不可有一毫之慢民謂之仁者民非元后何戴鰥音闗寡孤獨皆人君所當恤鬼神謂之誠者不誠無物誠立於此而後神格于彼三者所當盡如此人君居天之位其可易音異而為之哉分而言之則三合而言之一徳而已太甲遷善未幾而伊尹以是告之其才固有大過人者歟西山真氏曰敬誠仁並言始於此三者堯舜禹湯之正𫝊也始吕氏曰君必上得天心下得民心幽得鬼神之心可以當天位天位所以惟難也可陳氏雅言曰天無常親民無常懷鬼神無常享其畏如此太甲居天之位於此三者苟有一毫之不敬不仁不誠則天之親我者安保其常親民之懷我者安保其常懷鬼神之享我者安保其常享是豈可以易而為之哉葢敬者事天之理也仁者治民之理也誠者祭鬼神之理也理無不盡則天無不親民無不懷鬼神無不享矣所謂無常者其機不在我而在彼也曰敬曰仁曰誠機則在我能盡其在我者則無常者為有常矣徳惟治否徳亂與治同道罔不興與亂同事罔不亡終始慎厥與惟明明后治去聲下同否俯久反徳者合敬仁誠之稱也有是徳則治無是徳則亂治固古人有行之者矣亂亦古人有行之者也與古之治者同道則無不興與古之亂者同事則無不亡治而謂之道者葢治因時制宜或損或益事未必同而道則同也亂而謂之事者亡國喪去聲家不過貨色遊畋作威殺戮等事事同道無不同也治亂之分顧所與如何耳始而與治固可以興終而與亂則亡亦至矣謹其所與終始如一惟明明之君為然也上篇言惟明后此篇言惟明明后葢明其所已明而進乎前者矣西山真氏曰與治同道罔不興道指全體而言如堯舜之仁湯武之義是也與亂同事罔不亡事指一事而言如太康畋遊桀紂暴虐之類是也必同道乃興宋襄公以不禽二毛自比文王一事之同而他事之不副其能有興乎苟同事必亡三風十愆或有其一無不亡者葢興之雖而亡之易如此斯天位之所以難歟圖新安陳氏曰此因尚賴匡救圖惟厥終之説而進終之道也圖終之道在常不變其始而已終始慎其所與則不特初心之明而為明后且悠久常保此初心之明而為明明后矣尹葢慮太甲悔艾於初而轉移於終也故言及此先王惟時懋敬厥徳克配上帝今王嗣有令去聲緒尚監兹哉敬即克敬惟親之敬舉其一以包其二也成湯勉敬其徳徳與天合故克配上帝今王嗣有令緒庶幾其監視此也新安陳氏曰此欲太甲與湯之治同道也西山真氏曰惟時云者謂敬徳之外無復他道所以深勉太甲也前言敬仁誠兹獨總之以敬者葢敬而後能仁能誠故也陳氏雅言曰人受天地之中以生莫不有是徳也先王惟能勉敬其徳至於與天為一先王於此非於性分之外別有所増益也其工夫之深至惟在於懋敬而已故能用集大命撫綏萬邦則嗣王今日之繼有天下其可不以先王為監而思所以懋敬其徳求所以克配上帝者乎曰尚監者庶幾其能監視亦期望之辭也伊尹於此語先王用工之要則曰懋敬厥徳語用工之極則曰克配上帝葢徹上徹下以告太甲者也能敬則必能仁而且誠能配上帝則天親民懷而鬼神亦無不享矣𫝊謂舉其一以包其二者此也若升髙必自下若陟遐必自邇此告以進徳之序也中庸論去聲君子之道亦謂譬如行逺必自邇譬如登髙必自卑進徳修業之喻未有如此之切者吕氏曰自此乃伊尹畫一以告太甲也新安陳氏曰觀法先王豈一蹴能至自下自邇欲其希賢進徳之有序也無輕民事惟難無安厥位惟危無毋通毋輕民事而思其難毋安君位而思其危慎終于始人情孰不欲善終者特安於縱欲以為今日姑若是而他日固改之也然始而不善而能善其終者寡矣桐宫之事往已今其即政臨民亦事之一初也新安陳氏曰前言終始慎厥與則慎終為重此言慎終于始則謹始為重固當謹終而常如其始圖終尤當先善其始也有言逆于汝心必求諸道有言遜于汝志必求諸非道鯁音耿直之言人所難受巽順之言人所易音異從於其所難受者必求諸道不可遽以逆于心而拒之于其所易從者必求諸非道不可遽以遜于志而聴之以上五事葢欲太甲矯乎情之偏也朱子曰治道别無説若使人主恭儉好善有言逆于汝心必求諸道有言遜于汝志必求諸非道如何㑹不治這別無説從古來都有見成様子直是如此見西山真氏曰聴言之道當求義理之當不當順意之偏苟合乎理雖逆吾意不可不從苟咈乎理雖順吾意不可不察道陳氏大猷曰忘其言之逆順而揆諸道之當否合則逆者乃所以為遜非道則遜者乃所以為逆前日欲縱之時尹之言固嘗逆心而臣下之言固嘗有遜志者矣故復以為戒嗚呼弗慮胡獲弗為胡成一人元良萬邦以貞胡何也弗慮何得欲其謹思之也弗為何成欲其篤行之也元大良善貞正也一人者萬邦之儀表一人元良則萬邦以正矣陳氏雅言曰所慮所為者即欲其於上文所陳進徳之序矯乎情之偏五事而慮之為之也能慮能為則知行兩盡一人有大善之徳而萬邦有皆正之效所謂勸勉之也君罔以辯言亂舊政臣罔以寵利居成功邦其永孚于休弗思弗為安于縱弛先王之法廢矣能思能為作其聰明先王之法亂矣亂之為害甚於廢也成功非寵利之所可居者至是太甲徳已進伊尹有退休之志矣此咸有一徳之所以繼作也君臣各盡其道邦國永信其休美也吳氏曰上篇稱嗣王不惠于阿衡必其言有與伊尹背音佩違者辯言亂政或太甲所失在此罔以寵利居成功已之所自處者已素定矣下語既非泛論則上語必有為去聲而發也林氏曰自古受託孤之寄者於進退之際可謂至難為幼主者類多血氣未定趨舍未堅苟未能離師輔而不反則吾退而小人乘間以進必將以辯言亂舊政而貽國家之禍矣所以伊尹明告以堅其心而遂示以引身求退之意焉陳氏曰伊尹為桐宫不得已之舉必輕寵利然後可絶天下之疑而杜讒賊之口使功成居之有一毫利之之心則好議論者安知不以前日之事為疑乎所以作書未終而歸志已露也新安陳氏曰老氏云功成而不居蔡澤云四時之序功成者去伊尹聖之任者也耕莘之初天下何與於我自憣然從湯以後則以身任責不容釋矣不幸湯崩主少不明幾覆商祚身任此責愈不容釋矣大不得已置君於桐不容不犯臣子之至難非可諉其責於他人也觀其告戒拳拳言言忠愛必以先王尹躬對言幸而太甲悔過修徳遂亟復政於君欲奉身以退尹至是上無負於先王次無負於太甲下無負於天下以身任重可以釋矣由其任重恐恐不勝之心而復還耕莘囂囂自得之身其欣幸當何如哉此而不退則寧無貪戀寵利之疑置君於桐大不獲已至忠至公之本心誰白之者伊尹可謂自任之重自處之審矣使湯有太甲為之孫而無伊尹為之佐其不一再𫝊而斬者幾希尚何六百年之敢望哉董氏鼎曰伊訓作於太甲嗣位之初重在謹始故曰今王嗣厥徳罔不在初太甲上篇作於不惠阿衡之時重在謹習故曰習與性成予弗狎于弗順中篇作於克終允徳之後重在懋徳故曰王懋乃徳無時豫怠下篇申言懋徳之意重在謹終故曰終始慎厥與又曰慎終于始葢方其未悟也惟恐無以善始及其既悟也又惟恐無以善終伊尹之於太甲先憂而喜後喜而憂拳拳忠愛言有盡而意無窮葢如此咸有一徳伊尹致仕而去恐太甲徳不純一及任用非人故作此篇亦訓體也史氏取其篇中咸有一徳四字以為篇目今文無古文有新安陳氏曰一徳二字實此篇之綱領伊尹既復政厥辟將告歸乃陳戒于徳辟必益反伊尹已還政太甲將告老而歸私邑以一徳陳戒其君此史氏本序曰嗚呼天難諶音忱命靡常常厥徳保厥位厥徳靡常九有以亡諶信也天之難信以其命之不常也然天命雖不常而常於有徳者君徳有常則天命亦常而保厥位矣君徳不常則天命亦不常而九有以亡矣九有九州也蔡氏元度曰常厥徳所謂徳惟一不常厥徳所謂徳二三惟一為能常新安陳氏曰一者無雜無息一可以包常常則一之無間斷者也惟純而不雜所以久而不息夏王弗克庸徳慢神虐民皇天弗保監于萬方啟迪有命眷求一徳俾作神主惟尹躬暨湯咸有一徳克享天心受天明命以有九有之師爰革夏正上文言天命無常惟有徳則可常於是引桀之所以失天命湯之所以得天命者證之一徳純一之徳不雜不息之義即上文所謂常徳也神主百神之主享當也湯之君臣皆有一徳故能上當天心受天明命而有天下於是改夏建寅之正而為建丑正也問咸有一徳竊謂一者是純一而不雜徳至於純一而不雜所謂至徳也所謂純一而不雜者葢歸於至當無二之地無纎毫私意人欲間雜之猶易之恒中庸之誠也説者多以咸有一徳為君臣同徳咸有一徳固有同徳意而一非同也言君臣皆有此一徳而已朱子曰此篇先言常徳庸徳後言一徳則一者常一之謂爰革夏正只是正朔之正暨新安陳氏曰臣當先君後已善則稱君今曰尹躬湯則臣先君曰咸有一徳則臣儕於君何也葢尹聖之任湯學焉而後臣天生齊聖之湯又生元聖之尹君臣同徳聖聖相逢非泛然君臣比也又何區區形跡之嫌哉徳陳氏雅言曰純一之徳者即天之徳也惟與天合故能上達天心明命而能受之九有而能有之則嗣王今日之有天下亦當純一其徳以克享於天然後可以承祖宗之基業膺上天之付托慰生民之屬望此伊尹將致仕而歸恐太甲徳不純一故以成湯一徳之效以為之告而必言尹躬暨湯咸有一徳者亦猶太甲上篇言先王顧諟天之明命而繼之以惟尹躬克左右厥辟宅師之意也非天私我有商惟天佑于一徳非商求于下民惟民歸于一徳上言一徳故得天得民此言天佑民歸皆以一徳之故葢反復音腹言之陳氏雅言曰一徳者天人合應之機也商之君臣惟同有一徳故自然為天所佑為民所歸是則天雖非私於商而不能不私於商之一徳也商雖非求於民而民求歸于一徳也一徳之效固如是其大乎徳惟一動罔不吉徳二三動罔不凶惟吉凶不僭在人惟天降災祥在徳二三則雜矣徳之純則無往而不吉徳而雜則無往而不凶僣差也惟吉凶不差在人者惟天之降災祥在徳故也張氏曰一者純乎天理二三者雜於人欲天理無往而不吉人欲無往而不凶以其體即凶也氏林氏曰降於天者為災祥受於人者為吉凶吕曰一則動皆合理故無不吉二三則動皆背理故凶之陳氏大猷曰徳純乎天理本一而已人欲之私間一者始二三矣新安陳氏曰在人在徳不過分天人平説吉凶不差在人何如吉人則吉凶人則凶天降災祥在徳何如徳一則祥徳二三則災今嗣王新服厥命惟新厥徳終始惟一時乃日新太甲新服天子之命徳亦當新然新徳之要在於有常而已終始有常而無間去聲斷是乃所以日新也朱子曰終始惟一時乃日新這箇道理須是常接續不已方是日新纔有間斷便不可張氏曰此告太甲以繼湯之一徳也太甲即位已久此自復位時言即新服受天命其徳亦當俱新新安陳氏曰太甲復位之初自怨自艾始能自新矣然中或間斷則非日新也湯之盤銘曰苟日新日日新又日新其自儆如此仲虺之誥曰徳日新萬邦惟懐仲虺告湯亦如此是日新乃太甲乃祖之家學也尹以湯之日新望太甲必以湯之一徳勉太甲故時乃日新必先之以終始惟一焉視湯之銘發揮精密陳氏雅言曰此告之以新徳為服命之始也然而太甲自怨自艾處仁遷義而歸則始固能新矣伊尹慮其終或間斷則非純一之徳非日新之道葢惟有一徳然後可謂之日新惟能日新然後方有純一之徳日新者成湯昭徳檢身之工夫也觀盤銘之言仲虺之誥可見伊尹告太甲以一徳而又必告太甲以日新者葢欲其以日新為一徳之要也伊尹此言因其所已能而勉其所未至也任官惟賢才左右惟其人臣為去聲下三字同上為徳為下為民其難其慎惟和惟一賢者有徳之稱才者能也左右者輔弼大臣非賢才之稱可盡故曰惟其人夫音扶人臣之職為上為徳左音佐右厥辟也為下為民所以宅師也不曰君而曰徳者兼君道而言也臣職所係其重如此是必其難其慎難者難於任用慎者慎於聰察所以防小人也惟和惟一和者可否相濟一者終始如一所以任君子也問臣為上為徳為下為民諸家説不同不知此四為字富作如何音朱子曰為字並去聲為上者輔其徳而不阿其意之所欲為下者利於民而不狥已之所安問如逢君之惡也是為上而非是為徳為宫室妻妾之奉也是為下而非是為民曰然伊尹告太甲却是與尋常人説話便恁地分明恁地切身至今看時通上下皆使得至傅説告髙宗語意却深縁髙宗賢明可以説這般話故傅説輔之説得較精微伊尹告太甲前三篇許多説話却從天理窟中抉出許多話分明説與他今看來句句是天理論其難其慎曰君臣上下相與甚難其張氏曰尹欲堯舜其君則為上為徳可知欲堯舜民則為下為民可知者陳氏大猷曰人君莫不欲日新其徳然或不克終由小人蠱之則不間斷於己亦必間斷於人也故又告以用人之道所以貴於用有徳有能而必得其人者葢臣職在於致君澤民為上則欲輔成君徳為下則欲澤潤生民所係之重如此任用之際其難之而不易謹之而不忽待之協和而無乖信之專一而無二此言用人之當一也想新安陳氏曰左右作近習説接下二句不來語録非定説蔡𫝊得之王置諸其左右相成王為左右豈皆近習乎三公官不必備亦曰惟其人葢其選至重必其人足以當之者可也非陳氏雅言曰伊尹既告太甲以一徳又恐其任用人則心志蠱惑徳不能以純一故又告以用人之道任官則必賢才而後可非賢才則不可任也左右則必得其人而後可又非賢才之可比也所以為是者以人臣之職在上則必陳善閉邪獻可替否以成其為君之徳在下則必養之以全其生敎之以復其性而澤潤生民臣職之所係其重如此是豈可輕於任用哉故任用之始必其難其慎以防小人任用之終必惟和惟一以待君子葢言用人之當一也君徳之一未始不由於用人之一用人之一亦足以見其君徳之一徳無常師主善為師善無常主協于克一上文言用人因推取人為善之要無常者不可執一之謂師法協合也徳者善之總稱善者徳之實行胡孟反一者其本原統㑹者也徳兼衆善不主於善則無以得一本萬殊之理善原於一不協于一則無以達萬殊一本之妙謂之克一者能一之謂也博而求之於不一之善約而㑹之於至一之理此聖學始終條理之序與夫子所謂一貫者幾平聲矣太甲至是而得與音預聞焉亦異乎常人之改過者歟張氏曰虞書精一數語之外惟此為精密問徳無常師四句或言主善人而為師若仲尼無常師之意如何朱子曰非也橫渠説徳主天下之善善原天下之一最好四句三段一段𦂳似一段徳且是天體説有吉徳有凶徳然必主於善始為吉爾善亦且是大段説或在此為善或在彼為不善或在前日則不善而今日則為善惟須協于克一是乃為善謂以此心揆度彼善耳故橫渠言原則若善之原於一耳葢善因一而後定也徳以事言善以理言一以心言大抵此篇只是幾箇一字上有精神須與細看此心纔一便終始不變而有常也協字雖訓合字却是以此合彼之合非己相合之合與禮記協於分藝書協時月正日之協同義葢若揆度參驗之意耳張敬夫謂虞書精一四句與此為尚書語之最精密者而虞書為尤精善此言於天下之徳無一定之師惟善是從則凡有皆可師也於天下之善無一定之主惟一其心則其所取者無不善矣協猶齊也如所謂協時月徳無常師四句上兩句是敎人以其所師下兩句是敎人以其所擇善而為之師渠問協于克一莫是能主一則自黙契於善否曰横云徳主天下之善善原天下之一這見得他説得極好處葢從一中流出者無有不善所以伊尹從前面説來便有此意曰常厥徳曰庸徳曰一徳常庸一只是一箇常問横渠之言如何曰一故善一者善之原也善無主如言前日之受非也協于克一如言皆是也葢均是善但易地有不同者故無常主必是合於一乃為至善一者純於理而無二三之謂一則無私欲而純乎義理矣陳氏大猷曰有専一之一終始惟一是也有統一之一協于克一是也無一善之或遺無一息之或間然後盡一徳之全體尹既言惟一之㫖復明協一之義徳之所在初無常師凡主於善皆所當師謂博而取之也善有萬端亦無常主必貴協合統㑹于克一之地謂一以貫之也萬新安陳氏曰理之一本萬殊處擇之貴乎精理之殊一本處融之貴乎一徳無常師主善為師精以擇之也即所謂惟精也善無常主協于克一一以貫之也即所謂惟一也南軒張子謂精一數語外惟此最為精密深味之伊尹之言即自惟精惟一充廣之也伊尹樂堯舜之道淵源甚逺學識甚精今復摘舜禹授受之微㫖以告太甲其欲使是君為堯舜之君之心至老不變也如此夫可夏氏曰學未有得不可執一定之見學既有得不忘一貫之理徳既無常師吾不敢拘凡主於善者皆師之泛觀博取也善雖無常主吾不敢泛必即夫一者而合之反觀約盡也陳氏雅言曰仁義禮智徳也徳何常師之有以言乎仁則自親親仁民以至愛物皆仁之善所當取以為師者也以言乎義則自從兄敬長以至尊賢皆義之善所當取以為師者也則徳主天下之善者無不師而有以盡夫博矣然善亦何常主之有仁之善雖有萬端貫而通之則凡所謂仁者皆本於吾此心之一理也義之善雖有萬緒融而㑹之則凡所謂義者又皆本於吾此心之一理也則善原天下之一者無不協而有以㑹夫約矣葢徳而師於善此資於人者也善而協於一此反諸己者也俾萬姓咸曰大哉王言又曰一哉王心克綏先王之禄永底音㫖烝民之生人君惟其心之一故其發諸言也大萬姓見其言之大故能知其心之一感應之理自然而然以見人心之不可欺而誠之不可掩也禄者先王所守之天禄也烝衆也天禄安民生厚一徳之效驗也陳氏大猷曰咸曰見頌之無間又曰見頌之無己人心孚感若有使之者此一徳之驗綏禄底民此一徳之效陳氏雅言曰人君有純一之徳存諸心則發諸言者大天下之民人聞其言之大而皆曰大哉王言因以知其心之一而又曰一哉王心感應之妙自然而然于以見人心之理無異於君心之理君心之理深契乎民心之理也所謂一徳之感應夫如是先王之禄則克綏之克之云者基圖之鞏固如置諸磐石之壯也烝民之生則永底之永底云者海宇之寧謐如措諸袵席之康也所謂一徳之效驗嗚呼七世之廟可以觀徳萬夫之長可以觀政天子七廟三昭三穆與太祖之廟七七廟親盡則遷必有徳之主則不祧他彫反毁故曰七世之廟可以觀徳天子居萬民之上必政敎有以深服乎人而後萬民悦服故曰萬夫之長上聲可以觀政伊尹歎息言徳政脩否見於後世服乎當時有不可掩者如此后非民罔使民非后罔事無自廣以狹人匹夫匹婦不獲自盡民主罔與成厥功罔使罔事即上篇民非后罔克胥匡以生后非民罔以辟四方之意申言君民之相須者如此欲太甲不敢忽也無毋同伊尹又言君民之使事雖有貴賤不同至於取人為善則初無貴賤之間去聲葢天以一理賦之於人散為萬善人君合天下之萬善而後理之一者可全也苟自大而狹人匹夫匹婦有一不得自盡於上則一善不備而民主亦無與成厥功矣伊尹於篇終致其警戒之意而言外之㫖則又推廣其所謂一者如此葢道體之純全聖功之極致也嘗因是言之以為精粹無雜者一也終始無間者一也該括萬善者一也一者通古今達上下萬化之原萬事之榦語其理則無二語其運則無息語其體則併包而無所遺也咸有一徳之書而三者之義悉備前乎伏羲堯舜禹湯後乎文武周公孔子同一揆也新安陳氏曰觀徳觀政欲太甲致謹於修徳行政之際也徳則一徳政則一徳之見於行事者又謂一徳雖全尤不可以自足矜心一生而匹夫匹婦有懷不得以自盡則一善之或遺即一徳之有虧何以大有成於天下哉此節言后非民民非后及不可使匹夫匹婦不獲自盡其與舜命禹以精一而末及於衆非后何戴后非衆罔與守邦四海困窮天禄永終者亦有合焉伊尹之學其樂堯舜之道而有得豈不信哉書經大全卷四
