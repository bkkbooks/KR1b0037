body:
  text: 書經大全卷六明胡廣等撰周書周文王國號後武王因以為有天下之號書凡三十二篇史記后稷封于邰别姓姬氏𫝊十三世至季歷季歷生昌為西伯西伯崩太子發立是為武王侯陳氏曰文王二十四年生武王四十八年即諸位在位五十年年九十七而終武王年七十三而嗣位嗣位十三年而伐紂為天子七年而終年九十三也泰誓上泰大同國語作大武王伐殷史録其誓師之言以其大會孟津編書者因以泰誓名之上篇未渡河作後二篇既渡河作今文無古文有按伏生二十八篇本無泰誓武帝時僞泰誓出與伏生今文書合為二十九篇孔壁書雖出而未𫝊於世故漢儒所引皆用僞泰誓如曰白魚入于王舟有火復于王屋流為烏太史公記周本紀亦載其語然僞泰誓雖知剽竊音切經傳去聲所引而古書亦不能盡見故後漢馬融得疑其僞謂泰誓按其文若淺露吾又見書𫝊多矣所引泰誓而不在泰誓者甚多至晉孔壁古文書行而僞泰誓始廢吳氏曰湯武皆以兵受命然湯之辭裕武王之辭迫湯之數音所桀也恭武之數紂也傲學者不能無憾疑其書之晚出或非盡當時之本文也朱子曰文王之事紂惟知以臣事君而已都不見其他兹其所以為至德也若謂三分天下紂尚有其二未忍輕去臣位以商之先王德澤未亡厯數未終紂惡未甚聖人若之何而取之則是文王之事紂非其本心蓋有不得已焉耳若是則安得謂之至德哉至于武王之伐紂觀政于商亦豈有取之之心而紂罔有悛心武王灼見天命人心之歸己也不得不順而應之故曰豫弗順天厥罪惟鈞以此觀之足見武王之伐紂順乎天而應乎人無可疑矣此處不容有毫髮之差天理人欲王道霸術之所以分其端待在于此爾易王氏炎曰古文泰字只用大字今文遂以泰大泰者大之至吳氏曰按帝辛本紀稱紂書稱受或二字古通用惟十有三年春大會于孟津十三年者武王即位之十三年也春者孟春建寅之月也孟津見音現下同禹貢按漢孔氏言虞芮如稅反二國名虞在陜之平陸芮在馮翊質成為文王受命改元之年凡九年而文王崩武王立二年而觀去聲兵三年而伐紂合為十有三年此皆惑於僞書泰誓之文而誤解九年大統未集與夫音扶下同觀政于商之語也古者人君即位則稱元年以計其在位之久近常事也自秦惠文始改十四年為後元年漢文帝亦改十七年為後元年自後說春秋因以改元為重歐陽氏曰果重事歟西伯即位已改元年中間不宜改元而又改元至武王即位宜改元而反不改元乃上冒先君之元年并去聲其居喪稱十一年及其滅商而得天下其事大於聽訟逺矣而又不改元由是言之謂文王受命改元武王冒文王之元年者皆妄也歐陽氏之辨極為明著但其曰十一年者亦惑於書序十一年之誤也詳見序篇又按漢孔氏以春為建子之月蓋謂三代改正朔必改月數改月數必以其正為四時之首序言一月戊午既以一月為建子之月而經又係之以春故遂以建子之月為春夫改正朔不改月數於太甲辨之詳矣而四時改易尤為無藝法制也冬不可以為春寒不可以為暖固不待辨而明也或曰鄭氏箋詩維暮之春亦言周之季春於夏為孟春曰此漢儒承襲之誤耳且臣工詩言維暮之春亦又何求如何新畬音余於音烏皇來牟將受厥明蓋言暮春則當治其新畬矣今如何哉然牟麥將熟可以受上帝之明賜夫牟麥將熟則建辰之月夏正季春審矣鄭氏於詩且不得其義則其考之固不審也不然則商以季冬為春周以仲冬為春四時反逆皆不得其正豈三代聖人奉天之政乎朱子曰泰誓序十有一年武王伐殷經云十有三年春大會于孟津必差誤說者乃以十一年為觀兵尤無義理舊有人引洪範十有三祀王訪于箕子則十有一年之誤可知矣問子丑寅之建正如何曰此是三陽之月若秦用建亥之月為正直是無謂大抵三代更易須著如此更易一畨王曰嗟我友邦冢君越我御事庶士明聽誓王曰者史臣追稱之也友邦親之也冢君尊之也越及也御事治平聲事者庶士衆士也告以伐商之意且欲其聽之審也惟天地萬物父母惟人萬物之靈亶丹上聲聰明作元后元后作民父母亶誠實無妄之謂言聰明出於天性然也大哉乾元萬物資始至哉坤元萬物資生天地者萬物之父母也萬物之生惟人得其秀而靈具四端備萬善知覺獨異於物而聖人又得其最秀而最靈者天生聰明無待勉强上聲其知先知其覺先覺首出庶物故能為大君於天下而天下之疲癃殘疾得其生鰥寡孤獨得其養舉萬民之衆無一而不得其所焉則元后者又所以為民之父母也夫音扶天地生物而厚於人天地生人而厚於聖人其所以厚於聖人者亦惟欲其君長上聲乎民而推天地父母斯民之心而已天之為去聲民如此則任元后之責者可不知所以作民父母之義乎商紂失君民之道故武王發此是雖一時誓師之言而實萬世人君之所當體念也朱子曰氣質之性古人雖不曾說著考之經典却有此意如惟人萬物之靈亶聰明作元后天乃錫王勇智皆此意也湯武征伐皆先自說一段義理父新安陳氏曰萬物莫不禀氣於天受形於地乾稱坤稱母此天地所以為萬物一大父母也也孫氏曰天地能生萬物而不能成所以成之者君唐氏曰配天地以作民父母與易象言后以財成天地之道輔相天地之宜以左右民者一也陳氏經曰人者萬物之一也物得氣之偏人得氣之全此人性所以獨靈于物然人雖有此靈有不能保此靈者必得聰明之君以父母之斯民始得以各全其靈聰明亦靈也聖人先得我心之所同然而為靈之靈者耳吕氏曰此雖誓師之辭乃六經之統攝百王之標凖子碧梧馬氏曰作民父母一語武王以之首泰誓箕以之終皇極陳氏雅言曰造化生物之仁聖人養民之仁亶聰明作元后者天之意也作民父母者君之責也天地為萬物之父母聖人為萬民之父母武王於誓師之首言此以見人君當與天地同其德而盡君師之責也今商王受弗敬上天降災下民受紂名也受是酉反孔𫝊云受紂也音相亂馬氏曰受讀曰紂鄭氏云紂帝乙之子帝乙愛而欲立之號曰受後時人轉稱為紂言紂慢天虐民不知所以作民父母也慢天虐民之實即下文所云也沈湎音免冒色敢行暴虐罪人以族官人以世惟宫室臺榭陂班糜反池侈服以殘害于爾萬姓焚炙之石反忠良刳音枯剔它歷反孕婦皇天震怒命我文考肅將天威大勳未集沈湎溺于酒也冒色冒亂女色也族親族也一人有罪刑及親族也世子弟也官使不擇賢才惟因父兄而寵任子弟也土高曰臺有木曰榭澤障曰陂停水曰池侈奢也焚炙炮烙音庖洛刑之類刳剔割剝也皇甫謐音密云紂剖比干妻以視其胎未知何據紂虐害無道如此故皇天震怒命我文考敬將天威以除邪虐大功未集而文王崩愚謂大勳在文王時未嘗有意至紂惡貫盈武王伐之叙文王之辭不得不爾學者當言外得之問諸儒之說以為武王未誅紂則稱文王為文考以明文王在位未嘗稱王之證及既誅紂乃稱文考為文王然既曰文考則其諡定矣若如其言將稱為文公耶朱子曰此等事無證佐皆不可曉闕之可也文武無伐紂之心而天與之人歸之其勢必誅紂而後已故有肅將天威大勳未集之語但紂罪未盈天命未絶故文王猶得以三分之二而服事紂若使文王未崩十二三年紂惡不悛天命已絶則孟津之事文王亦豈得而辭哉以此見文武之心未嘗不同皆無私意視天與人而已便因說文王事商曰文王且是做得從容不迫武王去伐商太猛耳文王伐崇伐密戡黎等事又自顯然書說王季勤勞王家詩云太王翦商都是他子孫自說不成他子孫誣其父祖春秋分明說泰伯不從是不從甚底事若泰伯當武王之世也只是為諸侯但時措之宜聖人又有不得已處橫渠云商之中世都棄了西方之地不管他所以戎狄復進入中國太王所以遷於岐然岐下也只是箇荒涼之地太王自去立箇家計如此雖陳氏大猷曰敬者萬善之本不敬者萬惡之本人至愚猶知敬天今紂天且不敬宜其衆惡日深也肆豫小子發以爾友邦冢君觀政于商惟受罔有悛音筌心乃夷居弗事上帝神祗遺厥先宗廟弗祀犧牲粢音咨盛音成既于凶盜乃曰吾有民有命罔懲音澄其侮肆故也觀政猶伊尹所謂萬夫之長可以觀政八百諸侯背商歸周則商政可知先儒以觀政為觀兵誤矣悛改也夷蹲踞音存句也武王言故我小子以爾諸侯之向背觀政之失得於商今諸侯背叛既已如此而紂無有悔悟改過之心夷踞而居廢上帝百神宗廟之祀犧牲粢盛以為祭祀之備者皆盡于凶惡盜賊之人即箕子所謂攘竊神祗之犧牷牲者也受之慢神如此乃謂我有民社我有天命而無有懲戒其侮慢之意朱子曰伊川謂無觀政之事非深見文武之心不能及此非謂存名教而發也若有心要存名教而於事實有所改易則夫子之録泰誓武成而不存名教甚矣近世有存名教之說大害事將聖人心迹都做兩截看了殊不知聖人所行便是名教若所行如此而所教如彼則非所以為聖人矣今程子曰觀政之說必無此理如今日天命絶則紂日便是獨夫豈容更留之三年今日天命未絶便是君也為之臣子者敢以兵脅君乎不林氏曰夷如原壤夷俟之夷紂不祀武伐之如葛祀湯伐之也天佑下民作之君作之師惟其克相上帝寵綏四方有罪無罪豫曷敢有越厥志佑助寵愛也天助下民為之君以長之為之師以教之君師者惟其能左右上帝以寵安天下則夫有罪之當討無罪之當赦我何敢有過用其心乎言一聽於天而已朱子曰這箇道理雖人所固有若非聖人如何得如此光明盛大你不曉得我說在這裏教你曉你不會做底我做下樣子在此與你做只是要持守這箇道理教他常立在世間上柱天下柱地常如此端正才一日無人維持便顚倒了少間腳柱天頭柱地顚倒錯亂便都壞了所以說天佑下民作之君作之師惟其克相上帝寵綏四方天只得生你付得這道理與你做與不做却在你做得好也由你做得不好也由你所以又為之立君師以作成之既撫養你又教導你使無一夫不遂其性如堯舜之時真箇是寵綏四方只是世間不好底人不定疉底事才遇堯舜都安帖平定了所以謂之克相上帝蓋助上帝之所不及也自秦漢以來講學不明世之人君固有因其才智做得功業然無人知明德新民之事君道間有得其一二而師之道則絶無矣道陳氏經曰後世之君刑政徒尚教化不立不知師不盡則不足以盡君道矣武王之意謂紂既不能當君師之任則任君師獨不在我乎我當相天以討紂之有罪而綏定天下之無罪者所不得而私也使陳氏雅言曰天能與人以耳目口鼻之形而不能之無飢餓凍餒之患天能賦人以仁義禮智之性而不能使之無氣禀物欲之蔽故立之君以養之為之師以教之為君師者當曰天之命我者非以君位而貴我非以師位而尊我惟其能相上帝之所不及撫養之使無一之不遂其生教導之使無一之不成其性然後可以無負乎上天立君師之意蓋是時紂暴虐君師之道廢故武王誓師之際首及乎此同力度德同德度義受有臣億萬惟億萬心豫有臣三千惟一心度量度也德得也行道有得於身也義宜也制事達時之宜也同力度德同德度義意古者兵志之詞武王舉以明伐商之必克也林氏曰左氏襄三十一年魯穆叔曰年鈞擇賢義鈞以卜昭二十六年王子朝曰年鈞以德德鈞以卜蓋亦舉古人之語文勢正與此同百萬曰億紂雖有億萬臣而有億萬心衆叛親離寡助之至力且不同況德與義乎林氏曰凡勝負之理力同則有德者勝德同則有義者勝度德校善惡也度義校曲直也介軒董氏曰行道有得於身身當作心按孟子曰道若大路然邵子曰道猶路也萬古在前萬世在後誰能不由此道而行凡日用事物當然之理決不可不由者是之謂道道乃衆人公共之路必須能行此道而有得於吾心然後可謂之德禮記鄉飲酒曰德者得也得於吾身也朱子暮年榜公堂取據於德一條改有得於身為有得於心仍俾六經用此為通例禮記其身已是切己終必曰心益見向裏下工夫耳新安陳氏曰此謂百萬曰億洛誥中又謂十萬曰億韋昭注楚語曰十萬曰億古數也秦改制始以萬萬為億今解尚書合主十萬為億之說百萬為億未見所本商罪貫盈天命誅之豫弗順天厥罪惟鈞貫通盈滿也言紂積惡如此天命誅之今不誅紂是長惡也其罪豈不與紂鈞乎如律故縱者與同罪也唐孔氏曰紂之惡如繩貫物其貫已滿豫小子夙夜祗懼受命文考類于上帝宜于冢土以爾有衆底天之罰祗音支底致也冢土大社也祭社曰宜上文言縱紂不誅則罪與紂鈞故此言豫小子畏天之威早夜敬懼不敢自寧受命於文王之廟告于天神地祗以爾有衆致天之罰於商也王制曰天子將出類乎上帝宜乎社造七到反乎禰受命文考即造乎禰也王制以神尊卑為序此先言受命文考者以伐紂之舉天本命之文王武王特禀文王之命以卒其伐功而已陳氏經曰紂之惡在不敬上天文王之德在肅將天威武王之德在夙夜祗懼敬與不敬聖狂分焉興亡判焉天矜音京于民民之所欲天必從之爾尚弼豫一人永清四海時哉弗可失天矜憐於民民有所欲天必從之今民欲亡紂如此則天意可知爾庶幾輔我一人除其邪穢音畏永清四海是乃天人合應之時不可失也林氏曰天之立君専以為民故武王於一篇之中三致意焉首言元后作民父母以見紂之不能為民父母也次言作之君師以見紂之不能為君師也末言民欲天必從以見民之欲亡紂而伐之必克也去一紂則惡根除故永清四海堯授舜舜授禹天實與之則堯舜不可失其與之之時湯放桀武王伐紂天實奪之則湯武不可失其取之之時故韓獻子曰文王率商之叛國以事紂惟知時也禮運亦曰堯授舜舜授禹湯放桀武王伐紂時也陳氏經曰君源也民流也源清則流清四海本清紂汙濁之伯夷太公所以避之以待天下之清也去紂而除其穢惡則清其源而天下清矣泰誓中惟戊午王次于河朔羣后以師畢㑹王乃㣘循去聲師而誓戊音茂次止徇循也河朔河北也戊午以武成考之是一月二十八日唐孔氏曰左莊三年凡師一宿為舍再宿為信過信為次此直取止舍之義非春秋三日例也子林氏曰漢律歷志曰周師初發以殷之十一月戊後三日得周正月辛卯朔至戊午渡孟津孟津去周九百里師行日三十里凡三十一日渡河三日三誓師上篇不言日以中篇考當是丁巳日在河南將渡孟津時誓而後渡河也中篇是戊午既渡而次河北所誓下篇戊午明日將趨商郊誓而後行也三令五申謹之至也曰嗚呼西土有衆咸聽朕言周都豐鎬其地在西從武王渡河者皆西方諸侯故曰西土有衆吕氏曰上篇言友邦冢君御事庶士先諸侯而後西土之人所以明尊卑之分也中下篇先及西土立法自近者始誓新安陳氏曰伐紂之誓凡四上篇併諸侯凡從者之中下篇惟誓西伯所統者至牧誓又併諸侯凡從者誓之篇末軍法甚明我聞吉人為善惟日不足凶人為不善亦惟日不足今商王受力行無度播棄犂老昵比音溺備罪人淫酗音煦肆虐臣下化之朋家作仇音求脅權相滅無辜音孤籲音喻天穢德彰聞惟日不足者言終日為之而猶為不足也將言紂力行無度故以古人語發之無度者無法度之事播放也犂黧通黑而黃也微子所謂耄遜于荒是也老成之臣所當親近者紂乃放棄之罪惡之人所當斥逐者紂乃親比之酗醉怒也肆縱也臣下亦化紂惡各立朋黨相為仇讐脅上權命以相誅滅流毒天下無辜之人呼天告寃腥穢之德顯聞于上吕氏曰為善至極則至治馨香為惡至極則穢德彰聞惟天惠民惟辟奉天有夏桀弗克若天流毒下國天乃佑命成湯降黜夏命言天惠愛斯民君當奉承天意昔紂不能順天流毒下國故天命成湯降黜夏命惟受罪浮于桀剝喪去聲元良賊虐諫輔謂己有天命謂敬不足行謂祭無益謂暴無傷厥鑒惟不逺在彼夏王天其以豫乂民朕夢協朕卜襲音習于休祥戎商必克浮過剝落喪去也古者去國為喪元良微子也諫輔比干也謂己有天命如答祖伊我生不有命在天之類下三句亦紂所嘗言者鑒視也其所鑒視初不在逺有夏多罪天既命湯黜其命矣今紂多罪天其以我乂民乎襲重平聲也言我之夢協我之卜重有休祥之應知伐商而必勝之也此言天意有必克之理張氏曰即所謂商鑒不逺在夏后之世邑林氏曰其者未定之辭猶曰天其永我命于兹新言之于未然之前辭當如此戎新安胡氏曰蔡𫝊言伐商以伐訓謂以兵戎伐之也受有億兆夷人離心離德豫有亂臣十人同心同德雖有周親不如仁人夷平也夷人言其智識不相上下也治亂曰亂十人周公旦召音邵公奭音式太公望畢公榮公太顛閎夭散上聲宜生南宫適其一文母孔子曰有婦人焉九人而已劉侍讀以為子無臣母之義蓋邑姜也九臣治外邑姜治內言紂雖有夷人之多不如周治臣之少而盡忠也周至也紂雖有至親之臣不如周仁人之賢而可恃也此言人事有必克之理朱子曰馬氏云亂治也或曰亂本作乿古治字天視自我民視天聽自我民聽百姓有過在豫一人今朕必往過廣韻曰責也武王言天之視聽皆自乎民今民皆有責於我謂我不正商罪以民心而察天意則我之伐商斷都玩反必往矣蓋百姓畏紂之虐望周之深而責武王不即拯己於水火也如湯東面而征西夷怨南面而征北狄怨之意天視自我民視天聽自我民聽或問此若有不同如何朱子曰天豈曾有耳目以視聽只是自民之視聽便是天之視聽如帝命文王豈天諄諄然命之只是文王要恁地便是理合恁地便是帝命之也又曰若一件事民人皆以為是便是天以為是若民人皆歸往之便是天命之也此處甚微故其理難看亦問天視天聽謂天即理也曰天固是理然蒼蒼者是天在上而有主宰者亦是天各隨他所說今既曰視聽即理又如何會視聽雖說不同又却只是一箇知其同不妨其為異知其異不害其為同有過恐只如萬方有罪之意耳新安陳氏曰百姓王氏曰在豫一人蓋以其身任天下之責不如是不足以為天吏也我武惟揚侵于之疆取彼凶殘我伐用張于湯有光揚舉侵入也凶殘紂也猶孟子謂之殘賊武王弔民伐罪於湯之心為益明白於天下也自世俗觀之武王伐湯之子孫覆湯之宗社謂之湯讐可也然湯放桀武王伐紂皆公天下為心非有私於己者武之事質之湯而無愧湯之心驗之武而益顯是則伐商之舉豈不於湯為有光也哉朱子曰武王威武奮揚侵彼紂之疆界取其殘賊而殺伐之功因以張大比於湯之伐桀又有光焉勗哉夫子罔或無畏寧執非敵百姓凛凛力錦反若崩厥角嗚呼乃一德一心立定厥功惟克永世勗勉也夫子將去聲士也勉哉將士無或以紂為不足畏寧執心以為非我所敵也商民畏紂之虐凛凛若崩摧其頭角然言人心危懼如此汝當一德一心立定厥功以克永世也林氏曰考之孟子疑此二篇必有所增損潤色其字大抵相同其意㫖則有不同者蓋康誥伏生所𫝊泰誓孔壁續出孔氏為隸古定其聞必有不能曉而以意增損者則今泰誓康誥與孟子所舉不同者以此幸董氏鼎曰勗哉數語固不以至仁伐至不仁而萌勝輕敵之心亦不以羣臣同心同德而忘一德一心之戒聖人之重用民命臨事而懼也如此泰誓下時厥明王乃大巡六師明誓衆士厥明戊午之明日也古者天子六軍大國三軍是時武王未備六軍牧誓叙三卿可見此曰六師者史臣之詞也王曰嗚呼我西土君子天有顯道厥類惟彰今商王受狎侮五常荒怠弗敬自絶于天結怨于民天有至顯之理其義類甚明至顯之理即典常之理也紂為君臣父子兄弟夫婦典常之道褻狎侮慢荒棄怠惰無所敬畏上自絶于天下結怨于民結怨者非一之謂下文自絶結怨之實也林氏曰君子統上下而言越王句踐伐吳以其私卒君子六千人為中軍則士卒亦可言君子斫音酌朝涉之脛形定下定二反剖賢人之心作威殺戮毒痡音敷四海崇信姦回放黜師保屏音丙棄典刑囚奴正士郊社不修宗廟不享作竒技淫巧以悅婦人上帝弗順祝降時喪去聲爾其孜孜奉豫一人恭行天罰斫斫也孔氏曰冬月見朝涉水者謂其脛耐寒斫而視之史記云比干强諫紂怒曰吾聞聖人心有七竅遂剖比干觀其心痡病也作刑威以殺戮為事毒病四海之人言其禍之所及者逺也回邪也正士箕子也郊所以祭天社所以祭地竒技謂竒異技能淫巧為過度之巧列女傳紂膏銅柱下加炭令有罪者行輒墮炭中妲己乃笑夫欲妲己之笑至為炮烙之刑則其竒技淫巧以悅之者宜無所不至矣祝斷音煅也言紂於姦邪則尊信之師保則放逐之屏棄先王之法囚奴中正之士輕廢奉祀之禮專意汚褻音烏泄之行胡孟反悖亂天常故天弗順而斷然降是喪去聲亡也爾衆士其勉力不怠奉我一人而敬行天罰乎古人有言曰撫我則后虐我則讐獨夫受洪惟作威乃汝世讐樹德務滋除惡務本肆豫小子誕以爾衆士殄殱乃讐爾衆士其尚迪果毅以登乃辟功多有厚賞不迪有顯戮洪大也獨夫言天命已絶人心已去但一獨夫耳孟子曰殘賊之人謂之一夫武王引古人之言謂撫我則我之君也虐我則我之讐也今獨夫受大作威虐以殘害于爾百姓是乃爾之世讐也務専力也植德則務其滋長上聲去上聲惡則務絶根本兩句意亦古語喻紂為衆惡之本在所當去故我小子大以爾衆士而殄絶殱滅汝之世讐也迪蹈登成也殺敵為果致果為毅爾衆士其庶幾蹈行果毅以成汝君若功多則有厚賞非特一爵一級而已不迪果毅則有顯戮謂之顯戮則必肆諸市朝音潮以示衆庶西山真氏曰武王舉古人之言以明民之常情如此若君民之分豈以虐我而遂讐之哉然君民之分不可恃而民之常情不可不察也嗚呼惟我文考若日月之照臨光于四方顯于西土惟我有周誕受多方若日月照臨言其德之輝光也光于四方言其德之逺被也顯于西土言其德尤著於所發之地也文王之地止於百里文王之德達于天下多方之受非周其誰受之文王之德實天命人心之所歸故武王於誓師之末歎息而言之陳氏雅言曰此武王稱文王聖德輝光被于逺而著于近故能受天命而得民心也豫克受非豫武惟朕文考無罪受克豫非朕文考有罪惟豫小子無良無罪猶言無過也無良猶言無善也商周之不敵久矣武王猶有勝負之慮恐為文王羞者聖人臨事而懼也如此林氏曰聖人至誠畏懼之心充實於中則發于言自然如此非有一毫作僞於其間也小董氏鼎曰事幸而集則文考之功不幸不集則豫子之過善則稱親過則稱己禮所當然也又按三篇三數紂之惡發舒萬民之氣天怒已極人怨已深不待牧野之戰而天下已無商矣嗚呼豈非萬世之永鑑哉牧誓牧地名在朝歌南即今衛州治之南也武王軍於牧野臨戰誓衆前既有泰誓三篇因以地名别之今文古文皆有陳氏曰禹征苖誓只數語甘誓湯誓則一篇武王之誓至四篇世愈降而文愈繁也時甲子昧爽王朝至于商郊牧野乃誓王左杖黃鉞音越右秉白旄以麾曰逖矣西土之人甲子二月四日也昧冥爽明也昧爽將明未明之時也鉞斧也以黃金為飾王無自用鉞之理左杖以為儀耳旄軍中指麾白則見逺麾非右手不能故右秉白旄也按武成言癸亥陳于商郊則癸亥之日周師已陳牧野矣甲子昧爽武王始至而誓師焉曰者武王之言也逖逺也以其行役之逺而慰勞去聲之也林氏曰言日不言月上本泰誓文也孔氏曰牧野紂近郊三十里也王曰嗟我友邦冢君御事司徒司馬司空亞旅師氏千夫長百夫長司徒司馬司空三卿也武王是時尚為諸侯故未備六卿唐孔氏曰司徒主民治徒庶之政令司馬主兵治軍旅之誓戒司空主土治壘壁以營軍亞次旅衆也大國三卿下大夫五人士二十七人亞者卿之二大夫是也旅者卿之屬士是也師氏以兵守門者猶周禮師氏王舉則從者也千夫長統千人之帥百夫長統百人之帥也及庸蜀羌髳音矛微盧彭濮音卜人左傳庸與百濮伐楚庸濮在江漢之南羌在西蜀髳微在巴蜀盧彭在西北武王伐紂不期㑹者八百國今誓師獨稱八國者蓋八國近周西都素所服役乃受約束以戰者若上文所言友邦冢君則泛指諸侯而誓者也陳氏曰文王化行江漢自北而南故八國皆來助舉其逺則近者可知蘇氏曰楚飢庸與百濮伐之庸上庸縣濮即百濮又楚伐羅羅與盧戎兩軍之蓋南蠻之屬楚者羌先零罕开之屬彭今屬武陽有彭亡髳微缺則知此數國皆西南之夷稱爾戈比去聲爾干立爾矛豫其誓稱舉戈㦸干楯豎尹反矛亦㦸之屬長二丈唐孔氏曰戈短人執以舉之故言稱楯則並以扞音旱敵故言比矛長立之於地故言立器械嚴整則士氣精明然後能聽誓命王曰古人有言曰牝音品雞無晨牝雞之晨惟家之索昔洛反索蕭索也牝雞而晨則陰陽反常是為妖孽而家道索矣將言紂惟婦言是用故先發此今商王受惟婦言是用昏棄厥肆祀弗答昏棄厥遺王父母弟不迪乃惟四方之多罪逋逃是崇是長上聲是信是使是以為大夫卿士俾暴虐于百姓以姦宄音軌于商邑肆陳答報也婦妲丹入聲己也列女傳云紂好去聲酒淫樂音洛不離音利妲己妲己所舉者貴之所憎者誅之惟妲己之言是用故顛倒昏亂祭所以報本也紂以昏亂棄其所當陳之祭祀而不報昆弟先王之𦙍也紂以昏亂棄其王父母弟而不以道遇之廢宗廟之禮無宗族之義乃惟四方多罪逃亡之人尊崇而信使之以為大夫卿士使暴虐于百姓姦宄于商邑蓋紂惑於妲己之嬖音閉背音佩常亂理遂至流毒如此也孫氏曰泰誓言紂之惡終于悅婦人牧誓言紂之惡始於用婦言豈非紂之終始出於此乎臨川吳氏曰四方多罪之人逃亡而歸紂者乃尊寵而任用之以之居顯位俾毒民為毒也此言紂反人道之常天罰所宜加也傳新安陳氏曰厥遺王父母弟如左所謂先君之遺姑姊妹今豫發惟恭行天之罰今日之事不愆于六步七步乃止齊焉夫子勗哉愆過勗勉也步進趨也齊齊整也今日之戰不過六步七步乃止而齊此告之以坐作進退之法所以戒其輕進也不愆于四伐五伐六伐七伐乃止齊焉勗哉夫子伐擊刺也少不下四五多不過六七而齊此告之以攻殺擊刺之法所以戒其貪殺也上言夫子勗哉此言勗哉夫子者反覆成文以致其丁寧勸勉之意下倣此王氏炎曰六步七步足法也六伐七伐手法也吕氏曰大司馬之法伍兩卒旅各有其長使止齊之者使其部伍之長各自止其止各自齊其齊故當戰時井然有序不失紀律三軍如一人尚桓桓如虎如貔音皮如熊如羆音卑于商郊弗迓克奔以役西土勗哉夫子桓胡官反桓桓威武貌貔執夷也虎屬欲將去聲士如四獸之猛而奮擊于商郊也迓迎也能奔來降音杭者勿迎擊之以勞役我西土之人此勉其武勇而戒其殺降也陳氏大猷曰用兵以制節為尚以武勇為主武王慮其或拘故喻以虎貔之勇又慮過于勇而妄殺故以殺降為戒爾所弗勗其于爾躬有戮弗勗謂不勉於前三者愚謂此篇嚴肅而溫厚與湯誓誥相表裏真聖人之言也泰誓武成一篇之中似非盡出一人之口豈獨此為全書乎讀者其味之王氏曰功多厚賞前誓已言此不再言而獨言有戮者軍事以嚴終亦威克厥愛之意董氏鼎曰此臨戰誓師之辭杖鉞秉旄所以肅己之容稱戈比干立矛所以肅人之容軍容既肅然後發命則又無譁而聽者審矣自古人有言至恭行天罰所以聲罪致討而激士卒之義也自今日之事至乃止齊焉所以明審法令而示行陳之禮也自勗哉以下又勉之以臨陳之勇撫衆之仁也以至仁伐至不仁而謹畏戒懼尚如此斯其為王者之師歟武成史氏記武王往伐歸獸祀羣神告羣后與其政事共為一書篇中有武成二字遂以名篇今文無古文有問武成一篇諸家多以為錯簡然反覆讀之竊以為自王若曰以後皆是史官歷叙以前之事雖作武王告羣臣之辭而實史官叙述之文故其間如有道曽孫周王發及昭我周王之語皆是史官之言非武王當時自稱如此也亦如五誥中王若曰以下多是周公之語若如此看則是不必改移亦自可讀又既生魄恐是晦日既者言其魄之既足也以厯推之當為四月晦未知此篇先生尋常如何看朱子曰王若曰以下固是告羣臣之辭兼叙其致禱之辭亦與湯誥相類但此辭却無結殺處只是叙其功烈政事之美又書戊午癸亥甲子日辰亦非誥命之體恐須事有錯簡然自王氏程氏劉原父以下所定亦各不同舊嘗考之劉以為王語之末有缺文似得之彼有七經小𫝊否可檢看又漢書厯志謂是嵗有閏亦是也吕氏曰武成見武王有取商之規模有定商之規模取商以至公大義定商以常典成法秦晉隋亦能一天下而亡不旋踵蓋無以定之也惟一月壬辰旁死魄越翼日癸巳王朝步自周于征伐商一月建寅之月不曰正而曰一者商建丑以十二月為正朔故曰一月也詳見太甲泰誓篇壬辰以泰誓戊午推之當是一月二日死魄朔也二日故曰旁死魄翼明也先記壬辰旁死魄然後言癸巳伐商者猶後世言某日必先言某朔也周鎬京也在京兆鄠縣上林即今長安縣昆明池北鎬陂是也朱子曰漢志引武成篇惟一月壬辰旁死魄若翌日癸巳武王乃朝步自周于征伐商又曰越若來三月既死魄粵五日甲子咸劉商王紂又曰惟四月既旁生魄粵六日庚戌武王燎于周廟翌日辛亥祀于天位粵五日乙卯乃以庶國祀馘于周廟又畢命豐刑曰惟十有二年六月庚午朏王命作策豐刑今按伏生今文尚書無武成獨孔氏古文尚書乃有此篇今顔氏注劉歆所引兩節見其與古文不同遂皆以為今文尚書不知何所考也諸家推厯以為此年二月有閏四月丁未為十九日庚戌為二十二日然二日皆在生魄之後則古文為倒而此志所引者為順但其言燎于周廟似無理耳況古文此篇文皆錯謬安知既生魄庶邦冢君暨百工受命于周十四字非本在示天下弗服之下丁未祀于周廟之上而王若曰以下乃大告武成之文耶此王氏日休曰翼輔也以此日為主則明日為輔翼日者故以明日為翼日唐孔氏曰舉事貴早朝故皆言朝厥四月哉生明王來自商至于豐乃偃武修文歸馬于華山之陽放牛于桃林之野示天下弗服華去聲哉始也始生明月三日也豐文王舊都也在京兆鄠縣即今長安縣西兆靈臺豐水之上周先王廟在焉山南曰陽桃林今華陰縣潼關也樂記曰武王勝商渡河而西馬散之華山之陽而弗復乘牛放之桃林之野而弗復服車甲釁釁同而藏之府庫倒載干戈包以虎皮天下知武王之不復用兵也此當在萬姓悅服之下唐孔氏曰生明死魄俱是月初上云死魄此云生明互言耳吕氏曰但歸放用以伐紂之牛馬耳天子十二間與丘甸之賦自不廢與晉武平吳而去武備唐穆平兩河而銷兵不同王氏曰軍行戰車用馬任載之車用牛服乘用也急於偃武如此見以兵定天下非其本心也丁未祀于周廟邦甸侯衛駿荀俊反奔走執豆籩越三日庚戌柴望大告武成駿爾雅曰速也周廟周祖廟也武王以克商之事祭告祖廟近而邦甸逺而侯衛皆駿奔走執事以助祭祀豆木豆籩竹豆祭器也既告祖廟燔柴祭天望祀山川以告武功之成由近而逺由親而尊也此當在百工受命于周之下陳氏曰歸馬放牛此偃武之事祀于周廟以下皆修文之事男唐孔氏曰六服侯甸采衛要此舉其要既生魄庶邦冢君暨百工受命于周生魄望後也四方諸侯及百官皆於周受命蓋武王新即位諸侯百官皆朝見新君所以正始也此當在示天下弗服之下問生明生魄如何朱子曰日為魂月為魄魄是黯處魄死則明生書所謂哉主明是也老子所謂載營魄載如人載車車載人之載月受日之光魂加於魄魄載魂也明之生時大盡則初二小盡則初三月受日之光常全人望在下却在側邊了故見其盈虧不同或云月形如餅非也筆談云月形如彈丸其受光如粉塗一半月去日近則光露一屑漸逺則光漸大且如月在午日在酉則是近一逺三謂之弦至日月相望則去日十矣故謂之望日往西而月在東人在下面得以望見其光之全月之中有影者蓋天包地外地形小日在地下則月在天中日甚大從地四面光起其影則地影也地礙日之光所謂山河地影是也如星亦受日光凡天地之光皆是日光也自十六日生魄之後其光之逺近如前之弦謂之下弦至晦則日與日相疊月在日後光盡體伏矣新安陳氏曰諸家多謂生魄望後也而不察既字以望與既望例之則哉生魄十六日既生魄十七日也夏氏又謂既盡也與舜典既月同謂盡此生魄以後之日殊不知此既字乃已然之辭與食之既既月不同其實十七日受命十九日丁未祀周廟簡倒耳所以云此當在示天下弗服之下而丁未祀于周廟當在百工受命于周之下也王若曰嗚呼羣后惟先王建邦啓土公劉克篤前烈至于太王肇基王迹王季其勤王家我文考文王克成厥􅈴誕膺天命以撫方夏大邦畏其力小邦懷其德惟九年大統未集豫小子其承厥志羣后諸侯也先王后稷武王追尊之也后稷始封於邰故曰建邦啓土公劉后稷之曾孫史記云能修后稷之業太王古公亶父也避狄去邠音賓居岐邠人仁之從之者如歸市詩曰居岐之陽實始翦商太王雖未始有翦商之志然太王始得民心王業之成實基於此王季能勤以繼其業至於文王克成厥功大受天命以撫安方夏大邦畏其威而不敢肆小邦懷其德而得自立自為西伯專征而威德益著於天下凡九年崩大統未集者非文王之德不足以受天下是時紂之惡未至於亡天下也文王以安天下為心故豫小子亦以安天下為心此當在大告武成之下問先生近定武成新本朱子曰前輩定本更差一節王若曰一段或接于征伐商之下以為誓師之辭或連受命于周之下以為命諸侯之辭以為誓師固當錯連下說了以為命諸侯之辭者此去祭日只爭一兩日無緣有先誥命之理某看郤諸侯來便教他助祭此是祭畢臨遣之辭當在大誥武成之下比前輩只差此一節下周自積纍以來其勢日大又當商家無道之時天趨周其勢自爾至於文王三分天下有其二以服事商孔子乃稱其至德若非文王亦須取了孔子稱至德只二人皆可為而不為者也問文王更在十三四年將終事紂乎抑為武王牧野之舉乎曰看文王亦不是安坐不做事底人如詩中言文王受命有此武功既伐于崇作邑于豐則武功都是文王做來詩載武王武功郤少但卒其伐紂耳觀文王一時氣勢如此度必不終竟休了一似果實文王待他十分黃熟自落下來武王却似生拍破一般王商紂之世文王三分天下有其二以服事商至武十三年乃伐紂而有天下張子曰此事間不容髮一日之間天命未絶則是君臣當日命絶則為獨夫然命之絶否何以知之人情而已諸侯不期而會者八百武王安得而止之哉詳考詩書所載則文武之心可見若使文王漠然無心于天下則三分之二亦不當有矣此等處難說孔子謂可與立未可與權到那時事勢自是要住不得後來人把文王說得忒恁地郤做一箇不做聲不做氣如此形容文王都沒情理以詩書考之全不是如此如伐崇一節不是一項小小侵掠又如說侵自阮疆看見都自據有其土地這自大段施張了事勢自是不可已只當商之季七顛八倒上下崩頽忽于岐山下突出許多人也是誰當得歐陽氏曰漢儒謂西伯受命稱王十三年者妄也以紂之暴虐西伯不難遂執而囚之至其叛已稱王反優容不問者十三年此豈近于人情乎孔子曰三分天下有其二以服事殷使西伯不稱臣而稱王安能服事商乎謂西伯稱王起于何說而孔子之言萬世之信也夷齊義士也方其辭國而去聞西伯之賢共往歸之使西伯稱王是僭叛之國二子不以為非依之久而不去至武王發紂始以為非不非其父而非其子此豈近於人情耶泰誓稱十有三年說者因謂文王受命九年及武王居喪三年并數之爾故以西伯聽虞芮之訟謂之受命以為元年古者人君即位必稱元年西伯即位久矣中間不宜改元而又改元至武王即位宜改元而反不改元乃上冒先君之元年并其居喪稱十一年及其滅商而得天下其事大於聽訟逺矣而又不改元由是言之謂文王受命改元武王冒文王之元年者皆妄也學者知西伯生不稱王中間不再改元則詩書所載燦然不誣矣孔子當衰周之時患衆說之紛紜惑亂當世故修六經以示信萬世孔子沒去聖稍逺諸家小說復興與六經相亂自漢以來莫能辨正今卓然一信於六經則十有三年武王即位之十三年爾復何疑哉新安陳氏曰后稷稱先王如周語云昔我先王后稷又云我先王不窋韋昭注王之先祖故稱王商頌亦以契為𤣥王是也武王告諸侯謂周之基業自后稷公劉太王王季文王建之篤之基之勤之成之有自來矣我不過承先志而為之耳意謂十五六世數千百年積德纍功前作後述以有今日非一朝一夕之崛起以聳動諸侯之聽也文陳氏曰大邦以力自强遇文王而力無所施故以王為可畏而有以畏其力小邦以德望人遇文王而獲適所願故以文王為可懷而有以懷其德文王初無心於德力之辨也底商之罪告於皇天后土所過名山大川曰惟有道曾孫周王發將有大正于商今商王受無道暴殄天物害虐蒸民為天下逋逃主萃淵藪音叟豫小子既獲仁人敢祗承上帝以遏亂略華夏蠻貊音陌罔不率俾底至也后土社也勾龍為后土周禮大祝云王過大山川則用事焉孔氏曰名山謂華大川謂河蓋自豐鎬往朝歌必道華涉河也曰者舉武王告神之語有道指其父祖而言周王二字史臣追增之也正即湯誓不敢不正之正萃聚也紂殄物害民為天下逋逃罪人之主如魚之聚淵如獸之聚藪也仁人孔氏曰太公周召之徒略謀略也俾廣韻曰從也仁人既得則可以敬承上帝而遏絶亂謀內而華夏外而蠻貊無不率從矣或曰太公歸周在文王之世周召周之懿親不可謂之獲此蓋仁人自商而來者愚謂獲者得之云爾即泰誓之所謂仁人非必自外來也不然經傳豈無𫝊乎此當在于征伐商之下林氏曰稱有道曾孫本其祖父而言言己乃有道之人之曾孫明周之世世修德有道非一世也復齊董氏曰下言受無道故於此言有道亦對稱之辭曾孫主祭者之稱曲禮外事曰曾孫某侯某詩甫田曰曾孫不怒左哀二年蒯瞶臨戰禱辭亦稱曾孫曰葉氏曰湯伐桀曰聿求元聖武王伐紂既獲仁人恭天成命肆豫東征綏厥士女惟其士女篚厥𤣥黃昭我周王天休震動用附我大邑周成命黜商之定命也篚竹器𤣥黃色幣也敬奉天之定命故我東征安其士女士女喜周之來筐篚盛其𤣥黃之幣明我周王之德者是蓋天休之所震動故民用歸附我大邑周也或曰𤣥黃天地之色篚厥𤣥黃者明我周王有天地之德也此當在其承厥志之下朱子曰商人而曰我周王猶商書所謂我后也陳氏曰成命一定不易決於伐商也肆遂也武王為西伯紂在東故曰東征士女猶曰男女詩中士多連女言之惟爾有神尚克相豫以濟兆民無作神羞既戊午師逾孟津癸亥陳于商郊俟天休命甲子昧爽受率其旅若林會于牧野罔有敵于我師前徒倒戈攻于後以北血流漂杵音飄處一戎衣天下大定乃反商政政由舊釋箕子囚封比干墓在衛州汲縣式商容閭散鹿臺之財發巨橋之粟大賚來去聲于四海而萬姓悅服休命勝商之命也武王頓兵商郊雍容不迫以待紂師之至而克之史臣謂之俟天休命可謂善形容者矣若林即詩所謂其會如林者紂衆雖有如林之盛然皆無有肯敵我師之志紂之前徒倒戈反攻其在後之衆以走自相屠戮遂至血流漂杵史臣指其實而言之蓋紂衆離心離德特劫於勢而未敢動耳一旦因武王弔伐之事始乘機投隙奮其怨怒反戈相戮其酷烈遂至如此亦足以見紂積怨于民若是其甚而武王之兵則蓋不待血刃也此所以一被兵甲而天下遂大定乎乃者繼事之辭反紂之虐政由商先王之舊政也式車前橫木有所敬則俯而憑之商容商之賢人閭族居里門也賚豫也武王除殘去暴顯忠遂良賑音振窮賙乏澤及天下天下之人皆心悅而誠服之帝王世紀云殷民言王之於仁人也死者猶封其墓況生者乎王之於賢人也亡者猶表其閭況存者乎王之於財也聚者猶散之況其復籍之乎唐孔氏曰是為悅服之事此當在罔不率俾之下朱子曰血流漂杵孟子說盡信書不如無書者只緣當時恁地戰鬭殘戮恐當時人以此為口實故說此然看上文自說前徒倒戈攻于後以北不是武王殺他乃紂之人自蹂踐相殺荀子云所以殺之者非周人也商人也觀武王興兵初無意于殺人所謂今日之事不愆于六伐七伐乃止齊焉是也武王之心非好殺也杵或作鹵楯也一戎衣言一著戎衣以伐紂也唐孔氏曰周語曰王以二月癸亥夜陳未畢而雨是雨而畢陳清蔡氏元度曰詩云肆伐大商會朝清明蓋謂雨止明也林氏曰武云臨戰不敢以勝自必俟天之佑已而勝之此謂俟天之休命先儒雨止畢陳蓋過論也周師未嘗血刃而紂衆自相屠僇人心之叛啇歸周如此是即天命去商佑周之驗也天之休命豈不昭然在此哉陳氏曰先驅商之平民陳後乃紂之惡黨民怨之深遂因此易鄉反攻之李氏曰湯伐夏曰纘禹舊服武王伐商曰反商政政由舊禹湯所行桀紂棄之湯武服之適所以為之資耳新安陳氏曰萬姓悅服實總結乃反商政以下數句大學平天下一章不過好惡財用二者與天下為公而已釋箕子至發粟賚四海皆反商政之大者釋箕子以下好惡與民為公也散財以下財用與民為公也董氏鼎曰漢高入關除苛解嬈與父老約法三章得武王反商政之意獨不能由舊襲用秦法所以周不愧商而漢有愧于周也列爵惟五分土惟三建官惟賢位事惟能重民五教惟食喪祭惇信明義崇德報功垂拱而天下治列爵惟五公侯伯子男也分土惟三公侯百里伯七十里子男五十里之三等也建官惟賢不肖者不得進位事惟能不才者不得任五教君臣父子夫婦兄弟朋友五典之教也食以養生喪以送死祭以追逺五教之事所以立人紀而厚風俗聖人之所甚重焉者惇厚也厚其信明其義信義立而天下無不勵之俗有德者尊之以官有功者報之以賞官賞行而天下無不勸之善夫分封有法官使有要五教修而三事舉信義立而官賞行武王於此復何為哉垂衣拱手而天下自治矣史臣述武王政治之本末言約而事博也如此哉此當在大邑周之下而上猶有缺文按此篇編簡錯亂先後失序今考正其文于後新安陳氏曰所重教食喪祭四者證以堯曰可見重五教而次以食則斯民日用飲食遍為爾德否則君不君臣不臣雖有粟吾得而食諸食足矣即繼以慎終之喪報本之祭皆所以感發斯人之良心而維持天下之教化也天王氏曰惇厚其信使天下不趨于詐顯明其義使下不徇於利崇德使人知所以尚賢報功使人知所以勸忠見吕氏曰武王至此夫何為哉無為而天下自治以武王能還唐虞風俗於千載之下武王與堯舜氣象不同矣終篇一語堯舜無為之治乃恍然若存焉陳氏雅言曰聖人詳於有為然後可以享夫無為蓋有為者所以致無為之本無為者所以收有為之效吕氏言武成篇末有堯舜氣象信斯言也今考定武成惟一月壬辰旁死魄越翼日癸巳王朝步自周于征伐商底商之罪告于皇天后土所過名山大川曰惟有道曾孫周王發將有大正于商今商王受無道暴殄天物害虐蒸民為天下逋逃主萃淵藪豫小子既獲仁人敢祗承上帝以遏亂略華夏蠻貊罔不率俾惟爾有神尚克相豫以濟兆民無作神羞既戊午師逾孟津癸亥陳于商郊俟天休命甲子昧爽受率其旅若林會於牧野罔有敵于我師前徒倒戈攻于後以北血流漂杵一戎衣天下大定乃反商政政由舊釋箕子囚封比干墓式商容閭散鹿臺之財發巨橋之粟大賚于四海而萬姓悅服厥四月哉生明王來自商至于豐乃偃武修文歸馬于華山之陽放牛于桃林之野示天下弗服既生魄庶邦冢君暨百工受命于周丁未祀于周廟邦甸侯衛駿奔走執豆籩越三日庚戌柴望大告武成王若曰嗚呼羣后惟先王建邦啓土公劉克篤前烈至於大王肇基王迹王季其勤王家我文考文王克成厥勳誕膺天命以撫方夏大邦畏其力小邦懷其德惟九年大統未集豫小子其承厥志恭天成命肆豫東征綏厥士女惟其士女篚厥𤣥黃昭我周王天休震動周附我大邑周列爵惟五分土惟三建官惟賢位事惟能重民五教惟食喪祭惇信明義崇德報功垂拱而天下治按劉氏王氏程子皆有改正次序今參考定讀如此大略集諸家所長獨四月生魄丁未庚戌一節今以上文及漢志日辰推之其序當如此耳疑先儒以王若曰宜繫受命于周之下故以生魄在丁未庚戌之後蓋不知生魄之日諸侯百工雖來請命而武王以未祭祖宗未告天地未敢發命故且命以助祭乃以丁未庚戌祀于郊廟大告武功之成而後始告諸侯上下之交神人之序固如此也劉氏謂豫小子其承厥志之下當有缺文以今考之固所宜有而程子從恭天承命以下三十四字屬音燭于其下則已得其一節而用附我大邑周之下劉氏所謂缺文猶當有十數語也蓋武王革命之初撫有區夏宜有退托之辭以示不敢遽當天命而求助於諸侯且以致其交相警敕之意略如湯誥之文不應但止自序其功而已也列爵惟五以下又史官之辭非武王之語讀者詳之朱子曰武成月日以孔注漢志參考大抵多同但漢志二月既死魄越五日甲子為差速而四月既生魄與丁未庚戌小不同耳蓋以上文一月壬辰旁死魄推之則二月之死魄後五日且當為辛酉或壬戌而未得為甲子此漢志之誤也又以一月壬辰二月甲子并閏推之則漢志言四月既生魄越六日庚戌當為二十二日而經以生魄居丁未庚戌之後則恐經文倒也歷法雖無四月俱小之理然亦不過先後一二日耳不應所差如此之多也宗廟內事日用丁巳漢志乃無丁未而以庚戌燎于周廟則為剛日非所當用而燎又非宗廟之禮且以翌日辛亥祀于天位而粵五月乙卯又祀馘于周廟則六日之間三舉大祭禮數而煩近于不敬抑亦經文所無有不知劉歆何所据也顔注以為今文尚書則伏生今文二十八篇中本無此篇顔氏之云又未知其何所据也讀者詳之洪範漢志曰禹治洪水錫洛書法而陳之洪範是也史記武王克殷訪問箕子以天道箕子以洪範陳之按篇內曰而曰汝者箕子告武王之辭意洪範發之於禹箕子推衍增益以成篇歟今文古文皆有朱子曰洪範一篇首尾都是歸皇極上去蓋人君以一身為至極之標準最是不易又須斂是五福所以斂聚五福以為皇極之本又須是敬五事順五行厚八政協五紀以結裹箇皇極又須乂三德使事物之接剛柔之辨須區處教合宜稽疑便是考之於神庶徴便是驗之于天五福是體之于人這下許多是維持這皇極讀洪範且各還他題目一則五行二則五事三則八政四則五紀五則皇極至其後庶徴五福六極乃權衡聖道而著其驗耳得說洪範曰看來古人文字也不被人牽强說出只是恁地熟讀少間字字都自㑹著實又曰今人只管要說治道這是治道最切緊處這箇若理㑹不通又去理會甚麼零零碎碎陳氏大猷曰箕子之陳洪範文王之演易嘗當殷之末周之初也惟十有三祀王訪于箕子商曰祀周曰年此曰祀者因箕子之辭也箕子嘗言商其淪喪去聲我罔為臣僕史記亦載箕子陳洪範之後武王封于朝鮮史記索隱音潮仙以有山水故名而不臣也蓋箕子不可臣武王亦遂其志而不臣之也訪就而問之也箕國名子爵也蘇氏曰箕子之不臣周也而曷為為去聲武王陳洪範也天以是道畀之禹𫝊至於我不可使自我而絶以武王而不𫝊則天下無可𫝊者矣故為箕子之道者𫝊道則可仕則不可朱子曰柯國材言武王伐殷序謂十有一年書謂十有三年序不足憑洪範謂十有三祀則十三年明矣必是當年初克商便釋箕子囚而問之若十一年釋了十三年方問他不應如此遲遲此說有理伊川說周書惟十有三祀與惟十有一年三與一須有一字錯泉州高某說一字錯孔氏曰箕子稱祀不忘本張氏曰稱祀不稱年稱王訪箕子而不稱箕子朝王稱王乃言而後箕子乃言深見箕子為天下萬世大法不得已之意稱陳氏經曰稱祀者存商之舊見箕子義當不屈也訪者就而見不敢屈而致見武王義當有所屈也箕子之不屈其守正不撓當如是也武王之有所屈其尊德樂道不如是不足與有為也新安陳氏曰武王下車之初以道統為重即就問箕子孟子所謂不召之臣欲有謀焉則就之者也雖封朝鮮終稱箕子而洪範終篇稱武王曰而曰汝而自稱我終不臣周也不臣周所以正萬世君臣之大法陳洪範所以𫝊萬世天人之大法歟想陳氏雅言曰十有三祀即泰誓載武王伐紂之年其散財發粟之後偃武修文之時箕子之囚既釋而其罔為臣僕之志終不渝也武王於此知其賢不可得而臣而其道則當師也於是不遑他務首屈身以訪之誠以為君而不知為治之道何以為君可謂知所先務矣史臣録其問答以為此篇不稱十有三年而稱十有三祀不稱箕子朝于王而稱王訪于箕子蓋深見箕子不臣周為天下萬世大計而為武王陳洪範之意亦深見武王遂箕子不成之志為天下萬世大計而就見箕子以訪道之意可謂善記載者矣唐孔氏謂此篇不是史官叙述必是箕子既對武王之問退而自撰其事故稱祀夏氏謂古者史官於人君言動無不書者豈有武王訪箕子其事如此之大史乃不録而箕子自録之理此說極是且如孔說則於惟十有三祀一句雖說得通而於王訪于箕子一句說不通矣此亦可辨王乃言曰嗚呼箕子惟天陰騭音陟下民相去聲協厥居我不知其彝倫攸敘乃言者難辭重其問也箕子稱舊邑爵者方歸自商未新封爵也騭定協合彝常倫理也所謂秉彝人倫也武王之問蓋曰天於冥冥之中默有以安定其民輔相保合其居止而我不知其彝倫之所以叙者如何也朱子曰彝倫指洪範九疇而言切意箕子在商潛心九疇之學如文王之潛心于八卦殷滅之後武王恐其學不𫝊故訪而問之且退托于不知以發其言新安陳氏曰斯民之生其上棟下宇羣居聚處是孰使之然哉天意之陰騭默相蓋存乎其間而常理即寓乎其間理雖高出乎無極太極之表而其實不離乎日用常行之間武王於陰騭相協而繼以彝倫之所以叙攸者何也即所以然之意武王其默識之矣姑退托於不知以問耳陰陳氏雅言曰此武王訪於箕子之辭武王意謂天騭下民而相協其居人君代天理物必仰承天意以治民而使其居之順其常得其正以無負上天陰騭相協之心者其道在於叙其秉彝人倫也我欲叙之不知所以叙之之道當如何此問箕子以為治之道也箕子於是告以洪範九疇為為治之大法蓋九疇之叙即彝倫之所叙也箕子乃言曰我聞在昔鯀陻音因洪水汩音骨陳其五行帝乃震怒不畀洪範九疇彝倫攸斁音妬鯀則殛音擊死禹乃嗣興天乃錫禹洪範九疇彝倫攸叙乃言者重其答也陻塞汩亂陳列畀與洪大範法疇類斁敗錫賜也帝以主宰言天以理言也洪範九疇治天下之大法其類有九即下文初一至次九者箕子之答蓋曰洪範九疇原出于天鯀逆水性汩陳五行故帝震怒不以與之此彝倫之所以敗也禹順水之性地平天成故天出書于洛禹别之以為洪範九疇此彝倫之所以叙也彝倫之叙即九疇之所叙者也按孔氏曰天與禹神龜負文而出列於背有數至九禹遂因而第之以成九類易言河出圗洛出書聖人則之蓋治水功成洛龜呈瑞如簫韶奏而鳯儀春秋作而麟至亦其理也世𫝊戴九履一左三右七二四為肩六八為足即洛書之數也問洪範之書林氏以為洛出書之說不可深信又帝乃震怒不畀洪範九疇彝倫攸斁猶言天奪之監也天乃錫禹洪範九疇彝倫攸叙猶言天誘其衷也又云洪範之書大抵發明彝倫之叙本非由數而起又曰天乃錫禹洪範九疇猶言天乃錫王勇智耳不必求之太深也某竊謂易明言河出圗洛出書豈得不之信耶未知林說如何望折衷朱子曰便使而今天錫洛書若非天啓其心亦無人理會得兩說似不可偏廢也鯀禹皆治水天不以開發鯀而以開發禹故言畀不畀要之洛書乃天下之至理鯀不順是理自無可得之道禹順是理自有可得之道畀不畀一歸之天者特言理之至公無私爾問鯀既被誅禹又出而委質不知如何曰蓋前人之愆又問禹以鯀為有罪而又蓋其愆非顯父之惡否曰且如而今人其父打碎箇人一件家事其子買來填還此豈是顯父之惡中問箕子為武王陳洪範言彝倫攸叙見事事物物得其倫理則無非此道非道便無倫理曰便是裏劉氏歆曰河圗洛書相為經緯八卦九章相為表蘇氏洵曰五行一疇耳一汨而九不畀蓋五行綱九疇目綱壞而目廢也吕氏曰洪水陻而五行汨便見五行一源以堯舜之時法度彰禮樂著彝倫何嘗斁此只就鯀身上說自斁一身之彝倫爾陳氏曰九疇謂之彝倫蓋天下自然之理也聖人推之天下則為彝倫勒之於書則為洪範西山真氏曰龜所負者數爾大禹聖人心與天通見其數而知其理因次之以為九類即今九疇是也新安陳氏曰帝即天也天者理而已水五行之首鯀乃陻之一行汨而餘皆汨是逆理而獲罪於天故天不畀以九疇謂洛不為之出書天錫禹九疇即洛出書也且天錫之惟有洛書之九數自禹則之則為洪範之九疇推道之大原出於天故謂之天錫禹云爾日節初齊氏曰彝倫乃天理之自然而人類之所一不可無者也問天乃錫禹洪範九疇或謂是即洛書不知經何取證潛室陳氏曰天以洛書之數闡道之祕聖人以洪範叙道之用道非數不闡數非疇不叙疇非聖人不能明其用也易大𫝊曰洛出書聖人則之今觀神龜負文而出列於背有數自戴九履一左三右七二四為肩六八為足而五則居其中各有定位而縱橫錯綜其數皆十五非有次第之叙也自禹欲因之以明大法遂因而第之以成九疇而洛書之序始有條而不紊故以洛書之一居初而則之曰此五行也以洛書之二居次而則之曰此五事也以其三又居次而曰此八政也以其四又居次而曰此五紀也以其五乂居次曰此皇極也下四疇皆自然要之自一至九洛書之本數加初次於上者乃禹之所以次第之疇凡言數者未有言初次其上既次其數又復加初次者非贅也蓋别初次為禹之次第而九者之數則洛書之本文也洛書之文具此章而讀者不明其讀洛書當以初一次二為讀槩以為禹叙九疇而不悟其中含洛書至以洛書為不經無據之誕說是不精洪範之學者孔安國注九疇為洛書注初次為禹所第次法則注一五行以下為箕子所演最為得之臨川吳氏曰洛書不出於鯀治水之時而出於禹治水之時是天不以畀鯀而以錫禹也洛書不出洪範不作人不得見此常道之次序所謂斁也洛書出洪範作人皆得見此常道之次序所謂叙也然洛之出書不過龜背有一二三四五六七八九之文而已五行至六極皆禹所分配則洪範之書禹所自作也今曰天錫禹何也蓋禹心得此道前此未嘗為書因龜文有九感觸其心遂作洪範九疇雖禹之自為然實因龜文發之若天啓其衷云爾故為天所錫也初一曰五行次二曰敬用五事次三曰農用八政次四曰協用五紀次五曰建用皇極次六曰乂用三德次七曰明用稽疑次八曰念用庶徴次九曰嚮用五福威用六極此九疇之綱也在天惟五行在人惟五事以五事參五行天人合矣八政者人之所以因乎天五紀者天之所以示乎人皇極者君之所以建極也三德者治之所以應變也稽疑者以人而聽於天也庶徴者推天而徴之人也福極者人感而天應也五事曰敬所以誠身也八政曰農所以厚生也五紀曰協所以合天也皇極曰建所以立極也三德曰乂所以治民也稽疑曰明所以辨惑也庶徴曰念所以省息井反驗也五福曰嚮所以勸也六極曰威所以懲也五行不言用無適而非用也皇極不言數非可以數明也本之以五行敬之以五事厚之以八政協之以五紀皇極之所以建也乂之以三德明之以稽疑驗之以庶徴勸懲之以福極皇極之所以行也人君治天下之法是孰有加於此哉問洪範諸事朱子曰此是箇大綱目天下之事其大者大槩備於此矣又問皇極曰此是人君為治之心法周禮一書只是箇八政而已初一次二此讀也全讀是以一二為次第不見洛書本文又不見聖人法象之義故後人至以此章總為洛書本文皆為句讀不明也洛書本文只有四十五㸃班固云六十五字皆洛書本文古字畫恐自有模樣但今無所考漢儒說此未是恐只是以義起之不是數如此蓋皆以天道人事參互言之五行最急故第一五事又參之於身故第二一身既修可推之於政故八政次之政既成又驗之於天道故五紀次之又繼之以皇極居五蓋能推五行敬五事厚八政修五紀乃所以建極也六三德乃是權衡此皇極者也德既修矣稽疑庶徴繼之者著其驗也又繼之以福極則善惡之效至是不可加矣皇極非大中皇乃天子極乃極至言皇建此極也東西南北到此恰好乃中之極非中也但漢儒雖說作中字亦與今不同如云五事之中是也今人說中只是含糊依違善不必盡賞惡不必盡罰如此豈得謂之中凡數自一至五五居中自九至五五亦居中戴九履一左三右七五亦在中若有前四者則方可以建極前四者乃一五行二五事三八政四五紀是也後四者却自皇極中出三德是皇極之權人君所嚮用五福所威用六極此曾南豐所說惟此說好箕子為武王陳洪範首言五行次便及五事蓋在天則是五行在人則是五事五氣運行而人禀之以成形於是有五事故次二曰敬用五事用者人所有事也凡用皆主人君而言德雖應變無方而事又有非人謀所能決者故當謀之鬼神故次七曰稽疑洛書者大禹治水之時神龜負文而列於背禹則之而為疇也洛書本無文字但有竒耦之數自一至九其數如此禹叙而次第之以其一居初而為五行以其二居次而為五事三又次之而為八政四又次之而為五紀五又次之而為皇極六又次之而為三德七又次之而為稽疑八又次之而為庶徴九居次之末而為福極自一至九洛書之本數初次者禹次第之文五行以下即禹法則之事蓋因洛書自然之數而垂訓于天下復世也若其效法次第之義大抵因洛書之位與數而為之洛書一位在子其數則水之生數氣之始也故為五行五行則陽變陰合交運而化生萬物則為人事之始矣二位在坤其數則火之生數氣之著也故為五事五事則五氣運行人之禀形賦色妙合而凝修身踐形之道立矣三位在卯其數則木之生數氣至此而益著也故為八政八政則修身不止於貌言視聽思之事而立經陳紀創法立度舉而措之天下矣四位在巽其數則金之生數氣至此而著益久也故為五紀五紀則治不止於食貨政教之事而察數觀象治厯明時仰以觀於天文矣五居中央為八數之中縱橫以成十五之變蓋土之冲氣所以管攝四時故為皇極耳則人君居至尊之位立至理之準使四方之面內環觀者皆於是而取則所以總攝萬類也六位在乾其數則水之成數氣合而成形也故為三德三德則不徒立至極之準而臨機制變隨事制宜且盡其變於人矣七位在酉火之成數氣合而形已著矣故為稽疑稽疑則不徒順時措之宜而嫌疑猶豫且決之人謀鬼謀而盡其變於幽明矣八位在艮木之成數氣合而形益著矣故為庶徴庶徴則往來相蕩屈伸相感而得失休咎之應定矣九位在午其數則金之成數氣合而著已久矣故為福極福極則休咎得失不徒見於一身而通行於天下矣其事廣大悉備故居終焉大抵九疇之序順而言之則五行為始故五行不言用不言用者乃衆用之所自出錯而言之則皇極為統故皇極不言數不言數者乃衆數之所由該以五行為始則自一至九愈推愈廣大衍相乘之法也以皇極為統則生數主常成數主變太極動靜之分也九疇本於洛書者如此後學不悟此章具洛書之文例以空談而說之則陋矣孔氏曰此以上禹所第叙一五行以下箕子所陳五陳氏大猷曰五氣運行於天地間未嘗停息故名行西山真氏曰五行者天之所生以善乎人者也其氣運於天而不息其材用於世而不匱其理則賦于人而為五常以天道言莫大於此故居九疇之首五事天之所賦而具於人者貌之恭言之從視之明聽之聰思之睿皆形色中天性之本然也必以敬用之則能保其本然之性不以敬用之則貌必慢言必悖視聽則昏且窒思慮則粗且淺而本然之性喪矣五者治心治身之要以人事言莫切於此故居五行之次史氏曰劉歆以初一曰至威用六極六十五字皆洛書本文豈知洛之所出者其數也禹之所叙者今之九疇也箕子所陳洪範則九疇之義疏也則張氏曰九疇雖多人君所守惟在敬用五事心敬貌言視聽思極於肅乂哲謀聖其精神所運上而五行下而福極無不得其所洪範之要在於敬而已王氏曰皇極立本三德趨時新安陳氏曰建用皇極為九疇之宗主而敬用五事乃建極皇極之本根敬以用五事則身修而極建而天人之道備矣不敬以用五事則身不修而極不建而天人之道胥失之矣此九疇之樞在皇極而皇極之要在五事五事之要又在敬之一字也又曰自嵗至厯數五者如綱之有紀天時所以相維者也故曰五紀民政既舉則欽天授人有不可緩推步占驗以人合天故五紀居八政之次庶徴驗吾之得失於天也福極驗吾之得失於民也五事之得失極之所以建不建也何從而驗之觀諸天而已雨𤾉燠寒風皆時建極之驗也五者恆而不時不極之驗也此人君所當念念省察者也皇極建則舉世蒙其澤而五福應之此君所當嚮用以為勸者也極不建則舉世蒙其禍而六極隨之此君所當威用以為懲者也嚮與威蓋君心所畏慕而兢業以致生民之命者故以福極終焉徽庵程氏曰九疇圗說曰朱子曰洛書九數而五居中洪範九疇而皇極居五順五行敬五事以修其身厚八政協五紀以齊其政皇極之所以立也又謂成就此極權之以三德審之以卜筮驗其休咎於天考其禍福于人皇極之所以行也又謂維持此極竊謂在天為五行言其所自然在人為五事言其所當然厚乎人而為八政言其利不言其弊占乎天而為五紀言其常不言其變序其目於皇極之先者皆皇極之本也皇極建則乂之以三德而威福玉食出於上否則三德失其宜而威福王食移於下矣皇極建則明之以稽疑而龜筮臣民從之而吉否則稽疑有不審而龜筮臣民逆之而凶矣皇極建則肅乂哲謀聖而卿士師尹舉其職庶民遂其生五氣順而四時和否則狂僭豫急蒙而卿士師尹失其職庶民傷其生五氣戾而四時舛矣皇極建則斂五福以錫民為夀富康寧攸好德考終命否則斂六極以厲民為凶短折疾憂貧惡弱矣序其目於皇極之後者皆皇極之驗也本之前四疇以立其體至嚴至密而無一毫之或失驗之後四疇以達其用至寬至廣而無一物之或遺信乎天子作民父母以為天下王可以參天地而贊化育矣此大禹則龜文以叙九疇箕子本禹疇以陳洪範必以皇建為天地人之宗主歟極復齊董氏曰董仲舒劉向洪範𫝊以五行五事皇庶徴福極五者牽合相從雖其援引春秋經傳以發明其說粗者可信然其所配止於五者而八政五紀三德稽疑四者則不可得而配此其為說固已拘泥不通至于庶徴分配五福而六極衍其一而無所當則于咎徴各增其一曰皇之不極厥咎眊厥罰常陰厥極弱此則於箕文之外别立此以遷就其說其失箕子之意逺矣眉山蘇氏雖不若漢儒之鑿然相配亦止於五疇而已蘇氏曰威畏也古者畏威通用六極之極窮也苦也則張氏曰福極之柄以人主論之則在天以民論之在人主臨川吳氏曰數之初為一一洛書文之在後者一之次為二二洛書文之在右前者凡言用者有所待於人而後然也蓋主於君人者而言人禀五行之氣而成形故以五事配數之二二之次為三三洛書文之在左者先身而後及於人故以八政配數之三三之次為四四洛書文之在左前者先人而後及於天故以五紀配數之四四之次為五五洛書文之在中者皇極居天下之中洛書之五亦居中故以皇極配數之五五之次為六六洛書文之在右後者惟皇作極民所視效日遷善而不知無所事乎治也或有未然則治之各有所宜故以三德配數之六六之次為七七洛書文之在右者德雖應變無方然有疑事非人謀所能決者必須謀之鬼神故以稽疑配數之七七之次為八八洛書文之在左後者雖聽命於鬼神猶不敢自是也必驗吾之得失於天故以庶徴配數之八八之次為九九洛書文之在前者五福人心所同嚮慕也君之所向在此而常願民之獲此福則凡可以致福者靡不勉矣六極人心所同畏避也君之所畏在此而常恐民之至此極則凡可以致極者靡不戒矣自五行至庶徴皆得其道則協氣成象人蒙休祥而五福應之或失其道則乖氣成象人罹殃咎而六極應之故以五福六極配數之九而為九疇之終陳氏雅言曰此大禹因洛書之數而敘洪範之疇初一次二次三次四次五次六次七次八次九此神龜所負之數也曰五行曰敬用五事曰農用八政曰協用五紀曰建用皇極曰乂用三德曰明用稽疑曰念用庶徴曰嚮用五福威用六極此大禹所第之疇也蓋數之出於天者九前一後三左七右四前左二前右八後左六後右五居中此天然之數也大禹於此見其數之一二三四五則以五行五事八政五紀皇極當之見其數之六七八九則以三德稽疑庶徴福極當之夫五行五事八政五紀皇極固非至是而始有三德稽疑庶徴福極亦非至是而始具特聖人因其數而叙是疇以立萬世為治之法一五行一曰水二曰火三曰木四曰金五曰土水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡潤下作鹹炎上作苦曲直作酸從革作辛稼穡作甘此下九疇之目也水火木金土者五行之生序也天一生水地二生火天三生木地四生金天五生土唐孔氏曰萬物成形以微著為漸五行先後亦以微著為次五行之體水最微為一火漸著為二木形實為三金體固為四土質大為五潤下炎上曲直從革以性言也稼穡以德言也潤下者潤而又下也炎上者炎而又上也曲直者曲而又直也從革者從而又革也稼穡者稼而又穡也稼穡獨以德言者土兼五行無正位無成性而其生之德莫盛於稼穡故以稼穡言也稼穡之不可為性也故不曰曰而曰爰爰於也於是稼穡而已非所以名也作為也鹹苦酸辛甘者五行之味也五形有聲色氣味而獨言味者以其切於民用也朱子曰一五行者次第之辭與前章異後倣此五行質具於地而氣行於天以質而語其生之序則曰水火木金土以氣而語其行之序則曰木火土金水問水火木金土竊謂氣之初溫而已溫則蒸溽蒸溽則條達條達則堅凝堅凝則有形質五者雖一然推其先後之序理或如此曰向見吳斗南說五事庶徴皆常依此為序其言亦有理自水曰潤下至稼穡作甘皆是二意水能潤能下火能炎能上金曰從曰革從而又能革也有潤下潤濕而下流炎上炎熱而上升曲直謂生而曲有直從革謂可因可革無定體種曰稼斂曰穡土性發生稼穡乃所生之大者問如何是金曰從革是從人之革否曰不然是或從或革爾從者從所鍛制革者又可革而之他而其堅剛之質依舊自序故與曲直稼穡皆成雙字炎上者上字當作上聲潤下者下字當作去聲亦此意金曰從革一從一革互相變而體不變且如銀打一隻盆便是從更要别作一件家事便是革依舊只是這物事所以云體不變從革作辛是其氣辛辣曲直作酸今以兩片木相擦則齒酸是其驗也陳氏雅言曰此箕子所衍之疇此一字與初一之一字不同初一之一乃洛書之數此所謂一乃次第之辭箕子於此將衍五行之疇而先以一五行之辭總之蓋目中之綱也陽介軒董氏曰大抵天地之間太極判而為陰陽陰分而為五行太極理也陰陽五行氣也理必寓乎氣氣不離乎理故天一生水天三生木天五生土三者皆陽之所生地二生火地四生金二者皆陰之所生析而言之為五行對而言之為二氣豈無其理而自爾哉五行之質形於地是以潤下之水炎上之火曲直之木從革之金稼穡之土五行之神運於天則為春夏秋冬土寄旺於四季而名曰沖氣五行一陰陽也陰陽一太極也本未嘗相離也五行之質存于人心者為肝心肺腎脾五行之神舍於人身者為仁義禮智信質者其粗也神者其精也亦未嘗相離也徽庵程氏曰五行者八疇之體八疇者五行之用造化之初一濕一燥濕之流為水燥之爍為火濕之融為木燥之凝為金其融結為土自輕清而重濁先天之五行其體也四時主相生六府主相尅後天之五行其用也其體對立其用循環地陳氏經曰洪範所言則五行生數必得地六天七八天九地十成之然後陰陽各有匹配然五行之生一二三四五亦未始無其序蓋有生於無著生於微自無而有自微而著五行之體水為至微自無而始入有者也火則漸著故火次水木則性實故次於火金則體固故次於木土則質廣大故次於金行陳氏大猷曰物之生其初皆為水其終皆為土五之相生所以相繼也其相剋所以相治也潤以質言炎以氣言上下以位言曲直以形言從革以材言稼穡以用言土非止於稼穡以生民粒食之用言之也即稼穡而推五行則潤下用之於灌溉也炎上用之於烹飪也曲直之斫削從革之鎔範用之於宫室器用也行以土榖合為一唐孔氏曰六府以土榖為二五陳氏雅言曰曰者本然之體作者修為之用至夏氏曰五味必言作者水之發源未嘗鹹也流而海凝結既久而鹹之味成則鹹者潤下之所作火之始炎未嘗苦也炎炎不已焦灼既久而苦之味成則苦者炎上之所作木之初生金之初礦土之始稼穡亦然酸董氏鼎曰草木之實多酸雖甘者至乾壞亦木擦齒酸之說恐未然二五事一曰貌二曰言三曰視四曰聽五曰思貌曰恭言曰從視曰明聽曰聰思曰睿恭作肅從作乂明作哲聰作謀睿作聖貌言視聽思者五事之序也貌澤水也言揚火也視散木也聽收金也思通土也亦人事發見先後之叙人始生則形色具矣既生則聲音發矣既又而後能視而後能聽而後能思也恭從明聰睿者五事之德也恭者敬也從者順也明者無不見也聰者無不聞也睿者通乎微也肅乂哲謀聖者五德之用也肅者嚴整也乂者條理也哲者智也謀者度也聖者無不通也朱子曰自外而言之則貌外於言自內而言之則聽內於視自貌言視聽言之則思所以為主於內故曰貌曰言曰視曰聽曰思彌逺者彌外彌近者彌內此其所以為次序也洪範五事以思為主蓋不可見而行乎四者之間也然操存之漸必自其可見而為之物則切近明白而易以持守故五事之次思最在後容貌言視聽思皆只以次第相屬問貌如何屬水曰貌光澤故屬水言發於氣故屬火眼主肝故屬木金聲清亮故聽屬金問凡上四事皆原於思亦猶水火木金皆出於土也曰然又問禮如何屬火曰以其光明問義之屬金亦以其嚴否曰然問視聽言動比洪範五事動是貌否如動容貌之謂曰思也在裏了勤容貌是外面底心之動便是思又問五行比五事曰曾見吳人傑說得順他云貌是水言是火視是木聽是金思是土將八庶徴來說便都順問貌如何是水曰他云貌是濕潤底便是水故其徴便是肅時雨若洪範乃是五行之書看得他都是以類配問視曰明聽曰聰思曰睿曰視曰明是視而便見之謂明聽曰聰是聽而便聞之謂聰思曰睿是思而便通之謂睿恭作肅恭屬水水有細潤意思人之舉動亦欲細潤聰作謀謀屬金金有靜密意思人之為謀亦貴靜密乂謂理治恭作肅至睿作聖此學問之極功盡性踐形之事漢伯謨云老蘇著洪範論不取五行𫝊而東坡以為五行𫝊不可廢此亦自是既廢則後世有忽天之心曰漢儒也穿鑿如五事一事錯則皆錯如何却云聽之不聰則某事應貌之不恭則某事應一西山真氏曰貌言視聽思各有攸主而總以敬之言何哉蓋敬者五事之主也敬不存於中則形於貌者必輕且慢無由而能恭發於言者必易以肆無由而能從視聽蔽於物何由而明且聰思慮汩於多端何由而通於微故敬則五事皆得不敬則五事皆失程子曰聰明睿智皆此出信哉陽勉齊黃氏曰水貌雨太陰火言暘太陽木視燠少金聽寒少陰四者或偏於陽或偏於陰惟土思風也通乎四者而不同焉質陰氣陽身之全體故貌言為大耳目聰明體之虛者故視聽次之又曰以造化生人之初驗之便自吻合天一生水水便有形人生精血凑合成形亦若造化之有水也地二生火火便有氣人有體便能有聲者氣之所為亦若造化之有火也水陰而火陽貌亦屬陰而言亦屬陽也水火亦有形質然乃造化之初故水但能潤下火但能炎上其質終是輕清至若天三生木地四生金則形質已全具矣亦如人身耳目既具則人之形成矣木陽而金陰亦猶視陽而聽陰也只以此配之則人之身便是一箇造化理自分明也洪範五行五事皆以造化之初及人物始生而言造化之初天一生水而三生木地二生火而四生金蓋陰陽之氣一濕一燥而為水火濕極燥極而為木與金也人物始生精與氣耳大𫝊曰精氣為物子産曰物生始化曰魄既生魄陽曰魂此皆精妙之語人物之生如此而已精濕而氣燥精實而氣虛精沈而氣浮故精為貌而氣為言精之盛者濕之極故為木為肝為視氣之盛者燥之極故為金為肺為聽大抵貌與視屬精故精衰而目暗言與聽屬氣故氣塞而耳聾此曉然易見者也然精衰則氣衰精盛則氣盛又初無間隔也若以醫書所屬而疑之則不知變之論也徽庵程氏曰人之始生精與氣耳精之凝為貌氣之出為言精之顯為視氣之藏為聽其主宰為思又曰洪範五事配五行與素問五行𫝊不合自西京以來說者不一牽合𫝊會莫能相通千有餘年至黃勉齊而後定其言曰配與屬不同配者比並之謂屬者管屬之謂嘗得其說而推之配與屬不同配者對峙而為體猶易之先天卦圗也屬者流行而為用猶易之後天卦圗也洪範之五事配水火木金土乃先天之五事言其體也素問屬土金木水火而相生五行𫝊屬木金火水土而相克乃後天之五事言其用也配與屬不相妨體與用不相悖千古之疑於是判矣按素問言相生亦有不合木水易置乃可五行𫝊言相克亦與六府五行五事之序自上克下者不同乃倒相克自下克上耳陳氏經曰五事以思為主猶五行以土為主土居中央心亦虛中而居中者也恭李氏杞曰曰者自然之理作者修為之效貌之必以至思之必睿有物必有則也作肅以至作聖聖人而後可以踐形也新安陳氏曰五事皆當以敬用之能以敬為主則物循其則而貌言視聽思皆能盡性以踐形恭從明聰睿充而極於肅乂哲謀聖矣不以敬為主則物失其則性不盡而無以踐形矣盡性踐形之學貴乎內外交盡以致夾持之功五事固以思為主而思必以貌言視聽為先貌言視聽在外而可見者也思在內而不可見者也於外而可見者先致持守之功則百體各職其職於內而不可見者復致操存之力則百體於天君而從其令一敬之功內外夾持庶幾其無滲漏乎又按五事以思為終四勿不言思真氏曰勿云者正指思而言乃人心所以為主而勝私復禮之機也或曰動兼貌與思而言貌是動於外思是動於內引程子動針誠之於思守之於為以證之愚以為五事自五事四勿自四勿不必牽合强說也二八政一曰食二曰貨三曰祀四曰司空五曰司徒六曰司寇七曰賓八曰師食者民之所急貨者民之所資故食為首而貨次之食貨所以養生也祭祀所以報本也司空掌土所以安其居也司徒掌教所以成其性也司寇掌禁所以治其姦也賓者禮諸侯逺人所以往來交際也師者除殘禁暴也兵非聖人之得已故居末也唐孔氏曰八政用於民以緩急為次食貨祀賓師指事為名三卿舉官為名者三官所主事多若以一字為名則所掌不盡故舉官名以見義曰陳氏經曰八政或言事或言官互見也史氏漸政莫大於是舜總之九官周分之六卿箕子列而為八名雖異實無殊也可陳氏大猷曰八政以緩急為序民可百年無貨不一朝有飢養生莫急於食而貨次之養生矣當事死報本故次祀然皆貴安居故次司空不可逸居無教故次司徒教不從而刑之刑以弼教故次司寇內治舉而後外治興故次賓師賓諸侯而或不庭則不得已征之故師終焉乎吕氏曰衣食足則教以祀所以報本反始教已行其中矣司寇以上皆內治賓師為外治徽庵程氏曰食貨與土亦出於五行皇極之政必先有司三卿率庶官以理其政者也臨川吳氏曰民生所最急者務農重穀以足其食有食則種樹阜通以殖其貨既有以養生必有以事死故祀以報本追逺養生事死在乎安居故司空掌土以定其居居既得安不可無教故司徒掌教以導其善教之不從則齊之以刑故司寇掌禁以懲其惡內治舉而後及外故賓以親邦國往來交際有其禮師以平邦國立武足兵有其備用師非得已故最後先陳民雅言曰人之生不可以無養故君之治民莫於以政養之此八政所以厚民生而居五事之次也八政之目自一曰食至六曰司寇此治內之事也七曰賓八曰師此治外之事也治內之事則必致其詳治外之事則不過兩端而已四五紀一曰嵗二曰月三曰日四曰星辰五曰厯數嵗者序四時也月者定晦朔也日者正躔度也星經星緯星也辰日月所會十二次也厯數者占步之法所以紀嵗月日星辰也孔氏曰嵗所以紀四時月所以紀一月日紀一日二十八宿迭見以叙氣節十二辰以紀日月所㑹厯數節氣之度以為厯敬授民時唐孔氏曰五者為天時之經紀也五陳氏曰五紀即堯典羲和所掌者焉徽庵程氏曰紀四經而一緯五氣順布四時行嵗月日星辰經也厯數者推步嵗月日星辰之數以為厯者也厯象日月星辰敬授人時緯也與庶徴相通而不同彼以證王與卿士師尹庶民之得失此特主於授時臨川吳氏曰嵗自冬至至來嵗冬至凡三百六十五日四分日之一日行天一周也以分至啓閉定嵗之四時是為一嵗之紀月自合朔至來月合朔凡二十九日六辰有竒月與日一會也以晦朔弦望定月之大小是為一月之紀日自日出至來日日出歷十二辰日繞地一匝也以晨昏出入定晝夜長短是為一日之紀星謂二十八宿衆經星辰謂天之壤因日月所會分經星之度為十二次觀象測候以驗天之體也是為星辰之紀厯謂日月五緯所歷之度數謂一二三四五六七八九十百千萬七政行度各有盈縮疾遲立數推算以步天之用也是為厯數之紀也陳氏雅言曰紀者如綱之有紀天時所以相維者嵗者紀周天之度故居一月者紀月行之數故居二日者正天與日月之躔故居三星者在天之象辰者在天之舍故居四四者皆係於天天之示乎人者也天與日月五星之運雖有遲速順逆之不同而皆有數以稽之有厯以紀之使四時以定而嵗無不成晦朔以辨而月無不協甲乙以審而日無不正經緯以彰而星辰無不著是厯者所以紀嵗月日星辰之數以人而合於天者也嵗月日星辰此天道之所有厯數此人事之所不可無五皇極皇建其有極斂時五福用敷錫厥庶民惟時厥庶民于汝極錫汝保極皇君建立也極猶北極之極至極之義標準之名中立而四方之所取正焉者也言人君當盡人倫之至語父子則極其親而天下之為父子者於此取則焉語夫婦則極其别而天下之為夫婦者於此取則焉語兄弟則極其愛而天下之為兄弟者於此取則焉以至一事一物之接一言一動之發無不極其義理之當然而無一毫過不及之差則極建矣極者福之本福者極之效極之所建福之所集也人君集福於上非厚其身而已用敷其福以與庶民使人人觀感而化所謂敷錫也當時之民亦皆於君之極與之保守不敢失墜所謂錫保也言皇極君民所以相與者如此也朱子曰皇極一章乃九疇之本極今人將皇極作大中解都不是皇建其有不成是大建其有中時人斯其惟皇之極不成是時人斯其惟大之中皇須是君極須是人君建一箇表儀於上且如北極是在天中喚作北中不可屋極是在屋中喚作屋中不可人君建一箇表儀於上便有肅乂哲謀聖之應五福備具推以與民民皆從其表儀下文凡厥庶民以下言人君極此表儀又須知天下有許多名色人須逐一做道理區處著始得於是有念之受之錫之福之類隨其人而區處之大抵皇極是建立一箇表儀後又有廣大含容區處周備底意思無偏無陂以下只是反覆歌詠若細碎解都不成道理皇指人君極便是指其身為天下做箇樣子但緣聖人做得樣子高大人所難及而不可以此盡律天下之人故雖不協於極者君亦受之至於而康而色自言好德者亦錫之福皇極不可以大中訓之只是前面五行五事八政五紀是已却都載在人君之身包括盡了五行是發源處五事是操持處八政是修人事五紀是順天道就中以五事為主視明聽聰便是建極如明如聰只是合恁地三德亦只是就此道理上權衡或放高或捺下是人事盡了稽疑又以卜筮參之若能建極則推之於人使天下皆享五福驗之於天則為休微若是不能建極則其在人事便為六極在天亦為咎徴其實都在人君身上又不過敬用五事而已此即篤恭而天下平之意以是觀之人君之所任者豈不重哉如此則九疇方貫通為一若以大中言之則九疇散而無統人極有凑會之義所謂三十六輻共一轂福錫民聖亦豈别有福以錫之只取則於此各正其身順理而行則為福也孟子謂君仁莫不仁亦此意人君先正其身故又有五事之說若以皇極為大中則與五事似不相干漢儒如谷永書建大中正五事猶相通說今之所謂皇極者只是順從無所可否說漢儒說中字只是五事之中猶未為害最是近世中字不是近日之說只是含糊苟且不分是非不辨黑白遇當做底事只略略做些不要做盡此豈聖人之意極盡也因指前面香卓四邊盡處是極所以謂之四極四邊視中央中央是極也堯都平陽舜都蒲坂四邊望之一齊看著平陽蒲坂如屋之極極高之處四邊到此盡了去不得故謂之極宸極亦然至善亦如此應于事到至善是極盡了更無去處故君子無所不用其極書之皇極亦是四方所瞻仰者皇有訓大處惟皇極之皇不可訓大皇只當作君所以說遵王之義遵王之路直說到後面以為天下王其意可見蓋皇字下從王問先生言皇極之極不訓中只是標準之義然無偏無黨無反無側亦有中意曰只是箇無私意問標準之義如何曰此是聖人正身以作民之準則問何以能斂五福曰當就五行五事上推究人君修身使貌恭言從視明聽聰思睿即身自正五者得其正則五行得其序以之稽疑則龜從筮從卿士從庶民從在庶徴則有休徴而無咎徴和氣致祥有仁夀而無鄙夭便是五福反是則福轉為極矣自皇建其有極以下是總說人君正心修身立大中至正之標準以觀天下而天下化之之義無偏無陂以下乃是反覆贊嘆正說皇極體段曰皇極之敷言以下是推本結煞一章之大意東坡書𫝊中說得極字亦好洛書九數而五居中洪範九疇而皇極居五故自孔氏𫝊訓皇極為大中而諸儒皆祖其說余獨以經之文義語脈求之而有以知其不然也蓋皇者君之稱也極者至極之義標凖之名常在物之中央而四外望之以取正焉者也故以極為在中之準的則可而便訓極為中則不可若北辰之為天極脊棟之為屋極其義皆然而禮所謂民極詩所謂四方之極者於皇極之義為尤近顧今之說者既誤於此而並失於彼是以其說展轉迷謬而終不能以自明也即如舊說姑亦無問其他但即經文而讀皇為大讀極為中則夫所謂惟大作中大則受之為何等語乎今以余說推之則人君以眇然之身履至尊之位四方輻凑面內而環觀之自東而望者不過此而西也自南而望者不過此而北也此天下之至中者也既居天下之至中則必有天下之絶德而後可以立至極之標準故必順五行敬五事以修其身厚八政協五紀以齊其政然後至極之標準卓然有以立乎天下之至中使夫面內而環觀者莫不於是而取則焉語其仁則極天下之仁而天下之為仁者莫能加也語其孝則極天下之孝而天下之為孝者莫能尚也是則所謂皇極者也由是而權之以三德審之以卜筮驗其休咎於天考其禍福於人如挈裘領豈有一毛之不順哉此洛書之數所以雖始於一終於九而必以五居其中洪範之疇所以雖本於五行究於福極而必以皇極為之主也皇建其有極云者則以言夫人君以其一身而立至極之標準於天下也斂時五福用敷錫厥庶民云者則以言夫人君能建其極而為五福之所聚而又有以使民觀感而化焉則是又能布此福而與其民也惟時厥庶民于汝極錫汝保極云者則以言夫民視君以為至極之標準而從其化則是復以此福還錫其君而使之長為至極之標凖也以蘇氏曰至而無餘之謂極林氏曰皇極居中可包括上下程馮氏曰皇極居中上總下貫與八疇為九徽庵氏曰皇極者九疇之樞紐五行之統會新安陳氏曰五行之統會者五居中故合五行之數而極者仁義禮智信之至五性亦合五行之理五行散見諸疇中皇極一疇以五行之理統會之也皇建其有極者君尊為天子德為聖人能建實有之極以為天下之標凖也有極當借無極對觀自至理之妙而無形可見者言之曰無極自至理之實有言之曰有極斂時五福五福即第九疇之五福九疇雖至五福而終五福實自皇極而出第九疇之五福豈捨皇極疇中所斂之五福而他有所謂福哉錫汝保極蔡西山曰民享君之福所以歸於君之極而與君保此極也九峯蓋用父說而略師說蓋師說有析錫汝與保極為二義者然語録一條又與蔡說合云凡厥庶民無有淫朋人無有比音備德惟皇作極淫朋邪黨也人有位之人比德私相比附也言庶民與有位之人而無淫朋比德者惟君為之極而使之有所取正耳重言君不可以不建極也朱子曰凡厥庶民無有淫朋人無有比德惟皇作極云者則以言夫民之所以能有是德者皆君之德有以為其至極之標準也新安陳氏曰書之知人安民詩之宜民宜人皆以人為有位者民為下民此亦當然證之三德疇人用側頗僻民用僭忒可見朱子單言民大約言之耳民人所以然惟在君建極故也作有扶植振起之意建立作興大略相似不建不作則斯道廢墜矣道陳氏雅言曰人君在上而能示之以大公至正之則臣民在下相率而為大公至正之行此孟子所謂君正莫不正者也作極與建極大約相似而微有不同建者植立之謂作則有鼓舞振起之意匡直輔翼之意提撕警覺之意欲其無一時一事之不作也凡厥庶民有猷有為有守汝則念之不協于極不罹音離于咎音舊皇則受之而康而色曰豫攸好去聲德汝則錫之福時人斯其惟皇之極此民庶民也有猷有謀慮者有為有施設者有守有操守者是三者君之所當念也念之者不忘之也帝念哉之念不協于極未合于善也不罹于咎不陷於惡也未合于善不陷於惡所謂中人也進之則可與為善棄之則流於惡君之所當受也受之者不拒之也歸斯受之之受念之受之隨其才而輕重以成就之也見於外而有安和之色發於中而有好德之言汝於是則錫之以福而是人斯其惟皇之極矣福者爵祿之謂或曰錫福即上文斂福錫民之福非自外來也曰祿亦福也上文指福之全體而言此則為福之一端而發苟謂非祿之福則於下文于其無好德汝雖錫之福其作汝用咎為不通矣朱子曰有猷有為有守是有德之人罹凡厥庶民有猷有為有守汝則念之不協于極不于咎皇則受之云者則以言夫君既立極於上而下之從化或有淺深緩速之不同其有謀者有才者有德者人君固當念之而不忘其或未能盡合而未底乎大戾者亦當受之而不拒也而康而色曰豫攸好德汝則錫之福時人斯其惟皇之極云者則以言夫人之有能革面從君而以好德自名則雖未必出於中心之實人君亦當因以自名而與之以善則是人者亦得以君為極而勉其實也好陳氏雅言曰見於外而有安和之色發於中而有德之言此其好善之誠見于色辭之間所謂容貌辭氣乃德之符者也時人即指上三等之人言廣收樂育使皆知所以自勉則人莫不觀感興起因其所已能而益勉進其未至皆歸於皇之極矣無虐煢獨而畏高明煢獨庶民之至微者也高明有位之尊顯者也各指其甚者而言庶民之至微者有善則當勸勉之有位之尊顯者有不善則當懲戒之此結上章而起下章之義孔氏曰煢單無兄弟也無子曰獨云新安陳氏曰煢獨如云孤寒指民言高明如高明之家指人言人之有能有為使羞其行去聲而邦其昌凡厥正人既富方穀汝弗能使有好去聲于而家時人斯其辜音孤于其無好德汝雖錫之福其作汝用咎此言有位者也有能有才智者羞進也使進其行則官使者皆賢才而邦國昌盛矣正人者在官之人如康誥所謂惟厥正人者富祿之也穀善也在官之人有祿可仰然後可責其為善廪祿不繼衣食不給不能使其和好于而家則是人將陷于罪戾矣於其不好德之人而與之以祿則為汝用咎惡之人也此言祿以與賢不可及惡德也必富之而後責其善者聖人設教欲中人以上皆可能也朱子曰無虐煢獨而畏高明人之有能有為使羞其行而邦其昌云者則以言夫君之於民一視同仁凡有才能使皆進善則人才衆多而國賴以興也凡厥正人既富方穀汝不能使有好于而家時人斯其辜于其無好德汝雖錫之福其作汝用咎云者則以言夫凡厥正人者必先有以富之然後可以納之於善不能使之有賴于其家則此人必將陷于不義至於無有好德之心而後始欲教之以修身勸之以求福則己無及於事而其起以報汝惟有惡而無善矣蓋人之氣禀或清或濁或純或駁有不可一律齊者是以聖人所以立極乎上者至嚴至密而所以接引乎下者至寬至廣雖彼之所以化于此者淺深遲速其效或有不同而吾之所以應於彼者長養涵育其心未嘗不一也猷西山蔡氏曰進其行者進於皇之極也陳氏大曰上一節是廣大以奬育人才此一節是公平以拔用人才官新安陳氏曰正人有四說引康誥惟厥正人以為之長者為妥於人民之分及上下文理相協此疇首言建極錫福皆為民言至此則錫之福雖錫之福皆為有位之人言然於此三四節首以庶民與人對言繼而念之受之為民言也則錫雖錫為人言也雖若雜舉而實有條理大意欲君於建極之餘於民則隨才以成之於有位之人則隨才而富以祿之不特斂福以錫庶民且錫福於有位之人也又按朱子缺分别民人三德疇人頗僻民僭忒其證甚明陳氏雅言曰朝廷有以福君子則君子有以福斯民此富之祿之雖所以為君子計而實所以為斯民計也無偏無陂音祕遵王之義無有作好去聲遵王之道無有作惡去聲遵王之路無偏無黨王道蕩蕩無黨無偏王道平平音駢無反無側王道正直會其有極歸其有極偏不中也陂不平也作好作惡好惡加之意也黨不公也反倍常也側不正也偏陂好惡己私之生於心也偏黨反側己私之見音現於事也王之義王之道王之路皇極之所由行也蕩蕩廣逺也平平平易也正直不偏邪也皇極正大之體也遵義遵道遵路㑹其極也蕩蕩平平正直歸其極也會者合而來也歸者來而至也此章蓋詩之體所以使人吟詠而得其情性者也夫音扶歌詠以協其音反覆以致其意戒之以私而懲創其邪思訓之以極而感發其善性諷詠之間恍然而悟悠然而得忘其傾斜狹小之念達乎公平廣大之理人欲消熄天理流行會極歸極有不知其所以然而然者其功用深切與周禮大師教以六詩者同一機而尤要者也後世此意不𫝊皇極之道其不明於天下也宜哉朱子曰無有作好無有作惡謂好所當好惡所當惡不可作為耳偏曰王道蕩蕩又曰王道平平曰無黨無偏又曰無無黨只是一箇道反覆說無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直會其有極歸其有極云者則以言夫天下之人皆不敢徇其己之私以從乎上之化而會歸乎至極之標準也蓋偏陂好惡者己私之生於心者也偏黨反側者己私之見於事者也王之義王之道王之路上之化也所謂皇極者也遵義遵道遵路方會其極也蕩蕩平平正直則己歸於極矣孫氏曰老子云大道甚夷而民好徑王之道王之路所謂甚夷者也蕩蕩通達之意平平坦夷之意張氏曰天下有公好惡不必作也作則非公矣趨陳氏大猷曰此承上文言人君能作成人故人皆極以申第一節凡厥庶民惟皇作極之義後吕氏曰會如會聚之會歸如歸宿之歸有所會然有所歸唐孔氏曰天下歸仁焉此歸意與彼同皇新安陳氏曰六王字即指皇極之君義路道即指極互辭協韻耳遵猶有不敢違之意至王道蕩蕩三句則自合乎王道無事於遵矣會合于君所建之有極結遵義六句歸宿于君所建之有極結蕩蕩六句二有極字與章首皇建其有極之有極相應實有之極亦君民同有之極也陳氏雅言曰會極者如行者之赴家食者之求飽與極猶二也歸極者如行者之到家食者之得飽與極為一也曰皇極之敷言是彝是訓于帝其訓曰起語辭敷言上文敷衍之言也言人君以極之理而反覆推衍為言者是天下之常理是天下之大訓非君之訓也天之訓也蓋理出乎天言純乎天則天之言矣此贊敷言之妙如此朱子曰皇極之敷言是彜是訓于帝其訓云者則以言夫人君以身立極而布命于下則其所以為常為教者皆天之理而不異乎上帝之降衷也夏氏曰二曰字皆箕子更端之言而蘇氏曰天錫禹九疇不能如是諄諄也粗有象數已禹與箕子推而廣之至皇極尤詳曰此皆非帝之言也皇極之敷言也帝以象數告而我敷廣其言為彝訓耳與帝言無異故曰于帝其訓復陳氏雅言曰聖人在上既建極而以身教于天下敷言而以言教於天下蓋身教者示以躬行踐履之實言教者使其歌誦吟詠而得二者不可偏廢也天下惟理為至常惟理為至大皇極之敷言純乎一理故謂之常理故謂之大訓是理也本之於天惟皇上帝降衷之理也言而不異於降衷之理是豈可以君之訓視之哉乃天之訓也天者其不言之聖人聖人者其能言之天一而二二而一者也凡厥庶民極之敷言是訓是行以近天子之光曰天子作民父母以為天下王光者道德之光華也天子之於庶民性一而已庶民於極之敷言是訓是行則可以近天子道德之光華也曰者民之辭也謂之父母者指其恩育而言親之之意謂之王者指其君長而言尊之之意言天子恩育君長乎我者如此其至也言民而不言人者舉小以見大也朱子曰凡厥庶民極之敷言是訓是行以近天子之光云者則以言夫天下之人於君所命皆能受其教而謹行之則是能不自絶逺而有以親被其道德之光華也天子作民父母以為天下王云者則以言夫人君能立至極之標準所以能作億兆之父母而為天下之王也不然則有其位無其德不足以首出庶物統御人羣而履天下之極尊矣是書也原於天之所以錫禹雖甚茫昧微眇有不可得而知者然箕子之所以言之而告武王者則已備矣顧其詞之宏深奧雅若有未易言者然試嘗虛心平氣而再三反覆焉則亦坦然明白而無一字之可疑但先儒未嘗深求其意而不察乎人君所以修身立道之本是以誤訓皇極為大中又見其詞多為含洪寬大之言因復誤認中為含糊苟且不分善惡之意殊不知極居中而不可直謂之中中之得名又以其無過不及至精至當而無有毫釐之差亦非如其所名之義也乃以誤認之中為誤訓之極不謹乎至嚴至密之體而務為至寬至廣之量其弊將在人君不知修身以立政而墮于漢元帝之優游唐代宗之姑息卒至於是非顚倒賢否貿亂而禍敗隨之尚何斂福錫民之可望哉嗚呼孔氏則誠誤矣然迹其本心亦曰姑以隨文解義為口耳占畢之計而已不知其禍之至此也而自漢以來迄今千有餘年學士大夫不為不衆更歷世變不為不多幸而遺經尚存本文可考其出於人心者又不可得而昧也乃無一人覺其是非而以一言正之者使其患害流于萬世是則豈獨孔氏之罪哉不吕氏曰此彜此訓非我所自作乃帝之訓也庶民可視為空言必當踐行此訓可也不言近皇極而言近天子之光天子既建極則天子即皇極也陳氏雅言曰近者非親近之近乃性相近之近譬之水焉天子之光則如水之至清庶民則未免少有查滓者也譬之鏡焉天子之光則如鏡之至明庶民則未免少有昏翳者也六三德一曰正直二曰剛克三曰柔克平康正直彊弗友剛克燮友柔克沈潛剛克高明柔克克治友順燮和也正直剛柔三德也正者無邪直者無曲剛克柔克者威福豫音與奪抑揚進退之用也彊弗友者彊梗弗順者也燮友者和柔委順者也沈潛者沈深潛退不及中者也高明者高亢音抗明爽過乎中者也蓋習俗之偏氣禀之過者也故平康正直無所事乎矯拂無為而治是也彊弗友剛克以剛克剛也燮友柔克以柔克柔也沈潛剛克以剛克柔也高明柔克以柔克剛也正直之用一而剛柔之用四也聖人撫世酬物因時制宜三德乂用陽以舒之陰以斂之執其兩端用其中於民所以納天下民俗於皇極者蓋如此朱子曰沈潛剛克高明柔克克治也言人資質沈潛者當以剛治之資質高明者當以柔治之此說為勝行張氏景曰三德馭臣之道見下文唐氏曰以德權則威福不下移陳氏經曰皇極以體常三德以盡變而林氏曰三德者聖人所以臨機制變為皇極之用權其輕重也正直剛克柔克此三德之目自平康正直而下則釋三德之用以盡其義也三德乂用之得其宜平安無事之世則用正直以治之彊禦弗順之世則用剛克以治之和順之世則用柔克以治之一於剛則失之亢一於柔則失之懦聖人宰制天下之權可謂盡矣潛新安陳氏曰習俗之偏以彊燮言氣禀之過以沈高明言剛徽庵程氏曰三德一經而四權正直之用一經也柔之用四權也四權之中其二政以治之其二教之自治也平臨川吳氏曰平康者治之以正直如周官所謂刑國用中典也彊弗友者治之以剛克如周官所謂刑亂國用重典也燮友者治之以柔克如周官所謂刑新國用輕典也惟辟必益反作福惟辟作威惟辟玉食臣無有作福作威玉食福威者上之所以御下玉食者下之所以奉上也曰惟辟者戒其權不可下移曰無有者戒其臣不可上僭也林氏曰此三者人主之利勢所操以用夫三德者也此三者苟人君能自操持則威福在己名分謹嚴故能操縱豫奪以用乎三德其或假於臣下則權勢下移紀綱紊亂其何以操縱三德而為皇極之用哉也吳氏曰玉食非帝王所急足以觀王威之不下移陳氏經曰三德之用莫易于正直莫難於剛柔君道主剛剛之失其過小柔之失其過大故又言威福玉食之柄在君惟恐失之柔而柄下移如漢元成也臣之有作福作威玉食其害于而家凶于而國人用側頗僻民用僭忒特入聲頗不平也僻不公也僭逾忒過也臣而僭上之權則大夫必害於而家諸侯必凶于而國有位者固側頗僻而不安其分去聲小民者亦僭忒而踰越其常甚言人臣僭上之患如此新安陳氏曰此所謂臣大臣也大臣僭天子則次而邦君次而大夫次而小臣次而庶民皆效而陵僭無一安其分者夫皇極立本者也三德趣時者也皇極建則三德適時措之宜而權出於上皇極不建則三德失時措之宜而柄移于下矣七稽疑擇建立卜筮人乃命卜筮稽考也有所疑則卜筮以考之龜曰卜蓍曰筮蓍龜者至公無私故能紹天之明卜筮者亦必至公無私而後能𫝊蓍龜之意必擇是人而建立之然後使之卜筮也朱子曰龜嵗久則靈蓍生百嵗一本百莖亦物之神靈者卜筮實問鬼神以蓍龜神靈之物故假之以驗其卦兆卜法以明火爇柴灼龜為兆筮法以四十九蓍分掛揲扐凡十有八變而成卦孔氏曰考正疑事當選擇卜筮人而建立之使為卜筮之事西山蔡氏曰皇極之君以人謀未免乎有心有心未免乎有私此所以洗心齊戒以聽天命而無所容其心也擇建立卜筮人者非其人則不可非其職則不專必得其人而立之然後乃可命之卜筮定天下之吉凶成天下之亹亹非細事也曰雨曰霽曰蒙曰驛曰克此卜兆也雨者如雨其兆為水霽者開霽其兆為火蒙者蒙昧其兆為木驛者絡驛不屬其兆為金克者交錯有相勝之意其兆為土朱子曰易占不用龜而每言蓍龜皆具此理也蓍短龜長者謂龜惟鑽灼之易而蓍有扐揲之煩龜之兆一灼便成亦有自然之易洪範卜五即龜用二即蓍曰貞曰悔此占卦也內卦為貞外卦為悔左傳蠱之貞風其悔山是也又有以遇卦為貞之卦為悔國語貞屯悔豫皆八是也問貞悔不止一說如六十四卦則每卦內三畫為貞外三畫為悔如揲蓍成卦則正卦為貞之卦為悔如八卦之變則純卦一為貞變卦七為悔朱子曰是如此胡叔器問內卦為貞外卦為悔曰貞悔出洪範貞是正底便是體悔是過底動則有悔又問一貞八悔曰如乾夬大有大壯小畜需大畜泰內體皆乾是一貞外體八卦是八悔餘倣此貞訓正事方正如此悔吝皆是事過後方有內卦之占是事正如此外卦之占是已如此二字有終始之意西山蔡氏曰內卦曰貞貞者事之幹也外卦曰悔悔者生乎動也六爻不動以內卦為貞外卦為悔見左傳蠱之貞風其悔山是也有動爻者以遇卦為貞之卦為悔見國語貞屯悔豫皆八是也凡七卜五占用二衍忒凡七雨霽蒙驛克貞悔也卜五雨霽蒙驛克也占二貞悔也衍推忒過也所以推人事之過差也朱子曰衍推忒變也上七者卜筮之大凡而其變則無窮皆當推衍以極其變卜之變在經兆之體百有二十其頌千有二百體色墨拆方功義弓之類筮之變如老陽變為少陰老陰變為少陽一卦變為六十四卦六十四卦可變為四千九十六卦之類引而伸之觸類而長之其變無有終窮衍疑是過多􅓑底意思忒是差錯了之高氏曰有心未若無心之為公有情未若無情為信故盤庚遷都成王東征皆以卜筮為主立時人作卜筮三人占則從二人之言凡卜筮必立三人以相參考舊說卜有玉兆瓦兆原兆筮有連山歸藏周易者非是謂之三人非三卜筮也唐孔氏曰三人從二善鈞從衆也卜筮各有三人如金縢乃卜三龜儀禮士喪卜葬占者三人周禮大卜掌三兆之法杜注玉兆顓帝之兆瓦兆堯之兆原兆周之兆西山蔡氏曰恐非是禹叙洛書之時未有原兆與周易也人徽庵程氏曰皇極雖建不敢自是國有大事參諸謀鬼謀以決其疑人謀本陰陽五行之理鬼謀則以陰陽五行之象數參之一從一逆可以驗其得失矣然稽疑以卜筮為重而龜為尤重也汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮朱子曰卜筮處末者占法先斷人志後命於蓍龜之靈不至越於人也周禮卜人國之大事先筮而後卜汝則從龜從筮從卿士從庶民從是之謂大同身其康彊子孫其逢吉朱子曰心者人之神明其虛靈知覺無異於鬼神雖龜筮之靈不至踰於人故自此以下必以人謀為首然鬼神無心而人有欲人之謀慮未必盡能無適莫之私故自此以下皆以龜筮為主人雖不盡從不害其為吉若龜筮而逆則凶咎必矣此條無問尊卑其謀皆配於龜筮故為大同之吉汝則從龜從筮從卿士逆庶民逆吉朱子曰此條惟君謀配於龜筮亦吉卿士從龜從筮從汝則逆庶民逆吉朱子曰此條惟卿士謀配於龜筮亦吉庶民從龜從筮從汝則逆卿士逆吉朱子曰此條惟民謀配於龜筮亦吉汝則從龜從筮逆卿士逆庶民逆作內吉作外凶朱子曰此條龜筮一從一違本不可以舉事但筮短龜長又尊者之謀配合故內事則可外事則凶龜筮共違于人用靜吉用作凶稽疑以龜筮為重人與龜筮皆從是之謂大同固吉也人一從而龜筮不違者亦吉龜從筮逆則可作內不可作外內謂祭祀等事外謂征伐等事龜筮共違則可靜不可作靜謂守常作謂動作也然有龜從筮逆而無筮從龜逆者龜尤聖人所重也故禮記大事卜小事筮𫝊去聲謂筮短龜長是也自夫子贊易極著蓍卦之德蓍重而龜書不傳云朱子曰此條龜筮皆逆人謀縱有從者動則凶矣進王氏曰周官有大事衆庶得至外朝與羣臣以序而天子親問焉張氏曰決疑主於筮龜故進於卿士庶民之上龜筮既從而卿士庶民逆亦吉者以我心與鬼神合也我與庶民雖逆而亦吉者以卿士與龜筮同也我與卿士逆而亦吉者以庶民與龜筮同也高氏曰舜之禪禹朕志先定詢謀僉同龜筮協從此大同也故厯數在躬啓能敬承成王宅洛周召營相四方和會卜惟洛食此大同也故卜世卜年卒過其厯也吕氏曰五者之中三從三逆從之理多吉之所在然三從之中必龜筮之從乃可蓋龜筮無心既已皆從卿士庶民或别有私心未可知也如盤庚遷都心已無疑卜稽如台獨臣民懷居而不欲遷何妨於吉哉汝與民逆而吉者如周公東征成王既不知周公民有不靖反曰艱大惟在朝大臣與二公及卜筮從故亦吉也聖人假至公無私之物以寓吾之誠惟龜筮皆從庶足驗吾無一毫之未盡苟龜從而筮不從必尚有未盡者故內事猶可外事則否苟我與臣民皆從而龜筮皆違則是於理必有未盡人己雖從終未免於人為靜而不為則吉動為則凶矣此義至精微雖天下舉以為然不知又自有不然者故林氏曰卜筮天所示也人事盡而後可以求之天必皇極建三德乂至於有疑然後盡人謀而斷之卜筮苟人事不盡而惟卜筮是拘雖吉何補故龜筮稽疑必次皇極三德之後不可驟語也董氏鼎曰舜命禹曰朕志先定詢謀僉同鬼神其依龜筮協從蓋所謂官占惟先蔽志昆命于元龜若此言謀及乃心卿士庶民然後及卜筮亦初不以卜筮為先也事之可否固已默成于胸中而人謀又協矣猶有待于鬼神不敢率意而行故卜之此見聖人謹重之至亦所以示於民使之信從其事而不懼與惑也若人謀未從惟龜是聽誠有如吳氏所慮矣然天下之事有我所欲為而人不悅有人所欲為而已不從亦有已與人皆疑其不可而天地鬼神自以為可者是皆當於卜筮決之蓋人則有欲而卜筮無私筮猶出于人而龜純乎天矣此稽疑一疇尤以龜為重非茫然無底止而聽於卜也八庶徴曰雨曰𤾉曰燠音郁曰寒曰風曰時五者來備各以其叙庶草蕃廡音煩無徴驗也廡豐茂所驗者非一故謂之庶徴雨𤾉燠寒風各以時至故曰時也備者無缺少也叙者應節候也五者備而不失其叙庶草且蕃廡矣則其他可知也雨屬水𤾉屬火燠屬木寒屬金風屬土吳仁傑曰易以坎為水北方之卦也又曰雨以潤之則雨為水矣離為火南方之卦也又曰日以烜火逺反之則𤾉為火矣小明之詩首章云我征徂西二月初吉三章云昔我往矣二月方燠夫以二月為燠則燠之為春為木明矣漢志引狐突金寒之言顔師古謂金行在西故謂之寒則寒之為秋為金明矣又按稽疑以雨屬水以霽屬火霽𤾉也則庶徴雨之為水𤾉之為火類例抑又甚明蓋五行乃生數自然之叙五事則本於五行庶徴則本於五事其條理次第相為貫通有秩然而不可紊亂者也朱子曰自五行而下得其道則有衆休之徴失其道則有衆咎之徴得失在於身休咎應於天匹夫尚然況人主乎五者備叙則庶草滋蕃豐廡即下文之休徴也有無相反常雨則無𤾉常燠則無寒則草木不茂百穀不成即下文之休徴也問八庶徴曰時林氏取蔡氏說謂是嵗月日之時自五者來備而下所以申言雨𤾉燠寒風之義自王省惟嵗而下所以申言曰時之義某切謂此時字當如孔氏五者各以其時之說為長林氏徒見時字與雨𤾉燠寒風五者並列而為六則遂以此時字為贅不知古人之言如此類者多矣且仁義禮智是為四端加一信字則為五常非仁義禮智之外别有所謂信也故某以為時之在庶徴猶信之在五常不知是否曰林氏之說只與古說無異但謂有以嵗而論其時與不時者有以月而論其時與不時者有以日而論其時與不時者可更推之寒問吳斗南說如何曰舊謂雨屬木𤾉屬金燠屬火屬水與五行相配皆錯亂了雨只屬水自分曉怎生屬得木問寒如何屬金曰他引左傳金寒之證甚佳又曰貌言視聽思皆只以次第相屬孔氏曰雨以潤物𤾉以乾物燠以長物寒以成物風以動物五者各以其時所以為衆驗林氏曰雨與𤾉對燠與寒對風行于四時之間而陳氏大猷曰陰陽之氣交則蒸而成雨氣散則開成𤾉陰退陽進則成燠陽退陰進則成寒陰陽吹扇則成風雨𤾉風則遊氣之聚散飛揚者為之燠寒則二氣之循環往來者為之備謂皆有而不缺敘謂應期而不亂氣陳氏曰燠熱涼寒四時之氣也雨𤾉風佐四時之以生育者也止言燠寒者燠者熱之始寒者涼之極也甚新安陳氏曰雨𤾉燠寒吳氏引證其屬水火木金當風之屬土獨缺其證當如莊子風生於土囊之口及大塊噫氣其名為風證之風為土氣豈不章章明矣乎葵初王氏曰按吳斗南以雨𤾉燠寒風屬水火木金土序與五行五事相符引諸證甚明但風土無所證今以陳氏之說補極合造化氣陳氏雅言曰庶徴之效獨言庶草蕃廡者草木得之先庶草又為易瘁者也觀庶草之微蕃廡如此則大者可知矣一極備凶一極無凶極備過多也極無過少也唐孔氏曰雨多則潦勞去聲水淹也雨少則旱是極備亦凶極無亦凶餘準是朱子曰一極備凶一極無凶多些子不得無些子不得曰休徴曰肅時雨若曰乂時𤾉若曰哲時燠若曰謀時寒若曰聖時風若曰咎徴曰狂恆雨若曰僭恆𤾉若曰豫恆燠若曰急恆寒若曰蒙恆風若狂妄僭差豫怠急迫蒙昧也在天為五行在人為五事五事修則休徴各以類應之五事失則咎徴各以類應之自然之理也然必曰某事得則某休徴應某事失則某咎徴應則亦膠固不通而不足與語造化之妙矣天人之際未易言也失得之機應感之徴非知道者孰能識之哉朱子曰今人讀書粗心大膽如何看得古人意思如說八庶徴這若不細心體識如何會見得肅時雨若肅時恭肅便自有滋潤底意思所以便說時雨順應之乂時𤾉若乂是整治便自有開明底意思所以便說時𤾉順應之哲時燠若哲是昭融便自有和暖底意思所以便說時燠順應之謀時寒若謀是藏密便自有寒結底意思所以便說時寒順應之聖時風若聖是通明便自有爽快底意思所以便說時風順應之符舜功云謀自有顯然著見之謀聖是不可知之妙不知於寒於風果相關否曰凡看文字且就地頭看不可將大底便來壓了箕子所指謀字只是且說密謀意思聖只是說通明意思如何將大底來壓了便休如說喫棗固是有大如瓜者且就眼下說只是常常底棗如煎藥合用棗子幾箇自家須要說棗如瓜大如何用得許多人若心下不細如何讀吉人書洪範庶徴固不是必定如漢儒之說必以為有是事多雨之徴必推說道是某時做某事不肅所以致此為此必然之說所以教人難盡信但古人意思精密只於五事上體察是有此理如王荆公又却要一齊都不消說感應只把若字做如似字義說了做譬喻說了這也不得荆公固是也說道此事不足驗然而人主自當謹戒如漢儒必然之說固不可荆公全不相關之說亦不可古人意思精密恐後世見未到耳人主之行事與天地相為流通故行有善惡則氣名以類而應然感應之理非謂行此一事即有此一應統而言之一德修則凡德必修一氣和則凡氣必和固不必曰肅自致雨無與於𤾉乂自致𤾉無與於雨但德修而氣必和矣分而言之則德各有方氣各有象肅者雨之類乂者𤾉之類求其所以然之故固各有所當也咎徴亦然中問休徴咎徴諸家多以義推說舉切以為此猶易取象相似但可以髣佛看而不可以十分親切求也庶徴雖有五者大抵不出陰陽二端雨寒陰也𤾉燠風陽也肅謀深而屬靜陰類也故時雨時寒應之乂哲聖發見而屬動陽類也故時𤾉時燠時雨應之狂反於肅急失於謀故恆雨恆寒應之僭則不乂豫則不哲蒙則不聖故恆𤾉恆燠恆風應之未知如此看得否曰大槩如此然舊以雨屬木𤾉屬金燠屬火寒屬水而或者又以雨屬水𤾉屬火燠屬木寒屬金其說孰是可試思之林氏曰五者中節為五福之證不中節為六極之證來備以敘非其自爾是君休嘉之證也極備極無亦非自爾是君咎過之證也休咎在此而徴驗在彼肅乂哲謀聖者休之本五者之時休之徴也狂僭豫急蒙者咎之本五者之恆咎之徴也氣一失其和則必自省曰是吾之咎歟故思去其咎而反其休五者之咎聖人雖無之其徴則不可不自省也反陳氏大猷曰肅之反為狂狂則蕩故常雨若乂之為僭政不治則僭差也僭則亢故常𤾉若哲之反則猶豫不明故為豫豫則解緩故常燠若謀之反則不深密而急躁急則縮栗故常寒若聖之反則蔽塞不通而為蒙蒙則冥其心思無所不入以濟四者之惡故常風若又曰天地之間有必然之理有或然之數周末無寒嵗秦亡無燠年理之常也堯有九年之水湯有七年之旱數之變也理者聖賢之所守數非聖賢之所泥然堯舜雖不能無水旱之變而卒能消水旱之災蓋或然之數終不能勝必然之理聖人所以能回天地之造化也蔡李氏祀曰休咎之分皆起於君一念之微西山氏曰君即五者之應以察吾之得失一事得則五事從休徴無不應矣一事失則五事違咎徴無不應矣鯀湮洪水水失其性爾而五行為之汨陳以是理也漢儒不得其意而自為之說驗之於古則鑿而不經推之將來則膠而不應又以福極强配五行而以弱配皇之不極非鑿歟復齊董氏曰將以防其君之失適以啓其君之惑曰王省悉井反惟嵗卿士惟月師尹惟日嵗月日以尊卑為徴也王者之失得其徴以嵗卿士之得失其徴以月師尹之得失其徴以日蓋雨𤾉燠寒風五者之休咎有係一嵗之利害有係一月之利害有係一日之利害各以其大小言也朱子曰王省惟嵗言王之所當省者一嵗之事卿士所當省者一月之事以下皆然問王省惟嵗三句曰此但言職任之大小如此自林氏曰自五者來備以下申言曰雨至曰風之義王省惟嵗以下申言曰時之義或以曰王省惟嵗以後為五紀一疇之𫝊錯簡在此非也九疇雖别為九實更相經緯故庶徴有五事而皇極有五福新安陳氏曰周禮太宰嵗終受百官之會而詔王廢置小宰月終受羣吏之要宰夫旬終正日成以證此章亦一說但王卿尹省休咎于嵗月日之時者所包甚大安止此哉曰字更端而言庶徴之候王之得失其徴以嵗故王者所省察惟一嵗之時之休咎卿士得失其徴以月故卿士所省察惟一月之時之休咎師尹放此卿士不言省蒙上文也嵗統月月統日猶王統卿士卿士統師尹尊者所理大而要卑者所理小而詳也雨𤾉燠寒風之休咎實行乎嵗月日之中五者時若則嵗月日之時無易而休徴見矣五者恆若則日月嵗之時既易而咎徴見矣氣行乎候之中非氣自氣候自候也嵗月日時無易百穀用成乂用明俊民用章家用平康嵗月日三者雨𤾉燠寒風不失其時則其效如此休徴所感也日月嵗時既易百穀用不成乂用昏不明俊民用微家用不寧日月嵗三者雨𤾉燠寒風既失其時則其害如此咎徴所致也休徴言嵗月日者總於大也咎徴言日月嵗者著其小也朱子曰此覆說時之徴嵗統月月統日職尊者所理大而要職小者所理小而詳取蒙于嵗月日也君秉君道臣行臣職君君臣臣猶嵗月日時之不易則休徴可致反是則為咎徴矣庶民惟星星有好去聲下同風星有好雨日月之行則有冬有夏月之從星則以風雨民之麗乎土猶星之麗乎天也好風者箕星好雨者畢星漢志言軫星亦好雨意者星宿皆有所好也日有中道月有九行中道者黃道也北至東井去極近南至牽牛去極逺東至角西至婁去極中是也九行者黑道二出黃道北赤道二出黃道南白道二出黃道西青道二出黃道東并黃道為九行也日極南至于牽牛則為冬至極北至於東井則為夏至南北中東至角西至婁則為春秋分月立春春分從青道立秋秋分從白道立冬冬至從黑道立夏夏至從赤道所謂日月之行則有冬有夏也月行東北入于箕則多風月行西南入于畢則多雨所謂月之從星則以風雨也民不言省者庶民之休咎係乎上人之得失故但以月之從星以見所以從民之欲者如何爾夫民生之衆寒者欲衣飢者欲食鰥寡孤獨者之欲得其所此王政之所先而卿士師尹近民者之責也然星雖有好風好雨之異而日月之行則有冬有夏之常以月之常行而從星之異好以卿士師尹之常職而從民之異欲則其從民者非所以徇民矣言日月而不言嵗者有冬有夏所以成嵗功也言月而不言日者從星惟月而可見耳問庶民惟星一句解不通并下文星有好風星有好雨意亦不貫朱子曰家用不寧以上自結上文了下文却又說起星之意似是兩段庶民衆多衆星之象也當在師尹惟日之下但其致證不同故各發此義以互相見二十八宿環繞日月行道之側故月行必經歷之經于箕則多風歷于畢則多雨蓋二星各有所好月經行其處順時當候則陰陽和而風雨時應言無差忒也按星非有嗜好但氣類相感月亦非有順從但行度所次耳今曰好曰從乃假設以諭人事民之情性莫不有所好上之人能順其所好所欲與聚所惡勿施則和氣致祥猶如風雨之應上言職分明則至治成此言人心順則和氣應皆庶徴之事也問箕星好風畢星好雨曰箕是簸箕以其簸揚而鼓風故月宿之則風古語云月宿箕風揚沙畢是義網漉魚底義子亦謂之畢漉魚則其汁水淋漓而下若雨然畢星名義蓋取此今畢星上有一柄下開兩義形象亦類畢故月宿之則雨漢書謂月行東北入軫若東南入箕則風者蓋箕是東南方屬㢲㢲為風所以好風恐未必然唐孔氏曰箕東方木宿畢西方金宿也詩云月離于畢俾滂沱矣經箕多風傳記無其事鄭氏引春秋緯云月離于箕則風揚沙若西山蔡氏曰王卿士師尹其得失驗之于嵗月日庶民之得失則在君所謂百姓有過在豫一人故此以庶民省之於星以驗其安與不安而已漢志言日行陽道多風旱行陰道多雨水日象人君之行不可指而知以正行言之冬則南夏則北然君行急則日行疾君行緩則日行遲疾則過乎中道遲則不及乎中道日之所行月之所隨也日失中道則月亦變行故去中道移而東北入于箕則多風為旱移而西南入于畢則多雨為水所謂月之從星則以風雨也蓋民之安否省之于星星之風雨本之于日月月之九道本之於日故庶民惟星繼之以日月之行則有冬有夏月之從星則以風雨也雨𤾉燠寒風既徴於貌言視聽思又以所職大小别之於嵗月日又以民之安否參之於星于以見皇極之君視履考祥如此之周旋而不敢忽也以新安陳氏曰按前漢五行志元光中天星盡搖上問候星者對曰星搖者民勞也又云五星同色天下偃兵百姓安寧歌舞以行以此觀之則以庶民省之於星以驗其安否之說信矣此息齊余氏曰庶徴者合五事五紀以參驗者也於不言厯數者厯數所以推天運之常庶徴所以參人事之感其進退飛伏有出於厯數所推之外者矣唐一行日食議中有厯與占之說甚精沈存中曰厯法天有黃赤二道日月有九道此皆强名而已非實有也亦猶天之有三百六十五度天何嘗有度以日行三百六十五日而一期强謂之度以步日月五星行次而已日之所由謂之黃道南北極之中道最均處謂之赤道月行黃道之南謂之朱道行黃道之北謂之黑道行黃道之東謂之青道行黃道之西謂之白道黃道內外各四并黃道為九日月之行有遲有速難可以一術御也故因其合散分為數段每段以一色名之欲以别算位而已如算法用赤籌黑籌以别正附之數厯家不知其意遂以為實有九道甚可嗤也九五福一曰夀二曰富三曰康寧四曰攸好去聲德五曰考終命人有夀而後能享諸福故夀先之富者有廪祿也康寧者無患難也攸好德者樂其道也考終命者順受其正也以福之急緩為先後朱子曰休咎徴于天則禍福加于人福極通天下人民而言蓋人主不必一身為福極而以天下為福極民皆仁夀堯舜之福也民皆鄙夭桀紂之極也五福以人所尤好者為先二孔氏曰夀百二十年有唐孔氏曰世有長夀云百十年故𫝊言之未必正文言林氏曰唐李泌云天命他人皆可言惟君相不可君相造命者也民命雖禀於天君實制之自五行至庶徴各得其叙則民歸於五福矣五福雖天所畀實自造命者嚮而致之也自五行至庶徴失其敘則民陷於六極矣欲民不陷於極亦造命者威而避之也使民享五福而不知六極此治道之極功也故九疇以是終焉代陳氏大猷曰人莫不好生惡死夀則生之長者四皆尚齒故五福夀為先雖夀不可無以養其生故富次之壽且富或不免於憂患則身心不安故康寧又次之形康心寧安之至也夀富康寧而不好德則老而不死為富不仁作僞心勞何足貴哉攸好德則心逸日休自求多福福之本實在此其為福大矣故好德又次之考成也諸福備矣必成其正命則全而歸之順受其正然後為福之至使年雖壽而死非正命雖夀何補非福矣故考終命終焉此之五福即皇極疇之五福五福以攸好德為根本五福之目雖至第九疇而列而五福之根本則已於第五疇而基曰豫攸好德汝則錫之福是也好德則必得其夀為世耉老無德而夀罔之生也好德則得祿而富無德而富怨之府也好德則心廣體胖無入不自得無德則小人長戚戚非安也至於考終命又未有不由德而能戰兢以全歸者諸福固必本於好德而好德又豈非本於建皇極哉憂凶者考終命之反短折者夀之反貧者富之反疾者康寧之反惡弱者好德之反陷于不善者惡也雖欲為善而不能自强者弱也王氏炎曰年未六十死以正命雖考終不得謂之夀年過六十而死非正命雖夀不得謂之考終故夀與考終命各一福也王氏曰富貴人所欲貧賤人所惡而福極不言貴賤何也曰玉福者自天子至庶人皆可使慕而嚮六極亦皆可使畏而逺若貴賤則有常分矣使自公侯至庶人皆慕貴欲其至而不欲賤之在己則陵犯篡奪何有終窮詩曰實命不猶蓋王者之世欲賤者之安其賤如此者顧氏臨曰不言貴雖以嚴分然貴者未必為福賤未必為極故桀紂貴為天子而不得其死顔回原憲到今稱之徽庵程氏曰夀富康寧考終命全五行之氣攸好德者全五行之理六極一曰凶短折二曰疾三曰憂四曰貧五曰惡六曰弱凶者不得其死也短折者橫夭也禍莫大於凶短折故先言之疾者身不安也憂者心不寧也貧者用不足也惡者剛之過也弱者柔之過也以極之輕重為先後五福六極在君則係於極之建不建在民人則由於訓之行不行感應之理微矣朱子曰六極以人所尤惡者為先三衢夏唐老作九疇圗因執以問讀未竟至所謂皆天也非人之所能為也遂指前圗子云此乃人為安得而皆天也洪範文字最難作向來亦將天道人事分配為之後來覺未盡遂己之直是難以私意安排若只管外邊出意推將去何所不可只是理不如此蘇氏以皇極之建為雨𤾉寒燠風之時皇極不建則反此漢儒之說尤疏如以百般皇極配庶徴却外邊添出一箇皇極或此邊減却一箇庶徴自增自損皆出己意然此一篇文字極是不齊整不可曉解如五福對六極一曰壽正對凶短折二曰富正對貧三曰康寧對疾與弱皆其類也攸好德却對惡參差不齊不容布置如曰斂時五福錫厥庶民不知如何斂又復如何錫此只是順五行不違五事自己立標準以示天下使天下之人得以觀感而復其善耳今即以皇極為大中者更不賞善亦不罰惡好善惡惡之理都無分别豈理也哉說夏唐老九疇圖五福六極也是配得但是略有不齊問皇極五福即是此五福否曰使即是這五福如斂時五福用敷錫厥庶民斂底即是盡得這五事以此錫庶民便是使民也盡得這五事盡得五事便有五福王氏炎曰比干死刑仇牧死亂狼瞫死戰亦凶乎楚執晉解揚揚曰下臣獲考死又何求死而合義雖不斃牖下非凶也惡者小人之剛自暴者也弱者小人之柔自棄者也自吕氏曰弱何以與六極蓋弱人之大患人所以不强於善或牽引入於惡而不能自拔皆弱故也故特以居六極之終息齊余氏曰六極大率五福之反好德無反者求在我者也九董氏鼎曰自初一曰五行至威用六極禹之本文疇之經也自一五行至篇終箕子之叙論九疇之𫝊也先經以明其綱後𫝊以詳其目洪範可得而讀矣蓋天地之所以為造化者陰陽五行而已聖人不能違也天地以其氣生育民物而理行乎其中聖人以其理修己治人而氣參乎其上大抵一二三四皆經常之疇法天以治乎人者也六七八九皆權變之疇即人以驗諸天者也而五皇極一疇則守常制變之主與天為徒為民之則者也伏羲本河圖而畫八卦八卦一陰陽也神禹本洛書而叙九疇九疇一五行也然易不言五行範不言陰陽蓋陰陽一五行也五行一太極也河圖洛書相為經緯八卦九章相為表裏一而二二而一者也洪範法之大不出九疇外則彜倫道之常即在九疇中矣舍是何以敘彝倫哉書經大全卷六
