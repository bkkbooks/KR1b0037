body:
  text: 書經大全卷九明胡廣等撰多方成王即政奄與淮夷又叛成王滅奄歸作此篇按費音祕誓言徂兹淮夷徐戎並興即其事也疑當時扇亂不特殷人如徐戎淮夷四方容或有之故及多方亦誥體也今文古文皆有蘇氏曰大誥康誥酒誥梓材召誥洛誥多士多方八篇雖所誥不一然大略以殷人心不服周而作也豫讀泰誓武成常怪周取殷之易音異下同及讀此八篇又怪周安殷之難也多方所誥不止殷人乃及四方之士是紛紛焉不心服者非獨殷人也豫乃今知湯已下七王之德深矣方殷之虐人如在膏火中歸周如流不暇念先王之德及天下粗定人自膏火中出即念殷先七王如父母雖以武王周公之聖相繼撫之而莫能禦也夫以西漢道德比之殷猶碔砆石次玉也之與美玉然王莽公孫述隗囂音敖之流終不能使人忘漢光武成功若建瓴音蹇零謂覆盛水瓶也然使周無周公則亦殆矣此周公之所以畏而不敢去也朱子曰大誥梓材多士多方等篇乃當時編人君告其民之辭多是方言故諸誥等篇當時士民曉得而今士人不曉得如林氏曰奄即淮夷之一種總言則謂之淮夷春秋赤狄之有潞氏甲氏也周公攝政時奄嘗與三監同叛多士曰昔朕來自奄已嘗征之今成王即政奄又叛成王滅之而歸鎬京諸侯來朝周公又稱王命以告之故作此篇唐孔氏曰雖普告多方意在殷之舊國勞吕氏曰自大誥至多方所以處殷民者何其也武王崩以喜亂之徒因思舊之情乘內難之隙三者參合其禍至此是固周之不造實則天之大扶持保佑有周者也人之稚齒百疾先見則必過加調護凡伐性傷生者一切不敢萌所以培固真源克登上夀者少年多疾之力也成周八百年之基業可於此占之多士多方辭㫖相出入多士既遷殷民而獨告新民也故視多方為略多方既踐奄而遍告庶邦也故視多士為詳惟五月丁亥王來自奄衣廉反今曲阜縣之奄至鄉是也至于宗周成王即政之明年商奄又叛成王征滅之杜預云奄不知所在宗周鎬京也吕氏曰王者定都天下之所宗也東遷之後定都于洛則洛亦謂之宗周衛孔悝之鼎銘曰隨難去聲于漢陽即宫于宗周是時鎬已封秦宗周蓋指洛也然則宗周初無定名隨王者所都而名耳孔氏曰周公歸政之明年淮夷奄又叛魯征淮夷作費誓王征庵滅之五月還鎬京新安陳氏曰洛誥戊辰王在新邑孔注十二月戊辰海此七年之十二月即成王即政之年也多士作于是年三月曰昔朕來自奄是述東征時事乃自武王誅紂伐奄後第二畨叛也多方作於即政之明年五月成王政序曰成王遂踐奄多方序曰王歸自奄書曰王來自奄乃庵之第三畨叛王隳其地遷其君又因以告多方也以去年十二月戊辰晦算之則次年正月朔己巳五月朔非丁卯則戊辰丁亥非二十日即二十一日也多士與多方之作先後蓋一年有三月云周公曰王若曰猷告爾四國多方惟爾殷侯尹民我惟大降爾命爾罔不知吕氏曰先曰周公曰而復曰王若曰何也明周公傳王命而非周公之命也周公之命誥終於此篇故發例於此以見大誥諸篇凡稱王曰者無非周公傳成王之命也成王滅奄之後告諭四國殷民而因以曉天下也所主殷民故又專提殷侯之正民者告之言殷民罪應誅戮我大降宥爾命爾宜無不知也洪惟圖天之命弗永寅念于祀圖謀也言商奄大惟私意圖謀天命自底滅亡不深長敬念以保其祭祀吕氏曰天命可受而不可圖圖則人謀之私而非天命之公矣此蓋深示以天命不可妄千乃多方一篇之綱領也下文引夏商所以失天命受天命者以明示之吕氏曰遍告四方者何也殷奄屢叛驅扇者廣今雖平殄譬餘邪遺疾猶或在肺腑間恐或有時而發也故渙發大號歷叙天命之公前代之事征誅安集之本末俾四方咸與聞之大破羣疑深絶亂根蓋本於是兵寢刑措者四十餘年其亦訓誥之助歟惟帝降格于夏有夏誕厥逸不肯戚言于民乃大淫昏不克終日勸于帝之迪乃爾攸聞言帝降災異以譴告桀桀不知戒懼乃大肆逸豫憂民之言尚不肯出諸口況望其有憂民之實乎勸勉也迪啓迪也視聽動息日用之間洋洋乎皆上帝所以啓迪開導斯人者桀乃大肆淫昏終日之間不能少勉於是天理或幾平聲乎息矣況望有惠迪而不違乎此乃爾之所聞欲其因桀而知紂也厥逸與多士引逸不同者猶亂之為亂為治耳逸豫以民言淫昏以帝言各以其義也此章上疑有闕文王氏曰惟帝降格于夏與多士則惟帝降格嚮于時夏同意厥圖帝之命不克開于民之麗乃大降罰崇亂有夏因甲于內亂不克靈承于旅罔丕惟進之恭洪舒于民亦惟有夏之民叨懫音滔至日欽劓音乂割夏邑此章文多未詳麗猶日月麗乎天之麗謂民之所依以生者也依於土依於衣食之類甲始也言桀矯誣上天圖度帝命不能開民衣食之原於民依恃以生者一皆抑塞遏絶之猶乃大降威虐於民以增亂其國其所因則始于內嬖蠱其心敗其家不能善承其衆不能大進於恭而寬大裕其民亦惟夏邑之民貪叨忿懫者則日欽承而尊用之以戕害於其國也吕氏曰原其所因蓋始於內亂末喜之嬖是也蠱其心敗其家然後流毒於國與天下探其根而言之也天惟時求民主乃大降顯休命于成湯刑殄有夏言天惟是為去聲民求主耳桀既不能為民之主天乃大降顯休命於成湯使為民主而伐夏殄滅之也吕氏曰曰求曰降豈真有求之降之者哉天下無統渙散漫流勢不得不歸其所聚而湯之一德乃所謂顯休命之實一衆離而聚之者也民不得不聚於湯湯不得不受斯民之聚是豈人為之私哉故曰天求之天降之也惟天不畀純乃惟以爾多方之義民不克永于多享惟夏之恭多士大不克明保享于民乃胥惟虐于民至于百為大不克開純大也義民賢者也言天不與桀者大乃以爾多方賢者不克永于多享以至于亡也言桀於義民不能用其所敬之多士率皆不義之民上文所謂叨懫日欽者同惡相濟大不能明保享于民乃相與播虐于民民無所措其手足凡百所為無一能達上文所謂不克開于民之麗者政暴民窮所以速其亡也此雖指桀多士爾殷侯尹民嘗逮事紂者寧不惕然內愧乎葉氏曰天佑之則曰純佑命不畀之則曰不畀純林氏曰此篇陳桀紂之亡商周之興皆出于天天之所奪非人力所能支天之所豫非人力所能移而其所以為豫奪者以其德與不德耳爾多方當知天命不可有他志也民保享于民安民而以之享國長久也吕氏曰義知義之民也桀之時三宅無義民義民在下雖多何補以爾多方之義民不能永受衆多之服享如負米而飢載泉而渴蓋哀之也百為大不克開欲耕害其耕欲賈害其賈四向皆窮無一能達民窮如此也乃惟成湯克以爾多方簡代夏作民主簡擇也民擇湯而歸之葉氏曰簡如簡在帝心之簡慎厥麗乃勸厥民刑用勸湯深謹其所依以勸勉其民故民皆儀刑而用勸勉也人君之於天下仁而已矣仁者君之所依也君仁則莫不仁矣以至于帝乙罔不明德慎罰亦克用勸明德則民愛慕之謹罰則民畏服之自成湯至于帝乙雖歷世不同而皆知明其德謹其罰故亦能用以勸勉其民也明德謹罰所以謹厥麗也明德仁之本也謹罰仁之政也要囚殄戮多罪亦克用勸開釋無辜亦克用勸德明之而已罰有辟音辟焉有宥焉故再言辟而當去聲罪亦能用以勸勉宥而赦過亦能用以勸勉言辟與宥皆足以使人勉於善也吕氏曰赦而民勸猶可也刑而民亦勸則有默行於刑赦之間者矣每語結之以勸者天下非可驅以智力束以法制惟勸化其民使常有欣欣不自己之意乃維持長久之道也本陳氏經曰商家法在明德慎罰明德化民用德其心慎罰不濫及民用刑不得已也本原既正則或刑或宥皆足以勸民於善刑一也先王用之而使民勸後世用乏而為民毒何也先王之刑皆仁之寓後世之刑不仁之具也夫子未嘗不釣弋也而仁見於不綱不射宿之際文王非不搜田也而仁見於一發不再舉之時也之新安陳氏曰明德以慎罰所以亦能用勸戮之釋刑所當刑宥所當宥無不能用勸也謹陳氏雅言曰仁者君之所依湯能以仁為依而致於上所以為民之勸故民亦以仁為勸而儀刑於下用以自勉其身是上下同一心也自是而後至於帝乙雖歷世不同而皆能明其德慎其罰故亦能用以勸勉其民罰之所慎於要囚而多罪者或殄戮之亦能用以勸勉其民無辜者或開釋之亦能用以勸勉其民蓋德者化民之本使人知所慕而樂於為善刑者輔治之具使民知所畏而不敢為惡有商哲王不徒以刑用刑而以德用刑故也慎厥麗者以仁之全體而言明德慎罰者以仁之目而言乃勸者上之勸下也刑用勸者下之自勸也亦克用勸者蓋兼上下而言也人知明德之為仁而不知慎罰之防範人心者蓋亦所以為仁也人知開釋無辜之為慎罰而不知殄戮多罪之懲創人心者尤所以止罰此有商以仁為家法於是深可見矣今至于爾辟弗克以爾多方享天之命吕氏曰爾辟謂紂也商先哲王世傳家法積纍維持如此今一旦至于汝君乃以爾全盛之多方不克坐享天命而亡之是誠可閔也天命至公操平聲則存舍上聲則亡以商先王之多基圖之大紂曾音屬不得席其餘蔭其亡忽焉危微操舍之幾平聲周公所以示天下深矣豈徒曰慰解之而已哉陳氏曰多方一也湯以之而作民主紂不能以之而享天命在所以如何耳民王氏曰此言殷之興甚詳言其亡甚略蓋對殷遺不忍痛言其失也嗚呼王若曰誥告爾多方非天庸釋有夏非天庸釋有殷先言嗚呼而後言王若曰者唐孔氏曰周公先自歎息而後稱王命以誥之也庸用也有心之謂釋去之也上文言夏殷之亡因言非天有心於去夏亦非天有心於去殷下文遂言乃惟桀紂自取亡滅也吕氏曰周公先自歎息而始宣布成王之誥告以見音現周公未嘗稱王也又此篇之始周公曰王若曰復語相承書無此體也至於此章先嗚呼而後王若曰書亦無此體也周公居聖人之變史官豫憂來世傳疑襲誤蓋有竊之為口實矣故於周公誥命終篇發新例二著周公實未嘗稱王所以别必列反嫌明微而謹萬世之防也夏氏曰誥告以誥辭告之也乃惟爾辟以爾多方大淫圖天之命屑有辭紂以多方之富大肆淫泆圖度達各反天命瑣屑有辭與多士言桀大淫泆有辭義同殷之亡非自取乎以下二章推之此章之上當有缺文孔氏曰惡事盡有辭說布在天下吕氏曰惡之播於人口者謂之辭惡之未熟大者傳道瑣屑者未盡舉至惡已熟瑣屑之惡極口歷數一一有辭乃惟有夏圖厥政不集于享天降時喪去聲下同有邦間去聲之集萃也享享有之享桀圖其政不集于享而集于亡故天降是喪亂而俾有殷代之夏之亡非自取乎唐孔氏曰湯是夏之諸侯故曰有邦乃惟爾商後王逸厥逸圖厥政不蠲音涓蒸天惟降時喪蠲潔蒸進也紂以逸居逸淫湎無度故其為政不蠲潔而穢惡不蒸進而怠惰天以是降喪亡於殷殷之亡非自取乎此上三節皆應上文非天庸釋之語陳氏曰上逸過逸也下逸安逸也謂過逸其安逸猶言安其危林氏曰逸厥逸甚言其逸也猶言醉乎醇惟聖罔念作狂惟狂克念作聖天惟五年須暇之子孫誕作民主罔可念聽聖通明之稱言聖而罔念則為狂矣愚而能念則為聖矣紂雖昏愚亦有可改過遷善之理故天又未忍遽絶之猶五年之久須待暇寬於紂覬其克念大為民主而紂無可念可聽者五年必有指實而言孔氏牽合嵗月者非是或曰狂而克念果可為聖乎曰聖固未易為也狂而克念則作聖之功知所向方太甲其庶幾矣聖而罔念果至於狂乎曰聖固無所謂罔念也堯戒舜曰無若丹朱傲惟慢遊是好一念之差雖未至於狂而狂之理亦在是矣此人心惟危聖人拳拳告戒豈無意哉朱子曰艾軒云文字只看易曉處如尚書惟聖罔念作狂惟狂克念作聖不與上下文相似下文便不可曉只看這兩句或謂性相近習相逺惟上智與下愚不移書中謂惟聖罔念作狂惟狂克念作聖若如此則又有移得者如何曰上智下愚不移如狂作聖則有之既是聖人決不到作狂此只是甚言不可不學聖問惟聖罔念作狂惟狂克念作聖竊謂聖者謂有人資質一不念則流入於狂狂者進取曾晳之徒是也借如顔子不能拳拳服膺亦必至於此若是聖人則從心所欲不踰矩雖不念亦無害也程子曰六德智仁聖義中和聖通明之稱狂狂愚之稱王氏曰操則存舍則亡其心之謂歟思曰睿睿作聖操其心以思所謂念也罔念雖聖可以作狂故克念則狂亦可以作聖矣林氏曰念不念之間聖狂所以分也苟其質之聖自恃其聖而不之思日復一日天命之性益就雕喪其作狂也何有苟其質之狂矣自恥其狂而思之日復一日天命之性忽然而復其作聖也何有作陳氏經曰子曰惟上智與下愚不移書乃曰聖可狂狂可作聖則可移歟曰孔子之言聖狂之成也其習既成則不移矣書之言聖狂之分也聖狂之分生於一念之頃堯舜而忘兢業豈不趨於狂桀紂而能改過遷善豈不趨於聖孔子雖曰不移實有可移之理但恐下愚自暴自棄不肯移耳肯移之是狂之克念也公言此者明紂之為惡倘一旦改悔天不終棄之也吕氏曰紂固無能改之事而有可改之理罔念克念之機所謂可改之理聖通明之稱周官六德聖居其一非大而化之之聖也若大而化之寧有罔念又豈狂者一克念而遽可至哉然大而化之亦通明之極而至于化耳狂而克念亦大而化之之基也雖曰通明不念則狂雖曰狂惑克念則通其機惟在念不念之間耳紂雖狂惑使其克念則聖孰禦惟其有可改之理天故以商先王之故徘徊五年須待寬暇之依依於商王子孫而冀其改焉李氏樗曰紂惡甚矣天猶待之如此見天心仁愛人君自非大無道天皆欲扶持而全安之惟終無悛心所以禍不可遏也孫林氏曰晉武帝以孫皓淫暴有問罪之志王濬曰皓荒淫宜速征伐若一旦皓死更立賢主則彊敵也晉武之心惟恐吳之有賢主武王之心惟恐紂之不能改過觀於晉武尤知武王之為德天惟求爾多方大動以威開厥顧天惟爾多方罔堪顧之紂既罔可念聽天於是求民主於爾多方大警動以祲音浸妖氣祥譴告之威以開發其能受眷顧之命者而爾多方之衆皆不足以堪眷顧之命也惟我周王靈承于旅克堪用德惟典神天天惟式教我用休簡畀殷命尹爾多方典主式用也克堪者能勝音升下同之謂也德輶如毛民鮮上聲克舉之言德舉者莫能勝也文武善承其衆克堪用德是誠可以為神天之主矣故天式教文武用以休美簡擇畀付殷命以正爾多方也吕氏曰式教用休者如之何而教之也文武既得乎天天德日新左右逢原其思也若或起之其行也若或翼之乃天之所以教而用以昌大休明者也非諄諄然而教之也此章深論去聲天下向者天命未定眷求民主之時能者則得之孰有遏汝者乃無一能當天之眷今天既命我周而定于一矣爾猶洶洶許拱反不靖欲何為耶明指天命而讋音懾服四海姦雄之心者莫切於是吕氏曰前論夏之亡本於不克靈承于旅此論周之興亦曰靈承于旅文武於德能勝而用之其力過孟賁逺矣漢唐賢主豈無欲布德于天下者惟力薄而奪於私欲故駁而不純是知德非真力則莫能勝莫能相也己新安陳氏曰克堪二字下得極有力非有仁以為任之𢎞兼死而後己之毅不能堪而用之也克堪用之必有非力之力如真積力久之力而後可陳氏大猷曰可謂神與天之主山川宗社之得其安三光寒暑之得其序皆人君有以主之時陳氏雅言曰成王言昔者天求民主於爾多方之惟我文武能溫然以愛其民毅然以修其德是誠可以為神天之主矣故上天於是式教之而使其治用以休美焉復簡擇之而畀付之以殷命君爾多方使為天下之主也德者事神治民之本人君者兼有事神治民之責文武之克堪用德既有以靈承其旅於先則能治民者未有不能推以事神者也上天之式教用休蓋將以簡畀殷命於後蓋可以事神者未有不可付以治民者也於此見文武之得天下固非苟得於天而天之子以天下者亦不輕畀於文武矣爾多方于此寧不為之釋然乎今我曷敢多誥我惟大降爾四國民命言今我何敢如此多誥我惟大降宥爾四國民命舉其宥過之恩而責其遷善之實也爾曷不忱裕之于爾多方爾曷不夾介乂我周王享天之命今爾尚宅爾宅畋爾田爾曷不惠王熙天之命夾夾輔之夾介賓介之介爾何不誠信寬裕於爾之多方乎爾何不夾輔介助我周王享天之命乎爾之叛亂據法定罪則瀦音諸水所停也其宅收其田可也今爾猶得居爾宅耕爾田爾何不順我王室各守爾典以廣天命乎此三節責其何不如此也吕氏曰教以誠信寬裕惟詐故迫惟誠故裕辟陳氏大猷曰乂我周王如乂用厥之乂謂治其君之事爾乃迪屢不靜爾心未愛爾乃不大宅天命爾乃屑播天命爾乃自作不典圖忱于正爾乃屢蹈不靜自取亡滅爾心其未知所以自愛耶爾乃大不安天命耶爾乃輕棄天命耶爾乃自為不法欲圖見信于正者以為當然耶此四節責其不可如此也陳氏大猷曰自作不典亂綱常之事苟欲人信以為正蓋四國從殷以求興復自以為正義也我惟時其教告之我惟時其戰要囚之至于再至于三乃有不用我降爾命我乃其大罰殛之非我有周秉德不康寧乃惟爾自速辜我惟是教告而誨諭之我惟是戒懼而要囚之今至于再至于三矣爾不用我降宥爾命而猶狃女九反於叛亂反覆我乃其大罰殛殺之非我有周持德不安靜乃惟爾自為凶逆以速其罪耳孔氏曰教告之謂訊之以文誥戰要囚謂誅其禍亂執其朋黨再謂三監淮夷叛三謂王即政又叛言屢迪不靜之事王曰嗚呼猷告爾有方多士暨殷多士今爾奔走臣我監平聲下同五祀監監洛邑之遷民者也猶諸侯之分民有君道焉所以謂之臣我監也言商士遷洛奔走臣服我監於今五年矣不曰年而曰祀者因商俗而言也又按成周既成而成王即政成王即政而商奄繼叛事皆相因才一二年爾今言五祀則商民之遷固在作洛之前矣尤為明驗越惟有胥伯小大多正爾罔不克臬音涅臬事也周官多以胥以伯以正為名胥伯小大衆多之正蓋殷多士授職於洛共長上聲治遷民者也其奔走臣我監亦久矣宜相體悉竭力其職無或反側偷惰而不能事也自作不和爾惟和哉爾室不睦爾惟和哉爾邑克明爾惟克勤乃事心不安靜則身不和順矣身不安靜則家不和順矣言爾惟和哉者所以勸勉之也和其身睦其家而後能協于其邑歡然有恩以相愛粲然有文以相接爾邑克明始為不負其職而可謂克勤乃事矣前既戒以罔不克臬故以克勤乃事期之也爾尚不忌于凶德亦則以穆穆在乃位克閲于乃邑謀介忌畏也穆穆和敬貌頑民誠可畏矣然如上文所言爾多士庶幾不至畏忌頑民凶德亦則以穆穆和敬端處爾位以潛消其悍逆悖戾之氣又能簡閲爾邑之賢者以謀其助則民之頑者且革而化矣尚何可畏之有哉成王誘掖音反亦商士之善以化服商民之惡其轉移感動之機微矣哉爾乃自時洛邑尚永力畋爾田天惟畀矜爾我有周惟其大介賚爾迪簡在王庭尚爾事有服在大僚爾乃自時洛邑庶幾可以保其有業力畋爾田天亦將畀豫音與矜憐於爾我有周亦將大介助賚錫於爾啓迪簡拔置之王朝音潮矣其庶幾勉爾之事有服在大僚不難至也多士篇商民嘗以夏迪簡在王庭有服在百僚為言故此因以勸厲之也新安陳氏曰爾能和身及家以及爾邑則爾邑之教化能修明爾方為能勤乃事矣又告以和之之道爾庶幾寬綽其心不忌嫉凶德者亦則以和敬居爾位蓋服凶人莫如和敬也又能簡閲爾邑聚賢以謀自介助和敬盡於己而介助資於人庶凶德化而人和治矣爾果能此庶幾自此洛邑長保田祿豈惟此哉天亦惟畀矜爾豈惟天哉我周亦大介助賚錫爾介如佑賢輔德賚如錫之土田且將自此洛邑之胥伯正而迪簡在王朝矣又有尊尚爾職事者且將有事而升在大僚矣此即所謂大介賚也蓋遷殷民時就拔其豪俊為胥伯正以共長治之乃用其素所服習者此安集新民之要道故今特勸勵之使表率殷土殷民而躋於泰和也吕氏曰多士序商民之怨周曰夏迪簡在王庭有服在百僚豫一人惟聽用德肆豫敢求爾于天邑商豫惟率肆矜爾非豫罪時惟天命則以大義裁之此乃以迪簡在王庭尚爾事有服在大僚為勤何也爵位上之所命非下之可干自其怨望而許之姑息之政也示以好惡而勸之磨厲之具也此周公御商士之開闔大用也王曰嗚呼多士爾不克勸忱我命爾亦則惟不克享凡民惟曰不享爾乃惟逸惟頗音坡大逺王命則惟爾方多探音貪天之威我則致天之罰離逖爾土誥告將終乃歎息言爾多士如不能相勸信我之誥命爾亦則惟不能享上凡爾之民亦惟曰上不必享矣爾乃放逸頗僻大違我命則惟爾多士自取天威我亦致天之罰播流蕩析俾爾離逺爾土矣爾雖欲宅爾宅畋爾田尚可得哉多方疑當作多士上章既勸之以休此章則董之以威商民不惟有所慕而不敢違越且有所畏而不敢違越矣王氏曰上告以承之庸之此告以威之也王曰我不惟多誥我惟祗告爾命我豈若是多言哉我惟敬告爾以上文勸勉之命而已陳氏經曰我豈欲多言以告惟敬告爾以天命而已不知天命乃商民之病根故此篇言天命尤詳慮張氏曰稱天者無二十稱帝者三又曰時惟爾初不克敬于和則無我怨與之更音庚始故曰時惟爾初也爾民至此苟又不能敬于和猶復扶又反乖亂則自底音止誅戮毋我怨尤矣開其為善禁其為惡周家忠厚之意於此篇尤為可見吕氏曰又曰二字所以形容周公之惓惓斯民會已畢而猶有餘情誥已終而猶有餘語顧盻之光猶曄然溢於簡冊也吕氏曰是又爾更端為善之一初也蓋殷民與紂同惡武王克紂是維新之一初也不能而從三監之叛則既失此初矣遷洛又一初也復不能而屢迪不靜則又失此初矣今歸自滅庵而又為多方之誥丁寧反覆諭以時惟爾初初之過一皆洗滌今之善當相與維新豈非又一初乎若又失此初不能敬以納民于和則永無可望矣但曰則無我怨而自取誅戮之意隱然於不言之表周家忠厚何其至哉立政吳氏曰此書戒成王以任用賢才之道而其㫖意則又上戒成王專擇百官有司之長如所謂常伯常任準人等云者蓋古者外之諸侯一卿已命於君內之卿大夫則亦自擇其屬如周公以蔡仲為卿士伯冏謹簡乃僚之類其長既賢則其所舉用無不賢者矣葛氏曰誥體也今文古文皆有吕氏曰無逸立政二篇相為經緯以無逸之心明立政之體君道傋矣自立政後周公不復有書納忠于王此絶筆也為治源流固臻其極而反覆申重之意忠愛惇篤之誠深長逺大之慮學者當於言外體之綱新安陳氏曰此篇以用三宅為立政用人之領立政二字每段多提掇之故以名篇孟子曰人不足與適也政不足與間也唯大人為能格君心之非無逸周公格心之書也立政公言用人為政之書也忠愛拳拳體用備矣周公若曰拜手稽首告嗣天子王矣用咸戒于王曰王左右常伯常任準人綴衣虎賁音奔周公曰嗚呼休兹知恤鮮上聲哉此篇周公所作而記之者周史也故稱若曰言周公帥音率羣臣進戒於王贊之曰拜手稽首告嗣天子王矣羣臣用皆進戒曰王左右之臣有牧民之長上聲曰常伯有任事之公卿曰常任有守法之有司曰準人三事之外掌服器者曰綴衣執射御者曰虎賁皆任用之所當謹者周公於是歎息言曰美矣此官然知憂恤者鮮矣言五等官職之美而知憂其得人者少也吳氏曰綴衣虎賁近臣之長也葛氏曰綴衣周禮司服之類虎賁周禮之虎賁氏也唐孔氏曰周公既拜手稽首而後發言還自言拜手稽首者示已重其事欲君受其言如召誥言拜手稽首旅王若公亦是召公自言與此同也時陳氏大猷曰嗣天子今臨政天下矣此王初即政前此幼沖皆倚成於公故警之如此用悉意以告王以林氏曰下文宅乃牧即常伯此以為伯下以為牧伯為牧民之長也而曰左右者以牧伯兼公卿也三宅固不可不得人然進見有時虎賁綴衣之類則朝夕與王處最親且密苟非其人則主德內蔽大臣雖賢何所施其力哉公吕氏曰常伯等即三宅三代之書他無所見意者卿輔相之别名歟官有别名如相曰阿衡保衡三卿曰圻父農父宏父此亦三代輔政大臣别名耳綴衣虎賁特於侍御僕從中錯舉二者以見其餘耳職重者有安危之寄職親者有習染之移其繫天下之本一也能休嘉此數職知憂恤審擇之者鮮焉先言休兹而繼以知恤必知建官之美意然後深以為恤也三宅左右大臣綴衣虎賁左右小臣職有小大而經綸康濟薰陶涵養賴焉知其美而加之憂庶不以非人處之矣新安陳氏曰常任即宅事所職必廣凡任事之大臣也常伯即宅牧主牧養之大臣也準人即宅準主平法之大臣也又按虞有十二牧夏周有九牧皆在邦國意必有大臣在朝者以統之如虞四嶽統十二牧周六卿倡九牧立政所謂常伯宅牧必掌牧養而在朝以統牧伯者歟陳氏雅言曰周公言立政之道以得人為本是以統率羣臣將有言於王而先贊之以拜手稽首以竭其事君之禮復稱嗣天子王以尊其為君之名所以開其進言之端也羣臣于是咸戒于王謂王之左右常伯常任準人之當謹綴衣虎賁之當擇所以致其告君之說也周公於是復歎息而言謂五者之職雖美而自古知恤為鮮所以申其陳成之義也化臨川吳氏曰伯長民者也文武時召公為伯而宣於外蓋其職也任任事者也文武時周公為宰而兼政於中蓋其職也凖人掌法之官刑法當如準之平故曰準人綴衣幄帳也如幕人掌次之類虎賁衛王者如虎賁氏旅賁氏之類問公帥羣臣進戒于王而贊之曰拜手稽首告嗣天子王矣羣臣用皆進戒而曰王左右之臣有長民者有任事者有平法者有居而張設者有行而護衛者皆不可不謹選其人周公不待其辭之畢於王前嗟嘆謂能以五官不得其人為憂者鮮哉古之人迪惟有夏乃有室大競籲音俞俊尊上帝迪知忱恂于九德之行胡孟反乃敢告教厥后曰拜手稽首后矣曰宅乃事宅乃牧宅乃準兹惟后矣謀面用丕訓德則乃宅人兹乃三宅無義民古之人有行此道者惟有夏之君當王室大强之時而求賢以為事天之實也迪知者蹈知而非苟知也忱恂者誠信而非輕信也言夏之臣蹈知誠信于九德之行乃敢告教其君曰拜手稽首后矣云者致敬以尊其為君之名也曰宅乃事宅乃牧宅乃準兹惟后矣云者致告以叙其為君之實也兹者此也言如此而後可以為君也即臯陶與禹言九德之事謀面者謀人之面貌也言非迪知忱恂于九德之行而徒謀之面貌用以為大順于德乃宅而任之如此則三宅之人豈復有賢者乎蘇氏曰事則向所謂常任也牧則向所謂常伯也準則向所謂準人也一篇之中所論宅俊者參差上初簮反下初宜反不齊然大要不出是三者其餘則皆小臣百執事也吳氏曰古者凡以善言語去聲人皆謂之教不必自上教下而後謂之教也林氏曰惟禹以籲俊為心故其臣亦以薦揚為務委陳氏大猷曰宅者居而安之之謂或才德不稱或任不篤皆非宅也人吕氏曰自臯陶以九德告禹夏后蓋世守以為知之法焉方夏之盛任三宅者如此及其衰也並至於曾無義民言所任者皆不義之人無一君子也兹乃云者此乃三宅之位非他位也猶無義民則他可知矣以新安陳氏曰公既歎知恤者鮮歷舉古之知恤者告王夏后商湯文武皆知恤此者以次言之也無競維人人中之俊乃天生之以遺國家者九德之行即臯陶謨亦行有九德自寬栗至彊義之德之見於躬行者也俊非徒才俊必有德如所謂以克俊有德臯陶亦曰九德咸事俊乂在官未嘗岐俊與德而二之國陳氏雅言曰有夏之君信能行此用賢之道不必家之盛治為己足惟以賢俊之當籲為未至其事天之道至矣有夏之臣信能有此九德之行故不徒致敬以尊其為君之名而且致告以叙其為君之實其事君之道得矣夏之君臣各盡其道此其立政之要也以上迪字與下迪知忱恂作對說吕氏謂周公之戒成王自綴衣虎賁之外其禮其辭與夏略同然則以圖任三宅為人君之職者三代告君之常法也表親近之職使人君不敢輕者周公養源之精意也桀德惟乃弗作往任是惟暴德罔後夏桀惡德弗作往昔先王任用三宅而所任者乃惟暴德之人故桀以喪亡無後吕氏曰非人才果異於往日也桀之惡德弗作往日先王之任用而已往惟俊德是任效見於有室大競桀惟暴德是任效見於絶世無後信乎存亡在所任也亦越成湯陟丕釐音嫠上帝之耿命乃用三有宅克即宅曰三有俊克即俊嚴惟丕式克用三宅三俊其在商邑用協于厥邑其在四方用丕式見德亦越者繼前之辭也耿光也湯自七十里升為天子典禮命討昭著於天下所謂陟丕釐工帝之光命也三宅謂居常伯常任準人之位者三俊謂有常伯常任準人之才者克即者言湯所用三宅實能就是位而不曠其職所稱三俊實能就是德而不浮其名也三俊說者謂他日次補三宅者詳宅以位言俊以德言意其儲養待用或如說者所云也惟思式法也湯於三宅三俊嚴思而丕法之故能盡其宅俊之用而宅者得以效其職俊者得以著其才賢智奮庸登于至治其在商邑用協于厥邑近者察之詳其情未易音異下同齊畿甸之協則純之至也其在四方用丕式見德逺者及之難其德未易遍觀法之同則大之至也至純至大治道無餘藴矣曰邑曰四方者各極其逺近而言耳陳氏大猷曰事事物物之理莫非天命之流行典禮刑賞則其大者湯升天位大理治上帝之明命謂大治天下使事物昭然各當於理即丕釐上帝之耿命也吕民曰漢高儲參陵平勃於身後迄定再世之亂孔明儲琬偉允等於身後亦維持數十年況三伐為天下長慮固宜儲三俊以繼三宅也嚴惟丕式嚴思賢者惟大則效之然後能用宅俊所謂學於伊尹而後臣之其一證也未用宅俊之前知之者惟湯既用之後則夫人而信之服新安陳氏曰宅俊用而逺近孚蓋舉用當而人心好人所好不拂人之性故也嚴惟丕式君大法乎賢也用丕式見德下之人因之而大法乎君也湯用三宅而且儲三俊以供無窮之用上廣夏后之所未及而下為文武之所取法焉嗚呼其在受德暋音敏惟羞刑暴德之人同于厥邦乃惟庶習逸德之人同于厥政帝欽罰之乃伻我有夏式商受命奄音掩盡也甸萬姓羞刑進任刑戮者也庶習備諸衆醜者也言紂德强暴又所與共國者惟羞刑暴德之諸侯所與共政者惟庶習逸德之臣下上帝敬致其罰乃使我周有此諸夏用商所受之命而庵甸萬姓焉甸者井牧其地什伍其民也王氏曰羞進也有崇尚之意桀紂所用非人皆本於身有惡德故曰桀德受德者推本言之也政吕氏曰論夏商之興亡不出於任用得失之間立之體統端在此矣鄒氏季友曰井牧周禮小司徒井牧其田野注云井牧者春秋傳所謂井衍沃牧隰臯是也田制一夫百畝故百畝為夫九夫為井隰臯之地九夫為牧二牧而當一井以田有不易一易再易通率二而當一也什伍周禮士師掌其民人之什伍又族師云五家為比十家為聫五人為伍十人為聫以受邦職以役國事亦越文王武王克知三有宅心灼見三有俊心以敬事上帝立民長上聲伯三宅三俊文武克知灼見皆曰心者即所謂迪知忱恂而非謀面也三宅已授之位故曰克知三俊未任以事故曰灼見以是敬事上帝則天職修而上有所承以是立民長伯則體統立而下有所寄人君位天人之兩間而俯仰無怍者以是也夏之尊帝商之丕釐周之敬事其義一也長如王制所謂五國以為屬屬有長伯如王制所謂二百一十國以為州州有伯是也吕氏曰論成湯文武皆以亦越發語蓋與上文相參也桀之時若不可為矣亦於成湯而遽如是焉紂之時若不可為矣亦於文武而遽如是焉治亂同機而異發聖狂同心而異念賢才同世而異用人君盍於此深省乎三宅共政者也知其心者猶未盡則不能無間惟文武真能知其心也三俊待用者也未與事遇則底藴不外見惟文武灼然見其心也知宅俊皆曰心者君臣相與萬化之源苟貌親口惠相期於肝膽之外則無其本矣長新安陳氏曰立民長伯當時宅俊或有出而封為伯者歟諸侯入為王官王官出為諸侯古常有之立政任人準夫牧作三事言文武立政三宅之官也任人常任也準夫準人也牧常伯也以職言故曰事虎賁綴衣趣此苟反馬小尹左石攜僕百司庶府此侍御之官也趣馬掌馬之官小尹小官之長攜僕攜持僕御之人百司若司裘司服庶府若內府大府之屬也鄒氏季友曰趣馬掌馬周禮校人掌王馬之政趣馬其屬也注云趣馬下士趣養馬者馬七十二匹立趣馬一人大都小伯藝人表臣百司太史尹伯庶常吉士此都邑之官也吕氏曰大都小伯者謂大都之伯小都之伯也大都言都不言伯小伯言伯不言都互見之也藝人者卜祝巫匠執技以事上者表臣百司表外也表對裹之詞上文百司蓋內百司若內府內司服之屬所謂裹臣也此百司蓋外百司若外府外司服之屬所謂表臣也太史者史官也尹伯者有司之長上聲如庖人內饔膳夫則是數尹之伯也鍾師尹鍾磬師尹磬大師司樂則是數尹之伯也凡所謂官吏莫不在內外百司之中至於特見其名者則皆有意焉虎賁綴衣趣馬小尹左右攜僕以扈衛親近而見音現下並同庶府以冗賤人所易忽而見藝人恐其或興淫巧機詐以蕩上心而見太史以奉諱惡公天下後世之是非而見尹伯以大小相維體統所係而見若大都小伯則分治郊畿不預百司之數者既條陳歷數音所文武之衆職而總結之曰庶常吉士庶衆也言在文武之廷無非常德吉士也復齊董氏曰周官注大都公之采邑小都卿之采地是也古人立言之法有互文見意者如詩鉦人伐鼓之類是也鄒氏季友曰禮記王制太史所掌執簡記奉諱惡注云諱先生名惡忌日若子卯司徒司馬司空亞旅此諸侯之官也司徒主邦教司馬主邦政司空主邦土餘見牧誓言諸侯之官莫不得人也諸侯之官獨舉此者以其名位通於天子歟問司徒司馬司空亞旅不知何故敘於太史尹伯庶常吉士之下吕氏以為諸侯之官未知是否朱子曰謂三官之副與其屬耳亞謂小司徒之屬旅即下士也見周禮序官夷微盧蒸三亳阪音反尹此王官之監平聲於諸侯四夷者也微盧見音現下並同經亳見史三亳蒙為北亳穀熟為南亳偃師為西亳蒸或以為衆或以為夷名阪未詳古者險危之地封疆之守或不以封而使王官治平聲之參錯於五服之間是之謂尹地志載王官所治非一此特舉其重者耳自諸侯三卿以降惟列官名而無他語承上庶常吉士之文以內見外也夫音扶上自王朝音潮內而都邑外而諸侯逺而夷狄莫不皆得人以為官使何其盛歟王氏曰此篇屢言三宅而先後之序不同者官使之際皆當致謹初無一定之先後也陳氏曰伯舉其長亞旅舉其屬互相傋也以上詳言文武用人凡大小內外逺近皆各得其人也君子用心常久則為吉士小人用心不常則為凶人彰厥有常吉哉亦此意夷微盧蒸四國也三亳商故地分而為三也如後世三楚三吳阪險之地皆立官以長之故曰尹言四國三亳與阪險之地皆有尹也文武以一人之聰明豈能周知內外逺近大小之臣哉三宅大臣人主所親擇其下小大之臣又各委之三宅高宗曰惟暨乃僚穆王亦曰慎簡乃僚皆然也宅新安陳氏曰文武立政之本在用任人準夫牧三以作三宅之職事而已百司庶府以上此內百司所謂裹臣也表臣百司以下此外百司所謂表臣也以下之表臣見上為裏臣也文武時得人之盛如此推其本原由其知立政綱領所用三宅三宅得人故內外衆職皆得人也下文遂復以三宅參錯言之文王惟克厥宅心乃克立兹常事司牧人以克俊有德文王惟能其三宅之心能者能之也知之至信之篤之謂故能立此常任常伯用能俊有德也不言準人者因上章言文王用人而申克知三有宅心之說故略之也朱子曰文王惟克厥宅心人皆以宅心為處心非也即前面所說三有宅心耳若處心則云克宅厥心謨西山真氏曰不曰克宅厥心而曰克厥宅心猶臯不曰慎修厥身而曰慎厥身修也新安陳氏曰以宅心為三宅之心與上文克知三有宅心合為一說臨川吳氏曰惟能心其心故能於其官而能得其人也三克字皆謂文王能之於陳氏雅言曰天下之賢固莫難於獲其用尤莫難盡其用用而不能盡猶未用也是以文王之於三宅謂之以克俊有德者蓋才德雖常事司牧人之所固有然所以能究其才德之用者實由於文王之克厥宅心有以致之也克厥宅心者知之至信之篤文王之心與三宅之心吻合交契無毫髮彼此之間故能立此常事司牧人而其有才有德莫不竭盡其藴無敢或隱其賢是豈徒常事司牧人之所自能哉皆以文王克之而後能也文王罔攸兼于庶言庶獄庶慎惟有司之牧夫是訓用違庶言號令也庶獄獄訟也庶慎國之禁戒儲備也有司有職主者牧夫牧人也文王不敢下侵庶職惟於有司牧夫訓勑用命及違命者而已漢孔氏曰勞於求才逸於任賢庶獄庶慎文王罔敢知于兹上言罔攸兼則猶知之特不兼其事耳至此罔敢知則若未嘗知有其事蓋信任之益專也上言庶言此不及者號令出於君有不容不知者故也吕氏曰不曰罔知于兹而曰罔敢知于兹者徒言罔知則是莊老之無為也惟言罔敢知然後見文王敬畏思不出位之意毫釐之辨學者宜精察之王氏曰君道以擇人為職上必無為而用天下下必有為而為天下用此君臣之分也侵新安陳氏曰文王用三宅得人則委任責成不復其職惟加重于有司之為牧夫者訓敕其用命與否而已牧夫即宅牧之屬上文只及常事司牧人而不及準人庶獄即準人之事也此篇論三宅有全言之者有舉其二者有舉其一者參錯及之耳陳氏雅言曰庶言庶獄庶慎文王於三者一無所兼但於有司牧夫之用違則訓之而已有司牧夫即任庶言庶慎者也訓其用命則其事可以不問而自理訓其不用命則其事可以不嚴而自治文王豈屑屑焉於此三者而下侵於衆職哉拆有司者治之耳有司治庶獄庶言庶慎之事而吾則治有司之不治者焉於此三者固罔攸兼而於庶獄庶慎則又罔敢知焉罔攸兼者委任之至不敢以身與其事也罔敢知者敬忌之至不敢以心與其事也常人之任人或能不以身與其事而不能不以心慮其事文王則不然所當知者并得不知則特不兼之而已不當知之者不惟不兼於罔敢與知焉此所以於庶言庶慎庶獄則言罔攸兼於罔敢知則止及於庶獄庶慎二者也蓋命令之奉行於有司者人君雖不得兼而樞機之發於一人者人君豈容有所不知哉論者以為聖人之道猶天然天無為而嵗功成者四時之佐五行之吏分其氣矣聖人無為而天下治者百官分治羣賢共理代其職也知天之所以為天則知文王之所以為文矣亦越武王率惟敉音米功不敢替厥義德率惟謀從容德以並受此丕丕基率循也敉功安夭下之功義德義德之人容德容德之人蓋義德者有撥亂反正之才容德者有休休樂善之量皆成德之人也周公上文言武王率循文王之功而不敢替其所用義德之人率循文王之謀而不敢違其容德之士意如虢叔閎天散上聲宜生泰顛南宫括之徒所以輔成王業者文用之於前武任之於後故周公於君奭言五臣克昭文王受有殷命武王惟兹四人尚迪有祿正猶此敘文武用人而言並受此丕丕基也葵初王氏曰紂用暴德逸德之人正與此相反新安陳氏曰蔡氏承上文之用三宅而言蓋不改父之臣之意此說出於夏氏真氏取之以其切於立政用人故也臨川吳氏曰武王率循文王之功其於義德之人用之而不敢替率循文王之謀其於容德之人從之而不敢違蓋拯民危急必資剸裁之能詒謀宏逺必資寬大之度此武王述事繼志而不改父之臣故父子並受此大大之基業也嗚呼孺子王矣繼自今我其立政立事準人牧夫我其克灼知厥若丕乃俾亂相我受民和我庶獄庶慎時則勿有間去聲之我者指王而言若順也周公既迹文武基業之大歎息而言曰孺子今既為王矣繼此以往王其於立政立事準人牧夫之任當能明知其所順順者其心之安也孔子曰察其所安人焉音烟廋哉察其所順者知人之要也夫音扶既明知其所順果正而不他然後推心而大委任之使展布四體以為治相去聲助左音佐右所受之民和調均齊獄慎之事而又戒其勿以小人間之使得終始其治此任人之要也民而謂之受者言民者乃受之於天受之於祖宗非成王之所自有也吕氏曰申前告嗣天子王矣之意屢言深警之非前日委重視成比也物莫不有所順水順而下火順而上蓋有湮之而不下鬱之而不上者矣終非其所順也人豈無矯飾以勉為善者苟能灼知其所順則心之所安不得遁矣夏后宅人亦曰用丕訓德訓順也知厥若又勿使異意者間之知人不可不盡任人不可不專竭兩端告之也一篇之間所謂王矣者蓋屢言而屢歎之深恐成王今猶不自知身當職分之大故警之不一而足也王陳氏大猷曰我者我其君君臣一體也張氏曰繼文武以立政可謂難矣而難之中自有簡易之道亦曰立事準人牧夫我其克灼知厥若而已知三宅之心即所以立政復齊董氏曰孔氏以立政為大臣立事為小臣諸家皆以立政立事為一意而於準人牧夫則以為舉其二以包其一理所未安竊意從張氏之說則立政乃作書之本意立事乃任人之官庶於經意為兩得葵初王氏曰提起立政二字最是下文商人周文王立政國則罔有立政用憸人在今後嗣王立政皆是提起作書之本意立政之要在於司牧準人為新安陳氏曰孔氏謂立政大臣立事小臣以事字句非也惟張氏辨句讀甚合經㫖證以上下文上提三政而下列三宅甚協兼之繼自今立政立事凖人牧夫與我周文王立政立事牧夫凖人立政下列三宅則並有立事字國則罔有立政用憸人繼自今立政其勿以憸人立政下不列三宅則並無立事字尤為顯證陳氏雅言曰克灼知厥若者此明於知人時則勿有間之此誠於任人始焉而非知之明則無以得賢才之用終焉而非任之誠則無以盡賢才之用成湯之克宅克即文武之克知灼見皆克知厥若之謂也成湯之嚴惟丕式文王之罔攸兼罔敢知皆時則勿有間之之意也周公前舉三事以為告此則欲其法三代之法以為政上言知人之要則舉三宅之名下言任人之要則舉三宅之職立政一篇之㫖萃於此矣自一話一言我則末惟成德之彥以乂我受民末終惟思也自一話一言之問我則終思成德之美士以治我所受之民而不敢斯須忘也王氏曰一話言一事之始終一言一句而已和新安陳氏曰相受民牧之責也和庶獄凖之責也庶所當慎之事事之責也三宅傋矣話言樞機之發也委任三宅欲勿以小人間之苟或一話言間微不終於專主君子則小人乘問入之矣此公戒王以委任三宅專一周密之法也嗚呼豫旦已受人之徽言咸告孺子王矣繼自今文子文孫其勿誤于庶獄庶慎惟正是乂之前所言禹湯文武任人之事無非至美之言我聞之於人者已皆告孺子王矣文子文孫者成王武王之文子文王之文孫也成王之時法度彰禮樂著守成尚文故曰文誤失也有所兼有所知不付之有司而以己誤之也正猶康誥所謂正人與宫正酒正之正指當職者為言不以己誤庶獄庶慎惟當職之人是治之下文言其勿誤庶獄惟有司之牧夫即此意自古商人亦越我周文王立政立事牧夫準人則克宅之克由繹音抽亦之兹乃俾乂自古及商人及我周文王於立政所以用三宅之道則克宅之者能得賢者以居其職也克由繹之者能紬繹用之而盡其才也既能宅其才以安其職又能繹其才以盡其用兹其所以能俾乂也歟陳氏曰繹如繹絲謂窮其端緒克宅任之當矣又維繹之詳其所行考其所就猶堯之詢事考言舜之明試考績也吕氏曰由繹由其外而繹其中也由其言而繹其心由其才而繹其德由其發舒於一時而繹其持久於嵗晏者繹之蓋不一端而足也克宅之則人與位相稱克由繹之則表與裹相符其審如是然後俾之為治既俾之為治則一委之其人矣審陳氏雅言曰三宅之官百官有司之長也擇之不則以正為邪以不肖為賢固不足以得賢才之用用之不盡則禮貌之或衰意見之或殊亦何足以盡賢才之用故克宅之者以心相照此知人之明也克由繹者以心相與此待人之誠也始能明於知人終能誠於待人人雖欲自隱其可得乎是以謂之乃者言必如是而後有以得其心也謂之俾者言下之治由於上之使也立政一篇之㫖皆是言人君之用人當擇之於始善用之於終國則罔有立政用憸音䥫人不訓于德是罔顯在厥世繼自今立政其勿以憸人其惟吉士用勱音邁相去聲我國家自古為國無有立政用憸利小人者小人而謂之憸者形容其沾沾便平聲捷之狀也憸利小人不順于德是無能光顯以在厥世王當繼今以往立政勿用憸利小人其惟用有常吉士使勉力以輔相我國家也吕氏曰君子陽類用則升其國於明昌小人陰類用則降其國於暗昧陰陽升降亦各從其類也張氏曰憸人者傾巧辨給之人詐足飾非言足拒諫悅其心則譽桀紂為堯舜失其意則誣伯夷為盜跖陳氏大猷曰憸人矯飾以為德然非其心之所順與丕訓厥若正相反吕氏曰人主惟以别白君子小人為職國之興亡常必由之此篇反覆於君子小人之際有㫖哉文武有庶常吉士公復以其惟吉士望王召公之歌詩王多吉士亦至於再穆王命伯冏吉士猶在口也是則周家父祖所傳師保所訓子孫所守惟在吉士一代治體可識矣憸人者言士之反周之家法所嚴惡斥絶者也今文子文孫孺子王矣其勿誤于庶獄惟有司之牧夫始言和我庶獄庶慎時則勿有間之繼言其勿誤于庶獄庶慎惟正是乂之至是獨曰其勿誤于庶獄惟有司之牧夫蓋刑者天下之重事挈其重而獨舉之使成王尤知刑獄之可畏必専有司牧夫之任而不可以己誤之也吕氏曰始言庶言庶獄庶慎繼去其一止曰庶獄庶慎又去其一獨曰庶獄蓋挈其尤重獨舉之獄曷為其獨重也民命所繫亦國命所繫也導迎善氣祈天永命者獄也並告無辜無世在下者亦獄也宜周公獨言而獨戒之不蔡氏元度曰以庶獄庶慎對庶言則獄慎尤重故及庶言以庶獄對庶慎則庶獄尤重故不及庶慎官唐孔氏曰言庶獄欲其重刑言有司牧夫欲其謹人政王氏曰獄者政之終牧者官之長舉其終官舉其長則無不舉矣其克詰爾戎兵以陟禹之迹方行天下至于海表罔有不服以覲文王之耿光以揚武王之大烈詰治也治爾戎服兵器也陟升也禹迹禹服舊迹也方四方也海表四裔也言德威所及無不服也覲見也耿光德也大烈業也於文王稱德於武王稱業各於其盛者稱之吕氏曰兵刑之大也故既言庶獄而繼以治兵之戒焉或曰周公之訓稽其所弊得無啓後世好大喜功之患乎曰周公詰兵之訓繼勿誤庶獄之後犴何干反野犬所以守獄獄之間尚恐一刑之誤況六師萬衆之命其敢不審而誤舉乎推勿誤庶獄之心而奉克詰戎兵之戒必非得已不已而輕用民命者也林氏曰呼文子文孫言守成以文終以詰爾戎兵則武不可弛吕氏曰公非教王用兵恐其宴安而使之自强如易謙卦言利用侵伐亦是於謙抑之中有自强之意也是役也蓋奮張其氣而不使墮偷操握其衆而不使扞格摧壓其姦而不使覬覦保治之良圗也古人治兵乃所以弭兵後世銷兵乃所以召兵言陳氏大猷曰耿亦光也耿光光之著也安陳氏雅曰治平無事之時乃禍患之所自起苟於逸樂憚於自强則偷墮之氣由是而益勝扞格之衆由是而難化覬覦之姦繇是而或生豈所以匡王室而壯天威豈所以繼志迹事而承祖宗全付豫有家之托者乎故周公之告成王使之治其戎服兵器以陟禹之迹而方行於天下使至于四海之外地之所至皆德威之所至德威之所至無敢有不服者夫如是文王之耿光能覲之使益顯武王之大烈能揚之使益著豈惟無愧於前王亦無負於前王矣前王可謂能紹前代之休後王可謂能繼前王之志述前王之事也周公以此告成王其推廣勿誤庶獄之㫖而并及於此此固非後世導其君以窮兵黷武好大喜功者比也鳴呼繼自今後王立政其惟克用常人并周家後王而戒之也常人常德之人也臯陶曰彰厥有常吉哉常人與吉士同實而異名者也吕氏曰常人之於國也蓋食之穀粟衣之布帛雖無異味異文而有生者常用而不可一日易也然每多重遲木訥不能與小慧新進者爭長於頰舌之間故世主惑於取捨而治亂分馬此周公所以慨歎而深致意於卒章歟常陳氏大猷曰理之常行而不可易者為常道行此理而不易者為常人常言其體之不易吉言其用之休祥也言常人於兵刑之後以常人尤宜任此而謹之歟新安陳氏曰庶常吉士文王用人家法也故上文言其惟吉士此又言克用常人常人常德之人吉士吉德之士未有常人而不吉吉士而不常者也周公若曰大史司寇蘇公式敬爾由獄以長我王國兹式有慎以列用中罰此周公因言慎罰而以蘇公敬獄之事告之太史使其并書以為後世司獄之式也蘇國名也左傳蘇忿生以溫為司寇周公告太史以蘇忿生為司寇用能敬其所由之獄培植基本以長我王國令於此跋法而有謹焉則能以輕重條列用其中罰而無過差之患矣孔氏自忿生為武王司寇封蘇國能用法敬汝所用之獄言主獄當求蘇公之比此法有所慎行必以其列用中制不輕不重蘇公所行太史掌六典有廢置官人之故告之陳氏大猷曰周公舉太史所記蘇公之事以告士蘇公能以法式而敬其所用之獄重民命以廷國命治獄者當以為法式而有謹焉列者前後相比猶今言列也以舊事為比而用其輕重之中者也立政以用人為本而兵刑乃政之大者故以此終焉在新安陳氏曰立政之綱領在三宅三宅中所重尤準人之刑獄故既告王以勿誤庶獄末復命太史書蘇公敬獄事以示法焉蘇公所以為司寇在乎敬後人之法蘇公在乎慎能慎則能敬矣固為後之司獄者慮尤為後之君用人以司獄者慮能如蘇公者則用否則斥蓋以此終立政用人之意歟此陳氏雅言曰刑罰重事也民心天命之本實係於周公作立政舉司寇蘇公敬獄之事以告太史使書以為歷代後世司獄之法謂昔武王之時蘇忿生以溫為司寇小大之獄莫不由之而所由之獄莫不能敬故能重民命以延國命蓋民帝之有永乃天命之所由永也用刑之極功至是蔑以加矣後之典獄者於此取法而能謹焉則能用其中罰而無過差之患此無他蘇公之為司寇其道惟在乎敬後人之法蘇公其道惟在乎慎敬者慎之存於心慎者敬之見於事慎謹之心一敬畏之心也蘇公一念之敬可以通天人而無間可以垂百世而無愆用刑之法不可以復加於此雖舉以告太史而實以告之於王雖為後世之司獄者慮而實為後世用司獄者慮使後世之用司獄得蘇公其人而用之豈非所謂吉士常人者乎立政之道以任賢為本以庶獄為大故一篇之中凡五致意於獄而終結之以此云董氏鼎曰周公復政成王而作立政以王政莫大於用人用人莫先於三宅三宅得人則百官皆得人而王政立矣公前日攝政猶可無言今歸政留洛心在王室豈容默乎此立政所以作也一篇之中宅事牧準其綱領也休兹知恤其血脈也自迪惟有夏至暴德罔後言夏先后知恤乎此乃室大競休何如哉桀不知恤也故罔有後而成湯陟焉自亦越成湯至奄甸萬姓言商先王知恤乎此故用協用見德休何如哉紂不知恤也故帝罰之而我周式商受命焉自亦越文王武王至並受丕基言文武時亦猶夏商先王之知恤也是以並受丕基式克至今日休也自孺子王矣以下至終篇拳拳以去憸人用常吉詰戎兵謹刑獄為王告蓋欲王以先王之知恤為法以夏商後王之不知恤為鑒忠愛之至至今可挹也周官成王訓迪百官史録其言以周官名之亦訓體也今文無古文有按此篇與今周禮不同如三公三孤周禮皆不載或謂公孤兼官無正職故不載然三公論去聲下同道經邦三孤二公𢎞化非職乎職任之大無踰此矣或又謂師氏即太師保氏即太保然以師保之尊而反屬司徒之職亦無是理也又此言六年五服一朝音潮而周禮六服諸侯有一嵗一見音現下同者二嵗一見者三嵗一見者亦與此不合是故可疑然周禮非聖人不能作也意周公方條治平聲事之官而未及師保之職所謂未及者鄭重而未及言之也書未成而公亡其間法制未有施用故與此異而冬官亦缺要平聲之周禮首末未備周公未成之書也惜哉讀書者參互而考之則周公經制可得而論去聲矣問司徙司馬司空三公三少之官朱子曰漢自古文尚書出方有周官篇伏生口授二十五篇無周官故漢只置太尉司徒司空為三公而無周三公三少蓋未見古文尚書但見伏生書牧誓立政篇中所說司徒司馬司空而置也占者諸侯之國只置得司徒司馬司空三卿惟天子方得置三公三少六卿牧誓立政所說周家是時方為諸侯故不及三公三少及周官篇所說則周是時已得天下矣三公三少本以師道傳佐天子只是加官周公以太師兼冢宰召公以太保兼冢宰是以加官而兼宰相之職也後世官職益紊今遂以三公三少之官為階官不復有師保之任論道經邦之責矣然古者猶是文臣之有功德重望者方得加師保之官以其有教輔天子之名也後世遂以諸子或武臣為之既是天子之子與武臣豈可任師保之責耶訛謬傳襲不復改正陳氏經曰周官立政之效也二篇大率相為表裏周公作立政告成王王能推行之考此篇如撫萬邦征弗庭即詰戎兵行天下之意也立太師傳保以下即用三宅之意也戒有官以典常作師即克用常人之意也成王尊所聞行所知如此其高明光大宜哉政吕氏曰金縢成王初年之書也洛誥周公還之書也無逸立政周公教戒成王之書也周官成王親政開物成務之書也合是數篇以觀成王可以見其文質焉可以見其昏明疑信之變焉可以見其講貫啓發之深焉可以見其知類通達離師傳而不反焉過此而有君陳乃周公既沒之後又過此而有顧命乃其身將沒之時成王進德始終之序備矣周公格君始終之功著矣書新安陳氏曰周禮乃周公擬議未全未行之周官則成王建置訓迪而已施行之書也今只當據周官以解周官其與周禮未吻合處姑略之可也又吕氏以作周官時為周公尚在此亦以亡書序及君陳挨排而意之耳未見其必然也深玩周官文意周公時不在矣此殆成王老於世故後之書也如以不學驕侈戒卿士可見惟周王撫萬邦巡侯甸四征弗庭綏厥兆民六服羣辟罔不承德歸于宗周董正治官此書之本序也庭直也葛氏曰弗庭弗來庭者六服侯甸男采衛并畿內為六服也禹貢五服通畿內周制五服在王畿外也周禮又有九服侯甸男采衛蠻夷鎮蕃與此不同宗周鎬京也董督也治官凡治事之官也言成王撫臨萬國巡狩侯甸四方征討不庭之國以安天下之民六服諸侯之君無不奉承周德成王歸于鎬京督正治事之官外攘之功舉而益嚴內治之修也唐孔氏曰周制無萬國惟伐淮夷非四征也大言之耳吕氏曰天下大物也非綿力小才所能運量非薄物細故所能維持向也成王不出閨闥之孱主耳今撫萬邦至罔不承德乾開坤闔秋殺春生四海皆隨其運轉功成治定歸于宗周董正治官訓督裁正品式備具本末內外體統相承萬世皆入其維持不如是何以覲文王之耿光揚武王之大烈乎德新安陳氏曰巡侯甸即六服而略言之也六服承即九服而以內五服并王畿言之也內五服九州內外五服九州外以內五服并畿內為六正與侯甸男邦采衛之辭合略外四服耳無不同也又按成王巡狩征討綏御之大力量如此可謂能以周公詰戎兵陟禹迹行天下至海表罔不服之言而真見之行事矣周公宗臣成王賢君蓋兩得之王氏充耘曰史臣記周之成王為萬邦之君盡撫綏之道侯甸之諸侯以時而來朝者則巡守其土而察其政治焉四方之諸侯其或有弗庭者則征伐其國而使畏愳焉或巡守而省之或征伐而討之皆以綏安億兆之民而已六服之羣辟無有一之不承順於德者兆民既安羣辟承德巡守征伐在外之事無不舉矣於是歸於鎬京國都以為端本澄源之計庶官者天子所與共治於內者也庶官莫大于三公而其亞為三孤又次為六卿而其下各有屬昔非無是官也有是官而綱紀之未定昔非無是職也有是職而體統之未明故立三公使論道而三孤則輔之於後命六卿使分職而其屬則任之於下如絲牽而繩聫如臂動而指隨以立一代之定制以承歷代之𢎞規庶事之官亦無有董之而不治正之而或紊者既治其外復詳其內傳所謂外攘之功舉而益嚴內治之修者如此定陳氏雅言曰史臣記成王之君天下也當功成治之日而致謹於建官分職之命蓋天下以一人為主致治以任官為要萬邦雖廣而承德之心無不同外攘既舉而治官之政不敢後史臣將欲述成王訓迪之辭而先敘其本末如此所以著成王之善於為政也王曰若昔大猷制治于未亂保邦于未危治去聲若昔大道之世制治保邦于未亂未危之前即下文明王立政是也曰唐虞稽古建官惟百內有百揆四嶽外有州牧侯伯庶政惟和萬國咸寧夏商官倍亦克用乂明王立政不惟其官惟其人倍薄亥反百揆無所不總者四嶽總其方嶽者州牧各總其州者侯伯次州牧而總諸侯者也百揆四嶽總治于內州牧侯伯總治于外內外相承體統不紊故庶政惟和而萬國咸安夏商之時世變事繁觀其㑹通制其繁簡官數加倍亦能用治明王立政不惟其官之多惟其得人而已張氏震曰唐虞官百夏商倍之周又倍之事繁故官多然大體未嘗變也舜命九官至商列為八政至周合為六典大綱皆出於一所增特其屬耳陳氏雅言曰唐虞之時稽古之制建官惟百有百揆四嶽以總治於內有州牧侯伯以總治於外內外相承何其簡也而當時之庶政無不和萬國無不寧夏商之時建官之數視唐虞之制加倍因時制宜亦何簡也而當時之官亦能用以致乂惟百而治倍百而又治是果何道哉明王之立政不惟其官之多惟在於得人而已嘗考之唐虞之官所謂百者無非三德六德之賢曰俊曰乂之才夏商之官所謂倍者無非惟賢惟能之人即宅即俊之士此宜四代之官自其數而論則曰惟百曰官倍自其效而論則曰和寧曰用乂所以致是者有本也成王之言可謂深知歷代建官之道而得訓迪厥官之本者矣今豫小子祗勤于德夙夜不逮仰惟前代時若訓迪厥官逮徒耐反又湯亥大計二反逮及時是若順也成王祗勤于德早夜若有所不及然蓋修德者任官之本也張子曰仰惟前代時若即前所謂若昔大猷也陳氏經曰仰前代唐虞夏商建官之意而時若之官林氏曰董正者立太師以下是也訓迪者凡我有君子以下是也董正而後訓迪之也治新安陳氏曰王意謂今兆民綏六服承若已安已然治亂在庶官當先幾而備之將言唐虞夏商周之建官故以此三言開端焉唐虞稽古至亦克用乂此唐虞夏商之建官所以致治保邦者也立政而官惟其人為政在人也訓官而先祗勤于德取人以身也此成王仰若唐虞夏商而訓官以制治保邦者也立太師太傳太保兹惟三公論去聲道經邦燮理陰陽官不必備惟其人立始辭也三公非始於此立為周家定制則始於此也賈誼曰保者保其身體傅者傅之德義師者道之教訓所謂三公也陰陽以氣言道者陰陽之理恆而不變者也易曰一陰一陽之謂道是也論者講明之謂經者經綸之謂燮理者和調之也非經綸天下之大經參天地之化育者豈足以任此責故官不必備惟其人也陳氏雅言曰居非常之位者必任非常之責必求非常之才三公之設雖不始于此而三公之制則蓋定於此所謂定其制也講明天人之道經綸乎邦國燮理乎陰陽所謂專其職也有其人則使之居是官非其人不若虛是職所謂難其人也嗚呼三公之官位尊責重如此是豈可以庶官百職事之才例任之哉少失照反下同師少傅少保曰三孤二公𢎞化寅亮天地弼豫一人孤特也三少雖三公之二而非其屬官故曰孤天地以形言化者天地之用運而無迹者也易曰範圍天地之化是也𢎞者張而大之寅亮者敬而明之也公論道孤𢎞化公燮理陰陽孤寅亮天地公論於前孤弼於後公孤之分如此孔氏曰師天子所師傳傳相天子保保安天子孤卑於公尊於卿特置此三者副二三公𢎞大道化召葉氏曰成王以周召為師保而太傳無聞周公沒公仍為保而不聞設師傳蓋難之也顧陳氏傳良曰周召以師保為冢宰是卿兼三公也命自同召太保奭以下皆卿也是時召公為保兼冢宰芮伯為司徒彤伯為宗伯畢公為司馬皆是以三公兼之衛侯康叔為司寇毛公為司空審如是則三公多是六卿兼之但其人足以兼公則加其公之職位無其人則止為卿而已三公三孤皆無其人則闕焉而已而六卿自若也要之成周以三公三孤待非常之德故曰官不必備惟其人道吕氏曰明則邦國幽則陰陽幽明之所以然所謂也經綸之用藏於無迹和調之妙間不容聲何待於論論云者擬議以成其變化講明啓沃而精一之者也陰陽以氣言天地以形言燮理運之者也寅亮承之者也公孤之分於此著矣然弼子一人乃格君心之任獨於孤言之而公之職反不與焉何也論道經邦燮理陰陽未有不自君心者特成王尊三公之至若不敢以身煩之蓋曰斯人也乃造化之友非豫一人之弼也已新安陳氏曰文王時太公已為太師武王時召公為太保是三公非自成王始立也二公𢎞化蓋二公以𢎞大其論道經邦之化耳𢎞大道化以寅亮天地體用之謂也孔注當矣陳氏雅言曰公者無私之義孤者無朋之義太者尊無以加之辭少者位次於尊之辭此其立言之異也道與化陰陽與天地其辭若一其職實殊道者化之體化者道之用陰陽者氣也天地者形也化待道而後立天地待陰陽而後立公論道孤𢎞化公燮理陰陽孤寅亮天地論道者𢎞化之本也燮理者寅亮之本也公濬其源孤導其流公正其本孤治其末公提其綱孤張其目公孤之職雖異而實同雖同而實異者如此然於三公則曰官不必備於三孤則曰弼豫一人豈三公無與於格心之論而三孤可不擇人以居之乎無他公孤之職比他官尤重而三公之職比他官為尤重曰官不必備者以間世之才非天下所常有不可同於他官也曰弼豫一人者以致君之功雖臣職所當盡君不可纍于三公也公孤輕重之分豈不於此益可見乎冢宰掌邦治統百官均四海冢大宰治也天官卿治官之長上聲是為冢宰內統百官外均四海蓋天子之相去聲也百官異職管攝使歸于一是之謂統四海異宜調劑使得其平是之謂均鄭氏曰山頂曰冢治吕氏曰三公三孤天子所謂調精祲之原而無所者也統萬事而分治之則六卿之職六卿者萬事之綱也冢宰管攝百官非官官而控制之自百而歸六自六而歸一所操至簡也所調劑者非人人而稱量之也大與之為大小與之為小所居至易也明乎簡易之道相業無餘藴矣復齊董氏曰周禮太宰掌建邦之六典一曰治典二曰教典三曰禮典四曰政典五曰刑典六曰事典六典太宰兼掌此言掌邦治者教禮政刑之屬莫非治也總新安陳氏曰冢宰雖與五卿並立而各為一卿實統乎五卿所掌雖邦治必教禮兵刑士之並舉其職而後可以治歟陳氏雅言曰此六官之長綱在網中也冢宰與六卿雖分掌一職而其官則尊於衆卿故以冢言六卿之事雖各列一職而冢宰得以兼之故以宰言此董正其官也統百官者即亮采之謂均四海者即惠疇之謂百官異職而能統之則有倫有要有綱有紀咸得其序矣四海異宜而能均之則或逺或近或多或寡咸得其正矣此訓迪其職也司徒掌邦教敷五典擾兆民擾馴也地官卿主國教化敷君臣父子夫婦長幼朋友五者之教以馴擾兆民之不順者而使之順也唐虞司徒之官固已職掌如此陳氏大猷曰徒衆也主民衆故稱司徒吕氏曰擾者馴習而熟之拊摩而入之畜養而寬之之謂張氏曰擾猶擾龍之擾馴習而安之也新安陳氏曰擾者順其自然而導之即舜典在寬之意宗伯掌邦禮治神人和上下春官卿主邦禮治天神地祗人鬼之事和上下尊卑等列春官於四時之序為長上聲故其官謂之宗伯成周合樂於禮官謂之和者蓋以樂而言也孔氏曰春官卿治天神地祗人鬼之事及國之吉凶軍賓嘉五禮禮所以辨上下定民志上下辨民志定則和矣和有樂之意耳本吕氏曰治理也壇坎昭穆之等聘享射御之節貫末而等文質所謂禮也神人所以治上下所以和者也一失其禮則僭亂諂妄而瀆乎神陵犯乖爭而悖乎人上下皆失其分安得而和乎新安陳氏曰秩宗典天地神祗人鬼之三禮此之治神人蓋以神包祗即三禮也司馬掌邦政統六師平邦國夏官卿主戎馬之事掌國征伐統御六軍平治邦國平謂强不得陵弱衆不得暴寡而人皆得其平也軍政莫急於馬故以司馬名官何莫非政獨戎政謂之政者用以征伐而正彼之不正王政之大者也吕氏曰自夏命𦙍侯掌六師舉政典以誓則邦政掌於司馬舊矣國之大事何莫非政獨戎政謂之政何也天下無事寓兵於農然後賦役百為始有所施是固政之所從出也天下有事舉兵討亂邦之存亡安危係焉其為政之大固不待論矣此戎政所以獨謂之政也統六師而謂之平邦國則王者用師之本㫖特欲平邦國之不平者耳司寇掌邦禁詰姦慝音忒刑暴亂秋官卿主寇賊法禁羣行攻劫曰寇詰姦慝刑强暴作亂者掌刑不曰刑而曰禁者禁於未然也吕氏曰姦慝隱而難知故謂之詰推鞫窮詰而求其情也暴亂顯而易見直刑之而已陳氏大猷曰詰而後刑刑者必詰互文也陳氏經曰刑曰邦禁此初設刑美意禁民使不為惡而非以虐民也虞禮樂分二官周始為一虞以士兼兵周分為二帝世詳於化而略於政王世詳於政而略於化世道升降之異也司空掌邦土居四民時地利冬官卿主國空土以居士農工商四民順天時以興地利按周禮冬官則記考工之事與此不同蓋本闕冬官漢儒以考工記當之也陳氏大猷曰為治莫先於教化故冢宰之後司徒次之教化莫先於禮樂故宗伯次之教之和之而猶有不率者則大者加以甲兵小者加以刑罰不得已也故司馬司寇次之暴亂去而後民得安居故以司空之居民終焉六卿分職各率其屬以倡音唱九牧阜成兆民六卿分職各率其屬官以倡九州之牧自內達之於外政治明教化洽兆民之衆莫不阜厚而化成也按周禮每卿六十屬六卿三百六十屬也吕氏曰冢宰相天子統百官則司徒以下無非冢宰所統乃均列一職而併數之為六者綱在網中也乾坤之與六子並列於八方冢宰之與五卿並列於六職也吕氏曰冢宰列於六卿綱固在網之中而首非處身之外也六卿分職各率其屬以倡九牧自內而達之外九牧各率其州之諸侯以應六卿之令自外而承乎內內倡外應周浹太和此成周治天下之體統也新安陳氏曰成周以六卿倡九牧亦猶唐虞以揆嶽統牧伯故阜成之效不減和寧泰和在唐虞成周豈非以治天下之綱紀立而體統定歟六年五服一朝又六年王乃時巡考制度于四嶽諸侯各朝于方嶽大明黜陟五服侯甸男采衛也六年一朝會京師十二年王一巡狩時巡者猶舜之四仲巡狩也考制度者猶舜之協時月正日同律度量衡等事也諸侯各朝方嶽者猶舜之肆覲東后也大明黜陟者猶舜之黜陟幽明也疏數音疏朔異時繁簡異制帝王之治因時損益者可見矣吕氏曰六卿倡九牧既立為治之綱矣繼以朝覲巡守之制所以振其綱也卿牧倡和固有體統然多歷年嵗非時有以振之豈無壅滯而不達乎六年一朝所以達其壅也豈無廢壤而不修乎又六年王時巡至大明黜陟所以修其廢也諸侯既親承德意於天子天子復親考制度於諸侯禮樂刑政斯四達而不悖矣是制也嘗一見於虞書後千餘年復出於此驗其疏數而世之升降事之繁簡兵衛之多寡用度之豐約與夫成王觀會通以行其典禮者皆可得而推矣張氏曰周禮行人之職曰侯服嵗一見其貢祀物甸服二嵗一見其貢嬪物男服三嵗一見其貢器物采服四嵗一見其貢服物衛服五嵗一見其貢材物要服六嵗一見其貢貨物是六年六服各一朝也今止言五服者要服不必其來周官又云十有二年王巡狩殷國是五服已更兩朝矣年王氏曰每一嵗一服入見後即有五年休息又六五服兩朝然後王一巡狩也不林氏曰大明黜陟即王制所謂不敬者君削以地孝者君黜以爵有功德於民者加地進律是也此皆斟酌舜事行之舜五載一巡狩此十二年何也文中子曰舜一嵗而巡四嶽兵衛少而徴求寡也以是觀之則周時兵衛日多徴求日衆故不能五年而以十二年也王曰嗚呼凡我有官君子欽乃攸司慎乃出令令出惟行弗惟反以公滅私民其允懷建官之體統前章既訓迪之矣此則居守官職者在曰凡有官君子者合尊卑大小而同訓之也反者令出不可行而壅逆之謂言敬汝所主之職謹汝所出之令令出欲其行不欲其壅逆而不行也以天下之公理滅一己之私情則令行而民莫不敬信懷服矣陳氏經曰令未出而致謹可也既出則有行無反矣不謹於未令之先必反於既令之後何以示信乎可吕氏曰戒以審令於未出之前令出則惟行而不反矣令之大者固出於君百司庶府自下教條於其屬亦令也令王氏曰令出而反民輕上而不信令矣然必謹出不至於反蘇氏曰此教以謹令非欲其遂非也乎新安陳氏曰民之從違視公私之消長滅私者純天理而私欲淨盡之謂欲民之允懷非以公盡滅其私者不可允懷誠服之謂也滅字允字皆須勘破學古入官議事以制政乃不迷其爾典常作之師無以利口亂厥官蓄疑敗謀怠忽荒政不學牆面蒞事惟煩學古學前代之法也制裁度也迷錯繆也典常當代之法也周家典常皆文武周公之所講畫至精至備凡蒞官者謹師之而已不可喋喋利口更改而紛亂之也積疑不決必敗其謀怠惰忽略必荒其政人而不學其猶正牆面而立必無所見而舉錯煩擾也蘇氏曰鄭子産鑄刑書晉叔向譏之曰昔先王議事以制不為刑辟其言蓋取諸此先王人法並任而任人為多故律設大法而已其輕重之詳則付之人臨事而議以制其出入故刑簡而政清自唐以前治罪科條止於今律令而已人之所犯日變無窮而律令有限以有限治無窮不聞有所闕豈非人法兼行吏猶得臨事而議乎今律令之外科條數萬而不足於用有司請立新法者日益不已嗚呼任法之弊一至於此哉王氏炎曰議事以古義裁之故曰以制成吕氏曰議事斷之以制制即前日所學之法也不陳氏大猷曰事有施於古而不宜於今施於今而合於古者皆非典常典常者理之通古今常行而不可易者也爾當以之為師法謀吕氏曰有疑則辨可否立決蓄而不辨一前一却所以不成也怠失之不及忽失之過荒其政均也既歷數蒞官之疾復勉以學之不可已學者應事以理雖萬變而不窮不學者應事以才不通於理觸事面牆始猶以才力營之事漸多則不勝其煩矣新安陳氏曰成王訓官以學勉之以不學戒之學古而後入官則謀事必能以古制栽酌之而政不迷矣然世亦有好古而至於好異者如王荆公是已故又欲其以典常之理為師也不學則於理不明惟見其煩擾而已學不學之得失相去如此成王此言真萬世有官君子之龜鑑也陳氏雅言曰前代之法者堯舜禹湯之所垂訓其法固善然有宜於古而不宜於今者故學之於入官之先而議之於制事之際則事得其宜而無或有迷謬矣當代之法者文武周公之所講畫其法亦善是皆宜於今而不戾於古者故為典常而不可易爾當謹師而不可亂則事皆有所守而不至或徑改矣為政之道二者兼盡豈復有餘藴乎戒爾卿士功崇惟志業廣惟勤惟克果斷乃罔後艱此下申戒卿士也王氏曰功以智崇業以仁廣斷以勇克此三者天下之達道也吕氏曰功者業之成也業者功之積也崇其功者存乎志廣其業者存乎勤勤由志而生志待勤而遂雖有二者當幾而不能果斷則志與勤虛用而終蹈後艱矣陳氏大猷曰事之所成為功職之所務為業如士業於學學問思辨皆學業至於道允德備則學之功成矣農業於田播耨耘耔皆農業至收穫有秋則農功成矣功之高卑由立志之高下欲功之高立志固貴乎高然必勤以廣業則職業日勉日高其基立而其成高也否則事業以怠惰而狹小如築臺然安有基狹而臺高者雖有此志終不遂矣林氏曰猛虎之猶豫不若蜂蠆之致螫賁育之狐疑不若童子之必至所以貴於果斷也志非果斷則不立勤非果斷則易倦敗新安陳氏曰功崇至後艱四句乃申言上文蓄疑謀怠忽荒政之意而加警䇿耳功崇惟志業廣惟勤怠忽荒政之反也惟克果斷乃罔後艱蓄疑敗謀之反也陳氏雅言曰功以志崇柔懦而無志則功無自而崇矣業以勤廣若怠惰而不勤則業無自而廣矣然所以崇功廣業之道又在於當幾而能果斷然後無後艱之患矣位不期驕祿不期侈恭儉惟德無載爾僞作德心逸日休作僞心勞日拙貴不與驕期而驕自至祿不與侈期而侈自至故居是位當知所以恭饗是祿當知所以儉然恭儉豈可以聲音笑貌為哉當有實得於己不可從事於僞作德則中外惟一故心逸而日休休焉作僞則掩音掩護不暇故心勞而日著其拙矣或曰期待也位所以崇德非期於為驕祿所以報功非期於為侈亦通吕氏曰天下之至逸而無憂者莫如德天下之至勞而無益者莫如僞陳氏經曰制驕莫如恭制侈莫如儉實有得於恭儉則為德以聲音笑貌為之則僞矣恭儉出於德者逸而休恭儉出於僞者勞而拙居寵思危罔不惟畏弗畏入畏居寵盛則思危辱當無所不致其祗畏苟不知祗畏則入於可畏之中矣後之患失者與思危相似然思危者以寵利為憂患失者以寵利為樂所存大不同也新安陳氏曰居寵之寵即指祿位言利祿與危辱為鄰甚可畏也思其危則畏懼不暇何敢驕侈乎推賢讓能庶官乃和不和政厖音芒舉能其官惟爾之能稱匪其人惟爾不任賢有德者也能有才者也王氏曰道二義利而已推賢讓能所以為義大臣出於義則莫不出於義此庶官所以不爭而和蔽賢害能所以為利大臣出於利則莫不出於利此庶官所以爭而不和庶官不和則政必雜亂而不理矣稱亦舉也所舉之人能修其官是亦爾之所能舉非其人是亦爾不勝任古者大臣以人事君其責如此陳氏經曰人能推讓樂善故也不能推讓忌嫉故也九官相讓衆賢和朝范宣子讓其下皆讓安有不和者我忌嫉人人必忌嫉我交相忌嫉何有於和董氏鼎曰因所稱舉之賢否益足以見我之賢否則推人之賢乃我之賢也讓人之能乃我之能也為人臣者以是觀之必無妬賢嫉能之事賢者有所勸而不肖者亦可以自警矣新安陳氏曰以上成王盡一以教戒卿士言言精當脫佶屈聱牙而得此猶芻豢之悅口云王曰嗚呼三事暨大夫敬爾有官亂爾有政以佑乃辟永康兆民萬邦惟無斁音亦三事即立政三事也亂治也篇終歎息上自三事下至大夫而申戒敕之也其不及公孤者公孤德尊位隆非有待於戒敕也吕氏曰訓戒既終復提要總告之各敬爾官以治爾政即前所謂欽乃攸司也統而言之惟在於輔君以永安民耳陳氏大猷曰前言阜成兆民指當時言此言永康兆民期於永久也政董氏鼎曰唐虞建官庶政和萬國寧我周建官庶之和亦若是則我周萬邦之寧者其有厭斁乎此成王歸於宗周不暇他及而汲汲於董正治官以國家紀綱所係根本所關至不輕也呼陳氏雅言曰成王訓迪厥官之末發為嗟嘆之辭三事大夫而告之蓋總上文六卿百執事之人而申戒敕之也蓋謂爾之所有官也不可以不敬爾之所有政也不可以不治敬則無怠忽慢易之失治則無瘝曠廢弛之憂則為能佑乃之辟以永康兆民矣蓋天下之民其數有兆饑者欲食寒者欲衣勞困者欲求休息而永康者尤未易也所以任永康之責者在於君所以分永康之任者在於臣官雖有不同政雖有或異然所以佐佑乃辟永康兆民者則無或殊也兆民之衆而果能使之永底于康則萬邦之廣親附愛戴者豈復有厭斁之心乎此以安民無窮之效期之也成王於此期之至訓之切而歎之深兹善於命官者歟君陳君陳臣名唐孔氏曰周公遷殷頑民於下都周公親自監之周公既沒成王命君陳代周公此其策命之詞史録其書以君陳名篇今文無古文有夏氏曰必封國為君故稱君鄭李氏曰亦猶君奭君牙稱君貴之也氏注中庸云君陳周公子與葵初王氏曰觀篇中爾尚式時周公之猷訓畢命今豫祗命公以周公之事語意略同不見君陳為周公之子使是其子則當如微子之命云殷王元子乃祖成湯康誥云朕其弟酒誥云乃穆考文王蔡仲之命云率乃祖文王之彞訓無若爾考之違玉命此書中命體大抵然也今不曰爾考周公而但與畢命同稱周公若言他人耳周公以王叔父有大勳勞於天下安有命其子以繼父職獨無一語及父子相繼以寵之乎吕氏曰此篇戒敕之詞與畢命輕重不類見君陳蓋新進者也者李氏舜臣曰周公化商民已無不盡繼其後不必創為新政以駭之惟一循周公軌轍可也故王命君陳三舉周公之訓無忿嫉無求備有忍從容則東郊之民耳目不駭常如周公之在其左右安靜帖息可尊上也此命君陳之大指也宜康王曰惟君陳克和厥中王若曰君陳惟爾令德孝恭惟孝友于兄弟克施有政命汝尹兹東郊敬哉言君陳有令德事親孝事上恭惟其孝友于家是以能有政於邦孔子曰居家理故治可移於官陳氏曰天子之國五十里為近郊自王城言之則下都乃東郊之地故君陳畢命皆指下都為東郊吕氏曰令德即孝恭也令者所以形容孝恭之粹美孝恭者所以指其德之實也西山真氏曰惟孝者必反不友于兄弟則戚其親之心非孝矣詩曰兄弟既翕和樂且湛子曰父母其順矣乎必兄弟和而後父母順友之關於孝蓋如此君陳氏曰商民難化由於民彝泯亂王屬之孝友之陳所以正其本又曰王化頑民不求威猛剛克之臣而屬之孝恭孝友之君陳仁哉尹新安陳氏曰治洛化商民為重故君陳畢命皆曰兹東郊保釐東郊其任一也孝恭之恭其德性本敬也敬哉之敬勉其加敬也昔周公師保萬民民懷其德往慎乃司兹率厥常懋昭周公之訓惟民其乂周公之在東郊有師之尊有保之親師教之保安之民懷其德君陳之往但當謹其所司率循其常勉明周公之舊訓則民其治矣蓋周公既殁民方思慕周公之訓君陳能發明而光大之固宜其翕然聽順也吕氏曰民深懷周公之德苟君陳一事少異於公之初一法少變於公之舊則觀聽疑駭民不可得而治矣即新安陳氏曰化商之要莫大於法周公爾今所司周公之舊所司也周公之訓即公舊日所以師保萬民者也繼公所司之職以化公所化之民豈可少異於公之訓乎曰慎曰懋上文所謂敬哉者莫大於是師陳氏雅言曰遷殷頑民於洛周公實師保之謂之則所以教之者至矣謂之保則所以養之者至矣周公教養斯民之至故民懷慕周公之德今周公往矣命君陳往繼周公之任尹正東郊之民所居之職前日周公之職也所理之民前日周公之民也繼周公之職治周公之民其道豈在他求哉亦惟率循其常法勉明周公之訓而已蓋周公舊訓即所謂常法也周公既沒民之思慕惟在於周公君陳為治政之取法者亦惟在於周公我既能以周公之道待彼彼亦安得不以周公之道待我哉此民懷其德與惟民其乂雖有叙已往期方來之不同然其為效則一而已我聞曰至治馨香感于神明黍稷非馨明德惟馨爾尚式時周公之猷訓惟日孜孜無敢逸豫吕氏曰成王既勉君陳昭周公之訓復舉周公精微之訓以告之至治馨香以下四語所謂周公之訓也既言此而揭之以爾尚式時周公之猷訓則是四言為周公之訓明矣物之精華固無二體然形質止而氣臭升止者有方升者無間去聲則馨香者精華之上升者也至治之極馨香發聞感格神明不疾而速凡昭薦黍稷之苾芬是豈黍稷之馨哉所以苾芬者實明德之馨也至治舉其成明德循其本非有二馨香也周公之訓固為精微而舉以告君陳尤當去聲其可自殷頑民言之欲其感格非可刑驅而勢迫所謂洞達無間者蓋當深省悉井反也自周公法度言之典章雖具苟無前人之德則索昔各反然萎苶乃結反徒為陳迹也故勉之以用是猷訓惟日孜孜無敢逸豫焉是訓也至精至微非日新不已深致敬篤之功孰能與去聲於斯陳氏大猷曰治本無馨香然善治之極則曰至治馨香協氣休聞之所發越猶馨香之旁達而可愛也惡政之極則曰刑發聞惟腥醜聲穢德之彰聞猶腥臭之旁達而可惡也故善譽謂之流芳惡聲謂之遺臭神聰明不可欺故曰神明之林氏曰德之昭明發為至治至治之馨香即明德馨香合而為一者也使但黍稷之苾芬可以為馨香則隨之粢盛豐備虞之享祀豐潔亦可以感神明矣王意謂德之馨香尚能感神豈不能感化商民哉式時猷訓孜孜無逸豫上文所謂懋昭周公之訓者即此是也德陳氏經曰至治之馨香非以黍稷以明德也有其有其物則假物以薦德之馨非專在物也有其物無其德則物徒物耳論馨香之效至於感神明極所以馨香之本又根諸明德有是德則有是治有是治則有是馨香有是馨香則有是感應商董氏鼎曰益贊禹曰惟德動天至諴感神周公化之訓曰明德惟馨感於神明幽逺難通莫天與神若猶可以德感動況苖民商民乎周公與益之言其意一也陳氏雅言曰周公之訓惟在於明德法公之訓惟在於篤敬能明其德則治無不至能篤於敬則德無不明明德者致治之本篤敬者明德之功至治之極雖神明之難感者猶且感之況殷之頑民乎即所謂懋昭周公之訓惟民其乂者也凡人未見聖若不克見既見聖亦不克由聖爾其戒哉爾惟風下民惟草未見聖如不能得見既見聖亦不能由聖人情皆然君陳親見周公故特甲戒以此君子之德風也小人之德草也草上之風必偃君陳克由周公之訓則商民亦由君陳之訓矣陳氏大猷曰戒哉戒其勿如凡人也董氏鼎曰秉彞好德誰無是心故未見聖若不克見者凡人皆然而志氣昏惰不能自彊者又多見聖而亦不克由聖也孔門弟子朝夕遊從尚有非不悅子之道力不足也之嘆況他人乎然學者不得為聖人特一身之病耳君陳繼周公之後撫周公之民而不能用周公之化殷頑苟有不服豈不大為國家之病乎又爾所當戒也風之動物也妙於無迹草之從風也亦不知其然而然所謂神而化之使民宜之者誠在君陳自求之周公而已者陳氏雅言曰凡人之情未見聖則惟恐不能見聖秉彞好德之良心也既見聖則又不能由聖者氣禀物欲之所蔽也君陳親見周公之聖往繼周公之任其可不以常人徒然慕聖人之情為戒哉君子之德風也小人之德草也此喻夫德化之速猶易所謂神而化之者君陳能式時周公之訓不至如常人之不克由聖則民將待周公者待我風行草偃之速有不足以喻其從化之易矣此申言上文懋昭周公之訓惟民其乂之意而反其辭以戒之喻其效以勉之圖厥政莫或不艱有廢有興出入自爾師虞庶言同則繹師衆虞度達各反也言圖謀其政無小無大莫或不致其難有所當廢有所當興必出入反覆與衆共虞度之衆論既同則又紬音抽繹而深思之而後行也蓋出入自爾師虞者所以合乎人之同庶言同則繹者所以斷都玩反於己之獨孟子曰國人皆曰賢然後察之國人皆曰可殺然後察之庶言同則繹之謂也陳氏大猷曰周公之訓所不可易至於政則謹始和中由俗而革或當廢或當興必出謀之國人入謀之左右吕氏曰廢興者非更革周公之法蓋政事舉棤之間斟酌權量以求其當而已陳氏雅言曰事有當廢事有當興即所圖謀之政也虞之於人繹之於己即能致其艱者矣爾有嘉謀嘉猷則入告爾后于內爾乃順之于外曰斯謀斯猷惟我后之德嗚呼臣人咸若時惟良顯哉言切於事謂之謀言合於道謂之猷道與事非二也各舉其甚者言之良以德言顯以名言或曰成王舉君陳前日已陳之善而歎息以美之也葛氏曰成王殆失斯言矣欲其臣善則稱君人臣之細行也然君既有是心至於有過則將使誰執哉禹聞善言則拜湯改過不吝端不為此言矣嗚呼此其所以為成王歟陳氏大猷曰臣人猶言人臣吕王氏炎曰良言其善顯言其善之昭著也氏曰此王舉君陳前日之善也君陳平昔謀猷入告及既施行則淡然不有前日尚忘己之善而皆歸之於君今日豈忘人之善而欲出於己乎處西山真氏曰善則稱君含美從王此義乃人臣自者所當知若君以是語其臣則不可也漢高祖稱季斯善則稱君而王衛尉深非之衛尉之名不著然其言足為萬世法吕氏說亦回護之辭耳謀新安陳氏曰此承上文謂謀於衆審於己而有嘉猷則入告爾后於內爾乃順之於外曰斯謀斯猷惟我后之德嗚呼臣人咸若時惟良顯哉非特善則稱君之義當然以善言上聞而君不我違使得行之於外非有德之君不能若此此乃人臣宣上德意以明示於衆也成王非欲臣之譽已蓋欲君陳審謀猷以見之設施庶幾君蒙其歸美而臣遂其良顯耳又按成王此言前此聖帝明王未有是也葛真之疑亦未為過蓋恐啓導諛之漸也王曰君陳爾惟𢎞周公丕訓無依勢作威無倚法以削寬而有制從七恭反容以和此篇言周公訓者三曰懋昭曰式時至此則𢎞周公之丕訓欲其益張而大之也君陳何至依勢以為威倚法以侵削者然勢我所有也法我所用也喜怒豫奪毫髮不於人而於己是私意也非公理也安能不作威以削乎君陳之世當寬和之時也然寬不可一於寬必寬而有其制和不可一於和必從容以和之而後可以和厥中也吕氏曰周公之訓大矣猶欲𢎞之者繼前人之政苟止以持循因襲為心其所成必降前人數等惟舊然開拓期以光大前業然後僅能不替蓋造始之於繼成其力量不同也和中之時大體固當寬苟無制則流蕩放肆安能從容以和乎馴擾調娛於品制之中游息化養於範圍之內斯其所以和也又曰寬而有制從容以和此最難常人欲為防間則多失之迫切無和氣此雖寬而有制雖有制而能和言孔氏曰無倚法制以行刻削之政夏氏曰上文周公之訓不可不遵然未言今日治商民當如何故此及之無依勢至以和此言商民不犯法者待之當如此其下則言不幸入於法者待之當如此姦宄敗亂又非此比故三細不宥陳氏雅言曰成王於此非以周公之訓為未𢎞蓋持循繼守之道非奮迅作興其力則必今日之治有未至而視前日之成為有歉故以𢎞周公丕訓為言勢我所有不可依之以至于作威法我所用不可倚之以至於以削苟毫髮之不得平即為非所當用此戒之以所當慮之事也寬固得衆然不可失於縱而必行之有制和固為貴然不可失於流而必出於從容苟毫髮之或過於中即為陷于一偏此勉之以所當為之則也上文告以廢興恐君陳易於變易故此復戒之以𢎞周公丕訓君陳之政以寬和為主故下文皆反覆言寬和之意作威以削此寬和之反也殷民在辟豫曰辟爾惟勿辟豫曰宥爾惟勿宥惟厥中辟字並音僻上章成王慮君陳之徇已此則慮君陳之徇君也言殷民之在刑辟者不可徇君以為生殺惟當審其輕重之中也陳氏經曰君之喜怒無常情法之輕重有常理不徇君而徇理之中可也君言苟是從君可也非從君乃從理也君言苟未是則從理可也從理乃所以從君也有弗若于汝政弗化于汝訓辟以止辟乃辟其有不順于汝之政不化于汝之訓刑之可也然刑期無刑刑而可以止刑者乃刑之此終上章之辟狃女九反于姦宄音舉敗常亂俗三細不宥狃習也常典常也俗風俗也狃于姦宄與夫音扶毁敗典常壞亂風俗人犯此三者雖小罪亦不可宥以其所關者大也此終上章之宥爾無忿疾于頑無求備于一夫無忿疾人之所未化無求備人之所不能陳氏曰頑不率教者不可忿疾之率教者則當奬拔之然不可以求備下文分言之必有忍至德乃大即無忿疾于頑之意簡厥修至率其或不良即無求備之意必有忍其乃有濟有容德乃大孔子曰小不忍則亂大謀必有所忍而後能有所濟然此猶有堅制力蓄之意若𢎞裕寬綽恢恢乎有餘地者斯乃德之大也忍言事容言德各以深淺言也林氏曰忍者勉强而行人與已猶二容者自然而然人已渾乎為一矣自有忍而充於有容則忍之迹泯而廣大之德成矣又曰句踐于吳太王于狄忍也使其不忍則趣亡矣其何以濟湯之于葛文王于昆夷容也包之度內若天地然孰得而測度之非德之大而何侯氏曰無忿疾於頑有忍者也無求備于一夫有容者也以陳氏傳良曰習忍可得濟簡厥修亦簡其或不修進厥良以率其或不良王氏曰修謂其職業良謂其行胡孟反下同義職業有修與不修當簡而别必列反之則人勸功進行義之良者以率其不良則人勵行林氏曰殷民雖染紂之惡然亦已薰陶於周公之訓故有修者亦有不修者有良者亦有不艮者以其或已化或未化故也陳氏大猷曰修者方修于善良者已進於善簡夏氏曰修者簡别之不使與不修者混不修者亦别之不使與修者雜既簡别之如此然後於中選其能自修而至於為良善者進用之則不良者知所愧慕亦必修飾而至於良善是進其良所以率其不良者也言新安陳氏曰修不修皆可簡别故不修者亦以簡惟良者可進用故不良者以率言此其立言所以不同也惟民生厚因物有遷違上所命從厥攸好爾克敬典在德時乃罔不變允升于大猷惟豫一人膺受多福其爾之休終有辭于永世言斯民之生其性本厚而所以澆堅堯反薄者以誘於習俗而為物所遷耳然厚者既可遷而薄則薄者豈不可反而厚乎反薄歸厚特非聲音笑貌之所能為爾民之于上固不從其令而從其好大學言其所令反其所好則民不從亦此意也敬典者敬其君臣父子兄弟夫婦朋友之常道也在德者得其典常之道而著之於身也蓋知敬典而不知在德則典與我猶二也惟敬典而在德焉則所敬之典無非實有諸己實之感人捷於桴鼓所以時乃罔不變而信升於大猷也如是則君受其福臣成其美而有令名於永世矣孔氏曰民不從所令而從所好在上者不可不慎所好夏氏曰向之厚者雖化而為薄而其本厚者未嘗不存爾能敬典在德以化之民無不變薄為厚而躋於大道者吕氏曰化之博福之厚名之長所以致之不出於敬典在德而已東郊之命君陳始以令德孝恭得之成王終以敬典在德勉之取之以實期之以實始終一實也俗張氏曰觀康誥所言商民父子兄弟之倫如此風之薄可知君陳欲藥其病惟敬典在德而已人君不言福風俗淳厚偕之大道此人君之福也鄭氏景望曰時乃罔不變允升于大猷成王自謂膺受多福道洽政治澤潤生民康王亦自謂膺受多福成康言福皆以商民之化為說然其民俗趨化非人君受福之實乎天保報上受福之詩也其詩曰羣黎百姓遍為爾德詩之意即成康之意則陳氏經曰民變其舊俗而後進於大道允升大猷化頑成仁反薄歸厚矣新安陳氏曰敬典在德是能謹其所好時罔不變是即從厥攸好也商民未化原於昧天敘之典惟敬天敘之典可以化之敬典在德以化民惟令德孝友之君陳能之君陳厚於天敘之典久矣成王即其所素履以勉之也其成和中之化也亦宜蓋德者化商民之本敬者又以德化商民之本始曰命汝尹兹東郊敬哉終曰爾克敬典在德始終一敬而德有諸已矣德有諸己而商民可化矣一篇綱頜中之綱領捨敬吾何以觀之哉陳氏雅言曰民生厚即升于大猷可知蓋所謂猷者其本厚之理也違命從好即乃罔不變而可見蓋所以變其從好之實也民之厚雖遷而薄而其厚者亦未嘗不存己之典能敬而有得而其所得者又即其本厚且敬典在德則上之好無不謹矣升于大猷則下之典無不謹矣以康誥觀之殷民之病在於不能敬典故必求敬典之人而道之莫令德孝友之君陳若也成王此言蓋因其素履者勉之顧命顧還視也成王將崩命羣臣立康王史序其事為篇謂之顧命者鄭𤣥云回首曰顧臨死回顧而發命也今文古文皆有吕氏曰成王經三監平聲之變王室幾平聲搖故此正其終始特詳焉顧命成王所以正其終康王之誥康王所以正其始吕氏曰天子天下之共主也成王力疾臨廟朝而命之二公受遺率諸侯而輔之所以公天位而嚴大寶也世稱漢武帝拔霍光於宿衛託以幼孤為知人抑不知所謂大臣者非可寄安危屬存亡者不在此選如周召內為師保外統諸侯君存則輔政君殁則託孤所謂受遺蓋其一職也武帝垂殁始拔一人付之平時大臣果安用乎無具甚矣陳氏經曰死生夜旦也人道之常始終之義也非學問之深不足以語此成王自幼得周召二公養成其德緝熙其學至於臨死生始終之變卓然不亂觀此書當與曽子易簣春秋書公薨于路寢參看又書載顧命獨成王有焉蓋自艱難變故中得之王當幼沖遭四國之難事亦殆矣經一變長一智顧命之重成王亦折肱而知醫歟又曰後世之主以死為諱繼成之際鮮有能正其終始者唐順宗嗣子已壯一旦病不能言不能召宰相託孤使宦寺得擬議所立非因衛次公等草詔得入抗議立廣陵王事亦危矣可不監哉惟四月哉生魄王不懌始生魄十六日王有疾故不悅懌皇極經世書成王在位三十七年起丙戌盡壬戌甚臨川吳氏曰惟四月成王崩年之四月也不懌疾也天子之疾曰不懌曰不豫崩曰登遐曰晏駕皆臣子不忍斥言之也甲子王乃洮頮音桃悔水相去聲被冕服憑玉几王發大命臨羣臣必齊戒沐浴今疾病危殆故但洮盥頮面扶相者被以袞冕憑玉几以發命唐孔氏曰漢律厯志成王即位三十年四月庚戌朔十五日甲子哉生魄即引此顧命之文此劉歆說也孔以為十六日則不與歆同矣下云彌留則疾已多日甲子是發命之日耳夏氏曰漢志言哉生魄即甲子日恐不然武成言一月壬辰旁死魄越翼日癸巳今此哉生魄上無日辰故甲子不可考其為何日也吕氏曰甲子去崩才一日耳猶盥洗以致潔冕服以致嚴顧托之言淵奧精明蓋臨衆之敬不以困憊廢素定之理雖垂殁固炯如也惟善治氣者能歷疾病而不惰善養心者能臨死亡而不昏豈一朝一夕之積哉陳氏曰加朝服拖紳孔子疾不敢以褻服見君也此即成王不敢以褻服臨臣也臨川吳氏曰洮盥手也頮沃面也水以水洮頮之也發大命臨羣臣必齊戒沐浴今疾病故但洮頮也相相禮者被冕服以衮冕服被王身也几所憑以為安玉几以王飾几也凡大朝覲王位設黼扆前設左右玉几乃同召太保奭芮伯彤伯畢公衛侯毛公師氏虎臣百尹御事召直笑反芮如稅反同召六卿下至御治事者太保芮伯彤伯畢公衛侯毛公六卿也冢宰第一召公領之司徒第二芮伯為之宗伯第三彤伯為之司馬第四畢公領之司寇第五衛侯為之司空第六毛公領之太保畢毛三公兼也芮彤畢衛毛皆國名入為天子公卿師氏大夫官虎臣虎賁氏百尹百官之長上聲及諸御治事者平時則召六卿使率其屬此則將發顧命自六卿至御事同以王命召也朱子曰顧命排得三公三孤六卿齊整如曰太保奭芮伯彤伯畢公衛侯毛公召公與畢公毛公是三公芮伯彤伯衛侯是三孤太保是冢宰芮伯是司徒衛侯是康叔為司寇所以康誥中多說刑三公只是以道義傳保王音無職事官屬却下行六卿事漢時太傅亦無官屬唐孔氏曰高官兼攝下司者漢世以來謂之領故召畢毛言領王肅云彤姒姓之國其餘五國姬姓畢毛文王庶子謂林氏曰後世人君將託後嗣獨引親信入受遺詔之顧命之臣漢唐末國嗣多立于戚宦或有夜半禁中出片紙以某人為嗣羣臣拱手莫敢違雖有嫡嗣不能屬於大臣倉卒之際廢立紛然顧命之書誠萬世之法王曰嗚呼疾大漸惟幾平聲病日臻既彌留恐不獲誓言嗣兹豫審訓命汝此下成王之顧命也自嘆其疾大進惟危殆病日至既彌甚而流連恐遂死不得誓言以嗣續我志此我所以詳審發訓命汝統言曰疾甚言曰病夏氏曰恐其既死則不得出誓以言嗣續之事昔君文王武王宣重光奠麗陳教則肄肄不違用克達殷集大命武猶文謂之重光猶舜如堯謂之重華也奠定麗依也言文武宣布重明之德定民所依陳列教條則民皆服習而不違天下化之用能達於殷邦而集大命於周也問奠麗陳教則肄麗字據孔氏音力馳反施也諸家多作附麗之麗謂土著也奠麗謂養之陳教謂教之未知其說如何某竊謂從孔氏說亦自平直奠麗者謂定其所施之號令也陳教則陳其所以教之之道也肄或訓勞或訓習愚意謂從習為長未敢自決朱子曰前篇有以麗訓刑者肄當訓習宣蘇氏曰奠定民所麗著定民居也奠陳氏雅言曰重光言先王相繼而能明其德也麗至不違言能盡教養之政而化服民心也用克至大命言能推教養之效以大受天命也成王意謂昔者文武相繼為君皆有大德故有重光之宣著此聖德之盛無不同也惟德之盛者無不同故其政之善者無或異言大養民之政則凡一世緣此文王奠民之所麗也武王之奠麗亦無異於文王觀其散財發粟則其初蓋可知矣言其教民之道則明德慎罰此文王已陳之教條也武王之陳教亦無異於文王觀其惇信明義則其初又可知矣是以斯民至於服習不違者武王之民無異於文王之民由是自友邦之修治以至于西土之怙冒自東征之撫綏以至于蠻貊之率俾教養之效無逺不及謂之用克達殷者信矣有商之季而不能盡教養之道則天命之集非文武而誰歟于以見文武之德為善政之本以善政為化服民心之本以化服民心為大受天命之本成王此言可謂深知文武有天下之故也在後之侗音通敬迓天威嗣守文武大訓無敢昏逾侗愚也成王自稱言其敬迎上天威命而不敢少忽嗣守文武大訓而無敢昏逾天威天命也大訓述天命者也於天言天威於文武言大訓非有二也今天降疾殆弗興弗悟爾尚明時朕言用敬保元子釗音昭𢎞濟于艱難釗康王名成王言今天降疾我身殆將必死弗興弗悟爾庶幾明是我言用敬保元子釗大濟于艱難曰元子者正其統也夏氏曰王業以艱難而成成王今既死則艱難之業將責之康王矣者臨川吳氏曰弗興弗能起弗悟不蘇醒明是朕言不昧我所命而遵用之也宗社之重基業之大付之一人可謂艱難言當敬保護康王大渡脫艱難也柔逺能邇安勸小大庶邦懷來馴擾安寧勸導皆君道所當盡者合逺邇小大而言又以見君德所施公平周溥而不可有所偏滯也思夫人自亂于威儀爾無以釗冒貢于非幾亂治也威者有威可畏儀者有儀可象舉一身之則而言也蓋人受天地之中以生是以有動作威儀之則成王思夫人之所以為人者自治於威儀耳自治云者正其身而不假於外求也貢進也成王又言羣臣其無以元子而冒進於不善之幾也蓋機者動之微而善惡之所由分也非幾則發於不善而陷於惡矣威儀舉其著於外者而勉之也非幾舉其發於中者而戒之也威儀之治皆本於一念一慮之微可不謹乎孔子所謂知幾子思所謂謹獨周子所謂幾善惡者皆致意於是也成王垂絶之言而拳拳及此其有得於周公者亦深矣蘇氏曰死生之際聖賢之所甚重也成王將崩之一日被冕服以見百官出經逺保世之言其不死於燕安婦人之手也明矣其致刑措宜哉問非幾幾字多訓危竊謂幾即事也猶萬幾之幾冒貢於非幾謂冒進于非所當為之事未知是否朱子曰幾者事之微也天陳氏經曰成王所得於周召者在敬既以敬而迓威復以敬授羣臣使輔嗣王曰𢎞濟艱難天下本非逸樂之具乃艱難之器也柔能安勸之要自一身始下文逆及威儀非幾焉此成王平生學問所得處子陳氏大猷曰夫人猶言大凡人新安陳氏曰曾將終示孟敬子以君子所貴乎道者三惟在於容貌顔色辭氣之間與成王臨崩告戒之言如出一律其聞聖學之淵源於周公而垂其流派於洙泗者歟兹既受命還音旋出綴衣于庭越翼日乙丑王崩綴衣幄帳也羣臣既退徹出幄帳於庭喪大記云疾病君徹懸東首於北牖下是也於其明日王崩復齊董氏曰周禮射人掌國之三公三孤卿大夫之位公北面孤東面卿大夫西面此受命還謂還就此位也王氏曰綴衣其衣連綴帷幄之屬在旁曰帷在上曰幕四合象宫室曰幄幄上承塵曰帟庭路寢之庭王氏炎曰成王幼立三叔流言王不無疑則其性非卓然高明也臨殁之際乃能如此得非周召師保輔翼教誨有以養或其德意誠心正雖生死之際而志氣清明如是乎是知三代而下人主天資未必不及古人而德不逮者無古帝王之學也太保命仲桓南宫毛俾爰齊侯吕伋以二干戈虎賁百人逆子釗於南門之外延入翼室恤宅宗桓毛二臣名伋太公望子為天子虎賁氏延引也翼室路寢旁左右翼室也太保以冢宰攝政命桓毛二臣使齊侯吕伋以二干戈虎賁百人逆太子釗于路寢門外引入路寢翼室為憂居宗主也吕氏曰發命者冢宰傳命者兩朝臣承命者勳戚顯諸侯體統尊嚴樞機周密防微慮患之意深矣入自端門萬姓咸覩與天下共之也延入翼室為憂居之宗示天下不可一日無統也唐穆敬文武以降閹寺執國命易主於宫掖而外廷猶不聞然後知周家之制曲盡備豫雖一條一節亦不可廢也夏氏曰桓毛必宿衛之臣王氏曰稱子者所以正名明父子繼世之義稱名未成君也王宫南向南門王宫之外門也范氏曰成王崩太子必在側當是時本在內特出而迎之所以顯之於衆也丁卯命作冊度命史為冊書法度傳顧命于康王復齊董氏曰成王命周公留後康王命畢公保釐皆作冊此將以父命傳子故亦作冊王陳氏大猷曰成王雖有遺命未有冊書將傳之康故作冊書紀先王之言以授之因並作受冊法度下文升階即位及受同祭饗等其法度也臨川吳氏曰丁卯王崩之第三日也命亦太保命也成王有遺命將傳之于康王故作冊以紀其言而授之也既作冊因作受冊之度也凡喪禮厥明而小斂又厥明而大斂尊卑皆同命作冊度者既大斂之後也越七日癸酉伯相去聲命士須材伯相召公也召公以西伯為相須取也命士取材木以供喪用鄭氏曰大夫以上殯斂皆以死之來日數天子七日而殯於死為八日癸酉者殯之明日也氏王氏肅曰召公為方伯居冢宰故乂曰伯相薛曰士山虞匠人之屬命士取材木須待以供凡喪事之用公吕氏曰自成王崩後訖康王受命前命皆出於召曰太保命仲桓南宫毛又曰命作冊度又曰伯相命士所以一號令而無二門也自臨川吳氏曰癸酉王崩之第九日天子七日而殯死之明日數此既殯之後也殯畢則送死之事略具矣故於此時傳顧命于嗣君也命士取材木以供喪用士喪禮獻材于殯門外檀弓旬而布材與明器狄設黼扆綴衣狄下士祭統云狄者樂吏之賤者也喪大祭狄人設階蓋供喪役而典設張去聲周禮掌次掌邦之張事之事者也黼扆音倚屛風畫為斧文者設黼扆幄帳如成王生存之日也唐孔氏曰自設黼扆至陳輅車各有所司皆是相命不言命者蒙上命士之文也此下皆為將傳顧命而陳儀物也經於四座上言設黼扆綴衣則四座皆設也先施屏風於前又施帳幄于上牖間南嚮敷重篾席黼純文允反下並同華玉仍几此平時見羣臣覲諸侯之坐也敷設重席所謂天子之席三重者也篾席桃竹枝席也黼白黑雜繒純緣音院也華彩色也華玉以飾几仍因也因生時所設也周禮吉事變几凶事仍几是也吕氏曰牖序夾房階孰前指路寢言之牖聞南嚮就路寢忩牖問南嚮設此座也間者忩東戶西戶牖之間也即當寧之所西序東嚮敷重底席綴純文貝仍几此旦夕聽事之坐也東西廂謂之序底席蒲席也綴雜彩文貝有文之貝以飾几也吕氏曰就路寢西廂設坐東嚮也東序西嚮敷重豐席盡純雕玉仍几此養國老饗羣臣之坐也豐席莞席也畫彩色雕刻鏤也吕氏曰東序西嚮就路寢東廂設坐西嚮也西夾南嚮敷重筍席𤣥粉純漆仍几此親屬私燕之坐也西廂夾室之前筍席竹席也紛雜也以𤣥黑之色雜為之緣漆漆几也牖間兩序西夾其席有四牖戶之間謂之扆天子負扆朝諸侯則牖間南嚮之席坐之正也其三席各隨事以時設也將傳先王顧命知神之在此乎在彼乎故兼設平生之坐也夏氏曰廂之夾室謂之夾又謂之房西夾乃西廂之夾室即下文所謂東房西房以其夾中央之大室西夾南嚮蓋在西廂之夾室中南嚮設此座也說文筍竹胎筍席取筍皮織為席也越王五重陳寶赤刀大訓𢎞璧琬琰音逺掩在西序大玉夷玉天球河圖在東序𦙍之舞衣大貝鼖音奔鼓在西房兌之戈和之弓垂之竹矢在東房於東西序坐北列玉五重及陳先王所寶器物赤刀赤削音鞘朱其刀室因曰赤刀也大訓三皇五帝之書訓誥亦在焉文武之訓亦曰大訓𢎞璧大璧也琬琰圭名夷常也球鳴球也河圖伏羲時龍馬負圖出於河一六位北二七位南三八位東四九位西五十居中者易大傳所謂河出圖是也𦙍國名𦙍國所制舞衣大貝如車渠鼖鼓長八尺兑和皆古之巧工垂舜時共音恭工舞衣鼖鼓戈弓竹矢皆制作精巧中去聲法度故歷代傳寶之孔氏曰𢎞璧琬琰大玉夷玉天球玉之五重也吕氏曰西序所陳不惟赤刀𢎞璧而大訓參之東序所陳不惟大玉夷玉而河圖參之則其所寶者斷都玩反可識矣愚謂寶玉器物之陳非徒以為國容觀美意者成王平曰之所觀閲手澤在焉陳之以象其生存也楊氏中庸傳曰宗器於祭陳之示能守也於顧命陳之示能傳也陳氏大猷曰此陳先王世傳之寶也越及也承上文而言玉五重陳寶總言之不復分别焉玉一雙曰重古雙玉為瑴圓玉曰璧鋭上曰圭琰有鋒芒琬無鋒芒大玉華山之玉夷玉東夷之美王受王氏曰宗社守器明前王所守後王所皆在是也大輅音路在賓階面綴輅在阼階面先輅在左孰之前次輅在右孰之前大輅玉輅也綴輅金輅也先輅木輅也次輅象輅革輅也王之五輅玉輅以祀不以封為最貴金輅以封同姓為次之象輅以封異姓為又次之革輅以封四衛為又次之木輅以封蕃國為最賤其行也貴者宜自近賤者宜逺也王乘玉輅綴之者金輅也故金輅謂之綴輅最逺者木輅也故木輅謂之先輅以木輅為先輅則革輅象輅為次輅矣賓階西階也阼階東階也面南嚮也孰門側堂也五輅陳列亦象成王之生存也周禮典路云若有大祭祀則出路大喪大賓客亦如之是大喪出輅為常禮也又按所陳寶玉器物皆以西為上者成王殯在西序故也爾雅阼階主階也鄭氏曰作猶酢也東階所以答酢賓客其夏氏曰階面者據人在堂上而向南方輅北陳之轅向南故謂之面蓋在階之南面也先輅在左孰之前蓋在門內之西以孰在堂之前故自內向外言之雖在西自外向內言之實在左也次輅在右孰之前蓋在門內之東自內向外言之雖在東自外向內言之實在右也顧氏曰先輅在寢門內之西北面對玉輅次輅在寢門內之東北面對金輅吕氏曰此非獨盛彌文而彰備物天位峻極幄座靚深寶鎮燁華車輅峙列入其庭肅然起敬懼不克承委重投艱之意不言而已傳矣禮記周人殯于西階之上二人雀辨音便執惠立於畢門之內四人綦音其辨執戈上刃夾兩階戺音士一人冕執劉立于東堂一人冕執鉞立于西堂一人冕執戣音葵立于東垂一人冕執瞿立于西垂一人冕執鋭鋭當作鈗音允立于側階辨士服雀辨赤色辨也綦辨以文鹿子皮為之惠三隅矛路寢門一名畢門上刃刃外向也堂亷曰戺冕大夫服劉鉞屬戣瞿皆㦸屬鋭當作鈗說文曰鈗侍臣所執兵從金允聲周書曰一人冕執鈗讀若允東西堂路寢東西廂之前堂也東西垂路寢東西序之階上也側階北陛之階上也吕氏曰古者執戈㦸以宿衛王宫皆士大夫之職無事而奉燕私則從七恭反容養德而有膏澤之潤有事而司禦侮則堅明守義而無腹心之虞下及秦漢陛楯執㦸尚餘一二此制既廢人主接士大夫者僅有視朝音潮數刻而周廬注宿衛之廬周於宫也陛楯或環以椎埋嚚悍之徒有志於復古者當深繹也孔氏曰側階北下階上冕唐孔氏曰垂旒為冕無旒為辨辨版皆廣八寸長尺六寸前圓後方雀辨色赤而微黑如雀頭也垂堂上之逺地戺堂廉廉者稜也立在堂下近於堂稜鄭王皆以側室為東下階然立於東垂者己在東下階上何由此人復共並立故傳以為北下階上謂當北階北階則惟堂北一階而已側猶特也執兵宿衛先東後西者以王在東宿衛敬新王故也夏氏曰四人既立於東西廂之前堂二人又立於東西廂堂上之逺地則堂之南宿衛備矣故此一人冕執鋭立於堂北之特階大夫也皆立堂上吕氏曰凡辨士也皆立堂下冕陳氏經曰自設黼扆至此典章文物之備豈為華侈之具哉一以象前王平生所坐所寶所乘所衛以起嗣王之追慕而盡誠紹述也一以昭前王委重投艱之意使嗣王肅敬以祇承也一以起羣臣諸侯之尊敬想慕前王而繫心於嗣王也一以表人主之崇高富貴尊無二上而傳授之正如此以絶天下覬覦之萌也王麻冕黼裳由賓階隮箋西反卿士邦君麻冕蟻裳入即位麻冕三十升每升八十縷麻為冕也隮升也康王吉服自西階升堂以受先王之命故由賓階也蟻𤣥色公卿大夫及諸侯皆同服亦廟中之禮不言升階者從王賓階也入即位者各就其位也吕氏曰麻冕黼裳王祭服也卿士邦君祭服之裳皆纁今蟻裳者蓋無事於奠祝不欲純用吉服有位於班列不可純用凶服酌吉凶之間示禮之變也吕氏曰儀物既備然後延嗣王受顧命而踐位自此始稱王裳夏氏曰麻冕用極細布即袞冕隮蘇氏曰麻冕之四章此獨用黼示變也由賓階未受顧命猶以子道自居不敢當主也武復齊董氏曰孔氏以卿士為公卿大夫按左傳鄭公為平王卿士洪範曰卿士惟月則卿士指朝之執政者而言色唐孔氏曰禮祭服皆𤣥衣纁裳纁赤色之淺者蟻𤣥如蟻太保太史太宗皆麻冕彤裳太保承介圭上宗奉同瑁音冒由阼階隮太史秉書由賓階隮御王冊命太宗宗伯也彤纁也太保受遺太史奉冊太宗相去聲禮故皆祭服也介大也大圭天子之守長尺有二寸同爵名祭以酌酒者瑁方四寸邪刻之以冒諸侯之圭璧以齊瑞信也太保宗伯以先王之命奉符寶以傳嗣君有主道焉故升自阼階太史以冊命御王故持書由賓階以升蘇氏曰凡王所臨所服用皆曰御蘇氏曰彤裳亦變也彤赤色曰董氏曰介圭天子所守瑁以朝諸侯陳氏大猷太保冢宰總大權故承鎮圭宗伯主祭祀朝覲禮故奉同瑁書即冊命也秉言持之以升御言奉之以進夏氏曰圭瑁先王所執今將授嗣王若先王豫之故自阼階而升太史執書將進之嗣王故與王接武同升陳氏經曰上宗即宗伯或言太宗伯一人小宗伯二人凡三人使其上二人也其一人奉同一人奉瑁曰皇后憑玉几道揚末命命汝嗣訓臨君周邦率循大卞音辨燮和天下用答揚文武之光訓成王顧命之言書之冊矣此太史口陳者也皇太后君也言大君成王力疾親憑玉几道揚臨終之命命汝嗣守文武大訓曰汝者父前子名之義卞法也臨君周邦位之大也率循大卞法之大也燮和天下和之大也居大位由大法致大和然後可以對揚文武之光訓也陳氏大猷曰道言揚稱也顧命中成王自言嗣守文武大訓故此言命汝嗣訓燮亦和也答揚文武光訓即所謂嗣訓也竊意冊命中必述成王命召畢之因載顧命之語史略其前之己見者而獨載此口陳語也王再拜興答曰眇眇豫末小子其能而亂四方以敬忌天威眇小而如亂治也王拜受顧命起答太史曰眇眇然豫微末小子其能如父祖治四方以敬忌天威乎謙辭退托于不能也顧命有敬迓天威嗣守文武大訓之語故太史所告康王所答皆於是致意焉陳氏大猷曰其未定之辭乃受同瑁王三宿三祭三咤陟駕反上宗曰饗王受瑁為主受同以祭宿進爵也祭祭酒也咤奠爵也禮成於三故三宿謂從立處三進爵至神所也三祭謂三酌酒於神座也三咤謂每一酹酒則一奠爵蓋三奠其爵也葛氏曰受上宗同瑁則受太保介圭可知宗伯曰饗者傳神命以饗告也林氏曰受瑁必授之人受同則以祭從鄭氏曰釋詁云肅進也宿即肅也三肅為三進爵立處而三進至神所也三祭三酹酒於神座也每一酹酒則一奠爵王肅以咤為奠爵經典無此咤字曰饗所謂嘏也詩箋曰子福曰嘏特牲少牢之禮尸嘏主人此則上宗嘏王也新安陳氏曰咤有兩說孔氏以為奠爵諸儒多因之蘇氏以為至齒不飲與嚌同義初疑咤從口意蘇說為是及考字書方知咤與吒同吒怒也禮記無咤食亦怒也㓃與吒同陟駕反祭奠酒爵也宅本㓃字傳寫訛耳孔注音釋下有云說文作㓃由此觀之則咤訓奠爵不可易也若與嚌同義則此處何為君咤而臣嚌且與吕氏太保飲福不井味王飲福亦廢之說不合矣太保受同降盥以異同秉璋以酢授宗人同拜王答拜太保受王所咤之同而下堂盥洗更音庚用他同秉璋以酢酢報祭也祭禮君執圭瓚祼音貫下同尸太宗執璋瓚亞祼報祭亦亞祼之類故亦秉璋也以同授宗人而拜尸王答拜者代尸拜也宗人小宗伯之屬相去聲太保酢者也太保供王故宗人供太保新安陳氏曰報祭者亞祼之類即今之亞獻也王祭告成王言己巳受顧命也太保秉璋以酢授同而拜告成王己巳傳顧命也太保受同祭嚌宅授宗人同拜王答拜以酒至齒曰嚌太保復受同以祭飲福至齒宅居也太保退居其所以同授宗人又拜王復答拜太保飲福至齒者方在喪疚歆神之賜而不井其味也若王則喪之主非徒不井味雖飲福亦廢也新安陳氏曰王答拜蔡氏則曰代尸拜王氏則曰因太保拜而對拜夏氏則曰王亦拜成王柩紛紛揣度要之王答召公拜何疑焉君在廟門外則全于君在廟門內則全于子況康王方在廟中柩前受顧命未出廟門臨朝堂而受羣臣朝也冢宰以元老大臣受託孤重寄先王臨之在上先之拜告傳顧命繼之拜告禮成康王為喪主立柩前其答拜禮亦宜之冢宰傳顧命以相授見大臣如見先王也答之拜敬大臣即所以敬先王也何必如諸說之紛紛哉太保降收諸侯出廟門俟太保下堂有司收撤器用廟門路寢之門也成王之殯在焉故曰廟言諸侯則卿士以下可知俟者俟見新君也新安陳氏曰成王以乙丑崩越九日癸酉命士須材傳顧命不言日其在癸酉後必矣曷不如後世嗣君當日於柩前即位而涉旬日乎曰君薨百官冢已以聽於冢宰尚矣有召公為冢宰以攝政紀綱政令周密備具如此故嗣君可以旬日方即位也古今異宜何必同哉西山真氏曰此篇見周公養成君德之效又見召公當危疑之際區處周密皆可為來世法康王之誥今文古文皆有但今文合于顧命朱子曰伏生以康王之誥合於顧命今除却序文讀著則文勢自相連接王出在應門之內太保率西方諸侯入應門左畢公率東方諸侯入應門右皆布乘去聲黃朱賓稱奉圭兼幣曰一二臣衛敢執壤奠皆再拜稽上聲首王義嗣德答拜漢孔氏曰王出畢門立應門內鄭氏曰周禮五門一曰臯門二曰雉門三曰庫門四曰應門五曰路門路門一曰畢門外朝音潮在路門外則應門之內蓋內朝所在也周中分天下諸侯主以二伯自陜音閃以東周公主之自陜以西召公主之召公率西方諸侯蓋西伯舊職畢公率東方諸侯則繼周公為東伯矣諸侯入應門列于左右布陳也乘四馬也諸侯皆陳四黃馬而朱其鬛以為廷實或曰黃朱若篚厥𤣥黃之類賓諸侯也稱舉也諸侯舉所奉圭兼幣曰一二臣衛一二見音現下並同非一也為王蕃衛故曰臣衛敢執壤地所出奠贄音至皆再拜首至地以致敬義宜也義嗣德云者史氏之辭也康王宜嗣前人之德故答拜也吳氏曰穆公使人弔公子重耳重耳稽音起顙而不拜穆公曰仁夫公子稽顙而不拜則未為後也蓋為後者拜不拜故未為後也弔者含去聲者襚者升堂致命主孤拜稽顙成為後者也康王之見諸侯若以為不當拜而不拜則疑未為後也且純乎吉也答拜既正其為後且知其以喪見也夏氏曰敢執土地所有獻之於王庭新安陳氏曰奠如奠鴈之奠太保暨芮伯咸進相揖皆再拜稽首曰敢敬告天子皇天改大邦殷之命惟周文武誕受羑音友若克恤西土冢宰及司徒與羣臣皆進相揖定位又皆再拜稽首陳戒於王曰敢敬告天子示不敢輕告且尊稱之所以重其聽也曰大邦殷者明有天下不足恃也羑若未詳蘇氏曰羑羑里也文王出羑里之囚天命自是始順或曰羑若即下文之厥若也羑厥或字有訛謬西土文武所興之地言文武所以大受命者以其能恤西土之衆也進告不言諸侯以內見外吕氏曰二伯率諸侯列門左右朝會分班儀也太保及芮伯咸進相揖朝會合班儀也始而分班則諸侯兩立西伯與東伯之位相對今而合班則六卿前列冢宰與司徒之位相次蘇氏曰康王生長富貴告以文王羑里之難欲其知創業之艱難也忘張氏曰言克恤西土以文武基業本於西土示不本也臨川吳氏曰前之拜諸侯拜羣臣不拜此之拜羣臣拜諸侯不拜也王答諸侯拜而不答羣臣拜蓋諸侯自外初見羣臣在內日見也曰者太保言也太保為外諸侯之伯內羣臣之長故率諸侯羣臣進戒于王也羑若未詳或曰若順也羑里之囚逆境也而文一以順處之因此遂受天命或曰文王自出羑里之囚而天命始順或曰羑善也天所善天所若謂眷佑之也或曰羑若即下文厥若或字有訛按四說俱未安西土文武所興之地言文武所以誕受天命以其能恤西土之民也惟新陟王畢協賞罰戡音堪定厥功用敷遺去聲後人休今王敬之哉張皇六師無壞音怪我高祖寡命陟升遐也成王初崩未葬未諡音是故曰新陟王畢盡協合也好惡並去聲在理不在我故能盡合其賞之所當賞罰之所當罰而克定其功用施去聲及後人之休美今王嗣位其敬勉之哉皇大也張皇六師大戒戎備無廢壞我文武艱難寡得之基命也按召公此言若導王以尚威武者然守成之世多溺宴安而無立志苟不詰爾戎兵奮揚武烈則廢弛怠惰而陵遲之漸見矣成康之時病正在是故周公於立政亦懇懇言之後世墜先王之業忘祖父之讎上下苟安甚至於口不言兵亦異於召公之見矣可勝音升嘆哉問太保稱成王獨言畢協賞罰何也朱子曰只為賞不當功罰不當罪故事差錯若畢協賞罰非至公至明何以能此又問張皇六師曰古者兵藏於農故六軍皆寓於農張皇六師則是整理民衆底意思張氏曰今王繼新陟王惟敬而已敬則歷年不敬則早墜此召公平生所學昔以告成王今又以告康王然有疑焉新王即位元老大臣當以道德進成乃先區區以賞罰六師言何也曰周自祖宗以來仁深澤厚規模已定惟商民猶伺問隙欲逞其禍元老深謀逺慮不得已而及此是說也施於康王之時則可不可泛言之於新王之前也言孔氏曰高德之祖寡有之命厚一說高祖猶說命高后新安陳氏曰周以仁立國盈成之久其流弊易至於弛而弱失政雖甚於東遷之後幾微已兆於一再傳之餘周召畢諸公已預見先憂於未然之前矣正如太公言魯後世浸弱矣者也康王之子昭王即有舟膠楚澤之陵夷召公之言豈過也哉安臨川吳氏曰賞當功罰當罪盡合其宜克勝其任定文武之功用能延及於今後人有此休美今王嗣位其敬之哉張猶張弓之張言無弛也六師六軍也天子六軍高祖謂文武寡命言周之受命世所寡有今王不忘戎備無或弛怠而隳壞我文武不易得之天命也王若曰庶邦侯甸男衛惟豫一人釗報誥報誥而不及羣臣者以外見內康王在喪故稱名春秋嗣王在喪亦書名也林氏曰報誥者諸侯戒我故我以誥報之報答也昔君文武丕平富不務咎底音止至齊信用昭明于天下則亦有熊羆音卑之士不二心之臣保乂王家用端命于上帝皇天用訓厥道付畀四方丕平富者溥博均平薄斂去聲富民言文武德之廣也不務咎者不惡咎惡輕省刑罰言文武罰之謹也底至者推行而底其至也齊信者兼盡而極其誠也文武務德不務罰之心推行而底其至兼盡而極其誠內外充實故光輝發越用昭明於天下蓋誠之至者不可掩也而又有熊羆武勇之士不二心忠實之臣戮力同心保乂王室文武用受正命於天上天用順文武之道而付之以天下之大也康王言此者求助羣臣諸侯之意新安陳氏曰王資助于內外而首述文武得熊羆勇士不二心忠臣之助者蓋有感於張皇六師之言也其臨川吳氏曰丕平富謂無一人不富也平者各得分願富者家給人足也不務咎不以咎人之咎為務慎刑罰也底至致于極也齊信盡其誠也文武之心如是用能顯著于天下文武既聖則亦有勇猛如熊羆之士忠一不二心之臣共保乂王家用能受正命于上帝君仁於民臣忠於君兩盡其道天用順之而付畀以四方謂得天下也陳氏雅言曰昔君文武至昭明于天下言聖人之仁極其誠故其德有以著于民也則亦有熊羆之士至保乂王家言才德之臣為之輔故其治有益於國也用端命于上帝言文武之德既如此其賴羣臣之助又如此所以能受正命于天皇天用訓厥道付畀四方言上天眷于聖人之德而付之以天下之大也則亦云者康王意謂文武之聖本無賴於羣臣之助力而當時則亦有羣臣為之輔佐而況我之今日得不賴爾臣之助乎其求助羣臣諸侯之意可見矣唐孔氏云文武既聖時臣亦賢以君聖臣賢之故用能受端正之命于上天言文武得賢臣之力也乃命建侯樹屏音丙在我後之人今豫一二伯父尚胥暨顧綏爾先公之臣服于先王雖爾身在外乃心罔不在王室用奉恤厥若無遺鞠子羞天子稱同姓諸侯曰伯父康王言文武所以命建侯邦植立蕃屏者意蓋在我後之人也今我一二伯父庶幾相與顧綏爾祖考所以臣服于我先王之道雖身守國在外乃心當常在王室用奉上之憂勤其順承之毋遺我稚子之恥也林氏曰諸侯祖以嘗臣服于周先王今汝當相與顧安之顧謂顧念而不忘則先公在天之靈於是安矣吕氏曰戒之以用奉承憂恤其所當順者而順行之順理則一而時位則殊厥若者諸侯之所當順也人孰不欲順理時位之不識則其順或非所當順者矣吳林氏曰鞠子未離鞠養之嗣子康王自謂人臨川氏曰文武封建諸侯樹立蕃屏在我後之言先王之有臣以保乂王家所以厲羣臣也言先王之建侯以藩屏後人所以厲諸侯也天子稱同姓大國曰伯父小國曰叔父異姓大國曰伯舅小國曰叔舅今獨舉同姓大國以包其餘也王室若此汝則奉承而同恤之言以王室之憂為憂也鞠子王自謂諸侯不能盡職豈不貽我之羞乎羣公既皆聽命相揖趨出王釋冕反喪服始相揖者揖而進也此相揖者揖而退也蘇氏曰成王崩未葬君臣皆冕服禮歟曰非禮也謂之變禮可乎曰不可禮變於不得已嫂非溺終不援也三年之喪既成服釋之而即吉無時而可者曰成王顧命不可以不傳既傳不可以喪服受也曰何為其不可也孔子曰將冠音貫下並同子未及期日而有齊衰音咨催大功之喪則因喪服而冠冠吉禮也猶可以喪服行之受顧命見諸侯獨不可以喪服乎太保使太史奉冊授王于次諸侯入哭於路寢而見音現下同王於次王喪服受教戒諫哭踊音勇答拜聖人復扶又反起不易斯言矣春秋傳曰鄭子皮如晉葬晉平公將以幣行子産曰喪安用幣子皮固請以行既葬諸侯之大夫欲因見新君叔向辭之曰大夫之事畢矣而又命孤孤斬焉在衰絰音催垤之中其以嘉服見則喪禮未畢其以喪服見是重受弔也大夫將若之何皆無辭以退今康王既以嘉服見諸侯而又受乘黃玉帛之幣使周公在必不為此然則孔子何取此書也曰至矣其父子君臣之間教戒深切著明足以為後世法孔子何為不取哉然其失禮則不可不辨問康王釋喪服而被衮冕受虎賁之逆於南門之外且受黃朱圭幣之獻諸家皆以為禮之變獨蘇氏以為失禮使周公在必不為此未知當此際合如何區處朱子曰天下諸侯之禮與士庶人不同故孟子有吾未之學之語蓋謂此類耳如伊訓元祀十有二月朔亦是新喪伊尹已奉嗣王祇見厥祖固不可用凶服矣漢唐新主即位皆行冊禮君臣亦皆吉服追述先帝之命以告嗣王韓文外集順宗實録中有此事可考蓋易世傳授國之大事當嚴其禮而王侯以國為家雖先君之喪猶以為己私服也五代以來此禮不講則始終之際殊草草矣康王釋斬衰而服衮冕於禮為非孔子取之又不知如何設使制禮作樂當此之職只得除之葉氏曰天子即位之禮後世無傳焉春秋猶有可考君薨世子嗣位於喪次殯而未葬葬而未踰年者不敢死其君故不敢踐其正位不敢朝廟而主祭封內三年稱子緣臣民之心不可一日無君則不得已而嗣位緣始終之義一年不可以兩君則猶不敢當君位故必至明年而後朝廟正君位改元春秋始書公即位焉然則成王始殯而康王即內朝以見諸侯禮歟諸侯踰年而朝廟即位以吉服乎以凶服乎不可知也然古者吉凶不同事孔子曰羔裘𤣥冠不以甲吉服不可為凶事則凶服不可為吉事亦明矣魯莊未終桓喪王命主王姬嫁說者曰衰麻不可以接辨冕諸侯大夫葬晉平公將以幣行子産曰喪安用幣子皮固請以行既葬諸侯之大夫欲因見新君叔向辭之曰大夫之事畢矣而又命孤孤斬焉在衰經之中其以嘉服見則喪禮未畢其以喪服見是重受弔也古人謹於吉凶之服如此其嚴也康王之事必有不得已而然者蓋成王初即位猶有三監淮夷殷民之變微周公天下未可知況不及成王周公者乎故召公權一時之宜而遽正君臣之分若曰三年之喪天下之通喪也繼世以正大統亦天下之大義也通喪上下之所同而大義天子諸侯之所獨故不以通喪廢大義而吉凶不可相亂則以冕服朝諸侯以為常禮則不可以為非禮則亦不可傳及後世卒不能奪康王之為然後知二書之録於經非孔子不能權之於道以盡萬世之變也朝吕氏曰舜除堯喪格廟而咨嶽牧成王除武王喪廟而訪羣臣皆百代之正禮然成湯方殁伊尹遽偕侯甸羣后以訓太甲禮固有時而變也說者不疑太甲受伊尹之訓於居憂之時乃疑康王受召畢諸侯之戒於宅恤之日過矣祀復齊董氏曰伊尹以冕服奉嗣王歸于亳乃在三之十有二月是時三年之喪畢去凶即吉禮之常也伊訓所謂惟元祀十有二月乙丑伊尹祀于先王乃太甲居仲壬之喪伊尹攝政則祭於湯廟者伊尹也援此為證恐未為安陳氏傳良曰釋冕反喪服東坡嘗疑之某嘗以問之鄉先生鄉先生曰惜乎東坡疑之而不加察也召公畢公皆盛德又老于更事者豈不知禮蓋其身先見周公以叔父之親擁輔太子而流言之變起于兄弟非周公之忠誠則社稷岌岌乎殆哉矣故於康王之立特為非常之禮迎之南門衛之干戈奉之冊書被之冕服而又率諸侯北面而朝之以與天下共立新君使之曉然知所定而無疑其意逺矣蓋自秦漢而下授受成於宫聞之曖昧而擁立出於一人之豫奪禍天下國家不少然後知二公老練坐鎮安危之機送往事居中外無間未易以泥常論也新安陳氏曰蘇氏之論主於守經葉吕陳氏之論出於達權守經合理之正而不可破達權亦當察事之宜而不可膠召公在當時必有迫於不得已懲創於往事而不敢輕者觀其布置舉措重大周密徴召會集翕合安徐若臨大敵當大難然諸侯咸在或謂問疾者尚留而因受其朝非也觀其言曰庶邦侯甸男衛曰率西方諸侯入左率東方諸侯入右則徴召於既崩之餘翕集於一旬之內可見又觀張皇六師一語則當時事勢亦可想矣紀載始末節節備具兩篇之中辭繁不殺前後五十六篇紀載無似此之詳者復齊援伊尹事調祠先王者伊尹攝行固然矣然奉嗣王祗見厥祖即其下一句不知伊尹奉太甲廟見成湯其凶服乎抑吉服乎證之朱子之說當制禮也一條固主蘇氏答潘子善一條未嘗必主蘇氏但未知二說孰先孰後耳莫若兩存之書經大全卷九
