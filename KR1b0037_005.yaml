body:
  text: 書經大全卷五明胡廣等撰盤庚上盤庚陽甲之弟自祖乙都耿圯於河水盤庚欲遷於殷而大家世族安土重遷胥動浮言小民雖蕩析離居亦惑於利害不適有居盤庚喻以遷都之利不遷之害上中二篇未遷時言下篇既遷後言王氏曰上篇告羣臣中篇告庶民下篇告百官族姓左傳謂盤庚之誥實誥體也三篇今文古文皆有但今文三篇合為一問商書又却較分明朱子曰商書亦只有數篇如此盤庚依舊難曉曰不知怎生地盤庚抵死要恁地遷那都若曰有水患也不曽見大故為害曰他不復更說那事頭只是當時小民被害而大姓之屬安於土而不肯遷故說得如此辛史記盤庚祖乙之曾孫也歷祖乙子祖辛祖子開甲開甲弟祖丁開甲子南庚祖丁子陽甲及盤庚凡七世都耿矣亳殷亳之殷地殷者亳之别名在河南耿在河北告吳氏曰此書說者多言某篇為告臣某篇為民某篇為兼告臣民以余觀之臣民並集之時固不當呼臣與言而使民不與聞又呼民與言而使臣不與聞特以遷都之利反覆開諭事之係乎臣者主臣言之事之係乎民者主民言之君心初無適莫臣民皆欲其盡曉也常林氏曰遷都利害甚明而臣民傲上從康誠情所不堪盤庚諄復懇到曉以利害禍福之理不啻如慈母之與子非優游不斷不能奮其剛決也蓋從容開諭使其曉然中心悅從以共享安利而無絲毫之牽强所以為王者之政也又曰耿地障塞沃饒易以致富富家巨室久居殖貨閭閻細民則苦蕩析離居今遷亳乃小民之利而巨室所不欲故為浮言以搖民情此三篇所由作也盤庚遷于殷民不適有居率籲音喻衆戚出矢言殷在河南偃師適往籲呼矢誓也史臣言盤庚欲遷于殷民不肯往適有居盤庚率呼衆憂之人出誓言以喻之如下文所云也周氏曰商人稱殷自盤庚始自此以前惟稱商自盤庚遷都之後於是殷商兼稱或只稱殷也曰我王來既爰宅于兹重我民無盡子忍反劉不能胥匡以生卜稽曰其如台音怡曰盤庚之言也劉殺也盤庚言我先王祖乙來都于耿固重我民之生非欲盡致之死也民適不幸蕩析離居不能相救以生稽之於卜亦曰此地無若我何言耿不可居決當遷也新安陳氏曰此地蕩析於水既不能相救以生所以卜以稽之而卜遷也謀林氏曰古者將遷國以考之卜如綿詩曰爰始爰爰契我龜曰止曰時築室于兹衛文楚丘之遷亦曰降觀于桑卜云其吉是也先王有服恪克各反謹天命兹猶不常寧不常厥邑于今五邦今不承于古罔知天之斷音短命矧曰其克從先王之烈服事也先王有事恪謹天命不敢違越先王猶不敢常安不常其邑于今五遷厥邦矣今不承先王而遷且不知上天之斷絶我命況謂其能從先王之大烈乎詳此言則先王遷徙亦必有稽卜之事仲丁河亶甲篇逸不可考矣五邦漢孔氏謂湯遷亳仲丁遷囂音敖河亶甲居相去聲祖乙居耿并盤庚遷殷為五邦然以下文今不承于古文勢考之則盤庚之前當自有五遷史記言祖乙遷邢或祖乙兩遷也薛氏曰不遷故罔知天之斷命則遷乃天欲永我命也不遷故不克從先王之烈則遷乃欲紹復先王之業也陳氏經曰命在天而曰恪謹天命天其永命何也古人以當然之理為命而不以或然之數為命勑天之命祈天永命皆自已而言之使盤庚不遷都而苟安于耿民不聊生國將滅亡而歸之命可乎若顛木之有由蘖牙葛反又魚列反天其永我命于兹新邑紹復先王之大業底綏四方顛仆也由古文作㽕木生條也顛木譬耿由蘖譬殷也言今自耿遷殷若已仆之木而復扶又反生也天其將永我國家之命於殷以繼復先王之大業而致安四方乎魏氏曰書言由蘖由字左傳注木再萌牙謂之由故云楚其復由又昭八年今在析木之津猶將復由韻書蘖本作􅤁今作枿枿槁木之餘也馬氏云顛木而肄生曰枿陳氏大猷曰京師為諸夏本國都定則四方安矣承天命復祖業綏四方三者盤庚圖遷之本意故史總述於篇首盤庚斆音效于民由乃在位以常舊服正法度曰無或敢伏小人之攸針王命衆悉至于庭斆教服事針規也耿地潟音昔鹵音魯墊音店隘而有沃饒之利故小民苦於蕩析離居而巨室則總於貨寶惟不利於小民而利於巨室故巨室不悅而胥動浮言小民眩於利害亦相與咨怨間去聲有能審利害之實而欲遷者則又往往為在位者之所排擊阻難不能自達於上盤庚知其然故其教民必自在位始而其所以教在位者亦非作為一切之法一切者權時之事如以刀切物苟取齊整不顧長短縱橫也以整齊之惟舉先王舊常遷都之事以正其法度而已然所以正法度者亦非有他焉惟曰使在位之臣無或敢伏小人之所針規焉耳蓋小民患潟鹵墊隘有欲遷而以言針規其上者汝毋得遏絶而使不得自達也衆者臣民咸在也史氏將述下文盤庚之訓語故先發此陳氏大猷曰遵故事則人情不駭達微辭則人情不壅此遷都之大綱史特先舉之王若曰格汝衆豫告汝訓汝猷黜乃心無傲從康若曰者非盡當時之言大意若此也汝猷黜乃心者謀去上聲汝之私心也無與毋同毋得傲上之命從己之安蓋傲上則不肯遷從康則不能遷二者所當黜之私心也此雖盤庚對衆之辭實為去聲羣臣而發以斆民由在位故也王氏曰凡言若曰或臣述上㫖而代作非其自言或史撮大意刪潤之非其本言命陳氏經曰當謀去其傲上從康之心傲上者違王而不肯從從康者懷久安而不為後日慮當時羣臣所以不遷其病根在此二者故直指其病而戒之陳氏梅叟曰盤庚戒諭羣臣惟汲汲於治其心耳黜乃心再見於首篇永肩一心申嚴於終篇不宣乃心恐迂乃心不暨豫同心有戕在乃心各設中於乃心又條見於中篇至于歷告朕志敷心腹腎腸無非開心諭之也古我先王亦惟圗任如鴆反舊人共政王播告之修不匿厥指王用丕欽罔有逸言民用丕變今汝聒聒起信險膚豫弗知乃所訟逸過也盤庚言先王亦惟謀任舊人共政王播告之修則奉承于內而能不隱匿其指意故王用大敬之宣化于外又無過言以惑衆聽故民用大變今爾在內則伏小人之攸針在外則不和吉言于百姓譊譊尼交反多言凡起信於民者皆險陂去聲膚淺之說我不曉汝所言果何謂也詳此所謂舊人者世臣舊家之人非謂老成人也蓋沮在吕反遷都者皆世臣舊家之人下文人惟求舊一章可見新安陳氏曰民用丕變以前謂先王時世家舊人能使上敬下化如此下文責今世家不能然也非豫自荒兹德惟汝含德不惕豫一人豫若觀火豫亦拙謀作乃逸荒廢也逸過失也盤庚言非我輕易去聲遷徙自荒廢此德惟汝不宣布德意不畏懼於我我視汝情明若觀火我亦拙謀不能制命而成汝過失也新安陳氏曰含德掩晦遮蔽意與不匿厥指正相反不惕一人即傲上也成乃安逸即從康也若網在綱有條而不紊音問若農服田力穡乃亦有秋紊亂也綱舉則目張喻下從上小從大申前無傲之戒勤於田畝則有秋成之望喻今雖遷徙勞苦而有永建乃家之利申前從康之戒汝克黜乃心施實德于民至于婚友丕乃敢大言汝有積德蘇氏曰商之世家大族造言以害遷者欲以苟悅小民為德也故告之曰是何德之有汝曷不去上聲汝私心施實德于民與汝婚姻僚友乎勞而有功此實德也汝能勞而有功則汝乃敢大言曰我有積德曰積德云者亦指世家大族而言申前汝猷黜乃心之戒蕭氏曰言不欲遷者徒為順民之虛名遷則為安民之實德李氏杞曰言不遷似姑息若可以得虛譽然民被水患而不救豈實德乎不林氏曰黜私心而施實德欲其愛人以德而不以遷之姑息為愛也是夏氏曰先王時汝祖父率民以遷今汝又率民遷世有積德及人也陳氏大猷曰不遷則徇人情而患在後雖若愛民實害民也遷則若拂人情而利在後雖若勞民實福民也在位以使民不遷為有德於民故戒之如此此章總告以利下二章分告以害新安陳氏曰前言猷黜乃心此言克黜乃心是前言所謀為之者今真能為之矣所以贊其決也乃不畏戎毒于逺邇惰農自安不昏音敏作勞不服田畝越其罔有黍稷戎大昏强也汝不畏沈溺大害於逺近而憚勞不遷如怠惰之農不强力為勞苦之事不事田畝安有黍稷之可望乎此章再以農喻申言從康之害唐孔氏曰惰農對上服田力穡而反言之曰林氏曰此篇文勢大抵反覆辨論皆相顧成文既若農服田力穡乃亦有秋又曰惰農自安不昏作勞不服田畝越其罔有黍稷既曰豫若觀火又曰若火之燎于原文雖渙散而意則相屬以是知盤庚之言雖信屈聱牙不可遽曉然反覆求之於人情甚近也汝不和吉言于百姓惟汝自生毒乃敗禍姦宄以自災于厥身乃既先惡于民乃奉其恫音通汝悔身何及相去聲時憸思廉反民猶胥顧于針言其發有逸口矧豫制乃短長之命汝曷弗告朕而胥動以浮言恐沈于衆若火之燎盧皎反于原不可嚮音向邇其猶可撲普卜反滅則惟爾衆自作弗靖非豫有咎吉好也先惡為惡之先也奉承恫痛相視也憸民小民也逸口過言也逸口尚可畏況我制爾生殺之命可不畏乎恐謂恐動之以禍患沈謂沈陷之於罪惡不可嚮邇其猶可撲滅者言其勢焰雖盛而殄滅之不難也靖安也咎過也則惟爾衆自為不安非我有過也此章反覆辨論申言傲上之害林氏曰不導民以遷而先不樂遷民亦從之是謂先惡危陳氏大猷曰恫痛不急去之乃奉而養之猶安其利其菑之意既先惡於始又護疾于今後雖悔之身無及矣皆張氏曰毒曰自生禍敗姦宄曰自災言非自外來汝自取之罪也遲任音壬有言曰人惟求舊器非求舊惟新遲任古之賢人蘇氏曰人舊則習器舊則敝當常使舊人用新器也今按盤庚所引其意在人惟求舊一句而所謂求舊者非謂老人但謂求人於世臣舊家云耳詳下文意可見若以舊人為老人又何侮老成人之有張氏曰器惟新者但以證人求舊爾故下文暨乃祖乃父非以器喻新邑也古我先王暨乃祖乃父胥及逸勤豫敢動用非罰世選爾勞豫不掩爾善兹豫大享于先王爾祖其從與去聲享之作福作災豫亦不敢動用非德胥相也敢不敢也非罰非所當罰也世非一世也勞勞于王家也掩蔽也言先王及乃祖乃父相與同其勞逸我豈敢動用非罰以加汝乎世簡爾勞不蔽爾善兹我大享于先王爾祖亦以功而配食於廟先王與爾祖父臨之在上質之在旁作福作災皆簡在先王與爾祖父之心我亦豈敢動用非德以加汝乎孔氏曰古功臣配食於廟及陳氏大猷曰配對也大勳勞之人方得配食非遍有功者此言與享如周禮司勳凡有功者祭于大蒸耳盤庚總告羣臣豈盡皆配享乎孫氏曰前言胥及逸勤則曰乃祖乃父此與享止曰乃祖蓋逸勤不止一人配享則非有功之祖不與也新安陳氏曰此以羣臣世有勳勞當與祖同休戚者感動之乃申言前圖任舊人之意豫告汝于難若射之有志汝無侮老成人無弱孤有幼各長于厥居勉出乃力聽豫一人之作猷難言謀遷徙之難也蓋遷都固非易去聲事而又當時臣民傲上從康不肯遷徙然我志決遷若射者之必於中去聲有不容但已者弱少去聲之也意當時老成孤幼皆有言當遷者故戒其老成者不可侮孤幼者不可少之也爾臣各謀長逺其居勉出汝力以聽我一人遷徙之謀也新安陳氏曰謀遷固難然如射必至於中有志者事竟成則不沮于難矣無有逺邇用罪伐厥死用德彰厥善邦之臧惟汝衆邦之不臧惟豫一人有佚罰用罪猶言為惡用德猶言為善也伐猶誅也言無有逺近親疏凡伐死彰善惟視汝為惡為善如何爾邦之善惟汝衆用德之故邦之不善惟我一人失罰其所當罰也陳氏大猷曰死者刑之重舉重故言死張氏曰不從遷者罪也從遷者善也凡爾衆其惟致告自今至于後日各恭爾事齊乃位度乃口罰及爾身弗可悔致告者使各相告戒也自今以往各敬汝事整齊汝位法度汝言不然罰及汝身不可悔也吕氏曰其惟致告當時所諭惟造在王庭者故欲其轉相告語也口孫氏曰恭爾事則無傲上齊乃位則無從康度乃則無浮言三者盤庚所深戒也委吕氏曰三書反覆折難須於包容處看其德量於曲訓誥處看其恩意於規畫纎悉處看其措置其林氏曰使盤庚驅以刑罰而使之遷誰敢違之今言乃若有所甚畏者蓋得天下有道得其民也得其民者得其心也得其心不過所欲與之聚爾今之遷惟欲聚民所欲而已苟以勢力與臣民較以失人心雖能强之使遷而民心已離矣故寧為優游不忍之辭開諭其心使知吾之本意既不失民之心亦不害吾之遷此盤庚所以為仁也拂陳氏大猷曰世主之懦者惟知徇人事所當為慮人情而輒阻其果者惟知徇己事苟當為遽拂人情而不恤二者皆非也盤庚內不失己外不失人所以為兩全歟盤庚中盤庚作惟涉河以民遷乃話民之弗率誕告用亶其有衆咸造七到反勿䙝音泄在王庭盤庚乃登進厥民作起而將遷之辭殷在河南故涉河誕大亶誠也咸造皆至也勿䙝戒其毋得䙝慢也此史氏之言蘇氏曰民之弗率不以政令齊之而以話言曉之盤庚之仁也吕氏曰已離舊邦未至新邑則王庭蓋道路行宫如周禮掌次是也班次臣在前民在後故升進其民於前而告之曰明聽朕言無荒失朕命荒廢也嗚呼古我前后罔不惟民之承保后胥戚鮮上聲以不浮于天時承敬也蘇氏曰古謂過為浮浮之言勝也后既無不惟民之敬故民亦保后相與憂其憂雖有天時之災鮮不以人力勝之也林氏曰憂民之憂者民亦憂其憂罔不惟民之承憂民之憂也保后胥戚民亦憂其憂也殷降大虐先王不懷厥攸作視民利用遷汝曷弗念我古后之聞承汝俾汝惟喜康共非汝有咎比音備于罰先王以天降大虐不敢安居其所興作視民利當遷而已爾民何不念我以所聞先王之事凡我所以敬汝使汝者惟喜與汝同安爾非為去聲汝有罪比于罰而謫遷汝也臨川吳氏曰先王以天降大害不懷其居之故其所以起而遷者視民所利而用遷也汝民何不思念所聞先后之事我奉承汝者蓋欲使汝共享喜樂安康之利豫若籲音喻懷兹新邑亦惟汝故以丕從厥志我所以招呼懷來于此新邑者亦惟以爾民蕩析離居之故欲承汝俾汝康共以大從爾志也或曰盤庚遷都民咨胥怨而此以為丕從厥志何也蘇氏曰古之所謂從衆者非從其口之所不樂音洛而從其心之所不言而同然者夫音扶趨利而避害捨危而就安民心同然也殷亳之遷實斯民所利特其一時為浮言搖動怨咨不樂使其即安危利害之實而反求其心則固其所大欲者矣臨川吳氏曰民志本欲安其所居所以不肯遷者以苟目前之暫安而不圖他日之久安我所以招呼汝遷者亦惟汝故將以大從爾民欲安之志不遷則舉國無安定之時今豫將試以汝遷安定厥邦汝不憂朕心之攸困乃咸大不宣乃心欽念以忱音誠動豫一人爾惟自鞠自苦若乘平聲舟汝弗濟臭厥載作代反爾忱不屬音燭惟胥以沈不其或稽自怒曷瘳音抽上文言先王惟民之承而民亦保后胥戚今我亦惟汝故安定厥邦而汝乃不憂我心之所困乃皆不宣布腹心欽念以誠感動於我爾徒為此紛紛自取窮苦譬乘舟不以時濟必敗壞其所資今汝從上之誠間去聲斷不屬音燭安能有濟惟相與以及沈溺而已詩曰其何能淑載胥及溺正此意也利害若此爾民而罔或稽察焉是雖怨疾忿怒何損于困苦乎臨川吳氏曰爾民不得安居此我心之憂而至于困者我憂爾民之憂而汝不憂我心之憂乃皆大不宣布其心欽敬思念以誠心動我爾惟苟安坐待水患之至是自取窮苦譬之乘舟者若遲滯不濟必臭敗所載之物從上之心間斷不屬則不能復濟惟相與以及沈溺而已利害若此汝不考察但自怨怒何能瘳乎言無益也汝不謀長以思乃災汝誕勸憂今其有今罔後汝何生在上汝不為長久之謀以思其不遷之災是汝大以憂而自勸也孟子曰安其危而利其災樂音洛其所以亡勸憂之謂也有今猶言有今日也罔後猶言無後日也上天也今其有今罔後是天斷音短棄汝命汝有何生理於天乎下文言迓續乃命于天蓋相首尾之辭臨川吳氏曰上天也今日偷生後日必死何能有生命于天乎今豫命汝一無起穢音畏以自臭恐人倚乃身迂于紆二反乃心爾民當一心以聽上無起穢惡以自臭敗恐浮言之人倚汝之身迂汝之心使汝邪僻而無中正之見也臨川吳氏曰言爾民既從我涉河矣或有二心而遲滯今豫命汝專其一心無再起穢惡間其從上之心以自致臭敗恐人之浮言誑惑偏倚汝之身迂曲汝之心使汝身心顛倒利害昏迷不知遷則將有沈溺之禍豫迓續乃命于天豫豈汝威用奉畜許六反汝衆我之所以遷都者正以迎續汝命于天豫豈以威脅虐業反汝哉用以奉養汝衆而已臨川吳氏曰言我今因水患未至之時而遷是迓續爾命于天而使汝更生也我豈用威驅迫汝以遷乎蓋欲汝得全其生爾豫念我先神后之勞爾先豫丕克羞爾用懷爾然神后先王也羞養也即上文畜養之意言我思念我先神后之勞爾先人我大克羞養爾者用懷念爾故也失于政陳于兹高后丕乃崇降罪疾曰曷虐朕民陳久崇大也耿圯而不遷以病我民是失政而久于此也高后湯也湯必大降罪疾于我曰何為而虐害我民蓋人君不能為去聲民圖安是亦虐之也汝萬民乃不生生暨豫一人猷同心先后丕降與汝罪疾曰曷不暨朕幼孫有比音備故有爽德自上其罰汝汝罔能迪樂生興事則其生也厚是謂生生先后泛言商之先王也幼孫盤庚自稱之辭比同事也爽失也言汝民不能樂音洛生興事與我同心以遷我先后大降罪疾於汝曰汝何不與朕幼小之孫同遷乎故汝有失德自上其罰汝汝無道以自免也古我先后既勞乃祖乃父汝共作我畜民汝有戕音牆則在乃心我先后綏乃祖乃父乃祖乃父乃斷音短棄汝不救乃死既勞乃祖乃父者申言勞爾先也汝共作我畜民者汝皆為我所畜之民也戕害也綏懷來之意謂汝有戕害在汝之心我先后固已知之懷來汝祖汝父汝祖汝父亦斷棄汝不救汝死也兹豫有亂政同位具乃貝音背玉乃祖乃父丕乃告我高后曰作丕刑于朕孫迪高后丕乃崇降弗祥亂治也具多取而兼有之謂言若我治政之臣所與共天位者不以民生為念而務富貝玉者其祖父亦告我成湯作丕刑于其子孫啓成湯丕乃崇降弗祥而不赦也此章先儒皆以為責臣之辭然詳其文勢曰兹豫有亂政同位則亦對民庶責臣之辭非直為去聲羣臣言也按上四章言君有罪民有罪臣有罪我高后與爾民臣祖父一以義斷去聲之無所赦也王氏曰先王設教因俗之善而導之反俗之惡而禁之方盤庚時商俗衰士大夫棄義即利故盤庚以具貝玉為戒此反其俗之惡而禁之者也自成周以上莫不事死如事生事亡如事存故其俗皆嚴鬼神以經考之商俗為甚故盤庚特稱先后與臣民之祖父崇降罪疾為告此因其俗之善而導之者也問盤庚言其先王與其羣臣之祖父若真有物在其上降災降罰與之周旋從事日用之間者竊謂此亦大槩言理之所在質諸鬼神而無疑爾而殷俗尚鬼故以其深信者導之夫豈亦真有一物耶朱子曰鬼神之理聖人蓋難言之謂真有一物固不可謂非真有一物亦不可若未能曉然見得且缺之可也新安陳氏曰神后言神靈在天高后言功德崇高與先后皆指先王之遷都者言之大意言我不率民以遷先王必罪我汝不從上以遷不特先王罪汝汝之祖父亦禍汝矣嗚呼今豫告汝不易音異永敬大恤無胥絶逺又如字汝分猷念以相從各設中于乃心告汝不易即上篇告汝于難之意大恤大憂也今我告汝以遷都之難汝當永敬我之所大憂念者君民一心然後可以有濟苟相絶逺而誠不屬則殆矣分猷者分君之所圖而共圖之分念者分君之所念而共念之相從相與也中者極至之理各以極至之理存于心則知遷徙之議為不可易而不為浮言橫去聲議之所動搖也新安陳氏曰告汝不易一說告汝于難之意一說告汝者一定不易矣永敬我所大憂者汝當以君之心為心中者人心同然之理何待於設正緣羣臣徇于私情之一偏則中之理亡矣汝不當偏為私己計當分汝所謀所念以從上各設中理于心則明見利害自有不偏之準在於胸中不至于偏私矣不設中于心則人必倚汝身迂汝心也乃有不吉不迪顛越不恭暫遇姦宄音軌我乃劓音乂殄滅之無遺育無俾易種之勇反于兹新邑乃有不善不道之人顛隕音尹踰越不恭上命者及暫時所遇為姦為宄劫掠行道者我小則加以劓大則殄滅之無有遺育毋使移其種于此新邑也遷徙道路間關恐姦人乘隙生變故嚴明號令以告敕之往哉生生今豫將試以汝遷永建乃家往哉往新邑也方遷徙之時人懷舊土之念而未見新居之樂音洛故再以生生勉之振起其怠惰而作其趨事也試用也今我將用汝遷永立乃家為子孫無窮之業也新安陳氏曰生生生養不窮之道也末二句應前今豫將試以汝遷安定厥邦前以邦言此以家言互文見意民惟邦本本固邦寧以民家永建而後邦國安定也盤庚下盤庚既遷奠厥攸居乃正厥位綏爰有衆盤庚既遷新邑定其所居正君臣上下之位慰勞去聲臣民遷徙之勞以安有衆之情也此史氏之言曰無戲怠懋建大命曰盤庚之言也大命非常之命也遷國之初臣民上下正當勤勞盡瘁趨事赴功以為國家無窮之計故盤庚以為戲怠戒之以建大命勉之臨川吳氏曰無戲欲其敬事無怠欲其勤事大命兼民命國命而言建命謂命雖在天立之在我使民有以遂其生國有以永其祚也當時傲上從康習於戲怠未遷則以為憚既遷則以為足不復為自勉自立之計故以此戒之新安陳氏曰戲即傲上怠即從康戲怠乃其故習未遷則憚以為難既遷則苟以為足未必不謂不必更勉而自可以永命矣命雖在天建立之在我必懋勉而后能立大命必無戲怠而後能懋勉故首以無戲怠矯其舊習而新其精神也今豫其敷心腹腎腸歷告爾百姓于朕志罔罪爾衆爾無共怒協比讒言豫一人歷盡也百姓畿內民庶百官族姓亦在其中臨川吳氏曰敷心腹腎腸謂無一不布露也臣民雖既遷盤庚猶慮其强從上命非出本心怨怒未忘故明白洞達以釋其疑徒新安陳氏曰朕志下文所言是也意前日浮言之必有唱為事定後有罪責之說者故以此言釋衆疑而絶謗讒也古我先王將多于前功適于山用降我凶德嘉績于朕邦古我先王湯也適于山往于亳也契始居亳其後屢遷成湯欲多于前人之功故復扶又反往居亳按立政三亳鄭氏曰東成臯南轘轅西降谷以亳依山故曰適于山也降下也依山地高水下而無河圯之患故曰用下我凶德嘉績美功也臨川吳氏曰凶德謂民受水患適亳依山自此民獲其吉所以降其凶德又成美功於我邦謂湯由亳而興有天下也王氏炎曰自此至用宏兹賁言所以遷之意以諭臣民也自邦伯師長至篇終既遷之後言欲為之意以望羣臣也此所謂朕志也今我民用蕩析離居罔有定極爾謂朕曷震動萬民以遷今耿為河水圯壞沈溺墊音店隘民用蕩析離居無有定止將陷于凶德而莫之救爾謂我何故震動萬民以遷也肆上帝將復我高祖之德亂越我家朕及篤敬恭承民命用永地于新邑乃上天將復我成湯之德而治及我國家我與一二篤敬之臣敬承明命用長居于此新邑也肆豫沖音充人非廢厥謀弔音的由靈各非敢違卜用宏兹賁沖童弔至由用靈善也宏賁皆大也言我非廢爾衆謀乃至用爾衆謀之善者指當時臣民有審利害之實以為當遷者言也爾衆亦非敢固違我卜亦惟欲宏大此大業爾言爾衆亦非有他意也蓋盤庚于既遷之後申彼此之情釋疑懼之意明吾前日之用謀略彼既往之傲惰委曲忠厚之意藹然於言辭之表大事以定大業以興成湯之澤於是而益永盤庚其賢矣哉張氏曰盤庚非特不廢人謀卜者鬼謀亦不敢違之是人謀鬼謀皆以為當遷新安陳氏曰此篇如多于前功以下朱子本疑之如弔由靈宏兹賁等語實難曉姑依前注觀之可也嗚呼邦伯師長上聲百執事之人尚皆隱哉隱痛也盤庚復歎息言爾諸侯公卿百執事之人庶幾皆有所隱痛於心哉臨川吳氏曰自此至篇終誥臣也新遷之民生理未復諸臣當惻然憫痛愛護封植之豫其懋簡相去聲爾念敬我衆相爾雅曰導也我懋勉簡擇導汝以念敬我之民衆也朕不肩好去聲貨敢恭生生鞠人謀人之保居叙欽肩任敢勇也鞠人謀人未詳或曰鞠養也我不任好賄之人惟勇於敬民以其生生為念使鞠人謀人之保居者吾則叙而用之欽而禮之也臨川吳氏曰言我不任貪人有能敢於恭承民之生生俾貧富各保其居者則任之敬之今我既羞告爾于朕志若否俯久反罔有弗欽羞進也若者如我之意即敢恭生生之謂否者非我之意即不肩好貨之謂二者爾當深念無有不敬我所言也無總于貨寶生生自庸無毋同總聚也庸民功也此則直戒其所不可為勉其所當為也式敷民德永肩一心式敬也敬布為去聲民之德永任一心欲其久而不替也盤庚篇終戒勉之意一節嚴于一節而終以無窮期之盤庚其賢矣哉蘇氏曰民不悅而猶為之先王未之有也祖乙圯於耿盤庚不得不遷然使先王處之則動民而民不懼勞民而民不怨盤庚德之衰也其所以信於民者未至故紛紛如此然民怨誹音匪逆命而盤庚終不怒引咎自責益開衆言反覆音復告諭以口舌代斧鉞忠厚之至此殷之所以不亡而復去聲興也後之君子厲民以自用者皆以盤庚藉口豫不可以不論臨川吳氏曰用敷布其德於民永久守此一心而不變也始終不二之謂一新安陳氏曰前告衆民後告羣臣言庶幾皆有惻隱之仁心哉新遷之民生理未復尤當視之如傷惻隱以愛之我其懋簡相爾爾當念我衆而不忘敬我衆而不忽也好貨之人不能念敬我衆者也我則不肩任之敢于恭以生民生而安養人者能念敬我衆者也我則叙欽之今我既盡告爾以朕之志所順與否敢恭所順者好貨所否者也汝當無不敬我言也敬我之所否而無總貨寶申不肩好貨之戒也敬我之所若而以生生自用申敢恭生生之訓也爾其用敷為民之德而永肩一心焉此篇始曰歷告爾百姓于朕志終曰今我既羞告爾于朕志若否始以朕志告百姓終以朕志告羣臣明示一人之心以通臣民千萬人之心告民以朕志者以釋其疑懼之情告臣以朕志者欲其審好惡之辨前日羣臣唱浮言以惑民者傲上從康其病證也具乃貝玉其病根也今雖已遷而病證猶未退病根猶未除故始曰無戲怠以革傲上從康之病證終曰不肩好貨無總貨寶使除具乃貝玉之病根然後上能敬君命下能仁民生而可以永建國家無窮之基矣說命上說音悅三篇內並同說命記高宗命傅說之言命之曰以下是也猶蔡仲之命微子之命後世命官制詞其原蓋出於此上篇記得說命相去聲下並同之辭中篇記說為相進戒之辭下篇記說論學之辭總謂之命者高宗命說實三篇之綱領故總稱之今文無古文有問傅說版築亦讀書否朱子曰不曾讀書如何有說命三篇之文史記高宗盤庚弟小乙之子也名武丁以夢得說於傅險中遂以傅險姓之號曰傅說王宅憂亮陰音庵三祀既免喪其惟弗言羣臣咸諫于王曰嗚呼知之曰明哲明哲實作則天子惟君萬邦百官承式王言惟作命不言臣下罔攸禀令去聲亮亦作諒陰古作暗按喪服四制高宗諒陰三年鄭氏注云諒古作梁楣音眉謂之梁暗讀如鶉䳺音淳庵之䳺暗謂廬也即倚廬之廬儀禮剪屏柱楣鄭氏謂柱楣所謂梁暗是也宅憂亮陰言宅憂于梁暗也先儒以亮陰為信默不言則於諒陰三年不言為語復音復而不可解矣君薨百官總己聽於冢宰居憂諒陰不言禮之常也高宗喪父小乙惟既免喪而猶弗言羣臣以其過于禮也故咸諫之歎息言有先知之德者謂之明哲明哲實為法于天下今天子君臨萬邦百官皆奉承法令王言則為命不言則臣下無所禀令矣問諒陰以他經考之皆以諒陰為信默惟鄭氏獨以為凶廬天子居凶廬豈合禮制朱子曰所引剪屏柱楣是兩事柱音知主反似是從手不從木也蓋始者户北向用草為屏不剪其餘至是改而西向乃剪其餘草始者無柱與楣簷著於地至是乃施短柱及楣以柱其楣架起其簷令稍高而下可作户也梁暗未詳古定制如何不敢輒為之說但假使不如鄭說亦未見天子不可居廬之法陳氏雅言曰此羣臣進戒高宗之辭知之曰明哲明哲實作則此言有德者之為法于天下也天子惟君萬邦百官承式此言有位者之為法于百官也王言惟作命不言臣下罔攸禀令此言高宗既有明哲之德固可作則於天下又居天子之位宜承式於百官也於是而言則為命奈之何可不言哉上言天子是泛說下言王方是指言高宗王庸作書以誥曰以台正于四方台恐德弗類兹故弗言恭默思道夢帝賚豫良弼其代豫言庸用也高宗用作書告諭羣臣以不言之意言以我表正四方任大責重恐德不類于前人故不敢輕易發言而恭敬淵默以思治道夢帝與我賢輔其將代我言矣蓋高宗恭默思道之心純一不二與天無間去聲故夢寐之間帝賚良弼其念慮所孚精神所格非偶然而得者也朱子曰高宗夢傅說分明有個傅說在那裏高宗却不知所以夢見亦是朕兆先見者如此吾高宗夢傅說據此則是真有箇天帝與高宗對曰賚汝以良弼今人但以主宰說帝謂無形容恐也不得若世間所謂玉皇大帝恐亦不可又曰夢之事只說到感應處高宗夢帝賚良弼必是夢中有帝賚之不得說無此事只是天理亦不得程子曰夢說之事是𫝊說之感高宗高宗感傅說高宗只思得聖賢之人須是聖賢之人方始應其感若𫝊說非聖賢自不相感如今人卜筮蓍在手事在未來吉凶在書策其卒三者必合矣使書䇿之言不合于理則自不驗高宗至誠思得賢相寤寐不忘故兆朕先見于夢如常人夢寤間事有先得者多矣亦何足怪問高宗往求說耶說來入夢耶曰譬懸鏡於此有物必照亦非鏡往照物亦非物來入鏡大抵人心虛靈善不善必先知之張子曰高宗夢傅說先見容貌此是最神天張氏文蔚曰誠心求賢寤寐不忘此心足以合上生賢之心矣高宗之心有以合上天生賢之心上天之心得不應高宗求賢之心陳氏經曰至誠之道可以前知嵩前有董五經隱者也伊川聞其名特往造焉至中途遇之曰君非程先生乎先生欲來信息甚大尹子問于伊川伊川曰靜則自明觀此則高宗夢說之事不誣矣然此不可以常情拘常事論也有高宗有傅說則可君非高宗臣非傅說而效其所為必有以私意用人不合於公論者若漢文以夢得鄧通光武以䜟得王梁豈足憑哉之陳氏雅言曰天之生賢將欲以用世而高宗求賢心能合上天生賢之心賢之處世將欲以得君而高宗求賢之心又能合賢人用世之心乃審厥象俾以形旁求于天下說築𫝊巖之野惟肖審詳也詳所夢之人繪音會畫也其形象旁求于天下旁求者求之非一方也築居也今言所居猶謂之卜築傅巖在虞虢即獲反之間肖似也與所夢之形相似爰立作相王置諸其左右於是立以為相按史記高宗得說與之語果聖人乃舉以為相書不言省文也未接語而遽命相亦無此理置諸左右蓋以冢宰兼師保也荀卿名況著荀子曰學莫便乎近其人置之左右者近其人以學也史臣將記高宗命說之辭先叙事始如此新安陳氏曰王置諸左右蓋不徒相之而必親近之也命之曰朝夕納誨以輔台德此下命說之辭朝夕納誨者無時不進善言也孟子曰人不足與適也政不足與間去聲也惟大人為能格君心之非高宗既相說處上聲之以師傅之職而又命之朝夕納誨以輔台德可謂知所本矣吕氏曰高宗見道明故知頃刻不可無賢人之言新安胡氏曰相業莫大於輔君德高宗命相未及他事而責之以納誨輔德為第一義真知本之論矣蓋其思道精見道明又素學于甘盤而有得故其言如此若金用汝作礪音利若濟巨川用汝作舟楫若嵗大旱用汝作霖雨三日雨為霖高宗托物以喻望說納誨之切三語雖若一意然一節深一節也王氏曰作礪使成器舟楫使濟難霖雨使澤民啓乃心沃朕心啓開也沃灌溉音蓋也啓乃心者開其心而無隱沃朕心者溉我心而厭飫也陳氏大猷曰相業莫要於輔德輔德莫切於格心格心之道非可外求惟以心格心啓開而發之也沃灌而入之也如渴之沃漿神受心領而入之深也新安陳氏曰高宗命說之初已有渴教之意今欲遂沃其渴教之心說果開誠心以進言高宗心心相孚必有如土受水之沃如所謂江海之浸膏澤之潤渙然冰釋怡然理順者矣陳氏雅言曰金而非礪則無以成器此望於說者切矣而猶未也巨川而非舟楫則無以濟險此望于傅說者加切矣而所及猶有限也至大旱而非霖雨則民無以為食望於傅說者至是愈至矣傅說當何如而慰高宗之望哉當啓其心而無隱沃君心而厭飫蓋是時高宗於傅說謂若大旱之望霖雨有渴教之意也必知無不言言無不盡以遂沃其渴教之心沃之一辭有若土壤之焦而受江河之潤欲其漸涵浸漬而入蓋言而不倦而聽之者神領心受而入之深也若藥弗瞑眩音面縣厥疾弗瘳若跣先上聲弗視地厥足用傷方言曰飲藥而毒海岱之間謂之瞑眩瘳愈也弗瞑眩喻臣之言不苦口也弗視地喻我之行無所見也王氏炎曰己之有失非說之苦口不能藥己之不明非說之開導不能行吕氏曰又恐說視己為成德無以扶持之故譬如跣足之人不視地則為物所傷此高宗倚說為兩耳目一時不可無說也陳氏經曰受苦口之言免妄行之害皆有望於說惟暨乃僚罔不同心以匡乃辟俾率先王迪我高后以康兆民匡正率循也先王商先哲王也說既作相總百官則卿士而下皆其僚屬高宗欲傅說暨其僚屬同心正救使循先王之道蹈成湯之迹以安天下之民也陳氏雅言曰相臣之職下統百官上佐天子高宗之於傅說不特望其以己正君而又望其暨百僚同心以正君者誠以君德之進退係乎羣臣之賢否苟小人衆則說雖賢亦無以獨成正君之功故謂之暨乃僚罔不同心者欲其擇羣才以居庶職則道同德合庶能左右輔弼交修不逮以正其君然而正君之道當何如哉亦惟使循先王之道蹈成湯之迹以安天下之民而已夫成湯之創業垂統所以遺後嗣者至矣後世之君莫不遵守之故高宗之命傅說先之以俾率先王而後言迪我高后者與君牙所謂用奉若于先王以對楊文武之光命同也成湯之迹商之先王能迪蹈之故高宗欲傅說使其率先王以迪高后也能使其君率先王以迪高后以康兆民則安民之道盡而匡君之道亦盡嗚呼欽豫時命其惟有終敬我是命其思有終也是命上文所命者新安陳氏曰即相亦惟終之意說復于王曰惟木從繩則正后從諫則聖后克聖臣不命其承疇敢不祗若王之休命答欽豫時命之語木從繩喻后從諫明諫之決不可不受也然高宗當求受言於己不必責進言於臣君果從諫臣雖不命猶且承之況命之如此誰敢不敬順其美命乎新安陳氏曰主聖臣直導人使諫在德不在言君有聖德則有從諫之實雖不命亦諫能為江海何憂百川之不歸君無聖德必無從諫之實雖命之亦不諫如器既滿水將焉入高宗以納誨輔德為命知命相之大本說以從諫克聖復命尤知致君之大本也陳氏雅言曰高宗之命傅說托物以喻其意故傅說之復高宗亦托物以進其辭謂君之從諫而聖猶木之從繩而正也木之生豈生而皆正惟從繩則無不正君之德豈生而皆聖惟從諫則無不聖傅說於此將進其中篇陳戒之辭故先說此以廣其從諫之量從諫者人君作聖之功人臣進言之機也高宗欲資之于人故以納誨責其臣傅說使反求諸己故以從諫之道望其君納誨者相臣之職從諫者人君之道也說命中惟說命總百官說受命總百官冢宰之職也乃進于王曰嗚呼明王奉若天道建邦設都樹后王君公承以大夫師長上聲不惟逸豫惟以亂民后王天子也君公諸侯也治亂曰亂明王奉順天道建邦設都立天子諸侯承以大夫師長制為君臣上下之禮以尊臨卑以下奉上非為一人逸豫之計而已也惟欲以治民焉耳孫氏曰后王君公皆有君道故曰樹大夫師長皆臣道故曰承后王君公皆有大夫師長以承之大夫以下皆各有長故曰師長武夷態氏曰明王奉若天道至惟以亂民至哉斯言正萬世為人君者之龜鑑也桀惟不知此而湯有鳴條之師紂惟不知此而武有孟津之會師曠言于晉侯曰天之愛民甚矣豈其使一人肆於民上以從其淫而棄天地之性為人君者聞斯言可以悚然懼矣是新安陳氏曰說初見高宗上篇所言只及大略至乃詳及為君立政之道始望君從諫自此以下至事神則難乃其進諫之綱領條目也陳氏雅言曰奉若天道孔疏以為象天以設官其說穿鑿不足取集𫝊又無明白訓釋大意謂天生民而不能以自治故立之君君奉天而不能以獨治故任之臣建邦設都立天子諸侯承以大夫師長分地而居之分職而任之者非欲以天下奉一人而使為逸豫之計也惟欲以一人治天下而使之亂民焉耳下文憲天聰明以至事神則難方是詳及為君治民之道惟天聰明惟聖時憲惟臣欽若惟民從乂天之聰明無所不聞無所不見無他公而已矣人君法天之聰明一出於公則臣敬順而民亦從治矣吕氏曰高宗已造明哲之地若火然泉達故說欲廣充高宗之明哲必憲天之聰明而後己也陳氏大猷曰始告以從諫則聖欲其取人為善也此告以惟聖憲天欲其與天合德也取人為善固可成性必與天合德始可以言聖可謂善責難于君矣此新安陳氏曰憲天聰明則君與天一臣民之心均天理自有不容違者此四句因上文而申言之惟口起羞惟甲胄起戎惟衣裳在笥惟干戈省悉并反厥躬王惟戒兹允兹克明乃罔不休言語所以文身也輕出則有起羞之患甲胄所以衛身也輕動則有起戎之憂二者所以為去聲已當慮其患於人也衣裳所以命有德必謹於在笥者戒其有所輕豫音與干戈所以討有罪必嚴於省躬者戒其有所輕動二者所以加人當審其用于己也王惟戒此四者信此而能明焉則政治無不休美矣朱子曰口非欲起羞而出言不當則反足以起羞甲胄本所以禦戎而用謀不當則反足以起戎衣裳在笥易以與人則不可不謹干戈討有罪則因以省躬四句皆是審底意者吕氏曰此憲天聰明之條目也上二事人加於我不可不防下二事我加於人者不可不省四者皆聰明之發用也知羞戎於未起之前知衣裳干戈於在笥省躬之日非聰明之大者乎天王氏炎曰此所戒皆恐其聰明蔽於私欲而不與相似也克明則庶幾於天之聰明矣休陳氏大猷曰信於此能明其所當用乃無不美而無起羞起戎等患矣惟治亂在庶官官不及私昵尼爾反惟其能爵罔及惡德惟其賢庶官治亂之原也庶官得其人則治不得其人則亂王制曰論去聲定而後官之任官而後爵之六卿百執事所謂官也公卿大夫士所謂爵也官以任事故曰能爵以命德故曰賢惟賢惟能所以治也私昵惡德所以亂也按古者公侯伯子男爵之於侯國公卿大夫士爵之於朝廷此言庶官則爵為公卿大夫士也吳氏曰惡德猶凶德也人君當用吉士凶德之人雖有過人之才爵亦不可及也吕氏曰官爵及私惡是蔽於私意非憲天聰明矣聖董氏鼎曰至聰明者莫如天能法天聰明者莫如聖則聰明與天一而臣民莫敢不敬順矣然世之聰明者多明於人而暗於己故必先自治然后可以治人自惟口起羞至乃罔不休聰明之見於修己者也自惟治亂至惟其賢聰明之見於用人者也慮善以動動惟厥時善當乎理也時時措之宜也慮固欲其當乎理然動非其時猶無益也聖人酬酢斯世亦其時而已王氏曰事固有善而非時所宜者善如裘葛之良時如寒暑之時時非葛裘雖善何施惟未動審於慮善將動審於時宜然後事順理而當其可矣不顧可否干時而動非聰明也有其善喪去聲下同厥善矜其能喪厥功自有其善則己不加勉而德虧矣自矜其能則人不效力而功隳矣惟事事乃其有備有備無患惟事其事乃其有備有備故無患也張氏曰修車馬備器械事乎兵事則兵有其備故外侮不能為之憂簡稼器修稼政事乎農事則農有其備故水旱不能為之害所謂事事有備無患者如此無啓寵納侮無恥過作非毋開寵幸而納人之侮毋恥過誤而遂己之非過誤出於偶然作非出於有意新安陳氏曰啓寵納侮即女子小人近之不遜之意過而改之則無過矣恥過而作非則遂非而為惡矣本只無心之過反成有心之惡惟厥攸居政事惟醇居止而安之義安於義理之所止也義理出於勉强則猶二也義理安於自然則一矣一故政事醇而不雜也朱子曰伊尹傅說之言雖為告君而發然人人皆可玩味無不切於己者陳氏雅言曰此篇以憲天聰明為一篇綱領此皆推言其用功之地慮善以動動惟厥時戒其妄動則必至於有失非憲天之聰明也有其善喪厥善矜其能喪厥功戒其自滿則必至於招損非憲天之聰明也惟事事乃其有備有備無患此欲其能思患預防不思患預防則蔽於淺近非憲天之聰明也無啓寵納侮無恥過作非此欲其無溺愛徇己或溺愛徇己則縱於私欲非憲天聰明也於此數者能隨事而致其戒則聰明之用與天為一可謂聖矣然其本則又在於人主之一心能先正其心而安於義理之所止則政之所行醇而不雜自無數者之居矣傅說戒高宗可謂至矣而又必總結之惟厥攸誠以君者政事之根本君心正而事無不正黷音瀆于祭祀時謂弗欽禮煩則亂事神則難祭不欲黷黷則不敬禮不欲煩煩則擾亂皆非所以交鬼神之道也商俗尚鬼高宗或未能脫於流俗事神之禮必有過焉祖己戒其祀無豐昵傅說蓋因其失而正之也陳氏曰黷祀將以為欽不知反所以為不欽黷煩皆以為善而為之而乃陷于不善非禮之禮也事新安陳氏曰事神則難以上皆憲天聰明之事事物物皆有天然至當之理惟聰明者能盡之苟加一毫損益即是私意非天之聰明矣王曰㫖哉說乃言惟服乃不良于言豫罔聞于行㫖美也古人於飲食之美者必以㫖言之蓋有味其言也服行也高宗贊美說之所言謂可服行使汝不善於言則我無所聞而行之也蘇氏曰說之言譬如藥石雖散而不一然一言一藥皆足以治天下之公患所謂古之立言者說拜稽上聲首曰非知之艱行之惟艱王忱不艱允協于先王成德惟說不言有厥咎高宗方味說之所言而說以為得于耳者非難行於身者為難王忱信之亦不為難信可合成湯之成德說於是而猶有所不言則有其罪矣上篇言后克聖臣不命其承所以廣其從諫之量音亮而將告以為治之要也此篇言允協先王成德惟說不言有厥咎所以責其躬行之實將進其為學之說也皆引而不發之義朱子曰南軒曰非知之艱行之惟艱此特傅說告高宗耳蓋高宗舊學甘盤於義理知之亦多故知得這說若常人則須以致知為先也此等議論儘好南軒張氏曰孔子觀上世之化曰大哉知乎雖堯舜之民比屋可封亦能使之由之而已知者聖凡之分也豈可云易乎哉傅說之告高宗高宗蓋知之者恭默思道夢帝賚豫良弼非知之明哲者有此乎故君奭篇言在武丁時則有若甘盤而未及乎傅說蓋發高宗之知者甘盤也說故告之以雖已知之此非艱也貴於身親實履之耳此為己知者言也若高宗未克知之而告之曰知之非艱則說為失言矣西山真氏曰忱誠也使高宗以誠為主何患于行乎陳李氏曰高宗望說以有言而說勸高宗以力行氏經曰未知則知之為難既知則行之為難高宗明哲如此不患不知患行之不力耳知而不行是亦徒知以至誠行之不見其難矣新安陳氏曰說之意以為王能行而說不言則咎在說說已言而王不行則咎在王不在說也上篇復君以從諫此則責君以行言必實見于行而後始不為徒從也又按知對行言古所未發自傅說始發之而後致知力行為萬世學者為學之法程觀南軒復文公說知字如此其重而文公稱賞其說如此則可見矣陳氏雅言曰知之非艱行之惟艱此謂己知者而言王能誠信之行亦非難此謂能行者而言也知行兩盡信可合於成湯之成德矣蓋高宗舊學于甘盤明哲作則恭默思道知之有素矣當其望說以有言而說則勸之以力行知之而不能行則義理雖聞于人而與我猶二也知之而能行則義理斯得於己而與我為一矣說命下碧梧馬氏曰前篇訪以政事故說以政事對此篇訪以學故說以學對王曰來汝說台小子舊學于甘盤既乃遁于荒野入宅于河自河徂亳暨厥終罔顯甘盤臣名君奭言在武丁時則有若甘盤遁退也高宗言我小子舊學于甘盤已而退于荒野後又入居于河自河徂亳遷徙不常歷敘其廢學之因而歎其學終無所顯明也無逸言高宗舊勞于外爰暨小人與此相應國語亦謂武丁入于河自河徂亳唐孔氏曰高宗為王子時其父小乙欲其知民之艱苦故使居民間也蘇氏謂甘盤遁于荒野以台小子語脈推之非是朱子曰豫小子舊學于甘盤既乃遁於荒野東坡解作甘盤遁于荒野據某看只是高宗自言觀上文曰豫小子可見但不知當初高宗因甚遁于荒野不知甘盤是甚樣人是學箇甚麼今亦不敢斷但據文義疑是如此兼無逸云高宗舊勞于外亦與此相應想見高宗三年不言恭默思道未知所發又見世間未有箇人强得甘盤所以思得大賢如𫝊說高宗若非傅說想不能致當日之治傅說若非高宗亦不能有所為故曰惟后非賢不乂惟賢非后不食言必相須也爾惟訓于朕志若作酒醴音禮爾惟麯糵音曲臬若作和羮爾惟鹽梅爾交修豫罔豫棄豫惟克邁乃訓心之所之謂之志邁行也范氏曰酒非麯糵不成羮非鹽梅不和人君雖有美質必得賢人輔導乃能成德作酒者麯多則太苦糵多則太甘麯糵得中然後成酒作羮者鹽過則鹹梅過則酸鹽梅得中然後成羮臣之於君當以柔濟剛可濟否左右規正以成其德故曰爾交修豫爾無我棄我能行爾之言也孔氏曰交者非一之義陳氏大猷曰訓志猶言格心不陳氏經曰中篇說謂患髙宗之能行不患臣之不能言此篇高宗謂患說之不能言不患我之不能行蘇氏曰麯糵鹽梅和而不同也林氏曰交修者剛柔可否相濟以輔豫之不逮也以新安陳氏曰此高宗因說行之惟艱之言而許之能行其言也說曰王人求多聞時惟建事學于古訓乃有獲事不師古以克永世匪說攸聞求多聞者資之人學古訓者反之己古訓者古先聖王之訓載修身治天下之道二典三謨之類是也說稱王而告之曰人求多聞者是惟立事然必學古訓深識義理然後有得不師古訓而能長治久安者非說所聞甚言無此理也林氏曰傅說稱王而告之與禹稱舜曰帝光天之下文勢正同朱子曰而今人只管說治心修身若不見這箇理心是如何地治身是如何地修若如此說資質好便養成箇無能之人資質不好便都執縳不住了傅說曰學于古訓至匪說攸聞蓋聖賢說出道理在裏必學乎此後可以有得經籍古人言學字方自說命始有建吕氏曰學問之博貴有實用非徒為觀美也大而立大經經綸大業彌綸大化至於贊天地化育皆所謂建事也此所謂有用之學否則所聞雖多亦奚以為西山真氏曰大學之道自格物致知推而至於治國平天下蓋致知所以明理理明則見諸行事者舉而措之耳此求多聞建事之意也古者學與事為一故精義所以致用利用所以崇德本末非二致也後世學與事為二故求道者以政事為粗迹任事者以講學為空言不知天下未嘗有無理之事無事之理老莊言理而不及事是有無事之理也管商言事而不及理是有無理之事也深味傅說之言則古先聖王之正𫝊可以識矣王氏曰求多聞而不惟古訓是式則是非無所考正而所聞愈惑矣陳氏雅言曰自此以下乃傅說論學之辭古人言學自傅說君臣始王者傅說稱其君之辭所以起其君之聽也蓋求多聞者建事之本而學古訓者明理之要欲建事而非多聞之求則所知有限固不足以立事既能多聞而非古訓之學則擇而不精亦安保其無失哉此建事者不徒貴於多聞而尤貴於學古也惟學遜志務時敏厥修乃來允懷于兹道積于厥躬遜謙抑也務専力也時敏者無時而不敏也遜其志如有所不能敏于學如有所不及虛已受人勤以勵己則其所修如泉始達源源乎其來矣兹此也篤信而深念乎此其道積於身不可以一二計矣夫修之來來之積其學之得于己者如此朱子曰遜順其志捺下這志入那事中子細低心下意與他理會若高氣不伏以為無緊要不能入細理會得則其修亦不來矣既遜其志又須時敏若似做不做或作或輟亦不濟事須是遜志又務時敏則厥修乃來為學之道只此二端而已又戒以允懷于兹二者則道乃積于厥躬積者來得件數多也李氏曰為學之道常以卑遜自下為心以能問不能以多問寡有若無實若虛遜志之謂也善吕氏曰為學之初先要虛心下氣方能受天下之若氣高則便與為學工夫相背懷陳氏經曰信道不篤則所修雖來亦不堅凝惟允於此篤信不忘則來者積聚不散來如日知其所無積如月無忘其所能也新安陳氏曰驕與怠最害於學驕則志盈善不可入怠則志惰功不可進學不謙卑退遜則無以為入門一於謙退而不務時敏則又不能進步遜則不驕敏則不怠遜而濟以敏厥修所以來也道我所固有非自外來來云者如斯仁至矣之謂也積云者如由有諸己之信而進於充實之美也躬陳氏雅言曰厥修乃來是遜志時敏之效道積厥是允懷於兹之效修之來來之積其功效雖有淺深之不同然合而言之則皆自學之事也惟斆音效學半念終始典于學厥德修罔覺斆教也言教人居學之半蓋道積厥功者體之立斆學于人者用之行兼體用合內外而後聖學可全也始之自學學也終之教人亦學也一念終始常在於學無少間去聲斷則德之所修有不知其然而然者矣或曰受教亦曰斆斆於為學之道半之半須自得此說極為新巧但古人論學語皆平正的實此章句數非一不應平聲中間一語獨爾巧險此蓋後世釋教機權而誤以論聖賢之學也朱子曰惟斆學半蓋己學既成居於人上則須教人自學者學也而教人者亦學也蓋初學得者是半既學而推以教人是斆之功亦半也念終始典于學始之所以學者學也終之所以教人者亦學也自學教人無非是學自始至終日日如此忽不自知其德之修也又曰傅說此段說為學工夫極精密伊尹告太甲者極痛切因說斆學半或舉葛氏解云傅說與王說我教你者只是一半事那一半要你自去行取故謂之終始曰近見喻子才跋某人說命解後亦引此說吕伯恭亦如此說某舊為同安簿時學中一士子作書義如此說見他說得新巧大喜之先說王人求多聞後面說得監于先王成憲其永無愆數語是平正實語不應中間翻空一句如此深險如斆得一半不成那一半棹放冷處教他自得此語全似禪語五通仙人問佛六通如何是那一通那一通便是妙處且如學記引此亦只依古注道西山真氏曰曰終始不曰始終學無止法也上言之積下言德之修以理之共由言之謂之道以理之自得言之謂之德非有二也任氏曰修乃來者可見修罔覺者不可見惟其有可見之功此厥修之進於乃來惟其無可見之迹此德修之妙於罔覺陳氏雅言曰自學學之半也教人亦學之半也能自學而不能教人則是能成己而不能成物能明德而不能新民非學之全也必始之自學念念不忘常在於學終之教人亦念念不忘常在於學則德之所修有不知其然而然者矣此為學之極功也監于先王成憲其永無愆憲法愆過也言德雖造去聲於罔覺而法必監于先王先王成法者子孫之所當守者也孟子言遵先王之法而過者未之有也亦此意張氏曰監先王成憲欲高宗以湯為法也陳氏大猷曰德修罔覺則德盛矣必監先王成憲始能無愆何耶蓋先王之道德法度皆成憲之所在歷萬世而無弊者也佛老之學其凝神坐忘亦幾于德修罔覺者矣惟不知監先王成憲故學其所學而非先王之學德其所德而非先王之德是以流弊不可勝救吕氏曰無愆德之至難也舜德盛矣臯陶惟曰罔愆而已序陳氏經曰自遜志至典學乃學之次監先王成憲乃學之凖的惟說式克欽承旁招俊乂列于庶位式用也言高宗之德苟至於無愆則說用能敬承其意廣求俊乂列于衆職蓋進賢雖大臣之責然高宗之德未至則雖欲進賢有不可得者彭氏曰大臣以己事君不若以天下之賢事君一相得其人則天下之賢兼收並蓄庶位皆得其人陳氏大猷曰君莫大于務學以進德相莫大於為君以求賢觀武夷熊氏曰嘗讀孟子謂湯執中立賢無方者今商書一則曰敷求哲人二則曰旁招俊乂伊尹萊朱巫賢傅說諸大臣非以其親以其賢也主於賢則有德是視故不間親主於親則未必皆賢且妨天下之賢路矣信矣立賢無方為不易之中道陳氏雅言曰為君之道莫大於法祖訓以行其政為相之道莫大于求賢才而任之職然必君德修而后相職舉蓋人君之德苟未至于無愆則惑於聲色而便辟之臣得志惑於貨利而聚斂之臣得志相臣雖欲招俊乂而用之其可得乎故進賢之責雖在於相而用舍之權則在於君君德之修替乃賢才進退之所係此欽承之言必繼於無愆之後而旁招之語特為欽承而發也歟王曰嗚呼說四海之內咸仰朕德時乃風風教也天下皆仰我德是汝之教也股肱惟人良臣惟聖手足備而成人良臣輔而君聖高宗初以舟楫霖雨為喻繼以麯糵鹽梅為喻至此又以股肱惟人為喻其所造益深所望益切矣新安陳氏曰高宗潛默之久一旦舉說而相之風聲所動四海仰德然非輔君作聖則無以慰人君之仰說始告君以從諫則聖惟聖時憲是臣以聖期待其君今高宗語說以良臣惟聖是君亦以聖自期待矣昔先正保衡作我先王乃曰豫弗克俾厥后惟堯舜其心愧恥若撻于市一夫不獲則曰時豫之辜佑我烈祖格于皇天爾尚明保豫罔俾阿衡専美有商先正先世長上聲官之臣保安也保衡猶阿衡作興起也撻于市恥之甚也不獲不得其所也高宗舉伊尹之言謂其自任如此故能輔我成湯功格于皇天爾庶幾明以輔我無使伊尹專美於我商家也傅說以成湯望高宗故曰協于先王成德監于先王成憲高宗以伊尹望傅說故曰罔俾阿衡專美有商陳氏大猷曰尹在畎畝則欲使君為堯舜之君民為堯舜之民其自任之重如此說起版築為相迹與尹同則其自任不可不與尹同時周子曰伊尹恥其君之不及堯舜一夫不獲則曰豫之辜學者當志伊尹之所志西山真氏曰學者口不可一日不誦此言心不可一日不存此念惟后非賢不乂惟賢非后不食其爾克紹乃辟于先王永綏民說拜稽首曰敢對揚天子之休命君非賢臣不與共治賢非其君不與共食言君臣相遇之難如此克者責望必能之辭敢者自信無慊之辭對者對以己揚者揚於衆休命上文高宗所命也至是高宗以成湯自期傅說以伊尹自任君臣相勉勵如此異時高宗為商令王傅說為商賢佐果無愧於成湯伊尹也宜哉朱子曰伊尹告太甲便與傅說告高宗不同伊尹之言諄切懇到蓋太甲資質低不得不然若高宗則無許多病痛所謂黷于祭祀時謂弗欽之類不過此等小事爾陳氏雅言曰高宗言今我而獲說則后得賢矣當與爾共治也說而遇我則賢得后矣當與我共食也以君臣相遇之難而見今日相遇之盛爾其克紹汝君於先王安斯民於永久此以致君澤民之事責其臣也說於是拜稽首以致其敬君之禮而謂之敢對揚天子之休命者此以致君澤民之事任諸己也君臣之相勉勵如此罔俾阿衡專美有商信哉高宗肜日高宗肜音容祭有雊雉之異祖己訓王史氏以為篇亦訓體也不言訓者以既有高宗之訓故只以篇首四字為題今文古文皆有高堂隆曰大戊有桑穀生朝武丁有雊雉升鼎皆因災恐懼側身修行故號曰中宗高宗興也勃焉高宗肜日越有雊勾去聲雉肜祭明日又祭之名殷曰肜周曰繹音亦雊鳴也於肜日有雊雉之異蓋祭禰廟也序言湯廟者非是陳氏曰祭之明日以禮享祀行事之有司助祭之賓客皆與焉然謂之又祭而不謂之享者以尸猶有鬼神之道也祖己曰惟先格王正厥事格正也猶格其非心之格詳下文高宗祀豐于昵昵者禰廟也豐於昵失禮之正故有雊雉之異祖己自言當先格王之非心然後正其所失之事惟天監民以下格王之言王司敬民以下正事之言也蘇氏曰武丁不修人事數祭媚神又豐於親廟儉於逺者敬其父薄其祖此失德之大者故傅說祖己皆先格而正之孔光曰上天聰明苟無其事變不虛生書曰惟先格王正厥事言變異之來起事有不正也王氏曰祖考罔非天嗣祀有典不可豐殺訓之使改所謂正厥事乃訓于王曰惟天監下民典厥義降年有永有不永非天夭上聲民民中絶命典主也義者理之當然行而宜之之謂言天監視下民其禍福豫音與奪惟主義如何爾降年有永有不永者義則永不義則不永非天夭折其民民自以非義而中絶其命也意高宗之祀必有祈年請命之事如漢武帝五畤音止祀之類祖己言永年之道不在禱祠在於所行義與不義而已禱祠非永年之道也言民而不言君者不敢斥也民有不若德不聽罪天既孚命正厥德乃曰其如台不若德不順於德不聽罪不服其罪謂不改過也孚命者以妖孽音臬為符信而譴詰戰反告之也言民不順德不服罪天既以妖孽為符信而譴告之欲其恐懼修省以正德民乃曰孽祥其如我何則天必誅絶之矣祖己意謂高宗當因雊雉以自省不可謂適然而自恕夫音扶數音朔祭豐昵徼福於神不若德也瀆于祭祀傅說嘗以進戒意或吝改不聽罪也雊雉之異是天既孚命正厥德矣其可謂妖孽其如我何耶嗚呼王司敬民罔非天𦙍典祀無豐于昵司主𦙍嗣也王之職主於敬民而已徼福於神非王之事也況祖宗莫非天之嗣主祀其可獨豐於昵廟乎孔氏曰昵近也豐於近廟王馬氏曰昵考也謂禰廟陳氏經曰為雊雉訓而書不及雉本以訓王而辭屢及民末始指王而言辭不迫而意獨至矣吕氏曰災異有二失道之君與天隔絶災異之應常遲賢君與天貫通災異之應常速高宗恭默夢帝精神素與天通又聰明憲天修德又與天合故於祀事略過豐飛雉隨即應之此雖過于厚亦過也精誠積久天既賚之過失微形天遽警之固見天之警君無私亦見天之愛君甚速也黷於祭祀禮煩則亂說已知高宗之偏在此㫖哉惟艱領略警省深矣而此心終難除氣質偏厚者尚難變乃知行之果為艱也此篇為雊雉作而進戒之言不及災異獨指大公之道示之非祖己諷諫不敢直言蓋高宗聰明從諫不待深言也西伯戡黎西伯文王也名昌姓姬氏戡音堪勝也黎國名在上黨壺關之地按史記文王脫羑以九反里殷獄曰羑里一曰地名在河內湯陰縣之囚獻洛西之地紂賜弓矢鈇鉞音夫越使得專征伐為西伯文王既受命黎為不道於是舉兵伐而勝之祖伊知周德日盛既已戡黎紂惡不悛勢必及殷故恐懼奔告于王庶幾王之改之也史録其言以為此篇誥體也今文古文皆有或曰西伯武王也史記嘗載紂使膠鬲觀兵膠鬲問之曰西伯曷為而來則武王亦繼文王為方伯矣朱子曰西伯戡黎便是這箇事難判斷觀戡黎大故逼近紂都了豈有諸侯臣子而敢稱兵於天子之都乎看來文王只是不伐紂耳其他事亦都做了如伐崇戡黎之類若說文王終守臣節何故伐崇侯虎只是後人因孔子以服事殷一句遂委曲回護箇文王說教好看殊不知孔子只是說文王不伐紂耳嘗見雜說云紂殺九侯鄂侯爭之强辨之疾併醢鄂侯西伯聞之竊歎崇侯虎譖之曰西伯欲叛紂怒囚之羑里西伯歎曰父有不慈子不可以不孝君有不明臣不可以不忠豈有君而可叛者乎於是諸侯聞之以西伯能敬上而恤下也遂相率而歸之看來只這般說得平問西伯戡黎舊說西伯多指文王惟陳少南吕伯恭薛季隆以為武王吳才老亦曰乘黎恐是伐紂時事按書序言殷始咎周周人乘黎則殷自此以前未嘗惡周也殷始有惡周之心而周文乘襲戡勝近畿之黎國迫于王都且見征伐此祖伊所以恐而奔告于受曰天既訖我殷命曰恐曰奔告曰訖我殷命則其事勢亦且迫矣恐非文王時事也文王率殷之叛國以事紂而孔子亦稱其三分天下有其二以服事殷為至德所謂有事君之小心者正文王之事孔子所以謂之至德也當時征伐雖或有之未必迫近於畿甸然史記又謂文王伐犬戎伐密須敗耆國耆即黎也音相近文王得專征伐故伐之二說未知孰是曰此等無證據可且缺之殷始咎周周人乘黎祖伊恐奔告于受這事勢便自在住不得若曰奔告于受則商之忠臣義士何嘗一日忘周自是昏迷耳不問孔氏𫝊謂書序是後人𫝊會不足信曰亦必序只經文謂祖伊恐奔告于王曰天子天既訖我殷命則是已交手爭競了紂固無道然亦是武王事勢不相安住不得了仲虺告成湯曰肇我邦于有夏若苖之有莠若粟之有秕小大戰戰罔不懼于非辜則仲虺分明言事勢不容住我不誅彼則彼將圖我矣後人多曲為之說以諱之要之自是避不得臨川吳氏曰黎畿內之國文王三分天下有其二以服事殷決不稱兵于紂之畿內武王嗣為西伯其事殷猶文王也其伐殷在於嗣位十有二年之後蓋天命未絶則為君臣一日命絶乃行天罰此事間不容髮今兵既逼王畿祖伊恐而奔告則震撼甚矣豈得戡黎之後班師而去復就臣位而紂恬不以為意也竊疑戡黎之師當是伐紂之時當時近畿有小國周師先戡黎而遂乘勝以進紂都也西伯既戡黎祖伊恐奔告于王下文無及戡黎之事史氏特標此篇首以見音現祖伊告王之因也祖姓伊名祖己後也奔告自其邑奔走來告紂也曰天子天既訖我殷命格人元龜罔敢知吉非先王不相去聲我後人惟王淫戲用自絶祖伊將言天訖殷命故特呼天子以感動之訖絶也格人猶言至人也格人元龜皆能先知吉凶者言天既已絶我殷命格人元龜皆無敢知其吉者甚言凶禍之必至也非先王在天之靈不佑我後人我後人淫戲用自絶于天耳故天棄我不有康食不虞天性不迪率典康安虞度入聲也典常法也紂自絶于天故天棄殷不有康食饑饉音近荐臻也不虞天性民失常心也不迪率典廢壞常法也新安陳氏曰詩曰自天降康豐年穰穰以豐穰為降康則不有康食為天降饑饉明矣書之言性此第三見蓋謂人所受于天之性為私欲所蔽而不能省察也今我民罔弗欲喪去聲曰天曷不降威大命不摰音至今王其如台大命非常之命摰至也史記云大命胡不至民苦紂虐無不欲殷之亡曰天胡不降威於殷而受大命者何不至乎今王其無如我何言紂不復能君長上聲我也上章言天棄殷此章言民棄殷祖伊之言可謂痛切明著矣王曰嗚呼我生不有命在天紂歎息謂民雖欲亡我我之生獨不有命在天乎祖伊反曰嗚呼乃罪多參在上乃能責命于天紂既無改過之意祖伊退而言曰爾罪衆多參倉含反列在上乃能責其命于天耶吕氏曰責命于天惟與天同德者方可吕氏曰責命于天必大人與天合德如孔子謂天生德于豫天未喪斯文桓魋匡人其如子何是也退臨川吳氏曰前與紂言故稱王此以下祖伊而私言之故稱乃殷之即喪去聲指乃功不無戮于爾邦功事也言殷即喪亡矣指汝所為之事其能免戮于商邦乎蘇氏曰祖伊之諫盡言不諱漢唐中主所不能容者紂雖不改而終不怒祖伊得全則後世人主有不如紂者多矣愚讀是篇而知周德之至也祖伊以西伯戡黎不利於殷故奔告于紂意必及西伯戡黎不利於殷之語而入以告后出以語音御人未嘗有一毫及周者是知周家初無利天下之心其戡黎也義之所當伐也使紂遷善改過則周將終守臣節矣祖伊殷之賢臣也知周之興必不利于殷又知殷之亡初無與音預於周故因戡黎告紂反覆乎天命民情之可畏而略無及周者文武公天下之心於是可見林氏曰即喪言不旋踵而亡也善葉氏曰凡事積而成者皆曰功陳氏經曰善有之功惡有惡之功蓋其惡之成也言王氏十朋曰指乃功與惟府辜功之功同辜功猶罪狀吕氏曰伊反歸于家亦無咎周之辭大凡作事黨友親姻以為是未必是至仇敵亦以為是則是可知矣於此知周之盛德也微子微國名子爵也微子名啓帝乙長子紂之庶母兄也微子痛殷之將亡謀於箕子比干史録其問答之語亦誥體也以篇首有微子二字因以名篇今文古文皆有孔氏曰微圻內國名箕唐孔氏曰鄭𤣥以為微俱在圻內孔雖不言箕亦當在畿內也比干不言封爵或本無爵或有而不言也吕氏曰天下有道君子相與公議於朝各盡致君之道天下無道君子相與私議於家各盡致身之道微子與二師宗室大臣與社稷為存亡當紂之時無所致力不得已謀各行其志以不失其義欲知三仁之心此篇可見無陳氏經曰賢人君子忠孝之心不見於安平事之際每見於悲傷惻怛之時微子若曰父師少師殷其弗或亂正四方我祖底遂陳于上我用沈酗叶句反于酒用亂敗厥德于下父師太師三公箕子也少師孤卿比干也弗或者不能或如此也亂治也言紂無道無望其能治正天下也底致陳列也我祖成湯致功陳列于上而子孫沈酗于酒敗亂其德於下沈酗言我而不言紂者過則歸己猶不忍斥言之也王氏肅曰箕子紂諸父氏家語曰比干紂諸父吕曰其者未定之辭或者非斷然之辭商亡形決矣猶曰商其不或能治正四方乎微子猶兾紂一旦悔悟不謂其果不能也歸釋文以酒為凶曰酗視吕氏曰沈酗紂自為微子之我者蓋以君為體同已過以商家體統言之故總而言我亦不忍斥言紂也如五子之歌曰萬姓仇豫新安陳氏曰敗于下對陳于上而言祖宗在上如彼而子孫在下如此忝厥祖甚矣深歎傷之殷罔不小大好去聲草竊姦宄卿士師師非度凡有辜音孤罪乃罔恆胡登反獲小民方興相為敵讎今殷其淪喪去聲若涉大水其無津涯音崖殷遂喪去聲越至于今殷之人民無小無大皆好草竊姦宄上而卿士亦皆相師非法上下容隱凡有冒法之人無有得其罪者小民無所畏愳强凌弱衆暴寡方起讎怨爭鬬侵奪綱紀蕩然淪喪之形茫無畔岸若涉大水無有津涯殷之喪亡乃至于今日乎微子上陳祖烈下述喪亂哀怨痛切言有盡而意無窮數千載之下猶使人傷感悲憤後世人主觀此亦可深監矣新安陳氏曰有罪罔常獲紂為逋逃主如楚無宇之閽逃入王宫執法者不能得之也越及也曰父師少師我其發出尺類反狂吾家髦遜于荒今爾無指告豫顛隮子細反若之何其基同曰者微子更平聲端之辭也何其語辭言紂發出顛狂暴虐無道我家老成之人皆逃遁于荒野危亡之勢如此今爾無所指示告我以顛隕音尹隮墮之事將若之何哉蓋微子憂危之甚特更端以問救亂之策言我而不言紂者亦上章我用沈酗之義張氏曰微子有去之之意其陳氏經曰老成皆遁留者父師少師耳義鄭氏曰語助辭齊魯之間聲讀如姬記曰何居與此同父師若曰王子天毒降災荒殷邦方興沈酗于酒此下箕子之答也王子微子也自紂言之則紂無道故天降災自天下言之則紂之無道亦天之數箕子歸之天者以見其忠厚敬君之意與小旻詩言旻音民天疾威敷于下土意同方興者言其方興而未艾也此答微子沈酗于酒之語而有甚之之意下同王氏炎曰自此以下箕子以其意剖析微子之言而答之歸新安陳氏曰紂之惡皆原于酒若天所使乃無所咎之辭惟紂之沈酗方興而未艾下民化之無怪其為敵讎亦方興而未艾也乃罔畏畏咈其耉長上聲舊有位人乃罔畏畏者不畏其所當畏也孔子曰君子有三畏畏天命畏大人畏聖人之言咈逆也耉長老成之人也紂惟不畏其所當畏故老成舊有位者紂皆咈逆而棄逐之即武王所謂播棄黎老者此答微子發狂耄遜之語以上文特發問端故此先答之陳氏大猷曰沈酗昏迷故當畏者皆無所畏無所畏則無所不至矣以下諸惡皆無畏所致今殷民乃攘如羊反竊神祗之犧牷音全牲用以容將食無災色純曰犧體完曰牷牛羊豕曰牲犧牷牲祭祀天地之物禮之最重者猶為商民攘竊而去有司用相容隱將而食之且無災禍豈特草竊姦宄而已哉此答微子草竊姦宄之語降監殷民用乂讎斂力念反召敵讎不怠罪合于一多瘠音戚罔詔讎斂若仇敵掊音裒斂之也不怠力行而不息也詔告也下視殷民凡上所用以治之者無非讎斂之事夫音扶上以讎而斂下則下必為敵以讎上下之敵讎實上之讎斂以召之而紂方且召敵讎不怠君臣上下同惡相濟合而為一故民多饑殍而無所告也此答微子小民相為讎敵之語商今其有災我興受其敗商其淪喪我罔為臣僕詔王子出迪我舊云刻子王子弗出我乃顛隮商今其有災我出當其禍敗商若淪喪我斷無臣僕他人之理詔告也告微子以去為道蓋商祀不可無人微子去則可以存商祀也刻害也箕子舊以微子長且賢勸帝乙立之帝乙不從卒立紂紂必忌之是我前日所言適以害子子若不去則禍必不免我商家宗祀始隕墜而無所托矣箕子自言其義決不可去而微子之義決不可不去也此答微子淪喪顛隮之語王氏炎曰微子不去殺身之禍恐不獨在比干尚何其祀之可續乎故曰我乃顛隮陳氏經曰忠臣之於國明知天命之將絶未嘗不勉强扶持之以求萬一之幸未有安坐而視其亡者新安陳氏曰箕子自言我罔為臣僕其後終不臣周不負斯言矣微子本有欲去之意故箕子於此深贊其去之之謀前後文尤相照應自靖人自獻于先王我不顧行遁上文既答微子所言至此則告以彼此去就之義靖安也各安其義之所當盡以自達其志於先王使無愧於神明而已如我則不復顧行遁也按此篇微子謀於箕子比干箕子答如上文而比干獨無所言者得非比干安於義之當死而無復言歟孔子曰殷有三仁焉三仁之行胡孟反雖不同而皆出乎天理之正各得其心之所安故孔子皆許之以仁而所謂自靖者即此也又按左傳去聲楚克許許男面縳銜璧衰絰音催迭輿櫬以見楚子楚子問諸逢伯逢伯曰昔武王克商微子啓如是武王親釋其縛受其璧而祓音弗之焚其櫬禮而命之然則微子適周乃在克商之後而此所謂去者特去其位而逃遁於外耳論去聲微子之去者當詳於是問微子篇曰詔王子出迪我舊云刻子一段於三仁之去就死生未知其所以當留當去當死之切當不可易處蓋嘗因是妄謂微子以宗國將亡不勝其憂愁無聊之心而謀出處於箕子比干故箕子為言我興受其敗不可逃免當與宗國俱為存亡故雖商祀或至淪亡我亦誓不臣屬他人蓋將諫紂紂不聽亦不敢苟全逃死而比干無以言者孔氏所謂心同不復重言是也其後比干果以諫死而箕子乃不死者比干初心豈欲徒死以沽名哉所以諫者庶幾吾言得行而紂改焉耳紂既不改而言益切故紂遂殺之則比干亦不得而逃死耳箕子初心亦豈欲隱晦自存以苟全其生哉亦猶比干之諫兾吾言得行而紂改焉耳紂既不改而囚之偶不死耳紂囚之而不置之死則箕子豈固欲自經於溝瀆而為匹夫之諒哉故因遂佯狂而為奴蓋亦未欲即死庶幾彌縫其失而兾其萬有一之開悟耳蓋諫行而紂改過者二子之本心也諫不行而或死或囚者二子所遇之不同耳使紂而囚比干意比干亦未敢即死也使紂而殺箕子箕子敢求全哉二子易地則皆然耳至於箕子為微子之計則其意豈不以謂吾三人者皆宗國之臣利害休戚事體一同皆當與社稷俱為存亡不可復顧明哲保身之義然而微子國之元子也往者紂未立吾嘗言於帝乙而立子帝乙不從而立紂是以紂卒疑吾兩人故吾舊所云者足以害子子若起諫紂則紂益生疑非惟不從害必先及子而併我危矣死分也不足惜而未有毫髮益於紂而遽死可惜也東萊所謂人先有疑心則雖盡忠與言而未必聽蓋疑心先入而為之主是也故微子不可留但當遁逃而出乃合於道又況我與比干既留諫以事紂則存亡未可知萬一不死固罔為人臣僕此心已堅定則亦不可使成湯以來廟不血食況汝為元子又居危疑之地義當逃去萬有一全宗祀可也此三子者其制行不同各出於至誠惻怛之心無所為而為之故孔子並稱三仁或以此歟朱子曰此說得之史記亦說箕子諫而見囚也延平先生說三仁事云當理而無私心則仁矣今以此語推之三仁之心只欲紂改過而圗存比干之殺身蓋非得已箕子亦偶未見殺耳非有意於為奴也事勢既邇微子自是亦只得全身以存先王之祀皆理不得不然者使其先有殺身强諫之心則亦不得為仁人矣箕子比干都是一樣心箕子偶然不衝著紂之怒不殺他然見比干恁地死若更死諫無益於國徒使人君有殺諫臣之名他處此最難微子去却易比干一向諫死又却索性箕子在半上落下最是難處被他監繫在那裡不免佯狂所以易中特說箕子之明夷可見其難處故曰利艱貞晦其明也內難而能正其志箕子以之他外雖狂心則定也張氏廷堅曰君子之去就死生其志在於天下國家而不在於一身故其死者非沽名生者非懼禍引身以去者非忘君也故微子得奉先之孝比干盡事君之節箕子全愛君之仁微子自獻以其孝箕子比干自獻以其忠然書載箕子微子之言而比干不與焉蓋人臣之義莫易明于死節莫難明于去國而屈辱用晦者尤所難辨也比干以死自誓無足為疑而箕子不免云云者重去就之義也獻張氏曰三仁之志各有所在微子自謀存宗祀以於先王比干自謀死諫以獻于先王箕子自謀佯狂俟紂改過以獻於先王後世以死生為重古人以義理為重後世志慮淺狹故見死惟高節古人智慮廣大故以死為常事或去或死或生初無高下義之所在三人各安之矣生李太白比干廟碑曰昔殷王毒痡公獨死之非捐之難處死之難故不可死而死是輕其生非孝也可死而不死是重其死非忠也周武以三分之業有諸侯之師實其十亂之謀總其一心之衆當公之存也乃戢彼西土及公之喪也乃觀於孟津公存而殷存公喪而殷喪興亡兩繫豈不重歟夫子稱殷有三仁豈無微㫖敢頌之曰存其身存其宗亦仁矣存其名存其祀亦仁矣亡其身圖其國亦仁矣若進死者退生者狂狷之士將奔走之褒生者貶死者宴安之人將殞力焉故同歸諸仁各順其志栁子厚箕子碑曰當其周時未至殷祀未殄比干已死微子已去向使紂惡未稔而自斃武庚念亂以圖存國無其人誰與興理是固人事之或然者也然則先王隱忍而為此其有志於斯乎五峰胡氏曰堯舜與賢三王與嫡所以一民心重天下也然大君人命所係興亡之本聖人有權焉未嘗執一也是以武王雖弟上承文王之命而終不失為君帝乙亦賢君也泥於立嫡而不知紂之足以亡天下也亦不知變之過矣使帝乙而知是道商之卜世猶未可知也為新安陳氏曰我以不去為義之所安微子則以去義之所安也反之吾心而果安則獻之先生而無愧對越先王之心不外乎吾心而已若比干則死其心之所安歟箕子又謂若我則留而不去不復顧慮行遁矣書經大全卷五
