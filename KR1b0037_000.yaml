  text: 欽定四庫全書經部二
  hash: sha256:0cc932f81e16f40609470aaa0474e8369dec60a220254d8de2f21651552b055d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1b0037_WYG_000-1a, image: WYG0063/WYG0063-0185a.png}
body:
  text: 書經大全書類提要臣等謹案書經大全十卷明胡廣等奉敕撰書以蔡沈集𫝊為主自延祐貢舉條格已然然元制猶兼用古注疏故王充耘書義程式得本孔𫝊立義也明太祖親驗天象知蔡𫝊不盡可據因命作書𫝊會選參考古義以糾其失頒行天下是洪武中尚不以蔡𫝊為主其専主蔡𫝊定為功令者則始自是書其說雖不似詩經大全之全鈔劉瑾詩𫝊通釋春秋大全之全鈔汪克寬胡𫝊纂疏而實亦非廣等所自纂故朱彝尊經義考引吳任臣之言曰書𫝊舊為六卷大全分為十卷大㫖本二陳氏二陳氏者一為陳櫟尚書集𫝊纂疏一為陳師凱書蔡𫝊旁通纂疏皆墨守蔡𫝊旁通則于名物度數考證特詳雖回護蔡傳之處在所不免然大致較劉氏說詩汪氏說春秋為有根柢故是書在五經大全中尚為差勝云乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀書說綱領程子曰看書須要見二帝三王之道如二典即求堯所以治民舜所以事君橫渠張氏曰尚書難看蓋難得胸臆如此之大只欲解義則無難也書稱天應如影響其禍福果然否大抵天道不可得而見惟占之於民人所悅則天必悅之所惡則天必惡之只為人心至公也至衆也民雖至愚無知惟於私已然後昏而不明至於事不干礙處則自是公明大抵衆所向者必是理也理則天道存焉故欲知天者占之於人可也朱子曰古史之體可見者書春秋而已春秋編年通紀以見事之先後書則每事别記以具事之首尾意者當時史官既以編年紀事至於事之大者則又採合而别記之若二典所記上下百有餘年而武成金縢諸篇其所紀理或更嵗月或歷數年其間豈無異事蓋必已具於編年之史而今不復見矣聖人千言萬語只是說箇當然之理恐人不曉又筆之於書自書契以來二典三謨伊尹武王箕子周公孔孟都只如此可謂盡矣只就文字間求之句句皆是做得一分便是一分工夫非茫然不可測也但恐人自不子細求索之爾須是量聖人之言是說箇什麼要將何用若只讀過便休何必讀尚書初讀甚難似見於己不相干後來熟讀見堯舜禹湯文武之事皆切於己某嘗患尚書難讀後來先將文義分曉者讀之聱牙者且未讀如二典三謨等篇義理明白句句是實理堯之所以為君舜之所以為臣臯陶稷契伊𫝊輩所言所行最好綢繆玩味體貼向自家身上來其味自别先生問鄭可學尚書如何看曰須要考歷代之變曰世變難看唐虞三代事浩大濶逺何處測度不若求聖人之心如堯則考其所以治民舜則考其所以事君且如湯誓湯曰豫畏上帝不敢不正熟讀豈不見湯之心大抵尚書有不必解者有須著意解者有略須解者有不可解者如仲虺之誥太甲諸篇只是熟讀義理分明何俟於解如洪範則須著意解如典謨諸篇稍雅奧亦須略解若如盤誥諸篇已難解而康誥之屬則己不可解矣問尚書難讀蓋無許大心胸他書亦須大心胸方讀得如何程子只說尚書曰他書却有次第且如大學自格物致知以至平天下有多少節次尚書只合下便大如堯典自克明俊德以親九族至黎民於變時雍展開是多少大分命四時成嵗便見心中包得一箇三百六十五度四分度之一底天方見得恁地若不得一箇大底心胸如何了得學者須是有業次且如讀堯舜典厯象日月星辰律度量衡五樂五禮之類禹貢山川洪範九疇須一一理會令透今人只做得西漢以下工夫無人就堯舜三代原頭處理會來又曰且如做舉業亦須苦心理會文字方可決科讀書若不苦心去求不成業次終不濟事尚書前五篇大概易曉後如甘誓𦙍征伊訓太甲咸有一德說命此皆易曉亦好此是孔氏壁中所藏之書又曰看尚書漸漸覺得曉不得便是有長進若從頭尾解得便是亂道髙宗肜日是最不可曉者西伯戡黎是稍稍不可曉者太甲大故亂道故伊尹之言緊切髙宗稍稍聰明故說命之言細膩又曰讀尚書有一箇法半截曉得半截曉不得曉得底看曉不得底且闕之不可强通强通則穿鑿語德粹云尚書亦有難看者昨日嘗語子上滕請問先生復言大略如昨日之說又云如微子洛誥等篇讀至此且認微子與父師少師哀商之淪喪已將如何其他皆然若其文義知他當時言語如何自有不能曉矣問書當如何看先生曰且看易曉處其他不可曉者不要强說縱說得出恐未必是當時本意近時解書者甚衆往往皆是穿鑿如吕伯恭亦未免此也尚書中盤庚五誥之類實是難曉若要添減字硬說將去儘得然只是穿鑿恐終無益耳書中易曉處直易曉其不可曉處且闕之如盤庚之類非特不可曉便曉得亦要何用如周誥等篇周公不過說周所以合代商之意是他當時說話其間多有不可解者亦且觀其大意所在而已書中不可曉處先儒既如此解且只得從他說但此一段如此訓詁說得通至别一段如此訓詁便說不通不知如何周公不知其人如何其言聱牙難曉如書中周公之言便難讀立政君奭之篇是也最好者惟無逸一書中間用字亦有譸張為幻之語至若周官蔡仲等篇却是官樣文字必出於當時有司潤色之文非純周公語也尚書只是虛心平氣闕其所疑隨力量看教浹洽便自有得力處不須預為計較必求赫赫之功也道夫請先生點尚書以幸後學先生曰某今無工夫道夫曰先生於書既無解若更不點則句讀不分後人承舛聽訛卒不足以見帝王之淵懿曰公豈可如此說安知後來無人道夫再三請之先生曰書亦難點如大誥語句甚長今人却都碎讀了所以曉不得某嘗欲作書說竟不曾成如制度之屬秖以疏文為本若其他未穩處更與挑剔令分明便得尚書頃嘗讀之苦其難而不能竟也注疏程張之外蘇氏說亦有可觀但終是不純粹林少穎說召誥以前亦詳備聞新安有吳才老禆𫝊頗有發明却未曽見試并考之諸家雖或淺近要亦不無小補但在詳擇之耳不可以篇帙浩汗而遽憚其煩也荆公不解洛誥但云其間煞有不可强通處今姑擇其可曉者釋之今人多說荆公穿鑿他却有此好處若後來人解書則又却須要盡解元祐說命無逸講義及朝以道葛子平程泰之吳仁傑數書先附去可便參訂序次當以注疏為先疏節其要者以後只以時世為先後可也西山間有發明經㫖處固當附本文之下其統論即附篇末也記得其數條理會點句及正多方多士兩篇可并考之或問諸家書解誰者最好莫是東坡書為上否曰然東坡書解看得文勢好又筆力過人發明得分外精神問但似失之簡曰也有只消如此解者向在鵝湖見伯恭欲解書云且自後面解起今解至洛誥有印本是也其文甚閙熱某嘗問伯恭書有難通處否伯恭初云亦無甚難通處數日間却云果有難通處今只是强解將去耳書說未有分付處因思向日諭及尚書文義貫通猶是第二義直須見得二帝三王之心而通其所可通毋强通其所難通即此數語便已參到七八分千萬便撥置此來議定綱領早與下手為佳諸說此間亦有之但蘇氏傷於簡林氏傷於繁王氏傷於鑿吕氏傷於巧然其間儘有好處如制度之屬祇以疏文為本若其間有未穩處更與挑剔令分明耳婺源滕氏和叔曰書之大意一中字而已允執厥中書所以始咸中有慶書所以終以此一字讀此一書迎刃而解矣程氏去華曰前輩謂讀書要識聖賢氣象某謂讀尚書亦當識唐虞三代氣象唐虞君臣交相警戒夏商以後則多臣戒君耳禹臯陶戒君警於未然辭亦不費夏商以後則事形而後正救之如太甲髙宗肜日旅獒等篇且反覆詳至不憚辭費矣觀啓與有扈戰于甘野以天子之尊統六師與一强諸侯對敵前此未聞也湯之伐夏自湯誓湯誥外未嘗數桀之惡且有慙德武王伐紂則有泰誓牧誓武成凡五篇歷歷陳布惟恐紂惡不白己心不明略無回護意矣伊尹諫太甲不從而放之前此無是也使無尹之志則去鬻拳無幾然太甲天資力量逺過成王太甲悔悟尹遂可以告歸周公則讒疑交起雖風雷彰德之餘宅中圖大之後不敢去國且切切挽召公以同心輔佐用力何其艱也堯以大物授舜舜以大物授禹此豈細事而天下帖然無異辭盤庚以圯于耿而遷國本欲安利萬民而臣民歡譁至勤三篇訓諭而僅濟然盤庚猶可也周之區處商民自大誥以後畢命以前藥石之飲食之一以為龍蛇一以為赤子更三紀之久君臣共以為國家至大至重之事幸而訖於無虞視堯舜區處苗頑又何甚暇而甚勞也精一執中無俟皇極之煩言欽恤明刑何至吕刑之滕口降是而魯秦二誓見取於經而王迹熄霸圖兆矣世變有隆汙風俗有厚薄固應如此引而伸之觸類而長之讀書者其毋苟乎哉書經大全原序漢孔安國先聖十二世孫曰古者伏羲氏之王去聲天下也始畫八卦乾坎艮震巽離坤兑造書契以代結繩之政由是文籍生焉陸氏曰伏羲風姓以木德王去聲即太皥也書契刻木而書其側以紀事也易繫辭云上古結繩而治後世聖人易之以書契文文字也籍書籍也禓氏易𫝊曰古之天地字也曷由知之由坎離知之偃之為立之為水火若雷風山澤之事亦然故漢書坤字作川八字立而聲畫不可勝窮矣豈待鳥跡哉後世草書天字作即也新安胡氏曰黃帝時始有字則黃帝以前皆無字也今則有之者文籍既生之後而作也伏羲神農黃帝之書謂之三墳言大道也少昊顓頊音專朂高辛唐虞之書謂之五典言常道也至于夏商周之書雖設教不倫雅誥奧義其歸一揆是故歷代寶之以為大訓陸氏曰神農炎帝也姜姓以火德王去聲下並同黃帝軒轅也姬姓以土德王一號有熊氏墳大也少昊金天氏名摰音至己姓黃帝之子以金德王顓頊高陽氏姬姓黃帝之孫以水德王高辛帝嚳音谷也黃帝之曾孫姬姓以木德王唐帝堯也姓伊耆氏帝嚳之子初為唐侯後為天子都陶故號陶唐氏以火德王虞帝舜也姓姚氏國號有虞顓頊六世孫以土德王夏禹有天下之號也以金德王商湯有天下之號也亦號殷以水德王周文王武王有天下之號也以木德王揆度唐入聲也問三皇所說甚多當以何者為是朱子曰無處理會當且依孔安國之說五峯以為天皇地皇人皇而伏羲神農黃帝堯舜為五帝却無顓頊高辛之數要之也不可便如此說又曰只依孔安國之說然五峯以羲農黃唐虞作五帝云據易繫辭當如此要之不必如此黃氏鼎曰周禮外史掌三皇五帝之書左氏亦謂楚左史倚相能讀三墳五典則三皇有書明矣而孔子則云包羲氏始畫八卦上古結繩而治後世聖人易之以書契是包羲以前且未有字安得有書如此則三墳為伏羲神農黃帝之書安國之說近是自伏羲至堯舜八聖人者固皆主宰天下之帝也而以其道之大則羲農黃又謂之三皇其實一也少昊以下為君莫盛於堯舜故書惟取二典堯舜以前立法蓋始於伏羲故易兼言五聖而黃帝亦曰帝皇之與帝初非本有定名而不可通稱也王氏曰君天下之號有三皇言大帝言諦王言公不過以殊徽號而非有所優劣也惟邵子經世乃有皇帝王霸之分然亦以論其世耳朱子曰當且依孔安國斯言盡之矣八卦之說謂之八索音色求其義也九州之志謂之九丘丘聚也言九州所有土地所生風氣所宜皆聚此書也春秋左氏傳曰楚左史倚相去聲能讀三墳五典八索九丘即謂上世帝王遺書也陸氏曰索求也倚相楚靈王時史官也唐孔氏曰丘索不知在何代故直總言帝王先君孔子生於周末覩史籍之煩文懼覽之者不一遂乃定禮樂明舊章刪詩為三百篇約史記而修春秋讚易道以黜八索述職方以除九丘討論墳典斷音煅自唐虞以下訖于周芟音衫夷煩亂剪截浮辭舉其宏綱撮其機要足以垂世立教典謨訓誥誓命之文凡百篇所以恢𢎞至道示人主以軌範也帝王之制坦然明白可舉而行三千之徒並受其義程子曰所謂大道若性與天道之說聖人豈得而去上聲下並同之哉若言陰陽四時七政五行之道亦必至要之理非如後世之繁衍末術也固亦常道聖人所以不去也或者所謂羲農之書乃後人稱述當時之事失其義理如許行為神農之言及陰陽權變醫方稱黃帝之說耳此聖人所以去之也五典既皆常道又去其三蓋上古雖已有文字而制立法度為治有迹得以紀載有史官以識音志其事自堯始耳今按周禮外史掌三皇五帝之書周公所録必非僞妄而春秋時三墳五典八索九丘之書猶有存者若果全備孔子亦不應悉刪去之或其簡編脫落不可通曉或是孔子所見止自唐虞以下不可知耳今亦不必深究其說也問書斷自唐虞以下須是孔子意朱子曰也不可知且如三皇之書言大道有何不可便刪去五帝之書言常道少昊顓頊高辛有何不可便刪去此皆不可曉也典謨之書恐是曾經史官潤色來如周誥等篇恐只是如今榜文曉諭俗人者方言俚語隨地隨時各自不同林少頴嘗曰如今人即日伏惟尊候萬福使古人聞之亦不知是何等說話尚書諸命皆分曉蓋如今制誥是朝廷做底文字諸誥皆難曉蓋是與下民說話後來追録而成之書難曉者只是當時說話自是如此當時人曉得後人乃以為難曉爾若使古人見今人俗語却理會不得也以其間頭緒多若去做文字時說不盡故只宜記其言語而已周書有兩體有極分曉者有極難曉者某恐如盤庚誥多方多士之類是當時召之來而面命之而教告之自是當時一類說話至於旅獒畢命微子之命君陳君牙冏命之屬則是當時修其詞命所以當時百姓都曉得者有今時老師宿儒所不曉也今人之所曉者未必當時之人識其詞義也之問周誥詞語艱澀如何看曰此等是不可曉林擇說艾軒以為方言曰只是古語如此竊意當時風俗恁地說話人便都曉得如這物事喚做甚物事今風俗不喚作這物事便曉他不得如蔡仲之命君牙等篇乃當時與卿大夫語似今翰林所作制誥之文故甚易曉如誥是與民語乃今官司行移曉諭文字有帶時語在其中者今但曉其可曉者其不可曉者則闕之可也唐孔氏曰安國是孔子十一世孫上尊先祖故曰先君孔子周靈王時生敬王時卒故云周末職方即周禮也董氏鼎曰陸氏以六體分正攝蓋以典謨訓誥誓命名篇者為正不以名篇而在六體之類者為攝然古之為書者隨時書事因事成言取辭之達意而已豈如後之作文者求必合體制也孔氏以六體言大槩已舉雖不以六字名篇合其類則是亦正也何以攝為至若唐孔氏以征貢歌範足為十例亦不必從善乎林氏謂讀書在求帝王之心以充修齊治平之道體例安足言哉及秦始皇滅先代典籍焚書坑儒天下學士逃難去聲解散我先人用藏其家書于屋壁秦國名始皇名政并六國齊楚燕趙韓魏為天子自號始皇帝焚詩書在三十四年坑儒在三十五年顔師古曰家語云孔騰字子襄畏秦法峻急藏尚書孝經論語於夫子舊堂壁中而漢記尹敏傳去聲云孔鮒所藏二說不同未知孰是唐孔氏曰秦紀始皇三十四年因置酒於咸陽宫丞相李斯奏請天下敢有藏詩書百家語者悉詣守尉雜燒之有敢偶語詩書者棄市令下三十日不燒黥為城旦制曰可三十五年以方士盧生求仙藥不得以為誹謗諸生連相告引四百六十餘人坑之咸陽又衛宏古文竒字序云秦改古文以為篆𨽻多誹謗者秦患天下不從而召諸生至者皆拜為郎凡七百人又密令冬月種瓜驪山硎谷中溫處瓜實乃使人上書曰冬瓜有實詔天下博士諸生說之人人各異則皆使往視之而為伏機諸生方向論難因發機填以土史記孔子世家云孔子生鯉伯魚鯉生伋子思伋生白子上白生求子家求生箕子京箕生穿子高穿生慎子順為魏相慎生鮒為陳涉博士鮒弟騰子襄為惠帝博士長沙太守騰生中中生武武生延陵及安國安國為武帝博士臨淮太守新安陳氏曰按鮒騰兄弟爾藏書必同謀謂鮒藏可也騰藏亦可也漢室龍興開設學校旁求儒雅以闡大猷濟上聲南伏生年過九十失其本經口以傳授裁二十餘篇以其上古之書謂之尚書百篇之義世莫得聞漢藝文志云尚書經二十九卷注云伏生所授者儒林傳去聲云伏生名勝為秦博士以秦時禁書伏生壁藏之其後大兵起流亡漢定伏生求其書亡數十篇獨得二十九篇即以教於齊魯之間孝文時求能治尚書者天下無有聞伏生治之欲召時伏生年九十餘老不能行於是詔太常使掌故朝錯音措往受之顔師古曰衛宏定古文尚書序云伏生老不能正言言不可曉使其女傳言教錯齊人語多與潁川異錯所不知凡十二三略以其意屬讀而已陸氏曰二十餘篇即馬鄭所注二十九篇是也孔頴達曰泰誓本非伏生所傳武帝之世始出而得行史因以入於伏生所傳之內故云二十九篇也今按此序言伏生失其本經口以傳授漢書乃言初亦壁藏而後亡數十篇其說與此序不同蓋傳聞異辭爾至於篇數亦復不同者伏生本但有堯典臯陶謨禹貢甘誓湯誓盤庚高宗肜日西伯戡黎微子牧誓洪範金縢大誥康誥酒誥梓材召誥洛誥多方多士立政無逸君奭顧命吕刑文侯之命費誓秦誓凡二十八篇今加泰誓一篇故為二十九篇耳其泰誓真僞之說詳見音現本篇此未暇論去聲也問尚書古文今文有優劣否朱子曰孔壁之𫝊漢時人却不𫝊只是司馬遷曾師授如伏生尚書漢世却多傳者朝錯以伏生不曾出其女口授有齊音不可曉者以意屬成此載於史者及觀經傳及孟子引享多儀出自大誥却無差只疑伏生偏記得難底却不記得易底然有一說可論難易古人文字有一般如今人書簡說話雜以方言一時記録者有一般是做出告戒之命者疑盤庚之類是一時告語百姓盤庚勸諭百姓遷都之類是出於記録至於蔡仲之命微子之命冏命之屬或出當時做成底詔誥文字如後世朝廷詞臣所為者又問尚書未有解曰便是有費力處其間用字亦有不可曉處當時為伏生是濟南人朝錯却潁川人止得於其女口授有不曉其言以意屬讀然而傳記所引却與尚書所載又無不同只是孔壁所藏者皆易曉伏生所記者皆難曉如堯典舜典臯陶謨益稷出於伏生便有難曉處如載采采之類大禹謨便易曉如五子之歌𦙍征有甚難記却記不得至如泰誓武成皆易曉只牧誓中便難曉如五步六步之類如大誥康誥夾著微子之命穆王之時冏命君牙易曉到吕刑亦難曉因甚只記得難底却不記得易底便是未易理會唐孔氏曰以其上古之書謂之尚書此文繼伏生之下則知尚字乃伏生之所加也尚訓為上夏氏曰此上代之書為後世所慕尚故曰尚書筆臨川吳氏曰書者史之所記録也從聿從日聿古字以筆畫成文字載之簡冊曰書若諧聲伏羲始畫八卦黃帝時蒼頡始制文字凡通文字能書者謂之史人君左右有史以書其言動堯舜以前世質事簡莫可考詳孔子斷自堯舜以後史所記録定有虞夏商周四代之書至魯共音恭王好去聲治宫室壞音怪下同孔子舊宅以廣其居於壁中得先人所藏古文虞夏商周之書及傳去聲論語孝經皆科斗文字王又升孔子堂聞金石絲竹之音乃不壞宅悉以書還孔氏科斗書廢已久時人無能知者以所聞伏生之書考論去聲文義定其可知者為𨽻古定更音庚以竹簡寫之增多伏生二十五篇伏生又以舜典合音閣下同於堯典益稷合於臯陶謨盤庚三篇合為一康王之誥合於顧命復浮去聲出此篇并序凡五十九篇為四十六卷其餘錯亂磨滅弗可復浮去聲知悉上送官藏之書府以待能者陸氏曰共王漢景帝子名餘傳謂春秋也一云周易十翼非經謂之傳科斗蟲名蝦蟇音瑕麻子書形似之為𨽻古定謂用𨽻書以易古文吳氏曰伏生傳於既耄之時而安國為𨽻古又特定其所可知者而一篇之中一簡之內其不可知者蓋不無矣乃欲以是盡求作書之本意與夫音扶本末先後之義其亦可謂難矣而安國所增多之書今篇目具在皆文從字順非若伏生之書詰曲聱牙至有不可讀者夫四代之書作者不一乃至二人之手而遂定為二體乎其亦難言矣二十五篇者謂大禹謨五子之歌𦙍音孕征仲虺音毁之誥湯誥伊訓太甲三篇咸有一德說音悅命三篇泰誓三篇武成旅獒音敖微子之命蔡仲之命周官君陳畢命君牙冏音炯命也復浮去聲出者舜典益稷盤庚三篇康王之誥凡五篇又百篇之序自為一篇凡五十九篇即今所行五十八篇而以序冠去聲篇首者也為四十六卷者孔疏以為同序者同卷異序者異卷同序者大甲盤庚說命泰誓皆三篇共序凡十二篇只四卷又大禹臯陶謨益稷康誥酒誥梓材亦各三篇共序凡六篇只二卷外四十篇篇各有序凡四十卷通共序者六卷故為四十六卷也其餘錯亂摩滅者汩音骨作九共音恭九篇槀飫帝嚳釐沃音屋湯征汝鳩汝方夏社疑至臣扈典寶明居肆命徂后沃丁咸乂四篇伊陟原命仲丁河亶甲祖乙高宗之訓分器旅巢命歸禾嘉禾成王政將蒲姑賄肅慎之命亳姑凡四十二篇今亡朱子曰書有古文有今文今文乃伏生口傳古文乃壁中之書大禹謨說命高宗肜日西伯戡黎泰誓等篇凡易讀者皆古文況又是科斗書以伏生書字文考之方讀得豈有數百年壁中之物安得不訛損一字又却是伏生記得者難讀此尤可疑今人作全書解必不是唐孔氏曰凡書非經則謂之傳言及傳論語孝經正謂孝經論語是傳也漢武帝謂東方朔云傳曰時然後言人不厭其言又漢東平王雲與其太師策書云傳曰陳力就列不能者止又成帝賜翟方進策書云傳曰高而不危所以長守貴也是漢書通謂孝經論語為傳也聞金石絲竹之音懼其神異乃止不敢壞宅或曰孔子子孫雖遭壞宅而不廢禮樂之常如漢兵欲屠魯而猶聞絃誦聲共王所以有感而不壞宅也承詔為五十九篇作傳去聲於是遂研音年精覃音談思去聲博考經籍採托音隻羣言以立訓傳去聲約文申義敷暢厥㫖庶幾平聲有補於將來書序序所以為作者之意昭然義見音現宜相附近故引之各冠去聲其篇首定五十八篇詳此章雖說書序序所以為作者之意而未嘗以為孔子所作至劉歆班固始以為孔子所作既畢會國有巫蠱事經籍道息用不復浮去聲以聞傳之子孫以貽音移後代若好去聲古博雅君子與我同志亦所不隱也陸氏曰漢武帝末征和中江充造蠱敗戾太子今按安國此序不類西京文字疑或後人所託然無據未敢必也以其本末頗詳故備載之讀者宜考焉朱子曰書序恐不是安國做漢文粗枝大葉今書序細膩只是六朝時文字小序斷不是孔子做又曰只是魏晉人文字陳同父亦如此說尚書孔安國注某疑決非孔安國所注蓋文字圓善不是西漢人文章安國漢武帝時文章豈如此但有太粗處決不如此圓善也亦非後漢文因說書云某常疑孔安國書是假書比毛公傳如此高簡大段爭事漢儒訓釋文字多是如此有疑則闕今此却盡釋之豈有千百年前人說底話收拾於灰燼屋壁中與口傳之餘更無一字訛舛理會不得如此可疑也兼小序皆可疑堯典一篇自說堯一代為治之次序至讓于舜方止今却說是讓于舜後方作舜典亦是見一代政事之終始却說歷試諸艱是為要受讓時作也至後諸篇皆然況他先漢文章重厚有力量他今大序格致極輕却疑是晉宋間文章況孔書至東晉間方出前此諸儒皆不曾見可疑之甚小序決非孔門之舊安國序亦決非西漢文章向來語人人多不解惟陳同父聞之不疑要是渠識得文字體製意度耳又曰書序不可信伏生時無之符唐孔氏曰蠱者怪惑之名指體則藥毒害人與行厭俗為魅令人蠱惑夭年傷性者皆是也以蠱皆巫之所為故曰巫蠱所元城劉氏曰今之書乃漢所謂尚書若復求孔子定之書今不見矣漢承秦火之後諸儒各以所學談經或得或失然各自名家自濟南伏生以降不獨一人就其中取之獨孔安國古文尚書尤勝諸家則今尚書是也林氏曰孔𫝊成遭巫蠱而不出杜預注左傳韋昭注國語趙岐注孟子凡所舉書出二十五篇中皆指為逸書實未嘗逸也賈馬鄭服亦皆不見古文尚書至晉齊間其書漸出及隋開皇二年求遺書得舜典然後五十八篇方備孔子書始出皆用𨽻書至唐天寶三載詔衛衡改古文從今文今之所傳乃唐天寶所定本也董氏鼎曰世傳古文尚書吕汲公跋謂天寶前本字多竒古與蔡𫝊及諸書所引皆合漢書藝文志云書者古之號令去聲號令於衆其言不立具則聽受施行者弗曉古文讀應爾雅故解古今語而可知也括蒼葉夢得曰尚書文皆竒澀非作文者故欲如此蓋當時語自爾也今按此說是也大抵書文訓誥多艱澀而誓命多平易音異蓋訓誥皆是記録當時號令於衆之本語故其間多有方言及古語在當時則人所共曉而於今世反為所難知誓命則是當時史官所撰櫽括潤色粗有體製故在今日亦不難曉耳孔頴達曰孔君作傳去聲值巫蠱不行以終前漢諸儒知孔本五十八篇不見孔傳去聲遂有張霸之徒僞作舜典汨作九共九篇大禹謨益稷五子之歌𦙍征湯誥咸有一德典寶伊訓肆命原命武成旅獒冏命二十四篇除九共九篇共卷為十六卷蓋亦略見百篇之序故以伏生二十八篇者復出舜典益稷盤庚二篇康王之誥及泰誓共為三十四篇而僞作此二十四篇十六卷附以求合於孔氏之五十八篇四十六卷之數也劉向班固劉歆賈逵馬融鄭𤣥之徒皆不見真古文而誤以此為古文之書服䖍杜預亦不之見至晉王肅始似竊見而晉書又云鄭沖以古文授蘇愈愈授梁栁栁之內兄皇甫謐又從栁得之而栁又以授臧曹曹始授梅賾音色賾乃於前晉奏上其書而施行焉漢書所引泰誓云誣神者殃及三世又云立功立事惟以永年疑即武帝之世所得者律厯志所引伊訓畢命字畫有與古文略同者疑伏生口傳而朝錯所屬音祝讀者其引武成則伏生無此篇必張霸所僞作者也碧梧馬氏曰按孔傳所言則古文書其經已送之王官藏之中祕其傳則遭巫蠱而不復上聞藏之私家者也以其未立於學官是以經伏而傳不行於世耳是則所謂古文書豈惟未嘗逸蓋亦未嘗不在王官也劉歆移太常書所謂藏於祕府伏而未發者是也中祕書非世儒所得見宜乎後之引古文書者皆不得其真若杜韋趙注諸書所引皆指為逸書也如是幾七百年而後𫝊斯文之興喪可畏哉臨川吳氏曰書二十五篇晉梅賾所奏上者所謂古文書也書有今文古文之異何哉朝錯所受伏生書以𨽻寫之𨽻者當世通行之字也故曰今文魯共王壞孔子宅得壁中所藏皆科斗書科斗者蒼頡所製之字也故曰古文然孔壁真古文書不傳後有張霸僞作舜典汨作九共九篇大禹謨益稷五子之歌𦙍征湯誥咸有一德典寶伊訓肆命原命武成旅獒冏命二十四篇目為古文書漢藝文志云尚書經二十九篇古經十六卷二十九篇者即伏生今文書二十八篇及武帝時增僞泰誓一篇也古經十六卷者即張霸僞古文書二十四篇也漢儒所治不過伏生書及僞泰誓共二十九篇爾張霸僞古文雖在而辭義蕪鄙不足取重於世以售其欺今梅賾二十五篇之書出則凡傳記所引書語注家指為逸書者收拾無遺既有證驗而其言率依於禮比張霸僞書遼絶矣析伏氏書二十八篇為三十三雜以新出之書通為五十八篇并書序一篇凡五十九有孔安國傳及序世遂以為真孔壁所藏也唐初諸儒從而為之疏義自是漢世大小夏侯歐陽氏所傳尚書止有二十九篇者廢不復行惟此孔傳五十八篇孤行於世伏氏書既與梅賾所增混淆誰復能辨竊嘗讀之伏氏書雖不盡通然辭義古奧其為上古之書無疑梅賾所增二十五篇辭製如出一手采集補綴雖無一字無所本而平緩卑弱殊不類先漢以前之文夫千年古書最晚乃出而字畫略無脫誤文勢略無齟齬不亦大可疑乎吳才老曰增多之書皆文從字順非若伏生之書詰曲聱牙夫四代之書作者不一乃至二人之手而定為二體其亦難言矣朱仲晦曰書凡易讀者皆古文豈有數百年壁中之物不訛損一字又曰伏生所傳皆難讀如何伏生偏記其所難而易者全不能記也又曰孔書至東晉方出前此諸儒皆未見可疑之甚又曰書序伏生時無之其文甚弱亦不是前漢人文字只似後漢末人又曰小序決非孔門之舊安國序亦非西漢文章又曰先漢文字重厚今大序格致極輕又曰尚書孔安國傳是魏晉間人作托孔安國為名耳又曰孔傳并序皆不類西漢文字氣象與孔叢子同是一手僞書蓋其言多相表裏而訓詁亦多出小爾雅也夫以吳氏及朱子之所疑者如此顧澄何敢質斯疑而斷斷然不敢信此二十五篇之為古書則是非之心不可得而昧也今按漢儒以伏生之書為今文而謂安國之書為古文以今考之則今文多艱澀而古文反平易音異或者以為今文自伏生女子口授朝錯時失之則先秦古書所引之文皆已如此恐其未必然也或者以為記録之實語難工而潤色之雅詞易好故訓誥誓命有難易音異之不同此為近之然伏生背音佩文暗誦乃偏得其所難而安國考定于科斗古書錯亂磨滅之餘反專得其所易音異則又有不可曉者至於諸序之文或頗與經不合而安國之序又絶不類西京文字亦皆可疑獨諸序之本不先經則賴安國之序而見故今定此本一以諸篇本文為經而復浮去聲合序篇於後使覽者得見聖經之舊而又集傳去聲其所可知姑闕其所不可知者云董氏鼎曰帝王之書歷代所寶天下家傳人誦之人生八嵗入小學教之以詩書六藝之文即此書也蓋自孔子以前則然矣孔子初志本期道行於天下亦未肯止於刪詩定書而已及既老而道不行然後始及於此所以斷自唐虞訖于周者蓋以前乎五帝為三皇世尚洪荒非後世所可考後乎三王為五伯習尚權譎又非聖人所忍為故為自唐訖周而百篇之書定自是誦習者簡要而不繁舉行者中正而無弊此夫子之意也若夫一書之中其於明德新民之綱修齊治平之目即堯典已盡其要而危微精一四言所以開知行之端主善協一四言所以示博約之義務學則說命其入道之門為治則洪範其經世之要也他如齊天運則有羲和之厯定地理則有禹貢之篇正官僚則有周官之制度修己任人則有無逸立政諸書煨燼壞爛之餘百篇僅存其半而宏綱實用尚如此故嘗謂六經莫古於書易雖始於伏羲然有卦未有辭辭始於文王耳六經莫備於書五經各主一事而作耳易主卜筮即洪範之稽疑也禮主節文即虞書之五禮也詩主詠歌即后夔之樂教也周禮設官即周官六卿率屬之事也春秋褒貶即臯陶命德討罪之權也五經各主帝王政事之一端書則備記帝王之全體修齊治平之規模事業盡在此書學者其可不盡心焉欽定四庫全書書經大全圖說唐虞夏商周譜系圖春分日在昴初昏仲春鶉鳥正七宿之中星紀夏至日在星初昏仲夏大火正七宿之中星火秋分日在房初昏仲秋星虛正七宿之中星虛冬至日在虛初昏仲冬星昴正七宿之中星昴鄭氏云二十八宿環列于四方隨天而西轉東方七宿自角至箕是為蒼龍以次舍而言則房心為大火之中南方七宿自井至軫是為鶉鳥以形而言則有朱鳥之象虛者北方七宿之中星也昴者西方七宿之中星也星本不移附天而移天傾西北極居天之中二十八宿半隱半見各以其時所以必於南方而考之仲春之月星火在東星鳥在南星昴在西星虛在北至仲夏則鳥轉而西火轉而南虛轉而東昴轉而北仲秋則火轉而西虛轉而南昴轉而東鳥轉而北至仲冬則虛轉而西昴轉而南鳥轉而東火轉而北來嵗仲春鳥復轉而南矣循環無窮此堯典考中星以正四時甚簡而明異乎吕令之星舉月本也然聖人南面視四星之中豈徒然哉凡以授民時秩民事而已按律歷諸書與周髀皆云日行一度月行十三度十九分度之七周天三百六十五度四分度之一故日一周天為嵗嵗十二月而無整數故以閏月定四時三嵗一閏五嵗再閏及十九年而餘一百九十日一萬五千七百十三分以日法除之共得二百六日六百七十三分為七閏之數是謂一章然必以十九嵗而無餘分者蓋天數終於九地數終於十十九者天地二終之數積八十一章則其盈虛之餘盡而復始推此以定四時嵗功其有不成乎詳見蔡傳漢天文志曰木仁也火禮也土信也金義也水智也金星與日同南北之行為贏與日分南北之次為縮出早為月食出晚為天妖主兵象也木星所在國不可伐而可以伐人超舍為贏退舍為縮出入不當其次必有天祅水星出早為日食出晚為彗四時不出則天下大饑出於房間主地動也火行一舍二舍為不祥東行疾則兵聚於東方西行疾則兵聚于西方填星失次而上一舍三舍則為大水失次而下二舍有后戚五緯之變其詳見於漢晉志孔氏曰五行之時如四時也言撫順五行之時則衆功皆成禮運曰播五行於四時蓋四時者氣也五行者象也四時各分九十二日八十分之二十五為一時之正而五行則以木配春以火配夏以金配秋以水配冬而土則分王於四時每季一十八日有竒胡氏旦曰五行在地為物在天為時順其時而撫之故仲春斬陽木仲夏斬隂木所以撫木辰季春出火季秋納火所以撫火辰司空相阪隰以撫土辰秋為徒杠春達溝渠以撫水辰又春德在木布德施惠順木辰也餘倣此武成旁死魄哉生明既生魄康誥哉生魄召誥既望丙午朏顧命哉生明畢命庚午朏日有中道月有九行說見洪範本𫝊合以陽歷隂歷之說推之凡月行所交以黃道內為隂歷外為陽歷冬入隂歷月行青道冬至夏至後青道半交在春分之宿當黃道東立冬立夏後青道半交在立春之宿當黃道東南至所衝之宿亦如之冬入陽歷夏入隂歷月行白道冬至夏至後白道半交在秋分之宿當黃道西立冬立夏後白道半交在立秋之宿當黃道西北至所衝之宿亦如之春入陽歷秋入隂歷月行朱道春分秋分後朱道半交在夏至之宿當黃道南立春立秋後朱道半交在立夏之宿當黃道西南至所衝之宿亦如之春入陽歷秋入隂歷月行黑道春分秋分後黑道半交在冬至之宿當黃道北立春立秋後黑道半交在立冬之宿當黃道東北至所衝之宿亦如之四序離為八節至隂陽之所交皆與黃道相㑹故月行有九道所謂日月之行則有冬有夏也孔安國云河圗者伏羲氏王天下龍馬出河遂則其文以畫八卦洛書者禹治水時神龜負文而列於背有數至九禹遂因而第之以成九類劉歆云虙犧氏繼天而王受河圗而畫之八卦是也禹治洪水賜洛書法而陳之九疇是也河圗洛書相為經緯八卦九章相為表裏關子明云河圗之文七前六後八左九右洛書之文九前一後三左七右四前左二前右八後左六後右邵子曰圎者星也星紀之數其肇於此乎方者土也畫州井地之法其放於此乎蓋圎者河圗之數方者洛書之文故羲文因之而造易禹箕敘之而作範也一合九而為十二合八而為十三合七而為十四合六而為十此洛書以虛數相合而為四十者也若九疇則以實數相合而為五十矣右五疇象天圎而有變右四疇象地方而無變箕子洪範九疇之圗大衍之數五十者一與九為十二與八為十三與七為十四與六為十五與五為十共五十也其用四十有九者一用五行其數五二用五事其數五三用八政其數八四用五紀其數五五用皇極其數一六用三德其數三七用稽疑其數七八用庶徴其數五九用五福六極其數共十有一積算至五十也又曰一而曰極大衍所虛之太極也虞書律度量衡之圗漢志云虞之律度量衡所以齊逺近立民信也數者一十百千萬也算法用竹徑十分長六寸二百七十一枚而成六觚為一握所以為算法之用也以之度圎取方則積一分而為一寸積一寸而為一尺方其尺而計之有百寸方尺之外謂之羃而不足於四角之庣也是以制為之度則度長短者不失毫釐量多少者不失圭撮權輕重者不失黍絫是為三平之法也度始於黃鍾之長以秬黍中者一黍之廣度之九十分黃鍾之長一為一分十分為寸十寸為尺十尺為丈十丈為引而五度審矣量起於黃鍾之籥其容秬黍中者千二百實籥中以井水準其槩十籥為合十合為升十升為斗十斗為斛斛之為制上為斛下為斗左耳為升右耳為合籥附于右合之下衡起於黃鍾之重一籥之黍重十二銖積二十四銖而為一兩十六兩為斤而有三百八十四銖三十斤而為鈞一月之數也萬有一千五百二十銖所以當萬物之數四鈞為石重百二十斤象十二月也按禮公桓圭九寸侯信圭伯躬圭各七寸子穀璧男蒲璧各五寸後鄭云雙植之謂桓陳祥道謂強立不撓以安上為任也信伸也注作身與躬同皆象人形有瑑飾陸佃云信圭直躬圭屈取詘直之義為人形誤矣穀有養人之義蒲有安人之義子男之璧象之雜記云公圭博三寸厚半寸剡上左右各寸半其下方璧注云肉倍於好其形圜其中虛言其質曰玉言其符合曰瑞言其象而為用曰器子男不用圭者言未成國也三帛孔安國謂諸侯世子執纁公之孤執𤣥附庸之君執黃陳祥道云雖無經見然天子巡狩卿大夫士皆贄見於方嶽之下則附庸之亦有贄孔氏之說蓋有所受之也古者制幣其長丈八尺其束十端或素或𤣥纁其色不同羔取其羣而不黨雁取其候時而行雉取其守介不犯卿大夫士實似之𫝊曰男贄大者玉帛小者禽鳥此大小所以異等云虞書樂器之圗黼扆司几筵凡大朝覲大饗射凡封國命諸侯王位設黼依音扆注斧謂之黼其繡白黑文以絡帛為質依其制如屏風賈釋云諸文多作斧字若據采色而言即繢人職白與黑謂之黼若據繡於物上即為金斧之文近刃白近銎曲恭切黑則曰斧取金斧斷割之義屏風之名出於漢世故引為况舊圗云從廣八尺畫斧無柄設而不用之義圭瓚玉人云祼圭尺有二寸有瓚以祀廟後鄭云祼謂以圭瓚酌鬱鬯以獻尸也瓚如盤大五升口徑八寸深二寸詩箋以圭為柄黃金為勺青金為外朱中央凡圭博三寸典瑞注云漢禮瓚下有盤聶崇義云宜用黃金青金為外朱中央宜深一寸足徑八寸髙二寸彝書序曰班宗彝疏謂周禮有司尊彝之官鄭云彝亦尊彝鬱鬯曰彝彝法也言為尊之法正卣中尊尊有三品上曰彝中曰卣下曰罍三禮圗卣謂獻素何切象之屬受五斗今案獻象二尊皆有畫飾惟此尊未詳何飾但圗其形耳麻冕按三禮圖以漆布為殼緇縱其上前廣四寸髙五寸後廣四寸髙三寸冕漢制度云冕制皆長尺六寸廣八寸前圎後方其旒皆以五采絲繩貫五采玉每旒各十二垂於冕禮有六冕裘冕無旒袞冕十二旒鷩冕九旒毳冕七旒絺冕五旒𤣥冕三旒雀辨唐孔氏云韋辨也鄭云冕之次也其色赤而微黑如爵頭然用三十升布為之亦長尺六寸廣八寸前圓後方無旒而前後平綦辨孔𫝊綦文鹿子皮辨士冠禮注云皮辨以白鹿皮為之辨師云王之皮辨㑹五采玉琪象邸玉笲注云㑹縫中也琪讀為綦綦結也邸謂下柢梁正張諡圗云辨縫十二賈疏引詩㑹辨如星謂於辨十二縫中結五采玉落落而處狀似星也介圭𫝊曰大圭也唐孔氏云考工記玉人云鎮圭尺有二寸天子守之鎮圭圭之大者介訓大者故知是彼鎮圭非三尺大圭璋禮書云半圭曰璋琬琰周禮典瑞琬圭以治德琰圭以易行考工記琬琰皆九寸鄭𤣥云大琬大琰皆度尺二寸九瑁方四寸邪刻之以冒諸侯之圭璧以齊瑞信也豆三禮舊圗云豆髙尺二寸漆赤中大夫以上畫赤雲氣諸侯飾以象天子加玉飾皆謂飾口足也又鄭注周禮及禮記云豆以木為之受四升口圎徑尺二寸有蓋盛昌本脾臄胉析之韲醓螺兔雁之醢韭菁芹筍之葅麋臡之屬鄭注鄉射記云豆宜濡物籩宜乾物故也籩三禮圗云以竹為之口有縢緣形制如豆受四升盛棗栗桃梅菱芡脯修膴絶糗餌之屬笥說文飯及衣之器曲記注云圎曰簞方曰笥玉几阮氏圗几長五尺髙尺二寸廣二尺兩端赤中央黑漆馬融以為長三尺按司几筵掌五几左右玉雕彤漆素詳五几之名是無兩端赤中央黑漆矣蓋取彤漆類而髹之也木鐸周禮小宰曰正嵗帥治官之屬而觀治象之法徇以木鐸注木鐸木舌也賈疏云鐸皆以金為之以木為舌則曰木鐸以金為舌則曰金鐸鼎古之鼎不一按禮圗有曰牛曰羊曰豕然雉雊之日未審在何鼎也惟牛鼎最大可受一斛今姑繪之以見其狀云篚按三禮舊圗云篚以竹為之長三尺廣二尺深六寸足髙三寸如今小車經曰於豫擊石拊石𫝊曰重擊曰擊輕擊曰拊磬有小大故擊有輕重大磬即球也小磬即此編磬也小胥云凡縣鍾磬半為堵全為肆注云鍾磬編縣之二八十六枚而在一簨虡謂之堵鍾一堵磬一堵謂之肆簨者下橫者也簨上板曰業簨之上有崇牙業之上樹羽制度曰為龍頭及領口銜璧璧下有旄牛尾植者為虡詳見周禮干楯也羽翳也舞者所執修闡文教周禮兵舞即朱干也周人用舞而祭山川三禮圗曰羽析白羽為之形如帗太常案巾車王乘玉輅建太常十有二斿以祀又覲禮注云王建太常縿首畫日月楚下及斿交畫升龍降龍縿皆正幅用絳帛為質斿則屬焉又用弧張縿之幅又畫枉矢於縿之上故輈人云弧旌枉矢是也凡旌旗之上皆注旄與羽於竿首故夏采注云緌以旄牛尾為之綴於幢上其杠長九仞其斿曳地又左傳云三辰旗旗昭其明也據杜鄭二注皆以三辰為日月星蓋太常之上又畫星也阮氏梁正等圗旗首為金龍頭案唐志云金龍頭銜結綬及鈴綬則古注旄及羽於竿首之遺制也鼖鼓案三禮圗云鼖鼓兩面鼓鼓人職曰鼖鼓鼓軍士注云大鼓曰鼖鼓長八尺韗人云鼓四尺鉞經曰左杖黃鉞𫝊云鉞斧也以黃金為飾旄經曰右秉白旄以麾𫝊云旄軍中指麾白則見逺干楯也方言曰自關而東或謂之楯或謂之干關西謂之楯是干楯為一也戈廣二寸內四寸胡六寸援八寸柲六尺有六寸內謂胡以內接柲者胡謂矛之㫄出者曲猶牛胡焉援謂直創也柲謂柄也戈之用主于胡胡過于直則倨但可以刺胡過於曲則句但可以鈎人惟得其中制往無不利矛說文曰戈矛酋矛也建於兵車長二丈胄說文曰兜鍪也兜鍪首鎧也經典皆言甲胄秦世以來始有鎧兜鍪之文古之甲用皮秦漢以來用鐵矢槀長三尺殺其前一尺令趣鏃羽六寸夾其栝以設其羽分其羽以設其創弓長六尺有六寸謂之上制六尺有三寸謂之中制六尺謂之下制取幹角以膠漆筋絲為之案周禮司弓矢掌六弓其名王弧夾庾唐大書𫝊云大輅玉輅也綴輅金輅也先輅木輅也次輅象輅革輅也天子五輅飾異制同今圗玉輅之制兼太常之旗以修祭祀所乘其他金象革木之輅可類推之矣周禮大司徒云以土圭之法測土深正日影以求地中日南則影短多暑日北則影長多寒日東則影夕多風日西則影朝多隂日至之影尺有五寸謂之地中乃建王國焉一成之田耜廣五寸二耜為耦一耦之伐廣尺深尺謂之畎田首倍之廣二尺深二尺謂之遂九夫為井井廣四尺深四尺謂之溝九遂入一溝九溝入一洫一同之田方十里為成成間廣八尺深八尺曰洫方百里為同同間廣二尋深二仞曰澮九澮共入大川一同之田其遂九千溝九百洫九十澮九合沙鄭氏曰召公曰明王慎德四夷咸賔無有逺邇畢獻方物惟服食器用豫觀禹貢九州之貢篚雖非四夷之獻而亦以服食器用為要而冀州獨不言貢篚者蓋畿甸之內賦其總銍秸粟米也總銍秸粟米者倉廩之儲也糇糧之濟也是食為土貢之要也兖州之貢蠶絲豫州之貢絺紵其地則密邇於畿甸焉是衣服之用亦為土貢之要也自服食之外則器用次之器用之外則不過寶玉玩好而已不足為國家慮也帝王之建都必擇衣食之地而謂之京師京大也師衆也言天子之居既衆且大非衣食之豐不可以為國也若夫大賂南金犀革象齒珠貝之類非服食器用之物貴其土産也皆逺于畿甸而或貢于要荒之服焉苟帝王以為貢篚之要國家所急則堯舜之都遷於荆梁久矣其肯以冀為都區區禦大河之患圗一日之安耶及周之衰荆揚陷於吳楚貢金不入而天王求之於魯蓋以魯通於吳也是豈聖人制貢之初意哉書經大全圖說
