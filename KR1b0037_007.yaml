body:
  text: 書經大全卷七明胡廣等撰旅獒西旅貢獒牛刀反召公以為非所當受作書以戒武王亦訓體也因以旅獒名篇今文無古文有朱子曰近諸孫將旅獒來讀是時武王已八十餘歳矣太保此書諄諄告之如敎小兒相似若自後世言之為非所宜言不尊君矣之西山真氏曰武王大聖人也西旅貢獒初未受召公恐其恃大徳而忽細行以獻獒之受為無損故豫戒之如此葢積行而成徳猶累土而成山一行失則全體皆失亦猶一簣虧而全功俱虧也彼以聖人而猶致其謹今人未有寸善則曰吾知顧其大不暇䘏其細可乎哉惟克商遂通道于九夷八蠻西旅底貢厥獒太保乃作旅獒用訓于王九夷八蠻多之稱也職方言四夷八蠻爾雅言九夷八蠻但言其非一而已武王克商之後威徳廣被九州之外蠻夷戎狄莫不梯山航海而至曰通道云者葢蠻夷來王則道路自通非武王有意於開四夷而斥大境土也西旅西方蠻夷國名犬髙四尺曰獒按説文曰犬知人心可使者公羊傳曰晉靈公欲殺趙盾杜本反盾躇丑略反起遽不暇以次也階而走靈公呼去聲獒而屬音獨之獒亦躇階而從之則獒能曉解去聲人意猛而善搏人者異於常犬非特以其髙大也太保召公奭也史記云與周同姓姬氏此旅獒之本序朱子曰舉夷蠻以見其餘也子欲居九夷東方夷有九種八蠻今猶云然明堂位言六戎五狄職方言五戎六狄召地在岐邦内召公食采於召後封燕不張氏曰當未克商王未必受此既克商於此受而却王心亦少解矣召公此訓若嚴父師訓子弟然非公髙識安能見㣲格非如此林氏曰公恐四夷聞之將争以珍竒進也呂氏曰創業之君有一毫之失後世便有丘山之害此於王業已成則為謹終於示後嗣則為謹始以此為防後猶有求白狼白鹿如周穆王者狂陳氏經曰武王非求之公諫之若其失徳何也聖逺矣而根於一念之㣲流金爍石而一隂生寒於此始墮指折膠而一陽生暑於此萌諫於㣲則為力易待其著則難矣曰嗚呼明王慎徳四夷咸賔無有逺邇畢獻方物惟服食器用謹徳葢一篇之綱領也方物方土所生之物明王謹徳四夷咸賔其所貢獻惟服食器用而已言無異物也新安陳氏曰一篇皆自明王慎徳一句推廣之曰昭徳之致曰惟徳其物曰徳盛不狎侮曰玩人喪徳曰終累大徳徳之一辭諄諄焉惟慎徳所以自能致貢物惟所貢無異物所以見其慎徳若竒玩之物非所當獻亦非所當受一受之則荒怠之心生而慎徳之意失矣陳氏雅言曰四夷専指中國之外而言逺邇兼指中國之内而言也林氏曰穎達以器用為一或謂羽毛齒革之類器牛馬犬龜之類用也先王於四夷不貴彼之難得不求我之所無用王乃昭徳之致于異姓之邦無替厥服分寶玉于伯叔之國時庸展親人不易音異物惟徳其物昭示也徳之致謂上文所貢方物也昭示方物于異姓之諸侯使之無廢其職分寶玉于同姓之諸侯使之益厚其親如分陳以肅慎氏之矢分魯以夏后氏之璜音皇之類王者以其徳所致方物分賜諸侯故諸侯亦不敢輕易其物而以徳視其物也問時庸展親諸家多訓展作信是否朱子曰展審視也不當訓信曰苟非王徳所致其頒也以物不以徳王氏十朋陳氏經曰四夷不敢私其物所以表奉上之誠聖人不敢私其物所以示錫予之恩予異姓固昭徳之致分同姓以寶玉亦徳所致也以物視物則金玉輕如鴻毛以徳視物雖一介重於九鼎林氏曰獒之為物小不可為服食大不可為器用疎不可昭徳於異姓親不可展親於同姓呂氏曰聖人公天下為心天下之物與天下共之非如秦皇以千七百國獨奉一身而已然一視同仁之中文理宻察未嘗無等差自親及疎待同姓必厚於待異姓非如墨子之兼愛也有陳氏雅言曰昭其徳之所致其所分賜之物雖若親疎厚薄之殊然皆所以昭其徳之所致而欲堅其事上之義示其厚下之恩也故昭徳之致雖於異姓之邦言之而寶玉之分亦為昭徳之致者可知寶玉之分雖於伯叔之國言之而昭徳之致必為方土之物者可知其文互相備也無替厥服雖又於異姓之邦言之而伯叔之國亦欲使之堅其事上之義者可知時庸展親雖又於伯叔之國言之而異信之邦亦所以示其厚下之恩者可知其文亦互相備也聖人於一視同仁之中而有文理宻察之别仁之至義之盡也新安陳氏曰必服食器用之常物始足以見君徳之所致若異物適足以昭君之不徳物皆君徳之所致則此物非徒物也即君之徳也王氏曰人以王徳所致故不敢易其物而徳其物徳盛不狎侮狎侮君子罔以盡人心狎侮小人罔以盡其力徳盛則動容周旋皆中去聲禮然後能無狎侮之心言謹徳不可不極其至也徳而未至則未免有狎侮之心狎侮君子則色斯舉矣彼必髙蹈逺引望望然而去安能盡其心狎侮小人雖其㣲賤畏威易役然至愚而神亦安能盡其力哉陳氏大猷曰徳愈盛者禮愈恭徳盛則心無限量自不狎侮人狎侮之形由徳薄心隘而驕矜乘之也此因言慎徳而推廣言之狎侮則非所以慎徳矣孫氏曰君子者天下之所歸心也待之不以禮則君子去矣何以盡人之心小人以力輔我者也使之不以禮則小人怠矣何以盡彼之力所新安陳氏曰君子人心所同歸狎侮之則惡人之好失人心矣安能得人盡心小人以力事人狎侮之雖刑驅勢廹勉强用力爾安能得盡其力必如文王感民于來方為盡其力須玩味人與其字不役耳目百度惟貞貞正也不役於耳目之所好百為之度惟其正而已王氏炎曰心官為主而耳目從其令則非禮勿聽視百度貞矣耳目為主而心為所役則物交物而為所引百度何由而正目陳氏大猷曰受獒是役於耳之玩也玩人喪徳玩物喪志玩人即上文狎侮君子之事玩物即上文不役耳目之事徳者己之所得志者心之所之王氏十朋曰玩人則以驕而㓕敬故喪徳玩物則以慾而勝剛故喪志曰吕氏曰玩人玩物反覆論狎侮之弊陳氏大猷受獒則玩人玩物也必林氏曰恃獒之所指如意而有玩忽人之心則人以為薄徳矣故喪徳以獒如人意而受之則玩㺯於物溺志於此而不自覺豈不喪志而新安陳氏曰喪志則亦必喪徳矣未有溺志於物可以修徳者受􅋙即玩物志以道寜言以道接道者所當由之理也己之志以道而寜則不至於妄發人之言以道而接則不至於妄受存乎中者所以應乎外制乎外者所以養其中古昔聖賢相授心法也問志以道寜言以道接接字如何朱子曰接者酬應之謂言當以道酬應也又曰志我之志言人之言林陳氏大猷曰受􅋙則志動於物而非以道寜矣氏曰􅋙之獻必甘言以求納亦必有言其可納者太保言不當受乃苦言逆耳以道揆之則知所從違矣吕氏曰既説玩好之害又説存養工夫志以道寜孟子所謂持其志言以道接孟子所謂我知言内外交養如此自然不作無益不貴異物陳氏雅言曰志以道寜即舜授禹以人心惟危道心惟㣲惟精惟一允執厥中者也言以道接即舜授禹以無稽之言勿聽弗詢之謀勿庸者也不作無益害有益功乃成不貴異物賤用物民乃足犬馬非其土性不畜珍禽竒獸不育于國不寶逺物則逺人格所寶惟賢則邇人安孔氏曰逰觀為無益竒巧為異物蘇氏曰周穆王得白狼白鹿而荒服因以不至此章凡三節至所寶惟賢則益切至矣陳氏曰志言如此則本正矣豈復有作無益貴異物之事不貴異物賤用物則珍玩不貴所貴皆服食器用之物矣逺格則邇者可知邇安則逺者可知又曰寳賢則天下安然其安自近始體林氏曰漢文却千里馬元武以駕鼓車三代後能召公之言二君是也虞寶璧乘故視宮之竒為路人齊寶四臣故視照乘之珠為土苴趙唐孔氏曰晉恵公小駟旋濘見獲馬非土性故也簡子問王孫圉曰白珩在乎對曰楚所寶觀射父左史倚相若白珩先王所玩何寶為知所寶矣嗚呼夙夜罔或不勤不矜細行去聲終累大徳為山九仞功虧一簣或猶言萬一也呂氏曰此即謹徳工夫或之一字最有意味一暫止息則非謹徳矣矜矜持之矜八尺曰仞細行一簣指受獒而言也問不矜細行與矜而不争之矜如何朱子曰相似是箇矜惜持守之意其王氏十朋曰此書始終皆曰嗚呼始欲其慎終欲勤也新安陳氏曰武王治定功成如此或受一獒遂畧大徳而虧成功實深可惜此篇始以慎言終以勤言必無一息不勤始為慎徳之至夙夜罔或不勤體天之行徤而自强不息也一受獒是怠忽而勤息矣豈所以慎徳哉陳氏雅言曰旅獒一篇以慎終為綱領而此之夙夜罔或不勤又慎徳之工夫也陳氏大猷曰細行猶言小節即畢命所謂小物易所謂庸行受獒雖若小節所損甚大呂氏曰當於一嚬一笑一動一作之時子細體察葢小處易得放過功虧一簣非止欠一簣做了便是聖人雖作之不已常若欠一簣林氏曰世豈有為山者哉葢假説以見意爾孔子之言葢本乎此夫却一獒之獻亦細行爾而世王之兆實見於此箕子曰彼為象箸必為玉盃為玉盃必思逺方珍異之物紂之亡原於此豈在大乎此所以言不矜細行而欲享世王之功也成陳氏經曰一簣之虧是為山未成也人主常持未之心於既成之日此見純亦不己之意簣張氏曰受獒是一之虧也允廸兹生民保厥居惟乃世王信能行此則生民保其居而王業可永也葢人主一身實萬化之原苟於理有毫髪之不盡即遺去聲生民無窮之害而非創業垂統可繼之道矣以武王之聖召公所以警戒之者如此後之人君可不深思而加念之哉王氏日休曰茲謂此一篇之言謂誠能行此言也董氏鼎曰前則告以慎徳昭徳後則戒以喪徳累徳然其曰志以道寜言以道接雖不待竟其説而旅之􅋙可以不受吾之訓不可以不從固已明矣聖人不以細行而不謹大臣不以細過而不諫此古者所以君明臣良而後世鮮儷也金縢徒登反武王有疾周公以王室未安殷民未服根本易去聲摇故請命三王欲以身代武王之死史録其冊祝之文并卑正反叙其事之始末合為一篇以其蔵於金縢之匱編書者因以金縢名篇今文古文皆有唐孔氏曰發首至王季文王史叙將告神之事也史乃冊祝至屏音丙璧與珪記告神之辭也自乃卜至乃瘳記卜吉及王病瘳之事也自武王既喪已下記周公流言居東及成王迎歸之事也朱子曰金縢之作在周公東征而歸之後以其記武王時事且備東征本末故敘之於此氏孔氏曰書藏於匱緘之以金不欲人開鄭曰凡藏秘書皆然非始周公緘王氏日休曰縢緘也以金封若今鎖然既克商二年王有疾弗豫記年見其克商之未久也弗豫不悦豫也蘇氏曰弗豫猶言不懌成陳氏梅叟曰是時王生纔五年二公曰我其為去聲王穆卜二公太公召公也李氏曰穆者敬而有和意穆卜猶言共卜也愚謂古者國有大事卜則公卿百執事皆在誠一而和同以聴卜筮故名其卜曰穆卜下文成王因風雷之變王與大夫盡弁啓金縢之書以卜者是也先儒專以穆為敬而於所謂其勿穆卜則義不通矣陳氏大猷曰穆敬和而有深逺之意以新安陳氏曰蔡𫝊非孔註專以穆為敬是矣昭穆之穆證之又有幽隂深逺之意周公曰未可以戚我先王戚憂惱之意未可以武王之疾而憂惱我先王也葢卻乞約反止也俗作却非二公之卜公乃自以為功為三壇同墠音善為壇於南方北面周公立焉植璧秉珪乃告太王王季文王功事也築土曰壇除地曰墠三壇三王之位皆南向三壇之南别為一壇北向周公所立之地也植置也圭璧所以禮神詩言圭璧既卒周禮祼圭以祀先王周公卻二公之卜而乃自以為功者葢二公不過卜武王之安否耳而周公愛兄之切危國之至忠誠懇懇於祖父之前如下文所云者有不得盡焉此其所以自以為功也又二公穆卜則必禱於宗廟用朝廷卜筮之禮如此則上下喧騰而人心摇動故周公不於宗廟而特為壇墠以自禱也孔氏曰公自以請命為己事復齋董氏曰古者有事祖考當夫無廟與不得入廟則為壇以祭禮支子不得祭祖故周公不敢入廟而為壇也臨川吳氏曰古禮凡於逺祖之無廟者及宗子去其宗廟而在他國者及支子雖在本國而於禮不得入廟者或有禱告必須墠地為壇以棲祖考之神周公支子為臣故不敢告于廟而為壇以告也林氏曰植璧於壇秉珪於手公鄭氏曰植古置字置璧於三王之壇以禮神秉珪自執桓圭也或曰金縢之禱不知命乎程子曰周公誠心欲代其兄豈問命耶陳氏經曰孔子曰某之禱久矣孔子之不禱為己也周公之禱為君親也為己而禱是不知命為君親而不禱是不知義史乃册祝曰惟爾元孫某遘音姤厲虐疾若爾三王是有丕予之責于天以旦代某之身史太史也册祝如今祝版之類元孫某武王也遘遇厲惡虐暴也丕子元子也旦周公名也言武王遇惡暴之疾若爾三王是有元子之責于天葢武王為天元子三王當任其保䕶之責于天不可令其死也如欲其死則請以旦代武王之身于天之下疑有缺文舊説謂天責取武王者非是詳下文予仁若考能事鬼神等語皆主祖父人鬼為言至於乃命帝庭無墜天之降寶命則言天命武王如此之大而三王不可墜天之寶命文意可見又按死生有命周公乃欲以身代武王之死或者疑之葢方是時天下未安王業未固使武王死則宗社傾危生民塗炭變故有不可勝平聲言者周公忠誠切至欲代其死以輸危急其精神感動故卒得命於三王今世之匹夫匹婦一念誠孝猶足以感格鬼神顯有應驗而况於周公之元聖乎是固不可謂無此理也問周公代武王死亦有此理否朱子曰聖人為之亦須有此理丕林氏曰自太王王季言則曰元孫自文王言則曰子元長丕太皆指武王也問或問正叔周公欲以身代武王之死其知命乎正叔曰只是要代兄死豈更問命此語如何龜山楊氏曰是也曰聖人不應不知天理天理既不然而必行之其誠不幾於無物否曰聖人固知天理然只為情切猶於此僥倖萬一也故至誠為之勢臨川呉氏曰武王喪于克商七八年之後天下大已定猶有武庚之叛周室幾危設使喪于克商甫二年之時則禍變又將若何周公葢覩事勢之必至於此所以欲代武王之死也或曰死生有命而周公欲代死理有之乎曰有匹夫匹婦發一誠心可動天地况聖人至誠至公心與天一志一則動氣固有轉移造化之理若理之所無則周公豈為之哉予仁若考能多材多藝能事鬼神乃元孫不若旦多材多藝不能事鬼神周公言我仁順祖考多材幹多藝能可任如林反又如鴆反堪也下同役使能事鬼神武王不如旦多材多藝不任役使不能事鬼神材藝但指服事役使而言朱子曰周公以身代武王之説只縁人看錯了此乃周公誠意篤切以庶幾其萬一丕子之責于天只是以武王受事天之責任如今人説話他要箇人來服事周公便説是他不能服事天不似我多材多藝自能服事天元孫不若旦非周公自誇而貶武王葢欲代其死不得不然言武王不救則天命墜宗社亡非過為危言理勢實然也後來王崩在定商八年後三監之變尚如此况克商二年乎周公忠誠懇切欲代武王死以輸危急葢以武王一身宗社生民之身周公之禱非獨弟為兄臣為君乃為先王禱為天下禱為萬世社稷生靈禱也至聖至誠卒感通於先王而轉移乎造化烏可謂無此理哉乃命于帝庭敷佑四方用能定爾子孫于下地四方之民罔不祇畏嗚呼無墜天之降寶命我先王亦永有依歸言武王乃受命於上帝之庭布文徳以佑助四方用能定爾子孫於下地使四方之民無不敬畏其任大其責重未可以死故又歎息申言三王不可墜失天降之寶命庶先王之祀亦永有所賴以存也寶命即帝庭之命也謂之寶者重其事也朱子曰若爾三王有丕子之責于天以旦代某之身此一叚先儒都解錯了只有晁以道説得好他解丕子之責如史𫝊中責其侍子之責葢云上帝責三王之侍子侍子指武王也上帝責其來服事左右故周公乞代其死云以旦代某之身予仁若考能多材多藝能事鬼神乃元孫不若旦多材多藝不能事鬼神用能定爾子孫于下地四方之民罔不祇畏言三王若有侍子之責于天則不如以我代之我多材多藝能事上帝武王不若我多材多藝不能事鬼神不如且留他在世上定爾之子孫與四方之民文意如此伊川却疑周公不應自説多材多藝不是如此他止是要代武王之死爾畏林氏曰旦多材藝元孫之死不若旦之死元孫能服四方則旦之生不若元孫之生今我即命于元龜爾之許我我其以璧與珪歸俟爾命爾不許我我乃屏音丙璧與珪即就也歸俟爾命俟武王之安也屏藏也屏璧與珪言不得事神也葢武王喪則周之基業必墜雖欲事神不可得也其稱爾稱我無異人子之在膝下以語去聲其親者此亦終身慕父母與不死其親之意以見公之達孝也林氏曰自惟爾元孫某至我乃屏璧與珪即冊上所書祝辭全文本用武王名記載代以某字周人以諱事神諱名始於周也者張氏曰武王若死事未可知大位者奸之窺危病邪之伺異時三監之畔周公之先見㣲矣乃卜三龜一習吉啟籥見書乃并是吉籥與鑰通卜筮必立三人以相參考三龜者三人所卜之龜也習重平聲也謂三龜之兆一同開籥見卜兆之書乃并是吉朱子曰或曰三王前各一龜卜之習林氏曰習與習坎之習同舜亦曰卜不吉公曰體王其周害予小子新命于三王惟永終是圖茲攸俟能念予一人體兆之體也言視其卜兆之吉王疾其無所害我新受三王之命而永終是圖矣茲攸俟者即上文所謂歸俟也一人武王也言三王能念我武王使之安也詳此言新命于三王不言新命于天以見果非謂天責取武王也薛氏曰體與詩爾卜爾誓體無咎言之體同周禮占人云凡卜君占體大夫占色史占墨卜人占拆然證以詩之語則卜看兆體亦可通上下言之新安陳氏曰兹攸俟上下疑有闕誤公歸乃納册于金縢之匱中王翼日乃瘳音抽册祝册也匱藏卜書之匱金縢以金緘之也翼日公歸之明日也瘳愈也按金縢之匱乃周家藏卜筮書之物每卜則以告神之辭書於册既卜則納册於匱而藏之前後卜皆如此故前周公乃卜三龜一習吉啟籥見書者啟此匱也後成王遇風雷之變欲卜啟金縢者亦啟此匱也葢卜筮之物先王不敢䙝故金縢其匱而藏之非周公始為此匱藏此册祝為後來自解計也朱子曰既克商二年至王翼日乃瘳此叙周公諸命之事問周公既禱三王而藏其文於金縢之匱中豈逆知成王之信流言將以語之乎程子曰以近世觀焉祝册既用則或焚之或埋之豈周公之時未有焚埋之禮也而欲敬其事故若此乎王氏曰卜筮既畢而不敢䙝必納其冊書於匱異時將卜則復唘焉乃國家故事非特為此匱藏其冊為後來自解之計也問周公代武王武王以有瘳有如此理否和靖尹氏曰盡周公之意而已然有瘳乃感應也林氏曰請代武王之死者周公之本心也王瘳而公不死者天也非人之所能為也武王既喪管叔及其羣弟乃流言于國曰公將不利於孺子管叔名鮮武王弟周公兄也羣弟蔡叔度霍叔處也流言無根之言如水之流自彼而至此也孺子成王也商人兄死弟立者多武王崩成王幼周公攝政商人固已疑之又管叔於周公為兄尤所覬覦故武庚管蔡流言於國以危懼成王而動摇周公也史氏言管叔及其羣弟而不及武庚者所以深著三叔之罪也朱子曰武王既喪此以下記周公成王時事三管叔及其羣弟至不利於孺子此即大誥所謂監及淮夷叛也意其稱兵舉事必以誅周公為辭若王敦之於劉隗刁協爾詩序所謂周公遭變陳后稷先公風化之所由而作七月之詩以陳王業風喻成王者葢此時也周公乃告二公曰我之弗辟音避我無以告我先王辟讀為避鄭氏詩𫝊言周公以管蔡流言避居東都是也漢孔氏以為致辟音僻於管叔之碎謂誅殺之也夫三叔流言以公將不利於成王周公豈容遽興兵以誅之耶且是時王方疑公公將請王而誅之耶將自誅之也請之固未必從不請自誅之亦非所以為周公矣我之弗辟我無以告我先王言我不避則於義有所不盡無以告先王於地下也公豈自為身計哉亦盡其忠誠而已矣朱子曰周公乃告二公曰至告我先王作大誥遂東征呂氏曰舜封象於有庳所以為至仁周公之誅三叔所以為大義事異而心則一也張氏行成曰仁人之於兄弟也有怨於身則不宿獲罪於天下則必誅周公居東二年則罪人斯得居東居國之東也鄭氏謂避居東都未知何據孔氏以居東為東征非也方流言之起成王未知罪人為誰二年之後王始知流言之為管蔡斯得者遲之之辭也朱子曰周公居東二年則罪人斯得殺武庚致辟管叔于商囚蔡叔于郭鄰降霍叔于庶人命㣲子啟代殷後作㣲子之命皆此時事衡周公東征不必言用權自是王室至親與諸侯連皆叛當國大臣豈有坐視不救之理帥師征之乃是正義不待可與權者而後能也若馬鄭以為東行避謗乃鄙生腐儒不達時務之説可不辨而自明若夫所謂周公之志非為身謀也為先王謀也非為先王謀也以身任天下之重也此説極佳若罪人斯得須着箇極廣大無物我底心胷看方得有一毫私吝自愛惜避嫌疑之心則與聖人做處天地懸隔矣萬一成王終不悟周公更待罪幾年不知如何收殺問罪人斯得或以為管蔡或以為周公官屬如何曰非也管蔡既流言成王疑之未知罪人之為誰也及周公居東二年成王因風雷之變唘金縢而悟乃知罪在管蔡也若曰所謂罪人者今得之矣又問所謂居東二年即東征否曰成王方疑周公豈得便東征乎二年待罪也東征三年非二年也董銖問金縢我之弗辟我無以告我先王馬鄭皆音辟為避其意葢謂管蔡流言成王既疑周公公乃避居東都二年之久以待成王之察及成王遭風雷之變啟金縢之書迎公來返返乃攝政方斯東征所謂罪人斯得者成王得其流言之罪人也陳少南吳才老從之而詆先儒誅辟之説竊謂周公之誅管蔡與伊尹之放太甲皆聖人之變惟二公至誠無愧正大明白故行之不疑未可以淺俗之心窺之也此辟字與蔡仲之命所謂致辟之辟同安得以辟為避且使周公委政而去二年之久不幸成王終不悟而小人得以乘間而入則周家之禍可勝言哉周公是時不知何以告我先王也觀公之告二公曰我之弗辟我無以告我先王其言正大明白至誠惻怛則區區嫌疑有所不敢避矣惟有此心無懼而先王可告也自潔其身而為匹夫之諒周公豈為之哉曰辟字當從古註説與蔡沈帖曰弗辟之説只從鄭氏為是向董叔重得書亦辨此條一時信筆答之謂當從古註説後來思之不然是時三叔方流言於國周公處兄弟骨肉之間豈應以片言半語便遽然興師以誅之聖人氣象大不如此又成王方疑周公周公固不應不請而自誅之若請之於王王亦未必見從則當時事勢亦未必然雖曰聖人之心公平正大區區嫌疑似不必避但舜避堯之子於南河之南禹避舜之子於陽城自是合如此若居堯之宮逼堯之子即為簒矣或又謂成王疑周公故周公居東不幸成王終不悟不知周公又如何處曰亦惟盡其忠誠而已矣呂氏曰方是時内而少主疑惑外而四國倡亂周公何恃而敢出征二年之久葢十亂尚有如二公者為太師太保而在内可以委付内事調䕶鎮定於其間故也後世權臣安敢輕去君側舉足左右變不旋踵矣于後公乃為詩以貽王名之曰鴟鴞音癡梟王亦未敢誚音峭公鴟鴞惡鳥也以其破巢取卵比武庚之敗管蔡及王室也誚讓也上文言罪人斯得則是時成王之疑十已去其四五矣朱子曰于後公乃為詩至誚公公既滅武庚管蔡而成王之疑未釋故公不欲遽歸留居東方而周大夫為作破斧伐柯九罭狼跋之詩管蔡流言使成王疑周公周公雖已滅之然成王之疑未釋則亂未弭也故周公作鴟鴞之詩以遺王而告以王業艱難不忍毁壞之意所以為救亂也為管蔡流言以謗周公而公征之不知者以為公之是以救其身而已故為此詩者為之發明其心如此學者於此玩味而有得焉則正大而天地之情可見矣呂氏曰王欲誚公而未敢所謂未敢則悔過之根本也秋大熟未穫天大雷電以風禾盡偃大木斯拔邦人大恐王與大夫盡弁以唘金縢之書乃得周公所自以為功代武王之説王與大夫盡弁以發金縢之書將卜天變而偶得周公冊祝請命之説也孔氏謂二公倡王唘之者非是按秋大熟係于二年之後則成王迎周公之歸葢二年秋也東山之詩言自我不見于今三年則居東之非東征明矣葢周公居東二年成王因風雷之變既親迎以歸三叔懷流言之罪遂脅武庚以叛成王命周公征之其東征往反首尾又自三年也二公及王乃問諸史與百執事對曰信噫公命句我勿敢言周公卜武王之疾二公未必不知之周公冊祝之文二公葢不知也諸史百執事葢卜筮執事之人成王使卜天變者即前日周公使卜武王疾之人也二公及成王得周公自以為功之説因以問之故皆謂信有此事已而歎息言此實周公之命而我勿敢言爾孔氏謂周公使之勿道者非是朱子曰秋大熟至我勿敢言金縢所藏代武王之説敢葵初王氏曰如蔡點當云我莫言耳説文勿莫也王執書以泣曰其勿穆卜昔公勤勞王家惟予冲人弗及知今天動威以彰周公之徳惟朕小子其新逆我國家禮亦宜之新當作親成王唘金縢之書欲卜天變既得公冊祝之文遂感悟執書以泣言不必更卜昔周公勤勞王室我幼不及知今天動威以明周公之徳我小子其親迎公以歸於國家禮亦宜也按鄭氏詩𫝊成王既得金縢之書親迎周公鄭氏學出於伏生而此篇則伏生所𫝊當以親為正親誤作新正猶大學新誤作親也馬融本新逆作親逆王出郊天乃雨反風禾則盡起二公命邦人凡大木所偃盡起而築之歳則大熟國外曰郊王出郊者成王自往迎公即上文所謂親逆者也天乃反風感應如此之速洪範庶徴孰謂其不可信哉又按武王疾瘳四年而崩羣叔流言周公居東二年罪人既得成王迎周公以歸凡六年事也編書者附于金縢之末以見請命事之首末金縢書之顯晦也朱子曰王執書至歳則大熟歸禾嘉禾之書皆此後作周公自是歸大夫美之而作東山之詩也電成王方疑周公二公何不為周公辨明若天不雷以風二公終不進説矣當是時成王欲誚周公而未敢葢周公東征其勢亦難誚也此成王雖深疑之而未敢誚之也若成王終不悟周公須有所處矣亦書中可疑諸篇若一齊不信恐倒了六經如金縢有非人情者雨反風禾盡起也是咤異成王又如何恰限去唘金縢之書然當周公納策於匱中豈但二公知之林氏曰公尚欲以身代兄之死况肯奪兄子之位乎此成王所以感悟也出郊者及公至則郊勞而親迎之也孔氏以為郊天誤矣又謂禾有偃㧞起而立之亦非凡禾為木所仆而不能自立者則為之起而築之加人力焉築者築禾也新安陳氏曰成王未知周公則天為之雷風偃禾既知周公則天為之反風起禾感應之速如影響然天豈在君心外耶然林氏曰自周公居東而下其事迹皆在大誥之後實與周公請死之事相為終始故於此并載之武董氏鼎曰帝王之興自有天命必至於極而後見王崩成王幼天下之重懸於周公公負謗而不遑自安王得詩而尚猶未悟文武之業危如一髪非天其孰能警悟而扶持之故天之動威不持以彰周公之徳實以表見三監之罪而顯相文武之業也如漢髙困於項籍而大風為之揚沙光武窘於王郎而河冰為之自合庸非天乎大誥武王克殷以殷餘民封受子武庚命三叔監平聲殷武王崩成王立周公相去聲之三叔流言公將不利於孺子周公避位居東後成王悟迎周公歸三叔懼遂與武庚叛成王命周公東征以討之大誥天下書言武庚而不言管叔者為親者諱也篇首有大誥二字編書者因以名篇今文古文皆有按此篇誥語多主卜言如曰寜王遺去聲我大寶龜曰朕卜并吉曰予得吉卜曰王害音曷不違卜曰寜王惟卜用曰矧亦惟卜用曰予曷其極卜曰矧今卜并吉至於篇終又曰卜陳惟若茲意邦君御事有曰艱大不可征欲王違卜故周公以討叛卜吉之義及天命人事之不可違者反復音腹誥諭之也朱子曰大誥一篇不可曉據周公在當時外則有武庚管蔡之叛内則有成王之疑周室方且岌岌然他作此書決不是備禮苟且為之必欲以此聳動天下也而今大誥大意不過説周家辛苦做得這基業在此我後人不可不有以成就之而已其後又却専歸在卜上其意思緩而不切殊不可曉因言武王既克紂武庚三監及商民叛曰當初紂之暴虐天下之人胥怨無不欲誅之及武王既奉天下之心以誅紂於是天下之怨皆解而歸徳於周矣然商之遺民及與紂同事之臣一旦見故主遭人戮宗社為墟寜不動心茲固畔心之所由生也葢始於苦紂之暴而欲其亡固人之心及紂既死則怨己解而人心復有所不忍亦事勢人情之必然者又况商之流風善政畢竟尚有在人心者及其頑民感商恩意之深此其所以叛也後來樂毅伐齊亦是如此陳氏大猷曰武王以公義封武庚而不虞其怨以親愛用三叔而不料其反仁人之過也使捨武庚而立㣲子三監雖欲叛而不從捨三叔而任他人武庚雖欲反而不敢陳氏經曰使三叔監殷亦如舜之封象不得有為於其國使吏治其國之意讀泰牧誓而知武王取商之易讀大誥諸篇而知周家安商之難葢新安陳氏曰𫝊避位之説以照應金縢王若曰猷大誥爾多邦越爾御事弗弔天降割于我家不少延洪惟我幼冲人嗣無疆大厯服弗造哲廸民康矧曰其有能格知天命猷發語辭也猶虞書咨嗟之例按爾雅猷訓最多曰謀曰言曰己曰圖未知此何訓也弔恤也猶詩言不弔昊天之弔言我不為天所恤降害於我周家武王遂喪而不少待也冲人成王也厯厯數也服五服也哲明哲也格格物之格言大思我幼冲之君嗣守無疆之大業弗能造明哲以導民於安康是人事且有所未至而况言其能格知天命乎朱子曰王若曰若字只是一似如此説底意思如漢書中帝意若曰之類葢或宣道徳意者敷演其説或記録者失其語而追記其意如此也聲書中弗弔字只如字讀解者欲訓弔為至故音的非也其義止如詩中所讀不弔昊天耳言不見閔弔於上帝也稱林氏曰政雖攝於周公而成王在上為天子故必王命以告也猷發語之詞若二典所謂咨甘誓𦙍征所謂嗟切意至周時發語之辭變而為猷故㣲子之命多士多方皆言王若曰猷越及也初呂氏曰叛者三監武庚耳何必大誥多方葢天下定人情未安三監煽變恐亂之牽引不止於此所以大誥諭之人心有定則變無由生也大西山真氏曰聖賢舉事必先誥諭多方者所以昭公而一衆志非但防亂而已同馬融讀不少延為句年薛氏曰洪惟與洪惟作威復齋董氏曰幼謂少冲童也命陳氏大猷曰格知格之至也下文將言用龜紹天故先謙言己不知天命也王氏安石曰大誥疑有脱語其不可知者輒闕之而釋其可知者盤新安陳氏曰朱子所以取荆公者在此此可為解誥諸篇之法已予惟小子若涉淵水予惟徃求朕攸濟敷賁彼義反敷前人受命兹不忘大功予不敢閉于天降威用己承上語詞已而有不能已之意若涉淵水者喻其心之憂懼求朕攸濟者冀其事之必成敷布賁飾也敷賁者修明其典章法度敷前人受命者增益開大前王之基業若此者所以不忘武王安天下之大功也今武庚不靖天固誅之予豈敢閉抑天之威用而不行討乎朱子因論點書曰人説荆公穿鑿只是好處亦用還他如天降割于我家不少延及寜王遺我大寶龜皆非諸家所及在喪稱予小子詩閔予小子是也葉氏曰禮天子陳氏大猷曰渡水曰涉渡訖曰濟命夏氏曰敷布賁飾之事以敷布恢張前人所受之於此不忘前人之大功烈也孔氏曰我不敢閉絶天所下威用而不行之新安陳氏曰若涉淵水畏之之深也往求攸濟濟之道也知懼自强兩者並行方能濟難不知畏者忽徒知畏者沮皆非也惟天惟祖宗所以付任我者甚重今日不敢不力不敷賁敷受命是不能繼志述事而忘祖宗之大功也不用兵伐四國是不能奉行天討而閉天之降威也我西山真氏曰天降威謂天以商有罪降之黜罰非所敢拒也王者用威聽乎天而已天未降威不敢先文王事殷是也天既降威不敢後武王伐殷是也王氏曰閉拒也天降威成王不敢拒故用寜王所用大寶龜紹天之明以斷吉凶而即天命也寜王遺我大寶龜紹天命即命曰有大艱于西土西土人亦不静越茲蠢蠢上聲寜王武王也下文又曰寜考蘇氏曰當時謂武王為寜王以其克殷而安天下也蠢動而無知之貌寜王遺我大寶龜者以其可以紹介天命以定吉凶曩嘗即龜所命而其兆謂將有大艱難之事于西土西土之人亦不敢静是武庚未叛之時而龜之兆葢已預告矣及此果蠢蠢然而動其卜可驗如此將言下文伐殷卜吉之事故先發此以見卜之不可違也呂氏曰寜王遺我大寶龜大誥一篇之綱領也自始至終皆以卜為言林氏曰天之吉㐫示人甚明然其道幽𡨕無介紹以𫝊其意惟卜之以龜則天之明曉然可見此成王所以即而受命焉薛氏曰即命與金縢即命于元龜同意以蘇氏曰曰有大艱于西土西土人亦不静此龜所告也及是三監果動史氏漸曰文武成之際事之大者凡三皆以卜而決文王將獵得非虎非熊之卜而太公起於渭濵造周之謀自此而成武王師渡孟津日朕夢協朕卜興周之基自此而定成王主少國疑之際而三監商奄相煽而起賴朕卜并吉故周公寜違衆而舉師不敢違卜而逆天而安周之功自此而著周家三世以三卜而興則大龜為世守之寶也亦宜作新安陳氏曰武庚之亂在東非西土也孔註四國大難于京師意其指流言於國歟之葵初王氏曰西土指鎬京為是即牧誓所謂西土人大艱以下艱大例之是因流言而有東征之役殷小腆他典反誕敢紀其叙天降威知我國有疵音慈民不康曰予復反鄙我周邦腆厚誕大叙緒疵病也言武庚以小厚之國乃敢大紀其既亡之緒是雖天降威于殷然亦武庚知我國有三叔疵隙民心不安故敢言我將復殷業而欲反鄙邑我周邦也呂氏曰反鄙之鄙如鄭子産曰鄭鄙邑也今蠢今翼日民獻有十夫予翼以于敉音弭寜武圖功我有大事休朕卜并吉于往敉撫武繼也謂今武庚蠢動今之明日民之賢者十夫輔我以往撫定商邦而繼嗣武王所圖之功也大事戎事左傳云國之大事在祀與戎休美也言知我有戎事休美者以朕卜三龜而并吉也按上文即命曰有大艱于西土葢卜於武王方崩之時此云朕卜并吉乃卜於將伐武庚之日先儒合以為一誤矣林氏曰民之賢者有十夫來助予往征以撫安武王所圖之功則得人心矣朕卜并吉則得天心矣天人俱應則我周有必勝之理武庚有必亡之勢如之何不征民獻與黎獻同欒武子以三卿為主不與楚戰亦周公從十夫之意曰艱大者雖衆皆不知天者也知天之十獻為主可謂衆矣惜十民獻名氏不見於後世耳自楊氏曰惟至誠為能通天下之志誠而不疑其類合方是時危疑之甚惟周公以身任之而不疑故十夫予翼此勿疑朋盍簪之謂也先新安陳氏曰公之東征邦君御事皆疑民獻十夫至故公表其人以告天下葢天之視聽在民而民之去就視賢蓍龜固可以紹天明賢人尤可以占天意賢人人中之蓍龜也此章言武庚作亂不可不征而決之賢與卜民獻龜卜乃大誥之綱領也肆予告我友邦君越尹氏庶士御事曰予得吉卜予惟以爾庶邦于伐殷逋播臣此舉嘗以卜吉之故告邦君御事往伐武庚之詞也肆故也尹氏庶官之正也殷逋播臣者謂武庚及其羣臣本逋亾播遷之臣也爾庶邦君越庶士御事罔不反曰艱大民不静亦惟在王宮邦君室越予小子考翼不可征王害音曷不違卜此舉邦君御事不欲征欲王違卜之言也邦君御事無不反曰艱難重大不可輕舉且民不静雖由武庚然亦在扵王之宮邦君之室謂三叔不睦之故實兆釁端不可不自反害曷也越我小子與父老敬事者皆謂不可征王曷不違卜而勿征乎肆予冲人永思艱曰嗚呼允蠢鰥寡哀哉予造天役遺大投艱于朕身越予冲人不卬音昻自恤義爾邦君越爾多士尹氏御事綏予曰無毖于恤不可不成乃寜考圖功造為卭我也故我冲人亦永思其事之艱大歎息言信四國蠢動害及鰥寡深可哀也然我之所為皆天之所役使今日之事天實以其甚大者遺於我之身以其甚艱者投於我之身於我冲人固不暇自恤矣然以義言之於爾邦君於爾多士及官正治事之臣當安我曰無勞於憂誠不可不成武王所圖之功相與戮力致討可也此章深責邦君御事之避事朱子曰卬字即我字沈存中以為秦語平音故謂之卬我新安陳氏曰以大任責已以大義責臣非不知遺以大投我以艱而責不得辭也以義言之當如此反觀之則以艱大沮撓者其為不義大矣己予惟小子不敢替上帝命天休于寜王興我小邦周寧王惟卜用克綏受茲命今天其相去聲民矧亦惟卜用嗚呼天明畏弼我丕丕基卜伐武庚而吉是上帝命伐之也上帝之命其敢廢乎昔天眷武王由百里而有天下亦惟卜用所謂朕夢協朕卜襲于休祥是也今天相佑斯民避凶趨吉况亦惟卜是用是上而先王下而小民莫不用卜而我獨可廢卜乎故又歎息言天之明命可畏如此是葢輔成我丕丕基業其可違也天命即上文所謂紹天明者呂氏曰天之明示威畏非以困我乃欲輔成我大業也如孟子言天將降大任必先苦其心志畏之者乃所以弼之也多難興邦殷憂唘聖此周公自强處即所以畏天命王曰爾惟舊人爾丕克逺省息并反爾知寧王若勤哉天閟毖並音秘我成功所予不敢不極卒寧王圖事肆予大化誘我友邦君天棐忱辭其考我民予曷其不于前寧人圖功攸終天亦惟用勤毖音秘我民若有疾予曷敢不于前寜人攸受休畢當時邦君御事有武王之舊臣者亦憚征役上文考翼不可征是也故周公専呼舊臣而告之曰爾惟武王之舊人爾大能逺省前日之事爾豈不知武王若此之勤勞哉閟者否部鄙反閉而不通毖者艱難而不易言天之所以否閉艱難國家多難去聲者乃我成功之所在我不敢不極卒武王所圖之事也化者化其固滯誘者誘其順從棐輔也寧人武王之大臣當時謂武王為寜王因謂武王之大臣為寜人也民獻十夫以為可伐是天輔以誠信之辭考之民而可見矣我曷其不於前寧人而圖功所終乎勤毖我民若有疾者四國勤毖我民如人有疾必速攻治之我曷其不於前寜人所受休美而畢之乎按此三節謂不可不卒終畢寜王寜人事功休美之意言寜人則舊人之不欲征者亦可愧矣朱子曰諸家棐字並作輔字訓固為可通後讀漢書顔師古註云匪棐通用如書中棐字正合作匪字義曰忱諶字只訓信天棐忱如云天不可信唐孔氏三節文辭畧同義不甚異使林氏曰武庚之叛是天閟塞之而欲其毖慎葢將我操心危而慮患深養其徳慧術智於疢疾之中此正我勘定禍難以成武功之所也新安許氏月卿曰天意欲征武庚故此歸之於天非諄諄然命之也民心之所欲即是天意如此陳氏大猷曰圖事以其所行言圖功以其所成言休以受命言反覆論之耳王曰若昔朕其逝朕言艱日思若考作室既底法厥子乃弗肯堂矧肯構音姤厥父菑音茲厥子乃弗肯播矧肯穫厥考翼其肯曰予有後弗棄基肆予曷敢不越卬敉寜王大命昔前日也猶孟子昔者之昔若昔我之欲往我亦謂其事之難而日思之矣非輕舉也以作室喻之父既底定廣狹髙下其子不肯為之堂基况肯為之造屋乎以耕田喻之父既反土而菑矣其子乃不肯為之播種况肯俟其成而刈穫之乎考翼父敬事者也為其子者如此則考翼其肯曰我有後嗣弗棄我之基業乎葢武王定天下立經陳紀如作室之底法如治田之既菑今三監平聲叛亂不能討平以終武王之業則是不肯堂不肯播况望其肯搆肯穫而延綿國祚於無窮乎武王在天之靈亦必不肯自謂其有後嗣而不棄墜其基業矣故我何敢不及我身之存以撫存武王之大命乎按此三節申喻不可不終武功之意若兄考乃有友伐厥子民養其勸弗救民養未詳蘇氏曰養厮養也謂人之臣僕大意言若父兄有友攻伐其子為之臣僕者其可勸其攻伐而不救乎父兄以喻武王友以喻四國子以喻百姓民養以喻邦君御事今王之四國毒害百姓而邦君臣僕乃憚於征役是長其患而不救其可哉此言民被四國之害不可不救援之意王曰嗚呼肆哉爾庶邦君越爾御事爽邦由哲亦惟十人廸知上帝命越天棐忱爾時罔敢易法矧今天降戾音利于周邦惟大艱人誕鄰胥伐于厥室爾亦不知天命不易肆放也欲其舒放而不畏縮也爽明也爽厥師之爽桀昏徳湯伐之故言爽師受昏徳武王伐之故言爽邦言昔武王之明大命於邦皆由明智之士亦惟亂臣十人蹈知天命及天輔武王之誠以克商受爾於是時不敢違越武王法制憚於征役矧今武王死天降禍於周首大難之四國大近相攻於其室事危勢廹如此爾乃以為不可征爾亦不知天命之不可違越矣此以今昔互言責邦君御事之不知天命按先儒皆以十人為十夫然十夫民之賢者爾恐未可以為廸知帝命未可以為越天棐忱所謂廸知者蹈行真知之詞也越天棐忱天命已歸之詞也非亂臣昭武王以受天命者不足以當之况君奭之書周公歴舉虢叔閎夭之徒亦曰廸知天威於受殷命亦曰若天棐忱詳周公前後所言則十人之為亂臣又何疑哉予永念曰天惟喪去聲殷若穡音色夫予曷敢不終朕畆天亦惟休于前寧人天之喪殷若農夫之去草必絶其根本我何敢不終我之田畆乎我之所以終畆者是天亦惟欲休美於前寧人也林氏曰我長念於心則謂天以紂之暴虐而改命我周其於殷人也若穡夫治田去其稂莠必芟夷藴崇之絶其根本勿使能植而後已今也有遺種焉則我何敢不於田畆之中而畢其事乎葢武庚之叛而不去則為不終朕畆矣予曷其極卜敢弗于從率寜人有指疆土矧今卜并吉肆朕誕以爾東征天命不僭卜陳惟若茲我何敢盡欲用卜敢不從爾勿征葢率循寜人之功當有指定先王疆土之理卜而不吉固將伐之况今卜而并吉乎故我大以爾東征天命斷不僭差卜之所陳葢如此按此篇専主卜言然其上原天命下述得人往推寜王寜人不可不成之功近指成王邦君御事不可不終之責諄諄乎民生之休戚家國之興喪懇惻切至不能自已而反復終始乎卜之一説以通天下之志以斷天下之疑以定天下之業非聰明睿知神武而不殺者孰能與於此哉朱子曰如周誥諸篇不過説周合代商之意是當時説話其間多有不可解者亦自觀其大意所在而已書亦難點如大誥語句甚長今人都碎讀了所以曉不得本新安陳氏曰東征之舉以天命與先王之責決之不待卜况今卜又并吉故我大以爾東征天命討罪決不僭差卜之所陳葢如此此總陳前諸章之意而結之以哲人與元龜知天意之當從前業之當終而決於東征也喪西山真氏曰此章以予永念發端下分三説天命殷我不可不終其事一也天降休命于武王凡今所有之疆土皆前人之所區畫我可不率其舊如韓愈所謂惟天惟祖宗所以付任予者庶其在此予曷敢不力二也其下乃言今卜并吉是天實命我所不可違三也予曷其極卜言不必窮極於卜也卜陳惟若茲言卜亦不外乎此也先以理斷而後以卜叅之葢不特不違卜亦本不専恃於卜也卿董氏鼎曰帝王之決大疑必詢謀僉同謀及乃心士庶民而後及卜筮葢以人謀既協乃決於天商之亡也格人元龜罔敢知吉周之東征也民獻十夫予翼而卜又并吉此大誥一書所以始終言之㣲子之命㣲國名子爵也成王既殺武庚封㣲子於宋以奉湯祀史録其誥命以為此篇今文無古文有史記帝乙長子曰㣲子啟母賤不得嗣少子辛之母正后辛立是為紂林氏曰詔王子出廸語云㣲子去之㣲子當紂之時處可疑之地而去商亦遯于荒野而已及武王克商始抱祭器歸周武王使復其位初以殷之封爵居舊位也不曰宋公之命而曰㣲子之命葢周以賔待之非欲臣之也箕子㣲子雖歸周而未嘗臣周所以與比干竝稱三仁吳氏曰武王克殷封武庚於殷墟封㣲子於宋樂記言武王下車投殷後於宋是也及武庚叛成王殺之始即㣲子已封之宋國建之為上公以奉湯祀葢申命之書非先未封至此始封之也凡策命諸侯必有初封之辭如蔡仲之命乃命諸王邦之蔡之類此篇初無此等語也史記世家言周公既承王命誅武庚乃命㣲子代殷後奉其先祀作㣲子之命以申之其説為是且武王猶封箕子於朝鮮豈有捨㣲子不封待成王而後封乎子陳氏經曰當武庚叛後殷餘民猶思商以㣲之賢處疑忌之地而命之之辭如此聖人寛大公平之用心也新安陳氏曰殺武庚始命㣲子奉湯祀者葢紂以嫡子立為天子武庚紂子實為大宗子㣲子不過支子爾武庚在為殷後奉湯祀者武庚也㣲子不得與也武庚死殷命黜㣲子始得代之為殷後與王氏炎曰紂之後可絶湯之祀不可絶也王若曰猷殷王元子惟稽古崇徳象賢統承先王修其禮物作賔于王家與國咸休永世無窮元子長子也㣲子帝乙之長子紂之庶兄也崇徳謂先聖王之有徳者則尊崇而奉祀之也象賢謂其後嗣子孫有象先聖王之賢者則命之以主祀也言考古制尊崇成湯之徳以㣲子象賢而奉其祀也禮典禮物文物也修其典禮文物不使廢壞以備一王之法也孔子曰夏禮吾能言之把不足徴也殷禮吾能言之宋不足徴也文獻不足故也殷之典禮㣲子修之至孔子時已不足徴矣故夫子惜之賔以客禮遇之也振鷺言我客戾至左氏謂宋先代之後天子有事膰焉有喪拜焉者也呂氏曰先王之心公平廣大非若後世滅人之國惟恐苖裔之存為子孫害成王命㣲子方且撫助愛養欲其與國咸休永世無窮公平廣大氣象於此可見張氏曰本湯言之曰崇徳自㣲子言之曰象賢王氏炎曰修禮物者自正朔外不用時王制度而用其舊儀呂氏曰象非止訓似曰象者欲其盛徳之象形容長存而不泯也先王封先代之後欲存先代典禮者葢以損益之理若循環然先代禮物不修後聖有作扶衰救弊何所稽考乎孔子歎文獻之不足徴與商頌僅得十二之五皆後世不能修禮物故也新安陳氏曰稽古崇徳象賢一句為一篇之綱領此章自崇徳象賢至作賔王家皆承稽古二字崇徳象賢固稽古典為之使修先代禮物作時王之賔客亦稽古典為之也如立堯後以作虞賔立夏後以修夏禮皆古人所已行者稽古以下四句所以考之於既往與國咸休二句所以期之於方來又曰象賢之賢獻也禮物文也文非獻不能修宋初所以能修禮物以有㣲子之賢也孔子時宋文獻不足徴繼之者不能賢如㣲子故也故尤以象賢為重前日失之於武庚今日得之於㣲子所以下文深取其踐修厥猷恪慎孝恭有此賢徳上可象湯徳以繼前聖下可修禮物以俟後聖焉嗚呼乃祖成湯克齊聖廣淵皇天眷佑誕受厥命撫民以寛除其邪虐功加于時徳垂後裔齊肅也齊則無不敬聖則無不通廣言其大淵言其深也誕大也皇天眷佑誕受厥命即伊尹所謂天監厥徳用集大命者撫民以寛除其邪虐即伊尹所謂代虐以寛兆民允懷者功加于時言其所及者衆徳垂後裔言其所𫝊者逺也後裔即㣲子也此崇徳之意呂氏曰齊聖廣淵不可分當於此識湯徳之全體湯克寛克仁代虐以寛則其開六百年基業正在於寛誠新安陳氏曰齊誠一也齊如中庸所謂惟天下至聖即惟天下至聖廣淵即溥博淵泉也湯之寛亦非縱弛之廣乃自齊聖廣淵盛徳中流出總言之皆垂後裔之徳之源也功加于時功即徳之效徳垂後裔徳即功之本互言之爾湯之功徳𫝊祀六百開闢以來莫加焉而可使之不祀乎此所以生下文之意也爾惟踐修厥猷舊有令聞並去聲恪慎克孝肅恭神人予嘉乃徳曰篤不忘上帝時歆下民祇協庸建爾于上公尹茲東夏猷道令善聞譽也㣲子踐履修舉成湯之道舊有善譽非一日也恪敬也恪謹克孝肅恭神人指㣲子實徳而言抱祭器歸周亦其一也篤厚也我善汝徳曰厚而不忘也歆饗庸用也王者之後稱公故曰上公尹治也宋亳在東故曰東夏此象賢之意張氏曰恪慎在心肅恭在貌克孝内也故言恪慎神人外也故言肅恭忘唐孔氏曰左傳僖十二年王命管仲有曰謂督不即此曰篤不忘類也郊王氏曰宋商後得郊天故云上帝時歆記曰宋之也契也西山真氏曰恪慎克孝是事親以敬也肅恭神人是事神治人亦以敬也敬以事神故上帝時歆敬以治人故下民祇協古聖賢惟以敬用功而已㣲子之徳信乎其為象賢也葉氏曰周制三公在朝八命有功徳出封作伯九命謂之上公二王後亦出封之公也抱陳氏經曰鎬在西故以宋為東夏息齋徐氏曰祭器歸周與商書㣲子篇末𫝊異欽哉往敷乃訓慎乃服命率由典常以蕃王室𢎞乃烈祖律乃有民永綏厥位毗予一人世世享徳萬邦作式俾我有周無斁音亦此因戒勉之也服命上公服命也宋王者之後成湯之廟當有天子禮樂慮有僭擬之失故曰謹其服命率由典常以戒之也𢎞大律範毗輔式法斁厭也即詩言在此無斁之意林氏曰偪生於僭僭生於疑非疑無僣非僭無偪音逼謹其服命遵守典常安有偪僭之過哉魯實侯爵乃以天子禮樂祀周公亦既不謹矣其後遂用於羣公之廟甚至季氏僭八佾三家僭雍徹其原一開末流無所不至成王於宋謹慎如此必無賜周公以天子禮樂之事豈周室既衰魯竊僭用託為成王之賜伯禽之受乎西山真氏曰㣲子既篤於敬矣而猶勉以欽哉欲其敬而益敬也能敬始能全敷敎訓慎服命以下之衆美因以戒勉期望之也陳氏大猷曰此章廣上文統承先王至永世無窮之意能陳氏雅言曰以者承上之辭如以親九族之以葢戒其所不當為者即能勉其所當為非於所戒之外别有所勉之事也蘇氏曰當武庚叛餘以新造之周侯前代未盡亡之賢子則㣲子葢處可疑之地禁戒之辭隄防之具宜悉也乃命之曰上帝時歆曰𢎞乃烈祖曰萬邦作式此三代之事後世胡可及也嗚呼往哉惟休無替朕命歎息言汝往之國當休美其政而無廢棄我所命汝之言也呂氏曰君子所過者化殺武庚叛者殺之爾封㣲子賢者封之爾周何心哉殺武庚義也封㣲子仁也白陳氏曰武庚以叛黜復命㣲子常情於此孰不暴其罪明黜殷之由今此篇丁寜惻怛無一言及武庚事以傷㣲子之心葢誥命賢者其體當如此西山真氏曰此非特得誥命賢者之體葢武庚之罪當行天討㣲子之徳當加天命非有一毫喜怒之私故其從容和平畧無忿疾之意於此可見聖人之心矣友王氏炎曰泰誓牧誓言紂之失至於再三與周之邦及從征之臣言也酒誥言紂之失亦無所隱兄弟之間相與言也至多士多方言紂之失則畧與殷之遺民言也㣲子之命竝無一字及紂與武庚之事不可對商之賢子言也而惟言湯之聖㣲子之賢其言有體也哉康誥康叔文王之子武王之弟武王誥命為衛侯今文古文皆有按書序以康誥為成王之書今詳本篇康叔於成王為叔父成王不應平聲以弟稱之説者謂周公以成王命誥故曰弟然既謂之王若曰則為成王之言周公何敢自以弟稱之也且康誥酒誥梓材三篇言文王者非一而畧無一語以及武王何耶説者又謂寡兄朂為稱武王尤為非義寡兄云者自謙之辭寡徳之稱苟語他人猶之可也武王康叔之兄家人相語周公安得以武王為寡兄而告其弟乎或又謂康叔在武王時尚幼故不得封然康叔武王同母弟武王分封之時年已九十安有九十之兄同母弟尚幼不可封乎且康叔文王之子叔虞成王之弟周公東征叔虞已封於唐豈有康叔得封反在叔虞之後必無是理也又按汲冡周書克殷篇言王即位於社南羣臣畢從毛叔鄭奉明水衛叔封𫝊禮召公奭贊采師尚父音甫牽牲史記亦言衛康叔封布茲註蓐席也與汲書大同小異康叔在武王時非幼亦明矣特序書者不知康誥篇首四十八字為洛誥脱簡遂因誤為成王之書是知書序果非孔子所作也康誥酒誥梓材篇次當在金縢之前或問孔氏小序以康誥為成王周公之書而子以武王言之何也朱子曰此五峯胡氏之説也嘗因而考之其曰朕弟寡兄皆為武王之自言乃得事理之實而其他證亦多小序之言不足深信也胡氏於皇王大紀考究得康誥非周公成王時乃武王時葢有朕其弟之語若成王則康叔為叔父矣又首尾只稱文考成王周公必不只稱文考又有寡兄之語亦是武王自稱無疑如今人稱劣兄之類又康叔得禾𫝊記所載成王先封唐叔後封康叔決無姪先叔之理康誥三篇此是武王書無疑其中分明説王若曰孟侯朕其弟小子封豈有周公方以成王之命命康叔而遽述已意以告之乎決不解如此五峯吳才老皆説是武王書只縁誤以洛誥書首一叚置在康誥之前故叙其書於大誥㣲子之命之後問如此則封康叔在武庚未叛之前矣曰想是同時商畿千里紂之地亦甚大所封必不止三兩國也惟三月哉生魄一叚自是脱落分曉且如朕弟寡兄是武王自告康叔之詞無疑葢武王周公康叔同呌作兄豈應周公對康叔一家人説話安得呌武王作寡兄以告其弟乎葢寡者是向人稱我家我國長上之詞也只被其中有作新大邑於周數句遂牽引得序來作成王時書若是成王不應所引多文王而不及武王且如今人纔説太祖便不及太宗也又問殷地武王既以封武庚而使三叔監之矣以何處封康叔曰既言以殷餘民封康叔豈非封武庚之外又以封之乎孔氏曰康圻内國名叔封字林氏曰康乃叔未受封時食采之地或曰康諡也也鄭氏曰康叔初封衛至子孫而并邶鄘惟三月哉生魄周公初基作新大邑于東國洛四方民大和會侯甸男邦采衛百工播民和見音現士于周周公咸勤乃洪大誥治三月周公攝政七年之三月也始生魄十六日也百工百官也士説文曰事也詩曰勿士行枚呂氏曰斧斤版築之事亦甚勞矣而民大和會悉來赴役即文王作靈臺庶民子來之意蘇氏曰此洛誥之文當在周公拜手稽首之上唐孔氏曰男下獨有邦以五服男居其中則五服皆有邦可知禹貢五服通王畿此在畿外者林氏曰周九服侯甸男采衛蠻夷鎮藩會于洛邑惟内五服也潘氏曰勤猶杕杜以勤歸之勤洪大也經之言複者多矣新安陳氏曰初基定基址也鎬在西洛在東故曰東國洛見士朝見而趨事也民大和會人心本自和也播民和因人心之和而播敷宣暢其和也悦以使民民忘其勞公不忘民之勞而勤勞之所以得民心也以召誥攷之周公以三月十二日乙夘至洛先觀召公營洛規模十四日丁巳行郊禮十五日戊午行社禮十六日己未初基作洛繼此五日内號召齊集計度區畫分配科𣲖至二十一日甲子朝乃用書命庶殷諸侯丕作召誥所謂用書命丕作即此所謂洪大誥治也如召誥𫝊中引春秋𫝊士彌牟營成周之類叅以召誥日月脗合洛誥冠以此九句方有頭緒强附之此全不相應其為洛誥脱簡何可疑者諸家阿附牽强解之非矣陳氏雅言曰遷都定國之事非民之和則不足以有為非民力之勤則不足以有成然其所以能勤者皆由於能和也其心既和則其力自勤而况有百工以播其和有周公以咸其勤王若曰孟侯朕其弟小子封王武王也孟長上聲也言為諸侯之長也封康叔名舊説周公以成王命誥康叔者非是吳氏曰詩序言衛不能修方伯連帥之職康叔之為方伯無疑先儒謂康叔受封時尚幼者以此書稱小子之故康叔與武王周公皆太姒之子安得為尚幼今陜右之俗凡尊命卑貴命賤雖長且老者亦以小子呼之表見親愛之辭此所謂小子亦然惟乃丕顯考文王克明徳慎罰左氏曰明徳謹罰文王所以造周也明徳務崇之之謂謹罰務去之之謂明徳謹罰一篇之綱領不敢侮鰥寡以下文王明徳謹罰也汝念哉以下欲康叔明徳也敬明乃罰以下欲康叔謹罰也爽惟民以下欲其以徳行罰也封敬哉以下欲其不用罰而用徳也終則以天命殷民結之林氏曰此篇多及慎罰用刑者按左𫝊周克商蘇忿生以温為司宼立政司冦蘇公是也又曰武王之母弟八人康叔為司冦則康叔以衛侯入繼蘇忿生為之故并以詰姦刑暴之事告之其曰外事外正以外言者治殷民於衛也以衛為外則内事者王朝司寇之事也故以刑罰為詳慕陳氏大猷曰治天下不過徳刑兩端徳者人所同感化人心之本也文王則克明之使民慕而入於徳罰者人所同畏防範人心之具也文王則克謹之使民畏而不入於罰不敢侮鰥寡庸庸祇祇威威顯民用肇造我區夏越我一二邦以修我西土惟時怙音户冒聞于上帝帝休天乃大命文王殪音意戎殷誕受厥命越厥邦厥民惟時叙乃寡兄朂肆汝小子封在兹東土鰥寡人所易忽也於人易忽者而不忽焉以見聖人無所不敬畏也即堯不虐無告之意論文王之徳而首發此非聖人不能也庸用也用其所當用敬其所當敬威其所當威言文王用能敬賢討罪一聽於理而已無與焉故徳著於民用始造我區夏及我一二友邦漸以修治至罄西土之人怙之如父冒之如天明徳昭升聞于上帝帝用休美乃大命文王殪滅大殷大受其命萬邦萬民各得其理莫不時叙汝寡徳之兄亦勉力不怠故爾小子封得以在此東土也吳氏曰殪戎殷武王之事也此稱文王者武王不敢以為己之功也又按東土云者武王克商分紂城朝歌以北為邶音佩南為鄘音容東為衛意邶鄘為武庚之封而衛即康叔也漢書言周公善康叔不從管蔡之亂似地相比近之辭然不可考矣陳氏大猷曰不敢侮鰥寡者仁民也庸庸使能也祇祇尊賢也明徳之事威威懲惡也慎罰之事是是非非使民曉然知所好惡所以顯民也恐康叔以受封為當然故歴言文王之積累汝兄之勉勵故汝得有此土也庶其念所自之艱難而不敢慢易也武新安陳氏曰諸儒泥周公命康叔之説者謂公呼王為寡有之兄言其徳不羣也豈事理名稱之實乎惟是武王自言故稱文王詳而自謂甚略只以一朂字見其自勉若周公之言豈論武王如此簡略且朂字惟自謙乃可言耳王曰嗚呼封汝念哉今民將在祇遹音聿乃文考紹聞衣去聲徳言往敷求于殷先哲王用保乂民汝丕逺惟商耉成人宅心知訓别求聞由古先哲王用康保民𢎞于天若徳裕乃身不廢在王命此下明徳也遹述衣服也今治民將在敬述文考之事繼其所聞而服行文王之徳言也往之國也宅心處心也安汝止之意知訓知所以訓民也由行也曰保乂曰知訓曰康保經緯以成文爾武王既欲康叔祇遹文考又欲敷求商先哲王又丕逺惟商耉成人又别聞由古先哲王近述諸今逺稽諸古不一而足以見義理之無盡易曰君子多識音志前言往行胡孟反以蓄其徳𢎞者廓而大之也天者理之所從出也康叔博學以聚之集義以生之真積力久衆理該通此心之天理之所從出者始恢廓而有餘用矣若是則心廣體胖音盤動無違禮斯能不廢在王之命也呂氏曰康叔歴求聖賢問學至于𢎞于天徳裕身可謂盛矣止能不廢王命才可免過而已此見人臣職分之難盡若欲為子必須如舜與曾閔方能不廢父命若欲為臣必須如舜與周公方能不廢君命林氏曰唯求老成法往古又當𢎞于天召誥曰則無遺夀耉其稽我古人之徳又能稽謀自天即此意陳氏雅言曰明徳之道固當全備衆理而後有以窮天下之善尤當貫通一理而後有以廓此心之天此即伊尹告太甲以主善為師協子克一之意也王曰嗚呼小子封恫瘝乃身敬哉天畏棐忱民情大可見小人難保往盡乃心無康好去聲逸豫乃其乂民我聞曰怨不在大亦不在小惠不惠懋不懋恫音通瘝姑還反恫痛瘝病也視民之不安如疾痛之在乃身不可不敬之也天命不常雖甚可畏然誠則輔之民情好惡竝去聲雖大可見而小民至為難保汝往之國所以治之者非他惟盡汝心無自安而好逸豫乃其所以治民也古人言怨不在大亦不在小惟在順不順勉不勉耳順者順於理勉者勉於行胡孟反即上文所謂往盡乃心無康好逸豫者也朱子曰恫瘝常如疾痛之在身則無不覺矣孔氏曰治民務除惡政當如痛病在汝身欲去之哉夏氏曰民之休戚汝之休戚也故曰恫瘝乃身敬以下即當敬之事爾呂氏曰命爾為侯非富貴之也乃委痛病於爾身上則天棐忱下則民難保非痌瘝乃身乎怨陳氏經曰不必求之天求之民可也當林氏曰致無小無大皆足以召亂當順而不順勉而不勉皆致怨之道必順於理而勉於行怨庶可弭也已汝惟小子乃服惟𢎞王應保殷民亦惟助王宅天命作新民服事應和也汝之事惟在廣上徳意和保殷民使之不失其所以助王安定天命而作新斯民也此言明徳之終也大學言明徳亦舉新民終之朱子曰鼓之舞之之謂作言攘起其自新之民也所鼓之舞之如擊鼓然自然使人跳舞踴躍然民之以感動者由其本有此理但上之人既自有以明其明徳時時提撕警發則下之觀瞻感化各自有以興起其同然之善心而不能已耳人林氏曰應保者因人情而安之謂應其所欲也如情莫不欲壽則生之而不傷人情莫不欲富則厚之而不困人情莫不欲安則扶之而不危所欲與聚所惡勿施皆所以應而保之也陳氏大猷曰殷民乃天命所視以去留人心所視以觀化保殷民所以助王宅天命而作新民也新安陳氏曰此欲康叔法文王之明徳而極於新民也大學𫝊引康誥曰克明徳即截上文克明徳慎罰一句上三字引作新民即此章此一句也大學三綱領之二其源實出於康誥二帝夏商以來言明徳者有矣未有言新民者言克明徳作新民體用相對首見於康誥而大學祖述之謂康誥非大學之宗祖可乎王曰嗚呼封敬明乃罰人有小罪非𤯝乃惟終自作不典式爾有厥罪小乃不可不殺乃有大罪非終乃惟𤯝災適爾既道極厥辜時乃不可殺此下謹罰也式用適偶也人有小罪非過誤乃其固為亂常之事用意如此其罪雖小乃不可不殺即舜典所謂刑故無小也人有大罪非是故犯乃其過誤出於不幸偶爾如此既自稱道盡輸其情不敢隱匿罪雖大時乃不可殺即舜典所謂宥過無大也諸葛孔明治蜀服罪輸情者雖重必釋其既道極厥辜時乃不可殺之意歟朱子曰不典式爾古註式訓勉蘇云爾是人自言法當如此皆迂予謂此不可曉大槩是宥過刑故之意非蘇氏曰此設為死罪之大小以明其情之有輕重謂小罪為可殺也如甲乙皆有死罪而甲之罪小於乙非謂其罪不至死也今世之法謀殺己傷雖未殺皆死雖未傷而寘人於必死之地亦死過失殺雖已殺皆贖與此意畧相似蔡氏元度曰欽哉欽哉用刑不可不敬也惟明克允用刑不可不明也殺新安陳氏曰小罪不可不殺小罪怙終刑之可也之無乃過乎葢敗常越雅其罪雖小其情乃亂之原不殺則為害將甚大曰有者謂小罪中有如此者非謂凡有小罪而怙終者皆殺之也此又宜於作不典觀之王曰嗚呼封有叙時乃大明服惟民其勅懋和若有疾惟民其畢棄咎若保赤子惟民其康乂有叙者刑罰有次序也明者明其罰服者服其民也左氏曰乃大明服已則不明而殺人以逞不亦難乎勅戒勅也民其戒勅而勉於和順也若有疾者以去疾之心去惡也故民皆棄咎若保赤子者以保子之心保善也故民其安治朱子曰若有疾刑人如痛在巳又恫瘝之意張氏曰刑罰足以制人之形而不足以服人之心必不紊刑之倫序時乃大明刑罰而足以服其心宜民勅懋而且和也人林氏曰若有疾若保赤子皆出於中心之誠然葢有疾而欲去之有赤子而欲保之此豈可以偽為舉斯心以加諸彼則無往而不為仁矣至陳氏大猷曰去民之惡如去己疾則調治無所不必盡棄其咎矣保其民如保巳之赤子則愛䕶無所不至民必康且乂矣先言有疾後言赤子葢民棄咎然後可康乂也使新安陳氏曰此處三言惟民其必加以後之二譬民棄咎康乂而後可全其勅懋和也非汝封刑人殺人無或刑人殺人非汝封又曰劓刵音乂貳人無或劓刵人刑殺者天之所以討有罪非汝封得以刑之殺之也汝無或以己而刑殺之刵截耳也刑殺刑之大者劓刵刑之小者兼舉小大以申戒之也又曰當在無或刑人殺人之下又按刵周官五刑所無呂刑以為苗民所制朱子曰康叔為周司冦故一篇多説用刑須改其句呂氏説非汝封刑人殺人則人亦無敢刑人殺人又曰非汝封劓刵人則人亦無敢劓刵人葢言用刑之權正在康叔不可不謹之意耳王曰外事汝陳時臬音揑司師茲殷罰有倫外事未詳陳氏曰外事有司之事也臬法也為凖限之義言汝於外事但陳列是法使有司師此殷罰之有倫者用之爾呂氏曰外事衛國事也史記言康叔為周司冦司冦王朝之官職任内事故以衛國對言為外事今按篇中言往敷求往盡乃心篇終曰往哉封皆令其之國之辭而未見其留王朝之意但詳此篇康叔葢深於法者異時成王或舉以任司冦之職而此則未必然也陳氏大猷曰上章槩言用刑此章専言衛國之刑故以外事别之猶下文言外庶子外正也臬門梱也有限凖之義故以訓法猶謂法為律也衛居殷墟法乃殷民所安也又曰要囚服念五六日至于旬時丕蔽要囚要囚獄辭之要者也服念服膺而念之旬十日時三月為去聲囚求生道也蔽斷也蘇氏曰服念為囚求生道也求之旬時而終無生道乃可殺三林氏曰唐太宗謂羣臣曰死者不可復生決囚須覆奏頃刻之間何暇思慮自今宜五覆奏正得康誥要囚之意獄新安陳氏曰按歐陽公瀧岡阡表載其父崇公任官每為囚求生道嘗曰為之求生道而不得夫然後我與死者可以俱無憾矣亦合此意王曰汝陳時臬音湼事罰蔽殷彝用其義刑義殺勿庸以次汝封乃汝盡遜曰時叙惟曰未有遜事義宜也次次舍之次遜順也申言敷陳是法與事罰斷以殷之常法矣又慮其泥去聲古而不通又謂其刑其殺必察其宜於時者而後用之既又慮其趨時而狥己又謂刑殺不可以就汝封之意既又慮其刑殺雖已當罪而矜喜之心乘之又謂使汝刑殺盡順於義雖曰是有次序汝當惟謂未有順義之事葢矜喜之心生乃怠惰之心起刑殺之所由不中去聲也可不戒哉孔氏曰用舊法典刑宜於時世者有陳氏大猷曰罰獨言之則兼刑殺上文殷罰倫是也與刑殺對言則罰輕刑重殺尤重也虚新安陳氏曰雖盡遜而惟曰未遜心常不自是則明公正之體不失而審慎矜恤之念常存刑罰之不中者鮮矣即呂刑所謂雖休勿休曾子所謂如得其情則哀矜而勿喜也已汝惟小子未其有若汝封之心朕心朕徳惟乃知已者語辭之不能已也小子幼小之稱言年雖少去聲而心獨善也爾心之善固朕知之朕心朕徳亦惟爾知之將言用罰之事故先發其良心焉新安陳氏曰能慎罰者汝之心欲汝慎罰者我之心我之心惟欲以徳行罰耳我之與汝心實相知所以深相孚契相戒飭也凡民自得罪寇攘姦宄音軌殺越人于貨暋音敏不畏死罔弗憝徒對反越顛越也盤庚云顛越不恭暋强憝惡去聲也自得罪非為去聲人誘陷以得罪也凡民自犯罪為盜賊姦宄殺人顛越人以取財貨强狠亡命者人無不憎惡之也用罰而加是人則人無不服以其出乎人之同惡而非即乎吾之私心也特舉此以明用罰之當去聲罪唐孔氏曰顛越人謂不死而傷一夏氏曰此不待敎而誅之者也陳氏大猷曰此節上下疑有闕文舉呂氏曰説者以凡民自得罪以下與上文不叶葢一端以為證驗也葢謂如此等罪之人人所同惡而刑加焉豈容以次汝封乎是謂刑加於自犯之罪也用刑皆如此則契公理矣所刑苟非人所同惡是移法就己也此新安陳氏曰呂説竒蔡亦略取之然平心讀五句實與上文不貫缺之良是王曰封元惡大憝矧惟不孝不友子弗祇服厥父事大傷厥考心于父不能字厥子乃疾厥子于弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友于弟惟弔音的兹不于我政人得罪天惟與我民彝大泯音敏亂曰乃其速由文王作罰刑茲無赦大憝即上文之罔弗憝言冦攘姦宄固為大惡而大可惡矣况不孝不友之人而尤為可惡者當商之季禮義不明人紀廢壞子不敬事其父大傷父心父不能愛子乃疾惡去聲其子是父子相夷也天顯猶孝經所謂天明尊卑顯然之序也弟不念尊卑之序而不能敬其兄兄亦不念父母鞠養之勞而大不友其弟是兄弟相賊也父子兄弟至於如此苟不於我為政之人而得罪焉則天之與我民彝必大泯滅而紊亂矣曰者言如此則汝其速由文王作罰刑此無赦而懲戒之不可緩也朱子曰惟弔兹惟痛憫此得罪之人也不于我政人得罪憫痛之深恨不自我得罪也責蔡氏元度曰先責子之不孝然後責父之不慈先弟之不恭然後責兄之不友周禮有不孝不弟之刑而無不慈不友之罪即此意也張氏曰民之秉彝民彝常性之謂也呂氏曰前言殷罰殷彝此言文王作罰刑者殷法常事用之父子兄弟之獄則用文王之法經紂之惡人倫戕敗文王於維持綱常之罰有作焉如地官不孝不弟之刑之類故以殷法治殷俗因人情之所安也以文王罰刑誅不孝不友撥殷亂之所在也言新安陳氏曰按前已告康叔明徳以作新民矣此慎罰而速懲不孝不友者盖已致新民之功不率而後方嚴齊民之刑何用法峻急之有又按此章孔註甚明蔡𫝊從之當矣不率大戞矧惟外庶子訓人惟厥正人越小臣諸節乃别播敷造民大譽弗念弗庸瘝厥君時乃引惡惟朕憝已汝乃其速由兹義率殺戞法也言民之不率敎者固可大寘之法矣况外庶子以訓人為職與庶官之長及小臣之有符節者乃别布條敎違道干譽弗念其君弗用其法以病君上是乃長上聲惡於下我之所深惡也臣之不忠如此刑其可已乎汝其速由此義而率以誅戮之可也按上言民不孝不友則速由文王作罰刑茲無赦此言外庶子正人小子背上立私則速由茲義率殺其曰刑曰殺若用法峻急者葢殷之臣民化紂之惡父子兄弟之無其親君臣上下之無其義非繩之以法示之以威殷民孰知不孝不義之不可干哉周禮所謂刑亂國用重典者是也然曰速由文王曰速由兹義則其刑其罰亦仁厚而已矣孔氏曰戞常也凡民不循大常之敎猶刑之無赦下新安陳氏曰不率大戞一句或以屬上文或以屬文不勝異説此句合缺疑吳氏曰速由兹義率殺即前文王所作罰刑無非義也非王氏日休曰前言速由文王作罰此速由兹義豈指文王之義刑義殺乎亦惟君惟長不能厥家人越厥小臣外正惟威惟虐大放王命乃非徳用乂君長指康叔而言也康叔而不能齊其家不能訓其臣惟威惟虐大廢棄天子之命乃欲以非徳用治是康叔且不能用上命矣亦何以責其臣之瘝厥君也哉朱子曰乃非徳用乂言汝若寛縱則小臣外正皆得為威虐汝之為此欲以徳乂民而實非徳也姑息而已蘇等説懲王氏之弊一槩以寛為説恐非聖人刑人正法之意也林氏曰不能厥家人如左傳云不能其大夫至于君祖母以及國人也汝亦罔不克敬典乃由裕民惟文王之敬忌乃裕民曰我惟有及則予一人以懌汝罔不能敬守國之常法由是而求裕民之道惟文王之敬忌敬則有所不忽忌則有所不敢期裕其民曰我惟有及於文王則予一人以悦懌矣此言謹罰之終也穆王訓刑亦曰敬忌云朱子曰文王之敬忌忌惡也林氏曰裕民豈他求哉惟文王之敬忌而已敬則有所尊而能順其所為忌則有所畏而能戒其所不為陳氏大猷曰敬則律已嚴而感率者盡裕則待人寛而從容自從然敬典而不知忌刑亦非所以全裕民之道惟法文王之敬典忌刑乃能裕民耳弗念弗庸既以為朕憝則敬忌裕民人其有不懌乎唐孔氏曰敬忌謂敬徳忌刑兩新安陳氏曰前言速由文王作罰速由茲義率殺言速由何其急速也此言乃由裕民乃裕民兩言乃裕又何其寛緩也始欲其以刑齊民以懲戒人之惡習終欲其以身率人以容養人之善心其急其緩竝行而不相悖也意陳氏大猷曰此上三節疑有錯簡諸家皆其然耳王曰封爽惟民廸吉康我時其惟殷先哲王徳用康乂民作求矧今民罔廸不適不廸則罔政在厥邦此下欲其以徳用罰也求等也詩曰世徳作求言明思夫民當開導之以吉康我亦時其惟殷先哲王之徳用以安治其民為等匹於商先王也廸即廸吉康之廸况今民無導之而不從者苟不有以導之則為無政於國矣廸言徳而政言刑也前既嚴之民又嚴之臣又嚴之康叔此則武王之自嚴畏也西山真氏曰欲導民於吉康其何以哉惟於殷先哲王之徳用以康乂民者作而求之而已葢殷先哲王之所為無非導民吉康之道也導之以仁義而民趨於仁義導之以孝弟而民趨於孝弟此則所謂吉康也政者所以正民不能導民俾知所適尚何政之有古之所謂政者合敎化而言後世所謂政者離敎化而言王曰封予惟不可不監告汝徳之説于罰之行今惟民不静未戾厥心廸屢未同爽惟天其罰殛我我其不怨惟厥罪無在大亦無在多矧曰其尚顯聞于天戾止也又言民不安静未能止其心之狠疾廸之者雖屢而未能使之上同乎治明思天其殛罰我我何敢怨乎惟民之罪不在大亦不在多苟為有罪即在朕躬况曰今庶羣腥穢之徳其尚顯聞于天乎新安陳氏曰我惟不可不監視古義即指文王明徳慎罰之義故告汝以徳之説於罰之行之時葢欲以徳行罰而非以罰行罰也今惟民不安静未定其心廸之雖屢而猶未同民之不静未同天將不罪民而罪導民者故爽明惟天其將伐殛我矣我其不當怨也惟其罪不在大與多一毫不盡且為有罪況曰其已上顯聞于天而欲逭天之罰殛可乎爽惟天其罰殛我與爽惟民廸吉康同爽惟葢當時語此王責己以勵康叔也要之此等語言多不可强解難通者不如缺之王曰嗚呼封敬哉無作怨勿用非謀非彝蔽時忱丕則敏徳用康乃心顧乃徳逺乃猷裕乃以民寜不汝瑕殄此欲其不用罰而用徳也歎息言汝敬哉毋作可怨之事勿用非善之謀非常之法惟斷以是誠大法古人之敏徳用以安汝之心省汝之徳逺汝之謀寛裕不廹以待民之自安若是則不汝瑕疵而棄絶矣陳氏經曰毋作致怨之事用敗事之謀變常之法皆起怨之道也蔽如一言以蔽之之蔽惟斷以至誠則能不惑於非謀非彝矣心之不安則必喜異而厭常徳之不顧則無内省之實猷之不逺則貪目前之利㤀他日之患凡此皆基於不誠也徳陳氏大猷曰為治有不易之定論通行之常道明慎罰是也捨是則為非謀非彝王恐叔惑於邪説異術謂民難以徳化易以刑服如封徳彝之惑太宗者故戒以勿用而惟斷以至誠也丕則敏徳大法古人之敏徳如上章法文王之明徳作求殷先哲王徳是也慮其悠悠而欲其汲汲故以敏徳言又恐其欲速也故又欲其安汝心安則恐其警省不至也故又欲其回顧汝徳顧則又恐其察慮之太廹也故又欲其𢎞逺汝謀庶能優㳺寛裕而與民相安矣西山真氏曰裕乃以民寜不必言行寛政但自無作怨以下數句行之優裕即所以致民之寜而民不瑕絶之也葢為善未至於優裕皆勉强也與前徳裕乃身之裕同至此則不言用罰而純言用徳矣陳氏雅言曰非謀非彞即作怨之事用康乃心顧乃徳逺乃猷裕乃以民寧皆敏徳之事王曰嗚呼肆汝小子封惟命不于常汝念哉無我殄享明乃服命髙乃聽用康乂民肆未詳惟命不于常善則得之不善則失之汝其念哉毋我殄絶所享之國也明汝侯國服命髙其聽不可卑忽我言用安治爾民也爾雅曰肆今也如復齋董氏曰肆語辭肆徂厥敬勞肆往姦宄皆語辭也享陳氏大猷曰無使我所與爾之爵土殄絶而不能也服命即所服受之誥命髙乃聽猶尊所聞王若曰往哉封勿替敬典聽朕告汝乃以殷民世享勿廢其所敬之常法聽我所命而服行之乃能以殷民而世享其國也世享對上文殄享而言朱子曰殄享世享皆享於天子致李氏杞曰康誥一篇始終以敬哉敬典為言是知敬之道乃修身治民之本康叔所以化商民之綱要莫大於此典新安陳氏曰商民不孝不友化之之本在於敬五耳勿替所當敬之典常即前所謂罔不克敬典者篇將終復申言之大學引惟命不于常而斷之曰道善則得之不善則失之矣弗髙聽則殄享不善而失之也敬典聽告則世享善則得之也武王封康叔拳拳反覆於文王明徳慎罰之家法無慮數百言末復以天命之無常享國之難必者警戒之康叔實能敬聽而力行其言衛之享國卒與周家相為長久吁豈偶然哉酒誥商受酗酒天下化之妹土商之都邑其染惡尤甚武王以其地封康叔故作書誥敎之云今文古文皆有按吳氏曰酒誥一書本是兩書以其皆為去聲下竝同酒而誥故誤合而為一自王若曰明大命于妹邦以下武王告受故都之書也自王曰封我西土棐徂邦君以下武王告康叔之書也書之體為去聲一人而作則首稱其人為衆人而作則首稱其衆為一方而作則首稱一方為天下而作則首稱天下君奭書首稱君奭君陳書首稱君陳為一人而作也甘誓首稱六事之人湯誓首稱格汝衆此為衆人而作也湯誥首篇萬方有衆大誥首稱大誥多邦此為天下而作也多方書為四國而作則首稱四國多士書為多士而作則首稱多士今酒誥為妹邦而作故首言明大命于妹邦其自為一書無疑按吳氏分篇引證固為明甚但既謂専誥毖妹邦不應平聲有乃穆考文王之語意酒誥専為妹邦而作而妹邦在康叔封圻之内則明大命之責康叔實任之故篇首専以妹邦為稱至中篇始名康叔以致誥其曰尚克用文王敎者亦申言首章文王誥毖之意其事則主於妹邦其書則付之康叔雖若二篇而實為一意雖若二事而實相首尾反復參究葢自為書之一體也朱子曰當初周公使管蔡者想見那時好在必不疑他後來必是武庚與商之頑民每日將酒去灌㗖他乘醉以語言離間之曰你是兄却出來在此周公是弟反執大權以臨天下管蔡想得被這幾個喚動了所以流言説公將不利於孺子這個都是武庚與商之頑民敎他所以使得這管蔡如此後來周公所以作酒誥丁寧如此必是當日因酒做出許多事中間想煞有説話而今書傳只載得大槩其中更有幾多機變曲折在徐孟寶問揚子雲言酒誥之篇俄空焉答曰孔書以巫蠱事不曾傳漢儒不曾見者多如鄭康成晉杜預皆然想揚子雲亦不曾見林氏曰紂以酒亡國餘習猶存酒誥所以作也専新安陳氏曰此篇初以酗酒戒妹土之人不為康叔言但責之康叔使明戒酒之命於國人後方呼康叔名以丁寜之至末云矧汝剛制于酒則専戒康叔之身欲其以身率國人也王若曰明大命于妹邦妹邦即詩所謂沬鄉篇首稱妹邦者誥命専為妹邦發也孔氏曰妹地紂所都朝歌以北是陳薛氏曰妹古沬字沬水名因水名地新安氏曰提起頭説今明大命令于妹邦大命即下文是乃穆考文王肇國在西土厥誥毖庶邦庶士越少正御事朝夕曰祀茲酒惟天降命肇我民惟元祀穆敬也詩曰穆穆文王是也上篇言文王明徳則曰顯考此篇言文王誥毖則曰穆考言各有當也或曰文王世次為穆亦通毖戒謹也少正官之副貳也文王朝夕勅戒之曰惟祭祀則用此酒天始令民作酒者為大祭祀而已西土庶邦逺去商邑文王誥毖亦諄諄以酒為戒則商邑可知矣文王為西伯故得誥毖庶邦云新安陳氏曰按昭穆之穆與左傳合不易之論以穆考為穆穆之穆則詩稱武王曰率見昭考此昭字又如何訓耶穆穆之證非也正王氏炎曰官正曰長亞曰少御事治事之臣也有有少以唐孔氏曰世本云儀狄造酒又云杜康造酒本人意為之今言天降命葢人為亦天之所使也林氏曰非大祀而用酒則非天之所以降命之本意矣天降畏我民用大亂喪去聲下同徳亦罔非酒惟行去聲越小大邦用喪亦罔非酒惟辜酒之禍人也而以為天降威者禍亂之成是亦天爾箕子言受酗酒亦曰天毒降災正此意也民之喪徳君之喪邦皆由於酒喪徳故言行喪邦故言辜朱子曰南軒酒誥一叚解天降命天降威處誠千百年儒者所不及今備載其説曰酒之為物本以奉祭祀供賔客此即天之降命也而人以酒之故至於失徳喪身即天之降威也釋氏本惡天之降威者乃併與天之降命者去之吾儒則不然去其降威者而已降威者去而降命者自在如飲食而至於暴殄天物釋氏惡之必欲食蔬茹吾儒則不至於暴殄而已衣服而至於窮極奢侈釋氏惡之必欲衣壞色之衣吾儒則去其奢侈而已至於惡淫慝而絶夫婦吾儒則去其淫慝而已釋氏本惡人欲并與天理之公者去之吾儒去人欲所謂天理者昭然矣譬如水焉釋氏惡其泥沙之濁而窒之以土不知土既窒則無水可飲矣吾儒不然澄其泥沙而水之清者可酌此儒釋之分也以呂氏曰天降命所以使民置酒者以祭祀無酒無薦馨香非以資人之酣飲也後人失其本意乃以酒得禍而亦曰天降者天理不在人心外民為酒所困即天降威也邦材氏曰聖人所為而以為天降命人以酒喪徳喪皆自作孽而以為天降威葢古人於事之成敗未嘗不歸之天天雖髙髙在上人之起居動静未有不與之俱者則人之所為孰非天之所為哉辭陳氏曰朝夕曰之下此文王誥毖庶邦庶士之新安陳氏曰天降命與天降威當對觀設酒之初意本為祭祀乃天之降命也酒之流生禍亦天之降威也酒一而已用以祀者此酒也喪徳喪邦者亦此酒也天理人欲同行異情人之於酒知其祭祀而本於降命之天又能於燕飲而凛然知有降威之天則天理行而人欲窒方無酒禍矣無史氏漸曰吾切喜衛人何其服酒誥之訓世守於窮也始也商俗淫湎武王以酒誥戒之逮幽王之世上下沈湎衛武公作賔之初筵以見衛人非特一時聞訓不敢自越於禁防又能以其所以為禁防者傳為子孫法焉文王誥敎小子有正有事無彞酒越庶國飲惟祀徳將無醉小子少子之稱以其血氣未定尤易縱酒喪徳故文王専誥敎之有正有官守者有事有職業者無毋同彞常也無常於酒其飲惟於祭祀之時然亦必以徳將之無至於醉也陳氏大猷曰此文王又告敎庶邦庶士之小子林氏曰禁於未發之謂豫發然後禁則扞格而難勝故湯訓蒙士文王敎小子穆王告幼子童孫與易養蒙一也蘇氏曰溺酒則正事曠矣故不可彞酒飲陳氏曰有官則不敢飲有事則不暇飲飲惟祀酒福受胙也林氏曰無常者非不飲也葢不可非所當飲而飲之故於庶國之飲者惟因賜祀胙而已呂氏曰以徳將之不至於醉中無所主則為麯糵所迷矣欲新安陳氏曰以徳將之不至於醉天理足以制人也及亂而燕喪威儀無徳以將之故耳惟曰我民廸小子惟土物愛厥心臧聰聽祖考之彞訓越小大徳小子惟一文王言我民亦常訓導其子孫惟土物之愛勤稼穡服田畆無外慕則心之所守者正而善日生為子孫者亦當聰聽其祖父之常訓不可以謹酒為小徳小徳大徳小子惟一視之可也薛氏曰糜穀為酒非愛土物也呂氏曰大抵縱酒者多不事稼穡勤稼心臧者必不暇縱酒聽貴聰不聰則誨諄諄聽藐藐矣當時飲酒者必以為小徳無害於事但於大徳用力足矣殊不知以酒為小徳正病之根源也以為小而不戒必至縱而不已故欲其合而為一不可分彼為大徳此為小徳當以一體觀之也西山真氏曰民蒙文王之化亦各訓廸子弟惟土地所生之物是愛故其心臧葢一溺於酒則必旁求珍異以自奉其欲廣則其心蠧矣是時為子弟者亦各聰聽祖考之常訓訓之常則入于耳者熟聽之聰則志於心也恪故於小大之徳視之惟一不以謹酒為小焉謹酒非小徳則酗酒非小過亦明矣妹土嗣爾股肱純其藝黍稷奔走事厥考厥長肇牽車牛逺服賈音古用孝養去聲厥父母厥父母慶自洗蘇典反腆他典反致用酒此武王敎妹土之民也嗣續純大肇敏服事也言妹土民當嗣續汝四肢之力無有怠惰大修農功服勞田畆奔走以事其父兄或敏於貿音茂易牽車牛逺事賈以孝養其父母父母喜慶然後可自洗腆致用酒洗以致其潔腆以致其厚也薛氏曰或大修農功或逺服商賈以養父母父母慶則汝可以用酒也葵初王氏曰既種黍稷肇牽車牛民以農為本賈為未純西山真氏曰此土之民久染沉酣之俗繼自今宜用股肱之力以從事於農商以養其父母兼農商言之於理為長新安陳氏曰此以下武王通敎妹土之民與臣及康叔也葢欲妹土臣民與康叔先藝黍稷後逺服賈以嗣續其股肱之力而凡用心惟在於事考長養父母不敢分心於他適也先用心於黍稷餘力始從事於服賈見急於務本而不急於逐末亦風俗之厚也服田與服賈者皆以孝養為先尚奚暇於縱酒哉呂氏曰前禁酒如此之嚴至此復敎之使用酒者聖人之敎至於斷絶人情則不行所以閉其飲酒之門者多矣故開其一而使之有節但不可踰此節耳庶士有正越庶伯君子其爾典聽朕敎爾大克羞耉惟君爾乃飲食醉飽丕惟曰爾克永觀省悉井反作稽中徳爾尚克羞饋祀爾乃自介用逸茲乃允惟王正事之臣茲亦惟天若元徳永不忘在王家此武王敎妹土之臣也伯長也曰君子者賢之也典常也羞養也言其大能養老也惟君未詳丕惟曰者大言也介助也用逸者用以宴樂也言爾能常常反觀内省使念慮之發營為之際悉稽乎中正之徳而無過不及之差則徳全於身而可以交於神明矣如是則庶幾能進饋祀爾亦可自副而用宴樂也如此則信為王治事之臣如此亦惟天順元徳而永不忘在王家矣按上文父母慶則可飲酒克羞耉則可飲酒羞饋祀則可飲酒本欲禁絶其飲今乃反開其端者不禁之禁也聖人之敎不廹而民從者此也孝養羞耉饋祀皆因其良心之發而利導之人果能盡此三者皆為成徳之士矣而何憂其湎酒也哉林氏曰先王養老之禮執醬執爵割牲奉俎凡以致其醉飽耳作而稽於中徳未嘗過差則庶幾能進饋食於祖考乃自助而用逸也喪徳喪邦皆以為天之降威則永徳省稽中徳者天安得不若其元徳乎呂氏曰開人飲酒之門不過奉親養老祭祀三節皆自其良心發見處開之也西山真氏曰此乃武王誥敎庶正庶伯之詞欲其能長自觀省每有動作必稽乎中徳無過與不及也中徳即中道也即身而言則曰中徳即事而言則曰中道無新安陳氏曰此數句以稽中徳為主能稽中徳則過不及飲惟見於羞饋祀而非祀不飲以此乃可為王正事之臣以此天亦若其元徳由中徳可充之為大徳也徳之一字為酒誥一篇之綱領譬之救千丈渾之一寸膠也上文之徳將無醉下文之經徳徳顯徳馨與此之稽中徳若元徳實互相照應云王曰封我西土棐徂邦君御事小子尚克用文王敎不腆于酒故我至于今克受殷之命徂往也輔佐文王往日之邦君御事小子也言文王毖酒之敎其大如此西山真氏曰夫有司之不腆酒於天命何預而王乃以克受殷命為職此之由何耶但觀幽厲陳隋之朝上下沈酣以致墜失天命則謹酒而受天命復何疑哉吳氏曰凡稱我皆武王自謂也余謂三篇皆武王書觀此一節可以無疑矣或者終謂周公代成王之言何為三篇無一言及武王周公達孝不應遽忘之若是也若果周公之言則尚克用文王敎不腆于酒之下但繼以故我至於今克受殷之命乃周公受之而武王不與也無是理矣新安陳氏曰上文言邦君以下用文王敎故武王即以我受殷命承之若以為周公之言則是用文王之敎下略無一字及武王周公敢自謂我克受殷命耶我受殷命武王可自言周公不可言不待明者而後知也王曰封我聞惟曰在昔殷先哲王廸畏天顯小民經徳秉哲自成湯咸至于帝乙成王畏相去聲惟御事厥棐音匪有恭不敢自暇自逸矧曰其敢崇飲以商君臣之不暇逸者告康叔也殷先哲王湯也廸畏者畏之而見於行也畏天之明命畏小民之難保經其徳而不變所以處己也秉其哲而不惑所以用人也湯之垂統如此故自湯至于帝乙賢聖之君六七作雖世代不同而皆能成就君徳敬畏輔相故當時御事之臣亦皆盡忠輔翼而有責難之恭自暇自逸猶且不敢况曰其敢尚飲乎唐孔氏曰周受命於殷兼衛居殷地故舉殷代以酒興亡為戒猷林氏曰經徳秉哲乃商先王待養到處陳氏大曰經徳秉哲乃畏天畏民之實臣王氏炎曰御事猶言治事凡經言御事兼小大之皆可稱也新安陳氏曰上文言周受殷命故舉殷之以酒興亡以為戒此先言殷先王以不湎酒而興也廸畏以下數句與崇飲相反廸畏天民則常若上帝之臨汝常見小人之難保敢縱酒乎一縱酒則玩而不知畏天顯雖可畏酣飲則不暇顧小民雖可畏酣飲則不暇恤矣常其徳持其哲則有守而不昏必不縱酒一縱酒則酗于酒徳而所守變荒迷于酒而所見昏矣畏相棐恭不暇不逸則有敬畏無暇逸必不縱酒一縱酒則君臣淪胥醺酣之場而荒酖逸豫不暇顧矣商人以尚敬為法尚飲為戒曰畏曰恭皆尚敬之謂也尚敬則百善成尚飲則百邪生西山真氏曰此章乃一篇之根本凡人敬則不縱欲縱欲則不敬商之君臣既一於敬舉天下之物不足以動之况荒敗於酒乎此正天理人欲相為消長之幾宜深味之越在外服侯甸男衛邦伯越在内服百僚庶尹惟亞惟服宗工越百姓里居罔敢湎于酒不惟不敢亦不暇惟助成王徳顯越尹人祇辟自御事而下在外服則有侯甸男衛諸侯與其長伯在内服則有百僚庶尹惟亞惟服宗工國中百姓與夫里居者亦皆不敢沈湎于酒不惟不敢亦不暇不敢者有所畏不暇者有所勉惟欲上以助成君徳而使之昭著下以助尹人祇辟而使之益不怠耳成王顧上文成王而言祇辟顧上文有恭而言呂氏曰尹人者百官諸侯之長也指上文御事而言陳氏大猷曰越及也伯諸侯之長内服畿内也庶尹衆官之正樂正酒正之類亞次大夫惟服奔走服事之人下士府史之屬宗工尊官及百官族姓不仕而居閭里者朝廷君臣風化如此宜乎内外皆不敢湎于酒不敢畏而不敢縱耳不暇則有職者勤于職無職者勤於徳自不暇飲縱之為亦不為也祇辟敬君也陳氏經曰商先哲王以廸畏為心已之所行無非此畏子孫之所遵無非此畏羣臣之所效法無非此畏前乎此堯舜之兢業此畏也後乎此文王之不侮鰥寡武王之夙夜祇懼此畏也商先王恭行敬畏不惟其子孫為能然王朝之御事皆然不惟御事皆然外服之諸侯内服之百官里居之百姓亦然以見君臣上下内外無一不在敬畏中豈惟不敢飲亦且不暇飲所以不暇者果何事哉上以助成君徳之顯明下以盡正人之道而自敬其法而已矣外新安陳氏曰此一全章言商先王之前後居臣内一皆以敬畏修徳為心故不暇湎酒而興欲康叔法其所以興也我聞亦惟曰在今後嗣王酣身厥命罔顯于民祇保越怨不易誕惟厥縱淫泆音逸于非彞用燕喪去聲威儀民罔不衋迄力反傷心惟荒腆于酒不惟自息乃逸厥心疾狠下墾反不克畏死辜在商邑越殷國滅無罹音離弗惟徳馨香祀登聞于天誕惟民怨庶羣自酒腥聞在上故天降喪于殷罔愛于殷惟逸天非虐惟民自速辜以商受荒腆于酒者告康叔也後嗣王受也受沈酣其身昏迷於政命令不著於民其所祇保者惟在於作怨之事不惟悛改大惟縱淫泆于非彞泰誓所謂竒技淫巧也燕安也用安逸而喪其威儀史記受為酒池肉林使男女倮魯果反而相逐其威儀之喪如此此民所以無不痛傷其心悼國之將亡也而受方且荒怠益厚于酒不思自息其逸力行無度其心疾狠雖殺身而不畏也辜在商邑雖滅國而不憂也弗事上帝無馨香之徳以格天大惟民怨惟羣酗腥穢之徳以聞于上故上天降喪于殷無有眷愛之意者亦惟受縱逸故也天豈虐殷惟殷人酗酒自速其辜爾曰民者猶曰先民君臣之道稱也陳氏大猷曰殷先王之興邦在於廸畏紂死滅且不畏此所以䘮邦也可西山真氏曰今之小人一醉之餘急疾强狠水火入兵刃可蹈則受之情狀可知矣以馬氏曰古民人字通用上新安陳氏曰此繼言紂湎酒而亡也紂之君臣下一以荒淫為心故沈湎于酒而亡欲康叔戒其所以亡也此章與前多相反相應前曰祀兹酒此曰弗惟徳馨香祀庶羣自酒腥聞在上設酒初意本以祭祀今不以祭祀而惟用於羣飲無馨香之聞而惟腥穢之聞不亡何待前曰天降喪小大邦用喪罔非酒惟辜此曰天降喪于殷惟民自速辜前乃泛言其理此専指殷亡之事以實其説也前曰自介用逸繼曰不敢自逸此又曰不惟自息乃逸罔愛于殷惟逸自介用逸以介用逸也自逸乃逸惟逸以逸為逸也使不以剛介之介訓之而但曰助曰副則與此所云逸者何以異哉王曰封予不惟若兹多誥古人有言曰人無於水監當於民監今惟殷墜厥命我其可不大監撫于時我不惟如此多言所以言湯言受如此其詳者古人謂人無於水監水能見人之妍醜而已當於民監則其得失可知今殷民自速辜既墜厥命矣我其可不以殷民之失為大監戒以撫安斯時乎新安陳氏曰此總結上文引殷先哲王後嗣王兩章而起下章欲康叔率羣臣以剛制酒之意予惟曰汝劼丘八反毖殷獻臣侯甸男衛矧太史友内史友越獻臣百宗工矧惟爾事服休服采矧惟若疇圻父薄違農父若保宏父定辟矧汝剛制于酒薄音博劼用力也汝當用力戒謹殷之賢臣與鄰國之侯甸男衛使之不湎于酒也毖殷獻臣侯甸男衛與文王毖庶邦庶士同義殷之賢臣諸侯固欲知所謹矣况太史掌六典八法八則内史掌八柄之法汝之所友者及其賢臣百寮大臣可不謹於酒乎太史内史獻臣百宗工固欲知所謹矣况爾之所事服休坐而論道之臣服采起而作事之臣可不謹於酒乎曰友曰事者國君有所友有所事也然盛徳有不可友者故孟子曰古之人曰事之云乎豈曰友之云乎服休服采固欲知所謹矣况爾之疇匹而位三卿者若圻父廹逐違命者乎若農夫之順保萬民者乎若宏父之制其經界以定法者乎皆不可不謹于酒也圻父政官司馬也主封圻農父敎官司徒也主農宏父事官司空也主廓地居民謂之父者尊之也先言圻父者制殷人湎酒以政為急也圻父農父宏父固欲知所謹矣况汝之身所以為一國之視傚者可不謹於酒乎故曰矧汝剛制于酒剛制亦劼毖之意剛果用力以制之也此章自逺而近自卑而尊等而上之則欲其自康叔之身始以此為治孰能禦之而况毖於酒徳也哉朱子因論點書曰人説荆公穿鑿只是好處亦用還他且如矧惟若疇至定辟古註從父字絶句荆公從違保辟絶句夐出諸儒之表男吕氏曰殷獻臣謂獻臣嘗仕商而今里居者侯甸衛謂四方諸侯接於衛者服休者以徳為事謂在位者也服采者以事為事謂在職者也戒康叔毖劼于酒先當劼毖所屬所友所事之人亦畏相之類也殷林氏曰康叔為諸侯長故劼毖及侯甸男衛上言獻臣下言獻臣之為百宗工者此獻臣乃周官之致仕里居者薛氏曰二史掌邦法在王朝則貳冡宰在侯國則居賔友之地之陳氏傳良曰諸侯有太史無内史内史惟天子有内史是商故臣康叔所當親之為友者也服王氏䖍曰服休以徳為事休徳也作徳日休是也采以事為事采事也若予宋是也蘇氏曰酒非剛者不能制泛呂氏曰剛制二字最有意當時酒之為病甚深苟泛悠悠則不能制新安陳氏曰剛制固劼毖之意而用力加重焉亦前自介之意也此章有四矧字一節重於一節所職愈重則所戒愈殷劼毖以上所戒勅言剛制以己所檢制言在羣臣則當謹上之戒在康叔則當防己之欲嚴于身以率其下也厥或誥曰羣飲汝勿佚音逸盡執拘以歸于周予其殺羣飲者商民羣聚而飲為姦惡者也佚失也其者未定辭也蘇氏曰予其殺者未必殺也猶今法曰當斬者皆具獄以待命不必死也然必立法者欲人畏而不敢犯也羣飲葢亦當時之法有羣聚飲酒謀為大姦者其詳不可得而聞矣如今之法有曰夜聚曉散者皆死罪葢聚而為妖逆者也使後世不知其詳而徒聞其名凡民夜相過者輒殺之可乎林氏曰西土邦君御事小子克用文王敎不腆于酒是周人已率敎者也而或羣飲不可不嚴為之法商人則反是史氏漸曰王非果於殺也飲至於羣壞風俗者也商人羣飲固已不善此風又及於周人則何以為國耶故於商人則待之以敎而使悛於周人則嚴之以殺而使懼其云者非必殺也有殺之之理語曰其然豈其然乎傳曰天其或者其之為言有疑意存焉將開其恐懼修省之心而激其遷善逺罪之念初不必於殺也劉氏真曰此書不責商民之湎淫而責在位之躬化商之故都大家世族猶多而康叔之百官有司自周而往者亦有之自矧太史友以下皆康叔之百官有司也曰羣飲指此輩也使民為羣飲有司之事耳康叔以國君治之豈曰不可而何必歸之于京師乎執歸于周亦恐康叔之専殺曰予其殺嚴為之刑而未必殺也忠厚之意寓於嚴厲之言豈不明哉一篇始終之意皆以在位者為言而解者不察盡以民言之過矣又惟殷之廸諸臣惟工乃湎于酒勿庸殺之姑惟敎之殷受導廸為惡之諸臣百工雖湎于酒未能遽革而非羣聚為奸惡者無庸殺之且惟敎之新安陳氏曰殷諸臣湎酒者勿殺而姑敎之以其染惡深而被化淺也有斯明享乃不用我敎辭惟我一人弗恤弗蠲乃事時同于殺有者不忘之也斯此也指敎辭而言享上享下之享言殷諸臣百工不忘敎辭不湎于酒我則明享之其不用我敎辭惟我一人不恤於汝弗潔我事時則同汝于羣飲誅殺之罪矣王氏日休曰此三節皆王告康叔之辭呂氏曰明享彰明侯享禄位以使勸也王曰封汝典聽朕毖勿辯乃司民湎于酒辯治也乃司有司也即上文諸臣百工之類言康叔不治其諸臣百工之湎酒則民之湎酒者不可禁矣唐氏曰或曰誥毖或曰典聽朕敎或曰典聽朕毖何也曰毖者為敎之心敎者為毖之辭新安陳氏曰汝當常主於聽我毖謹之言也酒誥一篇終始以毖慎言始曰厥誥毖庶邦庶士將終曰劼毖殷獻臣篇終又曰汝典聽朕毖毖之一辭一篇三致意又提其要以致諄切之訓云按勿辯乃司民湎于酒説者不同句讀亦異孔氏作一句讀曰辯使也勿使汝所司之民沉湎于酒唐孔氏略轉一機謂勿使汝所司民之吏沉湎于酒吏當正身以率民也王氏曰汝司民有湎于酒則以正治之勿為之辯以為無罪蘇氏曰當専一司以察沉湎若以汎責羣吏而不辯其司禁必不行矣呂氏讀勿辯為句謂復有循舊習者汝不可辯説諉之舊習實乃所司牧之民湎于酒是誰之過歟蔡氏讀勿辯乃司為句其説最優於諸家然此句恐有脱誤不如缺之馨董氏鼎曰古之為酒本以供祭祀灌地降神取其香下達求諸隂之義也後以其能養陽也故用之以奉親養老又以其能合歡也故用之冠婚賓客然曰賓主百拜而酒三行又曰終日飲酒而不得醉焉未嘗過也自禹飲儀狄之酒而疏之寜不謂其太甚己而亡國之君敗家之子接踵於後世何莫由斯然則文王之敎不惟當明於妹邦家寫一通猶恐覆車之不戒也梓材亦武王誥康叔之書諭以治國之理欲其通上下之情寛刑辟之用而篇中有梓材二字比稽田作室為雅故以為簡編之别非有他義也今文古文皆有按此篇文多不類自今王惟曰以下若人臣進戒之辭以書例推之曰今王惟曰者猶洛誥之今王即命曰也肆王惟徳用者猶召誥之肆惟王其疾敬徳王其徳之用也己若兹監者猶無逸嗣王其監于兹也惟王子子孫孫永保民者猶召誥惟王受命無疆惟休也反覆參考與周公召公進戒之言若出一口意者此篇得於簡篇斷爛之中文既不全而進戒爛簡有用明徳之語編書者以與罔厲殺人等意合又武王之誥有曰王啓監云者而進戒之書亦有曰若兹監云者遂以為文意相屬編次其後而不知前之所謂王者指先王而言非若今王之為自稱也後之所謂監者乃監視之監而非啟監之監也其非命康叔之書亦明矣讀書者優㳺涵泳沉潛反覆繹其文義審其語脉一篇之中前則尊命卑之辭後則臣告君之語葢有不可得而强合者矣朱子曰吳才老辨梓材後半截不是梓材縁其中多是勉君乃臣告君之辭未嘗如前一半稱王曰又稱汝為上告下之辭亦有此理又説梓材是洛誥中書甚好其他文字亦有錯亂而移易得出人意表者然無如才老此様處恰恰好後吳才老考究得梓材只前面是告戒臣下其都稱王恐別是一篇不應王告臣下不稱朕予而自稱王斷簡殘編無從考正只得於言語句讀中有不曉者缺之又曰梓材後半篇又不知何處録得來此與他人言皆不領嘗與陳同父言陳曰毎嘗讀亦不覺今思之誠然王曰封以厥庶民暨厥臣達大家以厥臣達王惟邦君大家巨室也孟子曰為政不難不得罪於巨室孔氏曰卿大夫及都家也以厥庶民暨厥臣達大家則下之情無不通矣以厥臣達王則上之情無不通矣王言臣而不言民者率土之濵莫非王臣也邦君上有天子下有大家能通上下之情而使之無間者惟邦君也陳氏大猷曰大家如晉六卿魯三桓齊諸田楚昭屈景之類左傳載封康叔分以殷民七族自陶氏至終葵氏即衛之大家也大家之情與國君常疎與國之臣民常親葢臣民素服屬於大家而大家之强阻亦臣民擁助之也國君能施仁政撫其臣民由臣民以達其情于大家則巨室之所慕一國慕之又由臣以達其情於天子而邦君之責盡矣則呂氏曰自康叔言則有臣民大家三等自王言之率土皆王臣但言厥臣皆在其中矣始新安陳氏曰邦君處上下之間達王必自達大家得罪於巨室者不公正而無以服其心也巨室難以强力服而可以公心化以庶民及臣達之是邦君一人之心其公正能通乎一國千萬人之心以一國臣民千萬人之心通達於大家之心以其下達者而上達其流通而無留滯也必矣汝若恒越曰我有師師司徒司馬司空尹旅曰予罔厲殺人亦厥君先敬勞肆徂厥敬勞肆往姦宄殺人歴人宥肆亦見厥君事戕敗人宥恒常也師師以官師為師也尹正官之長旅衆大夫也敬勞恭敬勞來也徂往也歴人者罪人所過律所謂知情蔵匿資給也戕敗者毁傷四肢面目漢律所謂疻音咫漢薛宣傳註以杖手毆擊之剥其皮膚腫起青黑而無瘡瘢者律謂疻痏師古曰疾音侈也此章文多未詳朱子曰亦厥君先敬勞至戕敗人宥之類都不成文理不可曉新安陳氏曰蔡傳僅訓字而云此章文多未詳信當缺之今姑采合諸説解之曰汝若常發越謂羣臣言我有交相師師之三卿與正長之尹衆大夫之旅汝意言我欲無虐殺人耳亦以其君先恭敬勞來其民為臣者遂往效君以敬勞遂與往日為姦宄殺人者罪人所經歴者今皆寛宥與之為新羣臣遂亦見其君之事凡戕傷人毁敗人物者亦寛宥之矣君宥其大者臣亦宥其小者大意欲康叔率其臣以戒虐殺施寛宥也二玉篇疻之移之氏反毆傷也王啟監厥亂為民曰無胥戕無胥虐至于敬寡至于屬婦合由以容王其效邦君越御事厥命曷以引養引恬自古王若茲監罔攸辟音僻監三監之監康叔之封亦受畿内之民當時亦謂之監故武王以先王啟監意而告之也言王者所以開置監國者其治本為民而已其命監之辭葢曰無相與戕殺其民無相與虐害其民人之寡弱者則哀敬之使不失其所婦之窮獨者則聨屬之使有所歸保合其民率由是而容蓄之也且王所以責效邦君御事者其命何以哉亦惟欲其引掖斯民於生養安全之地而已自古王者之命監若此汝今為監其無所用乎刑辟以戕虐人可也陳氏大猷曰周禮建牧立監以維邦國自黄帝己立左右監以監視萬國乃諸侯之長也康叔孟侯故稱之為監新安陳氏曰三篇意相承而相濟康叔以衛侯為司冦故武王命之多及于刑康誥反覆於明徳慎罰悉矣不得已而及于速由文王罰刑速由茲義率殺酒誥又以懲羣飲為務而曰予其殺時同于殺皆非得已也逮至梓材告戒於此終矣慮康叔因前二篇之屢及於殺而意或偏倚於刑也故此篇惟以尚寛宥無刑辟為言仁哉武王之心其帝舜刑期于無刑之心歟惟曰若稽田既勤敷菑音兹惟其陳修為厥疆畎若作室家既勤垣墉惟其塗塈其寄反茨才質反若作梓材既勤樸斵音朴卓惟其塗丹雘音穫稽治也敷菑廣去草棘也疆畔也畎通水渠也塗塈泥飾也茨葢也梓良材可為器者雘采色之名敷菑以喻除惡垣墉以喻立國樸斵以喻制度武王之所己為也疆畎塈茨丹雘則望康叔以成終云爾朱子曰梓材一篇有可疑者如稽田垣墉之喻却與無胥戕無胥虐之類不相似以至於欲至于萬年惟王子子孫孫永保民却又似洛誥之文乃臣戒君之辭非酒誥語也蘇氏曰敷治也陳氏大猷曰敷開墾也孫炎曰菑始去草也禮孔氏曰陳列修治疆畔也左傳如農之有畔周匠人為溝洫廣尺深尺曰畎仰孔氏曰垣牆也馬氏曰卑曰垣髙曰墉謂説文塈塗也穀梁傳焚雍門之茨范寧註茨茅葢屋也是陳氏大猷曰具粗曰樸致巧曰斵色唐孔氏曰雘采色之名有青有朱丹雘則是朱者新安陳氏曰三者之譬謂武王既盡勞以始之叔當因舊成就潤飾以終之不可變成規而隳前功也今王惟曰先王既勤用明徳懷為夾庶邦享作兄弟方來亦既用明徳后式典集庶邦丕享先王文王武王也夾近也懷逺為近也兄弟言友愛也泰誓曰友邦冡君方來者方方而來也既盡也先王盡勤用明徳而懷來于上諸侯亦盡用明徳而視效於下也后後王也式用也典舊典也集和輯也此章以後若臣下進戒之辭疑簡脱誤於此唐孔氏曰夾者是人左右而夾之故言近夾音協上左傳以夾輔周室夾音甲陳氏曰人心尊君親之天惟用明徳足以感動之懷來諸侯為己夾輔庶邦享上親若兄弟各以其方而來其來享也亦皆盡用明徳非勉强而然也式法也用明徳則先王之典也後王式典法先王之用明徳而已如是則集庶邦丕享矣前之庶邦享未盡丕享今曰丕享則無乎不享也誤新安陳氏曰朱子既謂自此章以後為他書錯簡綴於此則不當復以武王命康叔解之只作臣告君之辭可也皇天既付中國民越厥疆土于先王越及也皇天既付中國民及其疆土于先王也朱子曰尚書句讀有長者如皇天既付中國民越厥疆土于先王是一句肆王惟徳用和懌先後迷民用懌先王受命肆今也徳用用明徳也和懌和悦之也先後勞來之也迷民迷惑染惡之民也命天命也用慰悦先王之克受天命者也陳氏大猷曰迷民未率故王惟徳是用以和懌先後之和之使不乖懌之使不怨先引之於前後助之於後不惟以悦民心亦所以悦先王受命之心新安陳氏曰蔡氏訓肆為今未安肆故也遂也朱子曰承上起下之辭書中肆字在句首者如肆類于上帝肆嗣王丕承基緒肆惟王其疾敬徳與上文肆往奸宄肆亦見厥君事皆故與遂之意耳不必訓為今也又按明徳者人心虚靈不昧之理無上下之間亦無前後之間先王所勤用以懷諸侯諸侯所既用以享天子均用此明徳也何上下之間乎王惟徳用徳即所謂明徳後王所用以懌迷民及用以懌先王受命無非用此明徳也何前後之間乎己若茲監惟曰欲至于萬年惟王子子孫孫永保民己語辭監視也此人臣祈君永命之辭也按梓材有自古王若茲監罔攸辟之言而編書者誤以監為句讀音豆而爛簡適有己若兹監之語以為語意相類合為一篇而不知其句讀之本不同文義之本不類也孔氏依阿其説於篇意無所發明王氏謂成王自言必稱王者以覲禮考之天子以正遏諸侯則稱王亦强釋難通獨吳氏以為誤簡者為得之但謂王唘監以下即非武王之誥則未必然也新安陳氏曰己若茲監與自古王若茲監相似而實不同上文之監平聲三監之監此之監去聲監觀之監己乎君其監觀于茲臣所祈於君惟曰欲自今至于萬年當為天下王王之子子孫孫永保民而已曰萬年惟王若止於長有天下曰子子孫孫永保民則欲世王之長保安天下也意實公而非私於王家也其人臣祈君永命忠愛無窮之心歟讀此篇只依朱子以殘編錯簡讀之庶其免於穿鑿云蘇氏曰此書専言王惟不殺則子孫萬年享國故以皇天所付為言詳考大誥康誥酒誥梓材四篇反覆丁寜以殺為戒以不殺為徳此易所謂聰明睿智神武而不殺者故周有天下八百餘年後之王者以不殺享國以好殺殃其身及其子孫者多矣而世主不以為監小人又或附會六經以勸之殺悲夫殆哉唐末五代之亂殺人如飲食周太祖叛漢漢隱帝使開封尹劉銖屠其家百口太祖既克京師夜召其故人知星者趙延義問漢祚所以短促延義答曰漢本未亡以刑殺寃濫故不及期而滅時太祖方以兵圍劉銖及蘇逢吉第期滅其族聞延義言矍然貸之誅止其身予讀至此未嘗不流涕太息故表其義以救世云葵初王氏曰蘇氏此論大為有勸戒有禆世主述作必有此等議論方可行世書經大全卷七
