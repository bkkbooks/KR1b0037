body:
  text: 書經大全卷八明胡廣等撰召誥左傳曰武王克商遷九鼎于洛邑史記載武王言我南望三途山名北望嶽鄙太行山下都鄙之地顧詹有河粤詹洛伊毋逺天室營周居于洛邑而後去則宅洛者武王之志周公成王成之召公實先經理之洛邑既成成王始政召公因周公之歸作書致告達之於王其書拳拳於歴年之久近反復音腹乎夏商之廢興究其歸則以諴音咸小民為祈天命之本以疾敬德為誠小民之本一篇之中屢致意焉古之大臣其為去聲國家長逺慮葢如此以召公之書因以召誥名篇今文古文皆有問周誥辭語艱澀如何看朱子曰此等是不可曉林文説艾軒以為方言曰只是古語如此切意當時風俗恁地說話人便都曉得如這物事喚做這物事今風俗不喚做這物事便曉不得如蔡仲之命君牙等篇乃當時與士大夫語似今翰林所作制誥之文故甚易曉如誥是與民語乃今官司行移曉諭文字有帶時語在其中今但曉其可曉者不可曉處則闕之可也如詩景員維河上下文皆易曉却此一句不可曉又如三夀作朋三壽是何物歐陽記古語亦有三壽之說想當時自有必般說話人都曉得只是今不可曉王氏曰洛者天下之中以天事言則日東景夕多風日西景朝多隂日南景短多暑日北景長多寒以人事言則四方朝聘貢賦道理均焉非特如此而已懲三監之難毖殷頑民遷以自近洛距妹邦為近則易使之遷作王都焉則易以鎮服也雖然鎬京宗廟社稷官府宫室具在不可遷也故於洛邑會諸侯而已祀陳氏大猷曰成王實都鎬京特往來朝諸侯清廟於洛故鎬京謂之宗周以其為天下所宗也洛邑謂之東都又謂之成周以周道成於此也洛邑天下之至中豐鎬天下之至險成王于洛邑定鼎以朝諸侯所以承天地沖和之氣宅土中以莅四海其示天下也公於鎬京定都以壯基本所以據天下形勝處上游以制六合其慮天下也逺漢唐竝建兩京葢亦識形勢之所在而有得於成王周公之遺意歟縣林氏曰曰自后稷始封於邰在漢右扶風斄夏后政衰稷之子不窋出奔於戎狄之間至孫公劉始立國於豳在枸邑豳鄉十世至太王避狄人遷於岐山之下在美陽縣岐山文王遷於豐在鄠縣東豐水武王遷于鎬在長安西南昆明池所謂鎬池也岐在邰西北無百里豳又在岐西北四百餘里豐在岐山東南一百餘里鎬在豐東二十五里上新安陳氏曰宅洛之事武王志之成王述之告祖廟迭咨大臣一日而建千萬年宅中圖大之基謹重如此以至於召公因周公之歸而作誥以告王序不及之何也宅中圖大固難保大定功尤難王之在豐召之相宅固見宅中圖大之難矣召公拳拳以敬德承命戒王敬不敬之異效凡七言之至謂不敬德則必墜厥命其辭甚危見保大定功之尤難也惟二月既朢越六日乙未王朝步自周則至于豐日月相朢謂之朢既朢十六日也乙未二十一日也周鎬京也去豐二十五里文武廟在焉成王至豐以宅洛之事告廟也朱子曰豐鎬去洛邑三百里長安所管六百里王畿千里亦有横長處非若今世畫圖之為方也恐井田之制亦是此類此不可執畫方之圖以定之或問周都豐鎬則王畿之内當有西北之戎如此則稍甸縣都如之何其可為也曰周禮一書聖人作為一代之法爾到不可用法處聖人須别有權變之道林王氏曰以朏朢明魄紀月以甲子紀日書法也氏曰漢志曰周公攝政七年二月乙亥朔庚寅既朢惟太保先周公相去聲宅越若來三月惟丙午朏音匪越三日戊申太保朝至于洛卜宅厥既得卜則經營成王在豐使召公先周公行相視洛邑越若來古語辭言召公於豐迤邐上移爾反下力止反而來也朏孟康曰月出也三日明生之名戊申三月五日也卜宅者用龜卜宅都之地既得吉卜則經營規度其城郭宗廟郊社朝音潮市之位林氏曰漢志曰三月甲辰朔三日丙午越三日庚戌太保乃以庶殷攻位于洛汭越五日甲寅位成庶殷殷之衆庶也用庶殷者意是時殷民已遷于洛故就役之也位成者左祖右社前朝後市之位成也唐孔氏曰庚戌三月七日甲寅三月十一日也葉氏曰攻位者闢荆棘平髙下以定所經營之位庶殷所遷殷民也讐民為役則友民可知未林氏曰盤庚之遷亳太王之遷岐衛文王遷楚丘嘗不卜然君臣既有定議故至洛乃卜洪範所以先乃心卿士庶民而後卜筮也太王聿來胥宇而後爰契我龜衛文望楚與堂而後卜云其吉皆此類也也臨川呉氏曰召公之攻位但用殷民不用周民何葢洛邑畿内之民不征其力諸侯四方之民又未至洛惟殷民遷在洛者可役而攻位之攻力亦省且易故也若翼日乙夘周公朝至于洛則達觀于新邑營周公至則徧觀新邑所經營之位唐孔氏曰乙夘十二日也蘇氏曰按後篇是日再卜上吕氏曰召公已成位周公方來觀相之體然也越三日丁巳用牲于郊牛二越翼日戊午乃社于新邑牛一羊一豕一郊祭天地也故用二牛社祭用太牢禮也皆告以營洛之事唐孔氏曰丁巳十四日也戊午十五日也牢吕氏曰郊祭天社祭地孔氏曰社稷其邑馬氏曰言社則稷在其中也陳氏經曰郊不曰新者郊在國外社在國内故王氏曰於尊以簡為誠於卑以豐為貴故郊特牲而社稷太牢先祭告於郊社然後用工陳氏大猷曰此葢即洛邑新立之郊社以告作洛於天地不告廟者在豐已告也時洛邑宗廟未成故至十二月始烝祭宗廟也越七日甲子周公乃朝用書命庶殷侯甸男邦伯書役書也春秋傳曰士彌牟晉大夫名營成周計文數揣髙低度厚薄仞溝洫物土方議逺邇量事期計徒庸慮材用書糇糧以令役於諸侯亦此意王氏曰邦伯者侯甸男服之邦伯也庶邦冢君咸在而獨命邦伯者公以書命邦伯而邦伯以公命命諸侯也唐孔氏曰甲子二十一日也書賦功屬役之書也侯甸男服之邦伯不徧舉五服者文略耳邦伯州牧也葉氏曰不及采衛者不以逺役衆也厥既命殷庶庶殷丕作丕作者言皆趨事赴功也殷之頑民若未易役使者然召公率以攻位而位成周公用以書命而丕作殷民之難化者猶且如此則其悅以使民可知也陳氏大猷曰獨言庶殷丕作則諸侯可知繼林氏曰召公營洛自戊申至甲寅七日而成周公至自乙夘距甲子十日而用書庶殷丕作周召之規模其敏如此總而計之自成王至豐距甲子凡一月耳萬年之業成於一月之間此豈後世可及哉矣新安陳氏曰勸此則殷民之遷在未作洛之前明讀此當參看洛誥洛誥曰子惟乙夘朝至于洛師此云乙夘周公朝至于洛其日同但洛誥言是日再卜此不言者周公之吉卜不殊召公之吉卜也兼洛誥自詳之此可略也乙夘至甲子十日乙夘日卜及達觀新營丙辰不言事葢丁巳戊午將行郊社大禮前一日養精神以無為也己未至癸亥五日又不言事乃將用書命丕作竭精神以有為也此五日中必會集臣庶計文數揣髙卑等事役書一定然後甲子朝頒布之洛誥脫簡之在康誥者曰惟三月哉生魄周公初基至乃洪太誥治即是三月十六日己未戊午祭社後一日也曰洪大誥治即用書命丕作也細而考之脗合無間誰謂殘編斷簡不可見聖人經理之㣲密哉大保乃以庶邦冢君出取弊乃復入錫周公曰拜手稽首旅王若公誥告庶殷越自乃御事吕氏曰洛邑事畢周公將歸宗周召公因陳戒成王乃取諸侯䞇見幣物以與周公且言其拜手稽首所以陳王及公之意葢召公雖與周公言乃欲周公聨諸侯之幣與召公之誥併達之王謂洛邑已定欲誥告殷民其根本乃自爾御事不敢指言成王謂之御事猶今稱人為執事也問據召誥文只説召公先至洛而周公繼至不說成王亦來也然召公出取幣入錫周公乃曰旅王若公其辭又多是戒成王未知如何朱子曰此葢因周公以告于王耳所王氏曰庶邦冢君諸侯會于洛者洛邑成而獻弊以為禮且致慶也新安陳氏曰作洛之急務在化殷人而化殷之大本在於王身下文遂詳言之此召公納忠之大者弊特恭敬之寓焉耳取弊獨言庶邦而不及庶殷者葢用書命丕作無間於庶殷而取弊陳王不及庶殷歟篇末奉弊供王即此出取之弊前後相照應嗚呼皇天上帝改厥元子兹大國殷之命惟王受命無疆惟休亦無疆惟恤嗚呼曷其奈何弗敬此下皆告成王之辭託周公達之王也曷何也其語辭商受嗣天位為元子矣元子不可改而天改之大國未易亡而天亡之皇天上帝其命之不可恃如此今王受命固有無窮之美然亦有無窮之憂於是歎息言王曷其奈何弗敬乎葢深言不可以弗敬也又按此篇專主敬言敬則誠實無妄視聽言動一循乎理好惡竝去聲用捨不違乎天與天同德固能受天明命也人君保有天命其有要於此哉伊尹亦言皇天無親克敬惟親敬則天與我一矣尚何疎之有朱子曰此數句者一篇之大旨也元子者天之元子也下文至篇終反覆推衍此數句意耳吕氏曰人君代天作子是為天之長子改西山真氏曰大明詩云天位殷適使不挾四方亦厥元子大國殷命之意新安陳氏曰此元子字當與下文元子哉對觀元子天之元子即大君者吾父母宗子之意此元子謂殷紂後元子謂成王天命靡常人君所以保天命惟有敬耳昔殷元子嘗受天命矣天竟改其命而王受之固有無窮之美然今日之受安知不為他日之改是亦有無窮之憂也何可以不敬哉此一節始曰嗚呼末又曰嗚呼元老大臣拳拳忠愛嗟嘆以深警上心不能自已之至情也天既遐終大邦殷之命兹殷多先哲王在天越厥後王後民兹服厥命厥終智藏瘝在夫知保抱攜持厥婦子以哀籲音諭天徂厥亡出執嗚呼天亦哀于四方民其眷命用懋王其疾敬德後王後民指受也此章語多難解大意謂天既欲逺絶大邦殷之命矣而此殷先哲王其精爽在天宜若可恃者而商紂受命卒致賢智者退藏病民者在位民困虐政保抱攜持其妻子哀號平聲呼去聲天往而逃亡出見拘執無地自容故天亦哀民而眷命用歸於勉德者天命不常如此今王其可不疾敬德乎孔氏曰殷多先哲王精神在天不能救者以紂不行敬故在漢上朱氏曰人之死各反其根體魄隂也故降而下魂氣陽也故升而在上則無不之矣衆人物欲蔽之故魂散而氣不能升惟聖人清明在躬志氣如神故其死也精神在天與天為一新袁氏曰疾敬德者更無等待遲疑只今便下手安陳氏曰祖宗之不可憑藉如此言外之意葢謂成王今日安可盡恃大王王季文武也此章言天命不可恃祖宗不可恃惟敬德庶可凝固天命而迓續祖德爾敬德而言疾最有力葢人心操則存捨則亡必𦂳著精神汲汲用工則莊敬日強而能敬苟悠悠玩怠則安肆日偷而不能敬矣後又言肆惟王其疾敬德一篇綱領在敬字而敬之工夫又在疾字相去聲下同古先民有夏天迪從子保面稽天若今時既墜厥命今相有殷天迪格保面稽天若今時既墜厥命從子保者從其子而保之謂禹傳之子也面鄉音向也視古先民有夏天固啟迪之又從其子而保佑之禹亦而考天心敬順無違宜若可為後世憑藉者今時已墜厥命矣今視有殷天固啟迪之又使其格正夏命而保佑之湯亦面考天心敬順無違宜亦可為後世憑藉者今時已墜厥命矣以此知天命誠不可恃以為安也朱子曰此一節間有不可曉處與新安陳氏曰從其子而保之即孟子天子則與子之意開萬世傳子之端自禹始故於夏言從子保而於商只言格保蒙上文也兩面稽天若即對越在天之意此一節葢謂天與祖宗皆不可恃也今冲子嗣則無遺壽耉曰其稽我古人之德矧曰其有能稽謀自天稽考矧況也幼冲之主於老成之臣尤易疎逺故召公言今王以童子嗣位不可遺棄老成言其能稽古人之德是固不可遺也況言其能稽謀自天是尤不可遺也稽古人之德則於事有所證稽謀自天則於理無所遺無遺壽耉葢君天下者之要務故召公特首言之朱子曰已陳夏商敬德墜命之所由又戒王也新安陳氏曰老成知古又能知天所賴以稽古道天道幸有壽耉如太公周畢諸公在不可遺也稽考古德非壽耉者聞見之逺無所質稽考天意以定謀慮非壽耉者德盛智明不能決也嗚呼有王雖小元子哉其丕能諴于小民今休王不敢後用顧畏于民碞音巖召公歎息言王雖幼冲乃天之元子哉謂其年雖小其任則大也其者期之辭也諴和碞險也王其大能諴和小民為今之休美乎小民雖至㣲而至為可畏王當不敢緩於敬德用顧畏于民之碞險可也蘇氏曰民猶水也水能載舟亦能覆舟物無險於民者矣畏新安陳氏曰諴於小民而今休矣猶欲王汲汲於民碞者葢民之碞險可畏常伏於太和盛美之中恃其已和且美而不回顧却慮以畏之則福兮禍所伏矣此所以為險也是以莊生曰人心險於山川王來紹上帝自服于土中旦曰其作大邑其自時配皇天毖音秘祀于上下其自時中乂王厥有成命治民今休洛邑天地之中故謂之土中王來洛邑繼天出治當自服行於土中是時洛邑告成成王始政故召公以自服土中為言又舉周公嘗言作此大邑自是可以對越上天可以饗答神祇自是可以宅中圖治成命者天之成命也成王而能紹上帝服土中則庶㡬天有成命治民今即休美矣王氏曰成王欲宅洛邑者以天事言則日東景音影夕多陽日西景朝多隂日南景短多暑日北景長多寒洛天地之中風雨之所會隂陽之所和也以人事言則四方朝聘貢賦道里均焉故謂之土中朱子曰言王來居洛邑繼天為治服事也土中洛邑為天下中也林氏以此句王來為王亦至洛邑之騐恐未必然但王命來此定邑耳稱周公言當作大邑而自此以祀上帝以及慎祀上下神祇又自此居中以為治則是王受天成命以治民矣葢召公述周公宅洛之意陳氏大猷曰君前臣名故稱旦曰又舉周公之言以告謂今作大邑其自是而配天使仰無愧於天自是而毖祀上下使幽無愧於鬼神自是而宅中為治使俯無愧於民王其有成命而治民今休可也周公所期如此之重王可不思所以稱之至新安陳氏曰作洛之事召公任之而未嘗明言之此方言服于土中而舉周公之言以見作洛所以配上帝奉祭祀成治功凝天命其重如此葢下文將自進其敬德祈天之忠言所以先引周公期望之語以開其端也意陳氏雅言曰是時召公知成王已有退辟于周之故言此以勸勉之也活動之意全在來字王先服殷御事比音備介于我有周御事節性惟日其邁言治人當先服乎臣也王先服殷之御事以親近副貳我周之御事使其漸音尖染陶成相觀為善以節其驕淫之性則日進於善而不已矣王敬作所不可不敬德言化臣必謹乎身也所處所也猶所其無逸之所王能以敬為所則動靜語黙出入起居無往而不居敬矣不可不敬德者甚言德之不可不敬也朱子曰王敬作所不可不敬德只是一句是召誥中其初説許多言語艱深難曉却𦂳要處只惟王不可不敬德而已林氏曰周遷殷頑民于洛葢與洛之舊民雜居其善惡之習不同非有以和一之不能相安以處故必有以服殷御事使之親比介助於周之御事然後可葢周御事習於教令無事於服之故以服殷御事為先也然服殷御事在節其性而已葢人性無不善殷人特化紂之惡是以不義之習遂與性成而忘反耳上之人有以節之使日進於善則於周民亦何異哉然欲節民之性又在王之所化故王又當以敬為所不可不敬德以率之非政刑所及也身陳氏大猷曰既以周臣率之使之相觀而善又以率之使之下觀而化也只新安陳氏曰王敬作所不可不敬德朱子本孔氏作一句説蔡氏以所字為句作兩句説真氏筆記亦以蔡為長然蔡説實自吕氏所其無逸之所發之殷人汚於舊染而其性流今欲節之而使其性復亦惟化之以敬德爾敬者一身之主宰性即心所具之理也敬則此心收斂於天理之中而性可節不敬則此心放縱於人欲之偽而性日流日其邁即上達反天理而日進乎髙明之意也謂之不可不敬葢敬者人心所當然而不可不然者非有所勉強而然如饑食渴飲之常無所為而為者也能如是則敬盡於此而人化於彼矣我不可不監于有夏亦不可不監于有殷我不敢知曰有夏服天命惟有厯年我不敢知曰不其延惟不敬厥德乃早墜厥命我不敢知曰有殷受天命惟有厯年我不敢知曰不其延惟不敬厥德乃早墜厥命夏商厯年長短所不敢知我所知者惟不敬厥德即墜其命也與上章相古先民之意相為出入但上章主言天眷之不足恃此則直言不敬德即墜厥命爾林氏曰古人於天命不以為必有不以為必無故召公於厯年不其延皆不敢知者疑之也至於敬德則有厯年不敬德則墜厥命葢無可疑者今王嗣受厥命我亦惟兹二國命嗣若功王乃初服今王繼受天命我謂亦惟此夏商之命當嗣其有功者謂繼其能敬德而厯年者也況王乃新邑初政服行教化之始乎陳氏大猷曰此章言尤懇切以新安陳氏曰王乃初服者善始可占終法二國之敬德而厯年尤當謹之初服也此句吕蔡以屬上章孔朱真陳以冠下章使與初生初服宅新邑為一套語亦通但此句實結上生下若生子一段議論實因此句而申明之嗚呼若生子罔不在厥初生自貽哲命今天其命哲命吉凶命厯年知今我初服歎息言王之初服若生子無不在於初生習為善則善矣自貽其哲命為政之道亦猶是也今天其命王以哲乎命以吉凶乎命以厯年乎皆不可知所可知者今我初服如何爾初服而敬德則亦自貽哲命而吉與厯年矣吕氏曰人自初生而保養乃可以全其善哲命者人心所有之明哲非自外求也愚林氏曰天以正性命人初無智愚之别所以有智者於己取之而已下愚為自暴自棄則上智豈非自貽乎吕葉氏曰哲命以哲為天所命也命新安陳氏曰按林皆以哲命為性命之命然哲之哲不應遽有性命眷命之分當以葉氏之説為正宅新邑肆惟王其疾敬德王其德之用祈天永命宅新邑所謂初服也王其疾敬德容可緩乎王其德之用而祈天以厯年也朱子曰王之初服不可不謹其習猶子之初生不可不慎其初所教葢習於上則智習于下則愚矣故今天命正在初服之時敬德則哲則吉則厯年不敬則愚則凶則短折也疾天無一物之不體已知我初服宅洛矣王其可不敬德哉所以求天永命者只在德而已矣天也陳氏曰自貽哲命命在我也天其哲命命在西山真氏曰天命至公不可以求而得也曰祈者葢一於用德乃不祈之祈也王吕氏曰祈永命無他術惟敬德為可耳曰祈者欲知天命之未定也善新安陳氏曰明哲之性與生俱生初生之時習於則明可作哲習於惡則靡哲不愚哲則為天所命愚則天不命焉是自貽哲命如所謂自求多福此所謂無不在其初生時自貽哲命者王之初服亦猶是也此一節發明王乃初服之意葢今日作邑而自服土中乃所謂初服是又中天下定四海之一初也天之命吉凶判於此王之能敬德祈永命與不能亦判於此召公所以欲王乘此一初之機而疾敬德也疾敬德則能用德疾云者欲其乘此機而速勉之有今罔後之謂也疾敬德者勿失此機於今日之初而能用德以祈天者可永命於千萬年之久今此一初豈可又以悠悠失之哉肆惟王其疾敬德葢申上文王其疾敬德之語而致重復懇切之意云其惟王勿以小民淫用非彞亦敢殄戮用乂民若有功刑者德之反疾於敬德則當緩於用刑勿以小民過用非法之故亦敢於殄戮用治之也惟順導民則可有功民猶水也水泛濫横流失其性矣然壅而遏之則害愈甚惟順而導之則可以成功其惟王位在德元小民乃惟刑用于天下越王顯元首也居天下之上必有首天下之德王位在德元則小民皆儀刑用德于下於王之德益以顯矣朱子曰其惟王勿以小民至越王顯為一節勿蘇氏曰商俗靡靡其過用非常也久矣召公戒王以小民過用非常之故亦敢於法外殄戮以治之葢民之有過罪實在我及其有功則王亦有德何也王之位民德之先倡也如此則法行於天下而王亦顯矣位陳氏大猷曰順夏商之有功者猶上言嗣若功王不在於位也順民惟在德元而已德元亦猶乾元坤元之始生萬物者也吕氏曰以小民淫用非彞而敢於殄戮忿嫉一生則損君德矣人君之德止於好生元者善之長君以德元覆冒天下安可以小民淫用遂損君德民新安陳氏曰至此則非彞之小民化為用德之小正所謂若順導之而有功者王奚以尚刑不尚德為哉上下勤恤其曰我受天命丕若有夏厯年式勿替有殷厯年欲王以小民受天永命其亦期之辭也君臣勤勞期曰我受天命大如有夏厯年用勿替有殷歴年欲兼夏殷厯年之永也召公又繼以欲王以小民受天永命葢以小民者勤恤之實受天永命者厯年之實也蘇氏曰君臣一心以勤恤民庶幾王受命厯年如夏商且以民心為天命也朱子曰以小民如以某師之以命林氏曰王能敬德于上而小民儀刑于下則天永之矣所謂用小民以受天永命也其吕氏曰召公拳拳言小民者國之根本全在小民亡其亡不在大族不在諸侯止在小民之身之陳氏曰小民人所易忽澤及小民則無不及矣堯不虐無告文王之施仁先四者是也新安陳氏曰勤恤即無疆惟恤之恤上下勤勞以軫無疆之恤惟期於兼二代之厯年非他有以也惟欲王以小民受永命耳三節三言小民始戒王以非彞殄戮之繼欲以元德儀刑之末欲以之而受永命以之者何惟尚德不尚刑知其生雖至㣲而關於天命者至大至久也西山真氏曰前言王其德之用祈天永命此言欲王以小民受天永命葢永命之道無他惟修德與愛民而已命在天於小民何與葢天無心以民為心耳一篇之中言敬者凡七八曰曷其奈何弗敬曰王敬作所曰不可不敬德曰王其疾敬德兩言惟不敬厥德乃早墜厥命曰肆惟王其疾敬德言之諄望之切老臣事少主惓惓之心也異時成王為守文令主而周家卜世卜年過於夏商且過其厯然後知召公之言真人主之藥石國家之蓍龜也哉欲臨川呉氏曰勤恤猶帝典言欽哉欽哉惟刑之恤王以小民受天永命一語通結上三節與王其德之用祈天永命一語相始終拜手稽首曰予小臣敢以王之讐民百君子越友民保受王威命明德王末有成命王亦顯我非敢勤惟恭奉幣用供王能祈天永命讐民殷之頑民與三監叛者百君子殷之御事庶士也友民周之友順民也保者保而不失受者受而無拒威命明德者德威德明也末終也召公於篇終致敬言予小臣敢以殷周臣民保受王威命明德王當終有天之成命以顯于後世我非敢以此為勤惟恭奉幣帛用供王能祈天永命而已葢奉幣之禮臣職之所當恭而祈天之實則在王之所自盡也又按恭奉幣意即上文取幣以錫周公而旅王者葢當時成王將舉新邑之祀故召公奉以助祭云薛氏曰先讐民後友民者作洛以鎮靜商人為先也與前言先服殷御事同意陳氏經曰保受王之威德奉行之此臣之職也王既有成命當求所以永命成命在今日永命在子孫保受王之威德者臣下之所能至於祈天永命則非人臣之所能在人君疾敬德以祈天命我非敢勤者召公不敢自以治洛為功勞也至此則責望於王之身者甚重恐成王專倚恃臣下也我但能恭奉幣以供王慶王之能祈天永命而已則祈天永命在王而不在召公矣民陳氏大猷曰篇終復總始末之要以告王敢以讐等保受威命明德者因庶殷侯甸和會作洛而言敢以者自任之辭如命侯甸庶殷即王之威命宅洛圖治即王之明德和會丕作即保受也王末有成命與上王厥有成命相應王亦顯與上越王顯相應我非敢自居其勤慮王以人心已從天命已定而自足也惟恭奉幣指前取幣旅王而言待王能祈天永命將以致慶而已期王不已之意可謂婉而篤矣記曰頌而無諂諫而無矯召公以之小新安陳氏曰所謂能祈天永命不過上文敬德愛民之事敬德愛小民即祈天永命之能也上文已盡之故於篇終特以能字該之臨川呉氏曰王末有成命因上文王厥有成命而言顯字勤字因上文越王顯上下勤恤而言恭奉幣因上文取幣旅王若公而言能祈天永命亦因上文而言以結一篇之意洛誥洛邑既定周公遣使去聲告卜史氏録之以為洛誥又并記其君臣答問及成王命周公留治洛之事今文古文皆有按周公拜手稽首以下周公授使者告卜之辭也王拜手稽首以下成王授使者復公之辭也王肇稱殷禮以下周公教成王宅洛之事也公明保于冲子以下成王命公留後治洛之事也王命予來以下周公許成王留洛君臣各盡其責難之辭也伻來以下成王錫命毖殷命寧之事也戊辰以下史又記其祭祀冊誥等事及周公居洛嵗月久近以附之以見周公作洛之始終而成王舉祀發政之後即歸于周而未嘗都洛也朱子因讀尚書曰其間錯誤解不得處煞多昔吕伯恭解書因問之云尚書還有解不通處答曰無有因舉洛誥問之云據成王只使周公往營洛故伻來獻圖及卜成王未嘗一日居洛後面如何却與周公有許多答對又云王在新邑此如何解伯恭遂無以答後得書云誠有解不得處洛誥之文有不可曉者其後乃言王在新邑而其前已屢有答問之詞矣史葉氏曰此篇當與召誥㕘看葢非一時之言取周公得卜至遣使告卜相與往來告戒本末序次之以示後世也王氏安石曰此誥有不可知者當缺之而釋其可知者洛新安陳氏曰此篇大可疑者惟有公告王宅行祀出命之辭而不載王至洛之事與其日月觀十二月在洛祭告命周公留治洛之事尚謹書之則自三月後至十二月前此數月中至洛之大事其當書也必矣又此篇首章九句脱簡在康誥之首則首至洛之事其脱簡又可想矣且孺子其朋及汝惟冲子惟終等處聱牙難通又王曰公功棐迪篤之下無周公答辭而即又繼以王曰豈非此等處有脱簡錯簡耶周公拜手稽首曰朕復子明辟此下周公授使者告卜之辭也拜手稽首者史記周公遣使之禮也復如復逆之復成王命周公往營成周周公得卜復命于王也謂成王為子者親之也謂成王為明辟者尊之也周公相成王尊則君親則兄之子也明辟者明君之謂先儒謂成王幼周公代王為辟至是反政成王故曰復子明辟夫有失然後有復武王崩成王立未嘗一日不居君位何復之有哉蔡仲之命言周公位冢宰正百工則周公以冢宰總百工而已豈不彰彰明甚矣乎王莽居攝幾傾漢鼎皆儒者有以啟之是不可以不辨蘓氏曰此上有脫簡在康誥自惟三月哉生魄至洪大誥治四十八字王氏安石曰復如復逆之復成王命公往營成周公得卜復命于王曰子親之也曰明辟尊之也先儒以周公代王為辟至是反政以書攷之周公位冢宰正百官而已未嘗代王為辟何復之有程子曰猶言告嗣天子王矣明葉氏曰復如孟子有復于王之復自孔氏以復子辟謂周公攝而歸政之辭古今儒者從之不敢易獨王氏以為不然世或未之信焉以子考之周公踐天子位以治天下初無經見獨明堂位云爾明堂位非出吾夫子也葢武王崩周公以冢宰攝政此禮之常攝者攝其事非攝其位世見周公在喪之攝不知其非以成王幼而攝故至卜洛猶有歸政之言則王氏之言為有證新安陳氏曰按王莽廢漢孺子嬰為安定公執其手流涕曰昔周公攝位終得復子明辟今予獨迫皇天威命不得如意葢因孔氏釋經之誤莽遂借此以文其姦王如弗敢及天基命定命予乃𦙍保大相去聲東土其基作民明辟凡有造基之而後成成之而後定基命所以成始也定命所以成終也言成王幼冲退託如不敢及知天之基命定命予乃繼太保而往大相洛邑其庶幾為王始作民明辟之地也洛邑在鎬京東故曰東土朱子曰周公不欲斥言王幼不能故言王若不敢及天之初命定命則不得不嗣攝政事保佑王躬而相此洛邑以為王當於此初作民主也久王氏炎曰承天命以作新邑是謂基命都邑既成安長治是謂定命傳葵初王氏曰朱子釋𦙍保不若順正與太保先周公相宅合予惟乙夘朝至於洛師我卜河朔黎水我乃卜澗水東瀍水西惟洛食我又卜瀍水東亦惟洛食伻補耕反來以圖及獻卜乙夘即召誥之乙夘也洛師猶言京師也河朔黎水河北黎水交流之内也澗水東瀍水西王城也朝㑹之地瀍水東下都也處上聲商民之地王城在澗瀍之間下都在瀍水之外其地皆近洛水故兩云惟洛食也食者史先定墨而灼卜之兆正食其墨也伻使也圖洛之地圖也獻卜獻其卜之兆辭也張氏曰王者以民為重故曰師曰袁氏曰黎水言河朔則知澗瀍皆河南今陳氏經先言惟洛食即今河南後言惟洛食即洛陽言公於洛卜此二處也召誥曰太保朝至于洛卜宅則卜乃召公卜今周公曰我卜者二公同心同謀召公之卜即周公之卜也河蘇氏曰黎水今黎陽也營洛以處殷民民重遷以朔為近便卜不吉然後卜洛也其吕氏曰下都之民主于商民先卜河朔黎水者固所安也意在近地者商民之心意在地中者周公之心竝列二說以聽於天而已卜黎於先者先人後已之心也黎既不吉改卜洛邑龜乃協從葢周公之心即天心也無間故無違也於史氏漸曰世或謂周公三卜而後洛初於黎水再澗東瀍西又於瀍東皆不若洛之吉豈知澗瀍之東西即洛之中也澗水之東即洛之偏也同名為洛而王城頑民之居不同非洛自為洛澗瀍自為澗瀍洛邑居天下之中伊洛瀍澗實周流於其間天子南嚮則澗水在洛之右瀍水在洛之左周公於澗瀍之中龜兆告吉遂營王城以建王宫定郊社宗廟是為郟鄏之地今之河南是也又循之左越瀍水之東龜復告吉遂營下都名曰成周又曰東郊以居殷民今之洛陽是也二城相距葢十有八里史臨川呉氏曰龜卜占法今不傳據楮少孫所録在記龜策傳者每一事有一占洛各不同疑卜宅之占以兆食墨而明為吉不食則其兆曖昧非吉兆也先卜黎陽不吉乃卜洛邑二處而龜兆皆食其墨也王拜手稽首曰公不敢不敬天之休來相宅其作周匹休公既定宅伻來來視予卜休恒吉我二人共貞公其以予萬億年敬天之休拜手稽首誨言此王授使者復公之辭也王拜手稽首者成王尊異周公而重其禮也匹配也公不敢不敬天之休命來相宅為周匹休之地言卜洛以配周命於無窮也視示也示我以卜之休美而常吉者也二人成王周公也貞猶當也十萬曰億言周公宅洛規模宏逺以我萬億年敬天休命故又拜手稽首以謝周公告卜之誨言朱子曰拜受公言猶禹之拜昌言也匹吕氏曰營洛實配宗周其作我周匹休之也者對宗周之辭以予者使之之辭倚之者甚重而望之者甚長也或曰王不在洛言來者順公所在而言王氏十朋曰詩之作豐伊匹與此匹休同意當夏氏曰貞如厥賦貞之貞謂相當也王欲與公共此吉祥休王氏曰言宅洛之事定矣公當以予永逺敬天之以承此休常吉之卜也新安陳氏曰視與示同古通用漢書凡示字例作視十萬曰億秦誓又云百萬曰億不同何也詩禾三百億鄭注十萬曰億毛公萬萬曰億孔疏今九章算術皆以萬萬為億鄭以古數言之韋昭注楚語曰十萬曰億古數也秦始以萬萬為億百萬為億未見所本周公曰王肇稱殷禮祀于新邑咸秩無文此下周公告成王宅洛之事也殷盛也與五年再殷祭之殷同秩序也無文祀典不載也言王始舉盛禮祀于洛邑皆序其所當祭者雖祀典不載而義當祀者亦序而祭之也吕氏曰定都之初肇舉盛禮大饗羣祀雖祀典不載者咸秩序而祭之有告焉有報焉有祈焉始建新都昭假音格上下告成事也雨暘時若大役已成報神賜也自今以始永奠中土祈鴻休也後世不知祭祀之義鬼神之德觀周公首以祀于新邑為言若闊於事情者抑不知人主臨鎮新都之始齊祓音齋弗一心對越天地達此精明之德放上聲諸四海無所不凖而助祭諸侯下逮胞翟音庖狄肉祭統曰胞者吏之賤者翟者樂吏之賤者也之賤亦皆有孚顒音濃若收其放而合其離葢格君心萃天下之道莫要於此宜周公以為首務也朱子曰自此以下漸不可曉葢不知是何時所言傳疏以為王與公俱在洛對問之言葉氏以為王得卜而至洛既祭復歸鎬因留周公居守而周公有此言皆不可考然葉氏説復數章貫穿今從之取復齋董氏曰易曰殷薦之上帝禮有殷祭殷奠皆殷盛之義新安陳氏曰王氏謂此殷禮疑即篇末十二月戊辰之祭史述其語於前而記其事於後也竊意十二月之祭不過以周公留治洛之事就冬烝以告文武耳此曰殷禮曰秩無文乃非常盛禮豈十二月之祀足以當之三月後以至十一月王必當親至洛行大祀禮今脱去矣自此下至無逺用戻乃洛邑既成公自洛歸鎬告王以宅洛所當行之事及欲退老之辭也肇稱殷禮以下乃周公至鎬請王往新邑舉祀禮及朝諸侯證之召誥公至洛定宅後當還鎬京觀召公取諸侯之幣錫公由公以達王則可見矣孺子其朋以下必有訛誤脫簡漏却王祀新邑必在此處無疑也況梓材庶邦享集丕享等語其為敬識百辟享之上下文脱簡在彼尤為顯然乎予齊百工伻從王于周予惟曰庶有事周公言予整齊百官使從成王于周謂將適洛時也予惟謂之曰庶幾其有所事乎公但㣲示其意以待成王自教詔之也夏氏曰王祭于新邑我則整齊百官使從王往新邑惟謂百官言女從王而往庶幾必有事於周欲禮樂自天子出也從新安陳氏曰周公言我今整齊共營洛之百官使王于宗周我惟謂之曰王庶幾將適新邑而有事乎國之大事在祀與戎故古人於祭祀皆曰有事公但㣲示王將行祀事於洛之意於百官以待王之自教詔之也今王即命曰記功宗以功作元祀惟命曰汝受命篤弼功宗功之尊顯者祭法曰聖王之制祭祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之葢功臣皆祭於大烝而勲勞之最尊顯者則為之冠故謂之元祀周公教成王即命曰記功之尊顯者以功作元祀矣又惟命之曰汝功臣受此褒賞之命當益厚輔王室葢作元祀既以慰答功臣而又勉其左右王室益圖久大之業也吕氏曰洛邑既成周業既定論創業之勲不可後也功臣之冠天下觀瞻鎮服羣下實繫此舉論功莫先於宗言宗則凡功臣可得而推矣報功莫重於祀言祀則凡慶賞可得而推矣丕視功載乃汝其悉自教工丕大視示也功載者記功之載籍也大視功載而無不公則百工效之亦皆功也大視功載而或出於私則百工效之亦皆私也其公其私悉自汝教之所謂乃汝其悉自教工也上章告以褒賞功臣故戒其大視功載者如此朱子曰今王乃命曰我嘗記人之功而尊之又以此功因新邑殷祀而告之神明矣安呉氏曰已死者祀之其生者則載以旌賞之新陳氏曰公因告王今當即出命曰新邑之祀將記録創業功臣之宗勲勞最顯者以其功列之大祀吏與享矣又當專命羣臣曰汝之受命而能厚輔王室者亦將大祖其功而記載之於冊書以功作元祀者所以報功臣於既往丕視功載者所以勸功臣於方來載之今日又當祀之後日也公又謂王言上即命惟命二說乃汝其悉自教詔於百工其機雖自公發之其教當自王出之也孺子其朋孺子其朋其往無若火始燄燄厥攸灼叙弗其絶孺子稚子也朋比音備下竝同也上文百工之視傚如此則論功行賞孺子其可少狥比黨之私乎孺子其少狥比黨之私則自是而往有若火然始雖燄燄尚微而其灼爍式約反將次第延爇如劣反不可得而撲滅矣言論功行賞徇私之害其初甚㣲其終至於不可遏絶所以嚴其辭而禁之於未然也朱子曰周公言既如此則孺子往矣燄火始然尚㣲而方進之貌灼焚也叙次第也始林氏曰如漢之朋黨始於甘陵南北部庶之朋黨於牛李其終搢紳稔禍海内塗炭是也厥若彞及撫事如予惟以在周工往新邑伻嚮即有僚明作有功惇大成裕汝永有辭其順常道及撫國事常如我為政之時惟用見在周官勿㕘以私人往新邑使百工知上意嚮各就有僚明白奮揚而赴功惇厚博大以裕俗則王之休聞去聲亦永有辭于後世矣朱子曰戒成王歸宗周其所順之常道及撫臨衆事皆當如我所行也在周百工皆我所總齊諸習於事當推用此人明作有功之事務為惇大之道以成寛裕之政則汝亦長有寛裕之辭於後世矣言往者如云來相宅順王所在而言趨事赴工常失之急薄故又言惇大成俗以救其失漢吕氏曰漢文近於惇大成裕而無所謂明作有功宣近於明作有功而無所謂惇大成裕寛陳氏曰彰明振作以有功績而乂惇厚廣大以成裕是立精明之治功而存渾厚之治體也公曰已汝惟沖子惟終周之王業文武始之成王當終之也此上詳於記功教工内治之事此下則綂御諸侯教養萬民之道也朱子曰周公言已矣乎汝成王惟沖子當惟其終猶伊尹言慎厥終也汝其敬識百辟享亦識其有不享享多儀儀不及物惟曰不享惟不役志于享凡民惟曰不享惟事其爽侮此御諸侯之道也百辟諸侯也享朝享也儀禮物幣也諸侯享上有誠有偽惟人君克敬者能識之識其誠於享者亦識其不誠於享者享不在幣而在於禮幣有餘而禮不足亦所謂不享也諸侯惟不用志於享則國人化之亦皆謂上不必享矣舉國無享上之誠則政事安得不至於差爽僭侮隳王度而為叛亂哉人君可不以敬存心辨之於早察之於㣲乎朱子曰享朝而以幣享王誠以奉上之辭幣有餘而禮不及者往往有輕上之心以為可以幣交也曰吾幣足矣何以禮為如是者猶不享也以蘇氏曰小人賄以悦人必簡於禮公戒王責諸侯禮不以幣恐其役志乎物而不役志乎禮則諸侯慢而王室輕矣此治亂之本故公特言之春秋傳曰晉趙文子為政薄諸侯之幣而重其禮晉穆叔曰自今已往兵其少弭矣夫以列國之卿輕幣重禮猶足以弭兵王而賄其致寇也必矣唐之衰君相皆可以賄取方鎮爭貢羨餘行苞苴而天子始失其政以至於亡周公之戒至矣新安陳氏曰此因將往新邑朝諸侯而言亦因召公取諸侯之幣旅王而言也乃惟孺子頒朕不暇聴朕教汝于棐民彞汝乃是不蘉謨郎反乃時惟不永哉篤叙乃正父罔不若予不敢廢乃命汝往敬哉兹予其明農哉彼裕我民無逺用戾此教養萬民之道也頒朕不暇未詳或曰成王當頒布我汲汲不暇者聽我教汝所以輔民常性之道汝於是而不勉焉則民彞泯亂而非所以長久之道矣正父武王也猶今稱先正云者篤者篤厚而不忘叙者先後之不紊言篤叙武王之道無不如我則人不敢廢汝之命矣吕氏曰武王沒周公如武王故天下不廢周公之命周公去成王如周公則天下不廢成王之命戾至也王往洛邑其敬之哉我其退休田野惟明農事葢公有歸老之志矣彼謂洛邑也王於洛邑和裕其民則民將無逺不至焉朱子曰周公戒成王使聽我教汝以輔民常性之道若汝不勉則不能永保天命也然則所以輔民常性者惟在乎勉而已篤叙汝武王之所行無不如予之所以厚叙者前日未暇為之事一一行之陳氏經曰汝當頒我息齋徐氏曰説命先正訓為先世長官之臣此指武王而引先正為言何也或曰武王撥亂反正故稱正父新安陳氏曰此一節除汝往敬哉兹子其明農哉二句外皆不可曉皆當缺之味此二句可見公時在鎬欲王往新邑而已將退老也此章之下當必有公從王至新邑舉祀發命之事而今缺矣王若曰公明保予冲子公稱丕顯德以予小子揚文武烈奉答天命和恒四方民居師此下成王答周公及留公也大抵與上章㕘錯相應明顯明之也保保祐之也稱舉也和者使不乖也恒者使可久也居師者宅其衆也言周公明保成王舉大明德使其上之不忝於文武仰不愧天俯不怍人也朱子曰居師營洛邑定民居也公新安陳氏曰此王既至洛舉祀復與公言將留治洛先叙述公之功德以一慰藉之也惇宗將禮稱秩元祀咸秩無文宗功宗之宗也下文宗禮同將大也孔氏曰厚尊大禮舉秩大祀新安陳氏曰此葢王述已行之事之辭即答公所謂王肇稱殷禮祀于新邑咸秩無文也惟公德明光于上下勤施于四方旁作穆穆迓衡不迷文武勤教予冲子夙夜毖祀旁無方所也因上下四方為言穆穆和敬也迓迎也言周公之德昭著於上下勤施于四方旁作穆穆以迎治平不迷失文武所勤之教於天下公之德教加於時者如此予冲子夫音扶何為哉惟早夜以謹祭祀而已葢成王知周公有退休之志故示其所以留之之意也朱子曰穆穆和敬之貌天子之容旁作謂周公輔成已德以迎迓太平之治而不迷於先王之教猶陳氏大猷曰不曰已太平方且和敬以迓之已治未治也使以為既平則無亹亹方進之意盈而不可久矣毖蘇氏曰祭則我沖子政則周公成王言我歸宗周祀而已唐孔氏曰衛獻公云政由寗氏祭則寡人亦略猶是言祭則我小子迓太平明教化皆委重於公也新安陳氏曰此王推美歸重於公猶欲其益因德業之盛而加自強不息之誠我小子但主祀而已此已示留公之意也王曰公功棐迪篤罔不若時言周公之功所以輔我啟我者厚矣當常如是未可以言去也朱子曰公之功輔導我已厚矣無不若是以上所稱也王曰公予小子其退即辟于周命公後此下成王留周公治洛也成王言我退即居于周命公留後治洛葢洛邑之作周公本欲成王遷都以宅天下之中而成王之意則未欲捨鎬京而廢祖宗之舊故於洛邑舉祀發政之後即欲歸居于周而留周公治洛謂之後者先成王之辭猶後世留守留後之義先儒謂封伯禽以為魯後者非是攷之費誓東郊不開乃在周公東征之時則伯禽就國葢已久矣下文惟告周公其後其字之義益可見其為周公不為伯禽也朱子曰上文王曰兩段周公無答辭疑有缺文成王言我當歸即政于宗周而命公留于洛猶唐節度留後之意伯史丞相説書亦有好處如命公後衆說亦皆云命禽為周公之後史云成王既歸命周公在後看公定予往已一言便見得是周公旦在後之意西山真氏曰按史記魯世家伯禽即位之後管蔡等反淮夷徐戎亦竝興於是伯禽帥師伐之於肸遂平徐戎據此則蔡說當矣新安陳氏曰成王自謂其退即辟于周味退之一字則王時進在洛邑可知據身在洛邑言故以還歸宗周為退退固王之謙辭亦述往返語勢之當然耳先儒於此皆忽之故不敢質言此章為王至洛後之辭也四方迪亂未定于宗禮亦未克敉公功宗禮即功宗之禮也亂治也四方開治公之功也未定功宗之禮故未能敉公功也敉功者安定其功之謂即下文命寧者也朱子曰迪順也四方雖已順治猶未定于尊公之禮未有以撫治公之功迪將其後監音鑒我士師工誕保文武受民亂為四輔將大也周公居洛啟大其後使我士師工有所監視太保文武所受於天之民而治為宗周之四輔也漢三輔葢本諸此今按先言啟大其後而繼以亂為四輔則命周公留後於洛明矣朱子曰周公在後監我百官士也師也工也四輔猶四鄰弼新安陳氏曰王制曰設四輔及三公四輔左輔右前疑後丞也引王制之四輔解此四輔亦與朱子四鄰之說合王以治為四輔之大臣望公下文公以治為四方之新辟望王君臣交相期望也王曰公定予往已公功肅將祇歡公無困哉我惟無斁其康事公勿替刑四方其世享定爾雅曰止也成王欲周公止洛而自歸往宗周言周公之功人皆肅而將之欽而悅之宜鎮撫洛邑以慰懌人心母求去以困我也我惟無厭其安民之事公勿替所以監我士師工者四方得以世世享公之德也呉氏曰前漢書兩引公無困哉皆以哉作我當以我為正朱子曰此王與公決而歸之言也公定居洛予往歸周已公無用哉言公無以事自困猶漢所謂閔勞公以官職之事也我則當無厭倦於安國安民之事公但勿廢其所以儀刑四方者則四方其世享矣勿一説世享世世尊享我周無困勿替皆欲公留而去之意新安陳氏曰此章之上必有公答王之辭葢不許王留後之請也所以王言公止我往歸周矣公無困我是以不許留為困之其辭危勿替刑以下其望逺又上章言予沖子夙夜毖祀成王全倚重於公而已僅主祭宜公未許留至此曰我惟無倦於康安之事是王能以安天下自任而不全倚於公宜公下章幡然許留也周公拜手稽首曰王命予來承保乃文祖受命民越乃光烈考武王𢎞朕恭此下周公許成王留等事也來者來洛邑也承保乃文祖受命民及光烈考武王者答誕保文武受民之言也責難於君謂之恭𢎞朕恭者大其責難之義也陳氏曰𢎞大我事君之恭孺子來相宅其大惇典殷獻民亂為四方新辟作周恭先曰其自時中又萬邦咸休惟王有成績典典章也殷獻民殷之賢者也言當大厚其典章及殷之獻民葢文獻者為治之大要也亂治也言成王於新邑致治為四方新主也作周恭先者人君恭以接下以恭而倡後王也公又言其自是宅中圖治萬邦咸底休美則王其有成績矣此周公以治洛之效望之成王也新安陳氏曰孺子來相宅乃公述王之此行也作周恭先為周家恭敬之王之先以恭而率先後之為王者也曰者公期望於王之辭其自時中乂其即將然之辭也予旦以多子越御事篤前人成烈答其師作周孚先考朕昭子刑乃單文祖德多子者衆卿大夫也唐孔氏曰子者有德之稱大夫皆稱子師衆也周公言我以衆卿大夫及治事之臣篤厚文武成功以答天下之衆也孚信也作周孚先者人臣信以事上以信而倡後人也考成也昭子猶所謂明辟也親之故曰子刑儀刑也單殫也言成我明子儀刑而殫盡文王之德葢周公與羣臣篤前人成烈者所以成成王之刑乃殫文祖德也此周公以治洛之事自效也新安陳氏曰作周孚先為周家孚信之臣之先以信而率先後之為臣者也亂為四方新辟當與亂為四輔對觀作周孚先當與作周恭先對觀葢公與王交相期望各盡責任之辭也疑陳氏大猷曰此處下有缺文伻來毖殷乃命寧予絶句以秬鬯音巨暢二卣音有曰明禋音因拜手稽首休享此謹毖殷民而命寧周公也秬黑黍也一稃音夫二米和氣所生鬯鬱金香草也卣中尊也明潔禋敬也以事神之禮事公也蘇氏曰以黒黍為酒合以鬱鬯所以祼音貫也宗廟之禮莫盛於祼王使人來戒敕庶殷且以秬鬯二卣綏寧周公曰明禋曰休享者何也事周公如事神明也古者有大賔客以享禮禮之酒清人渴而不飲肉乾音干人饑而不食也故享有體薦豈非敬之至者則其禮如祭也歟新安陳氏曰寧如歸寧父母之寧曰明禋拜手稽首休享者述王命使之辭曰此明潔以禋祀之酒今拜稽而致休美以享公焉敬之至者其禮如祭傳曰享有體薦一證也記曰君子敬則用祭器又一證也予不敢宿則禋于文王武王宿與顧命三宿之宿同禋祭名周公不敢受此禮而祭於文武也息齋徐氏曰顧命宿訓為進爵孔氏說也唐孔氏申其義以為進爵於神前惠篤叙無有遘自疾萬年厭于乃德殷乃引考此祭之祝辭周公為成王禱也惠順也篤叙與篤叙乃正父同順篤叙文武之道身其康強無有遘遇自罹疾害者子孫萬年厭飽乃德殷人亦永壽考也陳氏大猷曰惠順文武之道篤叙而行之王伻殷乃承叙萬年其永觀朕子懷德承聽受也叙教條次第也王使殷人承叙萬年其永觀法我孺子而懷其德也葢周公雖許成王留洛然且謂王伻殷者若曰遷洛之民我固任之至於使其承叙萬年則實繫於王也亦責難之意與召誥末用供王能祈天永命語脈相類張氏曰觀此書周公不敢當成王秬鬯之禮則天子之禮樂公其敢當乎所以春秋於魯之郊禘皆貶其僭則成王之賜伯禽之受其失可見豈周公之所敢安乎戊辰王在新邑烝祭歳文王騂牛一武王騂牛一王命作冊逸祝冊惟告周公其後王賔殺禋咸格王入太室祼此下史官記祭祀冊誥等事以附篇末也戊辰十二月之戊辰日也是日成王在洛舉烝祭之禮曰歳云者歳舉之祭也周尚赤故用騂宗廟禮太牢此用特牛者命周公留後於洛故舉盛禮也逸史佚也作冊者冊書也逸祝冊者史逸為祝冊以告神也惟告周公其後者祝冊所載更不他及惟告周公留守其後之意重其事也王賔猶虞賔杞宋之屬助祭諸侯也諸侯以王殺牲禋祭祖廟故咸至也太室清廟中央室也祼灌也以圭瓉酌秬鬯灌地以降神也王命周公後作冊逸誥在十有二月逸誥者史逸誥周公治洛留後也在十有二月者明戊辰為十二月日也惟周公誕保文武受命惟七年吳氏曰周公自留洛之後凡七年而薨也成王之留公也言誕保文武受民公之復成王也亦言承保乃文祖受命民越乃光烈考武王故史成於其終計其年曰惟周公誕保文武受命惟七年葢終始公之辭云多士商民遷洛者亦有有位之士故周公洛邑初政以王命總呼多士而告之編書者因以名篇亦誥體也今文古文皆有吳氏曰方遷商民于洛之時成周未作其後王與周公患四方之逺鑒三監之叛於是始作洛邑欲徙周而居之其曰昔朕來自奄大降爾四國民命我乃明致天罰移爾遐狄比事臣我宗多遜者述遷民之初也曰今朕作大邑于兹洛予惟四方罔攸賔亦惟爾多士攸服奔走臣我多遜者言遷民而後作洛也故洛誥一篇終始皆無欲遷商民之意惟周公既誥成王留治于洛之後乃曰伻來毖殷又曰王伻殷乃承叙當時商民已遷于洛故其言如此愚謂武王已有都洛之志故周公黜殷之後以殷民反覆難制即遷于洛至是建成周造廬舍定疆場乃告命與之更平聲始焉爾此多士之所以作也由是而推則召誥攻位之庶殷其已遷洛之民歟不然則受都今衛州也洛邑今西京也相去四百餘里召公安得捨近之友民而役逺之讐民哉書序以為成周既成遷殷頑民者謬矣吾固以為非孔子所作也吕氏曰遷洛之事召語經營之洛誥考成之多士則慰安之也張氏曰周之頑民乃商之忠臣也王氏曰篇名多士而序以為頑民何也在官者謂之士卿大夫士是也在民者謂之士士農工商是也此書稱士皆在官之殷士也且周公未始以殷民為頑成王命君陳始有無忿疾于頑之語夫殷民不附周謂之頑可也不忘殷謂之頑可乎故頑之一字周公於康誥酒誥多士多方等書未嘗出諸口也自新安陳氏曰諸家過信小序所以於昔朕來奄全説不通呉蔡當矣殷吉豐彭氏曰此篇以多士名者葢遷洛雖皆民而中亦有有位者惟謂之士則上可以該夫卿大夫下可以該夫士農工商故以多士總之惟三月周公初于新邑洛用告商王士此多士之本序也三月成王祀洛次年之三月也周公至洛久矣此言初者成王既不果遷留公治洛至是公始行治洛之事故謂之初也曰商王士者貴之也孔氏曰周公致政明年三月也或曰于於也殷王氏曰殷民遷于成周從舊長所治故先告之士順從則殷民皆然矣王若曰爾殷遺多士弗弔是天大降喪去聲于殷我有周佑命將天明威致王罰勑殷命終于帝弗弔未詳意其為歎憫之辭當時方言爾也旻天秋天也主肅殺而言歎憫言旻天大降災害而喪殷我周受眷佑之命奉將天之明威致王罰之公勑正殷命而格之以終上帝之事葢推革命之公以開諭之也息齊徐氏曰弗弔大誥引不弔昊天為訓甚明王吕氏曰以天言之曰明威以人言之曰王罰氏曰終與受終于文祖之終同肆爾多士非我小國敢弋殷命惟天不畀允罔固亂弼我我其敢求位肆與康誥肆汝小子封同弋取也弋鳥之弋言有心於取之也呼多士誥之謂以勢而言我小國亦豈敢弋取殷命葢栽者培之傾者覆之固其治而不固其亂者天之道也惟天不與殷信其不固殷之亂矣惟天不固殷之亂故輔我周之治而天位自有所不容辭者我其敢有求位之心哉蘇氏曰固如推亡周存之固信矣天之固治不固亂也則林氏曰告殷七以天命之公使知殷失天命而亡誰能與之周得天命而興則誰能違之惟帝不畀惟我下民秉為惟天明畏秉持也言天命之所不與即民心之所秉為民心之所秉為即天威之所明畏者也反覆天民相因之理以見天之果不外乎民民之果不外乎天也詩言秉彞此言秉為者彞以理言為以用言也陳氏經曰紂之惡至於失人心則天命之所去周之德至於下民秉為即天命之所與新安陳氏曰既曰惟天不畀又曰惟帝不畀既曰將天明威又曰惟天明畏反覆以天命之去留曉殷士而潛消其覬覦猜疑之私耳息齋徐氏曰明畏只如臯陶謹篇所訓為明我聞曰上帝引逸有夏不適逸則惟帝降格嚮于時夏弗克庸帝大滛泆有辭惟時天罔念聞厥惟廢元命降致罰引導逸安也降格與吕刑降格同吕氏曰上帝引逸者非有形聲之接也人心得其安則亹亹而不能已斯則上帝引之也是理坦然亦何間去聲於桀第桀喪其良心自不適於安耳帝實引之桀實避之帝猶未遽絶也乃降格災異以示意嚮於桀桀猶不知警懼不能敬用帝命乃大肆淫逸雖有矯誣之辭而天罔念聞之仲虺所謂帝用不臧是也廢其大命降致其罰而夏祚終矣陳氏大猷曰天於人君常欲導之於安逸之地如為善最樂作德日休即帝之引逸也桀乃不適於逸自趨於危是吕氏曰夭人之際惟極乃通治極則通格于皇天也亂極亦通惟帝降格是也桀惡升聞故帝降格譴告災異以示所嚮於是覆邦董子曰天心仁愛人君必出災異以警戒之即降格之謂也自絶于天天亦絶之國之元命猶人之元氣有則生無則死者也乃命爾先祖成湯革夏俊民甸四方甸治也伊尹稱湯旁求俊彦孟子稱湯立賢無方葢明揚俊民分布逺邇甸治區畫成湯立政之大經也周公反覆以夏商為言者葢夏之亡即殷之亡湯之興即武王之興也商民觀是亦可以自反矣新安陳氏曰甸如奄甸萬姓之甸自成湯至于帝乙罔不明德恤祀明德者所以修其身恤祀者所以敬乎神也亦惟天丕建保又有殷殷王亦罔敢失帝罔不配天其澤亦惟天大建立保治有殷殷之先王亦皆操平聲存此心無敢失帝之則無不配天以澤民也薛氏曰無所不浹天之澤也王者宅天下無彼疆此界之殊配天其澤也明新安陳氏曰此之罔不明德與下文惟天不畀不厥德當對觀恤祀與罔失帝配天澤皆自克明德中來也商先王以明德而得天命也如此在今後嗣王誕罔顯于天矧曰其有聽念于先王勤家誕淫厥泆音逸罔顧于天顯民祇後嗣王紂也紂大不明於天道況曰能聽念商先王之勤勞於邦家者乎大肆淫泆無復顧念天之顯道民之敬畏者也惟時上帝不保降若兹大喪去聲大喪者國亡而身戮也惟天不畀不明厥德商先王以明德而天丕建則商後王不明德而天不界矣凡四方小大邦喪罔非有辭于罰凡四方小大邦國喪亡其致罰皆有可言者況商罪貫盈而周奉辭以伐之者乎吕氏曰天也祖宗也民也自古帝王所共畏也紂不聽念先王罔顧天顯民祇三畏皆亡無所不至矣新安陳氏曰紂之衆惡皆自不明德中來其以不明德而失天命也如此王若曰爾殷多士今惟我周王丕靈承帝事靈善也大善承天之所為也武成言祇承上帝以遏亂略是也有命曰割殷告勑于帝帝有命曰割殷則不得不戡音堪定剪除告其勑正之事于帝也武成言告于皇天后土將有大征于商者是也惟我事不貳適惟爾王家我適上帝臨汝毋貳爾心惟我事不貳適之謂上帝既命侯于周服惟爾王家我適之謂言割殷之事非有私心一於從帝而無貳適則爾殷王家自不容不我適矣周不貳于帝殷其能貳於周乎葢示以確然不可動摇之意而潛消頑民反側之情爾然聖賢事不貳適日用飲食莫不皆然葢所以事天也豈特割殷之事而已哉予其曰惟爾洪無度我不爾動自乃邑三監倡亂予其曰乃汝大為非法非我爾動變自爾邑猶伊尹所謂造攻自鳴條也予亦念天即于殷大戾肆不正予亦念天就殷邦屢降大戾紂既死武庚又死故邪慝不正言當遷徙也王曰猷告爾多士予惟時其遷居西爾非我一人奉德不康寧時惟天命無違朕不敢有後無我怨時是也指上文殷大戾而言謂惟是之故所以遷居西爾非我一人樂如是之遷徙震動也是惟天命如此汝毋違越我不可有後命謂有他罰爾無我怨也唐孔氏曰從殷適洛南行而西向故為西惟爾知惟殷先人有冊有典殷革夏命即其舊聞以開諭之也殷之先世有冊書典籍載殷革夏命之事正如是耳爾何獨疑於今乎今爾又曰夏迪簡在王庭有服在百僚予一人惟聽用德肆予敢求爾于天邑商予惟率肆矜爾非予罪時惟天命周公既舉商革夏事以論頑民頑民復以商革夏事責周謂商革夏命之初凡夏之士皆啟迪簡拔在商王之庭有服列于百僚之間今周於商士未聞有所簡拔也周公舉其言以大義折之言爾頑民雖有是言然予一人所聽用者惟以德而已故予敢求爾於天邑商而遷之於洛者以兾率德改行焉予惟循商故事矜恤於爾而已其不爾用者非我之罪也是惟天命如此葢章德者天之命今頑民滅德而欲求用得乎陳氏大猷曰迪簡王庭職之大者有服百僚職之小者聽用德聽察其有德者而用之陳氏經曰聽用德者爾有德我何敢不用爾無德我何敢苟用商士所言皆私情王所言皆天理不擇賢否而用非天理矣都吕氏曰商猶謂之天邑者葢言其地舊為天子之重其事而敬其辭裁之者固甚正待之者亦甚厚矣王曰多士昔朕來自奄音淹予大降爾四國民命我乃明致天罰移爾遐狄比去聲事臣我宗多遜降猶今法降等云者言昔我來自商奄之時汝四國之民罪皆應死我大降爾命不忍誅戮乃止明致天罰移爾逺居于洛以親比臣我宗周有多遜之美其罰葢亦甚輕其恩周已甚厚今乃猶有所怨望乎詳此章則商民之遷固已久矣朱子曰奄東方之國淮陳氏大猷曰此奄與夷三監同助武庚以叛周公東征一舉而誅四國獨言來自奄者伐奄在後誅奄即來也四國殷管蔡霍也以親我事我臣我宗法成周濟濟多遜之盛王曰告爾殷多士今予惟不爾殺予惟時命有申今朕作大邑于兹洛予惟四方罔攸賔亦惟爾多士攸服奔走臣我多遜以自奄之命為初命則此命為申命也言我惟不忍爾殺故申明此命且我所以營洛者以四方諸侯無所賔禮之地亦惟爾等服事奔走臣我多遜而無所處故也詳此章則遷民在營洛之先矣呉氏曰來自奄稱昔者逺日之辭也作大邑稱今者近日之辭也移爾遐逖比事臣我宗多遜者期之之辭也攸服奔走臣我多遜者果能之辭也以此又知遷民在前而作洛在後也爾乃尚有爾土爾乃尚寧幹止幹事止居也爾乃庶幾有爾田業庶幾安爾所事安爾所居也詳此章所言皆仍舊有土田居止之辭信商民之遷舊矣孔氏不得其說而以得反所生釋之於文義似矣而事則非也爾克敬天惟畀矜爾爾不克敬爾不啻不有爾土予亦致天之罰于爾躬敬則言動無不循理天之所福吉祥所集也不敬則言動莫不違悖天之所禍刑戮所加也豈特竄徙不有爾土而已哉身亦有所不能保矣新安陳氏曰蔡傳釋不啻不有爾土加竄徒二字尤善今爾惟時宅爾邑繼爾居爾厥有幹有年于兹洛爾小子乃興從爾遷邑四井為邑之邑繼者承續安居之謂有營為有壽考皆于兹洛焉爾之子孫乃興自爾遷始也夫自亡國之末裔為起家之始祖頑民雖愚亦知所擇矣王曰又曰時予乃或言爾攸居王曰之下當有缺文以多方篇末王曰又曰推之可見時我或有所言皆以爾之所居止為念也申結上文爾居之意王氏炎曰王曰下必有脱簡又曰下必有脱文不可強解新安陳氏曰多士一書中言興喪則由於天言天命則繫於德言德則本於敬終之以爾土爾邑有恒産者有恒心而非誘之以利也無逸逸者人君之大戒自古有國家者未有不以勤而興以逸而廢也益戒舜曰罔遊于逸罔淫于樂舜大聖也益猶以是戒之則時君世主其可忽哉成王初政周公懼其知逸而不知無逸也故作是書以訓之言則古昔必稱商王者時之近也必稱先王者王之親也舉三宗者繼世之君也詳文祖者耳目之所逮也上自天命精㣲下至畎畝艱難閭里怨詛無不具載豈獨成王之所當知哉實天下萬世人主之龜鑑也是篇凡七更端周公皆以嗚呼發之深嗟永歎其意深逺矣亦訓體也今文古文皆有張氏曰周召之於成王所陳在敬所戒在逸葢敬則不逸逸則不敬敬逸之分而厯年之延否享國之夀天判焉召公以敬陳於前周公以無逸戒於後不如是不足以為周召吕氏曰逸者禍亂之源三年東征以定外亂此特治其末流爾無逸者治源之書也無逸作於作洛之後成王即政之初陳氏大猷曰逸者萬惡之根無逸者萬善之本無逸一書所以為百代元龜書通釋注云無逸一篇其要在知小人之依是以首論人之賢愚係乎能知小人之依與否繼言殷三宗之壽由其能知乎此後王之天亦由其不能知也周之先王其智固不異於三宗周之後王宜以文王為法而以商紂為戒末言三宗文王有迪哲之實故聞小人之怨詈則反諸躬而不尤人成王其可聽信其語而速怨哉周公總以嗣王其監于兹結之得無意耶周公曰鳴呼君子所其無逸所猶處所也君子以無逸為所動靜食息無不在是焉作輟則非所謂所矣萍鄉栁兄言吕東萊解無逸一篇極好朱子扣之曰伯恭如何解君子所其無逸栁兄曰吕東萊解所字為居字曰若某則不敢如此説諸友請曰先生將如何説曰恐有脱字則不可知若説不行而必強立一説雖若可觀只恐道理不如此吕氏曰凡人乍勤乍怠亦有無逸之時然能暫而不能居非所其無逸者也惟君子以無逸為所如魚之於水鳥之於林有不可得而離者焉之陳氏大猷曰所若北辰居其所之所葢居而不移謂李氏杞曰所安也猶止其所之所所其無逸安於無逸也朱新安陳氏曰所其無逸與王敬作所不可不敬德子皆不欲以處所安居之意釋之懼其巧鑿非古人之本意也然吕説為可喜所以朱子非之而蔡氏仍本之先知稼穡之艱難乃逸則知小人之依先知稼穡之艱難乃逸者以勤居逸也依者指稼穡而言小民所恃以為生者也農之依田猶魚之依水木之依土魚無水則死木無土則枯民非稼穡則無以生也故舜自耕稼以至為帝禹稷躬稼以有天下文武之基起於后稷四民之事莫勞於稼穡生民之功莫盛於稼穡周公發無逸之訓而首及乎此有以哉林氏曰惟知稼穡之艱難為念而不留意於逸者乃所以能逸葢好逸者未必能逸無逸者乃能逸也備吕氏曰此非始於憂勤終於逸樂之論也葢言先嘗稼穡之艱難乃處於安逸則深知小人之所依未嘗知稼穡之艱難而遽處安逸興一宫室起一力役視若易然而民有不得其死者矣成王生於深宫遽處人上公深為之懼故以此章警之若以始勤終逸釋之是乾徤之體有時而息矣後世漸不克終之患未必非此論啟之自陳氏經曰乃逸非先艱難而後逸樂也艱難之中有逸樂之理君子當以艱難為逸不當以逸為逸也與南軒張氏曰周自后稷以農事開國歴世相傳相咨嗟歎息服習乎艱難而詠歌其勞苦此實王業之根本也周公之告成王詩有七月皆言農桑之候書有無逸欲其知稼穡知小人之依帝王所傳心法之要端在於此夫治常生於敬畏而亂常起於驕逸使為國者每念稼穡之艱難而心不存焉者寡矣是心常存則驕矜逸豫何自而生豈非治之所由興歟陳氏大猷曰所其無逸知小人之依此一篇之綱領後章言三宗文王及怨詈之事皆反覆推明乎此也新安陳氏曰先知稼穡之艱難乃逸以為先艱難而後可謀安逸固非矣以為艱難乃所以為安逸亦非也葢君逸於上君本逸也惟以勤居逸雖逸而能無逸吕氏此論超出諸家下文厥子不知稼穡之艱難乃逸乃諺既誕似若六字一句蔡氏提出謂此為以逸為逸與上文乃逸以勤居逸者為對提得精神如兩眼然雖六字仍作一句讀亦不妨如此説云相去聲小人厥父母勤勞稼穡厥子乃不知稼穡之艱難乃逸乃諺既誕否則侮厥父母曰昔之人無聞知不知稼穡之艱難乃逸者以逸為逸也俚語曰諺言視小民其父母勤勞稼穡其子乃生於豢音患養不知稼穡之艱難乃縱逸自恣乃習俚巷鄙語既又誕妄無所不至不然則又訕侮其父母曰古老之人無聞無知徒自勞苦而不知所以自逸也昔劉裕奮農畝而取江左一再傳後子孫見其服用反笑曰田舍翁得此亦過矣此正所謂昔之人無聞知也使成王非周公之訓安知其不以公劉后稷為田舍翁乎蘇氏曰農夫之子生而飽暖且不知艱難而況於王乎為南史宋髙祖劉裕孫孝武帝駿壊髙祖所居隂室玉燭殿牀頭有土障壁上掛葛燈籠麻繩拂袁顗因盛稱髙祖儉德上曰田舍翁得此已為過矣周公曰嗚呼我聞曰昔在殷王中宗嚴恭寅畏天命自度治民祇懼不敢荒寧肆中宗之享國七十有五年中宗大戊也嚴則莊重恭則謙抑寅則欽肅畏則戒懼天命即天理也中宗嚴恭寅畏以天理而自檢律其身至於治民之際亦祇敬恐懼而不敢怠荒安寧中宗無逸之實如此故能有享國永年之效也按書序大戊有原命咸又等篇意述其當時敬天治民之事今無所攷矣孔氏曰以敬畏之故得壽考之福下文言逸樂之損夀吕氏曰上既論無逸之理此復舉無逸之君以示之法此中宗無逸之實嚴恭寅畏合而言之敬也因桑穀而修省亦其畏天命之一端天人一理既畏天命必不敢輕下民祇懼不敢荒寧皆敬也惟敬故壽也主靜則悠逺博厚自強則堅實精明操存則血氣循軌而不亂收斂則精神内固而不浮至於儉約克治去戕賊之累又不在言凡此皆敬之力壽之理也自此至文王其壽莫非此理陳氏經曰以天命之理自為法度凡身所躬行合於法度者無非天命之流行必李氏杞曰無逸必寡慾寡慾而不壽者鮮矣逸樂多慾多慾而能全生者亦鮮矣既以無逸致壽者為之勸又以逸樂損夀者為之戒使前有所慕後有所警有所慕則知無逸之可法有所警則知逸樂之不可縱其在髙宗時舊勞于外爰暨小人作其即位乃或亮隂音梁菴三年不言其惟不言言乃雍不敢荒寧嘉靖殷邦至于小大無時或怨肆髙宗之享國五十有九年髙宗武丁也未即位之時其父小乙使久居民間與小民出入同事故於小民稼穡艱難備嘗知之也雍和也發言和順當於理也嘉美靖安也嘉靖者禮樂教化蔚然於安居樂業之中也漢文帝與民休息謂之靖則可謂之嘉則不可小大無時或怨者萬民咸和也乃雍者和之發於身嘉靖者和之達於政無怨者和之著於民也餘見說命髙宗無逸之實如此故亦有享國永年之效也吕氏曰三年不言聖賢之君未必盡然故謂之乃或是或一道也小大無怨民氣大和導迎和氣是亦壽考之理又發此意以申勸成王下章論文王咸和萬民亦是意也篇末二章之論違怨詛祝怨詈實申此而盡發之張氏曰不敢荒寧則志氣凝定精神純一此長年之基民心大和導迎善氣又所以致長年也葢神氣耗散則根本不固厲氣外襲則天和日消有一于此皆足致夭其在祖甲不義惟王舊為小人作其即位爰知小人之依能保惠于庶民不敢侮鰥寡肆祖甲之享國三十有三年史記髙宗崩子祖庚立祖庚崩弟祖甲立則祖甲髙宗之子祖庚之弟也鄭𤣥曰髙宗欲廢祖庚立祖甲祖甲以為不義逃於民間故云不義惟王按漢孔氏以祖甲為太甲葢以國語稱帝甲亂之七世而殞孔氏見此等記載意為帝甲必非周公所稱者又以不義惟王與太甲此乃不義文似遂以此稱祖甲者為太甲然詳此章舊為小人作其即位與上章爰暨小人作其即位文勢正類所謂小人者皆指微賤而言非謂險音纎小之人也作其即位亦不見太甲復政思庸之意又按邵子經世書髙宗五十九年祖庚七年祖甲三十三年世次厯年皆與書合亦不以太甲為祖甲況殷世二十有九以甲名者五帝以大以小以沃以陽以祖别之不應二人俱稱祖甲國語傳訛承謬旁記曲説不足盡信要以周公之言為正又下文周公言自殷王中宗及髙宗及祖甲及我周文王及云者因其先後次第而枚舉之辭也則祖甲之為祖甲而非太甲明矣吕氏曰商去周未逺故公以王耳目所接者言之陳氏經曰中宗近生知髙宗學知祖甲困知者也自時厥後立王生則逸生則逸不知稼穡之艱難不聞小人之勞惟耽樂音洛之從自時厥後亦罔或克壽或十年或七八年或五六年或四三年過樂謂之耽泛言自三宗之後即君位者生則逸豫不知稼穡之艱難不聞小人之勞惟耽樂之從伐性喪生故自三宗之後亦無能壽考逺者不過十年七八年近者五六年三四年爾耽樂愈甚則享年愈促也凡人莫不欲壽而惡去聲夭此篇專以享年永不永為言所以開其所欲而禁其所當戒也陳氏經曰逸樂人所好然所好有甚於逸樂者苟以難難而得壽奚為而逸樂艱難人所惡然所惡有甚於艱難者苟以逸樂而促壽奚為而不艱難公之言奪常情之好惡而示以所甚好甚惡也蘇氏曰人莫不好逸欲而其所甚好者生也以其所甚好禁其所好庶幾必信然猶有不信者以逸豫為未必害生也漢武帝唐明皇豈無欲者哉而壽如此夫多欲不享國者皆是也武帝明皇千一而已豈可専望乎此哉吕氏曰憂勤者必壽逸豫者必夭此周公格言大訓非特以戒成王實萬世人主之龜鑑也葢人之一心苟有所操存則精神思慮日由乎天理之中其壽固可必孔子所謂仁者壽詩人所謂樂只君子萬壽無期亦即其理而推之耳後世之君憚憂勤而恣逸樂伐性傷生靡所不至乃欲慕神仙之術以求長年何其愚之甚也歟葵初王氏曰蘇氏之說於經有助使好逸者無以漢武明皇藉口吕氏求神仙延壽之説三代前未有也然亦可備經筵進讀之一義周公曰嗚呼厥亦惟我周太王王季克自抑畏商猶異世也故又即我周先王告之言太王王季能自謙抑謹畏者葢將論文王之無逸故先述其源流之深長也大抵抑畏者無逸之本縱肆怠荒皆矜誇無忌憚者之為故下文言文王曰柔曰恭曰不敢皆原太王王季抑畏之心發之耳陳氏大猷曰克自者真能自用其力而人不與也抑者所以下之也如制忿欲去奢侈皆是也畏敬畏也人所以肆行無畏不能自抑故也抑其私欲惟義是從則必畏天命畏祖宗畏小民矣文王卑服即康功田功卑服猶禹所謂惡衣服也康功安民之功田功養民之功言文王於衣服之奉所性不存而專意於安養斯民也卑服葢舉一端而言宫室飲食自奉之薄皆可類推孔氏曰就田功以知稼穡之艱難艱新安陳氏曰孔氏以即田功為知稼穡之難甚好知稼穡艱難乃無逸之根本一篇之綱領也迪哲四君皆由於此彼生則逸之君只為不知稼穡艱難耳徽柔懿恭懷保小民惠鮮鰥寡自朝至于日中昃不遑暇食用咸和萬民徽懿皆美也昃日昳徒結反也柔謂之徽則非柔懦之柔恭謂之懿則非足子遇反恭之恭文王有柔恭之德而極其徽懿之盛和易近民於小民則懷保之於鰥寡則惠鮮之惠鮮云者鰥寡之人垂首喪去聲氣賚予音與賙給之使之有生意也自朝至于日之中自中至于日之昃一食之頃有不遑暇欲咸和萬民使無一不得其所也文王心存乎民自不知其勤勞如此豈秦始皇衡石程書隋文帝衛士傳餐代有司之任者之為哉立政言罔攸兼于庶言庶獄庶慎則文王又若無所事事者不讀無逸則無以知文王之勤不讀立政則無以知文王之逸合二書觀之則文王之所從事可知矣問徽柔懿恭是一字二字朱子曰一字柔者須徽恭者須懿柔而不徽則姑息恭而不懿則非由中出柔易於暗弱徽者發揚之意恭形於外懿則有蘊藏之意陳氏大猷曰卑服非止惡衣服凡服用皆卑損文王不敢盤于遊田以庶邦惟正之供文王受命惟中身厥享國五十年遊田國有常制文王不敢盤遊無度上不濫費故下無過取而能以庶邦惟正之供於常貢正數之外無横斂竝去聲也言庶邦則民可知文王為西伯所統庶邦皆有常供春秋貢於霸主者班班可見至唐猶有送使之制則諸侯之供方伯舊矣受命言為諸侯也中身者漢孔氏曰文王九十七而終即位時年四十七言中身舉全數也上文崇素儉恤孤獨勤政事戒遊佚皆文王無逸之實故其享國有厯年之永吕氏曰凡有血氣患於上陵必學問以下之抑損祇畏以自下則用力於無逸深矣力不分於奉己故功全歸於恤民惠澤之使鮮鮮有生意盤遊田曰不敢翼翼之小心也此章言文王家法凡無逸之條目如崇儉素重農畝恤窮因勤政事戒遊田損横斂大略皆備其稱文王之壽即前章之意以此為防後世猶為文王憂勤損壽之説以啟人主之好逸如鄭𤣥者周公曰嗚呼繼自今嗣王則其無淫于觀于逸于遊于田以萬民惟正之供則法也其指文王而言淫過也言自今日以往嗣王其法文王無過于觀逸遊田以萬民惟正賦之供上文言遊田而不言觀逸以大而包小也言庶邦而不言萬民以逺而見近也無皇曰今日耽樂音洛乃非民攸訓非天攸若時人丕則有愆無若殷王受之迷亂酗音煦于酒德哉無與毋通皇與遑通訓法若順則法也毋自寛假曰今日姑為是耽樂也一日耽樂固若未害然下非民之所法上非天之所順時人大法其過逸之行胡孟反猶商人化受而崇飲之類故繼之曰毋若商王受之沈迷酗于酒德哉酗酒謂之德者德有凶有吉韓子所謂道與德為虚位是也陳氏經曰兩惟正之供皆不以貢賦為吾逸樂之用也觀逸遊田人君未嘗無特不可過其則耳一日暫樂若未害也而以為不可者葢此心不可以斯須忘斯須而忘是放其心自此以往不可收拾矣今吕氏曰雖戒成王實欲後嗣共守此訓故以繼白嗣王言觀覽以舒其目安逸以休其身遊豫以省風俗田獵以習武備人君不能無也不可過爾過則人欲肆而入於亂亡矣故公使之無淫過于此必絶之使無則迫蹙拘制矣觀逸遊田横斂之源四者既省用有常經自應以萬民惟正之供始耽樂者毋自恕曰今日耽樂爾是心一流將一日二日浸浸終身不返矣苟不戒一日之耽樂必至為紂之徒無皇曰今日耽樂葢原淫樂之始使之深絶其㣲無若殷王受葢要淫樂之終使知必至此極始終備矣朝林氏曰隠公觀魚莊公觀社觀也唐敬宗日晏坐逸也周穆所至有車轍馬迹遊也太康畋洛表田也皆淫於此者西山真氏曰前舉三宗後舉文王俾王知所法又舉紂俾王知所戒紂之惡無不有酗酒其最也人無智愚皆知憂勤必享國逸欲必戕生惟沈湎于酒心志昏亂則雖死亡在前亦不知畏故欲無逸則不可酗酒酗酒則必不能無逸公所以專以此申戒也薛氏曰今日耽樂與詩所謂一醉日富當同義周公曰嗚呼我聞曰古之人猶胥訓告胥保惠胥教誨民無或胥譸音周張為幻音患胥相訓誡惠順譸誑古況反張誕也變名易實以眩音炫觀者曰幻歎息言古人德業已盛其臣猶且相與誡告之相與保惠之相與教誨之保惠者保養而將順之非特誡告而已也教誨則有規正成就之意又非特保惠而已也惟其若是是以視聽思慮無所蔽塞好惡取予音與明而不悖故當時之民無或敢誑誕為幻也吕氏曰訓音教誨皆見於言語保惠則調䕶於日用功用相表裏也新安陳氏曰訓誨忠言也譸張邪說也忠言交進則邪說莫行此厥不聽人乃訓之乃變亂先王之正刑至于小大民否則厥心違怨否則厥口詛祝音咒正刑正法也言成王於上文古人胥訓告保惠教誨之事而不聽信則人乃法則之君臣上下師師非度必變亂先王之正法無小無大莫不盡取而紛更音庚之葢先王之法甚便於民甚不便於縱侈之君如省刑罰以重民命民之所便也而君之殘酷音哭者則必變亂之如薄賦斂去聲以厚民生民之所便也而君之貪侈者則必變亂之厥心違怨者怨之蓄于中也厥口詛祝者怨之形於外也為人上而使民心口交怨其國不危者未之有也此葢治亂存亡之機故周公懇懇言之陳氏大猷曰承上章無怨咸和之意遂及於違怨詛祝唐孔氏曰詣神加殃謂之詛以言告神謂之祝周公曰嗚呼自殷王中宗及髙宗及祖甲反我周文王兹四人迪哲迪蹈哲智也孟子以知而弗去為智之實迪云者所謂弗去是也人主知小人之依而或忿戾之者是不能蹈其知者也惟中宗髙宗祖甲文王允蹈其智故周公以迪哲稱之厥或告之曰小人怨汝詈音吏汝則皇自敬德厥愆曰朕之愆允若時不啻不敢含怒詈罵言也其或有告之曰小人怨汝詈汝汝則皇自敬德反諸其身不尤其人其所誣毁之愆安而受之曰是我之愆允若時者誠實若是非止隠忍不敢藏怒也葢三宗文王於小民之依心誠知之故不暇責小人之過言且因以察吾身之未至怨詈之語乃所樂聞是豈特止於隠忍含怒不發而已哉唐孔氏曰皇大大自敬德皆朱氏方大曰聞謗而自反以敬德則凡怨詈之來箴砭之益吾方資之以自反何止不敢含怒於心而已苟非發於中心之誠惟不敢含怒而止則是僅能恕人之言而未盡反己之功也陳氏大猷曰四君至明故能如此凡聞謗而責人皆不明所致也此厥不聽人乃或譸張為幻曰小人怨汝詈汝則信之則若時不永念厥辟不寛綽厥心亂罰無罪殺無辜音孤怨有同是叢音崇于厥身綽大叢聚也言成王於上文三宗文王迪哲之事不肯聽信則小人乃或誑誕變置虚實曰小民怨汝詈汝汝則聽信之則如是不能永念其為君之道不能寛大其心以誑誕無實之言羅織疑似亂罰無罪殺戮無辜天下之人受禍不同而同於怨皆叢於人君之一身亦何便於此哉大抵無逸之書以知小人之依為一篇綱領而此章則申言既知小人之依則當蹈其知也三宗文王能蹈其知故其胷次寛平人之怨詈不足以芥蔕其心如天地之於萬物一於長育而已其悍疾憤戾天豈私怒於其間哉天地以萬物為心人君以萬民為心故君人者要當以民之怨詈為己責不當以民之怨詈為己怒以為己責則民安而君亦安以為己怒則民危而君亦危矣吁可不戒哉林氏曰以譸張之説妄殺如幽厲之監謗秦立誹謗法之類陳氏經曰以一人之身當天下之怨皆自幻言有以惑之始人主憂勤則心莊氣肅而一身和下無怨詛而天下和壽所以長也人主逸樂則心有所蠱壞而一自失其和邪說進小人怨殺戮肆行而天下失其和此壽所以短也惟言人主之壽下及小人怨詈之情可謂深切矣叢夏氏曰向之怨詈猶有限也至此普天同怨是怨於一自矣民氣如此欲享國長久得乎此意葢在言外也君范氏曰明君惟聽正直故讒慝之言不入於耳暗好聽讒佞故欺誑之言日至於前人君當修德以弭怨不可以刑殺止怨以刑殺止怨怨之愈甚大決所潰不可收拾矣説吕氏曰無逸始以逸豫為戒終則以棄忠言惑邪壊法度治誹謗結之惟無逸然後能去是病而所以保無逸者亦不過戒是數者也民新安陳氏曰末章承上章以論處怨詈之道然召和而使自無時或怨上也因怨言而自反次也以殺罰止怨而怨叢無次矣周公以怨詈等事寛廣君心而伸舒民氣其為邦本國脈計豈淺淺哉周公曰嗚呼嗣王其監于兹兹者指上文而言也無逸一篇七章章首皆先致其咨嗟詠歎之意然後及其所言之事至此章則於嗟歎之外更無他語惟以嗣王其監于兹結之所謂言有盡而意則無窮成王得無深警於此哉董氏鼎曰此篇挈所其無逸以為之綱而分先知稼穡艱難與不知艱難以為之目此一書之大㫖也商三君先知艱難者也後王生則逸不知艱難者也戒嗣王之觀逸遊田懼其不知艱難也逺引古人恐不盡信故尤欲其師文王懲商紂以耳目所及者為言焉真萬世之龜鑑哉君奭音式召公告老而去周公留之史氏録其告語為篇亦誥體也以周公首呼君奭因以君奭名篇篇中語多未詳今文古文皆有按此篇之作史記謂召公疑周公當國踐祚唐孔氏謂召公以周公嘗攝王政今復在臣位葛氏謂召公未免常人之情以爵位先後介意故周公作是篇以諭之陋哉斯言要皆為序文所誤獨蘇氏謂召公之意欲周公告老而歸為近之然詳本篇㫖意迺召公自以盛滿難居欲避權位退老厥邑周公反復告諭以留之爾熟復而詳味之其義固可見也朱子曰召公不悦這意思曉不得若論事了儘未在看來是見成王已臨政便也小定了許多事周公自可了得所以求去程子曰師保之任古人難之故召公不悅者不敢安於保也周公作書以勉之以為在昔人君所以致治者皆賴其臣而使召公謀所以裕已也序問召公不悦之意朱子曰召公不悦只是小恁地説裏面却無此意這只是召公要去後周公留他説道朝延不可無老臣又問又曰等語不可曉曰這箇只是大綱綽得箇意脈子便恁地説不要逐箇字去討便無理會這箇物事難理會又曰弗弔只當作去聲讀又曰召公不悦葢以為周公歸政之後不當復留而已亦老而當去故周公言二人不可不留之意曰嗚呼君己曰時我我亦不敢寧于上帝命弗永逺念天威越我民罔尤違人厯道古今聖賢倚賴老成以固其國家之事又曰予不惠若兹多誥予惟用閔于天越民只此便見周公之心每讀至此未嘗不喟然太息也試於此等處虚心求之如何吕氏曰召公以盛滿欲去周公反復留之後世權位相軋排使去者有之挽之留者鮮矣大臣之秉心公則深恐無助私則惟恐不專也又曰成功不可居洛邑成而周公告歸召公亦同此心也已而成王留周公周公幡然改矣召公猶守欲退之心也周公遂力留之及其既喻非特留於一時終相成王且相康王身任托孤之責而不辭惟不苟於隨所以篤於信也陳氏大猷曰或謂周公去朝居洛召公獨執政柄所以欲去今以洛誥君陳攷之周公固居洛以化殷民以無逸蔡仲等考之周公未常不在朝以輔大業意其往來鎬洛之間也方是時洛邑雖成而殷民尚未孚四方雖定而天命人心尚未固宜周公諄諄於留召公歟周公若曰君奭君者尊之之稱奭召公名也古人尚質相與語多名之弗弔天降喪于殷殷既墜厥命我有周既受我不敢知曰厥基永孚于休若天棐忱我亦不敢知曰其終出于不祥不祥者休之反也天既下喪亡于殷殷既失天命我有周既受之矣我不敢知曰其基業長信於休美乎如天果輔我之誠耶我亦不敢知曰其終果出於不祥乎按此篇周公留召公而作此其言天命吉凶雖曰我不敢知然其懇惻危懼之意天命吉凶之決實主於召公留不留如何也吕氏曰自後世之私觀之殷之禍周之福也述殷之喪亡亦曰弗弔聖賢公天下之心也人之於天或恃而不自修或懼而不自強謂永孚于休恃而不自修也意天不福已也謂終出不祥懼而不自強也意天必禍已也皆非也新安陳氏曰此數句與召誥不敢知曰有厯年不其延語脈略同共臨川呉氏曰不幸天大降喪亡之禍于殷殷既墜命而我有周既受之矣然天命難諶有德則常留無德則旋去孚者以實感以實應也永孚于休命之留也不祥者休之反出于不祥命之去也雖曰我周既有天命然謂其基必可長久我所不敢知也雖曰天非可信然謂其終必至失墜我亦不敢知也嗚呼君己曰時我我亦不敢寧于上帝命弗永逺念天威越我民罔尤違惟人在我後嗣子孫大弗克恭上下遏佚前人光在家不知尤怨違背也周公歎息言召公已嘗曰是在我而已周公謂我亦不敢苟安天命而不永逺念天之威於我民無尤怨背違之時也天命民心去就無常實惟在人而已今召公乃忘前日之言翻然求去使在我後嗣子孫大不能敬天敬民驕慢肆侈遏絶佚墜文武光顯可得謂在家而不知乎朱子曰諸誥多是長句如君奭弗永逺念天威越我民罔尤違只是一句越只是及罔尤違是總説上天與民之意漢藝文志註謂誥是曉諭民若不速曉則約束不行便是誥辭如此只是欲民易曉天命不易音異天難諶乃其墜命弗克經歴嗣前人恭明德天命不易猶詩曰命不易哉命不易保天難諶信乃其墜失天命者以不能經歴繼嗣前人之恭明德也呉氏曰弗克恭故不能嗣前人之恭德遏佚前人光故不能嗣前人之明德在今予小子旦非克有正迪惟前人光施音世于我沖子呉氏曰小子自謙之辭也非克有正亦自謙之辭也言在今我小子旦非能有所正也凡所聞導惟以前人光大之德使益焜燿而付于冲子而已以前言後嗣子孫遏佚前人光而言也又曰天不可信我道惟寧王德延天不庸釋于文王受命又曰者以上文言天命不易天難諶此又申言天不可信故曰又曰天固不可信然在我之道惟以延長武王之德使天不容捨文王所受之命也新安陳氏曰周公舉召公前日之言以質之謂君昔已嘗言是其責在我矣周公自術己意謂我亦不敢安於天命而不永逺念天威及我民之無怨尤違背也若果委之而去使我後嗣子孫無所輔助將大不能敬天敬民而至於遏佚前人之光顯此時吾等可諉以退老在家而不知乎天命不易保天難諶信恐其墜命者以嗣君涉歴未深弗能經歴而嗣前人恭明之德故也我非能有正我所啟迪惟以前人光明之德施及於我冲子而已施如詩所謂施于孫子此章大意謂今日天命人心未為固成王經歴未為深所謂輔之以嗣前人之光延長世德凝固天命吾等當留而不當去也此篇語句多有難曉只得其大意可也公曰君奭我聞在昔成湯既受命時則有若伊尹格于皇天在太甲時則有若保衡在太戊時則有若伊陟臣扈音户格于上帝巫咸乂王家在祖乙時則有若巫賢在武丁時則有若甘盤時則有若者言當其時有如此人也保衡即伊尹也見說命太戊太甲之孫伊陟伊尹之子臣扈與湯時臣扈二人而同名者也巫氏咸名祖乙太戊之孫巫賢巫咸之子也武丁髙宗也甘盤見説命吕氏曰此章序商六臣之烈葢勉召公匹休於前人也伊尹佐湯以聖輔聖其治化與天無間伊陟臣扈之佐太戊以賢輔賢其治化克厭天心自其徧覆言之謂之天自其主宰言之謂之帝書或稱天或稱帝各隨所指非有重輕至此章對言之則聖賢之分而深淺見矣巫咸止言其乂王家者咸之為治功在王室精㣲之藴猶有愧於二臣也亡書有咸乂四篇其乂王家之實歟巫賢甘盤而無指言者意必又次於巫咸也蘇氏曰殷有聖賢之君七此獨言五下文云殷禮陟配天豈配祀于天者止此五王而其臣偕配食于廟乎在武丁時不言傅説豈傅説不配食於配天之王乎其詳不得而聞矣陳氏曰湯初勝夏已有臣扈湯至太戊百三十年必有臣而名同也詩有家父春秋又有家父亦此類捨復齋董氏曰言甘盤者髙宗舊學之臣吕氏曰傅説言甘盤盤源也説委也川息齋余氏曰不言説即下文不言尚父之意臨呉氏曰周公舉商家所以能創業守成中興者皆得大臣為之輔相以見召公未可去也成湯之時其臣有如伊尹能相湯以格于皇天湯雖聖亦賴伊尹之助也湯孫太甲之時有臣有如保衡保衡即伊尹以其保䕶王躬而天下之事皆取平焉故曰保衡葢太甲始立是號以尊伊尹而不名太甲孫太戊之時則有如伊尹之子陟與臣扈亦能治王家之事巫賢巫咸子保衡巫賢甘盤之下不言其事葢無可指定而言者也陳氏雅言曰此周公叙商六臣之烈以告召公而勉其匹休於前人也伊尹之佐成湯保衡之佐太甲伊陟臣扈巫咸之佐太戉巫賢之佐祖乙甘盤之佐武丁雖其君臣有聖賢之分治化有淺深之異然皆為一代之名臣格皇天者無問於天之辭與天為一者也格于帝者克厭於天之辭與天猶二者也乂王家者功著於民之辭召公於此上比伊尹而無所讓次比伊陟臣扈巫咸而有餘下比巫賢廿盤而逺過之今而求去則殷民反側之未安成王守成之無助寧不愧於商之諸臣者乎此周公所以勉留之之意也周公此言雖主於留召公而發非為人物評論然其立言之意抑揚髙下自是如此率惟兹有陳保乂有殷故殷禮陟配天多厯年所陟升遐也言六臣循惟此道有陳列之功以保乂有殷故殷先王終以德配天而享國長久也葉氏曰以其祭上陟而配天猶言郊祀后稷以配天宗祀文王於明堂以配上帝唐孔氏曰多厯年之次所天惟純佑命則商實百姓王人罔不秉德明恤小臣屏音丙侯甸矧咸奔走惟兹惟德稱用又厥辟故一人有事于四方若卜筮罔不是孚佑助也實虚實之實國有人則實孟子言不信仁賢則國空虚是也稱舉也亦秉持之義事征伐會同之類承上章六臣輔君格天致治遂言天佑命有商純一而不雜故商國有人而實内之百官著姓與夫王臣之㣲者無不秉持其德明致其憂外之小臣與夫藩屏侯甸矧皆奔走服役惟此之故惟德是舉用又其君故君有事于四方如龜之卜如蓍之筮天下無不敬信之也王氏炎曰商大臣事業至於有為而罔不孚今四國多方諄諄告命猶懼不信召公豈可求去功陳氏雅言曰周公言不特上文六臣能有輔君之天之於商其佑命之也純一而不二故商國賢才衆多而能實言國以有人為實也是以當時在内則大而百官著姓小而王臣之㣲莫不秉德明恤此其在内者之皆賢也在外則微而小臣大而藩屏侯甸者又莫不奔走服役此其在外者之皆賢也惟天佑命之純之故故君之用人惟有德者是舉而此衆賢之多皆能治君之事以與君共理也是則商之賢才登庸無間内外其衆多如此羣臣有輔君之功故君有化民之效一人有所命令於天下天下之民如敬聴於卜筮而無不孚信也周公此言意謂商賢聖之君其始以得五六大臣佐佑之助故能得天佐命之純是以衆賢維時而出無内外大小之問明商之得人實由於五六大臣之得人也周公此意政欲召公知吾二人其進退係於國體者如此豈可以盛滿難居為懼而果於求退也公曰君奭天壽平格保乂有殷有殷嗣天滅威今汝永念則有固命厥亂明我新造邦吕氏曰坦然無私之謂平格者通徹三極而無間者也天無私壽惟至平通格于天者則壽之伊尹而下六臣能盡平格之實故能保乂有殷多厯年所至于殷紂亦嗣天位乃驟罹滅亡之威天曾不私壽之也固命者不墜之天命也今召公勉為周家久永之念則有天之固命其治效亦赫然明著於我新造之邦而身與國俱顯矣孔氏曰言天壽有平至之君故安治有殷殷嗣子紂不能平至天滅亡加之有威今汝長念平至者安治反是者滅亡以為法戒則有堅固之命其治理足以明我新成國矣乎臨川呉氏曰平格謂無一事不與天通者也心通天必得其壽伊尹而下六臣能相其君以平格于天故能保乂有殷多厯年所至于殷紂亦嗣天位乃驟罹滅亡之威天不夀之者何哉葢無賢臣輔之以格于天故爾今汝永念及此則我周可有堅固不墜之命其能常治而顯明我新造之周邦歟公曰君奭在昔上帝割申勸寧王之德其集大命于厥躬申重勸勉也在昔上帝降割于殷申勸武王之德而集大命於其身使有天下也新安陳氏曰寧王孔註以為文王蔡傳以為武王果武王也則下接惟文王尚克修和我有夏必有缺文矣惟文王尚克修和我有夏亦惟有若虢叔有若閎音𢎞夭有若散上聲宜生有若泰顛有若南宫括虢叔文王弟閎散泰南宫皆氏夭宜生顛括皆名言文王庶幾能修治燮和我所有諸夏者亦惟有虢叔等五臣為之輔也康誥言一二邦以修無逸言用咸和萬民即文王修和之實也又曰無能往來兹迪彞教文王蔑音滅德降于國人蔑無也夏氏曰周公前既言文王之興本此五臣故又反前意而言曰若此五臣者不能為文王往來奔走於此導迪其常教則文王亦無德降及於國人矣周公反覆以明其意故以又曰更端發之亦惟純佑秉德迪知天威乃惟時昭文王迪見音現傳同冒聞于上帝惟時受有殷命哉言文王有此五臣者故亦如殷為天純佑命百姓王人罔不秉德也上既反言文王若無此五臣為去聲迪彞教則亦無德下及國人故此又正言亦惟天乃純佑文王葢以如是秉德之臣蹈履至到實知天威以是昭明文王啟迪其德使著見於上覆敷救反下章同冒於下而升聞于上帝惟是之故遂能受有殷之天命也新安陳氏曰此言以文王之聖猶不可無五臣之助也陳氏雅言曰亦惟純佑者即上章天惟純佑命之謂也秉德迪知天威乃惟時昭文王迪見冒聞于上帝者即上章罔不秉德明恤惟兹惟德稱用乂厥辟之意也上章言商賢聖之君皆已受天命之君也故以一人有事於四方若卜筮罔不是孚言之言其效足以化民也此言文王始受天命之君也故以惟時受有殷命哉言之言其效有以得於天也周公言此意謂文王得此五臣之助亦如商之衆君得上六臣之助五臣之輔周無異於六臣之輔商故佑命之純於周無異於昔之純於商也天眷厚而賢才衆多者葢以大臣之德有以契於天故其道有以顯其君賢臣輔而君德修著不惟其君之德有以被於時而其極有以格夫天是則文王之所以受有殷命之故雖文王之德也亦五臣之助也周公此言主於留召公故皆歸重於臣之辭召公縱不以商之六臣為念獨不以周之五臣為意乎武王惟兹四人尚迪有禄後暨武王誕將天威咸劉厥敵惟兹四人昭武王惟冒丕單稱德虢叔先死故曰四人劉殺也單盡也武王惟此四人庶幾平聲迪有天禄其後暨武王盡殺其敵惟此四人能昭武王遂覆冒天下天下大盡稱武王之德謂其達聲教于四海也文王冒西土而已丕單稱德惟武王為然於文王言命於武王言禄者文王但受天命至武王方富有天下也吕氏曰師尚父之事文武烈莫盛焉不與音預五臣之列葢一時議論或詳或略隨意而言主於留召公而非欲為人物評也新安陳氏曰此言以武王之聖猶不可無四臣之助也上言殷先生猶有賴於六臣此二章言周文武猶有賴於五臣四臣召公可不鑒之而遽求去乎留之之意切矣此陳氏雅言曰武以定亂文以致治武王之興皆賴四臣之功也四臣之才德兼全志慮中正出之可以為將入之可以為相無所不可於此可見其即立政所謂義德容德之士也歟叔林川呉氏曰林氏云文武佐命元功多矣獨稱虢等五人者豈其逮事王季遂及文武耶伊尹事湯又事太甲伊陟乃尹子臣扈非湯舊臣即殷世臣巫咸巫賢世為大臣甘盤小乙舊臣以遺武丁周公所舉皆世臣舊德故武丁世不及傅説文武世不及太公今周公與召公正如殷之六臣文武之五臣豈可去乎今在予小子旦若游大川予往暨汝奭其濟小子同未在位誕無我責收罔朂不及耇造德不降我則鳴鳥不聞矧曰其有能格小子旦自謙之稱也浮水曰游周公言承文武之業懼不克濟若浮大川罔知津涯豈能獨濟哉予往與汝召公其共濟可也小子成王也成王幼冲雖已即位與未即位同誕大也大無我責上疑有缺文收罔朂不及未詳耇造德不降言召公去則耇老成人之德不下於民在郊之鳳將不復得聞其鳴矣泥敢言進此而有感格乎是時周方隆盛鳴鳳在郊卷音拳阿鳴于髙岡者乃詠其實故周公云爾也夏氏曰大無盡責於我一人不息齋余氏曰召公若收斂退藏罔朂勉成王之所逮亦通張子曰耇造德降則民諴和而鳳可致故鳴鳥聞所以為和氣之應也公王氏炎曰文王之興鳳鳴岐山為周受命之符召苟去固不能如五臣輔文王以聞鳴鳳之祥況能如伊陟臣扈之格天格帝乎孔氏曰我往與汝奭其共濟渡成王新安陳氏曰大無專責於我召公苟收斂退藏不勉王所不及以老成之德自居我恐鳴鳳之祥不復聞矣況曰其有能如古人之格天格帝乎然此等句實聱牙難通唯挽留召公之意猶可詔耳公曰嗚呼君肆其監于兹我受命無疆惟休亦大惟艱告君乃猷裕我不以後人迷肆大猷謀也兹指上文所言周公歎息欲召公大監視上文所陳也我文武受命固有無疆之美矣然迹其積累音吕締丁計反造葢亦艱難之大者不可不相與竭力保守之也告君謀所以寛裕之道勿狹隘求去我不欲後人迷惑而失道也吕氏曰大臣之位百責所萃震撼擊撞欲其鎮定辛甘燥濕欲其調齊才詣反槃錯棼音紛結欲其解紓音抒黯闇音暗汚音烏濁欲其茹納自非曠度洪量音亮與夫音扶患失乾音干沒史記張湯為小吏乾没註謂隨勢浮沈也者未嘗無翩然捨去之意況召公親遭大變破斧缺斨音牆之時屈折調䕶心勞力瘁又非平時大臣之比顧以成王未親政不敢乞身爾一旦政柄有歸浩然去志固人情之所必至然思文武王業之艱難念成王守成之無助則召公義未可去也今乃汲汲然求去之不暇其迫切已甚矣盍謀所以寛裕之道圖功攸終展布四體為久大規模使君德開明未可捨去而聽後人之迷惑也鄭氏曰召公不悦似隘急故令謀於寛裕言吕氏曰周公自言我終不獨善而使後人迷惑自所以不去者以勉召公也陳氏曰不以後人迷謂欲使後人嗣前人恭明德不至於遏佚前人光也新安陳氏曰不以後人迷如以其君霸以其君顯之以留而明保啟迪成王是不以後人迷也去而聽其迷惑是以後人迷也公曰前人敷乃心乃悉命汝作汝民極曰汝明朂偶王在亶乘兹大命惟文王德丕承無疆之恤偶配也蘇氏曰周公與召公同受武王顧命輔成王故周公言前人敷乃心腹以命汝召公位三公以為民極且曰汝當明勉輔孺子如耕之有偶也在於相信如車之有馭也并力一心以載天命念文考之舊德以丕承無疆之憂武王之言如此而可以去乎張氏曰臣者君之偶如婦者夫之偶之陳氏曰乘載也猶負荷也吕氏曰命作民極置具瞻以為民極也其命之辭則曰汝明明勉勵以偶配輔佐後王命之大如此在今當亶誠以乗載此大命不可失墜今而遽去是墜此命非乘此命矣又欲其追念文王眷遇之德為我周大受無窮之憂責洛誥周公之復留實以文武之故今召公欲去周公復舉文武以感動之公曰君告汝朕允保奭其汝克敬以予監于殷喪去聲大否部鄙反肆念我天威大否大亂也告汝以我之誠呼其官而名之言汝能敬以我所言監視殷之喪亡大亂可不大念我天威之可畏乎西山直氏曰周公言天威曰肆念我天威葢天在我而不在外此心少有不存則是不念天威矣豈必求之外乎國新安陳氏曰我天威如召誥言我受天命大臣與同體天命天威皆以我負荷之不敢以不切己視之也予不允惟若兹誥予惟曰襄我二人汝有合哉言曰在時二人天休滋至惟時二人弗戡其汝克敬德明我俊民在讓後人于丕時戡勝音升也戡堪古通用周公言我不信於人而若此告語去聲乎予惟曰王業之成在我與汝而已汝聞我言而有合哉亦曰在是二人但天休滋至惟是我二人將不堪勝汝告以盈滿為懼則當能自敬德益加寅畏明揚俊民布列庶位以盡大臣之職業以答滋至之天休毋徒惴惴而欲去為也他日在汝推遜後人于大盛之時超然肥遯誰復扶又反汝禁今豈汝辭位之時乎朱子曰襄我二人周公自謂己與召公揚王氏曰大臣之善在乎能讓讓則推賢善而無妨功害能此所以能明俊民可陳氏經曰今時未至盛大未有賢俊可讓召公未去也大臣進退常以得人為慮有賢者可以讓則身可以退蕭何且死必引曹參管仲不能薦賢所以不免於議也嗚呼篤棐時二人我式克至于今日休我咸成文王功于不怠丕冒海隅出日罔不率俾周公復扶又反歎息言篤於輔君者是我二人我用能至于今日休盛然我欲與召公共成文王功業于不怠大覆冒斯民使海隅日出之地無不臣服然後可也周都西土去東為逺故以日出言呉氏曰周公未嘗有其功以其留召公故言之葢叙其所已然而勉其所未至亦人所説音悦而從者也蘇氏曰以我二人厚輔之故周室乃有今日之休然今日之休未可以為足也惟至於日月所照莫不率服乃己耳陳氏大猷曰伐淮夷踐奄在此書後可見當時未能罔不率俾也右二章以文武留召公也新安陳氏曰告汝朕允與予不允惟若兹誥下文予不惠若兹多誥語皆相應告汝皆我允信之心也我豈不信而惟若此誥語乎我豈不相惠順而若此多誥乎末謂今日之休不可恃前人之功所當終必極天所覆日之所照皆臣服然後文王之功方可以成言我與汝當同任其責而咸成之惟不倦可以成終召公殆未可去也前以商六臣周五臣四臣留之末以文武與身留之諄切至此召公得不留哉陳氏雅言曰是時洛邑既宅頑民既遷有卷阿鳳凰之歌有既醉鳬鷖之雅謂之今日休宜矣然而淮夷未滅西奄未踐東夷未伐肅慎氏未來謂之我咸成文王功于不怠召公得不留意哉呉氏之言可謂深達周公之心而善達人情之論者矣公曰君予不惠若兹多誥予惟用閔于天越民周公言我不順於理而若兹諄復之多誥耶予惟用憂天命之不終及斯民之無賴也韓子言畏天命而悲人窮亦此意前言若兹誥故此言若兹多誥周公之告召公其言語之際亦可悲矣夏氏曰天命難諶民心難保大臣去留繫天命之從違民心之向背今召公欲去實周公之憂也陳氏大猷曰召公去則天命將替民生失所此周公所閔也公曰嗚呼君惟乃知民德亦罔不能厥初惟其終祇若兹往敬用治上章言天命民心而民心又天命之本也故卒章專言民德以終之周公歎息謂召公踐歴諳烏含反練之久惟汝知民之德民德謂民心之嚮順亦罔不能其初今日固罔尤違矣當思其終則民之難保者尤可畏也其祇順此誥往敬用治不可忽也此召公已留周公飭遣就職之辭厥後召公既相去聲下同成王又相康王再世猶未釋其政有味於周公之言也夫張氏曰召公初輔成王有始矣而求去不能終也言董氏鼎曰一書之中首言憂國之心非人所知次天命可畏惟人是賴又次言殷先王與我文武得人之助然文王時五人至武王時四人今又惟我二人而已君若求去豈我一人所能戡哉憂之深是以留之切留之切是以言之詳召公同功一體之人均有忠君愛君之心者也安得不油然而感幡然而留哉召新安陳氏曰盤誥聲牙君奭尤甚多不可解惟留公之意可想耳姑采衆説之略通者而缺其不可通者可也蔡仲之命蔡國名仲字蔡叔之子也叔沒周公以仲賢命諸成王復封之蔡此其誥命之詞也今文無古文有按此篇次序當在洛誥之前惟周公位冢宰正百工羣叔流言乃致辟管叔于商囚蔡叔于郭鄰以車七乘去聲降霍叔于庶人三年不齒蔡仲克庸祇德周公以為卿士叔卒乃命諸王邦之蔡周公位冢宰正百工武王崩時也郭鄰孔氏曰中國之外地名蘇氏曰郭虢也周禮六遂五家為鄰管霍國名武王崩成王幼周公居冢宰百官總已以聽者古今之通道也當是時三叔以主少去聲國疑乘商人之不靖謂可惑以非義遂相與流言倡亂以摇之是豈周公一身之利害乃欲傾覆社稷塗炭生靈天討所加非周公所得已也故致辟管叔于商致辟云者誅戮之也囚蔡叔于郭鄰以車七乘囚云者制其出入而猶從去聲以七乘之車也降霍叔于庶人三年不齒三年之後方齒録以復其國也三叔刑罰之輕重因其罪之大小而已仲叔之子克常敬德周公以為卿士叔卒乃命之成王而封之蔡也周公留佐成王食邑於圻内畿内諸侯孟仲二卿故周公用仲為卿非魯之卿也蔡左傳在淮汝之間仲不别封而命邦之蔡者所以不絶叔於蔡也封仲以他國則絶叔于蔡矣吕氏曰象欲殺舜舜在側微其害止於一身故舜得遂其友愛之心周公之位則繫于天下國家雖欲遂友愛於三叔不可得也舜與周公易地皆然史臣先書惟周公位冢宰正百工而繼以羣叔流言所以結正三叔之罪也後言蔡仲克庸祇德周公以為卿士叔卒即命之王以為諸侯以見周公蹙然於三叔之刑幸仲克庸祇德則亟擢用分封之也呉氏曰此所謂冢宰正百工與詩所謂攝政皆在成王諒闇音梁庵之時非以幼冲而攝而其攝也不過位冢宰之位而已亦非如荀卿所謂攝天子位之事也三年之喪二十五月而畢方其畢時周公固未嘗攝亦非有七年而後還政之事也百官總已以聽冢宰未知其所從始如殷之髙宗已然不特周公行之此皆論周公者所當先知也問周公誅管蔡自公義言之其心固正大直截自私恩言之其情終有不自滿處所以孟子謂周公之過不亦宜乎朱子曰是恁地豈得已為此哉莫到恁地較好看周公當初做這一事也大段疎脱他也看那兄弟不過怕武庚叛故遣管蔡霍去監他為其至親可恃不知他反去與那武庚同作一黨不知如何紂出得箇兒子也恁地狡猾想見他當時日夜去炒那管叔説道周公是你弟今却欲簒為天子汝是兄今却只恁地管叔被他炒得心熱他性又急所以便彂出這件事來李堯卿問是時可調䕶莫殺否曰他已叛只得殺如何調䕶得蔡叔霍叔性較慢罪較輕所以只囚于郭鄰降于庶人想見當時被管叔做出這事來騷動詐多百姓想見也怕人鴟鴞鴟鴞既取我子無毁我室當是時也是被他害得猛又問曰周公也豈不知管叔狡猾但當時於義不得不封他曰看來不是狡猾只是獃子周公使三叔監殷他却與武庚叛此是一段大疎脫事若當時不便平息得模様做出西晉初年時事想見武庚日夜去説誘三叔以為周公弟也却在周作宰相管叔几也却去監商故管叔生起不肖之心如此叔史記武王同母兄弟十人長伯邑考次武王次管鮮次周公次蔡叔度次霍叔處孔氏曰蔡仲能用敬德稱其賢也明王之法誅父用子言至公也叔之所封圻内之蔡仲之所封淮汝之問圻内之蔡名已滅故取其名以名新國欲其戒之罪唐孔氏曰管在滎陽京縣東北不立管叔之後者重或無子或有而不賢也杜預曰武玉封叔度於汝南上蔡胡徙新蔡昭侯徙九江下蔡圻内蔡地不知所在罪張氏震曰象得罪於舜安得不貸之以恩管叔得於周安得不斷之以義霍叔不絶其身蔡叔不絶其子而管叔獨不免誅絶恩與義並行而不悖也林氏曰蔡叔有罪則囚之不以弟而私蔡仲賢而封之不以父而棄蔡叔而命仲一也葉氏曰舜殛鯀而興禹周公囚魏氏了翁曰左傳定公四年云蔡仲改行率德周公舉之以為己卿士己字極好玩味可見周公大聖人蔡叔有罪而囚之有子仲祇德則以為己卿士真與天地同其大也衛蘇氏曰蔡叔未卒仲無君國之理蒯瞶在而輒立所以亂所以封仲必在叔卒之後也王若曰小子胡惟爾率德改行胡孟反克慎厥猷肆予命爾侯于東土往即乃封敬哉胡仲名言仲循祖文王之德改父蔡叔之行能謹其道故我命汝為侯於東土往就汝所封之國其欲之哉吕氏曰敬哉者欲其無失此心也命書之辭雖稱成王實周公之意爾尚葢前人之愆惟忠惟孝爾乃邁迹自身克勤無怠以垂憲乃後率乃祖文王之彞訓無若爾考之違王命蔡叔之罪在於不忠不孝故仲能掩前人之愆者惟在於忠孝而已叔違王命仲無所因故曰邁迹自身克勤無怠所謂自身也垂憲乃後所謂邁迹也率乃祖文王之彞訓無若爾考之違王命上文所謂率德改行也吕氏曰子之新善著則父之舊愆庶乎可掩蔡叔之惡既無以貽子孫仲乃一國始封之祖創業垂統之責繫焉盍進其步武自我作古克勤無怠以垂法於後斯須之怠則流弊或在於數百年俊不可不謹其源也立張氏曰邁迹自身謂生於羣叔之間而能脱身自為善陳氏傅良曰舜命禹未嘗戒以鯀周公命㣲子未嘗及武庚今命仲而尤其父者於越人疏之於其兄戚之也父子兄弟之間猶有諱而不敢盡言是愈疎矣成王於仲親親之道也有禹故鯀得以郊有安世延年故張湯杜周得不列於酷吏蔡仲在人其謂叔曰幸哉有子如此歟故曰葢前人之愆西山真氏曰按書蔡仲之命爾尚葢前人之愆惟忠惟孝人子不幸如大禹之承鯀蔡仲之承蔡叔又當思所以葢之故治水成功而鯀配夏郊率德改行而蔡叔世祀豈非孝之大乎後世如沈充叛臣也其子勁以死節若李義甫姦臣也其子湛以忠義聞若勁與湛可謂能葢其父之愆矣而新安陳氏曰子能改父之惡而為善則考矣為子孝斯為臣而忠古人云求忠臣於孝子之門是惟忠本於惟孝也克勤無怠以垂憲乃後即所謂邁迹自身此一語不必分也皇天無親惟德是輔民心無常惟惠之懐為善不同同歸于治為惡不同同歸于亂爾其戒哉此章與伊尹申誥太甲之言相類而有深淺不同者太甲蔡仲之有間去聲也善固不一端而無不可行之善惡亦不一端而無可為之惡爾其可不戒之哉慎厥初惟厥終終以不困不惟厥終終以困窮惟思也窮困之極也思其終者所以謹其初也吕氏曰建國之始必審其始而思其終終始具舉然後可久可大而不至於困徒謹初而不思其終則終必困窮雖葸然憂懼無益也語以謹始而即教以慮終竭兩端之教也陳氏大猷曰仲率德改行能謹初矣尤當克勤無怠是在於惟厥終也於張氏曰感激者多鋭於初而怠終懋乃攸績睦乃四鄰以蕃王室以和兄弟康濟小民勉汝所立之功親汝四鄰之國蕃屏音丙王家和協同姓康濟小民五者諸侯職之所當盡也陳氏雅言曰此成王命蔡仲為諸侯傳云五者諸侯職之所當盡也所謂畫一以告之亦以見侯職之所當盡者不一而足也率自中無作聰明亂舊章詳乃視聴罔以側言改厥度則予一人汝嘉率循也無毋同詳審也中者心之理而無過不及之差者也舊章者先王之成法厥度者吾身之法度皆中之所出者作聰明則喜怒好惡並去聲皆出於私而非中矣其能不亂先王之舊章乎戒其本於已者然也側言一偏之言也視聽不審惑於一偏之說則非中矣其能不改吾身之法度乎戒其徇於人者然也仲能戒是則我一人汝嘉矣吕氏曰作聰明者非天之聰明特沾沾音詹輕薄貎小智耳作與不作而天人判焉陳氏經曰舊章法度皆中之所寓度即舊章也舊章則已然之法度則當然之制無非中也周公慮仲懲創乃父之愆用意過當反以生事為竒故有此戒吕氏曰舊章往往不與新進喜事者合故作聰明者尤欲亂之聴覽不貴於速而貴於詳迎刃立決見事風生宜若可喜然忽略疎快動皆愆尤讒説姦言每乗其匆遽而入之惟詳其視聽安徐審訂表裹畢陳側媚之言將不得售故詳者乃聽覽之大法也規矩凖度未至於樂循理者則常若為其縶維側言乃解其縶維而縱之放逸之塲者故從之也蔡仲以英妙之年任國事周公老成深慮故戒如此之陳氏大猷曰舊章常度則中道所存内不變於已私智外不或於人之私言則中道合而侯職盡矣仲陳氏雅言曰中者人心所同有之理成王之命蔡特欲率之而已舊章法度皆中之理所寓能遵夫舊章守夫法度則不替於已然之法不廢其當然之制無非中也苟不循聰明之自然則矝肆之心生未免有非古之愆此非能率中者也不審視聽之間則一偏之言易入未免有敗常之愆亦非能率中者也故必循其聰明之自然而不至於妄作則有所守而内無所恃孰肯非古是今而亂先王之典章乎審於視聽之際而不至於或苟則公心益持而私意不奪孰肯從欲背理而更其常行之法度乎内外不變則中道合而侯職盡成王之於蔡仲勉之者未幾而戒之者隨至也王曰嗚呼小子胡汝往哉無荒棄朕命飭往就國戒其毋廢棄我命汝所言也董氏鼎曰此篇大體與㣲子之命相似而㣲子之辭温厚蔡仲之辭嚴厲葢㣲子先代之後周賓而不臣又本賢人也蔡仲父為不道忠孝兩虧已無足法所望仲能率祖德改父行邁迹自身以垂憲乃後耳葢以拳拳圖終之説且戒之以無亂舊章無改法度以同歸于亂嗚呼仁哉書經大全卷八
