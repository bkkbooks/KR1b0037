body:
  text: 書經大全卷三明胡廣等撰夏書夏禹有天下之號也書凡四篇禹貢作於虞時而繫之夏書者禹之王以是功也禹貢上之所取謂之賦下之所供謂之貢是篇有貢有賦而獨以貢名篇者孟子曰夏后氏五十而貢貢者較數嵗之中以為常則貢又夏后氏田賦之總名今文古文皆有朱子曰禹貢一書所記地理治水曲折多不甚可曉切意當時治水事畢却總作此一書故自冀州王都始如今人方量畢總作一門單耳禹自言予決九川距四海濬畎澮距川一篇禹貢不過此數語極好細看今人説禹治水始于壺口鑿龍門某未敢深信方河水洶湧其勢迅激縱使鑿下龍門恐這石仍舊壅塞又下面水未有分殺必且潰決四出蓋禹先決九川之水使各通于海又濬畎澮之水使各通于川使大水有所入小水有所歸禹只是先從低處下手若下面之水盡殺則上面之水漸淺却才好下手九川盡通則導河之功已及八方故某甞謂禹治水當始於碣石九河蓋河患惟兗為甚兗州是河曲處其曲處兩岸無山皆是平地所以潰決常必在此故禹自其決處導之用功尤難孟子亦云禹疏九河瀹濟漯而注之海蓋皆是下流疏殺其勢耳若鯀則只是築堙之所以九載而功弗成也書説禹之治水乃是自下而上了又自上而下後人以為自上而下此大不然不先從下泄水却先從上理㑹下水泄未得上當愈甚是甚治水如此此書多句為文而尤嚴於一字之用其條理精宻而義例可推固不待旁引曲證而後通學者當玩索而得之林氏曰書有六體錯綜於五十八篇中可以意會不可以篇名求先儒增而為十曰貢征歌範亦不足盡不可從也禹貢實典之體可觸類而長矣貢乃賦税之總稱田賦包篚皆在其中夏氏曰此篇所載非一獨以貢名篇者治水成功後條陳九州所有以為定法實以任土作貢為主故以貢名國王氏炎曰九州有賦有貢凡賦諸侯以供其用者也凡貢諸侯以獻於天子者也挈貢名篇有大一統之義存焉禹敷土隨山刊丘寒反木奠音殿高山大川敷分也分别必列反土地以為九州也奠定也定高山大川以别州境也若兗之濟子禮反河青之海岱揚之淮海雍於用反之黑水西河荆之荆衡徐之海岱淮豫之荆河梁之華胡化反陽黑水是也方洪水横去聲流不辨區域禹分九州之地隨山之勢相去聲其便宜斬木通道以治平聲之又定其山之高者與其川之大者以為之紀綱此三者禹治水之要故作書者首述之曾氏曰禹别九州非用其私智天文地理區域各定故星土之法則有九野天文訓云九天之野謂中八方而在地者必有高山大川為之限隔風氣為去聲之不通民生其間亦各異俗故禹因高山大川之所限者别為九州又定其山之高峻水之深大者為其州之鎮秩其祭而使其國主之也曾氏曰祭法云共工氏霸九州其來久矣洪水堙没禹治水復分别之舜即位分為十二州分冀東為幷東北為幽分青之東北為營至商又但言九圜九有爾雅九州有幽營而無青梁其商制歟周禮職方氏有幽并而無徐梁營則周制也孔氏曰奠定也奠定其差秩祀禮所視臨陳氏經曰定高山大川為表職乃疆理大規模山川吳氏曰禹先分布九州之土地以别州界隨之勢斬木通道又定其山之高者川之大者以為各州之紀綱然後因其界分相其便宜而施功焉陳氏雅言曰水患未平擇其下流之蔽障者而疏通之區域未辨因其山川之高大者而奠定之皆行其所無事之智也下文九州所載田賦貢獻之異皆敷土而後其等始分也治水經歴之處皆刊木而後其功可興也史臣揭此三言於首而一篇之㫖在是矣冀州冀州帝都之地三面距河兗河之西雍河之東豫河之北周禮職方河内曰冀州是也八州皆言疆界而冀不言者以餘州所至可見晁氏曰亦所以尊京師示王者無外之意朱子曰冀都正是天地中間底好風水山脈從雲中發來雲中正高脊處自脊以西之水則西流入於龍門西河自脊以東之水則東流入于海前面一條黄河環繞右畔是華山自華來至中為嵩山是謂前案遂過去為泰山聳于左淮南諸山為第二重案江南諸山為第三重案諸唐孔氏曰冀堯都諸州冀為先治水先從冀起為州之首記其役功之法成四百家曰冀三面距河河自積石東北流入中國則折而南流雍州在其西故曰西河至華陰折而東流豫州在其南故曰南河至大伾又折而西北流兗州在其東故曰東河以三州考之則冀州在東河之西西河之東南河之北此冀州境也冀地最廣兗最狹冀今河東河北皆在焉居天下四分之一舜分為幽幷幽州燕薊幽涿朔漠等州是其域也幷州太原澤潞晉代汾絳等州是其域也武夷熊氏曰冀州北距長城依山為塞即北狄之境玁狁匈奴突厥契丹皆居其地有天下者定都建邑長安洛陽之外此亦一㑹也既載壺口經始治之謂之載壺口山名漢地志在河東郡北屈縣東南今隰州吉鄉縣也今按既載云者冀州帝都之地禹受命治水所始在所當先經始壺口等處以殺所介反河勢故曰既載然禹治水施功之序則皆自下流始故次兗次青次徐次揚次荆次豫次梁次雍兗最下故所先雍最高故獨後禹言予決九川距四海濬畎澮距川即其用工之本末先決九河之水以距海則水之大者有所歸又濬畎澮以距川則水之小者有所泄皆自下流以疏殺其勢讀禹貢之書求禹功之序當於此詳之朱子曰既者已事之辭篇内凡言既者放此載者始有事也予決九川距四海濬畎澮距川聖人做事便有大綱領先決九川距四海了却逐漸爬疏小水今至川學者亦先識箇大形勢如江河淮先合識得渭水入河上面漆沮涇等又入渭此是第二重事論形勢先識大綱如水則中國莫大於河南方莫大於江涇渭則入河者也先定箇大者則小者便易攷又曰天下有三大水江河混同江是也混同江不知所出斜迤東南流入海其下為遼海遼東遼西指此水而分也下林氏曰洪水泛濫其始必相水之大勢順地之高漸次導之其首尾本末大槩相應下文所云導山導水之序是也此序九州但各記一州之事及其山川所在施功之曲折非謂先治一州之水既畢更治一州也治平聲梁及岐梁岐皆冀州山梁山吕梁山也在今石州離石縣東北爾雅云梁山晉望即冀州吕梁也吕不韋曰龍門未闢吕梁未鑿河出孟門之上又春秋梁山崩左氏穀梁皆以為晉山則亦指吕梁矣酈音歴道元字善長後魏人注桑欽水經謂吕梁之石崇竦音聳河流激盪震動天地此禹既事壺口乃即治梁也岐山在今汾音墳州介休縣狐岐之山勝水所出東北流注于汾酈道元云後魏於狐岐置六壁防離石諸胡因為大鎮今六壁城在勝水之側實古河逕之險阨二山河水所經治之所以開河道也先儒以為雍州梁岐者非是朱子曰他所舉山川皆先地後績者覩成功而言也壺口梁岐及太原皆先績後地者本用功之始而言也豈治之有難易歟功陳氏大猷曰魏志梁山北有龍門禹所鑿此最用處水患莫甚於河河莫險於龍門吕梁鑿闢疑就狹處鑿而廣之未必如賈讓所謂隳斷天地之性也吕氏曰此禹最用功處故首及之孟子謂禹行其所無事如鑿龍門析底柱闢伊闕豈無事哉鑿所當鑿不憚難而止乃是行所無事也若避難就易而謂行所無事可乎既修太原至于岳陽修因鯀之功而修之也廣平曰原今河東路太原府也岳太岳也周職方冀州其山鎮曰霍山地志謂霍太山即太岳在河東郡彘縣東今晉州霍邑也山南曰陽即今岳陽縣地也堯之所都楊子雲冀州箴曰岳陽是都是也蓋汾水出於太原經於大岳東入于河此則導汾水也曾氏曰經始治之之謂載因舊治之之謂修記曰禹能修鯀之功碧梧馬氏曰九州惟冀州所書曰冶曰修云者有事之辭也其餘則皆無事之辭新安陳氏曰惟冀州有修治之辭餘州皆無之非餘州皆無事也以冀例之見餘州之役自禹創始者皆曰治修鯀之功者皆曰修蒙冀文也覃徒含反懷底績至于衡音横漳覃懷地名地志河内郡有懷縣今懷州也曾氏曰覃懷平地也當在孟津之東太行音杭之西淶音來水出乎其西淇水出乎其東方洪水懷山襄陵之時而平地致功為難故曰底績衡障水名衡古横字地志漳水二一出上黨沾縣大黽谷今平定軍樂平縣少山也名為清漳一出上黨長子縣鹿谷山今潞州長子縣發鳩山也名為濁漳酈道元謂之衡水又謂之横水東至鄴合清漳東北至阜城入北河鄴今潞州涉縣也阜城今定逺軍東光縣也又按桑欽漢江南人著水經云二漳異源而下流相合同歸于海唐人亦言漳水能獨達于海請以為瀆而不云入河者蓋禹之導河自洚水大陸至碣石入于海本隨西山下東北去周定王五年河徙砱礫音伶歴則漸遷而東漢初漳猶入河其後河徙日東而取漳水益逺至欽時河自大伾而下已非故道而漳自入海矣故欽與唐人所言者如此朱子曰從覃懐致功而北至衡漳河孔氏曰漳水横流入河故曰衡漳曾氏曰自大伾北流漳水東流而注之也形東西為横南北為從河北流而漳東注則河從而漳横矣厥土惟白壤汝兩反漢孔氏曰無塊曰壤顔氏曰柔土曰壤夏氏曰周官大司徒辨十有二壤之物而知其種以教稼穡樹藝以土均之法辨五物九等制天下之地征則夫音扶教民樹藝與因地制貢固不可不先於辨土也然辨土之宜有二白以辨其色壤以辨其性也蓋草人糞壤之法騂剛用牛赤緹音蹄用羊羵音粉壤用麋渴其列反澤用鹿糞治田疇各因色性而辨其所當用也曾氏曰冀州之土豈皆白壤云然者土會之法從其多者論去聲也陳氏大猷曰白言色壊言質水患退而後土性復色質辨始可興地利定賦法也周禮註釋五物地之五色九等騂剛以下之九等緹絳色也渴澤放水處也土會以土計貢税之法臨川呉氏曰水害既去土復其常故以土色質辨土之所宜也厥賦惟上上錯厥田惟中中賦田所出穀米兵車之類錯雜也賦第一等而錯出第二等也田第五等也賦髙於田四等者地廣而人稠也林氏曰冀州先賦後田者冀王畿之地天子所自治併與場圃園田漆林之類而征之如周官載師所載賦非盡出於田也故以賦屬音祝于厥土之下餘州皆田之賦也故先田而後賦又按九州九等之賦皆每州嵗入總數以九州多寡相較而為九等非以是等田而責其出是等賦也冀獨不言貢篚者冀天子封内之地無所事於貢篚也朱子曰常出者為正間出者為錯錯在上上之下則間出第二等也賦有九等此乃計九州嵗入多寡相較以為之等非科定取民也取民則皆用什一賦入既有常數而又有間出他等之時者嵗有豐凶不能皆如其常故有錯法以通之然則雖夏法亦未嘗不通也而孟子以為不善者雖間有通融未若商周之全通於民也孔氏曰多者為正少者為雜以問禹貢賦法如何潛室陳氏曰九等賦法不是槩此取民只是將諸州所管之賦比較其高下如此若是各以一等取民則一州之廣其田豈無肥瘠如何一律輸賦便有不均之患新安陳氏曰場圃等之征載師掌之材木蒲葦等林衡澤虞掌之金錫禽魚卝人牧人罟人掌之他以類推周官九貢致邦國之用用於諸侯王畿則止於九賦斂財亦此意寡臨川吳氏曰賦之九等以各州嵗入總數較其多而為高下也數之最多者為上上田之九等以各州土地所宜較其肥瘠而為高下也地之最腴者為上上恒胡登反衞既從大陸既作恒衞二水名恒水地志出常山郡上曲陽縣恒山北谷在今定州曲陽縣西北恒山也東入滱水薛氏曰東流合滱水至瀛州高陽縣入易水晁氏曰今之恒水西南流至真定府行唐縣東流入于滋水又南流入於衡水非古逕矣衞水地志出常山郡靈夀縣東北即今真定府靈夀縣也東入滹荒胡反沱河薛氏曰東北合滹沱河過信安軍入易水從從其道也大陸孫炎字子然後漢末人注爾雅曰鉅鹿北廣阿澤河所經也程氏曰鉅鹿去古河絶逺河未嘗逕邢以行鉅鹿之廣阿非是按爾雅高平曰陸大陸云者四無山阜曠然平地蓋禹河自澶音蟬相去聲以北皆行西山之麓故班名固馬司馬遷王撗字平仲漢琅邪人皆謂載之高地則古河之在具冀以及枯洚之南率皆穿西山踵趾以行及其已過信洚漢志冀州信都縣有洚水故曰信洚之北則西山勢斷曠然四平蓋以此地謂之大陸乃與下文北至大陸者合故隋改趙之昭慶以為大陸縣唐又割鹿城置陸渾縣皆疑鉅鹿之大陸不與河應而亦求之向北之地杜佑李吉甫以為邢趙深三州為大陸者得之作者言可耕治水患既息而平地之廣衍者亦可耕治也恒衞水小而地逺大陸地平而近河故其成功於田賦之後吕氏曰言水土平於田賦之前者其害大當先治也言於田賦後其害小徐治之也島音倒夷皮服海曲曰島海島之夷以皮服來貢也新安陳氏曰島海中山孔氏曰居島之夷還服其皮明水害除必林氏曰衣皮夷性不必水平乃得服諸夷不責其貢欲効誠亦不拒也如蠙珠織皮之類耳第王氏炎曰北地寒故服用皮南地暖故服用卉此志其服與中國異聖人亦因其俗而不革爾夾音協右碣巨列反石入于河碣石地志在北平郡驪城縣西南河口之地今平州之南也冀州北方貢賦之來自北海入河南向西轉陟兗反而碣石在其右轉屈之間故曰夾右也程子曰冀為帝都東西南三面距河他州貢賦皆以達河為至故此三方亦不必書而其北境則漢遼東西右北平漁陽上谷之地其水如遼濡滹易四水名皆中高不與河通故必自北海然後能達河也又按酈道元言驪城枕去聲海有石如甬余隴反道數十里當山頂有大石如柱形韋昭以為碣石其山昔在河口海濱故以誌其入貢河道歴世既久為水所漸音尖淪入于海己去岸五百餘里矣戰國策以碣石在常山郡九門縣者恐名偶同而鄭氏以為九門無此山也朱子曰碣石山負海當河入海之衝自海道夾出碣石之右然後入河而達帝都也冀州三面距河其建都實取轉漕之利朝會之便故九州之終皆言達河以紀其入帝都之道冀實帝都亦曰入河者為北境絶逺者言之以明海道亦可至也夫河水之行不得其所故泛濫浸及他處觀禹用功初只在冀州及兗青徐雍却不甚來東南積石龍門所謂作十三載乃同者正在此處龍門至今横石斷流水自上而下其勢極可畏向未經鑿治時龍門正道不甚泄故一派西衮入闗陜一派東袞往河東故此為患最甚禹自積石至龍門著工夫最多又其上散從西域去往往亦不甚為患行河東者多流黄泥地中故只管推洗泥汁只管凝滯淤塞故道漸狹值上流下來纔急故道不泄便致横湍他處先朝亦多造鐵為治河器竟亦何濟蘇氏曰夾挾也自海入河逆流而西右顧碣石如在挾掖也濟河惟兗州濟子禮反兗音演兗州之域東南據濟西北距河濟河見導水蘇氏曰河濟之間相去不逺兗州之境東南跨濟非止於濟也愚謂河昔北流兗州之境北盡碣石河右之地後碣石之地淪入於海河益徙而南濟河之間始相去不逺蘇氏之説未必然也林氏曰濟古文作泲説文註云此兗州之濟也其從水從齊者説文註云出常山房子縣贊皇山則此二字音同義異當以古文為正林氏曰自兗而下八州皆以高山大川定逐州之疆界序所謂别九州篇首所謂奠高山大川也鄭漁仲謂禹貢以地名州為萬代地理家成憲光王氏炎曰周定王五年河徙已非禹之故道漢元三年河徙東郡更注渤海繼決瓠子又決魏之館陶遂分為屯氏河大河在西屯河在東二河相並而行元帝永光中又決清河靈鳴犢口則河分流入于博州屯河始壅塞不通後又決于平原則東入齊入青以達于海而下流遂與漯為一王莽時河遂行漯川夫河不行于大伾之北而道於相魏之南則山澤在河之瀕者支川與河相貫者悉皆易位而與禹貢不合矣讀禹貢者不可不知也武夷熊氏曰兗州當河之下流西距河東距濟北濱海南接徐豫之境其地平廣演迤無高山即今兗濟徳棣魏博滄景等州之地兗唐孔氏曰據謂跨之距至也州之境跨濟而過之九河既道九河爾雅一曰徒駭二曰太史三曰馬頰四曰覆鬴音福甫五曰胡蘇六曰簡潔七曰鈎盤八曰鬲音隔津其一則河之經流也先儒不知河之經流遂分簡潔為二既道者既順其道也按徒駭河地志云滹沱河寰宇記云在滄州清池南許商云在平城馬頰河元和志在徳州安徳平原南東寰宇記云在棣州滴河北輿地記云即篤馬河也覆鬴河通典云在徳州安徳胡蘇河寰宇記云在滄之饒安無棣臨津三縣許商云在東光簡潔河輿地記云在臨津鈎盤河寰宇記云在樂陵東南從徳州平昌來輿地記云在樂陵鬲津河寰宇記云在樂陵東西北流入饒安許商云在鬲縣輿地記云在無棣太史河不知所在自漢以來講求九河者甚詳漢世近古止得其三唐人集累上聲世積𫝊之語遂得其六歐陽忞音民廬陵人宋徽宗朝撰輿地記又得其一或新河而載以舊名或一地而互為兩説要之皆似是而非無所依據至其顯然謬誤者則班固以滹沱為徒駭而不知滹沱不與古河相涉樂史字子正臨川人宋初撰寰宇記馬頰乃以漢篤馬河當之鄭氏求之不得又以為九河齊桓塞入聲其八流以自廣夫音扶曲防齊之所禁塞河宜非桓公之所為也河水可塞而河道果能盡平乎皆無稽考之言也惟程氏以為九河之地已淪於海引碣石為九河之證以謂今滄州之地北與平州接境相去五百餘里禹之九河當在其地後為海水淪没故其迹不存方九河未没於海之時從今海岸東北更五百里平地河播為九在此五百里中又上文言夾右碣石則九河入海之處有碣石在其西北岸九河水道變遷難於推考而碣石通趾頂皆石不應仆没今兗冀之地既無此石而平州正南有山而名碣石者尚在海中去岸五百餘里卓立可見則是古河自今以為海處向北斜行始分為九其河道已淪入於海明矣漢王撗言昔天常連雨東北風海水溢西南出浸數百里九河之地已為海水所漸酈道元亦謂九河碣石苞淪於海後世儒者知求九河於平地而不知求碣石有無以為之證故前後異説竟無歸宿蓋非九河之地而强上聲鑿求之宜其支離而不能得也問齊桓塞九河以富國事果然否朱子曰當時葵丘之㑹申五禁且曰無曲防是時令人不得私自防遏水流他終不成自取塞了最利害處便是這般説話亦難憑氏孔氏曰河分為九道在此州界平原以北是吕曰禹不惜數百里地疏為九河以分其勢善治水者不與水爭地也通新安陳氏曰禹疏九河不過因河之勢自分而疏之耳非自分之也雷夏既澤澤者水之鍾也雷夏地志在濟陰郡城陽縣西北今濮音卜州雷澤縣西北也山海經云澤中有雷神龍身而人頰鼔其腹則雷然則本夏澤也因其神名之曰雷夏也洪水横去聲流而入于澤澤不能受則亦泛濫奔潰音會故水治而後雷夏為澤唐孔氏曰洪水時高原亦水澤不為澤今高地水盡此乃為澤也已孫氏曰既澤向未為澤今始為澤既瀦向為澤今復舊也灉沮㑹同灉音邕沮千余反灉沮二水名灉水曾氏曰爾雅水自河出為灉許慎云河灉水在宋又曰汳音汴水受陳留浚儀陰溝至蒙為灉水東入於泗水經汳水出陰溝東至蒙為狙獾音睢歡則灉水即汳水也灉之下流入于睢水沮水地志睢水出沛國芒縣睢水其沮水歟晁氏曰爾雅云自河出為灉濟出為濋求之於韻沮有楚音二水河濟之别皮列反也二説未詳孰是會者水之合也同者合而一也王氏炎曰沮出濮陽灉出曹州之周氏希聖曰㑹同朝宗皆諸侯見天子禮而以為喻曰王氏炎曰二水勢均故曰㑹同甚陳氏經兗畧不及山知多平地河患為也桑土既蠶是降丘宅土桑土宜桑之土既蠶者可以蠶桑也蠶性惡去聲濕故水退而後可蠶然九州皆賴其利而獨於兗言之者兗地宜桑後世之濮上桑間猶可驗也地高曰丘兗地多在卑下水患尤甚民皆依丘陵以居至是始得下居平地也林氏曰九州皆賴蠶桑而兗貢絲織尤宜於此故特言之王氏炎曰今徳博河間産絲最多漢志稱齊人織作氷紈繡綺號為冠帶衣履天下其地宜桑可知識之者農桑衣食之本故也厥土黑墳音粉下章並同厥草惟繇音遥厥木惟條墳土脈墳起也如左氏所謂祭之地地墳是也繇茂條長也林氏曰九州之勢西北多山東南多水多山則草木為宜不待書也兗徐揚三州最居東南下流其地卑濕沮洳洪水為患草木不得其生至是或繇或條或夭或喬而或漸苞故於三州特言之以見音現水土平草木亦得遂其性也陳氏大猷曰兗徐揚居河濟江淮下流水未平則為下濕於草木非宜水既平則為沃衍於草木尤宜故以三州言草木厥田惟中下厥賦貞作十有三載上聲乃同田第六等賦第九等貞正也兗賦最薄言君天下者以薄賦為正也作十有三載乃同者兗當河下流之衝水激而湍悍音旱地平而土疎被害尤劇竭㦸反今水患雖平而卑濕沮洳未必盡去土曠人稀生理鮮上聲少必作治十有三載然後賦法同於他州此為田賦而言故其文屬於厥賦之下先儒以為禹治水所歴之年且謂此州治水最在後畢州為第九成功因以上文厥賦貞者謂賦亦第九與州正為相當殊無意義其説非是朱子曰兗州水患最深作治十三年乃有賦法與他州同按禹治水八年此言十三載者通始治水八年言之則此州水平其後他州五年歟洪水之患意者只是如今河決之類故禹用功處多在河所以於兗州下記作十有三載乃同此言專為治河也兗州是河患甚處正今之澶衞州也若其他江水兩岸多是山石想亦無泛濫之患禹自不須大段去理㑹王氏炎曰水患未盡去則賦難定其等故十三載始挍所收而定其賦之下下州界既狹又有浸灌之患賦所以最少陳氏大猷曰賦輕重最其當耳什一天下中正兗賦必第九則無可疑者陳氏雅言曰洪水之害兗州尤甚故田雖在第六而其賦比於八州為最下也賦雖在第九而尤必至十有三載然後同於他州也蓋地利之美有未闢故田稍高而賦為至下也人工之脩有未齊故賦既薄而其入尤後也此可見非聖人責取於民也厥貢漆絲厥篚織文貢者下獻其土所有於上也兗地宜漆宜桑故貢漆絲也篚竹器筐屬也古者幣帛之屬則盛音氶之以筐篚而貢焉經曰篚厥𤣥黄是也織文者織而有文錦綺之屬也以非一色故以織文總之林氏曰有貢又有篚者所貢之物入於篚也朱子曰貢者諸侯貢天子故畿外八州皆有貢織文綾羅之屬八林氏曰八州之貢兗雍最寡荆揚最多吕氏曰州之貢皆衣服器用之物所謂惟正之供也浮于濟漯許合反達于河舟行水曰浮漯者河之枝流也兗之貢賦浮濟浮漯以達於河也帝都冀州三面距河達河則達帝都矣又按地志曰漯水出東郡東武陽至千乗去聲漢郡名入海程氏以為此乃漢河與漯殊異然亦不能明言漯河所在未詳其地也陳氏經曰因水入水曰達海岱惟青州青州之域東北至海西南距岱岱泰山也在今襲慶府奉符縣西北三十里唐孔氏曰青州東北跨海至遼東皆是舜為十二州分青州為營州即遼東是也漢公孫度據遼東自號青州刺史越海收東萊諸郡堯時青州當越海而有諸郡也地武夷熊氏曰遼東朝觧等處皆青州之境亦以其曠隔故分為營州今罔南之平蠻等州是也青齊乃東方形勝要害之地世號為東西秦秦得百二齊亦得十二蓋可見矣古者建侯樹國最為重鎮大抵齊之地最為富强近利故孔子謂齊變而後至魯也嵎夷既畧嵎夷薛氏曰今登州之地畧經畧為之封畛也止忍反田間道也即堯典之嵎夷濰淄其道濰音維淄音緇濰淄二水名濰水地志云出琅琊郡箕縣今宻州莒縣東北濰山也北至都昌入海今濰州昌邑也淄水地志云出泰山郡萊蕪縣原山今淄州淄川縣東南七十里原山也東至博昌縣入濟今青州壽光縣也其道者水循其道也上文言既道者禹為之道也此言其道者泛濫既去水得其故道也林氏曰河濟下流兗受之淮下流徐受之江漢下流揚受之青雖近海然不當衆流之衝但濰淄二水順其故道則其功畢矣比之他州用力最省者也厥土白墳海濱廣斥尚石反濱涯也海涯之地廣漠而斥鹵音魯許慎曰東方謂之斥西方謂之鹵斥鹵鹹地可煮為鹽者也孔氏曰言復其斥鹵色林氏曰此州土有二種平地之上白而性墳海濱之土彌望皆斥鹵厥田惟上下厥賦中上田第三賦第四也厥貢鹽絺海物惟錯岱畎絲枲鈆松怪石萊夷作牧厥篚檿音琰絲絺抽遲反枲想里反鈆音縁鹽斥地所出絺細葛也錯雜也海物非一種上聲下並同故曰錯林氏曰既總謂之海物則固非一物矣此與揚州齒革羽毛惟木文勢正同錯蓋别為一物如錫貢磬錯之錯理或然也畎谷也岱山之谷也枲麻也怪石怪異之石也林氏曰怪石之貢誠為可疑意其必須以為器用之飾而有不可闕者非特貢其怪異之石以為玩好去聲也萊夷顔師古曰萊山之夷齊有萊侯萊人即今萊州之地作牧者言可牧放夷人以畜牧為生也檿山桑也山桑之絲其韌如吝反中去聲琴瑟之絃蘇氏曰惟東萊為有此絲以之為繒慈陵反其堅韌異常萊人謂之山蠒音蹇朱子曰萊夷及揚之島夷間於貢篚之間切意時貢土物以見來王之意歟青蔡氏元度曰貢物不以精麄為敘而以多寡為叙州鹽居多故敘於先他倣此貢林氏曰凡貢不言所出之地者以一州所出皆可也言所出之地者以此地所出為良也爾雅檿絲出東萊島孫氏曰檿絲出於萊夷𤣥縞出於淮夷織貝出於夷故青揚徐敘厥篚於三夷之下浮于汶音問達于濟汶水出泰山郡萊蕪縣原山今襲慶府萊蕪縣也西南入濟在今鄆音渾州中都縣也蓋淄水出萊蕪原山之陰東北而入海汶水出萊蕪原山之陽西南而入濟不言達河者因於兗也海岱及淮惟徐州徐州之域東至海南至淮北至岱而西不言濟者岱之陽濟東為徐岱之北濟東為青言濟不足以辨故略之也爾雅濟東曰徐州者商無青并青於徐也周禮正東曰青州者周無徐并徐於青也林氏曰一州之境必有四至七州皆止二至蓋以鄰州互見至此州獨載其三邊者止言海岱則嫌於青止言淮海則嫌於揚故必曰海岱及淮而後徐州之疆境始别也武夷熊氏曰徐州沂泗諸水在其前冀東與兗豫之地皆可接引而在懷抱拱揖之内亦東方一形勝也徐即魯境地連淮海東夷其俗有二曲阜沂泗則禮義文雅之邦而彭城則其俗又雄傑鷙悍自負劉項起於豐沛朱全忠以碭山人淮夷徐戎皆在其地牧守之任亦不可不重慎也淮沂音宜其乂淮沂二水名淮見導水曾氏曰淮之源出于豫之境至揚徐之間始大其泛濫為患尤在於徐故淮之治於徐言之也沂水地志云出泰山郡蓋縣艾山今沂州沂水縣也南至于下伾音丕西南而入于泗曾氏曰徐州水以沂名者非一酈道元謂水出尼丘山西北徑魯之雩門亦謂之沂水水出太公武陽之冠石山亦謂之沂水而沂水之大則出於泰山也又按徐之水有泗有汶有汴有漷而獨以淮夷言者周職方氏青州其川淮泗其浸沂沭音術周無徐州兼之於青周之青即禹之徐則徐之川莫大於淮淮乂則自泗而下凡為川者可知矣徐之浸莫大於沂沂乂則自沭而下凡為浸者可知矣蒙羽其藝蒙羽二山名蒙山地志在泰山郡蒙陰縣西南今沂音尼州費縣也羽山地志在東海郡祝其縣南今海州朐音劬山縣也藝者言可種藝也林氏曰蒙山即語東蒙詩奄有龜蒙羽山即鯀殛處高王氏炎曰先淮後沂先大而後小也先蒙後羽先而後下也淮沂乂而後蒙羽可藝事之相因也大野既豬音朱大野澤名地志在山陽郡鉅野縣北今濟州鉅野縣也鉅即大也水蓄而復流者謂之豬按水經濟水至乘去聲氏縣分為二南為菏音柯北為濟酈道元謂一水東南流一水東北流入鉅野澤則大野為濟之所絶其所聚也大矣何承天曰鉅野廣大南導洙泗北連清濟徐之有濟於是乎見又鄆州中都西南亦有大野陂或皆大野之地也曾氏曰職方河東曰兗州其澤藪曰大野大野濟水之所絶則禹之時蓋在徐之西兗之東也周無徐故專屬兗東原底音抵平東原漢之東平國今之鄆州也晁氏曰東平自古多水患數音朔徙其城咸平中又徙城於東南則其下濕可知底平者水患已去而底於平也後人以其地之平故謂之東平又按東原在徐之西北而謂之東者以在濟東故也東平國在景帝亦謂濟東國云益知大野東原所以志濟也王氏炎曰大野豬而後東原平亦事之相因也曾氏曰淮沂水之流者大野水之止者蒙羽地之高者東原地之平者無不治也厥土赤埴音熾墳草木漸包土黏音嚴曰埴埴膩也黏泥去聲如脂之膩也周有摶音團埴之工老氏言埏音延埴以為器惟土性黏膩細宻故可摶可埏也漸進長上聲也如易所謂木漸言其日進於茂而不已也包叢生也如詩之所謂如竹包矣言其叢生而積也厥田惟上中厥賦中中田第二等賦第五等也厥貢惟土五色羽畎夏𤣥雅反翟亭歴反嶧音亦陽孤桐泗濱浮磬淮夷蠙音駢珠暨魚厥篚𤣥纎思廉反縞古老反徐州之土雖赤而五色之土亦間去聲有之故制以為貢周書作雒音洛曰諸侯受命於周乃建大社于國中其壝以醉反東青土南赤土西白土北驪音離土中央舋與釁同塗也以黄土將建諸侯鑿取其方面之上苞以黄土苴子余反以白茅以為土封故曰受削土于周室此貢土五色意亦為是用也羽畎羽山之谷也夏翟雉具五色其羽中去聲旌旄者也染人見周禮天官之職秋染夏鄭氏曰染夏者染五色也林氏曰古之車服器用以雉為飾者多不但旌旄也曾氏曰山雉具五色出于羽山之畎則其名山以羽者以此歟嶧山名地志云東海郡下邳縣西有葛嶧山古文以為嶧山下邳今淮陽軍下邳縣也陽者山南也孤桐特生之桐其材中琴瑟詩曰梧桐生矣於彼朝陽蓋草木之生以向日為貴也泗水名出魯國卞縣桃墟西北陪尾山源有泉四四泉俱導因以為名西南過彭城又東南過下邳入淮卞縣今襲慶府泗水縣也濱水旁也浮磬石露水濱若浮于水然或曰非也泗濱非必水中泗水之旁近浮者石浮生土中不根著直畧反者也今下邳有石磬山或以為古取磬之地曾氏曰不謂之石者成磬而後貢也淮夷淮之夷也蠙蚌步項反之别名也暨及也珠為服飾魚用祭祀今濠泗楚皆貢進白魚亦古之遺制歟夏翟之出於羽畎孤桐之生於嶧陽浮磬之出於泗濱珠魚之出於淮夷各有所産之地非他處所有故詳其地而使貢也𤣥赤黑色幣也武成曰篚厥𤣥黄纎縞皆繒也禮曰及期音基而大祥素縞麻衣中月而禫徒感反禫而纎記曰有虞氏縞衣而養老則知纎縞皆繒之名也曾氏曰𤣥赤而有黑色以之為袞所以祭也以之為端所以齊也以之為冠以為首服也黑經白緯曰纎纎也縞也皆去凶即吉之所服也林氏曰桐以向日孤生者為良猶言孤竹之管陸農師曰桐性便濕地不生於岡詩傳曰梧桐不生高罔太平而後生朝陽以此觀之生山陽難得而生孤者尤難得也孔氏曰水中見石可以為磬越陳氏大猷曰石輕浮可為磬者成而貢之磬聲清取輕浮者良今海濵亦有浮石衣新安胡氏曰𤣥纎縞三色繒也端取其正謂士服袂二尺二寸屬幅廣袤等也陳氏雅言曰七州之貢各執其物而不詳其地者一州之所出皆可為貴也獨徐之貢夏翟而必曰羽畎孤桐而必曰嶧陽浮磬而必曰泗濱珠魚而必曰淮夷指其物而詳其地者蓋為此地之所産為善非徐州之産皆可充此貢也蓋天下之地各有所宜而天下之産各有所善八州之貢皆是下獻其土所有於上而非上之后責取作書者每州謹而識之以明彼之所有者此之所無宜也而於此謹之尤至以見地利之美材物之良此之所善彼之所否即孔子先薄正祭器不以四方之食供簿正之意也浮于淮泗達于河許慎曰汳水受陳留浚儀陰溝至蒙為灉水東入于泗則淮泗之可以達于河者以灉至于泗也許慎又曰泗受泲水東入淮蓋泗水至大野而合泲然則泗之上源自泲亦可以通河也淮海惟揚州揚州之域北至淮東南至于海問薛常州作地志不載揚豫二州朱子曰此二州是其所經歴古今不同難下手故不作諸葛誠之要補之以其只見冊子上底故也地理最難理會全合禹貢不著了起武夷熊氏曰揚州在地東南隅以地勢言也山必於西北澤必滙於東南經言淮海惟揚州北距淮東至南海閩粤雖上古未通亦當在要荒之服禹㑹諸侯於塗山㑹稽又禹迹之所至矣西抵荆州之境淮之西當在桐柏荆州之界江之西當在衡漳之界其地乃淮東西江東西及兩浙之地建都于江南者金陵豫章亦都㑹然畫江淮以自保僅可以偏霸欲以規恢中原奄有四海則自古以來未有之彭蠡既豬蠡音禮彭蠡地志在豫章郡彭蠡縣東合江西江東諸水跨豫章饒州南康軍三州之地所謂鄱陽湖者是也詳見導水陽鳥攸居陽鳥隨陽之鳥謂雁也今惟彭蠡洲渚之間千百為羣記陽鳥所居猶夏小正大戴禮篇名記雁北鄉音向也言此水既豬洲渚既平而禽鳥亦得其居止而遂其性也陳氏經曰日陽也此鳥南北與日進退故曰陽鳥唐孔氏曰日行夏至漸南冬至漸北鴻雁九月而南正月而北左思蜀都所謂木落南翔氷泮北徂是也三江既入唐仲初吳都賦註松江下七十里分流東北入海者為婁江東南流者為東江併松江為三江其地今亦名三江口吳越春秋所謂范蠡乘舟出三江之口者是也又按蘇氏謂岷山之江為中江嶓音波冢之江為北江豫章之江為南江即導水所謂東為北江東為中江者既有中北二江則豫章之江為南江可知今按此為三江若可依據然江漢㑹於漢陽合流數百里至湖口而後與豫章江㑹又合流千餘里而後入海不復可指為三矣蘇氏知其説不通遂有味别必列反之説禹之治水大為去聲民去上聲害豈如陸羽輩辨味烹茶為口腹計耶亦可見其説之窮矣以其説易音異以惑人故併及之或曰江漢之水揚州巨浸何以不書曰禹貢書法費疏音疎鑿者雖小必記無施勞者雖大亦略江漢荆州而下安於故道無俟濬治故在不書況朝音潮宗于海荆州固備言之是亦可以互見矣此正禹貢之書法也朱子曰三江之説多不同董鈢問東坡之説如何曰東坡不曾親見東南水勢只是意想硬説且漢江之水到漢陽軍已合為一不應至揚州復言三江薛士龍説震澤下有三江入海疑他曾見東南水勢説得恐是書中極有難考處只如禹貢説三江及荆揚間地理是吾輩親目見者皆有疑至北方即無疑此無他是不曾見耳新安陳氏曰三江不勝異説顔師古以為中江南江北江郭景純以為岷江浙江松江韋昭以為松江浙江浦陽江王介甫以為一江自義興一江自毗陵既江自吳縣皆據所見而言非禹舊迹也皆不必取入入海也陳氏大猷曰古有九河後合為一古有榮澤後堙為地安知彭蠡之下禹平水時有三江而後或合為一乎酈道元謂東南地卑萬水所湊觸地成川故川舊瀆難以為憑禹迹之不可考者多矣凡捨經文而指後世流派之分合水道之通塞地名之同異以為説者以論後世之地理則可以論禹迹之舊則難也震澤底定震澤太湖也周職方揚州藪曰具區地志在吳縣西南五十里今蘇州吳縣也曾氏曰震如三川震之震若今湖翻是也具區之水多震而難定故謂之震澤底定者言底於定而不震蕩也新安陳氏曰韋昭註國語大湖即五湖書謂之震澤爾雅謂之具區職方曰揚州藪曰具區浸曰五湖又不同篠音小簜待朗反既敷厥草惟夭於驕反厥木惟喬厥土惟塗泥篠箭竹簜大竹郭璞曰竹濶節曰簜敷布也水去竹已布生也少長並上聲曰夭喬高也塗泥水泉濕也下地多水其土淖女教反夭王氏炎曰少長曰夭猶言桃之夭上竦曰喬猶言南有喬木南方地暖故草木皆少長而木多上竦河朔地寒雖合抱之木不能高也兗徐言草木皆居厥土之下凡上無高下澡濕其性皆然兼山林言之也若揚之塗泥惟言沮洳之多山林不興故先草木也青不言草木而貢有松檿等則可知矣揚言之而荆亦不言然貢有杶幹等亦可知矣蓋兗青相同荆揚為一惟徐漸包為異耳厥田惟下下厥賦下上上是掌反錯田第九等賦第七等雜出第六等也言下上上錯者以本設賦九等分為三品下上與中下異品故變文言下上上錯也王氏炎曰土塗泥故其田下下大抵南方水淺土薄不如北方地力之厚也七林氏曰田最下而賦第或第六者人工修也厥貢惟金三品瑶音遥琨音昆篠簜齒革羽毛惟木島夷卉音毁服厥篚織貝厥包橘柚錫貢三品金銀銅也瑶琨玉石名詩曰何以舟之惟玉及瑶琨説文云石之美似玉者取之可以為禮器篠之材中去聲下並同於矢之笴音稈簜之材中於樂之管簜亦可為符節周官掌節有英簜周禮註盛筯器也象有齒犀兕音死似牛角青色重千斤有革鳥有羽獸有毛木楩梓豫章之屬齒革可以成車甲羽毛可以為旌旄木可以備棟宇器械下介反之用也島夷東南海島之夷卉草也葛越草布也木綿之屬織貝錦名織為貝文詩曰貝錦是也今南夷木綿之精好者亦謂之吉貝海島之夷以卉服來貢而織貝之精者則入篚焉包裹也小曰橘大曰柚錫者必待錫命而後貢非嵗貢之常也張氏曰必錫命乃貢者供祭祀燕賓客則詔之口腹之欲則難於出令去聲也臨川吳氏曰染其絲五色織之成文者曰織貝不染五色而織之成文者曰織文孔蘇氏曰橘柚茍常供則勞害如漢唐荔枝矣唐氏曰橘柚與荆之大龜豫之磬錯皆非常貢故言于厥篚之下沿音袁于江海達于淮泗順流而下曰沿沿江入海自海而入淮泗不言達于河者因於徐也禹時江淮未通故沿于海至呉始開刋音寒溝地名在廣陵隋人廣之而江淮舟船始通也孟子言排淮泗而注之江記者之誤也朱子曰孟子言瀹濟漯而注諸海決汝漢排淮泗而注之江據今水路及禹貢所載惟漢入江汝泗自入淮而淮自入海分明是誤蓋一時牽於文勢而不暇考其實爾今人强為人解釋終是可笑陳氏大猷曰循行水涯曰沿水之險者莫如江海遇風濤多沿岸而行所以獨言沿不言浮以著其險也王氏炎曰兗言浮于濟漯達于河故青言浮于汶達于濟徐言浮於淮泗達于河故揚言沿于江海達于淮泗皆因上文以互見也臨川吳氏曰林少頴云禹時江淮未通故揚州入貢必由江以入海然後達于淮泗至吳夫差掘溝通水與晉會黄池然後江淮始通孟子謂禹排淮泗而注之江蓋誤指所通之水以為禹跡某謂江北淮南地高於水雖曰溝通江淮止是江淮之間掘一横溝兩端築堤壅水在溝中若欲行舟須自江中拽舟上溝行溝既盡又拽舟下淮江淮二水實未嘗通流也荆及衡陽惟荆州荆州之域北距南條荆山南盡衡山之陽荆衡各見音現下並同導山唐孔氏曰荆州以衡山之陽為至者蓋南方惟衡山為大以衡陽言之見其地不止此山而猶包其南也朱子曰禹治水時想亦不曾遍歴天下如荆州乃三苗之國不成一一皆到往往是使官屬去彼相視其山川具圖説以歸作此一書耳故今禹貢所載南方山川多與今地面上所有不同旅曾氏曰有兩荆山此荆州之荆山非雍州荆岐既之荆山此荆山其南為荆州其北為豫州漢志此荆山在南郡今襄陽府臨沮縣衡山在長沙今潭州相南縣北距荆山南及衡陽為荆州即今湖南湖北之地也今江西亦半屬荆州五武夷熊氏曰荆州之地亦廣北接雍豫之境南逾嶺即越之南徼也越雖千古未通已當在要荒之服東抵揚州之境西抵梁州及西南夷等處皆楚地也揚州之境自兩浙為吳越之外江淮皆楚境或謂建都於江南者當以南陽為正其北接連中原東通吳西接巴蜀南控蠻粤故諸葛亮以為用武之國英雄之所必爭凡自北而攻南自南而窺北未有不先得此而後可以有為也此又有國者之所當知也江漢朝宗于海江漢見導水春見曰朝夏見曰宗朝宗諸侯見天子之名也江漢合流于荆去海尚逺然水道已安而無有壅塞横決之患雖未至海而其勢已奔趨於海猶諸侯之朝宗于王也朱子曰江漢發源梁州及入海則在揚州至荆州合流迅疾以趨海有似于朝宗山王氏炎曰漢水入江處在漢陽軍大别下正屬荆州之域九江孔殷九江即今之洞庭也水經言九江在長沙下雋音吮西北楚地記曰巴陵瀟湘之淵在九江之間今岳州巴陵縣即楚之巴陵漢之下雋也洞庭正在其西北則洞庭之為九江審矣今沅水漸水元水辰水叙水酉水灃水資水湘水皆合於洞庭意以是名九江也孔甚殷正也九江水道甚得其正也按漢志九江在廬江郡之尋陽縣尋陽記九江之名一曰烏江二曰蜯音蚌江三曰烏白江四曰嘉靡江五曰畎江六曰源江七曰廩江八曰提江九曰箘巨隕反江今詳漢九江郡之尋陽乃禹貢揚州之境而唐孔氏又以為九江之名起於近代未足為據且九江派别取之耶亦必首尾短長大畧均布然後可目之為九然其一水之間當有一洲九江之間沙水相間乃為十有七道而今尋陽之地將無所容況沙洲出没其勢不常果可以為地理之定名乎設使派别為九則當曰九江既道不應曰孔殷於導江當曰播九江不應曰過九江反復參攷則九江非尋陽明甚本朝胡氏以洞庭為九江者得之曾氏亦謂導江曰過九江至于東陵東陵今之巴陵今巴陵之上即洞庭也因九水所合遂名九江故下文導水曰過九江經之例大水合小水謂之過則洞庭之為九江益以明矣新安陳氏曰江漢朝宗于海即繼曰九江孔殷導江不曰播九江而曰過九江則大江自大江九江自九水可見孔氏所謂江於此分為九道者其非明矣證以導江東至于澧過九江至於東陵則九江當在澧州之下巴陵之上而不在尋陽與今之江州尤明矣朱蔡以洞庭湖當之辨證詳明從之可也謂江南凡水皆呼為江禹在澧州之下巴陵之上自有九水今年代久逺陵谷變遷不可以今水證古水而闕之亦可也沱音駝潛既道爾雅曰水自江出為沱自漢出為潛凡水之出於江漢者皆有此名此則荆州江漢之出者也今按南郡枝江縣有沱水然其流入江而非出於江也華容縣有夏水首出于江尾入于沔亦謂之沱若潛水則未有見也王氏炎曰沱水在今江陸府枝江縣土人謂枝江為百里洲夾江沱二水之間其與江分處謂之上沱與江合處謂之下沱隋志南郡松滋縣有沱涔即古潛字故史記云沱涔既導今松滋分為潛江縣矣雲土夢作乂夢平去二音雲夢澤名周官職方荆州其澤藪曰雲夢方八九百里跨江南北華容枝江江夏安陸皆其地也左傳楚子濟江入于雲中又楚子以鄭伯田于江南之夢合而言之則為一别而言之則二澤也雲土者雲之地土見而已夢作乂者夢之地已可耕治也蓋雲夢之澤地勢有高卑故水落有先後人工有早晚也朱子曰江陵之下岳州之上是雲夢又曰江陵之下連岳州是雲夢厥土惟塗泥厥田惟下中厥賦上下荆州之土與揚州同故田比揚只加一等而賦為第三等者地闊而人工修也厥貢羽毛齒革惟金三品杶敕倫反幹栝音适柏礪音利砥音紙砮音奴丹惟箘音窘簵楛音户三邦底貢厥名包匭音軌菁音精茅厥篚𤣥纁璣組九江納錫大龜荆之貢與揚州大抵多同然荆先言羽毛者漢孔氏所謂善者為先也按職方氏揚州其利金錫荆州其利丹銀齒革則荆揚所産不無優劣矣杶栝柏三木名也杶木似樗音樞而可為弓榦栝木柏葉松身礪砥皆磨石砥以細宻為名礪以麤糲音粗辣為稱砮者中矢鏃之用肅慎氏貢石砮者是也丹丹砂也箘簵竹名楛木名皆可以為矢董安于事見戰國䇿之治晉陽也公宫之垣皆以荻蒿苫詩廉反楚廪之其高丈餘趙襄子發而試之其堅則菌簵不能過也則菌簵蓋竹之堅者其材中矢之笴楛肅慎氏貢楛矢者是也三邦未詳其地底致也致貢菌簵楛之有名者也匭匣也菁茅有刺而三脊所以供祭祀縮酒之用既包而又匣之所以示敬也齊桓公責楚貢包茅不入王祭不供無以縮酒又管子云江淮之間一茅而三脊名曰菁茅菁茅一物也孔氏謂菁以為葅者非是今辰州麻陽縣苞茅山出苞茅有刺而三脊纁周禮染人夏纁𤣥纁絳色幣也璣珠不圓者組綬類大龜尺有二寸所謂國之守龜非可常得故不為常貢若偶得之則使之納錫于上謂之納錫者下與上之辭重其事也曾氏曰揚言惟木多不勝名也荆木名之貢止此也周禮菁茅春官司尊彞醴齊縮酌註云以茅縮去滓也再鄭氏曰染纁者三入而成又再染以黑則為緅又染以黑則為緇𤣥色在緅緇之間其六入者是染𤣥纁之法也此州染𤣥纁色善故貢之師新安陳氏曰錫貢如敷錫之錫上錫下也納錫如錫之錫下錫上也史記龜策𫝊云龜千嵗滿尺二寸於臨川吳氏曰大龜神物國之所寳則以入納而錫上謂納不謂貢明其非貢物也浮于江沱潛漢逾于洛至于南河江沱潛漢其水道之出入不可詳而大勢則自江沱而入潛漢也逾越也漢與洛不通故捨音舍舟而陸以達于洛自洛而至于南河也程氏曰不徑浮江漢兼用沱潛者隨其貢物所出之便或由經流或循枝派期於便事而已王氏曰江沱潛漢均與洛不通必陸行逾洛然後由洛可至南洛凡曰逾皆水道不通遵陸而後能達也逾于沔同義荆河惟豫州豫州之域西南至南條荆山北距大河問周公定豫州為天地之中東西南北各五千里今北邊無極而南方交趾際海道里長短敻殊何以云各五千里朱子曰此但以中國地段四方相去言之未説極邊無際海處周公以土圭測天地之中則豫州為中而南北東西際天各逺許多至於北逺而南近則地形有偏耳所謂地不滿東南也武夷熊氏曰豫州居天下之中四方道里適均故古人於此定都不但形勢之所在亦朝會貢賦之便湯之亳今河南偃師縣是也成王之洛邑今河南洛陽縣是也其地北距河南抵荆山東抵徐西抵雍梁今為河南府虢郟鄭汝來蔡唐鄧汴宋等州之地伊洛瀍澗既入于河伊水山海經曰熊耳之山伊水出焉東北至洛陽縣南北入于洛郭璞云熊耳在上洛縣南今商州上洛縣也地志言伊水出𢎞農盧氏之熊耳者非是洛水地志云出𢎞農郡上洛縣冢領山水經謂之讙舉山今商州洛南縣冢領山也至鞏縣入河今河南府鞏縣也瀍水地志云出河南郡榖城縣濳亭北今河南府河南縣西北有古穀城縣其北山實瀍水所出也至偃師縣入洛今河南府偃師縣也澗水地志云出𢎞農郡新安縣東南入于洛新安在今河南府新安澠音勉池之間今澠池縣東二十三里新安城是也城東北有白石山即澗水所出酈道元云世謂之廣陽山然則澗水出今之澠池至新安入洛也伊瀍澗水入于洛而洛水入于河此言伊洛瀍澗入于河若四水不相合而各入河者猶漢入江江入海而荆州言江漢朝宗於海意同蓋四水並流小大相敵故也詳見下文滎户扄反波既豬滎波二水名濟水自今孟州温縣入河潛行絶河南溢為滎在今鄭州滎澤縣西五里敖倉東南敖倉者古之敖山也按今濟水但入河不復過河之南滎瀆水受河水有石門謂之滎口石門也鄭康成謂滎今塞為平地滎陽民猶謂其處為滎澤酈道元曰禹塞淫水於滎陽下引河東南以通淮泗濟水分河東南流漢明帝使王景即滎水故瀆東注浚儀謂之浚儀渠漢志謂滎陽縣有狼蕩渠首受濟者是也南曰狼蕩北曰浚儀其實一也波水周職方豫州其川滎雒其浸波溠音詐爾雅云水自洛出為波山海經曰婁涿音卓之山波水出其陰北流注于穀二説不同未詳孰是孔氏以滎波為一水者非也導菏音柯澤被孟豬菏澤地志在濟陰郡定陶縣東今興仁府濟陰縣南三里其地有菏山故名其澤為菏澤也蓋濟水所經水經謂南濟東過寃句音淵劬縣南又東過定陶縣南又東北菏水東山焉是也被及也孟豬爾雅作孟諸地志在梁國睢陽縣東北今南京虞城縣西北孟諸澤是也曾氏曰被覆也菏水衍溢導其餘波入于孟豬不常入也故曰被厥土惟壤下土墳壚音盧土不言色者其色雜也壚疏音疎也顔氏曰𤣥而疏者謂之壚其土有高下之不同故别言之王氏炎曰壤則沃墳壚則為瘠青顧氏臨曰高地則壤下地則壚如厥土白墳海濱廣斥是也厥田惟中上厥賦錯上中田第四等賦第二等雜出第一等也臨川吳氏曰田中上第四等賦錯上中第二等而問或第一等也蓋冀賦第一或時數少於豫則降為第二而升豫為上上豫賦第二或時數多於冀則升為第一而降冀為上中也厥貢漆枲絺紵音住厥篚纎纊音曠錫貢磬錯林氏曰周官載師漆林之征二十有五周以為征而此乃貢者蓋豫州在周為畿内故載師掌其征而不制貢禹時豫在畿外故有貢也推此義則冀不言貢者可知顔師古曰織紵以為布及練然經但言貢枲與紵成布與未成布不可詳也纊細綿也磬錯治磬之錯也非所常用之物故非常貢必待錫命而後納也與揚州橘柚同然揚州先言橘柚而此先言錫貢者橘柚言包則於厥篚之文無嫌故言錫貢在後磬錯則與厥篚之文嫌於相屬故言錫貢在先蓋立言之法也孔氏曰纎纊細綿也纎新安陳氏曰徐之𤣥纎縞則纎為繒此之纊則當為細孔説是貢臨川吳氏曰凡錫者非常貢故於末特言之龜非物故言納不言貢橘柚磬錯雖是貢物非常制所貢也故言錫貢浮于洛達于河豫州去帝都最近豫之東境徑自入河豫之西境則浮于洛而後至河也華去聲陽黑水惟梁州梁州之境東距華山之南西據黑水華山即太華見導山黑水見導水曾氏曰華山即西岳在梁雍之東其陽為梁山其隂為雍州武夷熊氏曰梁州即今全蜀之地成都潼川興元利州夔州等路五十四州之地是也或言秦以前未嘗通至秦鑿山開道關塞始通恐止言金牛一道耳下言岷嶓沱潛蔡蒙和夷禹之故迹皆可見何嘗不通中國也大抵蜀地北與秦隴接境實為天下要脊世治則順此後從世亂則阻險割據任擇牧守最難其人不可不慎重也四王氏曰後世為巴蜀今川地也岷嶓既藝嶓音波岷嶓二山名岷山地志在蜀郡湔氐音箋低道西徼外在今茂州汶山縣江水所出也晁氏曰蜀以山近江源者通為岷山連峯接岫重疊險阻不詳逺近青城天彭諸山之所環繞皆古之岷山青城乃其第一峯也嶓冢山地志云在隴西郡氐道縣􅃞水所出又云在西縣今興元府西縣三泉縣也蓋嶓冢一山跨于兩縣云川源既滌水去不滯而無泛溢之患其山已可種藝也王氏炎曰江漢發源此州方江漢之源未滌水或泛溢二山下其地有荒而不治者今既可種藝知二水之順流也沱潛既道此江漢别流之在梁州者沱水地志蜀郡郫音皮縣江沱在東西入大江郫縣今成都府郫縣也又地志云蜀郡汶江縣江沱在西南東入江汶江縣今永康軍導江縣也潛水地志云巴郡宕音蕩渠縣潛水西南入江宕渠今渠州流江縣也酈道元謂宕渠縣有大穴潛水入焉通罡山下西南潛出南入于江又地志漢中郡安陽縣灊谷水出西南入漢灊音潛安陽縣今洋州真符縣也又按梁州乃江漢之原此不志者岷之藝導江也嶓之藝導漾也道沱則江悉矣道潛則漢悉矣上志岷嶓下志沱潛江漢源流於是而見陳氏曰沱潛發源此州而入荆州故荆梁二州皆言潛沱既導嶓臨川吳氏曰凡江漢支流皆名沱潛不拘一處岷藝則江漢之上源治矣沱潛導則江漢之下流治矣蔡蒙旅平蔡蒙二山名蔡山輿地記在今雅州嚴道縣蒙山地志蜀郡青衣縣今雅州名山縣也酈道元謂山上合下開沬音昧水逕其間溷胡困反崖水脈漂音飄疾歴代為患蜀郡太守李氷發卒鑿平溷崖則此二山在禹為用功多也祭山曰旅旅平者治功畢而旅祭也陳氏大猷曰古人舉事必祭況治水土大事必不敢忽然旅獨於梁雍言之者蓋九州終於梁雍以見前諸州名山皆有祭也旅獨於蔡蒙荆岐言之者蓋紀梁之山終於蔡蒙紀雍之山始於荆岐以見州内諸名山皆有祭也故下文復以九山刊旅總結之然特言於諸州之後其先成民而後致力於神之意歟和夷底績和夷地名嚴道以西有和川有夷道或其地也又按晁氏曰和夷二水名和水今雅州榮經縣北和川水自蠻界羅嵒州東西來逕蒙山所謂青衣水而入岷江者也夷水出巴郡魚復音福縣東南過佷音恒屬武陵郡山縣南又東過夷道縣北東入于江今詳二説皆未可必但經言底績者三覃懷原隰既皆地名則此恐為地名或地名因水亦不可知也曾氏曰嚴道有和川夷人居之厥土青黎黎黑也孔氏曰沃壤也質臨川吳氏曰土不言質不一也厥田惟下上厥賦下中三錯田第七等賦第八等雜出第七第九等也按賦雜出他等者或以為嵗有豐凶或以為户有增減皆非也意者地力有上下年分去聲不同如周官田一易再易之類故賦之等第亦有上下年分冀之正賦第一等而間嵗第二等也揚之正賦第七等而間嵗第六等也豫之正賦第二等而間嵗第一等也梁之正賦第八等而間嵗出第七第九等也當時必有條目詳具今不存矣書之所載特凡例也若謂嵗之豐凶戸之增減則九州皆然何獨於冀揚豫梁四州言哉臨川吳氏曰田下上第七等賦下中第八等三錯者或時錯出第七則降揚於下中而梁為下上或時錯出第九則升兗於下中而梁為下下通本等第八為三故曰三錯厥貢璆音求鐵銀鏤砮磬熊羆音卑狐音胡狸音棃織皮璆玉磬鐵柔鐵也鏤剛鐵可以刻鏤者也磬石磬也言鐵而先於銀者鐵之利多於銀也後世蜀之卓氏程氏以鐵冶富擬封君則梁之利尤在於鐵也織皮者梁州之地山林為多獸之所走熊羆狐狸四獸之皮製之可以為裘其毳毛織之可以為罽居例反也林氏曰徐州貢浮磬此州既貢玉磬又貢石磬豫州又貢磬錯以此觀之則知當時樂器磬最為重豈非以其聲角而在清濁小大之間最難得其和者哉歸安鄒氏曰漢志犍為郡朱提縣有朱提山出銀每銀八兩為一流直一千五百八十他銀一流但直一千犍為郡正梁州之境是梁州之銀獨美於他州故以為貢西傾因桓是來浮于潛逾于沔入于渭亂于河西傾山名地志在隴西郡臨洮縣西今洮州臨潭縣西南桓水名水經曰西傾之南桓水出焉蘇氏曰漢始出為漾東南流為沔至漢中東行為漢沔酈道元曰自西傾而至葭萌浮于西漢西漢即潛水也自西漢遡流而屆于晉夀界阻漾枝津南歴岡北迤邐接漢沔歴漢川至于褒水逾褒而暨于衙嶺之南溪灌于斜川屆于武功而北以入于渭漢武帝時人有上書欲通褒斜道及漕事下張湯問之云褒水通沔斜水通渭皆可以漕從南陽上沔入褒褒絶水至斜間百餘里以車轉從斜下渭如此則漢中穀可致經言沔渭而不言褒斜者因大以見小也褒斜之間絶水百餘里故曰逾然于經文則當曰逾于渭今曰逾于沔此又未可曉也絶河而渡曰亂朱子曰西傾雖在雍州其人有事於京師者必道取梁州因桓水而來故梁貢道及之矣葉氏曰雍言織皮崑崙析支渠摉非中國之貢明疑西傾即西戎之境熊羆狐狸織皮文與西傾因桓是來相屬謂四獸織皮西傾之戎因桓水而以此來貢也上孔氏曰漢曰沔黑水西河惟雍州雍州之域西據黑水東距西河謂之西河者主冀都而言也王氏炎曰雍州之地秦漢曰關中之武夷熊氏曰雍州秦地周之岐豐鎬京漢三輔皆此焉婁敬謂金城千里天府之國合天下形勢言之所謂秦得百二者實以據地勢之上游當天下之要脊四塞以為固全一面之險以東制諸侯故言定都者必先焉書以黑水西河為界而又西接弱水流沙之地則其土地之廣漠可知大抵闗中之地固是形勢可以為都但其地迫近西戎周秦漢唐世有羌胡之患必盡陰山與唐三受降城及靈夏河西五郡為塞地乃可爾又嘗考之古今地志雍州之地即無黑水所謂導黑水至于三危者三危山或云在焞煌郡則今𤓰州也曷嘗有此水踰跨諸山以至于南海哉若以河源崑崙推之崑崙山脊以西人跡所未到其東中一支則重岡積嶺直至終南太華皆是雍之南山而𤓰州乃在河西五郡實當西北界上漢人所謂斷匈奴右臂者以其不與西戎相接也史當有錯弱水既西栁宗元曰西海之山有水焉散渙無力不能負芥投之則委靡墊没及底而後止故名曰弱既西者導之西流也地志云在張掖音亦郡刪丹縣薛氏曰弱水出吐谷渾胡昆反界窮石山自刪丹西至合黎山與張掖縣河合又按通鑑魏太武擊柔然至栗水西行至菟音徒園水分軍摉討又循弱水西行至涿邪音耶山則弱水在菟園水之西涿邪山之東矣北史載太武至菟園分水軍摉討東至瀚海西接張掖水北度燕平聲然山與通鑑小異豈瀚海張掖水於弱水為近乎程氏據西域𫝊去聲以弱水為在條支援引甚悉然長安西行一萬二千二百里又百餘日方至條支其去雍州如此之逺禹豈應窮荒而導其源也哉其説非是程氏曰弱水初必壅遏而東既導之西則逆者順矣與林氏曰衆水皆東而弱水獨西黑水獨南因其性勢之自然也必欲東之則逆其自然非行所無事矣涇屬音燭渭汭音孺涇渭汭三水名涇水地志出安定郡涇陽縣西今原州百泉縣岍音牽頭山也東南至馮翊音亦陽陵縣入渭今永興軍高陵縣也渭水地志出隴西郡首陽縣西南今渭州渭源縣鳥鼠山西北南谷山也東至京兆船司空縣入河今華州華陰縣也汭水地志作芮扶風汧縣弦蒲藪芮水出其西北東入涇今隴州汧音牽源縣弦蒲藪有汭水焉周職方雍州其川涇汭詩曰汭鞠之即皆謂是也屬連屬也涇水連屬渭汭二水也新安陳氏曰孔云水北曰汭一云水曲曰汭又山口曰汭夏書以洛表對洛汭則汭水北之曲也又如東過洛汭漆沮既從漆沮二水名漆水寰宇記自耀州同官縣東北界來經華源縣合沮水沮水地志出北地郡直路縣東今坊州宜君縣西北境也寰宇記沮水自坊州昇平縣北子午嶺出俗號子午水下合榆谷慈馬等川遂為沮水至耀州華原縣合漆水至同州朝邑縣東南入渭二水相敵故並言之既從者從於渭也又按地志謂漆水出扶風縣晁氏曰此豳之漆也水經漆水出扶風杜陽縣程氏曰杜陽今岐山普潤縣之地亦漢漆縣之境其水入渭在灃水之上與經序渭水節次不合非禹貢之漆水也蘇氏曰從如少之從長渭大而漆沮小故言灃音風水攸同灃水地志作酆出扶風鄠音戸縣終南山今永興軍鄠縣山也東至咸陽縣入渭同者同於渭也渭水自鳥鼠而東灃水南注之涇水北注之漆沮東北注之曰屬曰從曰同皆主渭而言也蘇氏曰灃渭相若故言同荆岐既旅終南惇物至于鳥鼠荆岐二山名荆山即北條之荆地志在馮翊懷徳縣南今耀州富平縣掘陵原也岐山地志在扶風美陽縣西北今鳯翔府岐山縣東北十里也終南惇物鳥鼠亦皆山名終南地志古文以太一山為終南山在扶風武功縣今永興軍萬年縣南五十里也惇物地志古文以垂山為惇物在扶風武功縣今永興軍武功縣也鳥鼠地志在隴西郡首陽縣西南今渭州渭源縣西也俗呼為青雀山舉三山而不言所治者蒙上既旅之文也原隰底績至于豬野廣平曰原下濕曰隰詩曰度入聲其隰原即指此也鄭氏曰其地在豳今邠州也豬野地志云武威縣東北有休屠音塗澤古今以為豬野今涼州姑臧縣也治水成功自高而下故先言山次原隰次陂澤也三危既宅三苗丕叙三危即舜竄三苗之地或以為燉煌未詳其地三苗之竄在洪水未平之前及是三危已既可居三苗於是大有功叙今按舜竄三苗以其惡之尤甚者遷之而立其次者於舊都今既竄者已丕叙而居於舊都者尚桀驁音傲不服蓋三苗舊都山川險阻氣習使然今湖南徭洞時猶竊發俘而詢之多為猫姓豈其遺種上聲歟歸安鄒氏曰按後漢西羌𫝊註三危山在今沙州燉煌縣東南山有三峯故曰三危武夷熊氏曰首言弱水終言三危極其逺而言之也故吕氏曰三苗有罪自當􅇡逐發政施仁自當及之治水至三危亦既使安居大得其叙後世以為投之四裔若棄之者非聖人之心也厥土惟黄壤黄者土之正色林氏曰物得其常性者最貴雍州之土黄壤故其田非他州所及新安陳氏曰土黄壤最貴故雍田上塗泥最下故揚田下下厥田惟上上厥賦中下田第一等而賦第六等者地狹而人功少也王氏炎曰東方朔云關中之地號為畝直一金田上上可知升唐孔氏曰此州與荆州賦田升降皆較六等荆州之極故云人功修此州降之極故云人功少厥貢惟球琳琅玕音郎干球琳美玉也琅玕石之似珠者爾雅曰西北之美者有昆侖虚之球琳琅玕今南海有青琅玕珊音山瑚屬也孫氏曰貢非一類物者不言惟一類物皆言惟浮于積石至于龍門西河㑹于渭汭積石地志在金城郡河關縣西南羌中今鄯州龍支縣界也龍門山地志在馮翊夏陽縣今河中府龍門縣也西河冀之西河也雍之貢道有二其東北境則自積石至於西河其西南境則會于渭汭言渭汭不言河者蒙梁州之文也他州貢賦亦當不止一道發此例以互見耳按邢恕字和叔鄭州人奏乞下熙河路打造船五百隻於黄河順流放下至會州西小河内藏放熙河路漕使去聲李復字履中閩人奏竊知邢恕欲用此船載兵順流而下去取興州契勘會州之西小河鹹水其濶不及一丈深止於一二尺豈能藏船黄河過會州入韋精山石峽險窄音側自上垂流直下高數十丈舩豈可過至西安州之東大河分為六七道散流渭之南山逆流數十里方再合逆溜力救反水淺灘磧音迹不勝平聲舟載此聲若出必為夏國侮笑事遂寢邢恕之策如李復之言可謂謬矣然此言貢賦之路亦曰浮于積石至于龍門西河則古來此處河道固通舟楫矣而復之言乃如此何也姑録之以備參考云武夷熊氏曰正道皆從渭達河惟山脊以西之地謂道不可通處必自積石之河經涉龍門然後達于西河以至帝都也織皮崐崘析支渠摉西戎即敘摉疎鳩反崐崘即河源所出在臨羌析支在河關西千餘里渠摉水經曰河自朔方東轉經渠摉縣故城北蓋近朔方之地也三國皆貢皮衣故以織皮冠音貫之皆西方戎落故以西戎總之即就也雍州水土既平而餘功及於西戎故附于末蘇氏曰青徐揚三州皆萊夷淮夷島夷所篚此三國亦篚織皮但古語有顛倒詳略爾其文當在厥貢惟球琳琅玕之下浮于積石之上簡編脱誤不可不正愚謂梁州亦篚織皮恐蘇氏之説為然武夷熊氏曰崐崘唐書以為吐蕃界析支即今陰山河南等處歸軒鄒氏曰按西羌𫝊羌地在金城郡河關縣之西南濱於賜支至乎河首賜支者禹貢所謂析支也導岍音牽及岐至于荆山逾于河壺口雷首至于太岳底柱析城至于王屋太行音杭恒山至於碣石入于海此下隨山也岍岐荆三山皆雍州山岍山地至扶風岍縣西吳山古文以為汧山今隴州吳山縣吳嶽山也周禮雍州山鎮曰嶽山又按寰字記隴州汧源有岍山岍水所出禹貢所謂岍山也晁氏以為今之隴山天井金門秦嶺山者皆古之岍也岐荆見雍州壺口雷首太岳底柱析城王屋太行恒山皆冀州山壺口太岳碣石見冀州雷首地志在河東郡蒲坂縣南今河中府河東縣也底柱石在大河中流其形如柱今陜音閃州陜縣三門山是也析城地志在河東郡濩澤縣西今澤州陽城縣也晁氏曰山峯四面如城王屋地志在河東郡垣縣東北今絳州垣曲縣也晁氏曰山狀如屋太行山地志在河内郡山陽縣西北今懷州河内也恒山地志在常山郡上曲陽縣西北今定州曲陽也逾者禹自荆山而過于河也孔氏以為荆山之脈逾河而為壺口雷首者非是蓋禹之治水隨山刊木其所表識音志諸山之名必其高大可以辨疆域廣博可以奠民居故謹而書之以見其施功之次第初非有意推其脈絡之所自來若今之𦵏法所言也若必實以山脈言之則尤見其説之謬妄蓋河北諸山根本脊脈皆自代北寰武嵐音藍憲諸州乗高而來其脊以西之水則西流以入龍門西河之上流其脊以東之水則東流而為桑乾音干幽冀以入于海其西一支為壺口太岳次一文包汾音墳晉之源而南出以為析城王屋而又西析以為雷首又次一支乃為太行又次一支乃為恒山其間各隔沁音盡潞諸川不相連屬豈自岍岐跨河而為是諸山哉山之經理者已附于逐州之下於此又條列而詳記之而山之經緯者可見矣王鄭有三條四列之名皆為未當今據導字分之以為南北二條而江河以為之紀於二之中又分為二焉此北條大河北境之山也朱子曰每州各言境内山川首尾不相聨貫且自東而西非自然之形勢故於此通説九州山川聨貫首尾更從西而東以著自然之形勢為問味别地脈之説如何曰不知是要水有所歸不民害還是只要辨味㸃茶如陸羽之流尋脈踏地如後世風水之流耶且太行自西北發脈來為天下之脊此是中國大形勢其底柱王屋等山皆是太行山脚今説者分陰陽列言導岍及岐至于荆山荆山山脈逾河而過為壺口雷首底柱析城王屋碣石則是荆山地脈却來做太行山腳其所謂地脈尚説不通況禹貢本非理會地脈耶吕氏曰山川之分見于九州者其經也山川之聚見于後者其緯也無經則不知其定所無緯則不知其脈絡此作書之妙也導山有二説或以為隨山通道以相視其源委脈絡或以為治山旁小水二説當兼用禹隨山以治水故以導言如止於相其山勢何導之有山之有脈絡條列固不可誣而水之源未有不出於山水之勢未有不因于山既隨山通道相其脈絡源委又因以導山旁澗谷之水而納之川二説蓋並行而不相悖也懷林氏曰禹本導川歸海今乃先以導山蓋方洪水襄故川舊瀆皆浸没不可見欲施工無所措手故先以九州高山巨鎮為表識自西決之使東以殺其滔天之勢水既順下漸入于海則川流故迹稍稍可求於是濬川之功可施始決九川而距四海蓋先隨山而後濬川其序不得不然也新安陳氏曰三條之説出於馬融王肅以岍岐至碣石為北條西傾至陪尾為中條嶓冢至敷淺原為南條然内方大别在荆州岷在梁州相去數千里豈可合為一條四列之説出於鄭𤣥謂岍岐為正陰列西傾為次陰列嶓冢為次陽列岷山為正陽列四列雖是而陰陽正次名稱未當宜蔡氏以二條四列訂之云西傾朱圉音語鳥鼠至于太華熊耳外方桐柏至于陪尾西傾朱圉鳥鼠太華雍州山也熊耳外方桐柏陪尾豫州山也西傾見梁州朱圉地志在天水郡冀縣南今秦州大潭縣也俗呼為白巖山鳥鼠見雍州太華地志在京兆華陰縣南今華州華陰縣二十里也熊耳在商州上洛縣詳見豫州外方地志潁川郡崈高縣有崈音崇高山古文以為外方在今西京登封縣也桐柏地志在南陽郡平氏縣東南今唐州桐柏縣也陪尾地志江夏郡安陸縣東北有横尾山古文以為陪尾今安州安陸也西傾不言導者蒙導岍之文也此北條大河南境之山也孔氏曰西傾朱圉在積石以東鳥鼠渭水所出在隴西之西三者雍州之南山至于太華相首尾而東太華熊耳外方桐柏四山相連東南在豫州界洛經熊耳伊經外方淮出桐柏經陪尾凡此皆先舉所施功之山於上而後條例所治水於下互相備曾氏曰岍與西傾皆雍州之山故西傾不言導其文蒙於導岍也岷嶓皆梁州之山故岷山不言導其文蒙於嶓冢也導嶓冢至于荆山内方至于大别必别反嶓冢即梁州之嶓也山形如冢故謂之嶓冢詳見梁州荆山南條荆山地志在南郡臨沮縣北今襄陽府南章縣也内方大别亦山名内方地志章山古文以為内方山在江夏郡竟陵縣東北今荆門軍長林縣也左傳吳與楚戰楚濟漢而陳音陣自小别至於大别蓋近漢之山今漢陽軍漢陽縣北大别山是也地志水經云在安豐者非是此南條江漢北境之山也孔氏曰􅃞水出嶓冢在梁州經荆山荆山在荆州内方大别皆荆州山漢水所經岷山之陽至于衡山過九江至于敷淺原岷山見梁州衡山南嶽也地志在長沙郡湘南縣今潭州衡山縣也九江見荆州敷淺原地志云豫章郡歴陵縣南有博易山古文以為敷淺原今江州徳安縣博陽山也晁氏以為在鄱陽者非是今按晁氏以鄱陽有博陽山又有歴陵山為應地志歴陵縣之名然鄱陽漢舊縣地不應又為歴陵縣山名偶同不足據也江州徳安雖為近之然所謂敷淺原者其山甚小而庳音卑亦未見其為在所表見者惟廬阜在大江彭蠡之交最高且大宜所當紀志者而皆無考據恐山川之名古今或異而𫝊者未必得其真也姑俟知者過經過也與導岍逾于河之義同孔氏以為衡山之脈連延而為敷淺原者亦非是蓋岷山之脈其北一支為衡山而盡於洞庭之西其南一支度桂嶺北經袁筠之地至徳安所謂敷淺原者二支之間湘水間斷衡山在湘水西南敷淺原在湘水東北其非衡山之脈連延過九江而為敷淺原者明甚且其山川岡脊源流具在眼前而古今異説如此況殘山斷港音講歴數千百年者尚何自取信哉岷山不言導者蒙導嶓冢之文也此南條江漢南境之山也問岷山之分何以見朱子曰只是以水驗之大凡兩山夾行中間必有水兩水夾行中間必有山江出於岷山岷山夾江兩岸而行那邊一支去為江北許多去處這邊一支為湖南又一支為建康又一支為兩浙而餘氣為福建二廣患禹貢西方南方殊不見禹施工處縁是山高少水當時只分遣官屬而不了事底記􅄒得文字不整齊耳某作九江彭蠡辨禹貢大槩可見於此禹貢只載九江無洞庭今以其地驗之有洞庭無九江則洞庭之為九江無疑矣洞庭彭蠡冬月亦涸只有數條江水在其中或問禹貢地理曰禹貢過字有三義有山過水過人過如過九江至敷淺原只是禹過此處去也若曰山過水過更不通孔氏曰岷山江所出在梁州衡山江所經在荆州當林氏曰岍岐所導之水乃合河濟之流最為奔悍其隨山之初自西而決之東自東達之東北則已達于海矣故言入于海西傾嶓岷所導之水則未能達海且注于下流之地及濬川之功既施乃得入海故下文所載方是衆水入海之道故此只言至于陪尾大别敷淺原而止而下流之山皆所不及也列陳氏曰禹之導山雖曰因而治衆水大槩岍岐之河濟所經西傾之列伊洛淮渭所經嶓冢之列漢水所經岷山之列江水所經也新安陳氏曰導山之役分為四路乃懷襄方殷未可下濬川之功先隨山相視可疏導者疏導之兩條四列實人功經歴之次第為濬川之經始下文導水詳言濬川之源委乃收上文隨山之成功林陳説是獨岍岐入海節辭猶未備岍岐一列河濟所經既入海矣何為下文導河積石導沇水二條又各言入于海歟意者當時水患河濟尤甚比江漢淮用工尤難故自發源以至入海先之相視疏導後之開鑿濬導必極于歸縮之地若江淮漢之屬則初一番相視疏導且可至陪尾大别敷淺原而止下文方自源徂流言之歟導弱水至于合黎餘波入于流沙此下濬川也弱水見雍州合黎山名隋地志在張掖縣西北亦名羌谷流沙杜佑云在沙州西八十里其沙隨風流行故曰流沙水之疏鑿者已附于逐州之下於此又派别而詳記之而水之經緯皆可見矣濬川之功自隨山始故導水次於導山也又按山水皆原於西北故禹敘山敘水皆自西北而東南導山則先岍岐導水則先弱水也朱子曰流沙在合黎之西自導弱水至導洛凡九條皆導水之事大槩自北而南先言山以為水之經故此言水為山之紀弱水最在西北水又西流不經中國故首言之程陳氏曰弱水之正者入合黎其餘則入于流沙氏曰禹導弱水至合黎則其逆行者已順其逺而無所事治者固不必極之于西海近而無能為害者亦任其餘波之入流沙則已矣故于雍止曰既西而于導水不必曰入于西海皆紀實也合黎流沙不可意度林氏曰禹惟先決山陵之積水使有所歸然後可施濬川之功如上文既導岍岐至碣石然後導河濟之功可施導西傾至陪尾然後導淮渭洛之功可施導嶓至大别導岷至敷淺原然後導漢與江之功可施所以先言導山而後及導水也導黑水至于三危入于南海黑水地志在犍音乾為郡南廣縣汾關山水經出張掖雞山南至燉煌過三危山南流入于南海唐樊綽云西夷之水南流入于南海者凡四曰區江曰西珥音二河曰麗水曰瀰渃音眉若江皆入于南海其曰麗水者即古之黑水也三危山臨峙其上按梁雍二州西邊皆以黑水為界是黑水自雍之西北而直出梁之西南也中國山勢岡脊大抵皆自西北而來積石西傾岷山岡脊以東之水既入于河漢岷山其岡脊以西之水即為黑水而入于南海地志水經樊氏之説雖未詳的實要是其地也程氏曰樊綽以麗水為黑水者恐其狹小不足為界其所稱西珥河者却與漢志葉榆澤相貫廣處可二十里既足以界别二州其流又正趨南海又漢滇音顛池即葉榆之地武帝初開滇巂音髓時其地古有黑水舊祠夷人不知載籍必不能附會而綽及道元皆謂此澤以榆葉所積得名則其水之黑似榆葉積漬所成且其地乃在蜀之正西又東北距宕昌不逺宕昌即三苗種裔與三苗之敘于三危者又為相應其證驗莫此之明也朱子曰黑水從雍梁西界入南海亦不經中國故次之弱水黑水沇水言導而不著其地未詳陳氏大猷曰萬水能載而弱水獨弱且西流萬水皆清而黑水獨黑且南流天地之間有常有變不可一律齊聖人順其性而已導河積石至于龍門南至于華陰東至于底音砥柱又東至于孟津東過洛汭至于大伾北過洚音降水至于大陸又北播為九河同為逆河入于海積石龍門見雍州華陰華山之北也底柱見導山孟地名津渡處也杜預云在河内郡河陽縣南今孟州河陽縣也武王師渡孟津者即此今亦名富平津洛汭洛水交流之内在今河南府鞏音拱縣之東洛之入河實在東南河則自西而東過之故曰東過洛汭大伾孔氏曰山再成曰伾張揖以為在成臯鄭𤣥以為在修武武徳臣瓚以為修武武徳無此山成臯山又不再成今通利軍黎陽縣臨河有山蓋大伾也按黎陽山在大河垂欲趨北之地故禹記之若成臯之山既非從東折北之地又無險礙如龍門底柱之須疏鑿西去洛汭既已大近東距洚水大陸又為絶逺當以黎陽者為是洚水地志在信都縣今冀州信都縣枯洚渠也程氏曰周時河徙砱礫至漢又改向頓丘東南流與禹河迹大相背戾地志魏郡鄴縣有故大河在東北直達于海疑即禹之故河孟康以為王莽河非也古洚瀆自唐貝州經城北入南宫貫穿信都大抵向北而入故河於信都之北為合北過洚水之文當以信都者為是大陸見冀州九河見兗州逆河意以海水逆潮而得名九河既淪於海則逆河在其下流故不復有矣河上播而為九下同而為一其分播合同皆水勢之自然禹特順而導之耳今按漢西域𫝊張騫所窮河源云河有兩源一出蔥嶺一出于闐于闐在南山下其河北流與蔥嶺河合東注蒲昌海蒲昌海一名鹽澤去玉門陽關三百餘里其水停居冬夏不增減潛行地中南出積石又唐長慶中薛元鼎使吐蕃自隴西成紀縣西南出塞二千餘里得河源於莫賀延積尾曰悶磨黎山其山中高四下所謂崐崘也東北流與積石河相連河源澄瑩冬春可涉下稍合流色赤益逺他水并注遂濁吐蕃亦自言崐崘在其國西南二説恐薛氏為是河自積石三千里而後至于龍門經但一書積石不言方向荒逺在所略也龍門而下因其所經記其自北而南則曰南至華陰記其自南而東則曰東至底柱又詳記其東向所經之地則曰孟津曰洛汭曰大伾又記其自東而北則曰北過洚水又詳記其北向所經之地則曰大陸曰九河又記其入海之處則曰逆河自洛汭而上河行於山其地皆可攷自大伾而下垠岸高於平地故決齧流移水陸變遷而洚水大陸九河逆河皆難指實然上求大伾下得碣石因其方向辨其故迹則尤可考也其詳悉見上文又按李復云同州韓城北有安國嶺東西四十餘里東臨大河瀕河有禹廟在山斷河出處禹鑿龍門起於唐張仁愿所築東受降平聲城之東自北而南至於山盡兩岸石壁峭立大河盤束於山峽間千數百里至此山開岸濶豁然奔放怒氣噴風聲如萬雷今按舊説禹鑿龍門而不詳其所以鑿誦説相𫝊但謂因舊修闢去其齟齬以決水勢而已今詳此説則謂受降以東至于龍門者是禹新開鑿若果如此則禹未鑿時河之故道不知却在何處而李氏之學極博不知此説又何所考也朱子曰釋水云河千里一曲一直河從積石北行又東乃折而南計應三千里然後至龍門而為西河龍門地勢險河率破山以行禹功於此最難自龍門南流至華陰而極始折而東至于底柱又東至孟津東過洛汭而為南河至大伾而極始折而北流為東河至兗州而分為九復合為一而入海河流於此終矣河為四瀆宗其發源西北故敘中國之水以河為先逆河是開渠通海以泄河之溢秋冬則涸春夏則泄洛程氏曰洛水至於洛州鞏縣東北入河曰洛汭者既北入于河河之南洛之北其兩間為汭汭之為言在洛水之内也渭水入河之間亦名渭汭正其義也自洛汭以上山水名稱迹道古今如一自大伾以下不特水道難考雖名山舊嘗憑河者亦復不可究辨非山有徙移也河既變遷年世又逺人知新河之為河不知舊山之不附新河也輒並河求之安從而得舊山之真歟蘇氏曰河既分為九又合為一以一迎八而後入海光王氏炎曰周定王五年河徙已非禹之故道漢元三年河徙東郡更注渤海繼決于瓠子又決于魏之館陶遂分為屯氏河大河在西屯河在東二河相並而行元帝永光中又決于清河靈鳴犢口則河水分流入于博州屯河始壅塞不通後二年又決於平原則東入齊入青以達于海而下流與漯為一王莽時源遂行漯川大河不行于大伾之北而遂行于相魏之南則山澤在河之瀕者支川與河之相貫者悉皆易位而與禹貢不合矣者方氏曰建紹後黄河決入鉅野溢于泗以入于淮謂之南清河由汶合濟至滄州以入海者謂之北清河是時淮僅受河之半金之亡也河自開封北衛州決而入渦河以入淮一淮水獨受大黄河之全以輸之海濟水之絶于王莽時者今其原出河北温州猶經枯黄河中以入汶而後趨海清濟貫濁河遂成虚論矣新安陳氏曰方氏陽於身經目覩與諸家據紙上而説者不同合程王説而參觀之可見古今河道之大不同又因方説而後濟水之入河復溢出于河者顯然可見矣嶓冢導漾東流為漢又東為滄浪音郎之水過三澨至于大别必别反南入于江東滙音賄澤為彭蠡東為北江入于海漾水名水經曰漾水出隴西郡氐道縣嶓冢山東至武都常璩音渠曰漢水有兩源此東源也即禹貢所謂嶓冢導漾者其西源出隴西嶓冢山會泉始源曰沔逕葭萌入漢東源在今西縣之西西源在今三泉縣之東也酈道元謂東西兩川俱出嶓冢而同為漢水者是也水源發于嶓冢為漾至武都為漢又東流為滄浪之水酈道元云武當縣北四十里漢水中有洲曰滄浪洲水曰滄浪水是也蓋水之經歴隨地得名謂之為者明非他水也三澨水名今郢州長壽縣磨石山發源東南流者名澨水至復州景陵縣界來又名汊楚嫁反水疑即三澨之一然據左傳漳澨􅱀澨則為水際未可曉也大别見導山入江在今漢陽軍漢陽縣滙迴也彭蠡見揚州北江未詳入海在今通州靜海縣今按彭蠡古今記載皆謂今之番陽然其澤在江之南去漢水入江之處已七百餘里所蓄之水則合饒信徽撫吉贑音紺南安建昌臨江袁筠隆興南康數州之流非自漢入而為滙者又其入江之處西則廬阜東則湖口皆石山峙立水道狹甚不應漢水入江之後七百餘里乃横截而南入于番陽又横截而北流為北江且番陽合數州之流豬而為澤泛溢壅遏初無仰于江漢之滙而後成也不惟無所仰於江漢而衆流之積日遏月高勢亦不復容江漢之來入矣今湖口横渡之處其北則江漢之濁流其南則番陽之清漲不見所謂漢水滙澤而為彭蠡者番陽之水既出湖口則依南岸與大江相持以東又不見所謂横截而為北江者又以經文考之則今之彭蠡既在大江之南於經則宜曰南滙彭蠡不應曰東滙於導江則宜曰南㑹于滙不應曰北會于滙且既在南於經財宜曰北為北江不應曰東為北江以今地理叅挍絶為反戾今廬江之北有所謂巢湖者湖大而源淺每嵗四五月間蜀嶺雪消大江泛溢之時水淤入湖至七八月大江水落湖水方洩隨江以東為合東滙北滙之文然番陽之湖方五六百里不應舍此而録彼記其小而遺其大也蓋嘗以事理情勢考之洪水之患惟河為甚意當時龍門九河等處事急民困勢重役煩禹親莅而身督之若江淮則地偏水急不待疏鑿固已通行或分遣官屬往視亦可況洞庭彭蠡之間乃三苗所居水澤山林深昧不測彼方負其險阻頑不即工則官屬之往者亦未必遽敢深入是以但知彭蠡之為澤而不知其非漢水所滙但意如巢湖江水之淤而不知彭蠡之源為甚衆也以此致誤謂之為滙謂之北江無足怪者然則番陽之為彭蠡信矣因説禹貢朱子曰此最難説蓋他本文自有謬處且如漢水自是從今漢陽軍入江下至江州然後江西一帶江水流出合為大江兩江下水相淤故江西水出不得溢為彭蠡上取漢水入江處有多少路今言漢水過三澨至于大别南入于江東滙澤為彭蠡全然不合又如何去强解釋得蓋禹當時只治得雍冀數州為詳南方諸水皆不親見恐只得之傳聞故多遺闕又差誤如此今又不成説他聖人之經不是所以難説然自古解釋者紛紛終是與他地上水不合東滙澤為彭蠡多此一句岷山導江東别為沱又東至于澧音禮過九江至于東陵東迆音以北㑹為滙東為中江入于海沱江之别流於梁者也澧水名水經出武陵充縣西至長沙下雋西北北入江鄭氏云經言導言㑹者水也言至者或山或澤也澧宜山澤之名按下文九江澧水既與音預其一則非水明矣九江見荆州東陵巴陵也今岳州巴陵縣也地志在廬江西北者非是㑹滙中江見上章朱子曰禹治江不見甚用力書載岷山導江東别為沱又東至于澧過九江至於東陵東迆北㑹為滙東為中江入于海若中間更用工夫如何載得恁略嶓冢導漾東流為漢又東為滄浪之水過三澨至于大别南入于江東滙澤為彭蠡東為北江入于海又曰岷山之陽至于衡山過九江至于敷淺原此皆禹貢之文也古今讀者皆以為是既出于聖人之手則固不容復有訛謬萬世之下但當尊信誦習𫝊之無窮亦無以覈其事實是否為也是以為之説者不過隨文解義以就章句如説九江則曰江過尋陽派别為九或曰有小江九北來注之説彭蠡則曰漢水所滙而江水亦往㑹焉説北江中江則曰漢既滙而出為北江江既㑹而出為中江也説九江則但指今日江州治所以當之説敷淺原則但以為漢歴陽縣之博易山在今日為江州之徳安縣而已如是而言姑為誦説則可矣若以山川形勢之實考之吾恐其説有所不通而不能使人無所疑也若曰派别為九則江流上下洲渚不一今所計以為九者若必首尾長短均布若一則横斷一節縱别為九一水之間當有一洲九江之間沙水相間乃為十有七道於地將無所容若曰參差取之不必齊一則又不知斷自何許而數其九也況沙渚出没其勢不常江陵先有九十九洲後乃復生一洲是豈可以為地理之定名乎此不可通之妄説也若曰旁計横入小江之數則自岷山以東至入海處不知當為幾千百里江矣此又不可通之妄説也且經文言九江孔殷則正以見其吐吞壯盛浩無津涯之勢決非尋常分派小江之所當又繼此而後及夫沱潛雲夢則又見其決非尋陽以東甚逺之下流此又可以證前二説者為不可通之妄説也若曰漢水滙為彭蠡而江水亦往㑹焉則彭蠡之為澤也實在大江之南自今江州湖口縣南跨南康軍饒州之境以接于隆興府之北瀰漫數十百里其源則東自饒徽信州建昌軍南自贑州南安軍西自袁筠以至隆興府分寜武寧諸邑方數千里之水皆㑹而歸焉北過南康揚瀾左里則兩岸漸迫山麓而湖面稍狹遂東北流以趨湖口而入于江矣然以地勢北高而南下故其入于江也反為江水所遏而不得遂因郤而自豬以為是瀰漫數十百里之大澤則是彭蠡之所以為彭蠡者初非有所仰于江漢之滙而後成也不惟無所仰于江漢而衆流之積日遏月高勢以不復容江漢之來入矣又況漢水自漢陽軍大别山下南流入江則其水與江混而為一至此已七百餘里矣今謂其至此而後一先一後以入于彭蠡既滙之後又復循次而出以為二江則其入也何以識其為昔日之漢水而先行何以識其為昔日之江水而後會其出也何以識其為昔日之漢水而今分之以北何以識其為昔日之江水而今分以居中耶且以方言之則宜曰南㑹而不應曰北會以實計之則湖口之東今但見其為一江而不見其分流然則所謂漢水滙為彭澤而江水亦往㑹焉者亦不可通之妄説也此數説者既無一之不窮於是味别洲别之論出焉而終亦不免於窮也蓋曰味别則不知凡禹之所為過門不入胼手胝足而不以為病者為欲大濟天下昏墊之民使得平土而居以衣且食而遂其生耶抑如陸羽張又新輩但欲較其毫分於齒頰間以為茗飲一時之快也嗚呼彼以是而為説者亦可謂童騃不思之甚矣且河之所會漆沮涇渭伊洛瀍澗支川尤多而初無味别之説濟之所經或潛或見或止或流其變不一而亦無味别之説何獨至此而辨之若是悉耶此又可見為不通之妄説也若曰洲别則又九江之鑿吾既辨于前矣若果如此則漢水入江之後便須當有一洲介于其間以為江漢之别而湖口入滙之處又當各分為二以為出入之辨而後可也今皆無之而湖口横渡之處予嘗過之但見舟北為大江之濁流舟南為彭蠡之清漲而已蓋彭蠡之水雖限於江而不得洩然其既平則亦因其可行之隙而又未嘗不相持以東也惡睹所謂中江北江之别乎此又可見其為不通之妄説也若曰古之九江即今之江州古之敷淺原即今之徳安縣則漢九江郡本在江北而今所謂江州者實武昌郡之柴桑縣後以江北之尋陽并柴桑而立郡又自江北徙治江南以故江南得有尋陽之名後又因尋陽而改為江州實非古九江地也又況經言過九江至于東陵而後會于彭蠡則自今江州城下至湖口縣纔四十里不知東陵的在何處何所表異而其志之繁宻促數乃如此又曰過九江至于敷淺原則已自江州順流東下湖口又復泝流南上彭蠡百有餘里而後至焉亦河説哉此又不可通之妄説也至于今之所謂敷淺原者則其為山也微而其全體正脈又特為廬阜以盡乎大江彭蠡之交矣不取於此以記衡山東道一支之所極者而獨有取乎彼之區區焉者則吾恐其山川之名古今或異而𫝊者未必得其真也凡此差舛其類不一讀而不思思而不考者既昏潰鹵莽而無足言矣其間亦有心知其誤而口不敢言乃反為之遷就穿鑿以蓋之其巧愈甚其謬愈彰使有識之士讀之愈疑而不敢信惟國初胡袐監旦近世晁􅉟事説之皆以九江為洞庭則其援證皆極精博而莆田鄭樵漁仲獨謂東滙澤為彭蠡東為北江入于海十三字為衍文亦為得之予既目覩彭蠡有源兩江不分之實又參之以此三説者而深以事理情勢求之然後果得其所以誤也蓋洪水之患惟河為甚而兗州乃其下流水曲而流緩地平而土疎故河之患於此為尤甚而作治之功十有三載然後同於諸州竊料當時惟此等處事急民困勢重役煩禹乃親莅而身督之不可一日而舍去若梁雍荆揚地偏水急不待疏鑿固已通行則分遣官屬往而視之其亦可也況洞庭彭蠡之間乃三苗氏之所居當是之時水澤山林深昧不測彼方負其險阻頑不即工則官屬之往者固未必遽敢深入其境是以但見彭蠡之為澤而不知其源之甚逺而且多但見洞庭下流之已為江而不知其中流之嘗為澤而甚廣也以此致誤宜無足怪者若其用字之同異則經之凡例亦自可考顧讀者未深思耳今但刪去東滙北江之衍字而正以洞庭為九江更以經之凡例通之則過九江至于東陵者言導岷山之水而是水之流横截乎洞庭之口以至東陵也是漢水過三澨之例也過九江至于敷淺原者言導岷陽之山而導山之人至于衡山之麓遂越洞庭之尾東取山路以至于敷淺原也是導岍岐荆山而逾于河以盡常碣之例也以是觀之則經之文意不亦既明矣乎論始余讀禹貢即有所疑於此數條復見鄭漁仲所以東為北江入于海者為衍文初無意其有理既而思之去其所謂北江者則下文之中江者無所措矣晚以蒙恩假守二年於彭蠡之上乃得究觀其山川地理之實而知經文之不能無誤也至于以九江為洞庭則惟近世晁以道之説為然晁氏則本於胡祕監之説也細以地理逺近之勢度之宜從二公為是導沇音尹水東流為濟入于河溢為滎東出於陶丘北又東至于菏又東北㑹于汶又北東入於海濟子禮反滎互扄反沇水濟水也發源為沇既東為濟地志云濟水出河東郡垣曲縣王屋山東南今絳州垣曲縣山也始發源王屋山頂崖下曰沇水既見而伏東出於今孟州濟源縣二源東源周迴七百步其深不測西源周迴六百八十五步其深一丈合流至温縣是為濟水歴虢公臺西南入于河溢滿也復出河之南溢而為滎滎即滎波之滎見豫州又東出于陶丘北陶丘地名再成曰陶在今廣濟軍西又東至于菏菏即菏澤亦見豫州謂之至者濟陰縣自有菏派濟流至其地爾汶北汶也見青州又東北至于東平府夀張縣安民亭合汶水至今青州博興縣入海唐李賢謂濟自鄭以東貫滑曹鄆濟齊青以入于海本朝樂史謂今東平濟南淄川北海界中有水流入海謂之清河酈道元謂濟水當王莽之世川瀆枯竭其後水流逕通津渠勢改尋梁脈水不與昔同然則滎澤濟河雖枯而濟水未嘗絶流也程氏曰滎水之為濟本無他義濟之入河適㑹河滿溢出南岸溢出者非濟水因濟而溢故禹還以元名命之按程氏言溢之一字固為有理然出於河南者既非濟水則禹不應以河枝流而冒稱為濟蓋溢者指滎而言非指河也且河濁而滎清則滎之水非河之溢明矣況經所書單立導沇條例若斷若續而實有源流或見或伏而脈絡可考先儒皆以濟水性下勁疾故能入河穴地流注顯伏南豐曾氏齊州二堂記云泰山之北與徐之東南諸谷之水西北㑹于黑水之灣又西北滙于柏崖之灣而至于渴馬之崖蓋水之來也衆其北折而西也悍音捍疾尤甚及至于崖下則泊然而止而自崖以北至于歴城之西蓋五十里而有泉涌出高或致數尺其旁之人名之曰趵音剝突之泉齊人皆謂嘗有棄糠于黑水之灣者而見之於此蓋泉自渴馬之崖潛流地中而至此復出也其注而北則謂之濼音洛水達于清河以入於海舟之通於濟者皆於是乎達也齊多甘泉其顯名者十數而色味皆同以余驗之蓋皆濼水之旁出者也然則水之伏流地中固多有之奚獨於滎澤疑哉吳興沈氏亦言古説濟水伏流地中今歴下凡發地皆是流水世謂濟水經過其下東阿亦濟所經取其井水煑膠謂之阿膠用攪濁水則清人服之下隔疏痰蓋其水性趨下清而重故也濟水伏流絶河乃其物性之常事理之著者程氏非之顧弗深考耳新安陳氏曰方氏回嘗親過枯黄河見濟水出河北温縣者今經枯黄河以入汶而後趨海而謂清濟貫濁河遂成虚論以此觀之則濟水性下固能伏流而出為滎然其性勁實能勁絶大河中而出為滎也程泰之謂溢為滎非濟溢辨之者以河濁滎清證其非當矣今大河改而南流而古大河遂為枯礫濟之貫河其迹顯然泰之之非不辨而明矣導淮自桐柏東㑹于泗沂東入于海水經云淮水出南陽平氏縣胎簪山禹只自桐柏導之耳桐柏見導山泗沂見徐州沂入于泗泗入于淮此言會者以二水相敵故也入海在今淮浦導渭自鳥鼠同穴東會于灃又東會于涇又東過漆沮入于河同穴山名地志云鳥鼠山者同穴之枝山也餘並見雍州孔氏曰鳥鼠共為雌雄同穴而處其説怪誕不經不足信也酈道元云渭水出南谷山在鳥鼠山西北禹只自鳥鼠同穴導之耳新安陳氏曰灃涇漆沮皆入渭渭入河東會于灃即灃水攸同也東會于涇即涇屬渭汭也東過漆沮即漆沮既從也灃水大與渭並故曰會既得灃涇渭愈大漆沮皆小故曰過前分言於雍而自源沮流言於此也導洛自熊耳東北㑹于澗瀍又東會于伊又東北入于河熊耳盧氏縣名之熊耳也餘並見豫州洛水出冢嶺山禹只自熊耳導之耳按經言嶓冢導漾岷山導江者漾之源出於嶓江之源出於岷故先言山而後言水也言導河積石導淮自桐柏導渭自鳥鼠同穴導洛自熊耳皆非出于其山特自其山以導之耳故先言水而後言山也河不言自者河源多伏流積石其見處故言積石而不言自也沇水不言山者沇水伏流其出非一故不誌其源也弱水黑水不言山者九州之外蓋略之也小水合大水謂之入大水合小水謂之過二水勢均相入謂之會天下之水莫大於河故于河不言會此禹貢立言之法也王氏炎曰凡導川皆決而委之於海然百川東注而弱水獨西黑水獨南其入于東海則天下之水在北莫大于河在南莫大於江漢故先言導河而漢次之江又次之淮濟亦四瀆也故先言濟而淮次之皆自北而南也四瀆之西有渭東有洛亦大川也故以是終焉九州攸同四隩音郁既宅九山刊旅九川滌源九澤既陂四海會同隩隈也李氏曰崖内近水為隩陂障也會同與灉沮會同同義四海之隩水涯之地已可奠居九州之山槎音茶木通道已可祭告九州之川濬滌泉源而無壅遏九州之澤已有陂障而無決潰音會四海之水無不會同而各有所歸此蓋總結上文言九州四海水上無不平治也吕氏曰水平而復疏滌其源為經久計也林氏曰九州辨之悉矣至此又言其所以同有以辨之則異制異俗異和異宜各得其所而不相亂有以同之則同文同軌同倫各要其歸而不見其異序言别此言同先别而後同也水上官氏曰天下山水見於禹貢者四十有五而九為大九山為高大者既導則小者無不順矣高者既治則卑者無不平矣此九山九川所以敘于九州之後也六府孔修庶土交正底慎財賦咸則三壤成賦中邦孔大也水火金木土穀皆大修治也土者財之自生謂之庶土則非特穀土也庶土有等當以肥瘠高下名物交相正焉以任土事底致也因庶土所出之財而致謹其財賦之入如周大司徒以土宜之法辨十有二土之名物以任土事之類咸皆也則品節之也九州穀土又皆品節之以上中下三等如周大司徒辨十有二壤之名物以致稼穡之類中邦中國也蓋土賦或及於四夷而田賦則止於中國而已故曰成賦中國復齋董氏曰九疇先五行五行一曰水水治則六府皆理吕氏曰底慎其心也則壤其迹也本末皆傋言林氏曰凖則上中下之土壤即前九等之田三等其略九等言其詳也陳氏大猷曰上各州惟舉一隅至此總結之以見九州之所同如宅土既宅惟見于兗雍故以此四隩既宅總之旅山惟見於梁雍故此以九山刊旅總之各州所載川澤雖多然九州川澤不止是也故以九川九澤之滌陂總之上雖各載達河之道而四方之趨帝都者不止是也故以四海㑹同總之六府孔修則非特水土之治而已庶土交正則山林川澤丘陵墳衍原隰之土他無不正非特墳壤壚之復其性而已也正庶土而慎財賦所以總結九州所貢篚之物也則三壤以成中邦之賦所以總結九州九等之田與賦也錫土姓錫土姓者言錫之土以立國錫之姓以立宗左傳所謂天子建徳因生以賜姓胙音助之土而命之氏者也林氏曰水土平可以封建諸侯也如契封于商賜姓子稷封于邰賜姓姬有土有社昔固有矣至是徧錫之祗台音怡徳先不距朕行去聲台我距違也禹平水土定土賦建諸侯治已定功已成矣當此之時惟敬徳以先天下則天下自不能違越我之所行也王氏炎曰曰台曰朕皆禹自言指台朕為堯舜非經意也馬氏曰水土已平天子于是封建分理又敬己徳以先之而莫敢違皆禹功所致也即廸朕徳時乃功惟敘之意五百里甸服百里賦納總二百里納銍音只三百里納秸音戛服四百里粟五百里米甸服畿内之地也甸田服事也以皆田賦之事故謂之甸服五百里者王城之外四面皆五百里也禾本全曰總刈音乂禾曰銍半稾也半稾去上聲皮曰秸謂之服者三百里内去王城為近非惟納總銍秸而又使之服輸將之事也獨於秸言之者總前二者而言也粟穀也内百里為最近故并禾本總賦之外百里次之只刈禾半稾納也外百里又次之去稾麄皮納也外百里為逺去其穗音遂而納穀外百里為尤逺去其穀而納米蓋量其地之逺近而為納賦之輕重精麄也此分甸服五百里而為五等者也朱子曰里者乃道途逺近之數非方井之里也甸治田也畿内天子之田其民主為天子治田事故謂之甸服近麄而逺精近者易致逺者難致故也畿内專言田賦者畿内封諸侯侯故田賦入天子然五服各不同亦舉凡例互相見張氏曰此乃下因水土既平而言弼成五服之事服服其事也内而甸侯綏外而要荒莫不各服其事於天子故皆謂之服曰總供飼國馬孔氏曰甸服為天子服治田禾藁唐孔氏曰銍鎌也用以刈故以銍表禾穗秸言服舉中以明上下侯服以外貢不入穀甸主治田故服名甸蘇氏曰獨言甸服之賦者内詳王賦之法而諸侯可推也禹陳氏大猷曰禹之甸法達于天下詩奕奕梁山維甸之傳少康有田一成皆甸法也王畿獨以甸名服者農事國之本也京師聲名文物之所萃四方百貨之所聚其民易以棄本逐末制名甸服示天下以務本重穀也輸新安陳氏曰或謂服如國服之服他有服役不但將或又謂秸只納稾以此二百里在逺近之中故使只納稾而服輸將之役也碧梧馬氏曰秸服之服先儒多以服字就秸字上解秸稾也若去禾中之粟米而納空稾惟使之服輸將之事是其賦輕于四百里五百里矣若存禾中之粟米而又納稾又服輸將之事是其賦重於百里二百里矣惟蔡傳摘出服字以為總前二者言之為通蓋孔氏亦以此明上下服並皆有所納之役矣苐孔氏説以服字貫總銍粟米言之文勢為礙爾五百里侯服百里采二百里男邦三百里諸侯侯服者侯國之服甸服外四面又各五百里也采者卿大夫邑地男邦男爵小國也諸侯諸侯之爵大國次國也先小國而後大國者大可以禦外侮小得以安内附也此分侯服五百里而為三等也朱子曰第二之百里為男爵之國拘三百里謂自三至五謂百里者三隨文生例不可此侯服惟言邑國者畿外主于封侯亦互相見其吕氏曰采邑如今之職田言男則子在間言侯則公伯在其間五百里綏音須服三百里揆文教二百里奮武衛綏安也謂之綏者漸逺王畿而取撫安之義侯服外四面又各五百里也揆度也綏服内取王城千里外取荒服千里介於内外之間故以内三百里揆文教外二百里奮武衛文以治内武以治外聖人所以嚴華夏之辨者如此此分綏服五百里而為二等也陳氏大猷曰綏服内安中國外安邊疆也内三百里非全無武衛以文教為主外二百里非全無文教以武衛為主文教以善其生武衛以䕶其生民斯安矣又曰武以衛言保䕶而已治世武事易弛故奮以修之聖人不黷武亦不廢武也與後世恃小康而銷兵者異矣林氏曰漢魏使外夷入居中國障塞之地至西晉有劉石之禍石晉以盧龍賂契丹至重貴有耶律之難綏服華夷之辨萬世不易之法也五百里要平聲服三百里夷二百里蔡音煞要服去王畿已逺皆夷狄之地其文法略於中國謂之要者取要約之義特羈縻音飢眉之而已綏服外四面又各五百里也蔡放也左傳云蔡蔡叔是也流放罪人於此也此分要服五百里而為二等也五百里荒服三百里蠻二百里流荒服去王畿益逺而經略之者視要服為尤略也以其荒野故謂之荒服要服外四面又各五百里也流流放罪人之地蔡與流皆所以處罪人而罪有輕重故地有逺近之别也此分荒服五百里而為二等也今按每服五百里五服則二千五百里南北東西相距五千里故益稷篇言弼成五服至于五千然堯都冀州冀之北境并雲中􅃰易亦恐無二千五百里藉使有之亦皆沙漠不毛之地而東南財賦所出則反棄于要荒以地勢考之殊未可曉但意古今土地盛衰不同當舜之時冀北之地未必荒落如後世耳亦猶閩浙之間舊為蠻夷淵藪而今富庶繁衍遂為上國土地興廢不可以一時槩也周制九畿曰侯甸男采衛蠻夷鎮藩每畿亦五百里而王畿又不在其中併之則一方五千里四方相距為萬里蓋倍禹服之數也漢地志亦言東西九千里南北一萬五千里先儒皆疑禹服之狹而周漢地廣或以周服里數皆以方言或以古今尺有長短或以禹直方計而後世以人迹屈曲取之要之皆非的論蓋禹聲教所及則地盡四海而其疆理則止以五服為制至荒服之外又别為區畫如所謂咸建五長是已若周漢則盡其地之所至而疆畫之也王氏曰夷易也無中國禮法易而已蠻慢也甚於夷矣林氏曰記言東夷西戎南蠻北狄相對而言則有四名舉一二言則皆可通如四夷來王蠻夷率服是也此處不必拘東夷南蠻之名夷易蠻慢之訓其或然歟馬氏曰甸侯綏為中國要荒已為夷狄聖人之治詳内略外觀五服名義可見治中國則法度宜詳治以必治也治夷蠻則法度宜略治以不治也觀至于五千見徳化之逺及觀要荒二服見法度之不泛及聖人不務廣地而勤逺畧可見矣曾氏曰周之九服述者終不能大異于作者周之王畿即禹之甸服侯服甸服即禹之侯服男服采服即禹之綏服衛服介於其中即綏服之奮武衛蠻服夷服即禹之要服鎮服藩服即禹之荒服也王制西不盡流沙南不盡衡山東不盡東海北不盡恒山應氏曰東海在中國封疆内西南北海則逺在夷徼之外南獨以江與衡山為限蓋百粤未盡開也惟河舉東西南北河流縈帶東國也自秦而上西北袤而東南蹙自秦而下東南展而西北縮此古今天地之大運也當先王時四方各有不盡之地聽四夷居之不勞中國以事外也東漸音尖于海西被于流沙朔南暨聲教訖于四海禹錫𤣥圭告厥成功漸漬被覆暨及也地有逺近故言有淺深也聲謂風聲教謂教化林氏曰振舉於此而逺者聞焉故謂之聲軌範於此而逺者效焉故謂之教上言五服之制此言聲教所及蓋法制有限而教化無窮也錫與師錫之錫同水土既平禹以𤣥圭為䞇而告成功於舜也水色黑故圭以𤣥云林氏曰此又推聖化所極至而言之漸如水之漸漬被如衣之被覆朔南不言所至以下文四海言之也四陳氏大猷曰聖人政事所治詳内略外不求盡于海而道徳所化則無内外之限而必極于四海自禹敷土而下槩舉治水規模言之自冀州而下以帝都為主自東而西區别九州之疆域言之自導岍而下則自西而東貫串九州之山水言之自九州攸同而下則總合九州成績言之自五百里甸服而下則弼成五服自内及外言之自東漸而下則逺舉四極言之以至于告成功而終焉經緯錯綜法度森嚴非聖經不及此新安陳氏曰禹貢一書雖紀平水土制貢賦之事而有躬行教化之精微寓焉曰祗台徳先不距朕行躬行心得以為教化之本者也曰文教曰聲教教化之流行而躬行之效驗也後之山經地志與夫財用之書有是哉董氏鼎曰禹貢紀禹治水之規模次第與水平後任土作貢之法及弼成五服之事自黄帝畫野分州九州封域已定矣禹治水復取高山大川以别識之使各州之官率民以趨事也其始于冀州非從以帝都為先蓋水患皆因下流壅塞而然禹先用功於下流以疏其壅塞之勢然後用功於上流以濬其發源之地下流有所歸則上流有所殺矣天下大勢西北高而東南下九水惟河為大水患惟河為急河始入于雍而經于冀則冀當河之下流而兗又其下流之入海處所以禹之功役自冀而兗則疏濟之下流也自青而徐則疏淮之下流也自揚而荆則疏江漢之下流也河濟淮江漢五水之下流既通水患之平已十七八矣然上流不濬則猶有壅塞之患於是自荆而豫以濬伊洛之源自豫而梁以濬江漢之源自梁而雍以濬河渭之源從北而東從東而南從南而西從西而又北始於河治水之能事畢矣一書之中觀其規模次第若是乎法度之維持求其綱領樞機實闗乎徳化之感化故曰祗台徳先不距朕行讀此篇者毋求作貢之法當求其祗徳之心甘誓甘地名有扈氏國之南郊也在扶風鄠音户縣誓與禹征苗之誓同義言其討叛伐罪之意嚴其坐作進退之節所以一衆志而起其怠也誓師于甘故以甘誓名篇書有六體誓其一也今文古文皆有按有扈夏同姓之國史記曰啓立有扈不服遂滅之唐孔氏因謂堯舜受禪音善啓獨繼父以是不服亦臆度達各反之耳左傳昭公元年趙孟曰虞有三苗夏有觀扈商有姺西典反邳周有徐奄音掩則有扈亦三苗徐奄之類也新安陳氏曰禹征苗亦有誓專書一篇則自此始可觀世變矣大戰于甘乃召六卿六卿六鄉之卿也按周禮鄉大夫每鄉卿一人六鄉六卿平居無事則各掌其鄉之政教禁令去聲而屬於大司徒有事出征則各率其鄉之一萬二千五百人而屬於大司馬所謂軍將去聲皆卿者是也意夏制亦如此古者四方有變專責之方伯方伯不能討然後天子親征之天子之兵有征無戰今啓既親率六軍以出而又書大戰于甘則有扈之怙音户强稔音荏惡敢與天子抗衡豈特孟子所謂六師移之者書曰大戰蓋所以深著有扈不臣之罪而為天下後世諸侯之戒也李氏曰六卿非自冢宰至司空之六卿也周禮鄉大夫每鄉卿一人蓋王之六鄉别有此六卿也若以為六卿分職之六卿無縁冢宰亦屬於司馬知其非也新安陳氏曰此書固見有扈之不臣亦可見啓之尚能為君也王曰嗟六事之人予誓告汝重其事故嗟歎而告之六事者非但六卿有事于六軍者皆是也李氏曰虞書言咨其後變為嗟𦙍征嗟予有衆湯誥嗟爾萬方有衆皆是有扈氏威侮五行怠棄三正天用𠞰子小反絶其命今予惟恭行天之罰威暴殄之也侮輕忽之也鯀汨五行而殛死況於威侮之者乎三正子丑寅之正也夏正建寅怠棄者不用正朔也有扈氏暴殄天物輕忽不敬廢棄正朔虐下背音倍上獲罪於天天用𠞰絶其命今我伐之惟敬行天之罰而已今按此章則三正迭建其來久矣舜協時月正日亦所以一正朔也子丑之建唐虞之前當已有之孔氏曰自此至篇終皆誓辭藏陳氏大猷曰凡背五常之道拂生長斂之宜皆威侮五行也朔馬氏曰建子丑寅三正也曰林氏曰商方有改正事夏以前未有也夏氏董仲舒謂舜紹堯順天道改正朔易服色此非夏以前事乎以新安陳氏曰商以前若果無子丑二正則是自古來皆建寅孔子何獨言行夏之時乎蔡氏以暴殄天物為威侮五行是偏以質具于地之五行言之陳氏兼以氣行於天之五行與五行之理言左不攻于左汝不恭命右不攻于右汝不恭命御非其馬之正汝不恭命左車左右車右也攻治也古者車戰之法甲士三人一居左以主射一居右以主擊刺士賜反御者居中以主馬之馳驅也左傳宣公十二年楚許伯御樂伯攝叔為右以致晉師樂伯曰吾聞致師者左射以菆側鳩反矢之善者是車左主射也攝伯曰吾聞致師者右入壘折馘古獲反執俘音孚而還音旋是車右主擊刺也御非其馬之正猶王良所謂詭遇也蓋左右不治其事與御非其馬之正皆足以致敗故各指其人以責其事而欲各盡其職而不敢忽也用命賞于祖不用命戮于社予則孥戮音奴六汝戮殺也禮曰天子巡狩以遷廟主行左傳軍行祓音弗社釁鼓然則天子親征必載其遷廟之主與其社主以行以示賞戮之不敢專也祖左陽也故賞于祖社右陰也故戮于社孥子也孥戮與上戮字同義言若不用命不但戮及汝身將併汝妻子而戮之戰危事也不重其法則無以整肅其衆而使赴功也或曰戮辱也孥戮猶秋官司厲孥男子以為罪𨽻之孥古人以辱為戮謂戮辱之以為孥耳古者罰弗及嗣孥戮之刑非三代之所宜有也按此説固為有理然以上句考之不應平聲一戮而二義蓋罰弗及嗣者常刑也予則孥戮者非常刑也常刑則愛克厥威非常刑則威克厥愛盤庚遷都尚有劓殄滅之無遺育之語則啓之誓師豈為過哉新安陳氏曰恭行天之罰一言與汝不恭命之三言然後知恭之一字為此篇之綱領有扈之威侮怠棄不恭故也啓之行天罰以恭為本我恭天之命左右御當恭我之命用命而賞賞其恭命者也不用命而戮戮其不恭命者也賞與戮不敢自専必行之於祖與社皆致其恭也恭敬者百聖相傳之心法啓之恭敬之心即禹祗承之心也啓賢能敬承繼禹之道於此亦可見云車吳氏泳曰甘誓一篇僅八十字而其間六軍之制乗之法邦國賞刑之典誓師之辭靡不明備蓋古人之學精粗本末不廢啓雖承禹傳道之後而干戈行陣之事亦曽從家學素講明來一傳至仲康而𦙍征所言亦可以考當時人物軍旅官名制度乃知明明我祖萬邦之君有典有則貽厥子孫真至言哉抗董氏鼎曰以啓之賢繼禹之道而有扈小臣敢于天子勇于拒王師史官作書曰大戰于甘所以深著有扈之罪也於此而不聲罪致討則亂臣賊子何所懼哉以此知天下之患雖小不可忽也前人之功雖大不可恃也在我而已矣世固有蒙祖父之烈虐用其民而顧自信人之不叛己者吁奚可哉彼有功於天地生民者莫若禹能敬承繼禹之道者莫若啓猶有有扈氏之亂況不如禹啓父子者乎吁萬世可以監矣抑愚又有感焉天下雖安忘戰必危禹自征苗以來未嘗用師軍旅之事宜啓所未聞也而一旦赫然以征有扈召六卿而誓與㑹羣后而誓者同科威侮五行怠棄三正與侮慢自賢反道敗徳者同意恭行天罰用命不用命與奉將天罰爾尚一乃心力者同辭蓋宛然神考家法也然則禹固不以天下為無事而不訓以兵啓亦不以天下為無事而不習於兵講之以豫河之以節斯其為王者之師歟五子之歌五子太康之弟也歌與帝舜作歌之歌同義今文無古文有張氏曰美哉禹功明徳逺矣再傳至太康一盤遊田便至失國以禹之徳之功不能蓋也為人君可少肆乎太康尸位以逸豫滅厥徳黎民咸貳乃盤遊無度畋音田于有洛之表十旬弗反太康啓之子尸如祭祀之尸謂居其位而不為其事如古人所謂尸祿尸官者也豫樂也夏諺曰吾王不遊吾何以休吾王不豫吾何以助一遊一豫為諸侯度夏之先王非不遊豫蓋有其節皆所以為去聲民非若太康以逸豫而滅其徳也民咸貳心而太康猶不知悔乃安于遊畋之無度言其逺則至于洛水之南言其久則十旬而弗反是則太康自棄其國矣新安陳氏曰此史序五子作歌之由能敬必有徳逸豫則怠勝敬所以至滅其徳有窮后羿音毅因民弗忍距于河窮國名羿窮國君之名也或曰羿善射者之名賈逵説文羿帝嚳射官故其後善射者皆謂之羿有窮之君亦善射故以羿目之也羿因民不堪命距太康于河北使不得返遂廢之吕氏曰姦雄何代無之我之勢固彼無因而入茍有問隙彼必投之羿之變所以因民弗忍也因者明禍亂之本在此不在彼也秦不築長城起阿房勝廣何所因隋不伐遼東遊江都李宻王世充何所因遊陳氏經曰禹功在萬世覩河洛者思之再傳一為田而民遂貳何也民之於禹如賴慈母一遇太康如嬰兒失母無依所以貳也然羿能奪之一時不能禁民思禹於他日少康以一成一旅卒祀夏配天非民之不忘禹而何厥弟五人御其母以從徯音喜于洛之汭五子咸怨述大禹之戒以作歌御侍也怨如孟子所謂小弁音盤之怨親親也小弁之詩父子之怨五子之歌兄弟之怨親之過大而不怨是愈疏也五子知宗廟社稷危亡之不可救母子兄弟離散之不可保憂愁鬱悒慷慨感厲情不自已發為詩歌推其亡國敗家之由皆原于荒棄皇祖之訓雖其五章之間非盡述皇祖之戒然其先後終始互相發明史臣以其作歌之意序於五章之首後世序詩者毎篇皆有小序以言其作詩之義其原蓋出諸此吕氏曰五子之歌當以詩體觀不當以書體觀五子之歌一章切于一章一章述禹敬民之訓二章自咎取亡之道三章痛惜冀都之業四章反覆家緒之本末五章盡取憂愧歸之於己其情極矣欲觀詩者當先觀書觀舜臯之歌則見詩之雅頌觀五子之歌則見詩之變風變雅陳氏大猷曰五章俯仰節奏怨而不怒真温柔敦厚可以怨者也其一曰皇祖有訓民可近不可下民惟邦本本固邦寧此禹之訓也皇大也君之與民以勢而言則尊卑之分如霄壤之不侔以情而言則相須以安猶身體之相資以生也故勢疎則離情親則合以其親故謂之近以其疎故謂之下言其可親而不可疎之也且民者國之本本固而後國安本既不固則雖强如秦富如隋終亦滅亡而已矣其一其二或長幼之序或作歌之序不可知也新安陳氏曰五子節奏有序若出於一意者五子相與共為此歌未必一歌必出一子而循少長之序為之也否則出於夏史潤色次第歟陳氏雅言曰君民以勢而言則若下而不相近以理而言則可近而不可下也蓋民之所以可近而不可下者以民為國之本民安則國亦安人君於此其可下而不近之哉舜告禹曰可畏非民又曰后非衆罔與守邦大禹垂訓之言其得於授受之言也歟予視天下愚夫愚婦一能勝予一人三失怨豈在明不見音現是圖予臨兆民凛乎若朽索之馭音御六馬為人上者柰何不敬予五子自稱也君失人心則為獨夫獨夫則愚夫愚婦一能勝我矣三失者言所失衆也民心怨背豈待其彰者而後知之當於事幾未形之時而圗之也朽腐也朽索易絶六馬易驚朽索固非可以馭馬也以喻其危懼可畏之甚為人上者奈何而不敬乎前既引禹之訓言此則以己之不足恃民之可畏者申結其義也陳氏大猷曰失至於三不望其復改矣頻復之凶也民怨之蓄必深矣林氏曰朽索馭六馬猶晉人作危語古車一乗四馬兩服兩驂天子車六馬服驂之旁加兩騑也馬在車中為服在車外為驂在驂外為騑敬陳氏經曰此章言國以民為本君之固結民心以為本以見太康失邦由失民心失民心由於逸豫不敬也其二曰訓有之内作色荒外作禽荒甘酒嗜音峻宇雕牆有一於此未或不亡此一禹之訓也色荒惑嬖寵也禽荒躭遊畋也荒者迷亂之謂甘嗜皆無厭平聲也峻高大也宇棟宇也雕繪飾也言六者有其一皆足以致滅亡也禹之訓昭明如此而太康獨不念之乎此章首尾意義已明故不復申結之也林氏曰此但言訓承上章皇祖有訓也王氏十朋曰三風十愆君有一於身國必亡與此同意古西山真氏曰大禹之訓凡六言二十有四字爾而今亂亡之釁靡不由之廩乎其不可犯也古詩之體實原乎此意者大禹為之使子孫誦而傳之乎為人主者以此大訓揭之座隅銘之楹席若古聖人儼臨乎前則保國之金湯全生之藥石也董氏鼎曰聖人言善惡成敗猶醫師之辨藥性法司之明律令某物食之殺人某事犯之致死不吾欺矣輕身者不顧而身試之卒至禍敗其太康之謂歟禹之訓色荒禽荒甘酒嗜音峻宇雕牆有一于此未或不亡太康一犯禽荒之戒竟以失邦如食殺人之毒而犯致死之刑何其嚴而不可違如此哉禹訓之嚴太康雖不悟然後之為君者有所警焉所以四百年而後有桀千有餘年而後有紂不然如太康者豈若是疎乎其三曰惟彼陶唐有此冀方今失厥道亂其紀綱乃底滅亡堯初為唐侯後為天子都陶故曰陶唐堯授舜舜授禹皆都冀州言冀方者舉中以包外也大者為綱小者為紀底致也堯舜禹相授一道以有天下今太康失其道而紊亂其紀綱以致滅亡也又按左氏所引惟彼陶唐之下有帥音率彼天常一語厥道作其行乃底滅亡作乃滅而亡陳氏大猷曰道者君天下之本紀綱者維持天下之制其四曰明明我祖萬邦之君有典有則貽厥子孫闗石和鈞王府則有荒墜厥緒覆宗絶祀明明明而又明也我祖禹也典猶周之六典則猶周之八則所以治天下之典章法度也貽遺關通和平也百二十斤為石三十斤為鈞鈞與石五權之最重者也關通以見彼此通同無折閲之意和平以見人情兩平無乖爭之意言禹以明明之徳君臨天下典則法度所以貽後世者如此至於鈞石之設所以一天下之輕重而立民信者王府亦有之其為去聲子孫後世慮可謂詳且逺矣奈何太康荒墜其緒覆其宗而絶其祀乎又按法度之制始於權權與物鈞而生衡衡運生規規圓生矩矩方生繩繩直生準是權衡者又法度之所自出也故以鈞石言之毅齋沈氏曰經常無詭是之謂典中正有凖是之謂則友節初齊氏曰以理言則以君臣父子兄弟夫婦朋為五典是也就事言則以堯舜所行為二典是也動則隨時取中靜則守正不移而皆自然有以為之準此所謂事理當然之極也言其物之當然者則曰物則言其理之自然者則曰天則新安陳氏曰關通和平互文耳法之與器本末備具為子孫慮逺矣詳矣其五曰嗚呼曷歸予懷之悲萬姓仇予予將疇依鬱陶乎予心顔厚有忸女六反怩音泥弗慎厥徳雖悔可追曷何也嗚呼曷歸歎息無地之可歸也予將疇依彷徨無人之可依也為君至此亦可哀矣仇予之予指太康也指太康而謂之予者不忍斥言忠厚之至也鬱陶哀思也顔厚愧之見於色也忸怩愧之發於心也可追言不可追也林氏曰曷歸者太康也五子則曰子之悲民仇者太康也五子則曰仇予仁人之于兄弟榮辱一體有邦則同其安榮失邦則同其危辱親愛之至情也施氏曰五子之怨不深尤太康乃若其身親為不善以致之者非其仁愛之意充于中而發見於外安能若是孔子於書取此歌於詩取小弁其意一也姓陳氏大猷曰五子不咎羿而曰萬姓仇予不咎萬而曰弗慎厥徳不咎太康而惟自怨艾所謂怨而不怒也太康失國因于不敬慎爾故五子之歌始之曰奈何不敬終之曰弗慎厥徳以是始終焉乃一篇之綱領也故曰敬勝怠者吉怠勝敬者滅𦙍征𦙍國名孟子曰征者上伐下也此以征名實即誓也仲康丁有夏中衰之運羿執國政社稷安危在其掌握而仲康能命𦙍侯以掌六師𦙍侯能承仲康以討有罪是雖未能行羿不道之誅明羲和黨惡之罪然當國命中絶之際而能舉師伐罪猶為禮樂征伐之自天子出也夫子所以録其書者以是歟今文無古文有或曰蘇氏以為羲和貳於羿忠於夏者故羿假仲康之命命𦙍侯征之今按篇首言仲康肇位四海𦙍侯命掌六師又曰𦙍侯承王命徂征詳其文意蓋史臣善仲康能命將去聲遣師𦙍侯能承命致討未見貶仲康不能制命而罪𦙍侯之為専征也若果為簒羿之書則亂臣賊子所為孔子亦取之為後世法乎惟仲康肇位四海𦙍侯命掌六師羲和廢厥職酒荒于厥邑𦙍后承王命徂征仲康太康之弟𦙍侯𦙍國之侯命掌六師命為大司馬也仲康始即位即命𦙍侯以掌六師次年方有征羲和之命必本始而言者蓋史臣善仲康肇位之時已能收其兵權故羲和之征猶能自天子出也林氏曰羿廢太康而立仲康然其簒也乃在相去聲下同之世仲康不為羿所簒至其子相然後見簒是則仲康猶有以制之也羿之立仲康也方將執其禮樂征伐之權以號令天下而仲康即位之始即能命𦙍侯掌六師以收其兵權如漢文帝入自代邸音底即皇帝位夜拜宋昌為衛將軍鎮撫南北軍之類羲和之罪雖曰沈亂于酒然黨惡於羿同惡相濟故𦙍侯承王命徂征之以翦羿羽翼故終仲康之世羿不得以逞呈上聲使仲康盡失其權則羿之篡夏豈待相而後敢耶羲氏和氏夏合為一官曰𦙍后者諸侯入為王朝音潮公卿如禹稷伯夷謂之后也問東坡疑𦙍征朱子曰袁道潔攷得是太康失河北至相方失河南然亦疑羲和是箇厯官曠職誅之可也何至誓師如此大抵古書之不可考者此類也林氏曰羲和夏為一官至周不復稱羲和而為馮相保章氏𨽻于大宗伯其任又輕於夏矣太史公曰文史星厯近乎卜祝之間主上所戲弄優倡畜之愈益輕矣息齋余氏曰傳云仲康始即位即命𦙍侯以掌六師次年方有征羲和之命其曰始即位以肇位言也其曰次年則不復著其所據後又引唐志曰日蝕在仲康即位之五年當何所折衷歟今按經世書以征羲和為仲康元年事則是即位之次年也古者逾年改元告于衆曰嗟予有衆聖有謨訓明徵定保先王克謹天戒臣人克有常憲百官修輔厥后惟明明徵驗保安也聖人謨訓明有徵驗可以定安邦國也下文即謨訓之語天戒日食之類謹者恐懼修省悉并反以消變異也常憲者奉法修職以供乃事也君能謹天戒於上臣能有常憲於下百官之衆各修其職以輔其君故君内無失徳外無失政此其所以為明明后也又按日食者君弱臣彊之象后羿專政之戒也羲和掌日月之官黨羿而不言是可赦乎王氏曰使羲和守常憲以修輔則仲康得慎天戒而修省矣今畔官離次不知有日蝕之變則是不有常憲昧先聖之謨訓安能免於誅乎每嵗孟春遒慈秋反人以木鐸徇于路官師相規工執藝事以諫其或不恭邦有常刑遒人宣令去聲之官木鐸金口木舌施政教時振以警衆也周禮少宰之職正嵗帥音率治官之屬徇以木鐸曰不用法者國有常刑亦此意也官以職言師以道言規正也相規云者胥教誨也工百工也百工技藝之事至理存焉理無往而不在故言無微而可略也孟子曰責難于君謂之恭官師百工不能規諫是謂不恭不恭之罪猶有常刑而況於畔官離次俶擾天紀者乎張氏曰相規規君也左傳大夫規誨詩沔水規宣王蔡氏元度曰周景王將鑄無射伶州鳩諫曰匱財罷民魯莊丹楹刻桷匠慶諫曰無益於君而替前人之令徳執藝事諫此類是也惟時羲和顛覆厥徳沈亂于酒畔官離次俶昌六反擾天紀遐棄厥司乃季秋月朔辰弗集于房瞽音古奏鼓嗇音色夫馳庶人走羲和尸厥官罔聞知昏迷于天象以干先王之誅政典曰先時者殺無赦不及時者殺無赦次位也官以職言次以位言畔官則亂其所治之職離次則舍其所居之位俶始擾亂也天紀即洪範所謂嵗月日星辰厯數是也蓋自堯舜命羲和厯象日月星辰之後為羲和者世守其職未嘗紊亂至是始亂其天紀焉遐逺也逺棄其所司之事也辰日月㑹次之名房所次之宿也集漢書作輯集輯通用言日月㑹次不相和輯而掩蝕於房宿也按唐志日蝕在仲康即位之五年瞽樂官以其無目而審於音也奏進也古者日食則伐鼓用幣以救之春秋傳曰惟正陽之月則然餘則否今季秋而行此禮夏禮與周異也嗇夫小臣也漢有上林嗇夫庶人庶人之在官者周禮庭氏救日之弓矢嗇夫庶人蓋供救日之百役者曰馳曰走者以見日蝕之變天子恐懼于上嗇夫庶人奔走于下以助救日如此其急羲和為厯象之官尸居其位若無聞知則其昏迷天象以干先王之誅豈特不恭之刑而已哉政典先王政治之典籍也先時後時皆違制失時當誅而不赦者也今日蝕之變如此而羲和罔聞知是故干先王後時之誅矣朱子曰日月一嵗凡十二會方㑹則月光都盡而為晦已㑹則月光復蘇而為朔朔後晦前各十五日日月相對則月光正滿而為朢晦朔日月之合東西同度南北同道則月掩日而日為之蝕朢而日月之對同度同道則月抗日而月為之食是皆有常度矣王者修徳行政能使陽盛足以勝陰陰衰不能侵陽則日月之行雖或當食而月常避日故其遲速高下必有參差而不正相對者所以當食而不食也若國無政不用善則陰盛陽微當食必食雖曰有常度而實為非常之變矣問月食如何曰至明中有暗處其暗至微朢之時月與之正對無分毫相差月為暗處所射故食雖陽勝陰畢竟不好若陰有退避之意則不相敵而不成食矣法孔氏曰政典若周官六卿之治典先時謂厯象之四時節氣弦朢晦朔先天時則罪死不赦不及則厯象後天時雖治其官茍有先後之差則無赦況廢官乎今予以爾有衆奉將天罰爾衆士同力王室尚弼予欽承天子威命將行也我以爾衆士奉行天罰爾其同力王室庶幾平聲輔我以敬承天子之威命也蓋天子討而不伐諸侯伐而不討仲康之命𦙍侯得天子討罪之權𦙍侯之征羲和得諸侯敵愾音既之義其辭直其義明非若五霸摟諸侯以伐諸侯其辭曲其義迂也火炎崐岡玉石俱焚天吏逸徳烈于猛火殱音繊厥渠魁脅虚業反從罔治舊染汚音烏俗咸與惟新崐出玉山名岡山脊也逸過渠大也言火炎崐岡不辨玉石之美惡而焚之茍為天吏而有過逸之徳不擇人之善惡而戮之其害有甚於猛火不辨玉石也今我但誅首惡之魁而已脅從之黨則罔治之舊染汙習之人亦皆赦而新之其誅惡宥善是猶王者之師也今按𦙍征始稱羲和之罪止以其畔官離次俶擾天紀至是有脅從舊染之語則知羲和之罪當不止於廢時亂日是必聚不逞之人崇飲私邑以為亂黨助羿為惡者也𦙍后徂征隠其叛逆而不言者蓋正名其罪則必鋤根除源而仲康之勢有未足以制后羿者故止責其曠職之罪而實誅其不臣之心也薛氏曰殱渠魁義也赦脅從仁也所以為王者之師新安陳氏曰觀脅從之語羲和聚黨助逆明矣仲康於羿勢既未能鋤其根株不可不剪其羽翼故乗日食之變正其昏迷之亂名正言順羿亦不得庇之也使非聚黨助逆則禠職奪邑司寇行戮足矣何致勞大司馬興師誓衆如臨大敵哉嗚呼威克厥愛允濟愛克厥威允罔功其爾衆士懋戒哉威者嚴明之謂愛者姑息之謂記曰軍旅主威蓋軍法不可以不嚴嚴明勝則信其事之必濟姑息勝則信其功之無成誓師之末而復嗟歎以是深警之欲其勉力戒懼而用命也董氏鼎曰太康失邦仲康在位正天下徯望新政之日也羲和天官所主厯象而乃沈亂于酒畔官離次俶擾天紀遐棄厥司至於日食大變尚罔聞知此而不誅何以責其餘哉𦙍侯之征所不能免也曰承王命徂征征伐自天子出也曰干先王之誅法令自先王制也曰以爾有衆奉將天罰有罪乃天所討也將帥奉天子之命天子奉天與先王之命仲康莅政之始命將出師而𦙍侯之誓如此則大本正大權立而大奸懼矣其克嗣祖考也宜哉然羲和在堯時為四子既總于一人有司於朝有邑於野湎酒失職黜之可矣何至上煩王師之征無亦棄厥司荒厥邑羣飲凶酗不可教誨故不得不然耶其曰殱厥渠魁脅從罔治舊染汙俗咸與惟新則脅衆以拒命染惡以成風已非一日𫝊謂助羿為惡特隠其叛逆而不言者豈不當哉書經大全卷三
