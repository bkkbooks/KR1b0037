body:
  text: 書經大全卷十明胡廣等撰畢命康王以成周之衆命畢公保釐此其册命也今文無古文有唐孔氏曰漢律厯志云康王畢命豐刑曰惟十有二年六月庚午朏王命作册書豐刑此偽作者傳聞舊語得其年月不得以下之辭妄言作豐刑耳亦不知豐刑之言何所道也吕氏曰周公始遷商民戒長治者不忌于凶德包以大度善惡並育以安反側也至君陳則商民寖服周化故簡修進良猶未大區别也至康王則世變風移矣苟猶兼蓄並容則餘孽不除終為良民之害故命畢公分别居里不惟惡不能以染善亦將無以自容勢不得不入于善矣此周之治所以成也蓋惟此時然後可以舉此政為治之序固如此愚按康王之命畢公其要只在保釐東郊休于前政而已也問商之代夏去唐虞未逺而湯之得民不聞有誥諭之勤至周之代商自后稷公劉至于文武成王之世商民未愜周化尚勤諸書之訓而世變風移僅見于三紀之後其遺風猶未殄何邪潛室陳氏曰三代子孫惟商多賢君故其德意在人久而未忘雖王澤既斬之後猶有一線之微在也惟十有二年六月庚午朏越三日壬申王朝步自宗周至于豐以成周之衆命畢公保釐東郊康王之十二年也畢公嘗相去聲文王故康王就豐文王廟命之成周下都也保安釐理也保釐即下文旌别必列反下同淑慝之謂蓋一代之治體一篇之宗要也陳氏大猷曰釐雖有辨别分埋之意曰保則有恩意行乎其間非斬然割裂無復潤澤也以保為釐蓋有欲並生哉之意王若曰嗚呼父師惟文王武王敷大德于天下用克受殷命畢公代周公為太師也文王武王布大德于天下用能受殷之命言得之之難也惟周公左右音佐佑先王綏定厥家毖音祕殷頑民遷于洛邑密邇王室式化厥訓既歷三紀世變風移四方無虞豫一人以寧十二年曰紀父子曰世周公左右文武成王安定國家謹毖頑民遷于洛邑密近王室用化其教既歷三紀世已變而風始移今四方無可虞度達各反之事而豫一人以寧言化之之難也道有升降政由俗革不臧厥臧民罔攸勸有升有降猶言有隆有汚也周公當世道方降之時至君陳畢公之世則將升于大猷矣為政者因俗變革故周公毖殷而謹厥始君陳有容而和厥中皆由俗為政者當今之政旌別淑慝之時也苟不善其善則民無所勸慕矣新安陳氏曰臧厥臧即下文旌淑彰善之事所謂勸則使慝惡者皆克畏慕也惟公懋德克勤小物弼亮四世正色率下罔不祇師言嘉績多于先王豫小子垂拱仰成懋盛大之義豫懋乃德之懋小物猶言細行胡孟反下同也言畢公既有盛德又能勤於細行輔導四世風采凝峻表儀朝著音潮注謂朝內列位有常處若大若小罔不祇服師訓休嘉之績蓋多於先王之時矣今我小子復何為哉垂衣拱手以仰其成而已康王將付畢公以保釐之寄故敘其德業之盛而歸美之也唐孔氏曰小物猶小事也能勤小事大事必勤矣故舉此以為畢公之善晉語言文王之事云詢于八虞訪于莘尹重之以周召畢榮是畢公文王之世以為大臣也懋吕氏曰畢公天下大老康王不稱其成德而稱其德不稱其總大禮而稱其勤小物者蓋以成德自居則止矣於小物忽焉亦非造次必於是者惟勉以德者貫稚耄而不息故勤于物者一小大而無問所新安陳氏曰不矜細行終纍大德公于小物克勤以愈見其懋德之誠也人林氏曰正色率下所謂正其衣冠尊其瞻視儼然望而畏之者也史氏漸曰忠厚近迂澗老成若遲鈍先王終不以此易彼者蓋世臣舊德功業已見于時聞望已孚于人商功利課殿最雖不若新進者至於雍容廟堂天下想聞其風采足以廉頑立懦敦薄厲偷如泰山喬嶽初無運動之勞而功之及人厚矣畢公四世元老雖有不可及之盛德常有不自足之誠心小物不以不必勤而不勤嘉績不以己多于前時而或怠正色斂容而使人之非意自消出辭吐氣而使天下之羣心胥服保釐之任捨公其誰王曰嗚呼父師今豫祇命公以周公之事往哉今我敬命公以周公化訓頑民之事公其往哉言非周公所為不敢屈公以行也旌别淑慝表厥宅里彰善疸音亶惡樹之風聲弗率訓典殊厥井疆俾克畏慕申畫郊圻音其慎固封守以康四海淑善慝惡疸病也旌善别惡成周今日由俗革之政也表異善人之居里如後世旌表門閭之類顯其為善者而病其為不善者以樹立為善者風聲使顯於當時而傳於後世所謂旌淑也其不率訓典者則殊異其井里疆界使不得與善者雜處音寧禮記曰不變移之郊不變移之遂即其法也使能畏為惡之禍而慕為善之福所謂别慝也圻與畿同郊圻之制昔固規畫矣曰申云者申明之也封域之險昔固有守矣曰謹云者戒嚴之也疆域障塞入聲歲久則易音異下同湮音因世平則易玩時緝而屢省悉井反之乃所以尊嚴王畿王畿安則四海安矣王氏曰彰善者而著之則惡者恥其不若然則惡者病矣使人有所感動曰風使人有所聽聞曰聲偃夏氏曰庶望風而化聞聲而應如風動於此而物於彼聲振于此而響應于彼也而吕氏曰榮辱不止於一時而流芳遺臭將傳百世未泯所謂樹之風聲也人存政舉人亡政息惟風聲所傳則可以鼓動千百年之逺雖事往迹陳而興起如新弗率者殊其井疆豈真欲絶之而置之人類之外哉欲其畏慕而卒歸于善而已此旌别之本心也五陽一隂然後可以夬決揚庭不知時義而錯施之為惡者衆或以召亂矣因區别里閭遂並郊圻封守而整齊之公其念哉當以渾厚敦朴鎮之也句新安陳氏曰旌别淑慝一句綱也表厥至風聲三旌淑也弗率至畏慕三句别慝也東郊之政以保為釐旌别淑慝者釐也義之盡也本心欲其畏慕而同歸于善者以保為釐也仁之至也又樹立為善者之風聲見其善善之長俾為惡者畏慕見其惡惡之短有以人治人改而止之意愛之深待之厚如此卒化浮薄為忠厚宜哉風必有聲聞夷惠之風聞即聞風之聲也王夏分為二字未當吕以使惡者遺臭兼言不若専以樹善者風聲使流芳而人聞風興起表宅里樹風聲使人知善之可慕旌淑也弗率訓殊井疆使人知惡之可畏别慝也不可為疸惡所疑彰善即疸惡政貴有恆辭尚體要不惟好去聲異商俗靡靡利口惟賢餘風未殄公其念哉對暫之謂恆對常之謂異趣去聲完具而已之謂體衆體所會之謂要政事純一辭令簡實深戒作聰明趨浮末好異之事凡論治體者皆然而在商俗則尤為對病之藥也蘇氏曰張釋之諫漢文帝秦任刀筆之吏爭以亟咅棘疾苛咅何急也察相髙其弊徒文具無惻隱之實以故不聞其過陵夷至于二世天下土崩今以嗇咅色夫口辨而超遷之臣恐天下隨風靡爭口辨無其實凡釋之所論去聲則康王以告畢公者也夏氏曰體則具于理而無不足要則簡而亦不至於有餘謂辭理足而簡約也政辭如此皆不好異者能之政而好異則恱須臾而厭持久不能有恆言而好異則言浮于理言徒多而理不足安能體要唐孔氏曰韓宣子稱紂使師襄作靡靡之樂靡靡者相隨順之意所新安陳氏曰利口即辭體要之反惡利口逺佞人關大矣體陳氏雅言曰政有恆則純清而不擾故以為貴辭要則典重而不浮故以為尚若政而好異則安能有恆言而好異則安能體要畢公四世元老雖無此失而所以告戒之道當如此也我聞曰世祿之家鮮上聲克由禮以蕩陵德實悖天道敝化奢麗萬世同流古人論世祿之家逸樂音洛豢養其能由禮者鮮矣既不由禮則心無所制肆其驕蕩陵蔑有德悖亂天道敝壞風化奢侈美麗萬世同一流也康王將言殷士怙侈滅義之惡故先取古人論世族者發之家氏復禮曰觀此則洛邑所遷豈多世祿之家歟兹殷庶士席寵惟舊怙音户侈滅義服美于人驕淫矜誇將由惡終雖收放心間之惟艱吕氏曰殷士慿藉光寵助發其私欲者有自來矣私欲公義相為消長上聲故怙侈必至滅義滅義則無復羞惡之端徒以服飾之美誇之于人而身之不美則莫之恥也流而不反驕淫矜誇百邪並見咅現將以惡終矣洛邑之遷式化厥訓雖已收其放心而其所以防間其邪者猶甚難也陳氏經曰人之心莫難收於已放之時尤莫難間於既收之後苟其根尚在雖一時知所收斂將觸事而發此間之所以為難也夏氏曰周公君陳相繼化商雖收其放心然間之尚難畢公當有以間之下文訓以德義古訓又言間之之道資富能訓惟以永年惟德惟義時乃大訓不由古訓于何其訓言殷士不可不訓之也資資財也資富而能訓則心不遷於外物而可全其性命之正也然訓非外立教條也惟德惟義而已德者心之理義者理之宜也德義人所同有也惟德義以為訓是乃天下之大訓然訓非可以己私言也當稽古以為之説蓋善無證則民不從不由古以為訓于何以為訓乎陳氏經曰禮義生於富足既富以養其身又訓以養其心全正性所以順正命此所以永年也所謂能訓豈外人心天理而他有所謂訓哉德者人心之所得義者人心之所宜根於人心之所同然此之謂大訓古訓所載亦惟德義而已即人心之所同然而證諸古所已然非德義之外有古訓也畢公之化本諸同然而民易從參諸已然而民易信間之之道孰過於此君陳尚有辟以止辟三細不宥之説此篇雖歷數商俗之不美然惟務區别以生其愧教訓以導其善無片言及于刑蓋純以德化而刑措不用信矣新安陳氏曰訓以德所以化其陵德訓以義所以化其滅義旌别淑慝以商人化商人也所以興起其勸慕之微權崇德義稽古訓反身以化商人也所以反求其訓化之大本化商之道至是盡矣陳氏大猷曰不由古人德義之訓以訓之是非德之德非義之義也如老氏以清靜為德揚氏以為我為義何以為訓乎陳氏雅言曰殷民固不可以不使之富而尤不可以不使之知所訓也富而不知所訓則不與驕奢期而驕奢至不與危亡期而危亡至求欲永年其可得乎故既富之餘則必當使之知訓而訓之大者則惟在于德義而已蓋殷士之失在於以蕩陵德怙侈滅義失其同然故訓以德所以化其陵德訓以義所以化其滅義亦因其所同然者還以導之而已然而德義惟出於人心同然之理故為訓之大也而非稽諸古以為訓則吾恐德其德而非古人之所謂德義其義而非古人之所謂義禮記所謂無徴不信不信民弗從者也故不由古訓其將何以為訓乎此欲反求其為訓之本也王曰嗚呼父師邦之安危惟兹殷士不剛不柔厥德允修是時四方無虞矣蕞爾殷民化訓三紀之餘亦何足慮而康王拳拳以邦之安危惟繫于此其不苟於小成者如此文武周公之澤其深長也宜哉不剛所以保之不柔所以釐之不剛不柔其德信乎其修矣王氏炎曰忿其不從而以剛制之則必怨慮其難制而以柔遇之則必玩惟不偏於剛柔而處之以中則德允修而商人化矣以吕氏曰始皇以安危係於胸奴而急之以剛德宋安危係於藩鎮而緩之以柔皆以致亂周葉氏曰不剛不柔即寬而有制從容以和之意公君陳畢公非有意於同同合於道耳惟周公克慎厥始惟君陳克和厥中惟公克成厥終三后協心同底于道道洽政治澤潤生民四夷左衽罔不咸賴豫小子永膺多福殊厥井疆非治之成也使商民皆善然後可謂之成此曰成者預期之也三后所治者洛邑而施去聲及四夷王畿四方之本也吳氏曰道者致治之道也始之中之終之雖時有先後皆能即其行事觀其用心而有以濟之若出於一時若成於一人謂之協心如此朱子曰衽衣襟也左衽夷狄之俗四時之序不同而同於成歲功也張氏曰三后猶陳氏經曰慎始毖殷頑民也和中從容以和也今日惟防間之使前口之功不壞耳事莫難於成終少有懈弛則二公之化皆為之不終矣聖賢之政雖有始中終之異其心與道則無始中終之殊謂之洽謂之潤漸漬積纍豈一日之功遽能如此哉商民蕞爾甚微而所係甚重逺而四夷尊而人主近而畢公之身逺而畢公之子孫皆有賴於此可見周家以化商民為重必如是而後可以盡成終之責陳氏雅言曰殷民初遷周公治之造端正始不可少愆也故曰克慎周公既沒君陳繼之保養撫摩以和為貴也故曰克和既歷三紀世變風移旌别淑慝申畫郊圻此政畢公其時也有周公君陳以慎之和之於始中而無畢公以任之於其後則是猶耕而不穫前人之功皆為虗棄矣故曰克成三后之政雖有克慎克和克成之不同三后之時雖有厥始厥中厥終之或異然其心則無不協論其道則無不同猶四時之運寒暑溫涼之候有異生長收藏之化有殊而皆相資以成歲功一也三后之意皆期于化殷而已故曰協心所施雖異然因時制宜各得當于理故曰同底于道聖賢心協道同故能仁漸義摩而道化浹洽綱舉目張而政事修治漸漬積纍澤之深入於民者豈一朝一夕所能致哉康王此言期望於畢公者至矣公其惟時成周建無窮之基亦有無窮之聞去聲子孫訓其成式惟乂建立訓順式法也成周指下都而言吕氏曰畢公四世元老豈區區立後世名者而勳德之隆亦豈少此康王所以望之者蓋相期以無窮事業乃尊敬之至也嗚呼罔曰弗克惟既厥心罔曰民寡惟慎厥事欽若先王成烈以休于前政蘇氏曰曰弗克者畏其難而不敢為者也曰民寡者易咅異其事以為不足為者也前政周公君陳也陳氏大猷曰事之不立非視之太重而畏其難則視之太輕而忽其易能盡其心則雖難無不舉不謹其事則雖易不能舉深王氏炎曰觀殷民不輕於從周見殷先王德澤之觀三后化殷殷卒依於周者八百年見周家仁厚之至非張氏曰觀周公之處商民其忠厚仁恕激勸之方後人可及也在白起項羽處之則坑之矣若晉武苻堅處之則有劉元海慕容垂之亂矣周公肯為此乎嗚呼殺之既不可用之又不可於是遷之洛邑使日見周之仁政日聞周之仁聲日親周之仁人君子優遊涵養以變易其不服之心如此者三十六年矣難化者或老或死已化者方少方生於是時也得不有激勵之方以一新其耳目為永久之計乎君陳分正固有其兆矣至於畢公乃曉然旌别淑慝使善惡有所勸戒又申畫郊圻慎固封守使姦者無所覬而居者常慮危抑又思風俗之根本在於世祿之家乃訓之使皆由於德義既有善惡之分以起其心又有德義之訓以美其俗則非特中國尊榮而四夷亦皆受其賜矣皆周公經營之君陳祖述之而畢公成就之也三后協心同底于道豈虛辭哉禮董氏鼎曰或曰成湯革夏未幾繼以太甲敗度敗伊尹居之桐者三年夏之餘民帖然安靜伊尹輔商不見有區處夏人事何其易也武王克商繼以武庚之叛周公成王康王所以區處殷人今見於大詰洛誥多士多方君陳畢命諸書何其難也豈夏之民醇至商獨頑歟得非湯僅放桀武王乃殺紂成王又殺武庚商之餘民豈無忠臣義士痛心疾首者乎况又辟管叔于商骨肉至親尚猶不免何以服讐民哉所以紛紛久而不定歟愚曰不然湯武於桀紂同謂之伐桀敗而遁因放之巢紂敗而死遂謂之殺乃紂罪浮于桀非武不仁于湯也紂既死立其子以奉其祀終武之世無叛意武崩成幼管蔡流言以王室至親反率前代餘孽以叛由此一動而不復靜則管叔之罪也故曰民不靜亦惟在王宫邦君室蓋謂亂始於汝而禍延于我管叔不叛則武庚不誅以此不服而非讐于武王成王也然其所以久而未革者則以殷俗尚質其蔽也易惑而難曉盤庚遷都為民利耳浮言胥動至煩三書之訓諭猶父兄之訓子弟尚且如是况視鄰人為讐者於其言肯遽從乎雖然無殷人之頑不見周家之仁銅隂沍寒終消融於春風和氣中嗚呼仁哉吕氏曰成康並稱成王見於詩書者多康王自誥諸侯外惟畢命耳讀此亦可見其賢矣君牙君牙臣名穆王命君牙為大司徒此其誥命也今文無古文有問君牙冏命等篇見得穆王氣象甚好而後來乃有車轍馬迹馳天下之意何也朱子曰此篇乃內史之屬所作猶今之翰林作制誥然如君陳周官蔡仲之命微子之命等篇亦是當時此等文字自有格子首呼其名而告之末又為嗚呼之辭以戒之篇篇皆然觀之可見刑吕氏曰穆王書三篇君牙冏命初年書也吕末年書也中雖放逸不克保其始之祗畏然暮年哀敬初心復還舜命契為司徒止一語而君牙贊書至一篇世降而文勝也然周家之典刑文獻在焉王若曰嗚呼君牙惟乃祖乃父世篤忠貞服勞王家厥有成績紀于太常王穆王也康王孫昭王子周禮司勳云凡有功者銘書於王之太常司常云日月為常畫日月於旌旗也惟豫小子嗣守文武成康遺緒亦惟先王之臣克左右音佐佑亂四方心之憂危若蹈音道虎尾涉于春氷緒統緒也若蹈虎尾畏其噬若涉春氷畏其陷言憂危之至以見求助之切也張氏曰穆王父昭王南征不復故有蹈虎涉氷之喻然隱諱其事又迂緩其辭不足以感動人心無志可知矣其後車轍馬迹周於天下周道衰焉新安陳氏曰先王之臣或作先正孔注亦惟祖父之臣正作先正東齋云先正説見説命作先正當從孔注又按君牙稱君必有國成康時芮伯為司徒伯爵諸侯也君牙當是其後今命爾豫翼作股肱心膂纘乃舊服無忝祖考膂脊也舊服忠貞服勞之事忝辱也欲君牙以其祖考事先王者而事我也𢎞敷五典式和民則爾身克正罔敢弗正民心罔中惟爾之中𢎞敷者大而布之也式和者敬而和之也則有物有則之則君臣之義父子之仁夫婦之别長幼之序朋友之信是也典以設教言故曰𢎞敷則以民彝言故曰式和此司徒之教也然教之本則在君牙之身正也中也民則之體而人之所同然也正以身言欲其所處無邪行也中以心言欲其所存無邪思也孔子曰子率以正孰敢不正周公曰率自中此告君牙以司徒之職也張氏曰和民則在我而已惟正惟中民則和矣葉氏曰示以正在身復其中在心此立教之本然陳氏大猷曰以其常行而不可易謂之典以其截而不可越謂之則教之理雖不外乎人之性然教之本則在君牙之身與心正者容有不中中則無有不正身之正勉強修飭者能之心之中非存養純熟不能也故穆王既欲君牙正身以率民身之正尤欲其存心之中以感民心之中則民則和五典惇矣敷典和則因民心之同得者教之爾正爾中即吾心之先得者率之也於身先言爾于心先言民互文耳聞陳氏雅言曰典曰𢎞敷欲其大而布之使民無不也則曰式和欲其敬以和之使民無不化也然此特為教之道耳至于立教之本則在君牙之身與心焉爾身正爾心中則爾之典修而則治民身正民心中則民之典亦無不修民之則亦無不治矣此立教之本也夏暑雨小民惟曰怨咨冬祁寒小民亦惟曰怨咨厥惟艱哉思其艱以圖其易音異民乃寧祁大也暑雨祁寒小民怨咨自傷其生之艱難也厥惟艱哉者嘆小民之誠為艱難也思念其難以圖其易民乃安也艱者飢寒之艱易者衣食之易司徒敷五典擾兆民兼教養之職此又告君牙以養民之難也陳氏雅言曰夏而暑暑而至於雨此天時之常也然小民不得其食殆其怨咨冬而寒寒而至於祁此亦天時之常也然小民之不得其衣者殆其怨咨暑雨之時而阻之以無食祁寒之時而厄之以無衣民生之難難誠何如也為人上者其可以肥甘適口輕暖適體而或忘之故民飢寒之艱既不可不為之思而其衣食之易尤不可不為之圖能思其艱而不能圖其易則亦徒思而已耳與不知者奚以異惟能思之而又能圖之則所謂艱者易而怨咨者寧矣司徒之職實兼教養穆王告君牙以此欲其共此心也嗚呼丕顯哉文王謨丕承哉武王烈啓佑我後人咸以正罔缺爾惟敬明乃訓用奉若于先王對揚文武之光命追配于前人丕大謨謀烈功也文顯於前武承於後曰謨曰烈各指其實而言之咸以正者無一事不出於正咸罔缺者無一事不致其周密若順對答配匹也前人君牙祖父唐孔氏曰文始謀造周故美其謀武功業成就故美其業張氏曰先王指成康新安陳氏曰光命即顯謨武烈不過承文謨雖烈亦謨也所以於文武總言光命也文武之光命武康已對揚之今又能奉若成康所以對揚文武之意也如此則君牙可追配其祖父矣舜命契為司徒不過曰敬敷五教在寬今穆王命君牙其詳雖至於一篇其要不出舜之一語前曰𢎞敷五典式和民則敷五教在寬也此曰敬明乃訓敬敷五教也帝舜此言豈惟穆王不能易萬世掌教者不能易也陳氏雅言曰文王之謨大而能顯則其造有周之謀者于是至矣武王之烈大而能承則其成有周之功者亦于是至矣文顯于前武承于後曰謨曰烈所以開啓佑助我之後人者無一事而不出于正亦無一事而不致其周前王之為子孫慮至矣今爾君牙為司徒之宫所居之職前日乃祖乃父之職所訓之民昔君文武成康之民也為訓之道不可以不敬而尤不可以不明敬以待之明以告之則為教之道得矣如是豈特司徒之職能盡而已將以奉若先王之道兼得之也豈但先王之道能奉若之而已將以追配前人之美在于此也能敬明乃訓則于先王之道見其能奉承而不墜若順而不違於祖父之政能追及而不失配合而不爽是則君牙豈惟無負于君抑無負于先王無負于文武矣豈惟無愧于己抑無愧于乃祖乃父矣此在君牙所當深勉也王若曰君牙乃惟由先正舊典時式民之治亂在茲率乃祖考之攸行昭乃辟之有乂先正君牙祖父也君牙由祖父舊職而是法之民之治亂在此而已法則治否則亂也循汝祖父之所行而顯其君之有乂復申戒其守家法以終之按此篇専以君牙祖父為言曰纘舊服曰由舊典曰無忝曰追配曰由先正舊典曰率祖考攸行然則君牙之祖父嘗任司徒之職而其賢可知矣惜載籍之無傳也陳氏曰康王時芮伯為司徒君牙豈其後耶董氏鼎曰司徒職在掌教敷五典擾兆民所當為也蓋必先教之而倫理明然後治之而爭奪息苟作以教化為急先務則為之民者冥然罔覺卒犯刑辟是所謂罔民以陷罪也為民父母豈忍為之哉穆王肆其侈心所至將有車轍馬迹而猶知以大司徒為重此所以雖荒而不至于亡歟冏命穆王命伯冏為太僕正此其誥命也今文無古文有吕氏曰陪僕暬音泄御之臣後世視為賤品而不之擇者曾咅層不知人主朝夕與居氣體移養常必由之潛消默奪於冥冥之中而明爭顯諫於昭昭之際抑末矣自周公作立政而嘆綴衣虎賁知恤者鮮上聲則君德之所繫前此知之者亦罕矣周公表而出之其選始重穆王之用太僕正特作命書至與大司徒略等其知本哉陳氏大猷曰周禮止有太僕下大夫二人此言太僕正正其長也又有祭僕御僕𨽻僕戎僕齊僕道僕田僕等正皆長之上薰陶涵飬乎君德下簡擇表率乎羣僚所繫甚重故冏命焉終蘇氏曰昭王南征不復至齊桓乃以問楚是穆王之世君弒而賊不討也王終無憤恥之心乃欲車轍馬迹周於天下今觀君牙伯冏二書皆無哀痛慘怛之意但曰嗣先王宅丕后而已非祭公謀父以祈招之詩收王放心王其不沒乎張氏曰伯冏之為太僕正穆王馳驟天下而不能正救者也然三復二篇其言殷勤懇惻何也曰唐德宗何人哉陸贄作奉天詔書山東父老為之感泣則二篇之命豈非當時仁人君子憫王之無志故修辭立誠以勸勵其臣下歟不復齋董氏曰夫子何為録之曰聖人以人廢言亦取秦穆悔過之意王若曰伯冏惟豫弗克于德嗣先人宅丕后怵惕音出剔惟厲中夜以興思克厥愆伯冏臣名穆王言我不能于德繼前人居大君之位恐懼危厲中夜以興思所以免其咎過復齊董氏曰穆王命君牙曰心之憂危若蹈虎尾命伯冏曰怵惕維厲中夜以興此即位之初知以父讎為恥故言如此然終穆王之世復讎之事無聞焉二篇之書豈果出穆王之口也哉昔在文武聰明齊聖小大之臣咸懷忠良其侍御僕從去聲罔匪正人以旦夕承弼厥辟出入起居罔有不欽發號施令罔有不臧下民祗若萬邦咸休侍給侍左右者御車御之官僕從太僕羣僕凡從王者承承順之謂弼正救之謂雖文武之君聰明齊聖大小之臣咸懷忠良固無待于侍御僕從之承弼者然其左右奔走皆得正人則承順正救亦豈小補哉陳氏大猷曰聰明自其質之生知者言之齊聖自其德之充于極至者言之出入起居發號施令就太僕職掌而言蓋太僕掌正王之服位出入王之大命掌諸侯之復逆復王之答報逆下之敷奏君之起居號令皆與有職焉善吕氏曰文武動容周旋何嘗不中禮號令何嘗不今必先言近臣承弼之功而後及此蓋左右交修近臣之常職而內外交相養亦聖人不已之誠也又曰世主出入起居漫不加省徒欲謹於議令之時所謂咸其輔頰舌感人之末者也民若邦休豈口舌所能辦哉林氏曰左右近習非人則朝夕漸染入于邪僻而不自知大臣雖賢君心已蠧矣故須小大忠良必羣僕皆正人而後可陳氏雅言曰穆王命伯冏為太僕正意謂昔在文武之為君有聰明齊聖之德其小大之臣又皆懷忠良之志君聖臣賢若無待于侍御僕從之助矣而當時給侍左右與凡車御之官其太僕羣僕與凡從王之職又莫匪正直之人而能自旦至夕以承其君之善以弼其君之過則其得近臣之助者如此是以文武之德修於上舉動之間無有不敬號令之出無有不善是以文武之化行于下下民之衆無不祗若萬邦之廣無不休美以文武之聖且必得近習之助而况于穆王乎以文王武王之臣咸懷忠艮且尤謹此而况穆王之時乎穆王此言蓋有求助于伯冏之意也惟豫一人無良實賴左右前後有位之士匡其不及繩愆糾咅九謬格其非心俾克紹先烈無良言其質之不善也匡輔助也繩直糾正也非心非僻之心也先烈文武也問格其非心之格訓正恐是如格式之格以此律人之不正者否朱子曰今人如言合格只是將此一物格其不正者使歸于正如格其非心是説得深者大人格君心之非是説得淺者其陳氏大猷曰文武猶資左右况豫之無良乎匡救惡而不知格其心則止於東而生於西惟格其非心則拔本塞源末流自善今豫命汝作大正正于羣僕侍御之臣懋乃后德交修不逮大正太僕正也周禮太僕下大夫也羣僕謂祭僕𨽻僕戎僕齊則皆反僕之類穆王欲伯冏正其羣僕侍御之臣以勉進君德而交修其所不及或曰周禮下大夫不得為正漢孔氏以為太御中大夫蓋周禮太御最長下又有羣僕與此所謂正于羣僕者合且與君同車最為親近也張氏曰公卿進見有時僕御褻近無間有時者見其尊嚴無間者知其情性方其進見君臣之分甚嚴未易犯其顔色及其褻近君臣之情無間故可糾其過失救過于無間之時易為力救過於已發之後難為功懋德交修正侍御僕從之職也鄒氏季友曰周禮夏官司馬祭僕掌視祭祀𨽻僕掌王寢掃除戎僕掌馭戎車齊僕掌馭金輅以賓慎簡乃僚無以巧言令色便辟咅駢僻側媚其惟吉士巧好令善也好其言善其色外飾而無質實者也便者順人之所欲辟者避人之所惡去聲側者姦邪媚者諛恱小人也吉士君子也言當謹擇汝之僚佐無任小人而惟用君子也又按此言謹簡乃僚則成周之時凡為官長者皆得自舉其屬不特辟除府史胥徙而已吕氏曰治有體統王雖急于求助苟遍擇之則叢脞矣故命一伯冏作大正使精擇其僚固不待王親擇也此為治之體統也陸贄在唐欲使諸司長官各舉其屬亦庶幾有見於此張氏曰其惟吉士見巧令便媚為凶人也僕臣正厥后克正僕臣諛厥后自聖后德惟臣不德惟臣自聖自以為聖也僕臣之賢否係君德之輕重如此吕氏曰自古小人之敗君德為昏為虐為侈為縱曷其有極至於自聖猶若淺之為害穆王獨以是蔽之者蓋小人之蠱其君必使之虛美薰心傲然自聖則謂人莫已若而欲豫言莫之違然後法家拂士日逺而快意肆情之事亦莫或齟齬音咀語其間自聖之證既見而百疾從之昏虐侈縱皆其枝葉而不足論也爾無昵于憸人充耳目之官迪上以非先王之典汝無比近小人充我耳目之官導君上以非先王之典蓋穆王自量其執德未固恐左右以異端進而蕩其心也非人其吉惟貨其吉若時瘝咅關厥官惟爾大弗克祗厥辟惟豫汝辜咅孤戒其以貨賄任羣僕也言不于其人之善而惟以貨賄回上聲為善則是曠厥官汝大不能敬其君而我亦汝罪矣吕氏曰後世近習更相表裏鮮不以利合捨人才而論貨賄近習之通弊也自盤庚總貨寶之戒至此復見之成湯文武之隆未數數以貨防其臣也共商周之衰乎陳氏經曰穆王于此及吕刑皆言貨亦可見其風俗之漸衰矣王曰嗚呼欽哉永弼乃后于彜憲彜憲常法也吕氏曰穆王卒章之命望於伯冏者深且長矣此心不繼造父音甫為御周遊天下將必有車轍馬迹導其侈者果出於僕御之間抑不知伯冏猶在職乎否也穆王豫知所戒憂思深長猶不免躬自蹈之人心操舍之無常可懼哉王氏曰近習之臣不患其不能將順而莫之承惟患其不能救正而莫之弼故在先王則稱其承弼在己則責之以永弼而不及于承焉吕刑吕侯為天子司寇穆王命訓刑以詰四方史録為篇今文古文皆有按此篇專訓贖刑蓋本舜典金作贖刑之語今詳此書實則不然蓋舜典所謂贖者官府學校之刑爾若五刑則固未嘗贖也五刑之寬惟處上聲以流鞭撲之寬方許其贖今穆王贖法雖大辟亦與其贖免矣漢張敞以討羌兵食不繼建為入榖贖罪之法初亦未嘗及夫咅扶殺人及盜之罪而蕭望之等猶以為如此則富者得生貧者獨死恐開利路以傷治化曾謂唐虞之世而有是則法哉穆王巡逰無度財匱民勞至其末年無以為計乃為此一切權宜之術以斂去聲民財夫子録之蓋以示戒然其一篇之書哀矜惻怛猶可以想見三代忠厚之遺意云爾又按書傳去聲引此多稱甫刑史記作甫侯言於王作修刑辟吕後為甫歟朱子曰吕刑一篇如何穆王説得散慢直從苖民蚩尤為始作亂道起若説道都是古人元文如何出于孔氏者多分明易曉出於伏生者都難理會何問贖刑所以寬鞭撲之刑則吕刑之贖刑如曰吕刑蓋非先王之法也故程子有一䇿問云商之盤庚周之吕刑聖人載之于書其取之乎抑將垂戒後世乎法蔡仲默論五刑不贖之意曰是穆王方有贖嘗見蕭望之言古不贖刑某甚疑之後來公省得贖刑不是古因取望之傳看畢曰説得也無引證問鄭敷文所謂甫刑之意是否曰便是他門都不去考那贖刑如古之金作贖刑只是刑之輕者如流宥五刑之屬皆是流竄但有鞭作官刑撲作教刑便是法之輕者故贖想見那穆王胡做到那晚年無錢使後撰出那般法來聖人也是志法之變處但是他其中論不可輕於用刑之類也有許多好説話不可不知子唐孔氏曰書傳引此篇語多稱甫刑者吕侯孫後改封甫如詩之生甫及申不與我戌甫穆王時未有甫名後人以子孫國號名之追稱甫刑若叔虞封唐子孫封晉而史記作晉世家曰林氏曰吕與甫猶荆與楚殷與商王氏炎此書穆王之言而名吕刑者吕侯為周司寇言於王王命之參定刑書乃推作刑之意以訓四方司政典刑者故以吕刑名之彭氏曰篇內言德言中不一而足者豈非制刑必本于德用刑必合于中德中二字實為此篇之綱領惟吕命王享國百年耄音冒荒度達各反作刑以詰四方惟吕命與惟説命語意同先此以見音現訓刑為吕侯之言也耄老而昏亂之稱荒忽也孟子曰從獸無厭平聲謂之荒穆王享國百年車轍馬迹遍于天下故史氏以耄荒二字發之亦以見贖刑為穆王耄荒所訓耳蘇氏曰荒大也大度作刑猶禹曰豫荒度土功荒當屬音燭下句亦通然耄亦貶之之辭也孔氏曰王享國百年耄亂荒忽度時世所宜訓刑以治四方本唐孔氏曰記云八十九十曰耄是耄荒為年老周紀云穆王即位春秋已五十矣立五十五年崩無逸言其享國皆謂在位之年此乃從王生年而數文不害意不與彼同三新安陳氏曰王享國百年耄荒如舜典云朕在位十有三載耄期耳當百年耄荒之時而能裁度作刑以詰四方乃見其篤老而尚精明仁厚非真耄亂荒迷也荒度雖有益稷語可證然土功可言荒度作刑何荒度之有蔡氏只存蘇曰於下以備一説得之矣詰如詰姦慝之詰臨川吳氏曰吕矦為王司冦更定贖刑新制具載刑書因諸侯來朝王使吕矦以書之意告命諸矦也穆王嗣位時年已五十享國百年蓋在位五十年之後也詰治也揆度作為刑書以詰治四方也王曰若古有訓蚩音癡尤惟始作亂延及于平民罔不寇賊鴟義姦宄奪攘矯虔言鴻荒之世渾厚敦龎蚩尤始開暴亂之端驅扇熏炙延及平民無不為冦為賊鴟義者以鴟張跋扈為義矯虔者矯詐虔劉也史記五帝本紀神農世衰諸侯侵伐蚩尤最強暴黃帝與蚩尤戰于涿鹿之野殺之苖民弗用靈制以刑惟作五虐之刑曰法殺戮無辜爰始淫為劓刵咅二椓黥越兹麗刑并制罔差有辭苗民承蚩尤之暴不用善而制以刑惟作五虐之刑名之曰法以殺戮無罪於是始過為劓鼻刵耳椓竅黥面之法於麗法者必刑之并制無罪不復以曲直之辭為差别皆刑之也孔氏曰九黎之君號曰蚩尤為鴟梟之義三苗之君習蚩尤之惡頑凶若民之唐孔氏曰楚語云少昊氏之衰九黎亂德顓帝受使復舊常則九黎在少昊之末非蚩尤也楚語又云三苗復九黎之惡鄭氏以苗民即九黎之後顓帝誅九黎至其子孫為三國有罪者無辭無罪者有辭苗民斷獄並皆罪之無差簡有直辭者新安陳氏曰蚩尤苗民前後隔逺不必以九黎混雜言之按孔鄭氏之説皆未敢信又按吕氏謂古未有五刑自苗民制之然後聖人始不得已而用之非也舜典稱象以典刑流宥五刑下文方及誅四凶三苗居一焉蓋五刑其來久矣豈有苗民始作五刑舜乃效尤用之之理鄭殺鄧析而用其竹刑傳猶譏之孰謂舜以三苗虐威而竄其身乃效其虐威而用其法乎曰作五虐之刑曰淫為劓刵椓黥曰虐與淫可見非即古之五刑必又暴虐淫過用之或如紂之炮烙剖心孫皓之鑿人日剝人面之類耳天討有罪五刑五用帝王二千年相承莫之能改而謂始於苗民乎使果創始於苗民穆王方諄諄以苗民為戒乃遵用其法乎不然必矣臨川吳氏曰苗民三苗之君也蠻獠之處擅自雄長雖君其國非受天子命而為諸侯也其實一民而已五虐之刑比舊五刑更加酷虐也曰法非法而謂之法也殺戮大辟也劓刵皆劓辟不言剕辟者包於劓宫或曰刖字誤為刵也椓宫辟黥墨辟并制一并制之不分輕重也有辭無罪者也凡對獄有罪者無辭無罪者有辭苗民承蚩尤之暴不用善而制以刑改作五虐之刑為法大辟既施于無罪而又過為四者深刻之刑凡麗於刑不分輕重而并其制無復簡别其無罪而有辭者民興胥漸咅尖泯泯咅閔棼棼音紛罔中于信以覆詛盟虐威庶戮方告無辜于上上帝監民罔有馨香德刑發聞惟腥泯泯昏也棼棼亂也民相漸染為昏為亂無復誠信相與反覆詛盟而已虐政作威衆被戮者方各告無罪於天天視苗民無有馨香德而刑戮發聞莫非腥穢吕氏曰形於聲嗟窮之反也動於氣臭惡之熟也馨香陽也腥穢隂也故德為馨香而刑發腥穢也陳氏曰罔中于信無中心出於誠信者信不由中也無馨香之德而發聞者惟腥穢之虐刑觀二始字見蚩尤為作亂之始而苗民為淫刑之始皇帝哀矜庶戮之不辜報虐以威遏絶苗民無世在下皇帝舜也以書考之治苗民命伯夷禹稷臯陶皆舜之事報苗之虐以我之威絶滅也謂竄與分北之類遏絶之使無繼世在下國乃命重直容反下並同黎絶地天通罔有降格羣后之逮在下明明棐常鰥寡無蓋重少昊之後黎髙陽之後重即羲黎即和也吕氏曰治世公道昭明為善得福為惡得禍民曉然知其所由則不求之渺茫冥昧之間當三苖昏虐民之得罪者莫知其端無所控訴相與聽於神祭非其鬼天地人神之典雜揉瀆亂此妖誕之所以興人心之所以不正也在舜當務之急莫先於正人心首命重黎修明祀典天子然後祭天地諸侯然後祭山川髙卑上下各有分音紛限絶地天之通嚴幽明之分去聲焄音薰蒿妖誕之説舉皆屏音丙息羣后及在下之羣臣皆精白一心輔助常道民卒善而得福惡而得禍雖鰥寡之微亦無有蓋蔽而不得自伸者也按國語曰少皥氏之衰九黎亂德民神雜揉家為巫史民瀆齊盟禍災荐臻顓頊受之乃命南正重司天以屬神北正黎司地以屬民使無相侵瀆其後三苗復九黎之德堯復育重黎之後不忘舊者使復典之唐孔氏曰羲是重之子孫和是黎之子孫司天屬神司地屬民者令神與天在上民與地在下定上下之分使民神不雜則祭享有度蘇氏曰自苗民瀆於詛盟人神相亂虢之亡也有神降于莘即此類也張氏曰傳曰國將興聽於民將亡聽於神三苗之俗以詛盟為事是聽命於神也姦人每假神以作亂如漢末張角謀叛一日同起者三十六方張魯起兵亦以五斗米首過於神以誘人皆是也絶地天通罔有降格者絶在地之民使人不得以妖術格在天之神絶在天之神使人不得假其名字以降于在地之民龜山楊氏曰揚雄云南正重司天北正黎司地羲近重和近黎羲和非重黎也近之而已重黎司天地之官也羲和掌日時之官也春夏陽也故羲近重秋冬隂也故和近黎然吕氏曰治世神怪所以不興者只為善惡分明自不求之神亂世善惡不明自然専言神怪言鬼言命在新安陳氏曰此非専重黎之力亦由朝之羣后及下之衆臣明顯明之理使人不惑於茫昧之説輔經常之道使人不撓于妖怪之習雖窮民亦無蔽蓋而不得自伸者民心坦然無疑而不復求之于神此重黎所以得舉其職也蓋人惟昧正理悖常道而後惑神怪亂祀典明明棐常乃絶地天通之本也使人心未知顯明之理未順彛常之經則必惑于冥昧撓於怪異重黎雖禁絶之未易行也惟明明棐常人心先正自將求之明而不求之幽于其常而不于其怪絶地天通庶其易於絶乎又按北正黎或作火正黎北字與火字相似又黎以北正兼火正黎即祝融也所以祕注揚子云北正黎即火正黎也北正對南正為是皇帝清問下民鰥寡有辭于苗德威惟畏德明惟明清問虛心而問也有辭聲苗之過也苗以虐為威以察為明帝反其道以德威而天下無不畏以德明而天下無不明也乃命三后恤功于民伯夷降典折民惟刑禹平水土主名山川稷降播種農殖嘉榖三后成功惟殷于民恤功致憂民之功也典禮也伯夷降天地人之三禮以折民之邪妄蘇氏曰失禮則入刑禮刑一物也伯夷降典以正民心禹平水土以定民居稷降播種以厚民生三后成功而致民之殷盛富庶也吳氏曰二典不載有兩刑官蓋傳聞之謬也愚意臯陶未為刑官之時豈伯夷實兼之歟下文又言伯夷播刑之迪不應如此謬誤夏氏曰九州各有名山大川為之主名如揚州山有會稽川曰三江之類封臨川吳氏曰伯爵夷名猶崇伯名禹稱伯禹也稷於邰以有邰之君入為稷官故稱后稷恤功以民事為憂也自上教下曰降內則曰降德于衆兆民伯夷教民以禮民入於禮而不入於刑折絶斯民入刑之路也禹為司空治水水由地中行而土可居九州各主有名之山川以表疆域稷降下播種之法三農得以豐殖其嘉榖三后各成其事惟務繁盛其民之生聚降典教之也平水土安之也降播種養之也士制百姓于刑之中以教祗德命臯陶為士制百姓于刑辟之中所以檢其心而教以祇德也吳氏曰臯陶不與咅預下不與同三后之列遂使後世以刑官為輕後漢楊賜拜廷尉自以代非法家言曰三后成功惟殷于民臯陶不與蓋吝之也是後世非獨人臣以刑官為輕人君亦以為輕矣觀舜之稱臯陶曰刑期于無刑民協于中時乃功又曰俾豫從欲以治四方風動惟乃之休其所繫乃如此是可輕哉吕氏曰吕刑一篇以刑為主故歷敘本末而歸之於臯陶之刑勢不得與伯夷禹稷雜稱言固有賔主也穆穆在上明明在下灼于四方罔不惟德之勤故乃明于刑之中率乂于民棐彛穆穆者和敬之容也明明者精白之容也灼于四方者穆穆明明輝光發越而四達也君臣之德昭明如是故民皆觀感動蕩為善而不能自已也如是而猶有未化者故士師明于刑之中使無過不及之差率乂于民輔其常性所謂刑罰之精華也吕氏曰苗既遏絶而猶有辭于苗蓋苗在舜世叛服不常元惡遏絶餘孽猶存或竄或分北或徂征考之書可見當時承蚩尤之弊妖誕怪神深溺人心重黎絶地天通固區别其大分矣然蠱惑之久未易遽勝伯夷復降天地人之祀典使知天地之性鬼神之德森然各有明法向之蠱惑消蕩不留所謂折民于刑也自不知本者觀之平水播榖若所急而降典可緩抑不知人心不正胥為禽夷雖有土安得而居有粟安得而食伯夷降典先其本也後之知道者亦謂去神祠然後人為善其旨微矣自伯夷之典迄臯陶之刑制度文為之具也自穆穆在上明明在下至率乂于民棐彛精神心術之運也苟無其本則前數者不過卜祝工役農圃胥史之事耳可新安陳氏曰鰥寡得言其害於清問之下其無蓋知表記引德威惟畏德明惟明繼之曰非虞帝其孰能如是乎則皇帝為舜明矣夫舜不輕於用刑也先命重黎絶地天褻瀆之禮次首命伯夷降天地人之禮又命禹除民害稷興民利夫然後始命臯陶以刑且本之以威明之德繼期民以祇德勤德刑之本必主于德而刑之用必合于中德與中為吕刑一篇之綱領繼此曰惟克天德曰以成三德曰有德惟刑無非以德為本也曰觀于五刑之中曰中聽獄之兩辭曰罔非在中曰咸庶中正曰非德于民之中曰咸中有慶無非以中為用也刑必合於中而後刑即所以為德以此意讀吕刑其庶幾乎陳氏雅言曰此穆王言帝舜之世在上者君也而能有穆穆和敬之容在下者臣也而能有明明精白之容君臣之德充積於中發見于外無逺弗屆可謂極其盛矣是以當時之民感慕於君臣盛德之容而能勤於德者此不待教之而能自勉於善畏服於士師明刑之中而能復其性者于以見帝舜之時不徒以刑治民而必以德為化民之本初非以刑殘民而必以刑為輔治之法傳所謂刑罰之精華者也典獄非訖于威惟訖于富敬忌罔有擇言在身惟克天德自作元命配享在下訖盡也威權勢也富賄賂也當時典獄之官非惟得盡法於權勢之家亦惟得盡法於賄賂之人言不為威屈不為利誘也敬忌之至無有擇言在身大公至正純乎天德無毫髮不可舉以示人者天德在我則大命自我作而配享在下矣在下者對天之辭蓋推典獄用刑之極功而至於與天為一者如此吕氏曰典獄不得行其公者非為威脅則為利誘欲威不能屈富不能淫惟在敬忌無擇言在身而已夏氏曰行之於身皆可言之于口不必擇而後言則汝之所為無瑕可指矣是能與天合德如此則典獄之官身雖在下而仰合天德如所謂配天其澤仰當天意如所謂克享天心謂之配享在下豈不信哉張氏曰穆王戒典獄諄諄以富貨言當時風俗衰敝可知敬則善心生忌則惡念滅陳氏經口天德無私威富之事絶於外敬忌之誠存於中此無私之天德也死生壽天之命乃天以制斯人者今典獄者德與天一則制生人之大命不在天而在我矣天能制人之大命典獄者亦能制人之大命豈非在下而與天配合乎自作元命猶言自貽哲命一新安陳氏曰敬忌如康誥文王之敬忌畏忌敬之事也罔有擇言口無擇言也言行相表裏罔有擇言在身併身無擇行言矣典獄之事天實臨之非惟天實臨之吾身即天也天德克於我則天之元命自作於我配天澤享天心皆我也配享在下與苗之無世在下對典獄者欲配享在下不至如苗之無世在下何怵於富威而不加之敬忌乎念念知有天在上且知天實在吾一心中斯為得之贖董氏鼎曰穆王諄諄以富貨戒臣下而五刑皆有貨莫甚焉可謂不揣其本而齊其未者矣陳氏雅言曰威者法所未易加富者人鮮能自克虞廷典獄之官非惟不怵于勢而心無所憚亦且不誘於利而心無所慆此其不徇于人也敬者事無敢或忽忌者意無敢或縱虞廷典獄之官既能察其情而心無所慢又能慎其法而心無所易此其致謹於己者也推敬畏之心以之聽獄折辭宜無一言之可愧不待擇而出諸口者無片言之少愆僃衆善而有諸身也吾見上下之間彼此交契天此心而人此心天此理而人此理栽培傾覆有以見天道之至公賞善罰惡有以見人心之至公或刑或宥一出於公則元命之作不在天而在我也自天工人代而言謂之天作自至公無私而言謂之自作天能制人之大命典獄者亦能制人之大命非克配在下者乎天能折民之邪妄典獄者亦能折民之邪妄非克享在下者乎用刑之極功至于與天為一者如此蓋能無間於天斯能無負于君矣穆王之言蓋欲當時典獄之官取此以為法也王曰嗟四方司政典獄非爾惟作天牧今爾何監非時伯夷播刑之迪其今爾何懲惟時苗民匪察于獄之麗罔擇吉人觀于五刑之中惟時庶威奪貨斷制五刑以亂無辜上帝不蠲降咎于苗苗民無辭于罰乃絶厥世司政典獄漢孔氏曰諸矦也為諸矦主刑獄而言非爾諸侯為天牧養斯民乎為天牧民則今爾何所監懲所當監者非伯夷乎所當懲者非有苗乎伯夷布刑以啓迪斯民捨臯陶而言伯夷者探本之論也麗附也苗民不察於獄辭之所麗又不擇吉人俾觀于五刑之中惟是貴者以威亂政富者以貨奪法斷制五刑亂虐無罪上帝不蠲貸咅涓太而降罰于苗苗民無所辭其罰而遂殄滅之也陳氏大猷曰唯吉人能慈祥哀矜察刑之中理而不妄用察獄既不得其情任獄又不得其人是人與法俱弊也新安陳氏曰此因上章言苗民及虞廷之刑而欲典獄者有所監懲也伯夷典禮而言播刑之迪實難強通或謂降典以折絶民于刑是乃伯夷播刑之道未知是否庶威奪貨蔡氏分説與上文訖威訖富相照應優於諸家不蠲不蠲潔其所為也舒陳氏大猷曰自古酷吏如郅都寧成嚴延年王溫周興來俊臣之流未有不反中其身及其子孫者上帝不蠲而絶厥世古今一律也王曰嗚呼念之哉伯父伯兄仲叔季弟幼子童孫皆聽朕言庶有格命今爾罔不由慰日勤爾罔或戒不勤天齊于民俾我一日非終惟終在人爾尚敬逆天命以奉我一人雖畏勿畏雖休勿休惟敬五刑以成三德一人有慶兆民賴之其寧惟永此告同姓諸侯也格至也參錯訊鞫極天下之勞者莫若獄苟有毫髮怠心則民有不得其死者矣罔不由慰日勤者爾所用以自慰者無不以日勤故職舉而刑當去聲也爾罔或戒不勤者刑罰之用一成而不可變者也苟頃刻之不勤則刑罰失中雖深戒之而已施者亦無及矣戒固善心也而用刑豈可以或戒也哉且刑獄非所恃以為治也天以是整齊亂民使我為一日之用而已非終即康誥大罪非終之謂言過之當宥者惟終即康誥小罪惟終之謂言故之當辟者非終惟終皆非我得輕重惟在夫人所犯耳爾當敬逆天命以承我一人畏威古通用威辟之也休宥之也我雖以為辟爾惟勿辟我雖以為宥爾惟勿宥惟敬乎五刑之用以成剛柔正直之德則君慶於上民賴於下而安寧之福其永久而無替矣吕氏曰慰者非得其情而喜蓋以不弛其職自慰也罔或戒者必常惰而後戒雖曰追悔方其惰時刑必有失其平者失剛夏氏曰於五刑所當重者重無愧於三德之剛而不至於太苛所當輕者輕無愧於三德之柔而柔不至於太縱介輕重之間者無愧於三德之正直而正直不至於偏倚如是則足以敬迎大命矣新安陳氏曰此章言刑出於天天俾之我故望爾逆天命以奉我所以承天者勤也敬也能勤能敬則刑非刑也德也刑非刑也福也可不念哉不陳氏雅言曰今爾所以自慰者罔不由於能勤而可或戒于不勤蓋勤可也不勤不可也戒勤固善也戒不勤不善也然所以可勤而不可戒不勤者誠以刑罰之原天以齊民而俾我有一日之用也非終惟終而在人無一定之罪也蓋刑不出於我而出於天刑不在我而在於人爾同姓諸侯均有一日掌刑之責知上天之心惟在於以刑齊民則庶能敬逆之而不違知我一人之心惟在于以刑齊民則必當有以奉承之而不慢敬者勤之本勤者敬之發惟其用心也敬故其臨事也勤辟宥不可以徇君之命敬刑惟當以成民之德刑之用無不敬則民之德無不成民之德無不成則民之亂無不齊矣由是君受其福民蒙其惠福之至於永久安寧而不替又豈非勤敬之效乎勤敬之效其大如此穆王言此蓋勉諸侯之同姓者以勤敬為用刑之道也王曰吁來有邦有土告爾祥刑在今爾安百姓何擇非人何敬非刑何度達各反非及有民社者皆在所告也夫刑凶器也而謂之祥者刑期無刑民協于中其祥莫大焉及逮也漢世詔獄所逮有至數萬人者審度其所當逮者而後可逮之也曰何曰非問答以發其意以明三者之決不可不盡心也張氏曰此并同姓異姓諸侯而戒之之蘇氏曰罪非己造為人所纍曰及秦漢間謂逮獄吏以不遺支黨為忠以多逮廣繫為利漢大獄有逮萬人者國之安危運祚長短咸寄於此新安陳氏曰刑而曰祥以好生之德寓焉擇人敬刑而謹所及則民安矣民安則刑可言祥矣臨川吳氏曰刑而曰祥刑蓋慈良惻怛詳審謹重主之以不忍行之以不得已所以謂之祥也在今日爾諸矦欲安百姓何者當擇非人乎何者當敬非刑乎何者當揆度非及乎人謂用刑之人及謂刑之所加猶罰及爾身之及陳氏雅言曰刑而謂之祥刑者蓋刑非所以殘民而以安民謂之祥刑可也安民之道何所擇而非人言人不可以不擇何所敬而非刑言刑不可以不敬何所度而非及言及不可以不度惟擇人而後能敬刑能敬刑而後能度及三言何者設為問辭以致其疑三言非者設為答辭以致其決當時有邦之諸矦有土之卿大夫果能於此三者而致其擇致其敬致其度則民無不安而刑斯為祥矣兩造七到反具備師聽五辭五辭簡孚正于五刑五刑不簡正于五罰五罰不服正于五過兩造者兩爭者皆至也周官以兩造聽民訟具備者詞證皆在也師衆也五辭麗於五刑之辭也簡核其實也孚無可疑也正質也五辭簡核而可信乃質于五刑也不簡者辭與刑參差不應刑之疑者也罰贖也疑於刑則質于罰也不服者辭與罰又不應也罰之疑者也過誤也疑于罰則質于過而宥免之也張氏曰兩造非偏辭師聽非偏見一人獨聽恐聰明有不及思慮有不至必衆聽之也吕氏曰獄辭所及固欲審度而兩造詞證復欲具備蓋不當逮者不可擾一人當逮者不可缺一人又曰古者因情而求法故有不可入之刑後世移情而合法故無不可加之罪五過之疵惟官惟反惟內惟貨惟來其罪惟均其審克之疵病也官威勢也反報德怨也內女謁也貨賄賂也來干請也惟此五者之病以出入人罪則以人之所犯坐之也審克者察之詳而盡其能也下文屢言以見其丁寧忠厚之至疵於刑罰亦然但言於五過者舉輕以見重也孔氏曰五遇之病出入人罪使在五過罪與犯法者同吕氏曰刑降而為罰罰降而為過然以私而故縱則又非天討也故縱之疵病有此五者又口審者察之盡其心克者治之盡其力五刑之疑有赦五罰之疑有赦其審克之簡孚有衆惟貌有稽無簡不聽具嚴天威刑疑有赦正于五罰也罰疑有赦正于五過也簡核情實可信者衆亦惟考察其容貌周禮所謂色聽是也然聽獄以簡核為本苟無情實在所不聽上帝臨汝不敢有毫髮之不盡也夏氏曰簡孚有衆即前師聽五辭五辭簡孚之意而此簡孚之法又當惟貌有稽辭或可偽而貌不可掩不正則眊有愧則泚於此稽之不得遁矣苟無可簡核則疑獄明矣此在所不必聽竟捨之可也氏張氏曰具俱也謂上所言皆敬天威也臨川吳曰有疑而當赦者所宜審克之推究得實者罪之當刑者也惟當更於容貌有所考察慎之至也無可推究者疑而當赦者也疑獄難明不復再聽蓋過於尋求或至誤入必受天譴天威俱所當畏故疑者不問而赦之也墨辟音僻下並同疑赦其罰百鍰閲實其罪劓辟疑赦其罰惟倍閲實其罪剕辟疑赦其罰倍差閲實其罪宫辟疑赦其罰六百鍰閲實其罪大辟疑赦其罰千鍰閲實其罪墨罰之屬千劓罰之屬千剕罰之屬五百宫罰之屬三百大辟之罰其屬二百五刑之屬三千上下比罪無僣亂辭勿用不行惟察惟法其審克之墨刻顙而涅之也劓割鼻也剕刖足也宫淫刑也男子割勢婦人幽閉大辟死刑也六兩曰鍰音環閲視也倍二百鍰也倍差倍而又差五百鍰也屬類也三千總計之也周禮司刑所掌五刑之屬二千五百刑雖增舊然輕罪比舊為多而重罪比舊為減也比附也罪無正律則以上下刑而比附其罪也無僭亂辭勿用不行未詳或曰亂辭辭之不可聽者不行舊有是法而今不行者戒其無差誤於僭亂之辭勿用今所不行之法惟詳明法意而審克之也今按臯陶所謂罪疑惟輕者降一等而罪之耳今五刑疑赦而直罰之以金是大辟宫剕劓墨皆不復降等用矣蘇氏謂五刑疑各入罰不降當因古制非也舜之贖刑官府學校鞭撲之刑耳夫刑莫輕於鞭撲入於鞭撲之刑而又情法猶有可議者則是無法以治之故使之贖特不欲遽釋之也而穆王之所謂贖雖大辟亦贖也舜豈有是制哉詳見篇題陳氏曰此下言贖法載於法謂之刑加於人謂之辟犯墨辟而情罪之可疑者則赦之使贖其罰則罰之納贖也然必檢閲核實其罪使與罰相當不可苟也下倣此止夏氏曰每條必言閲實其罪恐聽者或不詳其意閲實其一而忽其他故不嫌其費辭也入孔氏曰序五刑先輕轉至重者事之宜五刑疑各罰不降相因古之制也别言罰屬合言刑屬明刑罰同屬互見其義三吕氏曰墨劓所增皆輕刑宫所損二百大辟所損百皆重刑也剕無增損居輕重之間者也輕罪則多於前重罪則損于舊觀其目則哀矜之意固可見觀其凡則文勝俗弊亦可推矣罪夏氏曰上言罰下言刑者罪實而加以法謂之刑疑而贖以金謂之罰互見其義以明刑罰之條其數一同也上下比罪謂于法無此條則上比重罪下比輕罪上下相比觀其所犯當與誰同然後定其輕重之法如今律無明文則許用例也然當上下比罪之時吏多因緣為姦差錯妄亂實由以生故又戒以不可用私意而僣錯妄亂其辭僣謂辭在此乃差而之彼亂謂辭本直乃亂而為曲也惟內察以心外合以法內外兩盡情法相推惟詳審者能之無陳氏曰三千已定之法載之刑書者也天下之情窮刑書所載有限不可以有限之法而盡無窮之情又在用法者斟酌損益之古者任人不任法法所載者任法法不載者參以人上下比罪是也以其罪而比附之上刑則見其重以其罪而比附之下刑則見其輕故於輕重之間裁酌之然必以辭為主辭若僣亂情與罪不相合是不可行者也當勿用其不可行之法惟當察其情求之法二者合而後允當乎人情法意是乃可行者也在審克之而已陳氏大猷曰三千者法之正條載之刑書者也刑如律比如例法有限情無窮三千之屬衆矣猶不能盡天下之情罪以此知人情無窮而法不可獨任也既無正律復僣亂而無定辭將安所據依乎且又有此例昔嘗有之而今不可行者矣必無差亂其辭而妄比附勿用今不可行之法而強比附如漢長安賈人與渾邪王市者罪當死几五百餘人汲黯曰愚民安所知市賈長安中而文吏以為闌出財物如邉關乎此類乃以不可行者比附也乃蘇氏曰察我心也法國法也內合我心外合國法為得之唐孔氏曰古者金銀銅鐵總號為金孔氏以為黃鐵舜典金作贖刑者則以為黃金蓋古人贖罪悉皆用銅或稱黃金或稱黃鐵上刑適輕下服下刑適重上服輕重諸罰有權刑罰世輕世重惟齊非齊有倫有要事在上刑而情適輕則服下刑舜之宥過無大康誥所謂大罪非終者是也事在下刑而情適重則服上刑舜之刑故無小康誥所謂小罪非眚者是也若謂罰之輕重亦皆有權焉權者進退推移以求其輕重之宜也刑罰世輕世重者周官刑新國用輕典刑亂國用重典刑平國用中典隨世而為輕重者也輕重諸罰有權者權一人之輕重也刑罰世輕世重者權一世之輕重也惟齊非齊者法之權也有倫有要者法之經也言刑罰雖惟權變是適而齊之以不齊焉至其倫要所在蓋有截然而不可紊音問者矣此兩句總結上意張氏曰殺人者死此上刑也然有誤殺者此適輕也則服下刑矣鬭歐不死此下刑也然有謀殺而適不死者此適重也則服上刑矣用刑豈可不問情之輕重哉至於用罰亦當權其輕重情輕則罰亦輕情重則罰亦重以情為權而論疑罪之輕重則罰亦當矣刑權輕重以為上下罰權輕重以為多少罪陳氏曰罪重莫如殺人然所殺奴婢也非適輕乎輕莫如詬罵然所罵父兄也非適重乎上服非服最上刑比之下刑為重耳世陳氏大猷曰刑罰有權權人情而為輕重也世輕重權世變而為輕重也異王氏曰情之輕重世之治亂不同則刑罰之用當而欲為一法以齊之則其齊也不齊以不齊齊之則齊矣惟齊非齊以不齊齊之之謂也先後有序謂之倫衆體所會謂之要陳氏雅言曰法緣人情世變而立斷於理而定情有故誤世有變亂刑罰之用亦當各異此濟之以權也若上罪而使之服上刑下罪而使之服下刑前世刑輕吾亦從輕前世刑重吾亦從重此惟齊也乃所以為不齊故必以不齊齊之而後可然而雖齊之以不齊至於先後次序之倫則秩乎其不可紊衆體所會之謂要則截乎其不可易蓋法之或輕或重雖原於人情世變而為之不同而其所以輕之重之則皆出於理之當然而非以己之私意為之也蓋自經權之異者觀之變法以求當於人情世變者權也自經權之變者觀之法雖變而能當於理者是即經也理通則人情世變無不通人情世變無不通則法無不通矣穆王訓刑雖在耄荒之年而拳拳及此猶有唐虞忠厚惻怛之意此夫子所以猶有取於是書也罰懲非死人極于病非佞折獄惟良折獄罔非在中察辭于差非從惟從哀敬折獄明啓刑書胥占咸庶中正其刑其罰其審克之獄成而孚輸而孚其刑上備有并兩刑罰以懲過雖非致人於死然民重出贖亦甚病矣佞口才也非口才辨給之人可以折獄惟溫良長上聲者視民如傷者能折獄而無不在中也此言聽獄者當擇其人也察辭于差者辭非情實終必有差聽獄之要必於其差而察之非從惟從者察辭不可偏主猶曰不然而然所以審輕重而取中也哀敬折獄者惻怛敬畏以求其情也明啓刑書胥占者言詳明法律而與衆占度達各反也咸庶中正者皆庶幾其無過忒也於是刑之罰之又當審克之也此言聽獄者當盡其心也若是則獄成於下而民信之獄輸於上而君信之其刑上備有并兩刑者言上其斷獄之書當備情節一人而犯兩事罪雖從重亦并兩刑而上之也此言讞言上聲獄者當備其辭也蘇氏曰佞口給也口辨者服其口不服其心也從其差者察之多得其情曰林氏曰佞人禦人以口給如周亞夫詣廷尉責問君侯欲反何也答曰臣所買器乃葬器也何謂反乎吏曰君縱不反地上即反地下矣所謂佞折獄也張氏曰惟良所以能折獄以其無不在中也忽林氏曰哀矜勿喜即此哀敬也哀則不忍敬則不陳氏曰庶者見中正之為難典獄者不當自足以為已得中正也輸之於上備載罪法之輕重事情之本末不可缺略兩刑謂一人有兩罪一罪有二法并具上之以聽命於上不敢專也陳氏大猷曰此章首云告爾祥刑至安百姓言制刑之本意也何擇至非及言用刑之綱領也自兩造至天威言聽獄之節奏也自墨辟至三千言贖法及刑書之定目也自上刑至有要言用刑之權變也自罰懲至克之言折獄而用法也自獄成至兩刑言結獄而奏案也反覆丁寧備矣王曰嗚呼敬之哉官伯族姓朕言多懼朕敬于刑有德惟刑今天相民作配在下明清于單辭民之亂罔不中聽獄之兩辭無或私家于獄之兩辭獄貨非寶惟府辜功報以庶尤永畏惟罰非天不中惟人在命天罰不極庶民罔有令政在于天下此總告之也官典獄之官也伯諸侯也族同族姓異姓也朕之於刑言且多懼况用之乎朕敬于刑者畏之至也有德惟刑厚之至也今天以刑相治斯民汝實任責作配在下可也明清以下敬刑之事也獄辭有單有兩單辭者無證之辭也聽之為尤難明者無一毫之蔽清者無一點之汚曰明曰清誠敬篤至表裏洞徹無少私曲然後能察其情也亂治也獄貨鬻音育獄而得貨也府聚也辜功猶云罪狀也報以庶尤者降之百殃也非天不中惟人在命者非天不以中道待人惟人自取其殃禍之命爾此章文有未詳者姑缺之張氏曰官伯官之長前曰自作元命配享在下今曰今天相民作配在下則獄官乃配天者也禰唐孔氏曰襄十二年左傳云異姓臨于外同族於廟故族為同族姓為異姓獄官致富成私家故欲無成私家于獄之兩辭家葉氏曰私家私其家也吕氏曰不可用私意而于獄之兩辭家云者出沒變化於兩辭之中以為囊槖窟穴者也貨積而罪亦積乃所以聚汝辜罪之功狀陳氏大猷曰明清以聽單辭以中而聽兩辭鬻獄而降罰非天道不中以獄乃人命生死之所在故曰苟用刑不中而天罰不極至則典獄無所懲戒自此庶民無復蒙善政而在於天下矣任刑之大本在敬與中用心以敬為主用法以中為主前已論之此復提敬與中訓之後章復申以中焉新安陳氏曰有德惟刑謂有德于民者惟此刑耳兩辭之獄每可容私家于獄如君子不家于喪之家無或以私意而求成家于獄之兩辭天報之以庶罪受貨而富若可喜計貨為罪永可畏也惟人在命大槩謂獄之於人乃性命之所在關繫匪輕也在臨川吳氏曰非天不中而偏罰之蓋以人之為人於有生之命陷人命以至於死天豈容之哉若天之罰不如此其極則獄吏將無所畏恣為深刻而施之庶民者皆酷虐之政無復有令善之政在于天下矣王曰嗚呼嗣孫今往何監非德于民之中尚明聽之哉哲人惟刑無疆之辭屬音祝于五極咸中有慶受王嘉師監于茲祥刑此詔來世也嗣孫嗣世子孫也言今往何所監視非用刑成德而能全民所受之中者乎下文哲人即所當監者五極五刑也明哲之人用刑而有無窮之譽蓋由五刑咸得其中所以有慶也嘉善師衆也諸侯受天子良民善衆當監視于此祥刑申言以結之也孔氏曰智人用刑有無窮之善名陶吕氏曰中者吕刑之綱領也苗民罔是中者也臯明是中者也穆王之告司政典獄勉是中者也未章訓迪自中之外亦無他説焉今爾何所當監豈非德于民之中乎用刑者有意干譽欲以德名而不足以為德所以為德者必於民之中而後可也或曰非有德于民所受之中乎民失其受中之性我以德導之使復其性是我有德于民所受之中也夏氏曰民受天地之中以生未嘗不善其陷于罪惡非其本然也故民曰嘉師刑雖主於刑人然刑姦宄所以扶善良雖曰不祥乃所以為祥也故刑曰祥刑嘗為之説曰民之犯刑無非惡也而謂之嘉師刑本不祥之器也而謂之祥刑能以惡為嘉以不祥為祥而後知用刑之道矣合新安陳氏曰折獄能繫屬于五刑之凖則所以皆乎中理而有福慶也師曰嘉師良民也刑曰祥刑良法也此申明前告爾祥刑之意而欲其監觀于所告之祥刑也之毅齊沈氏曰嘗讀冏命吕刑二書竊有感於人心無常操存之不易蓋穆王一人之身而此心凡三變焉方其命伯冏也既以怵惕惟厲自警復以格其非心責臣罔有不欽之訓嗚呼欽哉之辭其憂思深且長矣此心不繼血氣方盛馭八駿而略四方幾至亡國前日預知警戒者不免躬自蹈之逮其期頤篤老之際度作訓以訓四方而敬忌罔有擇言在身惟敬五刑以成三德與夫嗚呼敬哉之説三四致意焉雖周道自是而衰然冏命之書專主乎欽吕刑之書專主乎敬心法之傳千載猶可想也吁人心操捨存亡之變抑可畏哉命董氏鼎曰周書未有捨文武成康而不言者穆王君牙伯冏既然矣獨於訓刑之作無一語及之豈耄荒而遂忘其祖歟竊意其重於贖刑則非其家法所有故逺取金作贖刑以為據孔子未定書以前舜典猶曰夏書序者謂訓夏贖刑蓋本諸此則諸書序決非孔子作贖刑亦非禹刑明矣且舜既以五流而宥五刑矣鞭撲之輕者及許以金贖所以養其愧恥之心而開以自新之路曰眚災肆赦則直赦之而已穆王乃以刑為致罪以罰為贖金既謂五刑之疑有赦而又曰其罰若干鍰則雖在疑赦皆不免於罰贖五刑盡贖非鬻獄乎自是有金者雖殺人可以無死而刑者相半於道必皆無金者也中正安在哉然不見斥於孔子則猶拳拳於哀矜畏懼雖越先王之良法而美意尚存歟文侯之命幽王為犬戎所殺晉文侯與鄭武公迎太子宜臼立之是為平王遷于東都平王以文侯為方伯賜以秬鬯咅暢弓矢作䇿書命之史録為篇今文古文皆有吕氏曰此篇作於東遷之初可以上可以下由此而上為成康為文武由此而下為春秋為戰國乃世道消長升降之交會也使平王能復文武成康之遺澤則可以繼二帝三王之盛天下無復有春秋戰國矣惟平王止於苟且因循自然降為列國夫子編此書於二帝三王之後者深惜平王不能推文武之餘澤而流為春秋戰國也法語舊典尚有一二未泯而陵遲頽墮之意已見於辭命間學者當審察而明辨也夏氏曰古之謂書自此篇以下無復王者之誥命然此乃平王初年書錫命文侯猶有天子之權苟能自是振刷周道亦未至盡墜奈何至魯隱初在位且五十年竟以不振故孔子託始隱公而春秋作焉書終文侯之命孔子猶有望於平王春秋始于隱公孔子蓋絶望於平王也新安陳氏曰此書略無立志全不以綱常讎恥為務其戌許戌申之師歸惠公仲子之賵雖於詩與春秋而見其兆已於不能善始之書先見矣幽王之禍始於嬖褒姒而夫婦之綱紊繼於逐宜臼而父子之綱淪成於招申侯犬戎叛弒而君臣之綱掃地平王親罹其禍俱襲其失夏氏謂春秋始於隱公夫子始絶望於平王吾謂書終於文侯之命夫子蓋已不滿于平王云王若曰父義和丕顯文武克慎明德昭升于上敷聞在下惟時上帝集厥命于文王亦惟先正克左右音佐佑昭事厥辟越小大謀猷罔不率從肆先祖懷在位同姓故稱父文侯名仇義和其字不名者尊之也丕顯者言其德之所成克謹者言其德之所修昭升敷聞言其德之所至也文武之德如此故上帝集厥命於文王亦惟爾祖父能左右昭事其君於小大謀猷無敢背違故先王得安在位張氏曰天子同姓稱伯父叔父今曰父親之之甚平王將言已無耆壽俊之助故先言先王得先正之助也臨川吳氏曰文武之德昭明而上升于天廣布而下聞于民惟以是之故天集其命于文王之身周家之命集于文王定于武王故集命則以文王言明德則兼文武言先正文武之臣也能於左右昭事其君及大小謀猷之事皆率循從順以此貽後故文武而下諸君為平王之祖者得以安於其位也嗚呼閔豫小子嗣造天丕愆殄資澤于下民侵戎我國家純即我御事罔或耆壽俊在厥服豫則罔克曰惟祖惟父其伊恤朕躬嗚呼有績豫一人永綏在位歎而自痛傷也閔憐也嗣造天丕愆者嗣位之初為天所大譴父死國敗也殄絶純大也絶其資用惠澤於下民本既先撥故戎狄侵陵為我國家之害甚大今我御事之臣無有老成俊傑在厥官者而我小子又材劣無能其何以濟難又言諸侯在我祖父之列者其誰能恤我乎又歎息言有能致功豫一人則可永安厥位矣蓋悲國之無人無有如上文先正之昭事而先王得安在位也吕氏曰殄資澤於下民如所謂喪亂蔑資曽莫惠我師蓋推本禍亂所由邦本既先撥也百圍之木膏液內涸然後風得而拔之未有斯民資澤未殄而戎狄能乘之者也無競維人周室所以不競又以無人之故下民之殄資澤既為致亂之本厥服之無耆俊又乏拯亂之助平王之失大抵求於人者重而自任者輕徒延頸企踵以望諸侯之助而不思反身以自強燕昭小國之君耳慨然有復讎之志而士爭趨之平王豈可以罔或耆壽俊在厥服而但已哉張氏曰永綏在位對上文先祖懷在位而言平王惟自幸永安其位卑卑以位為樂奄然無氣如此其無有為之志可見矣哀哉父義和汝克昭乃顯祖汝肇刑文武用會紹乃辟追孝于前文人汝多修扞咅旱我于艱若汝豫嘉顯祖文人皆謂唐叔即上文先正昭事厥辟者也後罔或耆壽俊在厥服則刑文武之道絶矣今刑文武自文侯始故曰肇刑文武會者合之而使不離紹者繼之而使不絶前文人猶云前寧人汝多所修完扞衛我于艱難若汝之功我所嘉美也孔氏曰戰功曰多薛氏曰刑與詩言儀刑文王同王曰父義和其歸視爾師寧爾邦用賚來去聲爾秬鬯一卣音友彤音同弓一彤矢百盧弓一盧矢百馬四匹父往哉柔逺能邇惠康小民無荒寧簡恤爾都用成爾顯德師衆也黑黍曰秬釀以鬯草卣中尊也諸侯受錫命當告其始祖故賜鬯也彤赤盧黑也諸侯有大功賜弓矢然後得專征伐馬供武用四匹曰乘去聲侯伯之賜無常以功大小為度也簡者簡閲其士恤者惠恤其民都者國之都鄙也蘇氏曰豫讀文侯篇知東周之不復扶又反興也宗周傾覆禍敗極矣平王宜若衛文公越句音勾踐然今其書乃旋旋焉與平康之世無異春秋傳去聲曰厲王之禍諸侯釋位以間去聲王政宣王有志而後效官讀文侯之命知平王之無志也愚按史記幽王娶於申而生太子宜臼後幽王嬖褒姒廢申后去太子申侯怒與繒西夷犬戎攻王而殺之諸侯即申侯而立故太子宜臼是為平王平王以申侯立己為有德而忘其弒父為當誅方將以復讎討賊之衆而為戌申戌許之舉其忘親背音佩義得罪於天已甚矣何怪其委靡頽墮而不自振也哉然則是命也孔子以其猶能言文武之舊而存之歟抑亦以示戒於天下後世而存之歟張氏曰文侯平王腹心之臣也當如周公留相朝廷而侯其子如伯禽與之圖復國讎可也乃使之歸視爾師寧爾邦其志可知可謂不知輕重者矣事或曰平王賚文侯以秬鬯得非用成王寧周公故歟至襄王賜晉文公弓矢傳曰平禮也則又援此為故事矣讎吕氏曰周終於東周蓋於此書見之東遷之初大未報王略未復正君臣卧薪嘗膽之秋也奔亡之餘僅得苟安乃釋然遽自以為足曰歸視爾師寧爾邦兵已罷矣曰用賚爾秬鬯一卣彤弓一彤矢百盧弓一盧矢百馬四匹功已報矣曰往哉柔逺能邇惠康小民無荒寧告以平世之政軍旅不復講矣曰簡恤爾都勉以本邦之治王室無復事矣嗚呼周其終於東乎林氏曰書於吕刑之下有文侯之命費誓秦誓三篇竊意周太史所藏典謨訓誥誓命之文才至吕刑而止自時厥後歷幽厲之亂簡編不接其間如宣王中興會諸侯復境土任賢使能南征北伐錫命韓侯申伯用張仲仲山甫其時大誥命多矣乃無一篇見於書意宣王之書必失亡於東遷之亂孔子既取周太史所藏斷自堯典至于吕刑而於列國復得命誓三篇遂取而附益于其後按左傳鄭子産曰鄭書有之曰安定國家必大焉先大學舉楚書曰楚國無以為寶惟善以為寶是知春秋之世列國皆有書夫子周流遍觀而於晉得文侯之命於魯得費誓於秦得秦誓故以附于帝王書之末歟葵初王氏曰孔子西見趙簡子及河而反又西行不到秦則文侯之命與秦誓未必於晉於秦得之也不知林説何據董氏鼎曰此篇書體與微子之命蔡仲之命同其事則彼為封建此為錫賚耳平王幽王子宣王孫宣王承厲王之後修車馬備器械復會諸侯於東都而周室為之中興幽王繼之荒淫失道為犬戎所殺平王苟能赫然發憤率天下諸侯以報不共戴天之讎則諸侯必有能敵王所愾而中興之功烈可以增光於乃祖矣不知務此東遷于洛惟晉焉依自幸於苟偷而不復念及君父自安於卑陋而不思興復王室此所以詩自黍離列為國風而春秋始于平王則以王政自是不綱矣文侯非有方叔召虎之功平王所以深嘉之者不過曰汝多修扞我于艱耳不知昭顯祖刑文武而紹乃辟者果若先正之克左右昭事厥辟否乎方當戡亂之際而使之歸方當圖治之時而遣之往賚以秬鬯錫以弓馬果何謂哉拳拳於爾師爾邦爾都而置我君我父我王家於不問是可忍孰不可忍而夫子猶録其書者尚以其能錫命諸侯文武之遺澤未泯特平王自不振耳費誓費音祕地名淮夷徐戎並起為寇魯侯征之於費誓衆故以費誓名篇今文古文皆有吕氏曰伯禽撫封於魯夷戎妄意其未更事且乘其新造之隙而伯禽應之者甚整暇有序先治戎備次之以除道路又次之以嚴部伍又次之以立期會先後之序皆不可紊又按費誓秦誓皆侯國之事而繫於帝王書末者猶詩之録商頌魯頌也曉朱子曰費誓秦誓亦皆有説不行不可處孔氏曰費魯東郊地名伯禽為方伯監七百里諸侯帥之以征諸侯之事而連帝王孔子書序以魯有治戎征討之備秦有悔過自誓之戒足為世法故録以備王事猶詩録商魯之頌唐孔氏曰伯禽於成王即政元年始就封於魯禮諸侯不得專征伐惟州牧於當州之內有不順者得專征之記明堂位云封周公於曲阜地方七百里孔意以周之大國不過百里云七百里者監七百里之諸侯耳下云魯人三郊三遂指言魯人明於時軍內更有諸侯之人也蘇氏曰費在東海郡後為季氏邑國外十里為郊費非魯東郊當時治兵於費也夷張氏沂曰逸書成王政之序言成王東伐淮唐孔引費誓序言王伐淮夷魯伐徐戎然則魯侯乃佐王征討也蔡氏元度曰魯侯蓋承王命率諸侯以征徐戎故曰我惟征徐戎征者上伐下也言征非承王命故耶張氏震曰是書詳於自治而略于治人有志于征守而無志於戰王者之兵也故孔子取之吕氏曰徐戎淮夷世為周患武王崩三監及淮夷叛載於大誥命召公平淮夷載于江漢徐方繹騷載於常武自成王至宣王每有叛亂朝廷為之搖動非小寇也禹之家學見子草誓周公之家學見於費誓啓之嗣位驟當有扈之變伯禽就封驟當徐夷之變觀其誓師曲折纎悉若老於行陳者是以知禹周公之家學蓋本末具舉而無所遺也公曰嗟人無譁聽命徂茲淮夷徐戎並興漢孔氏曰徐戎淮夷並起寇魯伯禽為方伯帥諸侯之師以征歎而敕之使無喧譁欲其靜聽誓命蘇氏曰淮夷叛已久矣及伯禽就國又脅徐戎並起故曰徂兹淮夷徐戎並興徂茲者猶曰往者云善敹連條反乃甲胄敿舉天反乃干無敢不弔音的備乃弓矢鍛乃戈矛礪乃鋒刃無敢不善敹縫完也縫完其甲胄勿使斷毁敿鄭氏云猶繫也王肅云敿楯堅尹反當有紛繫持之弔精至也鍛淬取汭反謂燒而納水中以堅之礪磨也甲胄所以衛身弓矢戈矛所以克敵先自衛而後攻人亦其序也孔氏曰善簡汝甲鎧胄兜鍪施汝楯紛典唐孔氏曰世本云少康子杼作甲兜鍪首鎧也經皆言甲胄秦世以來始有鎧兜鍪之文古作甲用皮秦漢以來用鐵鎧鍪二字皆從金蓋用鐵為之鄭云敹謂穿徹之謂甲繩有斷絶當使敹理穿治之楯紛如綬而小繫紛於楯以為飾備訓具每弓百矢弓十矢千使其數僃足毛傳云五十矢為束或臨戰用五十矢為束凡金為兵器皆須鍛礪有刃之兵非獨戈矛其文互相通今惟淫舍牿咅谷牛馬杜乃擭音化敜乃結反乃穽音淨無敢傷牿牿之傷汝則有常刑淫大也牿間牧也擭機檻也敜塞入聲也師既出牛馬所舍之間牧大布於野當窒塞其擭穽一或不謹而傷間牧之牛馬則有常刑此令軍在所居之民也舉此例之凡川梁藪音叟澤險阻屏翳音丙意有害於師屯者皆在矣此除道路之事唐孔氏曰既言牛馬在牿遂以牿為牛馬之名禮冥氏掌為穽擭擭以捕虎豹穿地為深坑又設機其上防其躍而出也穽以捕小獸穿地為深坑入必不能出其上不設機也穽以穿地為名擭以得獸為名擭亦設於穽中但穽不設機為異耳杜敜皆閉塞之義車張氏曰牛馬為戰及負載之用馬牛其風臣妾逋逃勿敢越逐祗復之我商賚汝乃越逐不復汝則有常刑無敢寇攘踰垣墻竊馬牛誘臣妾汝則有常刑役人賤者男曰臣女曰妾馬牛風逸臣妾逋亡不得越軍壘而逐之失主雖不得逐而人得風馬牛逃臣妾者又當敬還之我商度多寡以賞汝如或越逐而失伍不復而攘取皆有常刑有故竊奪踰垣墻竊人牛馬誘人臣妾者亦有常刑此嚴部伍之事唐孔民曰左傳風馬牛不相及賈逵云風放也牝牡相誘謂之風蘇氏曰軍亂生於動故軍以各居其所不動謂法吕氏曰自古喪師每因剽掠失部伍為敵所乘本部不敢離局他部不敢匿姦何潰亂之憂甲戌我惟征徐戎峙乃糗云九反糧無敢不逮汝則有大刑魯人三郊三遂峙音恥乃楨幹甲戌我惟築無敢不供汝則有無餘刑非殺魯人三郊三遂峙乃芻茭音初交無敢不多汝則有大刑甲戌用兵之期也峙儲備也糗糧食也不逮若今之乏軍興淮夷徐戎並起今所攻獨徐戎者蓋量敵之堅瑕緩急而攻之也國外曰郊郊外曰遂天子六軍則六鄉六遂大國三軍故魯三郊三遂也楨幹板築之木題曰楨牆端之木也旁曰幹牆兩邊障土者也以是日征是日築者彼方禦我之攻勢不得擾我之築也無餘刑非殺者刑之非一但不至于殺爾芻茭供軍牛馬之用軍以期會芻糧為急故皆服大刑楨幹芻茭獨言魯人者地近而致便也夏氏曰不言淮夷蓋前已言之一唐孔氏曰周禮萬二千五百人為軍一家出一人鄉為一軍天子六軍出自六鄉則諸侯大國三軍亦出自三鄉也諸侯之制亦當鄉在郊內遂在郊外此云三郊三遂三郊謂三鄉也林氏曰此所謂三遂意若指魯之三軍故設者多引以為魯有三軍之證然苟指魯之軍制言謂之三鄉三遂則可謂之三郊則不可蓋國必有四郊郊外為遂其曰三郊三遂蓋夷戎為寇東郊正受敵處故使此郊之民專意於攻守而調發儲峙則使西南北三郊三遂之民蓋取給於不受敵之地也李氏杞曰常刑刑有定名者也大刑死刑也無餘刑刑之不至於死也七臨川吳氏曰峙糗糧不言魯人蓋伯禽為侯伯監百里內諸侯率以同征糧食當自賫持蓋統告諸侯在會之人也楨幹芻茭非逺國所能自賫故責之魯人也芻茭所以供牛馬若不繼則牛馬飢疲故亦服死刑也董氏鼎曰此國史所書而孔子存之於帝王之後者以周禮猶在魯也雖一時禦敵未足以盡魯侯之美而國之大事在祀與戎於此而盡其心則他可知矣即此一事而本末先後輕重緩急井然有條規模整暇魯侯其賢矣哉秦誓左傳祀子自鄭使告于秦曰鄭人使我掌其北門之管若濳師以來國可得也穆公訪諸蹇叔蹇叔曰不可公辭焉使孟明西乞白乙伐鄭晉襄公帥師敗秦師于殽囚其三帥穆公悔過誓告羣臣史録為篇今文古文皆有春秋僖公三十二年晉人及薑戎敗秦于崤善胡氏安國傳曰書序專取穆公悔過主於勸其詞恕春秋備書秦晉用兵之失兼於懲惡其法嚴故人晉君而以狄視秦也王氏炎曰書之所取取其知悔春秋之所貶貶其悔而不改過而不改春秋不得赦其罪悔過美意書亦不得廢其言李氏祀曰春秋敗崤之後復有彭衙濟河之師初亦徒悔耳徒悔不改穆公所以僅為穆公也夫子於書取其一念之悔而於春秋責其遂非之失一寬一嚴意各有主陳氏賔曰夫子存二誓於魯以著伯禽之是於秦以著穆公之非伯禽之時其征徐戎奉王命以討亂華大義也襲杞之役無王擅兵雖敗而自悔其心終在於報怨夫子於書以秦誓終以見周室之不復振也夏書終於胤征商書終於西伯戡黎而周書終於秦誓其旨一也新安陳氏曰此篇乃初喪師慙悔之辭未幾再用三帥孟明與晉連兵易世不止殊與誓中悔過初意相反安在其能悔過也公曰嗟我士聽無譁豫誓告汝羣言之首首之為言第一義也將舉古人之言故先發此古人有言曰民訖自若是多盤責人斯無難惟受責俾如流是惟艱哉訖盡盤安也凡人盡自若是多安於徇己其責人無難惟受責於人俾如流水略無扞格是惟難哉穆公悔前日安於自徇而不聽蹇叔之言深有味乎古人之語故舉為誓言之首也朱子曰民訖自若是多盤想只是説人情多要安逸之意我心之憂日月逾邁若弗云來已然之過不可追未遷之善猶可及憂歲月之逝若無復有來日也夏氏曰若弗云來憂改過之無口也如日月逝矣歲不我與惟古之謀人則曰未就豫忌惟今之謀人姑將以為親雖則云然尚猷詢茲黃髮則罔所愆忌疾姑且也古之謀人老成之士也今之謀人新進之士也非不知其為老成以其不就己而忌疾之非不知其新進姑樂音洛其順便而親信之前日之過雖已云然然尚謀詢茲黃髮之人則庶罔有所愆蓋悔其既往之失而冀其將來之善也孔氏曰古之謀人謂蹇叔等以未就我所欲反忌之杞唐孔氏曰今之謀人謂子等番番音波良士旅與膂通脊骨也力既愆我尚有之仡仡魚乞反勇夫射御不違我尚不欲惟截截善諞音便言俾君子易辭我皇多有之番番老貌仡仡勇貌截截辨給貌諞巧也皇遑通旅力既愆之良士前日所詆墓木既拱者我猶庶幾平聲得而有之射御不違之勇夫前日所誇過門超乘者我庶幾不欲用之勇夫我尚不欲則辨給善巧言能使君子變易其辭説者我遑暇多有之哉良士謂蹇叔勇夫謂三帥諞言謂杞子先儒皆謂穆公悔用孟明詳其誓意蓋深悔用杞子之言也葉氏曰番番如世稱皤然王氏十朋曰番番與申伯番番同仡仡與崇墉仡仡同陳氏大猷曰旅膂通脊骨也不違中度無失也王氏炎曰巧言變亂是非君子仁而不佞往往為其所奪故易辭新安陳氏曰穆公悔過不力改過不勇已可窺其微意於辭氣之間曰尚猷曰尚有之尚不欲當謀急謀當有急有當不欲急不欲何以尚為朱子訓過勿憚改謂有過當速改不可畏難而苟安三味尚之一辭優遊緩慢宜其悔用孟明而卒用之悔不用蹇叔而卒不用也正如隱公欲傳桓營菟裘而曰吾將授之矣吾將老焉當授即授當老即老豈容有所謂將者乎二公之遂非速禍可於尚與將之辭覘之昧昧我思之如有一介臣斷斷都玩反猗於宜反無他技其心休休焉其如有容人之有技若己有之人之彥聖其心好之不啻如自其口出是能容之以保我子孫黎民亦職有利哉昧昧而思者深濳而靜思也介獨也大學作個斷斷誠一之貌猗語辭大學作兮休休易直好善之意容有所受也彥美士也聖通明也技才聖德也心之所好甚於口之所言也職主也陳氏大猷曰惟無技能容人之技其無技而休休有容所謂不可小知而可大受也曰其如有容莫測其限量而難乎形容也心之好不啻如口之稱口之稱美有限心之好慕無窮此其好有德之真切又甚於視有才者之若已有矣是真實能容非勉強也好善之利流澤無窮亦職有利即孟子所謂好善優於天下况魯國乎之意陳氏雅言曰穆公意謂大臣之道不貴乎用一己之能而在於容天下之善如有一個臣斷斷兮無他技能而休休馬有容人之量蓋惟無善于己而後能容人之善故于人之有技則視彼之才若有於己而在人之能無異於在己之能也於人之彥聖則好彼之德誠發于心而在心之好有甚于在口之好也若己有之則人己一致而無彼此之殊其心好之則心口一致而無表裏之異是非真能有容人之量者乎人君於此能得是臣而用之則必能廣致羣賢以圖治功子孫者我之子孫也而是人也能保之蓋遵其成憲被其餘澤子孫之利莫大於此也黎民者我之黎民也而是人也能保之蓋樂其政教安其田里而黎民之利亦莫大於此也一己之技能為有限而天下之才德為無窮夫臣惟不用己而用人故善之集國者衆而福之集國者逺也人之有技冒疾以惡之人之彥聖而違之俾不達是不能容以不能保我子孫黎民亦曰殆哉冒大學作媢忌也違背音佩違之也達窮達之達殆危也蘇氏曰至哉穆公之論去聲此二人也前一人似房玄齡後一人似季林甫後之人主監此足矣新安陳氏曰此章大學平天下之傳引之其形容能容不能容者之情狀利害可謂至言宜孔子定書不能廢其言也邦之杌隉音兀涅曰由一人邦之榮懷亦尚一人之慶杌隉不安也懷安也言國之危殆繫於所任一人之非國之榮安繫於所任一人之是申繳上二章意張氏曰杌如木之動搖隉如阜之圯壞上新安陳氏曰國之安危繫所用一人之是非是如所稱有利非如上所稱殆哉本孔注即老蘇管仲論一國以一人興以一人亡之意結上文兩節有照應張氏九成曰孔子深意若曰平王錫文侯而言不及復讎王道不可望也得如伯禽之用兵庶幾於王道矣又得如秦穆之悔過亦庶幾於王道矣取魯秦以補王道所以深痛王道之不復興也夫國風始於平王春秋始於平王王道終于平王而以秦魯補之則平王之罪可勝言哉天下之讎莫大於弒君父天下之惡莫大乎安於為弒逆者所立事至於此王道絶矣夫子之意謂使平王用兵得如伯禽申侯犬戎庶可誅乎使平王悔過得如秦穆懲創用賢周家庶其中興乎今皆無之故痛憤而以伯禽穆公繼其後也以謂如此二人猶勝於平王也而宋氏曰秦有誓而詩亡魯有頌而詩絶謂魯不風頌龜山楊氏曰或謂秦誓聖人専以其悔過而書之非也書之有二誓以志帝王之誥命於是絶也聖人以恕待人於人之有過而悔嘉之可也如但以悔為是而不問其改與不改則改過者鮮矣故聖人于人不徒嘉其悔又欲其改且殺人至於被刑未有不悔者使殺人而不必死其肯悔乎戰不敗秦自以為功矣何以知之以濟河之師知之也濟河之師何義哉附李氏養吾曰或謂周書終於文侯之命而以秦誓焉蓋世變往來之會王霸升降之機書終文侯之命而王迹熄書附秦誓而霸圖興周遷洛邑而周日弱秦得鎬京而秦日強讀文侯之命見平王之忘君父忘讎恥也如此讀秦誓見穆公之欲改過遷善用賢去邪也如此周欲不弱秦欲不強得乎平王之詩下儕列國而秦車鄰附見焉平王之書續以列國而秦誓附終焉進秦於詩書之末以警周也春秋之筆於秦每人之又且狄之又以尊周也天下之勢駸駸而趨於秦夫子得不見其幾微於定書刪詩作春秋之際乎下董氏鼎曰此亦國史所録孔子定書斷自唐虞以訖于周而周又訖于秦蓋取其悔過也自非聖人誰能無過過而能悔悔而能改善之善者也太甲悔而聽伊尹之訓成王悔而迎周公以歸不然敗度敗禮成湯之業墮矣內詛外訌文武之基墜矣悔過之功豈不大哉成康以後昭王以南征不復而穆王繼之復拒祭公之諫肆侈心而行天下不知悔者也宣王中興幽王為犬戎所殺而平王繼之不報君父之讎思小惠而忘大恥不知悔者也君者天下之主也心者人君之主也君心如此天下何賴哉秦穆輕信杞子逢孫楊孫之謀因違蹇叔之諫至於喪師辱國而悔過之誓作焉使有天下國家者皆如其知過而能悔又必自知悔而能改則雖以挽回三代之冶亦何難哉惜乎穆公徒悔而不能改也然夫子之微意讀書者可以深長思矣書經大全卷十
